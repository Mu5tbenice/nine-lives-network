<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Profile | Nine Lives Network</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">

  <style>
    .profile-header { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:16px; padding:32px; text-align:center; }
    .profile-avatar { width:80px; height:80px; border-radius:50%; border:3px solid var(--gold); margin:0 auto 12px; object-fit:contain; background:rgba(0,0,0,0.3); }
    .profile-name { font-family:var(--font-title); font-size:22px; color:var(--text-bright); margin-bottom:4px; }
    .profile-handle { font-family:var(--font-data); font-size:9px; color:var(--text-muted); margin-bottom:8px; }
    .profile-house { display:inline-flex; align-items:center; gap:8px; padding:6px 16px; background:rgba(212,166,75,0.08); border:1px solid var(--border-subtle); border-radius:20px; }
    .profile-house img { width:20px; height:20px; object-fit:contain; }
    .profile-house-name { font-family:var(--font-title); font-size:12px; }

    .p-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    .p-stat { background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:12px; padding:16px; text-align:center; }
    .p-stat__val { font-family:var(--font-data); font-size:16px; color:var(--gold); }
    .p-stat__label { font-family:var(--font-data); font-size:7px; color:var(--text-muted); margin-top:6px; text-transform:uppercase; }

    .badges-grid { display:flex; flex-wrap:wrap; gap:12px; }
    .p-badge { display:flex; flex-direction:column; align-items:center; gap:4px; padding:12px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.05); border-radius:10px; min-width:80px; }
    .p-badge.earned { border-color:var(--gold-border); background:rgba(212,166,75,0.06); }
    .p-badge.locked { opacity:0.35; }
    .p-badge__icon { font-size:28px; }
    .p-badge__name { font-family:var(--font-data); font-size:6px; color:var(--text-muted); text-align:center; text-transform:uppercase; }
    .p-badge.earned .p-badge__name { color:var(--gold); }

    .arena-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }

    .act-item { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.03); }
    .act-item:last-child { border-bottom:none; }
    .act-icon { font-size:16px; }
    .act-text { font-family:var(--font-body); font-size:14px; color:var(--text-muted); }
    .act-date { font-family:var(--font-data); font-size:6px; color:var(--text-muted); margin-left:auto; }

    @media(max-width:600px) { .p-stats { grid-template-columns:repeat(2,1fr); } .arena-stats { grid-template-columns:repeat(2,1fr); } }
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>
  <script src="/js/nav.js"></script>

  <div class="main-container" id="profileContent" style="display:none;">
    <div class="loading" id="loadingState"><div class="spinner"></div></div>
  </div>

  <div id="errorState" style="display:none; text-align:center; padding:80px 20px;">
    <p style="font-size:48px; margin-bottom:16px;">🧙</p>
    <p style="font-family:var(--font-title); font-size:18px; color:var(--text-bright); margin-bottom:8px;">No player found</p>
    <p style="font-family:var(--font-body); color:var(--text-muted);">You need to <a href="/register.html" style="color:var(--gold);">register</a> first.</p>
  </div>

  <script>
    var HOUSES = {
      1:{name:'Smoulders',color:'#E03C31',element:'Ember Covenant',img:'/assets/images/houses/House-smoulders.png'},
      2:{name:'Darktide',color:'#00B4D8',element:'Tidal Conclave',img:'/assets/images/houses/House-darktide.png'},
      3:{name:'Stonebark',color:'#5CB338',element:'Stone Covenant',img:'/assets/images/houses/House-stonebark.png'},
      4:{name:'Ashenvale',color:'#B0C4DE',element:'Zephyr Circle',img:'/assets/images/houses/House-Ashenvale.png'},
      5:{name:'Stormrage',color:'#FFC800',element:'Storm Assembly',img:'/assets/images/houses/House-stormrage.png'},
      6:{name:'Nighthollow',color:'#7B2D8E',element:'Umbral Syndicate',img:'/assets/images/houses/House-nighthollow.png'},
      7:{name:'Dawnbringer',color:'#FF8C00',element:'Radiant Order',img:'/assets/images/houses/House-dawnbringer.png'},
      8:{name:'Manastorm',color:'#5B8FE0',element:'Arcane Spire',img:'/assets/images/houses/House-manastorm.png'},
      9:{name:'Plaguemire',color:'#E84393',element:'WildCat Path',img:'/assets/images/houses/House-plaguemire.png'}
    };

    function getPlayerId(){
      var params=new URLSearchParams(window.location.search);
      var fromUrl=params.get('player_id');
      if(fromUrl){localStorage.setItem('player_id',fromUrl);return fromUrl;}
      return localStorage.getItem('player_id');
    }

    async function loadProfile(){
      var pid=getPlayerId();
      if(!pid){document.getElementById('errorState').style.display='block';return;}

      try {
        var res=await fetch('/api/players/'+pid);
        var player=await res.json();
        if(!player||player.error){document.getElementById('errorState').style.display='block';return;}

        var castsRes=await fetch('/api/players/'+pid+'/casts');
        var casts=await castsRes.json();

        renderProfile(player,Array.isArray(casts)?casts:[]);
      } catch(e){
        console.error('Profile load error:',e);
        document.getElementById('errorState').style.display='block';
      }
    }

    function renderProfile(player,casts){
      var house=HOUSES[player.school_id]||HOUSES[1];
      var points=player.seasonal_points||0;
      var lifetime=player.lifetime_points||0;
      var streak=player.streak||0;
      var mana=player.mana!=null?player.mana:5;
      var recentCasts=casts.slice(0,5);

      var avatarHTML=player.profile_image
        ?'<img src="'+player.profile_image+'" alt="" class="profile-avatar">'
        :'<img src="'+house.img+'" alt="" class="profile-avatar">';

      var castsHTML='';
      if(recentCasts.length>0){
        recentCasts.forEach(function(c){
          castsHTML+='<div class="act-item">'
            +'<span class="act-icon">✨</span>'
            +'<span class="act-text">'+(c.spell_name||c.zone_name||'Spell Cast')+'</span>'
            +'<span class="act-date">'+(c.points_earned||0)+' pts</span>'
            +'</div>';
        });
      } else {
        castsHTML='<p style="text-align:center;color:var(--text-faint);font-style:italic;padding:16px 0;">No activity yet</p>';
      }

      var badgesHTML='';
      var badges=[
        {icon:'🔥',name:'First Cast',earned:casts.length>0},
        {icon:'⚡',name:'5 Day Streak',earned:streak>=5},
        {icon:'💎',name:'Week Warrior',earned:streak>=7},
        {icon:'🏰',name:'Territory Lord',earned:false},
        {icon:'👑',name:'Top 10',earned:false},
        {icon:'🐱',name:'Genesis Cat',earned:false}
      ];
      badges.forEach(function(b){
        badgesHTML+='<div class="p-badge '+(b.earned?'earned':'locked')+'">'
          +'<span class="p-badge__icon">'+b.icon+'</span>'
          +'<span class="p-badge__name">'+b.name+'</span>'
          +'</div>';
      });

      var container=document.getElementById('profileContent');
      container.innerHTML=''
        +'<div class="profile-header fade-up">'
        +avatarHTML
        +'<div class="profile-name">House '+house.name+'</div>'
        +'<div class="profile-handle">@'+(player.twitter_handle||'Unknown')+'</div>'
        +'<div class="profile-house">'
        +'<img src="'+house.img+'" alt="">'
        +'<span class="profile-house-name" style="color:'+house.color+'">'+house.element+'</span>'
        +'</div>'
        +'</div>'

        +'<div class="p-stats fade-up fade-up-1">'
        +'<div class="p-stat"><div class="p-stat__val">'+points+'</div><div class="p-stat__label">Season Pts</div></div>'
        +'<div class="p-stat"><div class="p-stat__val">'+lifetime+'</div><div class="p-stat__label">Lifetime</div></div>'
        +'<div class="p-stat"><div class="p-stat__val">'+streak+'</div><div class="p-stat__label">Streak</div></div>'
        +'<div class="p-stat"><div class="p-stat__val">'+mana+'/5</div><div class="p-stat__label">Mana</div></div>'
        +'</div>'

        +'<div class="card fade-up fade-up-2">'
        +'<div class="card-header"><span class="label">🏅 Badges</span></div>'
        +'<div class="badges-grid">'+badgesHTML+'</div>'
        +'</div>'

        +'<div class="card fade-up fade-up-3">'
        +'<div class="card-header"><span class="label">Recent Activity</span></div>'
        +castsHTML
        +'</div>';

      var loader=document.getElementById('loadingState');
      if(loader)loader.style.display='none';
      container.style.display='flex';
    }

    loadProfile();
  </script>
</body>
</html>
