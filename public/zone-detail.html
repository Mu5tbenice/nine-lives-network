<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zone Battle | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    :root {
      --bg:#0a0812;--bg2:#120e1e;--card:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.07);
      --gold:#D4A64B;--gold-dim:rgba(212,166,75,0.15);--gold-border:rgba(212,166,75,0.35);
      --bright:#F0ECF8;--body:#CCC5DB;--muted:#847C98;--faint:#554E68;
      --green:#44cc88;--red:#ff4466;--cyan:#6ac8d8;--sunset:#E8855A;
      --f-title:'Cinzel',serif;--f-body:'Crimson Text',serif;
      --f-data:'Press Start 2P',monospace;--f-mono:'JetBrains Mono',monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:linear-gradient(180deg,var(--bg) 0%,#0d0a14 100%);color:var(--bright);font-family:var(--f-body);min-height:100vh;}
    ::-webkit-scrollbar{width:3px;height:3px;}
    ::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.2);border-radius:2px;}
    .zone-header{position:relative;height:200px;overflow:hidden;border-radius:0 0 16px 16px;}
    .zone-header-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
    .zone-header-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,8,18,0) 20%,rgba(10,8,18,0.7) 60%,var(--bg) 100%);}
    .zone-header-content{position:absolute;bottom:0;left:0;right:0;padding:0 20px 16px;z-index:2;}
    .zone-title{font-family:var(--f-title);font-size:24px;font-weight:700;color:#fff;letter-spacing:1.5px;text-shadow:0 2px 12px rgba(0,0,0,0.8);}
    .zone-desc{font-family:var(--f-body);font-size:15px;color:rgba(255,255,255,0.6);margin-top:4px;}
    .back-btn{position:absolute;top:12px;left:14px;z-index:5;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:15px;text-decoration:none;}
    .particle{position:absolute;width:2px;height:2px;border-radius:50%;animation:particlePulse 3s ease-in-out infinite;}
    .controller{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
    .controller-left{display:flex;align-items:center;gap:10px;}
    .controller-badge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--f-data);font-size:8px;font-weight:700;}
    .controller-label{font-family:var(--f-data);font-size:7px;color:var(--faint);letter-spacing:1px;}
    .controller-name{font-family:var(--f-title);font-size:17px;font-weight:700;margin-top:1px;}
    .controller-hp{font-family:var(--f-mono);font-size:22px;font-weight:700;line-height:1;}
    .controller-delta{font-family:var(--f-data);font-size:8px;margin-top:2px;}
    .timer-bar{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.015);border-bottom:1px solid var(--border);}
    .timer-left{display:flex;align-items:center;gap:6px;}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:liveDot 2s ease infinite;}
    .timer-label{font-family:var(--f-data);font-size:7px;color:var(--faint);letter-spacing:1px;}
    .timer-value{font-family:var(--f-mono);font-size:14px;font-weight:700;color:var(--cyan);}
    .section{padding:14px 16px 8px;}
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .section-title{font-family:var(--f-data);font-size:8px;color:var(--muted);letter-spacing:1.5px;display:flex;align-items:center;gap:6px;}
    .guild-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:4px;transition:background 0.2s;}
    .guild-row:hover{background:rgba(255,255,255,0.02);}
    .guild-rank{font-family:var(--f-data);font-size:10px;color:var(--faint);width:18px;text-align:center;}
    .guild-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--f-data);font-size:7px;font-weight:700;flex-shrink:0;}
    .guild-info{flex:1;min-width:0;}
    .guild-tag{font-family:var(--f-data);font-size:8px;letter-spacing:0.5px;}
    .guild-members{font-family:var(--f-data);font-size:6px;color:var(--faint);margin-top:1px;}
    .guild-bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.04);margin-top:3px;overflow:hidden;}
    .guild-bar-fill{height:100%;border-radius:2px;transition:width 0.6s;}
    .guild-hp{font-family:var(--f-mono);font-size:13px;font-weight:700;text-align:right;min-width:50px;}
    .nine-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;animation:slideIn 0.3s ease both;}
    .nine-card.you{border-color:var(--gold-border);background:rgba(212,166,75,0.04);}
    .nine-card.ko{opacity:0.35;}
    .nine-avatar-ph{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .nine-info{flex:1;min-width:0;}
    .nine-name{font-family:var(--f-title);font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .nine-meta{font-family:var(--f-data);font-size:6px;color:var(--faint);margin-top:2px;display:flex;align-items:center;gap:6px;}
    .merc-badge{font-family:var(--f-data);font-size:5px;padding:2px 6px;border-radius:4px;background:rgba(232,133,90,0.15);color:var(--sunset);border:1px solid rgba(232,133,90,0.3);}
    .hp-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;margin-top:5px;}
    .hp-fill{height:100%;border-radius:3px;transition:width 0.4s;}
    .hp-text{font-family:var(--f-data);font-size:6px;color:var(--faint);margin-top:2px;text-align:right;}
    .nine-stats{display:flex;gap:6px;flex-shrink:0;}
    .stat-pip{text-align:center;}
    .stat-val{font-family:var(--f-data);font-size:9px;font-weight:700;}
    .stat-lbl{font-family:var(--f-data);font-size:4px;color:var(--faint);margin-top:1px;}
    .hand-panel{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(10,8,18,0.95);backdrop-filter:blur(16px);border-top:1px solid var(--gold-border);padding:12px 14px 20px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.22,1,0.36,1);}
    .hand-panel.open{transform:translateY(0);}
    .hand-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .hand-title{font-family:var(--f-title);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:1px;}
    .close-x{font-family:var(--f-data);font-size:7px;color:var(--faint);cursor:pointer;padding:4px 8px;}
    /* V5: Mana styles removed */
    .sort-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;align-items:center;}
    .sort-chip{font-family:var(--f-title);font-size:9px;font-weight:600;padding:5px 10px;border-radius:5px;cursor:pointer;border:none;transition:all 0.2s;}
    .sort-chip.active{background:var(--gold-dim);color:var(--gold);outline:1px solid var(--gold-border);}
    .sort-chip.inactive{background:rgba(255,255,255,0.03);color:var(--faint);outline:1px solid var(--border);}
    .carousel-wrap{position:relative;height:230px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .carousel-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(0,0,0,0.7);border:1px solid var(--border);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--gold);}
    .carousel-btn.left{left:0;}.carousel-btn.right{right:0;}
    .carousel-inner{display:flex;align-items:center;justify-content:center;}
    .carousel-card{transition:all 0.4s cubic-bezier(0.22,1,0.36,1);cursor:pointer;flex-shrink:0;}
    .mini-card{border-radius:12px;position:relative;overflow:hidden;}
    .mini-card-inner{padding:10px 10px 8px;position:relative;z-index:1;}
    .mc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
    .mc-name{font-family:var(--f-title);font-weight:700;line-height:1.2;flex:1;padding-right:6px;}
    .mc-art{border-radius:6px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.03);position:relative;}
    .mc-art-tier{position:absolute;bottom:3px;right:5px;font-family:var(--f-data);font-size:5px;color:var(--muted);opacity:0.5;}
    .mc-type{display:inline-block;font-family:var(--f-title);font-size:7px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-bottom:4px;}
    .mc-stats{display:flex;gap:8px;margin-bottom:4px;}
    .mc-stat{font-family:var(--f-data);font-size:8px;}
    .mc-charges{font-family:var(--f-data);font-size:5px;color:var(--faint);}
    .mc-effect{font-family:var(--f-data);font-size:6px;line-height:1.6;padding:4px 6px;border-radius:4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);}
    .mc-house{margin-top:5px;text-align:center;font-family:var(--f-data);font-size:4px;letter-spacing:2px;opacity:0.2;}
    .mc-rarity{position:absolute;top:6px;right:6px;font-size:7px;font-family:var(--f-data);padding:2px 6px;border-radius:4px;z-index:2;}
    .carousel-dots{display:flex;justify-content:center;gap:4px;margin-top:4px;}
    .c-dot{height:5px;border-radius:3px;cursor:pointer;transition:all 0.3s;}
    .play-btn{font-family:var(--f-title);font-size:14px;font-weight:700;padding:12px 40px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#D4A64B,#b8860b);color:#0a0810;letter-spacing:1.5px;box-shadow:0 4px 0 #8a6d2f,0 6px 16px rgba(212,166,75,0.25);transition:transform 0.1s;width:100%;margin-top:10px;}
    .play-btn:disabled{opacity:0.3;cursor:not-allowed;}
    .play-btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #8a6d2f;}
    .fab{position:fixed;bottom:20px;right:20px;z-index:40;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
    .fab.deploy{background:linear-gradient(135deg,var(--gold),#c49030);}
    .fab.cards{background:linear-gradient(135deg,var(--green),#3a9);}
    .withdraw-btn{font-family:var(--f-data);font-size:6px;padding:4px 10px;border-radius:4px;border:1px solid rgba(255,68,102,0.3);background:rgba(255,68,102,0.1);color:var(--red);cursor:pointer;}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top:2px solid var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
    .empty-msg{text-align:center;padding:20px;font-family:var(--f-body);font-size:14px;color:var(--faint);}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes liveDot{0%,100%{opacity:1;}50%{opacity:0.3;}}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    @keyframes particlePulse{0%,100%{opacity:0.6;}50%{opacity:0.15;}}
    .fade-up{animation:fadeUp 0.4s ease both;}
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>
<div id="loadingState" class="loading">
  <div class="spinner"></div>
  <div style="font-family:var(--f-data);font-size:7px;color:var(--muted);margin-top:12px;letter-spacing:1px;">LOADING ZONE...</div>
</div>
<div id="zoneContent" style="display:none;padding-bottom:80px;max-width:520px;margin:0 auto;">
  <div class="zone-header">
    <div class="zone-header-bg" id="zoneBg"></div>
    <div class="zone-header-overlay"></div>
    <div id="particles"></div>
    <a href="/nethara-live.html" class="back-btn">&#10005;</a>
    <div class="zone-header-content">
      <div class="zone-title" id="zoneName"></div>
      <div class="zone-desc" id="zoneDesc"></div>
    </div>
  </div>
  <div class="controller" id="controllerBar" style="display:none;">
    <div class="controller-left">
      <div class="controller-badge" id="ctrlBadge"></div>
      <div><div class="controller-label">ZONE CONTROLLED BY</div><div class="controller-name" id="ctrlName"></div></div>
    </div>
    <div style="text-align:right;"><div class="controller-hp" id="ctrlHp"></div><div class="controller-delta" id="ctrlDelta"></div></div>
  </div>
  <div class="timer-bar">
    <div class="timer-left"><span class="live-dot"></span><span class="timer-label">NEXT COMBAT CYCLE</span></div>
    <div class="timer-value" id="cycleTimer">--:--</div>
  </div>
  <div class="section">
    <div class="section-head"><div class="section-title">GUILD POWER</div><div id="totalNines" style="font-family:var(--f-data);font-size:7px;color:var(--faint);"></div></div>
    <div id="guildRows"></div>
    <div id="noGuilds" class="empty-msg" style="display:none;">No one deployed yet. Be the first!</div>
  </div>
  <div class="section" id="effectsSection" style="display:none;">
    <div class="section-title" style="margin-bottom:8px;">ACTIVE EFFECTS</div>
    <div class="effect-scroll" id="effectsList"></div>
  </div>
  <div class="section">
    <div class="section-head"><div class="section-title">DEPLOYED NINES</div><span id="nineCount" style="font-family:var(--f-data);font-size:7px;color:var(--faint);"></span></div>
    <div id="ninesList"></div>
  </div>
  <div class="section">
    <div class="section-head"><div class="section-title">COMBAT LOG</div></div>
    <div id="combatLog"></div>
    <div id="noLog" class="empty-msg">No combat yet. Deploy opposing guilds to start.</div>
  </div>
  <div id="yourStatus" style="display:none;padding:12px 16px;">
    <div class="section-title" style="margin-bottom:8px;">YOUR DEPLOYMENT</div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span id="yourInfo" style="font-family:var(--f-body);font-size:14px;color:var(--body);"></span>
      <button class="withdraw-btn" onclick="doWithdraw()">WITHDRAW</button>
    </div>
  </div>
</div>
<button class="fab deploy" id="actionFab" onclick="toggleHand()" style="display:none;">&#9876;</button>
<div class="hand-panel" id="handPanel">
  <div class="hand-header">
    <span class="hand-title" id="handTitle">PLAY A CARD</span>
    <span class="close-x" onclick="closeHand()">&#10005; CLOSE</span>
  </div>
  <!-- V5: Mana row removed -->
  <div class="sort-row" id="sortRow"></div>
  <div class="carousel-wrap" id="carouselWrap">
    <button class="carousel-btn left" onclick="goL()">&#8249;</button>
    <div class="carousel-inner" id="carouselInner"></div>
    <button class="carousel-btn right" onclick="goR()">&#8250;</button>
  </div>
  <div class="carousel-dots" id="carouselDots"></div>
  <button class="play-btn" id="playBtn" disabled>DEPLOY</button>
</div>
<script src="/js/card-particles.js"></script>
<script src="/js/rarity-scaling.js"></script>
<script src="/js/card-v4.js"></script>
<script src="/js/card-rarity-patch.js"></script>
<script>
var HOUSES={1:{n:'Smoulders',c:'#E03C31',i:'\u{1F525}'},2:{n:'Darktide',c:'#00B4D8',i:'\u{1F30A}'},3:{n:'Stonebark',c:'#5CB338',i:'\u{1F33F}'},4:{n:'Ashenvale',c:'#B0C4DE',i:'\u{1F4A8}'},5:{n:'Stormrage',c:'#FFC800',i:'\u26A1'},6:{n:'Nighthollow',c:'#7B2D8E',i:'\u{1F319}'},7:{n:'Dawnbringer',c:'#FF8C00',i:'\u2600\uFE0F'},8:{n:'Manastorm',c:'#5B8FE0',i:'\u{1F52E}'},9:{n:'Plaguemire',c:'#E84393',i:'\u2620\uFE0F'}};
var RARITY={common:{c:'#bbb',b:'rgba(180,180,180,0.3)',bg:'rgba(180,180,180,0.06)',l:'C'},uncommon:{c:'#66dd66',b:'rgba(80,200,80,0.35)',bg:'rgba(80,200,80,0.08)',l:'U'},rare:{c:'#55bbff',b:'rgba(0,150,255,0.35)',bg:'rgba(0,150,255,0.08)',l:'R'},epic:{c:'#bb88ff',b:'rgba(160,80,240,0.4)',bg:'rgba(160,80,240,0.1)',l:'E'},legendary:{c:'#ffd700',b:'rgba(255,200,0,0.4)',bg:'rgba(255,200,0,0.12)',l:'L'}};
var TYPE_C={attack:'#ff5555',defend:'#5588ff',support:'#ffd700',utility:'#aaddff',debuff:'#bb88ff',control:'#ff88cc'};
var zoneId=new URLSearchParams(window.location.search).get('id');
var playerId=localStorage.getItem('player_id');
var playerCards=[],myDeployment=null,isDeployed=false,handOpen=false;
var carouselIdx=0,sortKey='rarity',sorted=[];
var currentMana=99,maxMana=99; // V5: mana removed — always allow deploy
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function houseByName(name){for(var k in HOUSES)if(HOUSES[k].n.toLowerCase()===(name||'').toLowerCase())return HOUSES[k];return{n:'Universal',c:'#D4A64B',i:'\u2726'};}
function spawnParticles(){var el=document.getElementById('particles');if(!el)return;var h='';for(var i=0;i<12;i++){var x=10+(i*7.5)%85,y=15+(i*13)%55;h+='<div class="particle" style="left:'+x+'%;top:'+y+'%;background:rgba('+(100+i*15)+','+(180+i*5)+','+(200+i*3)+',0.4);animation-duration:'+(2+i*0.3)+'s;animation-delay:'+i*0.2+'s;"></div>';}el.innerHTML=h;}

async function loadZone(){
  if(!zoneId){window.location.href='/nethara-live.html';return;}
  try{
    var p=[fetch('/api/zones'),fetch('/api/zones/'+zoneId+'/deployments')];
    if(playerId){p.push(fetch('/api/packs/collection/'+playerId));}
    var res=await Promise.all(p);
    var zones=res[0].ok?await res[0].json():[];
    var zone=zones.find(function(z){return z.id==zoneId;});
    if(!zone){document.getElementById('loadingState').innerHTML='<div style="color:var(--muted);font-family:var(--f-data);font-size:8px;">ZONE NOT FOUND</div>';return;}
    var depData=res[1].ok?await res[1].json():{deployments:[],guild_power:{}};
    playerCards=[];
    if(res[2]&&res[2].ok){var cd=await res[2].json();playerCards=(cd.cards||cd||[]).map(function(c){return{id:c.id,name:c.spell_name||c.name||(c.spell&&c.spell.name)||'Unknown',rarity:c.rarity||'common',atk:(c.spell&&c.spell.base_atk)||c.base_atk||0,hp:(c.spell&&c.spell.base_hp)||c.base_hp||0,charges:c.current_charges||0,maxCharges:c.max_charges||0,exhausted:c.is_exhausted||false,house:c.spell_house||'universal',type:c.spell_type||'attack',tier:c.tier||0,effects:c.spell_effects||(c.spell&&c.spell.bonus_effects)||''};});}
    // V5: mana removed
    var deps=depData.deployments||[];var gp=depData.guild_power||{};
    myDeployment=deps.find(function(d){return d.player_id==playerId;});
    isDeployed=!!myDeployment;
    render(zone,deps,gp);
  }catch(e){console.error(e);document.getElementById('loadingState').innerHTML='<div style="color:var(--red);font-family:var(--f-data);font-size:8px;">ERROR</div>';}
}

function render(zone,deployments,guildPower){
  var bgImg=zone.image_url?'/assets/images/zones/'+zone.image_url:'';
  if(bgImg)document.getElementById('zoneBg').style.backgroundImage='url('+bgImg+')';
  else document.getElementById('zoneBg').style.background='linear-gradient(135deg,#1a2a3a,#0a1520 40%,#0d0a14)';
  document.getElementById('zoneName').textContent=zone.name;
  document.getElementById('zoneDesc').textContent=zone.description||'';
  spawnParticles();

  // Controller
  var guilds=Object.entries(guildPower).filter(function(g){return g[0]!=='MERC_FREE'&&g[0]!=='unaffiliated';}).sort(function(a,b){return b[1].total_hp-a[1].total_hp;});
  if(guilds.length>0){
    var leader=guilds[0];var cb=document.getElementById('controllerBar');cb.style.display='flex';
    var clr=leader[1].color||'#D4A64B';
    document.getElementById('ctrlBadge').style.cssText='border:2px solid '+clr+';background:'+clr+'15;color:'+clr+';';
    document.getElementById('ctrlBadge').textContent=leader[0].substring(0,3).toUpperCase();
    document.getElementById('ctrlName').style.color=clr;document.getElementById('ctrlName').textContent=leader[0];
    document.getElementById('ctrlHp').style.color=clr;document.getElementById('ctrlHp').textContent=leader[1].total_hp+' HP';
    document.getElementById('ctrlDelta').innerHTML='<span style="color:var(--faint);">'+leader[1].count+' nines</span>';
  }else{document.getElementById('controllerBar').style.display='none';}

  // Guild rows
  var allG=Object.entries(guildPower).sort(function(a,b){return b[1].total_hp-a[1].total_hp;});
  var totalHp=0;allG.forEach(function(g){totalHp+=g[1].total_hp;});
  var gH='';
  if(allG.length===0){document.getElementById('noGuilds').style.display='block';}
  else{
    document.getElementById('noGuilds').style.display='none';
    var colors=['#D4A64B','#E8855A','#6ac8d8','#6acd8a','#bb88ff','#e85a6a','#FFC800','#5B8FE0'];
    allG.forEach(function(g,i){
      var tag=g[0],data=g[1],pct=totalHp>0?Math.round(data.total_hp/totalHp*100):0;
      var label=tag==='MERC_FREE'?'Free Mercs':tag==='unaffiliated'?'Unaffiliated':tag;
      var clr=data.color||colors[i%colors.length];
      gH+='<div class="guild-row fade-up" style="animation-delay:'+i*0.05+'s">';
      gH+='<div class="guild-rank">#'+(i+1)+'</div>';
      gH+='<div class="guild-badge" style="border:2px solid '+clr+';background:'+clr+'15;color:'+clr+';">'+tag.substring(0,2).toUpperCase()+'</div>';
      gH+='<div class="guild-info"><div class="guild-tag" style="color:'+clr+';">'+esc(label)+'</div>';
      gH+='<div class="guild-members">'+data.count+' nines &middot; '+pct+'%</div>';
      gH+='<div class="guild-bar"><div class="guild-bar-fill" style="width:'+pct+'%;background:'+clr+';"></div></div></div>';
      gH+='<div class="guild-hp" style="color:'+clr+';">'+data.total_hp+'</div></div>';
    });
  }
  document.getElementById('guildRows').innerHTML=gH;
  document.getElementById('totalNines').textContent=deployments.length+' total';

  // Nines
  document.getElementById('nineCount').textContent=deployments.length;
  var nH='';
  deployments.forEach(function(d,i){
    var house=HOUSES[d.player?d.player.school_id:1]||HOUSES[1];
    var hpPct=d.max_hp>0?Math.round(d.current_hp/d.max_hp*100):100;
    var hpClr=hpPct>60?'var(--green)':hpPct>30?'#FFC800':'var(--red)';
    var isKo=d.current_hp<=0,isMe=d.player_id==playerId,isMerc=d.is_mercenary;
    nH+='<div class="nine-card'+(isKo?' ko':'')+(isMe?' you':'')+'" style="animation-delay:'+i*0.04+'s;">';
    nH+='<div class="nine-avatar-ph" style="background:'+house.c+'20;border:2px solid '+house.c+';">'+house.i+'</div>';
    nH+='<div class="nine-info"><div class="nine-name" style="color:'+house.c+';">'+(d.player?esc(d.player.twitter_handle):'?')+(isMe?' <span style="color:var(--gold);font-size:8px;">(YOU)</span>':'')+'</div>';
    nH+='<div class="nine-meta"><span>'+esc(d.guild_tag||'unaffiliated')+'</span>';
    if(isMerc||d.guild_tag&&d.guild_tag.startsWith('@'))nH+='<span class="merc-badge" style="background:rgba(106,200,216,0.15);color:var(--cyan);border-color:rgba(106,200,216,0.3);">LONE WOLF 1.5x</span>';
    nH+='</div><div class="hp-bar"><div class="hp-fill" style="width:'+hpPct+'%;background:'+hpClr+';"></div></div>';
    nH+='<div class="hp-text">'+d.current_hp+'/'+d.max_hp+' HP</div></div>';
    nH+='<div class="nine-stats">';
    nH+='<div class="stat-pip"><div class="stat-val" style="color:var(--red);">'+(d.atk||'?')+'</div><div class="stat-lbl">ATK</div></div>';
    nH+='<div class="stat-pip"><div class="stat-val" style="color:var(--green);">'+(d.base_hp||'?')+'</div><div class="stat-lbl">HP</div></div>';
    nH+='<div class="stat-pip"><div class="stat-val" style="color:var(--cyan);">'+(d.spd||'?')+'</div><div class="stat-lbl">SPD</div></div>';
    nH+='</div></div>';
  });
  if(deployments.length===0)nH='<div class="empty-msg">No Nines deployed. Deploy yours!</div>';
  document.getElementById('ninesList').innerHTML=nH;

  if(isDeployed){
    document.getElementById('yourStatus').style.display='block';
    document.getElementById('yourInfo').innerHTML='HP: <strong>'+myDeployment.current_hp+'/'+myDeployment.max_hp+'</strong> &middot; Guild: <strong>'+(myDeployment.guild_tag||'merc')+'</strong>';
  }

  var fab=document.getElementById('actionFab');fab.style.display='flex';
  fab.className=isDeployed?'fab cards':'fab deploy';
  fab.innerHTML=isDeployed?'&#127924;':'&#9876;';
  buildHand();
  document.getElementById('loadingState').style.display='none';
  document.getElementById('zoneContent').style.display='block';
}

var RARITY_ORDER={legendary:0,epic:1,rare:2,uncommon:3,common:4};
function sortCards(cards,key){var s=[].concat(cards);if(key==='rarity')s.sort(function(a,b){return(RARITY_ORDER[a.rarity]||5)-(RARITY_ORDER[b.rarity]||5);});else if(key==='atk')s.sort(function(a,b){return b.atk-a.atk;});else if(key==='type')s.sort(function(a,b){return a.type.localeCompare(b.type);});else if(key==='house')s.sort(function(a,b){return a.house.localeCompare(b.house);});return s;}

function buildHand(){
  // V5: Mana display removed
  if(!isDeployed){
    document.getElementById('handTitle').textContent='DEPLOY TO THIS ZONE';
    document.getElementById('playBtn').textContent='DEPLOY';
    document.getElementById('playBtn').disabled=false;
    document.getElementById('playBtn').onclick=doDeploy;
    document.getElementById('sortRow').innerHTML='';
    document.getElementById('carouselWrap').style.display='none';
    document.getElementById('carouselDots').innerHTML='';return;
  }
  document.getElementById('handTitle').textContent='PLAY A CARD';
  document.getElementById('carouselWrap').style.display='flex';
  var sorts=[{k:'rarity',l:'Rarity'},{k:'atk',l:'ATK'},{k:'type',l:'Type'},{k:'house',l:'House'}];
  var sH='';sorts.forEach(function(s){sH+='<button class="sort-chip '+(sortKey===s.k?'active':'inactive')+'" onclick="setSort(\''+s.k+'\')">'+s.l+'</button>';});
  sH+='<span style="margin-left:auto;font-family:var(--f-data);font-size:7px;color:var(--faint);">'+playerCards.length+'</span>';
  document.getElementById('sortRow').innerHTML=sH;
  sorted=sortCards(playerCards.filter(function(c){return!c.exhausted;}),sortKey);
  if(carouselIdx>=sorted.length)carouselIdx=Math.max(0,sorted.length-1);
  renderCarousel();
  document.getElementById('playBtn').textContent='CAST '+(sorted[carouselIdx]?sorted[carouselIdx].name.toUpperCase():'CARD');
  document.getElementById('playBtn').disabled=sorted.length===0;
  document.getElementById('playBtn').onclick=doPlayCard;
}

function renderCarousel(){
  var h='';
  sorted.forEach(function(card,i){
    var isC=i===carouselIdx;
    var dist=Math.abs(i-carouselIdx);
    var cardHtml=buildSpellCard(card,{size:'tiny',delay:i*0.03});
    // Wrap in carousel-card div with transform
    h+='<div class="carousel-card'+(isC?' spell-card--selected':'')+(card.is_exhausted?' spell-card--exhausted':'')+'" onclick="setCarousel(''+i+'')" style="opacity:'+(dist>2?0:dist>1?0.2:isC?1:0.5)+';transform:scale('+(isC?1:0.8)+') translateX('+'+(i-carouselIdx)*-16+'px);z-index:'+(isC?10:5-dist)+';filter:'+(isC?'none':'brightness(0.6)')+';margin-left:'+'+(i===0?0:-26)+'px;pointer-events:'+'+(dist>2?'none':'auto')+''">';
    h+=cardHtml;
    h+='</div>';
  });
  if(sorted.length===0)h='<div class="empty-msg">No usable cards. Open packs!</div>';
  document.getElementById('carouselInner').innerHTML=h;
  var dH='';sorted.forEach(function(c,i){dH+='<div class="c-dot" onclick="setCarousel(''+i+'')" style="width:'+'+(i===carouselIdx?16:5)+'px;background:'+(i===carouselIdx?houseByName(c.house).c:'rgba(255,255,255,0.08)')+'">';});
  document.getElementById('carouselDots').innerHTML=dH;
  if(isDeployed&&sorted[carouselIdx]){document.getElementById('playBtn').textContent='CAST '+sorted[carouselIdx].name.toUpperCase();document.getElementById('playBtn').disabled=false;}
}
function setSort(k){sortKey=k;carouselIdx=0;buildHand();}
function setCarousel(i){carouselIdx=i;renderCarousel();}
function goL(){if(carouselIdx>0){carouselIdx--;renderCarousel();}}
function goR(){if(carouselIdx<sorted.length-1){carouselIdx++;renderCarousel();}}
var touchX=0;
document.getElementById('carouselWrap').addEventListener('touchstart',function(e){touchX=e.touches[0].clientX;});
document.getElementById('carouselWrap').addEventListener('touchend',function(e){var d=touchX-e.changedTouches[0].clientX;if(d>40)goR();else if(d<-40)goL();});
function toggleHand(){handOpen=!handOpen;document.getElementById('handPanel').classList.toggle('open',handOpen);}
function closeHand(){handOpen=false;document.getElementById('handPanel').classList.remove('open');}

async function doDeploy(){
  var btn=document.getElementById('playBtn');btn.disabled=true;btn.textContent='DEPLOYING...';
  try{
    var r=await fetch('/api/zones/deploy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(playerId),zone_id:parseInt(zoneId)})});
    var d=await r.json();
    if(r.ok&&d.success){btn.textContent=d.is_lone_wolf?'LONE WOLF DEPLOYED!':'DEPLOYED!';setTimeout(function(){closeHand();loadZone();},1500);}
    else{btn.textContent=(d.error||'Failed');setTimeout(function(){btn.textContent='DEPLOY';btn.disabled=false;},2000);}
  }catch(e){btn.textContent='Error';setTimeout(function(){btn.textContent='DEPLOY';btn.disabled=false;},2000);}
}

async function doPlayCard(){
  var card=sorted[carouselIdx];if(!card||!myDeployment)return;
  var btn=document.getElementById('playBtn');btn.disabled=true;btn.textContent='CASTING...';
  try{
    var r=await fetch('/api/zones/play-card',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(playerId),zone_id:parseInt(zoneId),card_id:card.id})});
    var d=await r.json();
    if(r.ok){btn.textContent=card.name+' CAST!';setTimeout(function(){closeHand();loadZone();},1200);}
    else{btn.textContent=(d.error||'Failed');setTimeout(function(){btn.textContent='CAST '+card.name.toUpperCase();btn.disabled=false;},2000);}
  }catch(e){btn.textContent='Error';setTimeout(function(){btn.disabled=false;},2000);}
}

async function doWithdraw(){
  if(!myDeployment||!confirm('Withdraw from this zone?'))return;
  try{var r=await fetch('/api/zones/withdraw',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(playerId),zone_id:parseInt(zoneId)})});if(r.ok)loadZone();}catch(e){alert('Error');}
}

function updateTimer(){var now=new Date(),min=now.getMinutes(),sec=now.getSeconds();var rem=(15-min%15)*60-sec;if(rem<=0)rem+=900;var m=Math.floor(rem/60),s=rem%60;document.getElementById('cycleTimer').textContent=m+':'+s.toString().padStart(2,'0');}
setInterval(updateTimer,1000);updateTimer();
setInterval(loadZone,30000);
loadZone();
</script>
<script>
/* ═══ V4 OVERRIDE — forces all card rendering through card-v4.js ═══ */
if(typeof buildCardV4==='function'){
  buildCard=function(s,d){return buildCardV4(s,{delay:d||0});};
  buildSpellCard=function(s,opts){return buildCardV4(s,opts);};
}
</script>
