<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zone Battle | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #120e1e; --bg-warm: #1a1528; --bg-card: rgba(30,22,42,0.7);
      --bg-glass: rgba(255,240,220,0.04); --border: rgba(212,166,75,0.12);
      --border-glow: rgba(212,166,75,0.3); --gold: #D4A64B; --gold-soft: #e8c675;
      --gold-dim: rgba(212,166,75,0.15); --text-bright: #F5F0E8; --text-body: #D4C8B8;
      --text-muted: #847C98; --text-faint: #554E68; --cyan: #6ac8d8;
      --red: #e85a6a; --green: #6acd8a; --sunset: #E8855A;
      --font-title: 'Cinzel', serif; --font-body: 'Crimson Text', serif;
      --font-data: 'Press Start 2P', monospace; --font-mono: 'JetBrains Mono', monospace;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg-deep);color:var(--text-bright);font-family:var(--font-body);min-height:100vh;}
    ::-webkit-scrollbar{width:3px;height:3px;}
    ::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.2);border-radius:2px;}
    .zone-header{position:relative;height:180px;overflow:hidden;border-radius:0 0 16px 16px;}
    .zone-header-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
    .zone-header-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(18,14,30,0) 20%,rgba(18,14,30,0.7) 60%,var(--bg-deep) 100%);}
    .zone-header-content{position:absolute;bottom:0;left:0;right:0;padding:0 16px 14px;z-index:2;}
    .zone-title{font-family:var(--font-title);font-size:22px;font-weight:700;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.8);}
    .zone-desc{font-family:var(--font-body);font-size:14px;color:rgba(255,255,255,0.6);margin-top:4px;}
    .back-btn{position:absolute;top:12px;left:12px;z-index:5;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);font-size:16px;text-decoration:none;}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:liveDot 2s ease infinite;display:inline-block;margin-right:6px;}
    .guild-section{padding:12px 16px;}
    .guild-bar-wrap{margin-bottom:8px;}
    .guild-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
    .guild-tag{font-family:var(--font-data);font-size:8px;letter-spacing:1px;}
    .guild-hp{font-family:var(--font-mono);font-size:12px;font-weight:700;}
    .guild-bar{height:8px;border-radius:4px;background:rgba(255,255,255,0.05);overflow:hidden;}
    .guild-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;}
    .nines-section{padding:12px 16px;}
    .section-label{font-family:var(--font-data);font-size:8px;color:var(--text-muted);letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .nine-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;}
    .nine-card.ko{opacity:0.4;}
    .nine-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;}
    .nine-avatar-placeholder{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
    .nine-info{flex:1;min-width:0;}
    .nine-name{font-family:var(--font-title);font-size:11px;font-weight:700;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .nine-meta{font-family:var(--font-data);font-size:6px;color:var(--text-faint);margin-top:2px;letter-spacing:0.5px;}
    .hp-bar-wrap{margin-top:5px;}
    .hp-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;}
    .hp-bar-fill{height:100%;border-radius:3px;transition:width 0.4s;}
    .hp-text{font-family:var(--font-data);font-size:6px;color:var(--text-faint);margin-top:2px;text-align:right;}
    .nine-stats{display:flex;gap:6px;flex-shrink:0;}
    .stat-pip{text-align:center;}
    .stat-val{font-family:var(--font-data);font-size:9px;font-weight:700;}
    .stat-label{font-family:var(--font-data);font-size:4px;color:var(--text-faint);margin-top:1px;}
    .merc-badge{font-family:var(--font-data);font-size:5px;padding:2px 6px;border-radius:4px;background:rgba(232,133,90,0.15);color:var(--sunset);border:1px solid rgba(232,133,90,0.3);}
    .log-section{padding:12px 16px;}
    .log-entry{padding:8px 10px;border-left:2px solid var(--border);margin-bottom:6px;font-family:var(--font-body);font-size:13px;color:var(--text-body);}
    .log-entry.ko{border-left-color:var(--red);}
    .log-entry.heal{border-left-color:var(--green);}
    .log-time{font-family:var(--font-data);font-size:6px;color:var(--text-faint);margin-bottom:3px;}
    .hand-section{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(18,14,30,0.95);backdrop-filter:blur(12px);border-top:1px solid var(--border-glow);padding:10px 12px 16px;transform:translateY(100%);transition:transform 0.3s;}
    .hand-section.open{transform:translateY(0);}
    .hand-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .hand-cards{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px;}
    .hand-card{min-width:100px;max-width:120px;border-radius:8px;padding:8px;border:1.5px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all 0.2s;flex-shrink:0;}
    .hand-card:hover{border-color:var(--gold);}
    .hand-card.selected{border-color:var(--gold);box-shadow:0 0 12px rgba(212,166,75,0.3);}
    .hand-card.exhausted{opacity:0.3;pointer-events:none;}
    .card-name{font-family:var(--font-title);font-size:9px;font-weight:700;line-height:1.2;margin-bottom:4px;}
    .card-stats{display:flex;gap:6px;margin-bottom:3px;}
    .card-stat{font-family:var(--font-data);font-size:7px;}
    .card-charges{font-family:var(--font-data);font-size:5px;color:var(--text-faint);}
    .card-rarity{font-family:var(--font-data);font-size:5px;padding:1px 4px;border-radius:3px;display:inline-block;}
    .play-btn{width:100%;margin-top:8px;padding:12px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-title);font-size:13px;font-weight:700;letter-spacing:1px;color:#0a0810;background:linear-gradient(135deg,var(--gold),#c49030);transition:all 0.2s;}
    .play-btn:disabled{opacity:0.3;cursor:not-allowed;}
    .deploy-fab{position:fixed;bottom:20px;right:20px;z-index:40;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#c49030);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 16px rgba(212,166,75,0.3);}
    .deploy-fab.deployed{background:linear-gradient(135deg,var(--green),#4a9);}
    .timer-bar{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);}
    .timer-label{font-family:var(--font-data);font-size:7px;color:var(--text-faint);letter-spacing:1px;}
    .timer-value{font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--cyan);}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top:2px solid var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes liveDot{0%,100%{opacity:1;}50%{opacity:0.3;}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp 0.4s ease both;}
  </style>
</head>
<body>
<div id="loadingState" class="loading">
  <div class="spinner"></div>
  <div style="font-family:var(--font-data);font-size:7px;color:var(--text-muted);margin-top:12px;letter-spacing:1px;">LOADING ZONE...</div>
</div>
<div id="zoneContent" style="display:none;padding-bottom:80px;">
  <div class="zone-header" id="zoneHeader">
    <div class="zone-header-bg" id="zoneBg"></div>
    <div class="zone-header-overlay"></div>
    <a href="/nethara-live.html" class="back-btn">✕</a>
    <div class="zone-header-content">
      <div class="zone-title" id="zoneName"></div>
      <div class="zone-desc" id="zoneDesc"></div>
    </div>
  </div>
  <div class="timer-bar">
    <div><span class="live-dot"></span><span class="timer-label">NEXT COMBAT CYCLE</span></div>
    <div class="timer-value" id="cycleTimer">--:--</div>
  </div>
  <div class="guild-section">
    <div class="section-label"><span>⚔️</span> GUILD POWER</div>
    <div id="guildBars"></div>
    <div id="noGuilds" style="display:none;font-family:var(--font-body);font-size:14px;color:var(--text-faint);text-align:center;padding:16px;">No one deployed here yet. Be the first!</div>
  </div>
  <div class="nines-section">
    <div class="section-label"><span>🐱</span> DEPLOYED NINES <span id="nineCount" style="margin-left:auto;color:var(--text-faint);"></span></div>
    <div id="ninesList"></div>
  </div>
  <div class="log-section">
    <div class="section-label"><span>📜</span> COMBAT LOG</div>
    <div id="combatLog"></div>
    <div id="noLog" style="font-family:var(--font-body);font-size:13px;color:var(--text-faint);text-align:center;padding:12px;">No combat yet — waiting for opposing guilds.</div>
  </div>
</div>
<button class="deploy-fab" id="actionFab" onclick="toggleHand()" style="display:none;">⚔️</button>
<div class="hand-section" id="handPanel">
  <div class="hand-header">
    <span style="font-family:var(--font-title);font-size:13px;font-weight:700;color:var(--gold);" id="handTitle">PLAY A CARD</span>
    <span style="font-family:var(--font-data);font-size:7px;color:var(--text-faint);cursor:pointer;" onclick="closeHand()">✕ CLOSE</span>
  </div>
  <div class="hand-cards" id="handCards"></div>
  <button class="play-btn" id="playBtn" disabled>⚔️ PLAY CARD — 1 MANA</button>
</div>
<script>
var HOUSES={1:{name:'Smoulders',color:'#E03C31',icon:'🔥'},2:{name:'Darktide',color:'#00B4D8',icon:'🌊'},3:{name:'Stonebark',color:'#5CB338',icon:'🌿'},4:{name:'Ashenvale',color:'#90E0EF',icon:'💨'},5:{name:'Stormrage',color:'#FFC800',icon:'⚡'},6:{name:'Nighthollow',color:'#7B2D8E',icon:'🌙'},7:{name:'Dawnbringer',color:'#FF8C00',icon:'☀️'},8:{name:'Manastorm',color:'#5B8FE0',icon:'🔮'},9:{name:'Plaguemire',color:'#E84393',icon:'☠️'}};
var RARITY_COLORS={common:'#bbb',uncommon:'#66dd66',rare:'#55bbff',epic:'#bb88ff',legendary:'#ffd700'};
var zoneId=new URLSearchParams(window.location.search).get('id');
var playerId=localStorage.getItem('player_id');
var playerCards=[];var selectedCardId=null;var myDeployment=null;var isDeployed=false;var handOpen=false;
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

async function loadZone(){
  if(!zoneId){window.location.href='/nethara-live.html';return;}
  try{
    var [zR,dR,cR,mR]=await Promise.all([
      fetch('/api/zones'),
      fetch('/api/zones/'+zoneId+'/deployments'),
      playerId?fetch('/api/packs/collection/'+playerId):Promise.resolve(null),
      playerId?fetch('/api/mana/'+playerId):Promise.resolve(null),
    ]);
    var zones=zR.ok?await zR.json():[];
    var zone=zones.find(function(z){return z.id==zoneId;});
    if(!zone){document.getElementById('loadingState').innerHTML='<div style="color:var(--text-muted);font-family:var(--font-data);font-size:8px;">ZONE NOT FOUND</div>';return;}
    var depData=dR.ok?await dR.json():{deployments:[],guild_power:{}};
    var deployments=depData.deployments||[];
    var guildPower=depData.guild_power||{};
    playerCards=[];
    if(cR&&cR.ok){
      var cd=await cR.json();
      playerCards=(cd.cards||cd||[]).map(function(c){
        return{id:c.id,name:c.spell_name||c.name||(c.spell&&c.spell.name)||'Unknown',
          rarity:c.rarity||'common',
          atk:(c.spell&&c.spell.base_atk)||c.base_atk||0,
          hp:(c.spell&&c.spell.base_hp)||c.base_hp||0,
          charges:c.current_charges||0,maxCharges:c.max_charges||0,
          exhausted:c.is_exhausted||false,
          house:c.spell_house||'universal',type:c.spell_type||'attack'};
      });
    }
    var mana=5,maxMana=10;
    if(mR&&mR.ok){var md=await mR.json();mana=md.mana||0;maxMana=md.maxMana||10;}
    myDeployment=deployments.find(function(d){return d.player_id==playerId;});
    isDeployed=!!myDeployment;
    render(zone,deployments,guildPower,mana,maxMana);
  }catch(e){
    console.error('Load error:',e);
    document.getElementById('loadingState').innerHTML='<div style="color:var(--red);font-family:var(--font-data);font-size:8px;">ERROR LOADING ZONE</div>';
  }
}

function render(zone,deployments,guildPower,mana,maxMana){
  var bgImg=zone.image_url?'/assets/images/zones/'+zone.image_url:'';
  if(bgImg)document.getElementById('zoneBg').style.backgroundImage='url('+bgImg+')';
  else document.getElementById('zoneBg').style.background='linear-gradient(135deg,#1a2a3a 0%,#0a1520 40%,#0d0a14 100%)';
  document.getElementById('zoneName').textContent=zone.name;
  document.getElementById('zoneDesc').textContent=zone.description||'';

  var gbH='';var totalHp=0;
  var guilds=Object.entries(guildPower).sort(function(a,b){return b[1].total_hp-a[1].total_hp;});
  guilds.forEach(function(g){totalHp+=g[1].total_hp;});
  if(guilds.length===0){document.getElementById('noGuilds').style.display='block';}
  else{
    document.getElementById('noGuilds').style.display='none';
    var colors=['#D4A64B','#E8855A','#6ac8d8','#6acd8a','#bb88ff','#e85a6a'];
    guilds.forEach(function(g,i){
      var tag=g[0],data=g[1];
      var pct=totalHp>0?Math.round(data.total_hp/totalHp*100):0;
      var isMercFree=tag==='MERC_FREE';
      var label=isMercFree?'⚔️ FREE MERCS':tag==='unaffiliated'?'🗡️ UNAFFILIATED':tag;
      var clr=colors[i%colors.length];
      gbH+='<div class="guild-bar-wrap fade-up" style="animation-delay:'+i*0.05+'s">';
      gbH+='<div class="guild-bar-header">';
      gbH+='<span class="guild-tag" style="color:'+clr+';">'+esc(label)+' <span style="color:var(--text-faint);">('+data.count+' nines)</span></span>';
      gbH+='<span class="guild-hp" style="color:'+clr+';">'+data.total_hp+' HP <span style="font-size:9px;color:var(--text-faint);">'+pct+'%</span></span>';
      gbH+='</div>';
      gbH+='<div class="guild-bar"><div class="guild-bar-fill" style="width:'+pct+'%;background:'+clr+';"></div></div>';
      gbH+='</div>';
    });
  }
  document.getElementById('guildBars').innerHTML=gbH;

  document.getElementById('nineCount').textContent=deployments.length+' deployed';
  var nH='';
  deployments.forEach(function(d,i){
    var house=HOUSES[d.player?d.player.school_id:1]||HOUSES[1];
    var nine=d.nine||{};
    var hpPct=d.max_hp>0?Math.round(d.current_hp/d.max_hp*100):100;
    var hpColor=hpPct>60?'var(--green)':hpPct>30?'#FFC800':'var(--red)';
    var isKo=d.current_hp<=0;var isMe=d.player_id==playerId;var isMerc=d.is_mercenary;
    nH+='<div class="nine-card fade-up'+(isKo?' ko':'')+'" style="animation-delay:'+i*0.04+'s;'+(isMe?'border-color:var(--gold);background:rgba(212,166,75,0.05);':'')+'">';
    if(d.player&&d.player.profile_image){
      nH+='<img class="nine-avatar" src="'+esc(d.player.profile_image)+'" style="border:2px solid '+house.color+';">';
    }else{
      nH+='<div class="nine-avatar-placeholder" style="background:'+house.color+'20;border:2px solid '+house.color+';">'+house.icon+'</div>';
    }
    nH+='<div class="nine-info">';
    nH+='<div class="nine-name" style="color:'+house.color+';">'+(d.player?esc(d.player.twitter_handle):'Unknown')+(isMe?' <span style="color:var(--gold);font-size:8px;">(YOU)</span>':'')+'</div>';
    nH+='<div class="nine-meta">'+esc(d.guild_tag||'unaffiliated');
    if(isMerc)nH+=' <span class="merc-badge">MERC</span>';
    nH+='</div>';
    nH+='<div class="hp-bar-wrap"><div class="hp-bar"><div class="hp-bar-fill" style="width:'+hpPct+'%;background:'+hpColor+';"></div></div>';
    nH+='<div class="hp-text">'+d.current_hp+' / '+d.max_hp+' HP</div></div>';
    nH+='</div>';
    nH+='<div class="nine-stats">';
    nH+='<div class="stat-pip"><div class="stat-val" style="color:var(--red);">'+(nine.base_atk||'?')+'</div><div class="stat-label">ATK</div></div>';
    nH+='<div class="stat-pip"><div class="stat-val" style="color:var(--green);">'+(nine.base_hp||'?')+'</div><div class="stat-label">HP</div></div>';
    nH+='<div class="stat-pip"><div class="stat-val" style="color:var(--cyan);">'+(nine.base_spd||'?')+'</div><div class="stat-label">SPD</div></div>';
    nH+='</div></div>';
  });
  if(deployments.length===0){
    nH='<div style="text-align:center;padding:20px;font-family:var(--font-body);font-size:14px;color:var(--text-faint);">No Nines deployed. Deploy yours to claim this zone!</div>';
  }
  document.getElementById('ninesList').innerHTML=nH;

  var fab=document.getElementById('actionFab');
  fab.style.display='block';
  if(isDeployed){fab.className='deploy-fab deployed';fab.textContent='🎴';}
  else{fab.className='deploy-fab';fab.textContent='⚔️';}
  buildHand(mana);
  document.getElementById('loadingState').style.display='none';
  document.getElementById('zoneContent').style.display='block';
}

function buildHand(mana){
  var hH='';
  if(!isDeployed){
    document.getElementById('handTitle').textContent='DEPLOY TO THIS ZONE';
    document.getElementById('playBtn').textContent='⚔️ DEPLOY — 1 MANA';
    document.getElementById('playBtn').disabled=mana<1;
    document.getElementById('playBtn').onclick=doDeploy;
    document.getElementById('handCards').innerHTML='<div style="text-align:center;width:100%;padding:12px;font-family:var(--font-body);font-size:13px;color:var(--text-body);">Deploy your Nine to start playing cards here.</div>';
    return;
  }
  document.getElementById('handTitle').textContent='PLAY A CARD';
  playerCards.forEach(function(c,i){
    var rc=RARITY_COLORS[c.rarity]||'#bbb';
    var houseColor=(function(){for(var k in HOUSES){if(HOUSES[k].name.toLowerCase()===c.house)return HOUSES[k].color;}return '#D4A64B';})();
    hH+='<div class="hand-card'+(c.exhausted?' exhausted':'')+(selectedCardId===c.id?' selected':'')+'" onclick="selectHandCard('+c.id+')" id="hc_'+c.id+'">';
    hH+='<div class="card-rarity" style="background:'+rc+'15;color:'+rc+';border:1px solid '+rc+'30;margin-bottom:4px;">'+c.rarity.toUpperCase()+'</div>';
    hH+='<div class="card-name" style="color:'+houseColor+';">'+esc(c.name)+'</div>';
    hH+='<div class="card-stats"><span class="card-stat" style="color:var(--red);">⚔️'+c.atk+'</span><span class="card-stat" style="color:var(--green);">❤️'+c.hp+'</span></div>';
    hH+='<div class="card-charges">'+c.charges+'/'+c.maxCharges+' charges</div>';
    hH+='</div>';
  });
  if(playerCards.length===0){hH='<div style="text-align:center;width:100%;padding:16px;font-family:var(--font-body);font-size:13px;color:var(--text-faint);">No cards — open some packs!</div>';}
  document.getElementById('handCards').innerHTML=hH;
  document.getElementById('playBtn').textContent='🎴 PLAY CARD — 1 MANA';
  document.getElementById('playBtn').disabled=!selectedCardId;
  document.getElementById('playBtn').onclick=doPlayCard;
}

function selectHandCard(cardId){
  selectedCardId=selectedCardId===cardId?null:cardId;
  document.querySelectorAll('.hand-card').forEach(function(el){el.classList.remove('selected');});
  if(selectedCardId){var el=document.getElementById('hc_'+selectedCardId);if(el)el.classList.add('selected');}
  document.getElementById('playBtn').disabled=!selectedCardId;
}
function toggleHand(){handOpen=!handOpen;document.getElementById('handPanel').classList.toggle('open',handOpen);}
function closeHand(){handOpen=false;document.getElementById('handPanel').classList.remove('open');}

async function doDeploy(){
  var btn=document.getElementById('playBtn');btn.disabled=true;btn.textContent='DEPLOYING...';
  try{
    var r=await fetch('/api/zones/deploy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(playerId),zone_id:parseInt(zoneId)})});
    var d=await r.json();
    if(r.ok&&d.success){
      btn.textContent=d.is_mercenary?(d.hired_by?'✅ HIRED BY '+d.hired_by+'!':'✅ FREE MERC!'):'✅ DEPLOYED!';
      setTimeout(function(){closeHand();loadZone();},1500);
    }else{btn.textContent='❌ '+(d.error||'Failed');setTimeout(function(){btn.textContent='⚔️ DEPLOY — 1 MANA';btn.disabled=false;},2000);}
  }catch(e){btn.textContent='❌ Network error';setTimeout(function(){btn.textContent='⚔️ DEPLOY — 1 MANA';btn.disabled=false;},2000);}
}

async function doPlayCard(){
  if(!selectedCardId||!myDeployment)return;
  var btn=document.getElementById('playBtn');btn.disabled=true;btn.textContent='PLAYING...';
  try{
    var r=await fetch('/api/zones/play-card',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(playerId),deployment_id:myDeployment.id,card_id:selectedCardId})});
    var d=await r.json();
    if(r.ok){btn.textContent='✅ CARD PLAYED!';selectedCardId=null;setTimeout(function(){closeHand();loadZone();},1200);}
    else{btn.textContent='❌ '+(d.error||'Failed');setTimeout(function(){btn.textContent='🎴 PLAY CARD — 1 MANA';btn.disabled=false;},2000);}
  }catch(e){btn.textContent='❌ Network error';setTimeout(function(){btn.textContent='🎴 PLAY CARD — 1 MANA';btn.disabled=false;},2000);}
}

function updateTimer(){
  var now=new Date();var min=now.getMinutes();var sec=now.getSeconds();
  var remSec=(15-min%15)*60-sec;if(remSec<=0)remSec+=900;
  var m=Math.floor(remSec/60);var s=remSec%60;
  var el=document.getElementById('cycleTimer');
  if(el)el.textContent=m+':'+s.toString().padStart(2,'0');
}
setInterval(updateTimer,1000);updateTimer();
setInterval(loadZone,30000);
loadZone();
</script>
</body>
