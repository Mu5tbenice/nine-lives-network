<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Duels — Nine Lives Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#08060e;--surface:#0c0a14;--card:#0e0c16;--border:rgba(212,166,75,0.08);--gold:#d4a64b;--gold-dim:rgba(212,166,75,0.08);--text:#e0ddd8;--muted:rgba(255,255,255,0.4);--red:#ff4444;--green:#44cc66;--blue:#4488ff; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
    .header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(8,6,14,0.95)}
    .header-title{font-family:'Cinzel',serif;font-size:16px;font-weight:900;letter-spacing:2px;color:var(--gold)}
    .container{max-width:500px;margin:0 auto;padding:16px}

    /* Challenge Section */
    .section-label{font-family:'Cinzel',serif;font-size:12px;font-weight:900;color:var(--gold);letter-spacing:2px;margin-bottom:8px}
    .player-search{width:100%;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text);font-size:13px;outline:none;margin-bottom:12px}
    .player-search::placeholder{color:rgba(255,255,255,0.2)}
    .player-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all 0.15s}
    .player-row:hover{border-color:rgba(212,166,75,0.2)}
    .player-avatar{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:16px}
    .player-name{font-size:12px;font-weight:700;flex:1}
    .player-guild{font-size:9px;color:var(--muted);font-family:'Fira Code',monospace}
    .challenge-btn{padding:6px 14px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--gold),#c49030);color:#0a0810;font-size:10px;font-weight:800;cursor:pointer;letter-spacing:1px}

    /* Card Selection */
    .card-picker{display:none;margin-top:16px}
    .card-picker.active{display:block}
    .hand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
    .hand-card{padding:12px 8px;border-radius:10px;background:var(--card);border:2px solid var(--border);cursor:pointer;text-align:center;transition:all 0.2s}
    .hand-card:hover{border-color:rgba(212,166,75,0.2)}
    .hand-card.selected{border-color:var(--gold);background:var(--gold-dim)}
    .hand-card.selected::after{content:'✓';position:absolute;top:4px;right:4px;font-size:10px;color:var(--gold)}
    .card-name{font-size:10px;font-weight:700;margin-top:4px}
    .card-stats{font-size:9px;color:var(--muted);font-family:'Fira Code',monospace;margin-top:2px}
    .card-emoji{font-size:24px}
    .confirm-duel{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--red),#cc2222);color:#fff;font-family:'Cinzel',serif;font-size:14px;font-weight:900;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 16px rgba(255,68,68,0.3)}
    .confirm-duel:disabled{opacity:0.4;cursor:not-allowed}

    /* Duel Arena */
    .arena{display:none;margin-top:16px}
    .arena.active{display:block}
    .round-label{text-align:center;font-family:'Cinzel',serif;font-size:14px;color:var(--gold);margin-bottom:12px;letter-spacing:2px}
    .versus{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:16px}
    .vs-card{flex:0 0 140px;padding:16px;border-radius:12px;background:var(--card);border:1px solid var(--border);text-align:center}
    .vs-card.winner{border-color:var(--green);box-shadow:0 0 20px rgba(68,204,102,0.15)}
    .vs-card.loser{opacity:0.5}
    .vs-text{font-family:'Cinzel',serif;font-size:20px;font-weight:900;color:var(--red)}
    .vs-card-name{font-size:11px;font-weight:700;margin-top:6px}
    .vs-card-atk{font-size:18px;font-weight:900;font-family:'Fira Code',monospace;margin-top:4px}

    /* Score */
    .score-bar{display:flex;justify-content:center;gap:20px;margin:16px 0;padding:12px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
    .score-side{text-align:center}
    .score-label{font-size:9px;color:var(--muted);letter-spacing:1px;font-family:'Fira Code',monospace}
    .score-value{font-size:24px;font-weight:900;font-family:'Fira Code',monospace}

    /* History */
    .history-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px}
    .history-result{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;font-family:'Fira Code',monospace}
    .history-result.win{background:rgba(68,204,102,0.1);color:var(--green)}
    .history-result.loss{background:rgba(255,68,68,0.1);color:var(--red)}
    .history-opponent{font-size:11px;flex:1}
    .history-score{font-size:10px;color:var(--muted);font-family:'Fira Code',monospace}

    @media(max-width:500px){.hand-grid{grid-template-columns:repeat(3,1fr)}.vs-card{flex:0 0 120px}}
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px">⚔️</span>
    <span class="header-title">QUICK DUELS</span>
    <div style="flex:1"></div>
    <a href="/nethara-live.html" style="font-size:10px;color:var(--muted);text-decoration:none;font-family:'Fira Code',monospace">← NETHARA LIVE</a>
  </div>
  <div class="container">
    <!-- Challenge -->
    <div id="challenge-section">
      <div class="section-label">⚔️ CHALLENGE A PLAYER</div>
      <input class="player-search" id="player-search" placeholder="Search by name or guild..." oninput="searchPlayers(this.value)">
      <div id="player-list"></div>
    </div>

    <!-- Card Picker -->
    <div class="card-picker" id="card-picker">
      <div class="section-label">PICK 3 CARDS FOR YOUR DUEL</div>
      <div class="hand-grid" id="hand-grid"></div>
      <button class="confirm-duel" id="confirm-btn" disabled onclick="startDuel()">SELECT 3 CARDS</button>
    </div>

    <!-- Arena -->
    <div class="arena" id="arena"></div>

    <!-- History -->
    <div style="margin-top:24px">
      <div class="section-label">📜 RECENT DUELS</div>
      <div id="history-list"></div>
    </div>
  </div>

<script>
let playerId = null;
let selectedCards = [];
let challengeTarget = null;

document.addEventListener('DOMContentLoaded', () => {
  try {
    const s = JSON.parse(localStorage.getItem('9lv_session') || '{}');
    if (s.player_id) playerId = s.player_id;
  } catch(e){}
  loadHistory();
});

async function searchPlayers(q) {
  if (q.length < 2) { document.getElementById('player-list').innerHTML = ''; return; }
  try {
    const res = await fetch(`/api/players/search?q=${encodeURIComponent(q)}`).then(r => r.json());
    const players = res.players || res || [];
    document.getElementById('player-list').innerHTML = players.slice(0,8).map(p => `
      <div class="player-row" onclick="selectOpponent(${p.id},'${(p.twitter_handle||p.username||'').replace(/'/g,'')}','${(p.guild_tag||'').replace(/'/g,'')}')">
        <div class="player-avatar">🐱</div>
        <div><div class="player-name">@${p.twitter_handle||p.username||'Player'}</div><div class="player-guild">${p.guild_tag||''}</div></div>
        <button class="challenge-btn">CHALLENGE</button>
      </div>
    `).join('') || '<div style="color:var(--muted);font-size:10px;padding:10px">No players found</div>';
  } catch(e) { console.error(e); }
}

async function selectOpponent(id, name, guild) {
  challengeTarget = { id, name, guild };
  document.getElementById('card-picker').classList.add('active');
  selectedCards = [];
  try {
    const res = await fetch(`/api/packs/collection/${playerId}`).then(r => r.json());
    const cards = (res.cards || res || []).slice(0, 12);
    document.getElementById('hand-grid').innerHTML = cards.map(c => `
      <div class="hand-card" id="hc-${c.id}" onclick="toggleCard(${c.id},'${(c.spell_name||c.name||'Card').replace(/'/g,'')}',${c.base_atk||c.atk||5})">
        <div class="card-emoji">🃏</div>
        <div class="card-name">${c.spell_name||c.name||'Card'}</div>
        <div class="card-stats">ATK ${c.base_atk||c.atk||'?'} · HP ${c.base_hp||c.hp||'?'}</div>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
  updateConfirmBtn();
}

function toggleCard(id, name, atk) {
  const idx = selectedCards.findIndex(c => c.id === id);
  if (idx >= 0) { selectedCards.splice(idx, 1); document.getElementById('hc-'+id).classList.remove('selected'); }
  else if (selectedCards.length < 3) { selectedCards.push({id,name,atk}); document.getElementById('hc-'+id).classList.add('selected'); }
  updateConfirmBtn();
}

function updateConfirmBtn() {
  const btn = document.getElementById('confirm-btn');
  btn.disabled = selectedCards.length !== 3;
  btn.textContent = selectedCards.length === 3 ? `⚔️ DUEL @${challengeTarget?.name||''}` : `SELECT ${3-selectedCards.length} MORE`;
}

async function startDuel() {
  try {
    const res = await fetch('/api/duels/challenge', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ challenger_id: playerId, defender_id: challengeTarget.id, card_ids: selectedCards.map(c=>c.id) }),
    }).then(r => r.json());

    if (res.success && res.result) {
      showDuelResult(res.result);
    } else {
      alert(res.error || 'Duel failed');
    }
  } catch(e) { alert('Duel error: '+e.message); }
}

function showDuelResult(result) {
  document.getElementById('card-picker').classList.remove('active');
  const arena = document.getElementById('arena');
  arena.classList.add('active');

  const rounds = result.rounds || [];
  const myScore = result.challenger_wins || 0;
  const theirScore = result.defender_wins || 0;
  const won = myScore > theirScore;

  arena.innerHTML = `
    <div class="score-bar">
      <div class="score-side"><div class="score-label">YOU</div><div class="score-value" style="color:${won?'var(--green)':'var(--red)'}">${myScore}</div></div>
      <div style="font-family:'Cinzel',serif;font-size:16px;color:var(--muted);padding-top:10px">VS</div>
      <div class="score-side"><div class="score-label">@${challengeTarget?.name||'OPP'}</div><div class="score-value" style="color:${!won?'var(--green)':'var(--red)'}">${theirScore}</div></div>
    </div>
    <div style="text-align:center;font-family:'Cinzel',serif;font-size:20px;font-weight:900;color:${won?'var(--green)':'var(--red)'};margin:12px 0;letter-spacing:3px">${won?'VICTORY':'DEFEAT'}</div>
    ${rounds.map((r, i) => `
      <div class="round-label">ROUND ${i+1}</div>
      <div class="versus">
        <div class="vs-card ${r.winner==='challenger'?'winner':'loser'}">
          <div class="card-emoji">🃏</div>
          <div class="vs-card-name">${r.challenger_card||'Card'}</div>
          <div class="vs-card-atk" style="color:${r.winner==='challenger'?'var(--green)':'var(--red)'}">${r.challenger_atk||'?'}</div>
        </div>
        <div class="vs-text">VS</div>
        <div class="vs-card ${r.winner==='defender'?'winner':'loser'}">
          <div class="card-emoji">🃏</div>
          <div class="vs-card-name">${r.defender_card||'Card'}</div>
          <div class="vs-card-atk" style="color:${r.winner==='defender'?'var(--green)':'var(--red)'}">${r.defender_atk||'?'}</div>
        </div>
      </div>
    `).join('')}
    <button onclick="resetDuel()" style="width:100%;padding:12px;border-radius:10px;border:none;background:var(--gold-dim);color:var(--gold);font-family:'Cinzel',serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-top:16px">DUEL AGAIN</button>`;
  loadHistory();
}

function resetDuel() {
  document.getElementById('arena').classList.remove('active');
  document.getElementById('arena').innerHTML = '';
  selectedCards = [];
  challengeTarget = null;
  document.getElementById('player-search').value = '';
  document.getElementById('player-list').innerHTML = '';
}

async function loadHistory() {
  if (!playerId) return;
  try {
    const res = await fetch(`/api/duels/history/${playerId}`).then(r => r.json());
    const duels = (res.duels || res || []).slice(0, 10);
    document.getElementById('history-list').innerHTML = duels.map(d => {
      const isChallenger = d.challenger_id === playerId;
      const won = isChallenger ? d.winner === 'challenger' : d.winner === 'defender';
      return `<div class="history-row">
        <div class="history-result ${won?'win':'loss'}">${won?'WIN':'LOSS'}</div>
        <div class="history-opponent">vs @${isChallenger?(d.defender_name||'?'):(d.challenger_name||'?')}</div>
        <div class="history-score">${d.challenger_wins||0}-${d.defender_wins||0}</div>
      </div>`;
    }).join('') || '<div style="color:var(--muted);font-size:10px;padding:10px">No duels yet. Challenge someone!</div>';
  } catch(e) {}
}
</script>
</body>
</html>
