<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quick Duels | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/card-v4.css">
  <style>
    :root{--bg-deep:#120e1e;--bg-warm:#1a1528;--bg-card:rgba(30,22,42,0.7);--border:rgba(212,166,75,0.12);--border-glow:rgba(212,166,75,0.3);--gold:#D4A64B;--gold-dim:rgba(212,166,75,0.15);--text-bright:#F5F0E8;--text-body:#D4C8B8;--text-muted:#9B8E7E;--text-faint:#6B5E50;--sunset:#e8855a;--sky:#8BB4E0;--green:#6acd8a;--red:#e85a6a;--cyan:#6ac8d8;--purple:#b088e8;--font-title:'Cinzel',serif;--font-body:'Crimson Text',Georgia,serif;--font-data:'Press Start 2P',monospace;--font-mono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(232,133,90,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,180,224,0.06) 0%,transparent 40%),linear-gradient(180deg,#1a1528 0%,#120e1e 30%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body)}
    a{color:var(--gold);text-decoration:none}
    ::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}
    .top-nav{position:sticky;top:0;z-index:100;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(18,14,30,0.85);backdrop-filter:blur(12px)}
    .nav-logo{font-family:var(--font-title);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px;text-decoration:none}
    .nav-links{display:flex;gap:4px;list-style:none}
    .nav-links a{font-family:var(--font-mono);font-size:8px;padding:4px 8px;border-radius:6px;color:var(--text-muted);text-decoration:none;border:1px solid transparent;transition:all 0.15s}
    .nav-links a:hover,.nav-links a.active{color:var(--gold);border-color:rgba(212,166,75,0.15);background:var(--gold-dim)}
    .hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px}
    .hamburger span{display:block;width:18px;height:2px;background:var(--text-muted);margin:3px 0;border-radius:1px}
    .mobile-menu{display:none;position:fixed;top:44px;left:0;right:0;z-index:99;background:rgba(18,14,30,0.95);backdrop-filter:blur(12px);padding:12px 16px;border-bottom:1px solid var(--border);flex-direction:column;gap:8px}
    .mobile-menu.active{display:flex}
    .mobile-menu a{font-family:var(--font-mono);font-size:9px;padding:8px 12px;border-radius:8px;color:var(--text-muted);text-decoration:none;border:1px solid var(--border)}
    @media(max-width:700px){.nav-links{display:none}.hamburger{display:block}}
    @media(min-width:701px){.mobile-menu{display:none!important}}

    .main{max-width:500px;margin:0 auto;padding:14px}
    .section-label{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
    .section-label__text{font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
    .section-label__line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

    .duel-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
    .duel-stat{padding:12px 10px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);text-align:center}

    .card-select{display:flex;gap:8px;overflow-x:auto;padding:4px 0;margin-bottom:12px}
    .duel-card{min-width:120px;padding:10px 12px;border-radius:10px;background:var(--bg-card);border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;transition:all 0.15s;position:relative}
    .duel-card.picked{border-color:var(--gold);background:rgba(212,166,75,0.06);transform:translateY(-4px)}
    .duel-card.picked::after{content:'✓';position:absolute;top:6px;right:8px;font-family:var(--font-data);font-size:8px;color:var(--gold)}
    .duel-card:hover{border-color:rgba(212,166,75,0.25)}

    .fight-btn{width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-title);font-size:14px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,var(--red),#c03040);color:#fff;box-shadow:0 4px 0 #8a2030,0 6px 16px rgba(232,90,106,0.25);transition:all 0.2s}
    .fight-btn:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}

    .duel-result{border-radius:14px;background:var(--bg-card);border:1px solid var(--border);padding:20px;text-align:center;margin-bottom:14px}
    .round{display:flex;align-items:center;justify-content:center;gap:16px;padding:10px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid var(--border);margin-bottom:6px}

    .history-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:4px}
  </style>
  <link rel="stylesheet" href="/css/card-slot-v4.css">
</head>
<body>
  <nav class="top-nav">
    <a href="/" class="nav-logo">Nine Lives Network</a>
    <ul class="nav-links"><li><a href="/dashboard.html">Dashboard</a></li><li><a href="/nethara-live.html">Nethara Live</a></li><li><a href="/duels.html" class="active">Duels</a></li><li><a href="/gauntlet.html">Gauntlet</a></li><li><a href="/boss.html">Boss</a></li><li><a href="/leaderboards.html">Ranks</a></li><li><a href="/builder.html">Your Nine</a> <a href="/packs.html">Packs</a></li><li><a href="/collection.html">Spellbook</a></li></ul>
    <button class="hamburger" onclick="document.getElementById('mm').classList.toggle('active')"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu" id="mm"><a href="/dashboard.html">Dashboard</a><a href="/nethara-live.html">Nethara Live</a><a href="/duels.html" class="active">Duels</a><a href="/gauntlet.html">Gauntlet</a><a href="/boss.html">Boss</a><a href="/leaderboards.html">Ranks</a><a href="/builder.html">Your Nine</a> <a href="/packs.html">Packs</a></li><li><a href="/collection.html">Spellbook</a></div>

  <div class="main" id="content">
    <div style="text-align:center;padding:60px 20px;"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div></div>
  </div>

<script src="/js/card-particles.js"></script>
<script src="/js/card-v4.js"></script>
<script>
var playerId=null,playerCards=[],pickedCards=[];

function getPlayerId(){var p=new URLSearchParams(window.location.search);var f=p.get('player_id');if(f){localStorage.setItem('player_id',f);return f;}return localStorage.getItem('player_id');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

async function loadDuels(){
  playerId=getPlayerId();
  if(!playerId){document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px"><a href="/register.html" style="font-family:var(--font-title);font-size:16px;">Register to play →</a></div>';return;}

  var player={},history=[];
  try{var pR=await fetch('/api/players/'+playerId);if(pR.ok)player=await pR.json();}catch(e){}
  try{var hR=await fetch('/api/duels/history/'+playerId);if(hR.ok){var hd=await hR.json();history=hd.history||hd||[];}}catch(e){}
  try{var cR=await fetch('/api/packs/collection/'+playerId);if(cR.ok){var cd=await cR.json();playerCards=(cd.cards||cd||[]).map(function(c){return{id:c.id,name:c.spell_name||c.name,spell_type:c.spell_type||'attack',rarity:c.rarity||'common',atk:(c.spell&&c.spell.base_atk)||c.base_atk||0,hp:(c.spell&&c.spell.base_hp)||c.base_hp||0};});}}catch(e){}

  var wins=player.duel_wins||0,losses=player.duel_losses||0;
  var html='';

  html+='<div class="section-label"><span style="font-size:14px;">⚔️</span><span class="section-label__text">QUICK DUELS</span><span class="section-label__line"></span></div>';
  html+='<p style="font-family:var(--font-body);font-size:14px;color:var(--text-muted);margin-bottom:14px;">Pick 3 cards. Best of 3 rounds. Higher ATK wins each round.</p>';

  // Stats
  html+='<div class="duel-stats">';
  html+='<div class="duel-stat"><div style="font-family:var(--font-data);font-size:7px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px;">WINS</div><div style="font-family:var(--font-data);font-size:16px;color:var(--green);">'+wins+'</div></div>';
  html+='<div class="duel-stat"><div style="font-family:var(--font-data);font-size:7px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px;">LOSSES</div><div style="font-family:var(--font-data);font-size:16px;color:var(--red);">'+losses+'</div></div>';
  html+='<div class="duel-stat"><div style="font-family:var(--font-data);font-size:7px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px;">WIN RATE</div><div style="font-family:var(--font-data);font-size:16px;color:var(--gold);">'+(wins+losses>0?Math.round(wins/(wins+losses)*100):0)+'%</div></div>';
  html+='</div>';

  // Card select
  html+='<div class="section-label"><span style="font-size:14px;">🃏</span><span class="section-label__text">PICK 3 CARDS</span><span class="section-label__line"></span></div>';
  html+='<div class="card-select" id="cardSelect">';
  if(playerCards.length>0){
    playerCards.forEach(function(c,i){
      var isPicked=pickedCards.indexOf(i)>-1;
      html+='<div class="duel-card'+(isPicked?' spell-card--selected':'')+'" id="dc'+i+'" onclick="togglePick('+i+')" style="cursor:pointer;position:relative;">';
      html+=buildSpellCard(c,{size:'mini',delay:i*0.04});
      if(isPicked)html+='<div style="position:absolute;top:4px;right:4px;background:var(--gold);color:#000;font-family:var(--font-data);font-size:6px;padding:2px 4px;border-radius:3px;z-index:10;">SELECTED</div>';
      html+='</div>';
    });
    }else{
    html+='<div style="padding:16px;text-align:center;color:var(--text-faint);font-style:italic;font-size:12px;width:100%;">No cards available. Open a pack first!</div>';
  }
  html+='</div>';

  html+='<div style="text-align:center;margin-bottom:4px;"><span id="pickCount" style="font-family:var(--font-data);font-size:7px;color:var(--text-faint);">0/3 SELECTED</span></div>';
  html+='<button class="fight-btn" id="fightBtn" disabled onclick="startDuel()">⚔️ FIND OPPONENT — 1 MANA</button>';

  // History
  if(history.length>0){
    html+='<div class="section-label" style="margin-top:20px;"><span style="font-size:14px;">📜</span><span class="section-label__text">RECENT DUELS</span><span class="section-label__line"></span></div>';
    history.slice(0,5).forEach(function(d){
      var won=d.winner_id==playerId;
      html+='<div class="history-row">';
      html+='<span style="font-size:16px;">'+(won?'🏆':'💀')+'</span>';
      html+='<div style="flex:1;"><div style="font-family:var(--font-mono);font-size:10px;color:'+(won?'var(--green)':'var(--red)')+';">'+(won?'VICTORY':'DEFEAT')+'</div><div style="font-family:var(--font-mono);font-size:8px;color:var(--text-faint);">vs @'+(d.opponent_handle||'???')+'</div></div>';
      html+='<span style="font-family:var(--font-data);font-size:7px;color:var(--gold);">+'+(d.points_earned||0)+' pts</span>';
      html+='</div>';
    });
  }

  document.getElementById('content').innerHTML=html;
}

function togglePick(idx){
  var pos=pickedCards.indexOf(idx);
  if(pos>-1){pickedCards.splice(pos,1);}
  else if(pickedCards.length<3){pickedCards.push(idx);}
  // Re-render card grid to reflect selection state
  playerCards.forEach(function(c,i){
    var el=document.getElementById('dc'+i);
    if(el){
      if(pickedCards.indexOf(i)>-1){el.classList.add('spell-card--selected');}
      else{el.classList.remove('spell-card--selected');}
    }
  });
  var cnt=document.getElementById('pickCount');
  if(cnt)cnt.textContent=pickedCards.length+'/3 SELECTED';
  var btn=document.getElementById('fightBtn');
  if(btn)btn.disabled=pickedCards.length!==3;
}

async function startDuel(){
  var btn=document.getElementById('fightBtn');
  btn.disabled=true;btn.textContent='FINDING OPPONENT...';
  var cardIds=pickedCards.map(function(i){return playerCards[i].id;});
  try{
    var r=await fetch('/api/duels/challenge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:playerId,card_ids:cardIds})});
    if(r.ok){
      var result=await r.json();
      btn.textContent=result.winner_id==playerId?'🏆 VICTORY!':'💀 DEFEAT';
      setTimeout(function(){pickedCards=[];loadDuels();},2000);
    }else{
      var err=await r.json().catch(function(){return{error:'Failed'};});
      btn.textContent='❌ '+(err.error||'Failed');
      setTimeout(function(){btn.textContent='⚔️ FIND OPPONENT — 1 MANA';btn.disabled=false;},2000);
    }
  }catch(e){
    btn.textContent='❌ Network error';
    setTimeout(function(){btn.textContent='⚔️ FIND OPPONENT — 1 MANA';btn.disabled=false;},2000);
  }
}

loadDuels();
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script src="/js/card-slot-helper.js"></script>
<script>
/* ═══ V4 OVERRIDE — forces all card rendering through card-v4.js ═══ */
if(typeof buildCardV4==='function'){
  buildCard=function(s,d){return buildCardV4(s,{delay:d||0});};
  buildSpellCard=function(s,opts){return buildCardV4(s,opts);};
}
</script>

</body>
</html>
