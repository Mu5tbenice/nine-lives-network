const getRW=f=>{f=Math.max(1,Math.min(f,15));if(f<=3)return{common:70,uncommon:25,rare:5};if(f<=6)return{common:40,uncommon:40,rare:20};if(f<=9)return{common:15,uncommon:45,rare:40};return{common:5,uncommon:25,rare:70}};
const wPick=(items,w)=>{const p=[];RO.forEach(r=>{const wt=w[r]||0;items.filter(i=>i.r===r).forEach(it=>{for(let i=0;i<wt;i++)p.push(it)})});return p.length?pick(p):pick(items)};
const floorB=f=>{const b=Math.max(1,f)-1;return{atk:Math.floor(b*.55),hp:Math.floor(b*1.1),spd:Math.floor(b*.25),def:Math.floor(b*.25),luck:Math.floor(b*.15)}};

function genEnemy(enc){const hk=pick(HK),h=HS[hk];let name=pick(N1)+pick(N2);if(enc>=6||Math.random()<.3)name+=" "+pick(TIT);const w=getRW(enc),eq={};ESLOTS.forEach(s=>{const c=EQ[s];if(!c?.length){eq[s]=null;return}eq[s]=wPick(c,w)});const st={atk:h.atk,hp:h.hp,spd:h.spd,def:h.def||0,luck:h.luck||0};ESLOTS.forEach(s=>{const it=eq[s];if(it?.s)Object.keys(it.s).forEach(k=>{st[k]=(st[k]||0)+it.s[k]})});const b=floorB(enc);Object.keys(b).forEach(k=>{st[k]=(st[k]||0)+b[k]});const numCards=enc<=2?1:enc<=5?2:3;const cards=pickN(E_CARDS,numCards);cards.forEach(c=>{st.atk+=c.atk;st.hp+=c.hp;st.spd+=c.spd;st.def+=c.def;st.luck+=c.luck});return{name,house:hk,houseData:h,equipped:eq,stats:{...st},cards};}
function getModifier(enc){if(enc<=1)return MODIFIERS[0];if(enc<=3&&Math.random()<.4)return MODIFIERS[0];return pick(MODIFIERS.filter(m=>m.id!=="none"));}

function calcPS(cards,mod){const s={atk:PB.baseStats.atk+PB.gearStats.atk,hp:PB.baseStats.hp+PB.gearStats.hp,spd:PB.baseStats.spd+PB.gearStats.spd,def:PB.baseStats.def+PB.gearStats.def,luck:PB.baseStats.luck+PB.gearStats.luck};const mult=mod?.cardBonus||1;cards.forEach(c=>{s.atk+=Math.floor(c.atk*mult);s.hp+=Math.floor(c.hp*mult);s.spd+=Math.floor(c.spd*mult);s.def+=Math.floor(c.def*mult);s.luck+=Math.floor(c.luck*mult)});return mod?.apply?mod.apply(s):s;}
const STATS=[{key:"atk",label:"ATK",color:"#e85a6a"},{key:"hp",label:"HP",color:"#6acd8a"},{key:"spd",label:"SPD",color:"#6ac8d8"},{key:"def",label:"DEF",color:"#b088e8"},{key:"luck",label:"LUCK",color:"#D4A64B"}];

function simulate(pS,eS,pCards,eCards,mod){let php=pS.hp,ehp=eS.hp;const rounds=[];const pEff=pCards.flatMap(c=>c.effects.map(e=>e.tag));const eEff=eCards.flatMap(c=>c.effects.map(e=>e.tag));const bMult=mod?.burnMult||1;const hMult=mod?.healMult||1;const lMult=mod?.luckMult||1;const thorns=mod?.thorns||0;const maxR=mod?.maxRounds||6;const burnV=t=>{const b=t.find(e=>e.startsWith("BURN"));if(!b)return 0;return(parseInt(b.replace(/\D/g,""))||2)*bMult};const healV=t=>{const h=t.find(e=>e.startsWith("HEAL"));if(!h)return 0;return Math.floor((parseInt(h.replace(/\D/g,""))||3)*hMult)};for(let r=0;r<maxR;r++){if(php<=0||ehp<=0)break;const pFirst=mod?.randomInit?Math.random()<.5:Math.random()<(pS.spd/Math.max(pS.spd+eS.spd,1));const round={num:r+1,pFirst,events:[]};const doAtk=(aS,dS,isP,eff)=>{const weakened=((isP?eEff:pEff).includes("WEAKEN"));if(Math.random()<dS.luck*.015*lMult)return{type:"dodge",isPlayer:isP,dmg:0};let dmg=Math.max(1,aS.atk-Math.floor(dS.def*.5));if(weakened&&!isP)dmg=Math.floor(dmg*.5);const hasCrit=eff.includes("CRIT");const crit=Math.random()<(hasCrit?.25:aS.luck*.02)*lMult;if(crit)dmg=Math.floor(dmg*1.8);return{type:crit?"crit":"hit",isPlayer:isP,dmg}};const order=pFirst?[{s:pS,p:true,e:pEff},{s:eS,p:false,e:eEff}]:[{s:eS,p:false,e:eEff},{s:pS,p:true,e:pEff}];for(const f of order){if(php<=0||ehp<=0)break;const res=doAtk(f.s,f.p?eS:pS,f.p,f.e);round.events.push(res);if(res.dmg>0){if(f.p)ehp=Math.max(0,ehp-res.dmg);else php=Math.max(0,php-res.dmg);if(thorns>0){round.events.push({type:"thorns",isPlayer:f.p,dmg:thorns});if(f.p)php=Math.max(0,php-thorns);else ehp=Math.max(0,ehp-thorns)}}const bv=burnV(f.e);if(bv>0){round.events.push({type:"burn",isPlayer:f.p,dmg:bv});if(f.p)ehp=Math.max(0,ehp-bv);else php=Math.max(0,php-bv)}}const phv=healV(pEff);if(phv>0&&php>0){php=Math.min(pS.hp,php+phv);round.events.push({type:"heal",isPlayer:true,dmg:phv})}const ehv=healV(eEff);if(ehv>0&&ehp>0){ehp=Math.min(eS.hp,ehp+ehv);round.events.push({type:"heal",isPlayer:false,dmg:ehv})}round.phpAfter=php;round.ehpAfter=ehp;rounds.push(round)}return{rounds,playerWon:php>ehp,finalPhp:Math.max(0,php),finalEhp:Math.max(0,ehp)};}

const PILL_C={BURN:"#ffaa55",CHAIN:"#e85a6a",CRIT:"#D4A64B",SURGE:"#ffdd44",PIERCE:"#ff7b6b",HEAL:"#6acd8a",WARD:"#D4A64B",ANCHOR:"#ccaa66",THORNS:"#ffaa55",DRAIN:"#00B4D8",SIPHON:"#00B4D8",WEAKEN:"#bb88ff",HEX:"#bb88ff",SILENCE:"#bb88ff",HASTE:"#6ac8d8",SWIFT:"#6ac8d8",DODGE:"#6ac8d8",FREE:"#6acd8a",POISON:"#aaee55",CORRODE:"#aaee55",INFECT:"#aaee55",AMPLIFY:"#6acd8a",INSPIRE:"#6acd8a",BLESS:"#6acd8a"};

const PH={DRAFT:0,APPROACH:1,FACEOFF:2,BATTLE:3,REWARD:4,RESULT:5};

function TheWilds(){
  const[phase,setPhase]=useState(PH.DRAFT);const[enc,setEnc]=useState(1);const[runPool,setRunPool]=useState([]);const[newCardIds,setNewCardIds]=useState([]);const[fatigued,setFatigued]=useState({});const[selected,setSelected]=useState([]);const[currentHp,setCurrentHp]=useState(0);const[maxHp,setMaxHp]=useState(0);const[enemy,setEnemy]=useState(null);const[zone,setZone]=useState(()=>pick(ZONES));const[mod,setMod]=useState(MODIFIERS[0]);const[flavor,setFlavor]=useState(()=>pick(FLAV));const[journey,setJourney]=useState([]);const[score,setScore]=useState(0);const[battleLog,setBattleLog]=useState([]);const[playerHp,setPlayerHp]=useState(0);const[enemyHp,setEnemyHp]=useState(0);const[curRound,setCurRound]=useState(0);const[pShake,setPShake]=useState(false);const[eShake,setEShake]=useState(false);const[pFlash,setPFlash]=useState(null);const[eFlash,setEFlash]=useState(null);const[battleResult,setBattleResult]=useState(null);const[rewards,setRewards]=useState([]);const[animKey,setAnimKey]=useState(0);
  const pColor=PB.houseData.color,eColor=enemy?.houseData?.color||"#888";const pStats=calcPS(selected,mod);

  const startRun=()=>{const draft=pickN(FULL_COLLECTION,12);const baseS=calcPS([],null);setRunPool(draft);setNewCardIds([]);setFatigued({});setSelected([]);setCurrentHp(baseS.hp);setMaxHp(baseS.hp);setEnc(1);setJourney([]);setScore(0);const e=genEnemy(1);const z=pick(ZONES);const m=getModifier(1);setEnemy(e);setZone(z);setMod(m);setFlavor(pick(FLAV));setBattleLog([]);setBattleResult(null);setRewards([]);setPhase(PH.APPROACH);setAnimKey(k=>k+1)};
  const selectCard=c=>{if(selected.find(s=>s.id===c.id)||selected.length>=3||fatigued[c.id])return;setSelected([...selected,c])};
  const removeCard=i=>setSelected(selected.filter((_,j)=>j!==i));
  const approach=()=>{const ps=calcPS(selected,mod);setPlayerHp(Math.min(currentHp,ps.hp));setEnemyHp(enemy.stats.hp);setPhase(PH.FACEOFF)};

  const fight=()=>{setPhase(PH.BATTLE);const ps=calcPS(selected,mod);const esMod=mod?.apply?mod.apply({...enemy.stats}):{...enemy.stats};const initHp=Math.min(currentHp,ps.hp);const result=simulate({...ps,hp:initHp},esMod,selected,enemy.cards,mod);let php=initHp,ehp=esMod.hp;const log=[];let delay=0;
    result.rounds.forEach(round=>{delay+=400;setTimeout(()=>{setCurRound(round.num);log.push({text:`\u2500\u2500 ROUND ${round.num} \u2500\u2500`,color:"#D4A64B"});setBattleLog([...log])},delay);delay+=450;setTimeout(()=>{log.push({text:round.pFirst?"\u26A1 You seize initiative!":"\u26A1 Enemy strikes first!",color:round.pFirst?"#6acd8a":"#e85a6a"});setBattleLog([...log])},delay);
      round.events.forEach(ev=>{delay+=450;setTimeout(()=>{const who=ev.isPlayer?PB.name:enemy.name.split(" ")[0];const tgt=ev.isPlayer?enemy.name.split(" ")[0]:PB.name;
        if(ev.type==="dodge")log.push({text:`${tgt} dodged! \u{1F300}`,color:"#6ac8d8"});else if(ev.type==="crit")log.push({text:`${who} CRITS for ${ev.dmg}! \u{1F4A5}`,color:"#D4A64B"});else if(ev.type==="burn")log.push({text:`\u{1F525} BURN ${ev.dmg} \u2192 ${ev.isPlayer?enemy.name.split(" ")[0]:PB.name}`,color:"#ffaa55"});else if(ev.type==="heal")log.push({text:`\u2728 ${ev.isPlayer?PB.name:enemy.name.split(" ")[0]} heals ${ev.dmg}`,color:"#6acd8a"});else if(ev.type==="thorns")log.push({text:`\u{1F33F} Thorns reflect ${ev.dmg}!`,color:"#5CB338"});else log.push({text:`${who} \u2192 ${ev.dmg} dmg`,color:ev.isPlayer?"#6acd8a":"#e85a6a"});
        setBattleLog([...log]);if(ev.dmg>0&&ev.type!=="heal"){if(ev.isPlayer){ehp=Math.max(0,ehp-ev.dmg);setEnemyHp(ehp);setEShake(true);setEFlash(ev.type==="crit"?"#D4A64B":ev.type==="burn"?"#ffaa55":"#e85a6a");setTimeout(()=>{setEShake(false);setEFlash(null)},220)}else{php=Math.max(0,php-ev.dmg);setPlayerHp(php);setPShake(true);setPFlash(ev.type==="crit"?"#D4A64B":"#e85a6a");setTimeout(()=>{setPShake(false);setPFlash(null)},220)}}
        if(ev.type==="heal"){if(ev.isPlayer){php=Math.min(ps.hp,php+ev.dmg);setPlayerHp(php)}else{ehp=Math.min(esMod.hp,ehp+ev.dmg);setEnemyHp(ehp)}}if(ev.type==="thorns"){if(ev.isPlayer){php=Math.max(0,php-ev.dmg);setPlayerHp(php)}else{ehp=Math.max(0,ehp-ev.dmg);setEnemyHp(ehp)}}},delay)})});
    delay+=600;setTimeout(()=>{const won=result.playerWon;setBattleResult(won?"win":"lose");log.push({text:won?"\u{1F3C6} VICTORY!":"\u{1F480} DEFEATED",color:won?"#D4A64B":"#e85a6a"});setBattleLog([...log]);setJourney(j=>[...j,{enc,zone:zone.name,enemy:enemy.name,house:enemy.house,won}]);
      if(won){const updatedFat={};Object.keys(fatigued).forEach(k=>{const v=fatigued[k]-1;if(v>0)updatedFat[k]=v});selected.forEach(c=>{updatedFat[c.id]=1});setFatigued(updatedFat);const heal=Math.floor(ps.hp*.2);setCurrentHp(Math.min(ps.hp,result.finalPhp+heal));setScore(s=>s+enc*10+5);setRewards(pickN(REWARD_POOL.filter(c=>!runPool.find(p=>p.id===c.id)),3));setPhase(PH.REWARD)}else{setCurrentHp(0);setPhase(PH.RESULT)}},delay)};

  const pickReward=card=>{setRunPool(p=>[...p,card]);setNewCardIds(n=>[...n,card.id]);setRewards([]);const e=genEnemy(enc+1);setEnemy(e);setZone(pick(ZONES));setMod(getModifier(enc+1));setFlavor(pick(FLAV));setEnc(enc+1);setSelected([]);setBattleLog([]);setCurRound(0);setBattleResult(null);setAnimKey(k=>k+1);setPhase(PH.APPROACH)};

  const diff=enc<=3?"Quiet Path":enc<=5?"Contested Trail":enc<=8?"Dangerous Territory":enc<=11?"The Deep Wilds":"Edge of Nethara";
  const canFight=selected.length>=1;const fatiguedCount=Object.keys(fatigued).length;const availCount=runPool.filter(c=>!fatigued[c.id]).length;

  if(phase===PH.DRAFT){return(<div style={{minHeight:"100vh",background:"#0a0812",color:"#D4C8B8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"var(--font-body)"}}>

    <div style={{maxWidth:480,textAlign:"center",marginBottom:24}}>
      <div style={{fontSize:17,color:"#9B8E7E",lineHeight:1.7,marginBottom:16}}>Your Nine wanders The Wilds — unknown lands where danger lurks at every turn. You'll be dealt a random hand of cards from your collection. Choose wisely — cards get <span style={{color:"#e85a6a"}}>tired after use</span>, your <span style={{color:"#6acd8a"}}>HP carries between fights</span>, and each zone has its own rules.</div>
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:20}}>
        {[{icon:"\u{1F0CF}",label:"12 random cards",desc:"from your collection"},{icon:"\u2764\uFE0F",label:"HP carries over",desc:"+20% heal between fights"},{icon:"\u{1F634}",label:"Card fatigue",desc:"used cards rest 1 encounter"},{icon:"\u{1F381}",label:"Win rewards",desc:"pick new cards after wins"},{icon:"\u26A1",label:"Zone modifiers",desc:"change combat rules"}].map((f,i)=>
          <div key={i} style={{padding:"10px 14px",borderRadius:8,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",textAlign:"center",width:140}}>
            <div style={{fontSize:22,marginBottom:4}}>{f.icon}</div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#D4A64B",marginBottom:3}}>{f.label}</div><div style={{fontFamily:"var(--font-data)",fontSize:6,color:"#6B5E50"}}>{f.desc}</div></div>)}
      </div>
    </div>
    <button onClick={startRun} style={{padding:"16px 48px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:"var(--font-title)",fontSize:18,fontWeight:700,letterSpacing:4,background:"linear-gradient(135deg,#D4A64B,#c49a3a)",color:"#120e1e",boxShadow:"0 4px 24px rgba(212,166,75,.35)"}}>BEGIN JOURNEY</button>
  </div>)}

  if(phase===PH.RESULT&&battleResult==="lose"){return(<div style={{minHeight:"100vh",background:"#0a0812",color:"#D4C8B8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"var(--font-body)"}}>
    <div style={{fontFamily:"var(--font-title)",fontSize:28,fontWeight:900,color:"#e85a6a",letterSpacing:4,marginBottom:6}}>JOURNEY'S END</div>
    <div style={{fontFamily:"var(--font-data)",fontSize:8,color:"#6B5E50",marginBottom:20}}>DEFEATED AT ENCOUNTER {enc} \u00B7 {zone.name.toUpperCase()}</div>
    <div style={{display:"flex",gap:4,marginBottom:20,flexWrap:"wrap",justifyContent:"center"}}>{journey.map((j,i)=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:j.won?HS[j.house].color:"#e85a6a40",border:`1.5px solid ${j.won?HS[j.house].color+"60":"#e85a6a30"}`}}/>)}</div>
    <div style={{display:"flex",gap:24,marginBottom:28}}>
      <div style={{textAlign:"center"}}><div style={{fontFamily:"var(--font-data)",fontSize:22,color:"#D4A64B",fontWeight:700}}>{enc-1}</div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",marginTop:4}}>VICTORIES</div></div>
      <div style={{textAlign:"center"}}><div style={{fontFamily:"var(--font-data)",fontSize:22,color:"#6acd8a",fontWeight:700}}>{score}</div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",marginTop:4}}>POINTS</div></div>
      <div style={{textAlign:"center"}}><div style={{fontFamily:"var(--font-data)",fontSize:22,color:"#6ac8d8",fontWeight:700}}>{runPool.length}</div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",marginTop:4}}>CARDS</div></div>
    </div>
    <button onClick={()=>setPhase(PH.DRAFT)} style={{padding:"14px 36px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:"var(--font-title)",fontSize:16,fontWeight:700,letterSpacing:3,background:"linear-gradient(135deg,#D4A64B,#c49a3a)",color:"#120e1e"}}>NEW JOURNEY</button>
  </div>)}

  return(<div style={{minHeight:"100vh",background:"#0a0812",color:"#D4C8B8",fontFamily:"var(--font-body)",display:"flex",flexDirection:"column",alignItems:"center",maxWidth:600,margin:"0 auto"}}>
    {/* HEADER */}
    <div style={{width:"100%",padding:"12px 16px 6px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div><div style={{fontFamily:"var(--font-title)",fontSize:22,fontWeight:700,color:"#D4A64B",letterSpacing:3}}>THE WILDS</div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",marginTop:2}}>ENCOUNTER {enc} \u00B7 {diff.toUpperCase()}</div></div>
      <div style={{textAlign:"right"}}><div style={{display:"flex",alignItems:"baseline",gap:4,justifyContent:"flex-end"}}><span style={{fontFamily:"var(--font-data)",fontSize:8,color:"#6B5E50"}}>HP</span><span style={{fontFamily:"var(--font-data)",fontSize:16,color:currentHp<maxHp*.3?"#e85a6a":"#6acd8a",fontWeight:700}}>{phase>=PH.BATTLE?playerHp:currentHp}</span><span style={{fontFamily:"var(--font-data)",fontSize:8,color:"#6B5E50"}}>/{maxHp}</span></div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#D4A64B",marginTop:3}}>{"\u{1F0CF}"} {runPool.length} cards \u00B7 {"\u2B50"} {score} pts</div></div>
    </div>

    {journey.length>0&&<div style={{display:"flex",gap:3,padding:"4px 16px",flexWrap:"wrap"}}>{journey.map((j,i)=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:j.won?HS[j.house].color:"#e85a6a35",border:`1px solid ${j.won?HS[j.house].color+"50":"#e85a6a25"}`}}/>)}<div style={{width:8,height:8,borderRadius:"50%",border:"1.5px solid #D4A64B30",animation:"pulse 1.5s infinite"}}/></div>}

    {/* ARENA */}
    <div key={animKey} style={{width:"calc(100% - 24px)",aspectRatio:"16/9",position:"relative",overflow:"hidden",borderRadius:14,margin:"6px 12px",border:"1px solid rgba(255,255,255,.05)",background:"#0e0a18"}}>
      <div style={{position:"absolute",inset:0,backgroundImage:`url(${ZP}${zone.img})`,backgroundSize:"cover",backgroundPosition:"center",filter:phase===PH.APPROACH||phase===PH.REWARD?"brightness(.5) saturate(.55)":"brightness(.28) saturate(.4)",transition:"filter .7s"}}><div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 80%,transparent 15%,rgba(10,8,18,.7) 60%)"}}/></div>
      <div style={{position:"absolute",bottom:4,left:"50%",transform:"translateX(-50%)",zIndex:20,fontFamily:"var(--font-title)",fontSize:9,color:"rgba(255,255,255,.2)",letterSpacing:3}}>{zone.name.toUpperCase()}</div>
      {mod.id!=="none"&&<div style={{position:"absolute",top:6,left:6,right:6,zIndex:20,display:"flex",justifyContent:"center"}}><div style={{padding:"4px 14px",borderRadius:6,background:`${mod.color}15`,border:`1px solid ${mod.color}30`,textAlign:"center",maxWidth:"92%"}}><span style={{fontFamily:"var(--font-data)",fontSize:7,color:mod.color}}>{mod.icon} {mod.name.toUpperCase()}</span><span style={{fontFamily:"var(--font-data)",fontSize:6,color:"#9B8E7E",marginLeft:6}}>{mod.desc}</span></div></div>}
      {mod.id==="none"&&<div style={{position:"absolute",top:8,left:"50%",transform:"translateX(-50%)",zIndex:20,fontFamily:"var(--font-data)",fontSize:8,color:"#D4A64B",letterSpacing:2,textShadow:"0 0 8px rgba(212,166,75,.3)"}}>ENCOUNTER {enc}</div>}
      {curRound>0&&phase===PH.BATTLE&&<div style={{position:"absolute",top:mod.id!=="none"?28:22,left:"50%",transform:"translateX(-50%)",zIndex:20,fontFamily:"var(--font-data)",fontSize:7,color:"#6ac8d8",animation:"pulse .8s infinite"}}>ROUND {curRound}</div>}
      {phase===PH.APPROACH&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:15,textAlign:"center",maxWidth:"80%",animation:"fadeUp .6s ease"}}><div style={{fontSize:16,fontStyle:"italic",color:"rgba(255,255,255,.5)",lineHeight:1.5,textShadow:"0 2px 8px rgba(0,0,0,.9)"}}>"{flavor}"</div></div>}
      {phase===PH.REWARD&&<div style={{position:"absolute",top:"42%",left:"50%",transform:"translate(-50%,-50%)",zIndex:25,textAlign:"center",animation:"fadeUp .5s ease"}}><div style={{fontFamily:"var(--font-title)",fontSize:26,fontWeight:900,color:"#D4A64B",letterSpacing:4,textShadow:"0 0 24px rgba(212,166,75,.45)"}}>VICTORY</div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6acd8a",marginTop:4}}>+{Math.floor(pStats.hp*.2)} HP healed \u00B7 +{enc*10+5} pts</div></div>}
      {phase===PH.FACEOFF&&<div style={{position:"absolute",top:"48%",left:"50%",transform:"translate(-50%,-50%)",zIndex:15,fontFamily:"var(--font-title)",fontSize:28,fontWeight:900,color:"#D4A64B",textShadow:"0 0 18px rgba(212,166,75,.4)",letterSpacing:6}}>VS</div>}
      {phase===PH.BATTLE&&battleResult&&<div style={{position:"absolute",top:"44%",left:"50%",transform:"translate(-50%,-50%)",zIndex:25,fontFamily:"var(--font-title)",fontSize:26,fontWeight:900,color:battleResult==="win"?"#D4A64B":"#e85a6a",textShadow:`0 0 24px ${battleResult==="win"?"rgba(212,166,75,.4)":"rgba(232,90,106,.4)"}`,animation:"fadeUp .5s ease"}}>{battleResult==="win"?"VICTORY":"DEFEATED"}</div>}
      {phase!==PH.APPROACH&&phase!==PH.REWARD&&<><div style={{position:"absolute",top:"8%",bottom:"8%",left:"50%",width:1,background:"linear-gradient(180deg,transparent,rgba(212,166,75,.06),transparent)",zIndex:4}}/>
        <div style={{position:"absolute",bottom:12,left:"3%",width:"44%",height:"78%",zIndex:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",animation:"slideInLeft .5s ease both"}}><Fighter name={PB.name} house={PB.house} houseData={PB.houseData} color={pColor} shake={pShake} flash={pFlash!==null} flashColor={pFlash}/>{phase>=PH.BATTLE&&<HpBar current={playerHp} max={pStats.hp} color={pColor} side="left"/>}</div>
        <div style={{position:"absolute",bottom:12,right:"3%",width:"44%",height:"78%",zIndex:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",animation:"slideInRight .5s ease .12s both"}}>{enemy&&<Fighter name={enemy.name} house={enemy.house} houseData={enemy.houseData} color={eColor} shake={eShake} flash={eFlash!==null} flashColor={eFlash}/>}{phase>=PH.BATTLE&&<HpBar current={enemyHp} max={enemy.stats.hp} color={eColor} side="right"/>}</div>
      </>}
    </div>

    <div style={{width:"100%",padding:"0 12px"}}>
      {phase===PH.APPROACH&&<div style={{marginTop:8}}>
        <div style={{fontFamily:"var(--font-data)",fontSize:10,color:"#D4A64B",letterSpacing:1,marginBottom:8}}>YOUR HAND \u2014 {selected.length}/3 CARDS</div>
        <div style={{display:"flex",gap:12,marginBottom:8,justifyContent:"center",flexWrap:"wrap"}}>{[0,1,2].map(i=>selected[i]?<CardV4 key={`sel-${selected[i].id}`} card={selected[i]} size="tiny" onClick={()=>removeCard(i)}/>:<EmptySlot key={`empty-${i}`} i={i}/>)}</div>
        {selected.length>0&&<div style={{fontFamily:"var(--font-data)",fontSize:10,color:"#9B8E7E",marginBottom:10,textAlign:"center",lineHeight:2.2}}>BONUS: <span style={{color:"#e85a6a",fontSize:13}}>+{selected.reduce((a,c)=>a+c.atk,0)} ATK</span>{" "}<span style={{color:"#6acd8a",fontSize:13}}>+{selected.reduce((a,c)=>a+c.hp,0)} HP</span>{selected.reduce((a,c)=>a+c.spd,0)>0&&<span style={{color:"#6ac8d8",fontSize:13}}> +{selected.reduce((a,c)=>a+c.spd,0)} SPD</span>}{selected.reduce((a,c)=>a+c.def,0)>0&&<span style={{color:"#b088e8",fontSize:13}}> +{selected.reduce((a,c)=>a+c.def,0)} DEF</span>}{selected.reduce((a,c)=>a+c.luck,0)>0&&<span style={{color:"#D4A64B",fontSize:13}}> +{selected.reduce((a,c)=>a+c.luck,0)} LUCK</span>}</div>}
        <div style={{textAlign:"center",margin:"10px 0 14px"}}><button onClick={approach} disabled={!canFight} style={{padding:"13px 40px",borderRadius:10,border:`1px solid ${canFight?"rgba(255,255,255,.12)":"rgba(255,255,255,.04)"}`,cursor:canFight?"pointer":"not-allowed",fontFamily:"var(--font-title)",fontSize:16,fontWeight:700,letterSpacing:3,background:canFight?"linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.03))":"rgba(255,255,255,.02)",color:canFight?"#D4C8B8":"#6B5E50",opacity:canFight?1:.4}}>{"\u{1F43E}"} APPROACH{!canFight?" \u2014 PICK CARDS":""}</button></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontFamily:"var(--font-data)",fontSize:9,color:"#6B5E50"}}>YOUR POOL \u2014 {availCount} AVAILABLE{fatiguedCount>0?` \u00B7 ${fatiguedCount} TIRED`:""}</span></div>
        <div style={{maxHeight:600,overflowY:"auto",paddingRight:4,paddingBottom:20}}><div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center"}}>{runPool.map(c=><CardV4 key={c.id} card={c} size="tiny" onClick={()=>selectCard(c)} disabled={!!selected.find(s=>s.id===c.id)||!!fatigued[c.id]} fatigued={!!fatigued[c.id]} isNew={newCardIds.includes(c.id)} isSelected={!!selected.find(s=>s.id===c.id)}/>)}</div></div>
      </div>}

      {battleLog.length>0&&<BattleLog events={battleLog}/>}

      {phase===PH.FACEOFF&&<div style={{marginTop:6}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontFamily:"var(--font-data)",fontSize:7,color:pColor}}>{PB.houseData.icon} YOU ({selected.length} cards)</span><span style={{fontFamily:"var(--font-data)",fontSize:7,color:eColor}}>ENEMY ({enemy.cards.length}) {enemy.houseData.icon}</span></div>
        {mod.hideStats?<div style={{textAlign:"center",padding:16,fontFamily:"var(--font-data)",fontSize:8,color:"#847C98"}}>{"\u{1F32B}\uFE0F"} FOG OF WAR \u2014 Enemy stats hidden</div>:STATS.map(s=><StatBar key={s.key} s={s} pv={pStats[s.key]} ev={(mod?.apply?mod.apply({...enemy.stats}):enemy.stats)[s.key]}/>)}
        {selected.some(c=>c.effects.length>0)&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}><span style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50"}}>YOUR FX:</span>{selected.flatMap(c=>c.effects).map((e,i)=><span key={i} style={{fontSize:8,padding:"2px 6px",borderRadius:4,background:`${e.color}15`,color:e.color,fontFamily:"var(--font-data)"}}>{e.tag}</span>)}</div>}
      </div>}

      {phase===PH.REWARD&&<div style={{marginTop:10}}>
        <div style={{fontFamily:"var(--font-data)",fontSize:10,color:"#D4A64B",letterSpacing:1,textAlign:"center",marginBottom:12}}>{"\u{1F381}"} PICK A REWARD CARD</div>
        <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>{rewards.map((c,i)=><CardV4 key={i} card={c} size="mini" onClick={()=>pickReward(c)}/>)}</div>
        <div style={{textAlign:"center",marginTop:10}}><button onClick={skipReward} style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",background:"none",border:"1px solid rgba(255,255,255,.08)",borderRadius:6,padding:"6px 16px",cursor:"pointer"}}>SKIP {"\u2192"}</button></div>
      </div>}

      {phase===PH.FACEOFF&&<div style={{textAlign:"center",margin:"14px 0 20px"}}><button onClick={fight} style={{padding:"14px 40px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:"var(--font-title)",fontSize:16,fontWeight:700,letterSpacing:4,background:"linear-gradient(135deg,#D4A64B,#c49a3a)",color:"#120e1e",boxShadow:"0 4px 20px rgba(212,166,75,.3)"}}>{"\u2694\uFE0F"} FIGHT</button></div>}
      <div style={{height:30}}/>
    </div>
  </div>);
}

ReactDOM.render(React.createElement(TheWilds), document.getElementById("root"));
  </script>
</body>
</html>
