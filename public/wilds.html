  <style>
    /* ═══ PAGE STYLES ═══ */
    :root{--font-title:'Cinzel',serif;--font-data:'Press Start 2P',monospace;--font-body:'Crimson Text',serif;--font-mono:'JetBrains Mono',monospace;--gold:#D4A64B}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0812;overflow-x:hidden;padding-top:56px}
    #root{min-height:calc(100vh - 56px);display:flex;flex-direction:column}

    /* Card wrappers for wilds */
    .wilds-card-wrap{display:inline-block;position:relative;cursor:pointer}
    .wilds-card-wrap.is-disabled .spell-card{opacity:.25;cursor:default}
    .wilds-card-wrap.is-disabled .spell-card:hover{transform:none;box-shadow:none}
    .wilds-card-wrap.is-fatigued .spell-card{filter:grayscale(.6) brightness(.45)}
    .wilds-tired-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-12deg);font-family:var(--font-data);font-size:10px;color:rgba(232,90,106,.7);letter-spacing:3px;z-index:20;pointer-events:none;text-shadow:0 2px 6px rgba(0,0,0,.9)}
    .wilds-new-badge{position:absolute;top:6px;right:6px;font-family:var(--font-data);font-size:6px;color:#6acd8a;background:rgba(106,205,138,.12);border:1px solid rgba(106,205,138,.3);border-radius:4px;padding:2px 5px;z-index:20}

    /* Animations */
    @keyframes slideInLeft{from{transform:translateX(-25px);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes slideInRight{from{transform:translateX(25px);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
    @keyframes bigShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-10px) rotate(-2deg)}30%{transform:translateX(10px) rotate(2deg)}50%{transform:translateX(-6px)}70%{transform:translateX(6px)}90%{transform:translateX(-2px)}}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}30%{opacity:1;transform:translateY(-20px) scale(1.2)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}
    @keyframes floatUpCrit{0%{opacity:1;transform:translateY(0) scale(1)}20%{opacity:1;transform:translateY(-15px) scale(1.6)}100%{opacity:0;transform:translateY(-70px) scale(.9)}}
    @keyframes slashLeft{0%{opacity:0;transform:translateX(40px) rotate(25deg) scaleX(0)}30%{opacity:1;transform:translateX(0) rotate(-5deg) scaleX(1)}100%{opacity:0;transform:translateX(-20px) rotate(-15deg) scaleX(.3)}}
    @keyframes slashRight{0%{opacity:0;transform:translateX(-40px) rotate(-25deg) scaleX(0)}30%{opacity:1;transform:translateX(0) rotate(5deg) scaleX(1)}100%{opacity:0;transform:translateX(20px) rotate(15deg) scaleX(.3)}}
    @keyframes healPulse{0%{opacity:0;transform:scale(.5)}40%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(1.4)}}
    @keyframes burnFlicker{0%{opacity:.8;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}100%{opacity:0;transform:translateY(-10px)}}
    @keyframes cardGlow{0%,100%{box-shadow:0 0 20px rgba(212,166,75,.2)}50%{box-shadow:0 0 40px rgba(212,166,75,.5)}}
    @keyframes rewardFloat{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}

    /* Floating damage numbers */
    .dmg-float{position:absolute;pointer-events:none;z-index:50;font-family:var(--font-data);font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.9),0 0 12px rgba(0,0,0,.6)}
    .dmg-float.dmg-hit{animation:floatUp 1s ease-out forwards;color:#e85a6a;font-size:22px}
    .dmg-float.dmg-crit{animation:floatUpCrit 1.1s ease-out forwards;color:#D4A64B;font-size:28px}
    .dmg-float.dmg-heal{animation:floatUp .9s ease-out forwards;color:#6acd8a;font-size:18px}
    .dmg-float.dmg-burn{animation:floatUp .9s ease-out forwards;color:#ffaa55;font-size:16px}
    .dmg-float.dmg-dodge{animation:floatUp .9s ease-out forwards;color:#6ac8d8;font-size:14px;font-style:italic}
    .dmg-float.dmg-thorns{animation:floatUp .9s ease-out forwards;color:#5CB338;font-size:14px}
    .slash-fx{position:absolute;pointer-events:none;z-index:40;width:60px;height:6px;border-radius:3px;filter:blur(1px)}
    .slash-fx.from-left{animation:slashLeft .4s ease-out forwards;background:linear-gradient(90deg,transparent,#e85a6a,#ffaa55,transparent)}
    .slash-fx.from-right{animation:slashRight .4s ease-out forwards;background:linear-gradient(90deg,transparent,#e85a6a,#ffaa55,transparent)}
    .slash-fx.crit-slash{height:8px;filter:blur(2px);background:linear-gradient(90deg,transparent,#D4A64B,#fff,#D4A64B,transparent)}

    /* Progress */
    .progress-track{width:100%;height:20px;background:rgba(255,255,255,.03);border-radius:4px;border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden}
    .progress-fill{height:100%;border-radius:3px;transition:width .6s ease;position:relative;overflow:hidden}
    .progress-fill::after{content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:shimmer 2s infinite}
    @keyframes shimmer{0%{left:-100%}100%{left:100%}}
    .milestone-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:#0a0812;z-index:3}
    .milestone-dot.reached{border-color:#D4A64B;background:#D4A64B;box-shadow:0 0 4px rgba(212,166,75,.4)}

    /* Modal overlay */
    .modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;animation:fadeIn .2s ease}
    .modal-content{width:100%;max-width:600px;max-height:calc(100vh - 80px);overflow-y:auto;padding:16px}
    .modal-content::-webkit-scrollbar{width:4px}.modal-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

    /* Reward overlay */
    .reward-overlay{position:fixed;inset:0;z-index:100;background:radial-gradient(ellipse at 50% 30%,rgba(212,166,75,.08),rgba(0,0,0,.92) 60%);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .3s ease}

    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
  </style>

const pick=a=>a[Math.floor(Math.random()*a.length)];
const pickN=(a,n)=>{const s=[...a];const r=[];for(let i=0;i<n&&s.length;i++){const x=Math.floor(Math.random()*s.length);r.push(s.splice(x,1)[0])}return r};
const N1=["Grim","Shadow","Ember","Void","Storm","Iron","Ash","Thorn","Dusk","Fang","Rune","Hex","Blight","Frost","Night","Bone","Soot","Cinder","Mire","Wrath","Gloom","Smoke","Briar","Sable","Onyx"];

const RO=["common","uncommon","rare"];
const getRW=f=>{f=Math.max(1,Math.min(f,15));if(f<=3)return{common:70,uncommon:25,rare:5};if(f<=6)return{common:40,uncommon:40,rare:20};if(f<=9)return{common:15,uncommon:45,rare:40};return{common:5,uncommon:25,rare:70}};
const wPick=(items,w)=>{const p=[];RO.forEach(r=>{const wt=w[r]||0;items.filter(i=>i.r===r).forEach(it=>{for(let i=0;i<wt;i++)p.push(it)})});return p.length?pick(p):pick(items)};
const floorB=f=>{const b=Math.max(1,f)-1;return{atk:Math.floor(b*.55),hp:Math.floor(b*1.1),spd:Math.floor(b*.25),def:Math.floor(b*.25),luck:Math.floor(b*.15)}};

function genEnemy(enc){const hk=pick(HK),h=HS[hk];let name=pick(N1)+pick(N2);if(enc>=6||Math.random()<.3)name+=" "+pick(TIT);const w=getRW(enc),eq={};ESLOTS.forEach(s=>{const c=EQ[s];if(!c?.length){eq[s]=null;return}eq[s]=wPick(c,w)});const st={atk:h.atk,hp:h.hp,spd:h.spd,def:h.def||0,luck:h.luck||0};ESLOTS.forEach(s=>{const it=eq[s];if(it?.s)Object.keys(it.s).forEach(k=>{st[k]=(st[k]||0)+it.s[k]})});const b=floorB(enc);Object.keys(b).forEach(k=>{st[k]=(st[k]||0)+b[k]});const numCards=enc<=2?1:enc<=5?2:3;const cards=pickN(E_CARDS,numCards);cards.forEach(c=>{st.atk+=c.atk;st.hp+=c.hp;st.spd+=c.spd;st.def+=c.def;st.luck+=c.luck});return{name,house:hk,houseData:h,equipped:eq,stats:{...st},cards};}
function getModifier(enc){if(enc<=1)return MODIFIERS[0];if(enc<=3&&Math.random()<.4)return MODIFIERS[0];return pick(MODIFIERS.filter(m=>m.id!=="none"));}

try{const p=JSON.parse(localStorage.getItem('9lv_player')||'{}');const hid=p.school_id||p.house;if(typeof hid==='number'&&HOUSE_ID_MAP[hid])_playerHouse=HOUSE_ID_MAP[hid];else if(typeof hid==='string'&&HS[hid])_playerHouse=hid;_playerName=p.nine_name||p.username||'Unnamed Nine'}catch(e){}

function calcPS(cards,mod){const s={atk:PB.baseStats.atk+PB.gearStats.atk,hp:PB.baseStats.hp+PB.gearStats.hp,spd:PB.baseStats.spd+PB.gearStats.spd,def:PB.baseStats.def+PB.gearStats.def,luck:PB.baseStats.luck+PB.gearStats.luck};const mult=mod?.cardBonus||1;cards.forEach(c=>{s.atk+=Math.floor(c.atk*mult);s.hp+=Math.floor(c.hp*mult);s.spd+=Math.floor(c.spd*mult);s.def+=Math.floor(c.def*mult);s.luck+=Math.floor(c.luck*mult)});return mod?.apply?mod.apply(s):s;}
const STATS=[{key:"atk",label:"ATK",color:"#e85a6a"},{key:"hp",label:"HP",color:"#6acd8a"},{key:"spd",label:"SPD",color:"#6ac8d8"},{key:"def",label:"DEF",color:"#b088e8"},{key:"luck",label:"LUCK",color:"#D4A64B"}];

function simulate(pS,eS,pCards,eCards,mod){let php=pS.hp,ehp=eS.hp;const rounds=[];const pEff=pCards.flatMap(c=>c.effects.map(e=>e.tag));const eEff=eCards.flatMap(c=>c.effects.map(e=>e.tag));const bMult=mod?.burnMult||1;const hMult=mod?.healMult||1;const lMult=mod?.luckMult||1;const thorns=mod?.thorns||0;const maxR=mod?.maxRounds||6;const burnV=t=>{const b=t.find(e=>e.startsWith("BURN"));if(!b)return 0;return(parseInt(b.replace(/\D/g,""))||2)*bMult};const healV=t=>{const h=t.find(e=>e.startsWith("HEAL"));if(!h)return 0;return Math.floor((parseInt(h.replace(/\D/g,""))||3)*hMult)};for(let r=0;r<maxR;r++){if(php<=0||ehp<=0)break;const pFirst=mod?.randomInit?Math.random()<.5:Math.random()<(pS.spd/Math.max(pS.spd+eS.spd,1));const round={num:r+1,pFirst,events:[]};const doAtk=(aS,dS,isP,eff)=>{const weakened=((isP?eEff:pEff).includes("WEAKEN"));if(Math.random()<dS.luck*.015*lMult)return{type:"dodge",isPlayer:isP,dmg:0};let dmg=Math.max(1,aS.atk-Math.floor(dS.def*.5));if(weakened&&!isP)dmg=Math.floor(dmg*.5);const hasCrit=eff.includes("CRIT");const crit=Math.random()<(hasCrit?.25:aS.luck*.02)*lMult;if(crit)dmg=Math.floor(dmg*1.8);return{type:crit?"crit":"hit",isPlayer:isP,dmg}};const order=pFirst?[{s:pS,p:true,e:pEff},{s:eS,p:false,e:eEff}]:[{s:eS,p:false,e:eEff},{s:pS,p:true,e:pEff}];for(const f of order){if(php<=0||ehp<=0)break;const res=doAtk(f.s,f.p?eS:pS,f.p,f.e);round.events.push(res);if(res.dmg>0){if(f.p)ehp=Math.max(0,ehp-res.dmg);else php=Math.max(0,php-res.dmg);if(thorns>0){round.events.push({type:"thorns",isPlayer:f.p,dmg:thorns});if(f.p)php=Math.max(0,php-thorns);else ehp=Math.max(0,ehp-thorns)}}const bv=burnV(f.e);if(bv>0){round.events.push({type:"burn",isPlayer:f.p,dmg:bv});if(f.p)ehp=Math.max(0,ehp-bv);else php=Math.max(0,php-bv)}}const phv=healV(pEff);if(phv>0&&php>0){php=Math.min(pS.hp,php+phv);round.events.push({type:"heal",isPlayer:true,dmg:phv})}const ehv=healV(eEff);if(ehv>0&&ehp>0){ehp=Math.min(eS.hp,ehp+ehv);round.events.push({type:"heal",isPlayer:false,dmg:ehv})}round.phpAfter=php;round.ehpAfter=ehp;rounds.push(round)}return{rounds,playerWon:php>ehp,finalPhp:Math.max(0,php),finalEhp:Math.max(0,ehp)};}

  </div>);
}

function FloatingNumbers({floats}){return(<>{floats.map(f=><div key={f.id} className={`dmg-float ${f.cls}`} style={{left:f.x,top:f.y}}>{f.text}</div>)}</>);}
function SlashFx({slashes}){return(<>{slashes.map(s=><div key={s.id} className={`slash-fx ${s.cls}`} style={{left:s.x,top:s.y}}/>)}</>);}

/* ═══ CARD PICKER MODAL ═══ */
function CardPickerModal({pool,fatigued,selected,onSelect,onClose,slotIndex}){
  const available=pool.filter(c=>!selected.find(s=>s.id===c.id)&&!fatigued[c.id]);
  const tired=pool.filter(c=>fatigued[c.id]);
  const[filter,setFilter]=useState("all");
  const types=["all","attack","defend","support","manipulation"];
  const filtered=filter==="all"?available:available.filter(c=>c.type.toLowerCase()===filter);
  return(<div className="modal-overlay" onClick={onClose}>
    <div style={{width:"100%",maxWidth:600,padding:"16px 0",display:"flex",flexDirection:"column",height:"100vh"}} onClick={e=>e.stopPropagation()}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,padding:"0 16px"}}>
        <div>
          <div style={{fontFamily:"var(--font-title)",fontSize:16,fontWeight:700,color:"#D4A64B"}}>Choose a Card</div>
          <div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",marginTop:4}}>SLOT {slotIndex+1} · {available.length} AVAILABLE</div>
        </div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#9B8E7E",fontSize:18,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u2715"}</button>
      </div>

      {/* Type filter tabs */}
      <div style={{display:"flex",gap:0,padding:"0 16px",marginBottom:12,overflowX:"auto"}}>
        {types.map(t=><button key={t} onClick={()=>setFilter(t)} style={{fontFamily:"var(--font-data)",fontSize:7,padding:"6px 12px",border:"none",borderBottom:filter===t?"2px solid #D4A64B":"2px solid transparent",background:"none",color:filter===t?"#D4A64B":"#6B5E50",cursor:"pointer",whiteSpace:"nowrap",transition:"all .15s"}}>{t.toUpperCase()}</button>)}
      </div>

      {/* Scrollable card area */}
      <div style={{flex:1,overflowY:"auto",padding:"0 16px"}}>
        {filtered.length===0&&<div style={{textAlign:"center",padding:30,fontFamily:"var(--font-data)",fontSize:8,color:"#6B5E50"}}>No {filter==="all"?"":"matching "}cards available.</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center",paddingBottom:16}}>
          {filtered.map(c=><div key={c.id} style={{transition:"transform .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px)"}} onMouseLeave={e=>{e.currentTarget.style.transform="none"}}>
            <CardV4 card={c} size="tiny" onClick={()=>{onSelect(c);onClose()}} isNew={false}/>
          </div>)}
        </div>
        {tired.length>0&&<>
          <div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",marginTop:8,marginBottom:8,textAlign:"center",letterSpacing:1}}>TIRED ({tired.length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center",paddingBottom:16}}>
            {tired.map(c=><CardV4 key={c.id} card={c} size="tiny" disabled fatigued/>)}
          </div>
        </>}
      </div>
    </div>
  </div>);
}

/* ═══ REWARD SCREEN — cinematic card pick ═══ */
function RewardScreen({rewards,onPick,onSkip,enc,score,healAmt}){
  const[hovered,setHovered]=useState(null);
  return(<div className="reward-overlay">
    <div style={{textAlign:"center",marginBottom:24,animation:"fadeUp .5s ease"}}>
      <div style={{fontFamily:"var(--font-title)",fontSize:32,fontWeight:900,color:"#D4A64B",letterSpacing:6,textShadow:"0 0 30px rgba(212,166,75,.4)"}}>VICTORY</div>
      <div style={{fontFamily:"var(--font-data)",fontSize:8,color:"#6acd8a",marginTop:6}}>+{healAmt} HP HEALED · +{enc*10+5} PTS</div>
    </div>
    <div style={{fontFamily:"var(--font-data)",fontSize:9,color:"#9B8E7E",letterSpacing:2,marginBottom:16,animation:"fadeUp .6s ease .1s both"}}>CHOOSE A REWARD</div>
    <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap",marginBottom:24}}>
      {rewards.map((c,i)=><div key={i} style={{animation:`rewardFloat .5s ease ${.15+i*.12}s both`,cursor:"pointer",transition:"transform .2s",transform:hovered===i?"translateY(-8px) scale(1.05)":"none"}} onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)} onClick={()=>onPick(c)}>
        <CardV4 card={c} size="mini"/>
      </div>)}
    </div>
    <button onClick={onSkip} style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",background:"none",border:"1px solid rgba(255,255,255,.08)",borderRadius:6,padding:"8px 20px",cursor:"pointer",animation:"fadeUp .7s ease .5s both"}}>SKIP REWARD →</button>
  </div>);
}

/* ═══════════════════════════════════════ */
/*  MAIN GAME COMPONENT                    */
/* ═══════════════════════════════════════ */
const PH={DRAFT:0,APPROACH:1,FACEOFF:2,BATTLE:3,REWARD:4,RESULT:5};

function TheWilds(){
  const[phase,setPhase]=useState(PH.DRAFT);
  const[enc,setEnc]=useState(1);
  const[runPool,setRunPool]=useState([]);
  const[newCardIds,setNewCardIds]=useState([]);
  const[fatigued,setFatigued]=useState({});
  const[selected,setSelected]=useState([]);
  const[currentHp,setCurrentHp]=useState(0);
  const[maxHp,setMaxHp]=useState(0);
  const[enemy,setEnemy]=useState(null);
  const[zone,setZone]=useState(()=>pick(ZONES));
  const[mod,setMod]=useState(MODIFIERS[0]);
  const[flavor,setFlavor]=useState(()=>pick(FLAV));
  const[journey,setJourney]=useState([]);
  const[score,setScore]=useState(0);
  const[battleLog,setBattleLog]=useState([]);
  const[playerHp,setPlayerHp]=useState(0);
  const[enemyHp,setEnemyHp]=useState(0);
  const[curRound,setCurRound]=useState(0);
  const[pShake,setPShake]=useState(false);
  const[eShake,setEShake]=useState(false);
  const[pFlash,setPFlash]=useState(null);
  const[eFlash,setEFlash]=useState(null);
  const[battleResult,setBattleResult]=useState(null);
  const[rewards,setRewards]=useState([]);
  const[animKey,setAnimKey]=useState(0);
  const[pickerSlot,setPickerSlot]=useState(null);
  const[floats,setFloats]=useState([]);
  const[slashes,setSlashes]=useState([]);
  const floatId=useRef(0);

  const spawnFloat=(side,text,cls)=>{const id=++floatId.current;const x=side==="left"?"22%":"68%";const y=`${20+Math.random()*15}%`;setFloats(f=>[...f,{id,text,cls,x,y}]);setTimeout(()=>setFloats(f=>f.filter(n=>n.id!==id)),1200)};
  const spawnSlash=(side,isCrit)=>{const id=++floatId.current;const x=side==="left"?"15%":"58%";const y="40%";const cls=`${side==="left"?"from-left":"from-right"}${isCrit?" crit-slash":""}`;setSlashes(s=>[...s,{id,cls,x,y}]);setTimeout(()=>setSlashes(s=>s.filter(n=>n.id!==id)),500)};

  const pColor=PB.houseData.color,eColor=enemy?.houseData?.color||"#888";
  const pStats=calcPS(selected,mod);
  const fatiguedCount=Object.keys(fatigued).length;
  const availCount=runPool.filter(c=>!fatigued[c.id]).length;
  const canFight=selected.length>=1;
  const diff=enc<=3?"Quiet Path":enc<=5?"Contested Trail":enc<=8?"Dangerous Territory":enc<=11?"The Deep Wilds":"Edge of Nethara";

  const startRun=()=>{
    const draft=pickN(FULL_COLLECTION,12);const baseS=calcPS([],null);
    setRunPool(draft);setNewCardIds([]);setFatigued({});setSelected([]);
    setCurrentHp(baseS.hp);setMaxHp(baseS.hp);setEnc(1);setJourney([]);setScore(0);
    const e=genEnemy(1),z=pick(ZONES),m=getModifier(1);
    setEnemy(e);setZone(z);setMod(m);setFlavor(pick(FLAV));
    setBattleLog([]);setBattleResult(null);setRewards([]);setFloats([]);setSlashes([]);
    setPhase(PH.APPROACH);setAnimKey(k=>k+1);
  };

  const selectCard=c=>{if(selected.find(s=>s.id===c.id)||selected.length>=3||fatigued[c.id])return;setSelected([...selected,c])};
  const removeCard=i=>setSelected(selected.filter((_,j)=>j!==i));
  const openPicker=i=>{if(selected[i]){removeCard(i)}else{setPickerSlot(i)}};

  const approach=()=>{
    const ps=calcPS(selected,mod);
    const baseHp=calcPS([],mod).hp;
    const cardBonus=ps.hp-baseHp;
    setPlayerHp(Math.min(currentHp+cardBonus,ps.hp));setEnemyHp(enemy.stats.hp);
    setPhase(PH.FACEOFF);
  };

  const fight=()=>{
    setPhase(PH.BATTLE);setFloats([]);setSlashes([]);
    const ps=calcPS(selected,mod);
    const esMod=mod?.apply?mod.apply({...enemy.stats}):{...enemy.stats};
    const initHp=playerHp;
    const result=simulate({...ps,hp:initHp},esMod,selected,enemy.cards,mod);
    let php=initHp,ehp=esMod.hp;const log=[];let delay=0;

    result.rounds.forEach(round=>{
      delay+=700;setTimeout(()=>{setCurRound(round.num);log.push({text:`── ROUND ${round.num} ──`,color:"#D4A64B"});setBattleLog([...log])},delay);
      delay+=500;setTimeout(()=>{log.push({text:round.pFirst?"⚡ You seize initiative!":"⚡ Enemy strikes first!",color:round.pFirst?"#6acd8a":"#e85a6a"});setBattleLog([...log])},delay);
      round.events.forEach(ev=>{delay+=650;setTimeout(()=>{
        const who=ev.isPlayer?PB.name:enemy.name.split(" ")[0];const tgt=ev.isPlayer?enemy.name.split(" ")[0]:PB.name;
        const hitSide=ev.isPlayer?"right":"left";const selfSide=ev.isPlayer?"left":"right";
        if(ev.type==="dodge"){log.push({text:`${tgt} dodged! 🌀`,color:"#6ac8d8"});spawnFloat(hitSide,"MISS","dmg-dodge")}
        else if(ev.type==="crit"){log.push({text:`${who} CRITS for ${ev.dmg}! 💥`,color:"#D4A64B"});spawnSlash(ev.isPlayer?"left":"right",true);spawnFloat(hitSide,`-${ev.dmg}`,"dmg-crit")}
        else if(ev.type==="burn"){log.push({text:`🔥 BURN ${ev.dmg} → ${ev.isPlayer?enemy.name.split(" ")[0]:PB.name}`,color:"#ffaa55"});spawnFloat(hitSide,`🔥-${ev.dmg}`,"dmg-burn")}
        else if(ev.type==="heal"){log.push({text:`✨ ${ev.isPlayer?PB.name:enemy.name.split(" ")[0]} heals ${ev.dmg}`,color:"#6acd8a"});spawnFloat(ev.isPlayer?"left":"right",`+${ev.dmg}`,"dmg-heal")}
        else if(ev.type==="thorns"){log.push({text:`🌿 Thorns reflect ${ev.dmg}!`,color:"#5CB338"});spawnFloat(selfSide,`-${ev.dmg}`,"dmg-thorns")}
        else{log.push({text:`${who} → ${ev.dmg} dmg`,color:ev.isPlayer?"#6acd8a":"#e85a6a"});spawnSlash(ev.isPlayer?"left":"right",false);spawnFloat(hitSide,`-${ev.dmg}`,"dmg-hit")}
        setBattleLog([...log]);
        if(ev.dmg>0&&ev.type!=="heal"){
          if(ev.isPlayer){ehp=Math.max(0,ehp-ev.dmg);setEnemyHp(ehp);setEShake(true);setEFlash(ev.type==="crit"?"#D4A64B":ev.type==="burn"?"#ffaa55":"#e85a6a");setTimeout(()=>{setEShake(false);setEFlash(null)},350)}
          else{php=Math.max(0,php-ev.dmg);setPlayerHp(php);setPShake(true);setPFlash(ev.type==="crit"?"#D4A64B":"#e85a6a");setTimeout(()=>{setPShake(false);setPFlash(null)},350)}}
        if(ev.type==="heal"){if(ev.isPlayer){php=Math.min(ps.hp,php+ev.dmg);setPlayerHp(php)}else{ehp=Math.min(esMod.hp,ehp+ev.dmg);setEnemyHp(ehp)}}
        if(ev.type==="thorns"){if(ev.isPlayer){php=Math.max(0,php-ev.dmg);setPlayerHp(php)}else{ehp=Math.max(0,ehp-ev.dmg);setEnemyHp(ehp)}}
      },delay)});
    });

    delay+=900;setTimeout(()=>{
      const won=result.playerWon;setBattleResult(won?"win":"lose");
      log.push({text:won?"🏆 VICTORY!":"💀 DEFEATED",color:won?"#D4A64B":"#e85a6a"});setBattleLog([...log]);
      setJourney(j=>[...j,{enc,zone:zone.name,enemy:enemy.name,house:enemy.house,won}]);
      if(won){
        const updatedFat={};Object.keys(fatigued).forEach(k=>{const v=fatigued[k]-1;if(v>0)updatedFat[k]=v});
        selected.forEach(c=>{updatedFat[c.id]=1});setFatigued(updatedFat);
        const heal=Math.floor(maxHp*.2);setCurrentHp(Math.min(maxHp,result.finalPhp+heal));
        setScore(s=>s+enc*10+5);
        setRewards(pickN(REWARD_POOL.filter(c=>!runPool.find(p=>p.id===c.id)),3));
        setPhase(PH.REWARD);
      }else{setCurrentHp(0);setPhase(PH.RESULT)}
    },delay);
  };

  const pickReward=card=>{
    setRunPool(p=>[...p,card]);setNewCardIds(n=>[...n,card.id]);setRewards([]);setFloats([]);setSlashes([]);
    const e=genEnemy(enc+1);setEnemy(e);setZone(pick(ZONES));setMod(getModifier(enc+1));setFlavor(pick(FLAV));
    setEnc(enc+1);setSelected([]);setBattleLog([]);setCurRound(0);setBattleResult(null);setAnimKey(k=>k+1);setPhase(PH.APPROACH);
  };
  const skipReward=()=>{
    setRewards([]);setFloats([]);setSlashes([]);
    const e=genEnemy(enc+1);setEnemy(e);setZone(pick(ZONES));setMod(getModifier(enc+1));setFlavor(pick(FLAV));
    setEnc(enc+1);setSelected([]);setBattleLog([]);setCurRound(0);setBattleResult(null);setAnimKey(k=>k+1);setPhase(PH.APPROACH);
  };

  /* ═══ DRAFT SCREEN (start) ═══ */
  if(phase===PH.DRAFT){return(<div style={{minHeight:"calc(100vh - 56px)",background:"#0a0812",color:"#D4C8B8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"var(--font-body)"}}>
    <div style={{fontFamily:"var(--font-title)",fontSize:32,fontWeight:700,color:"#D4A64B",letterSpacing:5,marginBottom:6}}>THE WILDS</div>
    <div style={{fontFamily:"var(--font-data)",fontSize:8,color:"#6B5E50",marginBottom:28,letterSpacing:2}}>A ROGUELIKE ADVENTURE THROUGH NETHARA</div>
    <div style={{maxWidth:480,textAlign:"center",marginBottom:24}}>
      <div style={{fontSize:17,color:"#9B8E7E",lineHeight:1.7,marginBottom:16}}>Your Nine wanders The Wilds — unknown lands where danger lurks at every turn. You'll be dealt a random hand of cards. Choose wisely — cards get <span style={{color:"#e85a6a"}}>tired after use</span>, your <span style={{color:"#6acd8a"}}>HP carries between fights</span>, and each zone has its own rules.</div>
      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:20}}>
        {[{icon:"🃏",label:"12 random cards",desc:"from your collection"},{icon:"❤️",label:"HP carries over",desc:"+20% heal on wins"},{icon:"😴",label:"Card fatigue",desc:"used cards rest 1 fight"},{icon:"🎁",label:"Win rewards",desc:"pick new cards after wins"},{icon:"⚡",label:"Zone modifiers",desc:"change combat rules"}].map((f,i)=>
          <div key={i} style={{padding:"10px 14px",borderRadius:8,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",textAlign:"center",width:140}}>
            <div style={{fontSize:22,marginBottom:4}}>{f.icon}</div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#D4A64B",marginBottom:3}}>{f.label}</div><div style={{fontFamily:"var(--font-data)",fontSize:6,color:"#6B5E50"}}>{f.desc}</div></div>)}
      </div>
    </div>
    <button onClick={startRun} style={{padding:"16px 48px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:"var(--font-title)",fontSize:18,fontWeight:700,letterSpacing:4,background:"linear-gradient(135deg,#D4A64B,#c49a3a)",color:"#120e1e",boxShadow:"0 4px 24px rgba(212,166,75,.35)"}}>BEGIN JOURNEY</button>
  </div>)}

  /* ═══ DEATH SCREEN ═══ */
  if(phase===PH.RESULT&&battleResult==="lose"){return(<div style={{minHeight:"calc(100vh - 56px)",background:"#0a0812",color:"#D4C8B8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"var(--font-body)"}}>
    <div style={{fontFamily:"var(--font-title)",fontSize:28,fontWeight:900,color:"#e85a6a",letterSpacing:4,marginBottom:6}}>JOURNEY'S END</div>
    <div style={{fontFamily:"var(--font-data)",fontSize:8,color:"#6B5E50",marginBottom:20}}>DEFEATED AT ENCOUNTER {enc} · {zone.name.toUpperCase()}</div>
    <div style={{display:"flex",gap:4,marginBottom:20,flexWrap:"wrap",justifyContent:"center"}}>{journey.map((j,i)=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:j.won?HS[j.house].color:"#e85a6a40",border:`1.5px solid ${j.won?HS[j.house].color+"60":"#e85a6a30"}`}}/>)}</div>
    <div style={{display:"flex",gap:24,marginBottom:28}}>
      <div style={{textAlign:"center"}}><div style={{fontFamily:"var(--font-data)",fontSize:22,color:"#D4A64B",fontWeight:700}}>{enc-1}</div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",marginTop:4}}>VICTORIES</div></div>
      <div style={{textAlign:"center"}}><div style={{fontFamily:"var(--font-data)",fontSize:22,color:"#6acd8a",fontWeight:700}}>{score}</div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",marginTop:4}}>POINTS</div></div>
      <div style={{textAlign:"center"}}><div style={{fontFamily:"var(--font-data)",fontSize:22,color:"#6ac8d8",fontWeight:700}}>{runPool.length}</div><div style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50",marginTop:4}}>CARDS</div></div>
    </div>
    <button onClick={()=>setPhase(PH.DRAFT)} style={{padding:"14px 36px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:"var(--font-title)",fontSize:16,fontWeight:700,letterSpacing:3,background:"linear-gradient(135deg,#D4A64B,#c49a3a)",color:"#120e1e"}}>NEW JOURNEY</button>
  </div>)}

  /* ═══ REWARD OVERLAY ═══ */
  if(phase===PH.REWARD&&rewards.length>0){
    const healAmt=Math.floor(maxHp*.2);
    return(<><RewardScreen rewards={rewards} onPick={pickReward} onSkip={skipReward} enc={enc} score={score} healAmt={healAmt}/></>);
  }

  /* ═══ MAIN GAME VIEW ═══ */
  return(<div style={{minHeight:"calc(100vh - 56px)",background:"#0a0812",color:"#D4C8B8",fontFamily:"var(--font-body)",display:"flex",flexDirection:"column",alignItems:"center",maxWidth:600,margin:"0 auto"}}>

    {/* HEADER — compact */}
    <div style={{width:"100%",padding:"10px 16px 4px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontFamily:"var(--font-title)",fontSize:18,fontWeight:700,color:"#D4A64B",letterSpacing:3}}>THE WILDS</div>
        <div style={{fontFamily:"var(--font-data)",fontSize:6,color:"#6B5E50",marginTop:2}}>ENC {enc} · {diff.toUpperCase()}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{display:"flex",alignItems:"baseline",gap:3,justifyContent:"flex-end"}}>
          <span style={{fontFamily:"var(--font-data)",fontSize:8,color:"#6B5E50"}}>HP</span>
          <span style={{fontFamily:"var(--font-data)",fontSize:16,color:currentHp<maxHp*.3?"#e85a6a":"#6acd8a",fontWeight:700}}>{phase>=PH.FACEOFF?playerHp:currentHp}</span>
          <span style={{fontFamily:"var(--font-data)",fontSize:8,color:"#6B5E50"}}>/{phase>=PH.APPROACH&&selected.length>0?pStats.hp:maxHp}</span>
        </div>
        <div style={{display:"flex",gap:8,marginTop:4,justifyContent:"flex-end"}}>
          <span style={{fontFamily:"var(--font-data)",fontSize:8,color:"#9B8E7E"}}>CARDS <span style={{color:"#D4A64B",fontWeight:700}}>{runPool.length}</span></span>
          <span style={{fontFamily:"var(--font-data)",fontSize:8,color:"#9B8E7E"}}>PTS <span style={{color:"#D4A64B",fontWeight:700}}>{score}</span></span>
        </div>
      </div>
    </div>

    <ProgressBar enc={enc}/>

    {/* Journey dots */}
    {journey.length>0&&<div style={{display:"flex",gap:3,padding:"4px 16px",flexWrap:"wrap"}}>{journey.map((j,i)=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:j.won?HS[j.house].color:"#e85a6a35",border:`1px solid ${j.won?HS[j.house].color+"50":"#e85a6a25"}`}}/>)}<div style={{width:7,height:7,borderRadius:"50%",border:"1.5px solid #D4A64B30",animation:"pulse 1.5s infinite"}}/></div>}

    {/* ═══ ARENA ═══ */}
    <div key={animKey} style={{width:"calc(100% - 24px)",minHeight:320,position:"relative",overflow:"hidden",borderRadius:14,margin:"6px 12px",border:"1px solid rgba(255,255,255,.05)",background:"#0e0a18",flexShrink:0}}>
      <div style={{position:"absolute",inset:0,backgroundImage:`url(${ZP}${zone.img})`,backgroundSize:"cover",backgroundPosition:"center",filter:phase===PH.APPROACH?"brightness(.5) saturate(.55)":"brightness(.28) saturate(.4)",transition:"filter .7s"}}><div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 80%,transparent 15%,rgba(10,8,18,.7) 60%)"}}/></div>
      <div style={{position:"absolute",bottom:3,left:"50%",transform:"translateX(-50%)",zIndex:20,fontFamily:"var(--font-title)",fontSize:8,color:"rgba(255,255,255,.18)",letterSpacing:2}}>{zone.name.toUpperCase()}</div>

      {/* Modifier banner */}
      {mod.id!=="none"&&<div style={{position:"absolute",top:5,left:5,right:5,zIndex:20,display:"flex",justifyContent:"center"}}><div style={{padding:"3px 12px",borderRadius:5,background:`${mod.color}15`,border:`1px solid ${mod.color}30`,textAlign:"center"}}><span style={{fontFamily:"var(--font-data)",fontSize:6,color:mod.color}}>{mod.icon} {mod.name.toUpperCase()}</span><span style={{fontFamily:"var(--font-data)",fontSize:5,color:"#9B8E7E",marginLeft:4}}>{mod.desc}</span></div></div>}
      {mod.id==="none"&&<div style={{position:"absolute",top:6,left:"50%",transform:"translateX(-50%)",zIndex:20,fontFamily:"var(--font-data)",fontSize:7,color:"#D4A64B",letterSpacing:2,textShadow:"0 0 8px rgba(212,166,75,.3)"}}>ENCOUNTER {enc}</div>}

      {/* Round indicator */}
      {curRound>0&&phase===PH.BATTLE&&<div style={{position:"absolute",top:mod.id!=="none"?24:20,left:"50%",transform:"translateX(-50%)",zIndex:20,fontFamily:"var(--font-data)",fontSize:6,color:"#6ac8d8",animation:"pulse .8s infinite"}}>ROUND {curRound}</div>}

      {/* Flavor text on approach — positioned at top so fighters show below */}
      {phase===PH.APPROACH&&<div style={{position:"absolute",top:"8%",left:"50%",transform:"translateX(-50%)",zIndex:15,textAlign:"center",maxWidth:"78%",animation:"fadeUp .6s ease"}}><div style={{fontSize:12,fontStyle:"italic",color:"rgba(255,255,255,.45)",lineHeight:1.5,textShadow:"0 2px 8px rgba(0,0,0,.9)"}}>"{flavor}"</div></div>}

      {/* VS text */}
      {phase===PH.FACEOFF&&<div style={{position:"absolute",top:"48%",left:"50%",transform:"translate(-50%,-50%)",zIndex:15,fontFamily:"var(--font-title)",fontSize:28,fontWeight:900,color:"#D4A64B",textShadow:"0 0 18px rgba(212,166,75,.4)",letterSpacing:6}}>VS</div>}

      {/* Battle result text */}
      {phase===PH.BATTLE&&battleResult&&<div style={{position:"absolute",top:"44%",left:"50%",transform:"translate(-50%,-50%)",zIndex:25,fontFamily:"var(--font-title)",fontSize:24,fontWeight:900,color:battleResult==="win"?"#D4A64B":"#e85a6a",textShadow:`0 0 24px ${battleResult==="win"?"rgba(212,166,75,.4)":"rgba(232,90,106,.4)"}`,animation:"fadeUp .5s ease"}}>{battleResult==="win"?"VICTORY":"DEFEATED"}</div>}

      {/* Fighters - visible during approach, faceoff, and battle */}
      {phase>=PH.APPROACH&&<>
        <div style={{position:"absolute",top:"8%",bottom:"8%",left:"50%",width:1,background:"linear-gradient(180deg,transparent,rgba(212,166,75,.06),transparent)",zIndex:4}}/>
        <div style={{position:"absolute",bottom:8,left:"2%",width:"46%",zIndex:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",animation:"slideInLeft .5s ease both",opacity:phase===PH.APPROACH?.7:1,transition:"opacity .3s"}}>
          <PlayerNine shake={pShake} flash={pFlash!==null} flashColor={pFlash}/>
          {phase>=PH.FACEOFF&&<HpBar current={playerHp} max={pStats.hp} color={pColor} side="left"/>}
        </div>
        <div style={{position:"absolute",bottom:8,right:"2%",width:"46%",zIndex:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",animation:"slideInRight .5s ease .12s both",opacity:phase===PH.APPROACH?.7:1,transition:"opacity .3s"}}>
          {enemy&&<EnemyFighter enemy={enemy} shake={eShake} flash={eFlash!==null} flashColor={eFlash}/>}
          {phase>=PH.FACEOFF&&<HpBar current={enemyHp} max={enemy.stats.hp} color={eColor} side="right"/>}
        </div>
      </>}
      <FloatingNumbers floats={floats}/>
      <SlashFx slashes={slashes}/>
    </div>

    {/* ═══ BELOW-ARENA CONTROLS ═══ */}
    <div style={{width:"100%",padding:"0 12px"}}>

      {/* APPROACH PHASE — stats preview + card slots + approach button */}
      {phase===PH.APPROACH&&<div style={{marginTop:8}}>

        {/* STATS PREVIEW — your stats visible, enemy hidden */}
        <div style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,padding:"0 4px"}}>
            <span style={{fontFamily:"var(--font-data)",fontSize:7,color:pColor}}>{PB.houseData.icon} YOU {selected.length>0?`(${selected.length} cards)`:""}</span>
            <span style={{fontFamily:"var(--font-data)",fontSize:7,color:"#6B5E50"}}>ENEMY {eColor&&enemy?enemy.houseData.icon:""}</span>
          </div>
          {STATS.map(s=><div key={s.key} style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
            <span style={{fontFamily:"var(--font-data)",fontSize:10,width:28,textAlign:"right",fontWeight:700,color:s.color}}>{pStats[s.key]}</span>
            <div style={{flex:1,height:4,background:"rgba(255,255,255,.03)",borderRadius:2,overflow:"hidden",direction:"rtl"}}><div style={{width:`${(pStats[s.key]/Math.max(pStats[s.key],20))*100}%`,height:"100%",borderRadius:2,background:`linear-gradient(270deg,${s.color},${s.color}30)`}}/></div>
            <span style={{fontFamily:"var(--font-data)",fontSize:7,color:s.color,width:32,textAlign:"center",opacity:.5}}>{s.label}</span>
            <div style={{flex:1,height:4,background:"rgba(255,255,255,.03)",borderRadius:2,overflow:"hidden"}}><div style={{width:"45%",height:"100%",borderRadius:2,background:"linear-gradient(90deg,rgba(255,255,255,.06),rgba(255,255,255,.02))"}}/></div>
            <span style={{fontFamily:"var(--font-data)",fontSize:10,width:28,textAlign:"left",fontWeight:700,color:"#3a3545"}}>???</span>
          </div>)}
        </div>

        {/* Tip */}
        <div style={{textAlign:"center",marginBottom:6}}>
          <span style={{fontFamily:"var(--font-data)",fontSize:6,color:"#6B5E50",opacity:.7}}>💡 Cards tire after use. You don't need to fill all 3.</span>
        </div>

        {/* YOUR HAND — horizontal scroll of CardV4 tiny */}
        <div style={{fontFamily:"var(--font-data)",fontSize:8,color:"#D4A64B",letterSpacing:1,marginBottom:6,textAlign:"center"}}>YOUR HAND — {selected.length}/3</div>
        <div style={{display:"flex",gap:8,marginBottom:8,justifyContent:"center",alignItems:"flex-start"}}>
          {[0,1,2].map(i=>{
            if(selected[i]){
              return <div key={`sel-${i}`} style={{position:"relative",cursor:"pointer",transition:"transform .2s",transform:"scale(1)"}} onClick={()=>openPicker(i)}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px)"}} onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)"}}>
                <CardV4 card={selected[i]} size="tiny"/>
                <div onClick={e=>{e.stopPropagation();removeCard(i)}} style={{position:"absolute",top:-4,right:-4,width:20,height:20,borderRadius:"50%",background:"rgba(232,90,106,.85)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",cursor:"pointer",zIndex:20,lineHeight:1,border:"1px solid rgba(0,0,0,.3)"}}>×</div>
              </div>
            }
            return <div key={`empty-${i}`} onClick={()=>openPicker(i)} style={{width:110,height:160,borderRadius:10,border:"1.5px dashed rgba(255,255,255,.08)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"rgba(255,255,255,.01)",transition:"all .2s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(212,166,75,.25)";e.currentTarget.style.background="rgba(212,166,75,.02)"}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,.08)";e.currentTarget.style.background="rgba(255,255,255,.01)"}}>
              <span style={{fontSize:22,opacity:.15,marginBottom:4}}>+</span>
              <span style={{fontFamily:"var(--font-data)",fontSize:6,color:"#6B5E50"}}>TAP TO PICK</span>
            </div>
          })}
        </div>

        {/* Stat bonus preview */}
        {selected.length>0&&<div style={{fontFamily:"var(--font-data)",fontSize:8,color:"#9B8E7E",marginBottom:6,textAlign:"center"}}>
          <span style={{color:"#e85a6a"}}>+{selected.reduce((a,c)=>a+c.atk,0)} ATK</span>{" "}
          <span style={{color:"#6acd8a"}}>+{selected.reduce((a,c)=>a+c.hp,0)} HP</span>
          {selected.reduce((a,c)=>a+c.spd,0)>0&&<span style={{color:"#6ac8d8"}}> +{selected.reduce((a,c)=>a+c.spd,0)} SPD</span>}
          {selected.reduce((a,c)=>a+c.def,0)>0&&<span style={{color:"#b088e8"}}> +{selected.reduce((a,c)=>a+c.def,0)} DEF</span>}
          {selected.reduce((a,c)=>a+c.luck,0)>0&&<span style={{color:"#D4A64B"}}> +{selected.reduce((a,c)=>a+c.luck,0)} LUCK</span>}
        </div>}

        {/* APPROACH BUTTON */}
        <div style={{textAlign:"center",margin:"6px 0 14px"}}>
          <button onClick={approach} disabled={!canFight} style={{padding:"13px 40px",borderRadius:10,border:`1px solid ${canFight?"rgba(212,166,75,.3)":"rgba(255,255,255,.04)"}`,cursor:canFight?"pointer":"not-allowed",fontFamily:"var(--font-title)",fontSize:16,fontWeight:700,letterSpacing:3,background:canFight?"linear-gradient(135deg,rgba(212,166,75,.15),rgba(212,166,75,.05))":"rgba(255,255,255,.02)",color:canFight?"#D4A64B":"#6B5E50",opacity:canFight?1:.4,transition:"all .2s"}}>{canFight?"🐾 APPROACH":"PICK CARDS TO APPROACH"}</button>
        </div>
      </div>}

      {/* FACEOFF PHASE — stat comparison + fight button */}
      {phase===PH.FACEOFF&&<div style={{marginTop:6}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontFamily:"var(--font-data)",fontSize:7,color:pColor}}>{PB.houseData.icon} YOU ({selected.length} cards)</span><span style={{fontFamily:"var(--font-data)",fontSize:7,color:eColor}}>ENEMY ({enemy.cards.length}) {enemy.houseData.icon}</span></div>
        {mod.hideStats?<div style={{textAlign:"center",padding:16,fontFamily:"var(--font-data)",fontSize:8,color:"#847C98"}}>🌫️ FOG OF WAR — Enemy stats hidden</div>
         :STATS.map(s=><StatBar key={s.key} s={s} pv={pStats[s.key]} ev={(mod?.apply?mod.apply({...enemy.stats}):enemy.stats)[s.key]}/>)}
        {selected.some(c=>c.effects.length>0)&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}><span style={{fontFamily:"var(--font-data)",fontSize:6,color:"#6B5E50"}}>YOUR FX:</span>{selected.flatMap(c=>c.effects).map((e,i)=><span key={i} style={{fontSize:7,padding:"2px 5px",borderRadius:4,background:`${e.color}15`,color:e.color,fontFamily:"var(--font-data)"}}>{e.tag}</span>)}</div>}
        <div style={{textAlign:"center",margin:"12px 0 16px"}}><button onClick={fight} style={{padding:"14px 40px",borderRadius:12,border:"none",cursor:"pointer",fontFamily:"var(--font-title)",fontSize:16,fontWeight:700,letterSpacing:4,background:"linear-gradient(135deg,#D4A64B,#c49a3a)",color:"#120e1e",boxShadow:"0 4px 20px rgba(212,166,75,.3)"}}>⚔️ FIGHT</button></div>
      </div>}

      {/* BATTLE LOG */}
      {battleLog.length>0&&<BattleLog events={battleLog}/>}

      <div style={{height:20}}/>
    </div>

    {/* CARD PICKER MODAL */}
    {pickerSlot!==null&&<CardPickerModal pool={runPool} fatigued={fatigued} selected={selected} slotIndex={pickerSlot} onSelect={selectCard} onClose={()=>setPickerSlot(null)}/>}
  </div>);
}

ReactDOM.render(React.createElement(TheWilds), document.getElementById("root"));
  </script>
  <script src="/js/nav.js"></script>
</body>
</html>
