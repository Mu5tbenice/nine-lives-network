// ═══ GENERATORS ═══
const pick=a=>a[Math.floor(Math.random()*a.length)];
const pickN=(a,n)=>{const s=[...a];const r=[];for(let i=0;i<n&&s.length;i++){const x=Math.floor(Math.random()*s.length);r.push(s.splice(x,1)[0])}return r};

  expression:[{id:"grumpy",s:{atk:1},r:"common"},{id:"glow",s:{atk:1,spd:1},r:"uncommon"}],
  headwear:[{id:"hat",s:{def:1},r:"common"},{id:"hood",s:{spd:1,def:1},r:"uncommon"},{id:"void_hood",s:{luck:1,def:1,spd:1},r:"rare"}],
};
const RO=["common","uncommon","rare"];
const getRW=f=>{f=Math.max(1,Math.min(f,15));if(f<=3)return{common:70,uncommon:25,rare:5};if(f<=6)return{common:40,uncommon:40,rare:20};if(f<=9)return{common:15,uncommon:45,rare:40};return{common:5,uncommon:25,rare:70}};
const wPick=(items,w)=>{const p=[];RO.forEach(r=>{const wt=w[r]||0;items.filter(i=>i.r===r).forEach(it=>{for(let i=0;i<wt;i++)p.push(it)})});return p.length?pick(p):pick(items)};
const floorB=f=>{const b=Math.max(1,f)-1;return{atk:Math.floor(b*.55),hp:Math.floor(b*1.1),spd:Math.floor(b*.25),def:Math.floor(b*.25),luck:Math.floor(b*.15)}};

function genEnemy(enc){
  const hk=pick(HK),h=HS[hk];let name=pick(N1)+pick(N2);
  if(enc>=6||Math.random()<.3)name+=" "+pick(TIT);
  const w=getRW(enc),eq={};
  ESLOTS.forEach(s=>{const c=EQ[s];if(!c?.length){eq[s]=null;return}eq[s]=wPick(c,w)});
  const st={atk:h.atk,hp:h.hp,spd:h.spd,def:h.def||0,luck:h.luck||0};
  ESLOTS.forEach(s=>{const it=eq[s];if(it?.s)Object.keys(it.s).forEach(k=>{st[k]=(st[k]||0)+it.s[k]})});
  const b=floorB(enc);Object.keys(b).forEach(k=>{st[k]=(st[k]||0)+b[k]});
  const numCards=enc<=2?1:enc<=5?2:3;
  const cards=pickN(E_CARDS,numCards);
  cards.forEach(c=>{st.atk+=c.atk;st.hp+=c.hp;st.spd+=c.spd;st.def+=c.def;st.luck+=c.luck});
  return{name,house:hk,houseData:h,equipped:eq,stats:{...st},cards};
}

function getModifier(enc){
  if(enc<=1)return MODIFIERS[0];
  if(enc<=3&&Math.random()<.4)return MODIFIERS[0];
  const pool=MODIFIERS.filter(m=>m.id!=="none");
  return pick(pool);
}

function calcPS(cards,mod){
  const s={atk:PB.baseStats.atk+PB.gearStats.atk,hp:PB.baseStats.hp+PB.gearStats.hp,spd:PB.baseStats.spd+PB.gearStats.spd,def:PB.baseStats.def+PB.gearStats.def,luck:PB.baseStats.luck+PB.gearStats.luck};
  const mult=mod?.cardBonus||1;
  cards.forEach(c=>{s.atk+=Math.floor(c.atk*mult);s.hp+=Math.floor(c.hp*mult);s.spd+=Math.floor(c.spd*mult);s.def+=Math.floor(c.def*mult);s.luck+=Math.floor(c.luck*mult)});
  return mod?.apply?mod.apply(s):s;
}

// ═══ COMBAT ═══
function simulate(pS,eS,pCards,eCards,mod){
  let php=pS.hp,ehp=eS.hp;const rounds=[];
  const pEff=pCards.flatMap(c=>c.effects.map(e=>e.tag));
  const eEff=eCards.flatMap(c=>c.effects.map(e=>e.tag));
  const bMult=mod?.burnMult||1;const hMult=mod?.healMult||1;const lMult=mod?.luckMult||1;const thorns=mod?.thorns||0;
  const maxR=mod?.maxRounds||6;

  const burnV=t=>{const b=t.find(e=>e.startsWith("BURN"));if(!b)return 0;return(parseInt(b.replace(/\D/g,""))||2)*bMult};
  const healV=t=>{const h=t.find(e=>e.startsWith("HEAL"));if(!h)return 0;return Math.floor((parseInt(h.replace(/\D/g,""))||3)*hMult)};

  for(let r=0;r<maxR;r++){
    if(php<=0||ehp<=0)break;
    const pFirst=mod?.randomInit?Math.random()<.5:Math.random()<(pS.spd/Math.max(pS.spd+eS.spd,1));
    const round={num:r+1,pFirst,events:[]};

    const doAtk=(aS,dS,isP,eff)=>{
      const weakened=((isP?eEff:pEff).includes("WEAKEN"));
      if(Math.random()<dS.luck*.015*lMult)return{type:"dodge",isPlayer:isP,dmg:0};
      let dmg=Math.max(1,aS.atk-Math.floor(dS.def*.5));
      if(weakened&&!isP)dmg=Math.floor(dmg*.5);
      const hasCrit=eff.includes("CRIT");
      const crit=Math.random()<(hasCrit?.25:aS.luck*.02)*lMult;
      if(crit)dmg=Math.floor(dmg*1.8);
      return{type:crit?"crit":"hit",isPlayer:isP,dmg};
    };

    const order=pFirst?[{s:pS,p:true,e:pEff},{s:eS,p:false,e:eEff}]:[{s:eS,p:false,e:eEff},{s:pS,p:true,e:pEff}];
    for(const f of order){
      if(php<=0||ehp<=0)break;
      const res=doAtk(f.s,f.p?eS:pS,f.p,f.e);
      round.events.push(res);
      if(res.dmg>0){
        if(f.p){ehp=Math.max(0,ehp-res.dmg)}else{php=Math.max(0,php-res.dmg)}
        if(thorns>0){round.events.push({type:"thorns",isPlayer:f.p,dmg:thorns});if(f.p)php=Math.max(0,php-thorns);else ehp=Math.max(0,ehp-thorns)}
      }
      const bv=burnV(f.e);
      if(bv>0){round.events.push({type:"burn",isPlayer:f.p,dmg:bv});if(f.p)ehp=Math.max(0,ehp-bv);else php=Math.max(0,php-bv)}
    }
    const phv=healV(pEff);if(phv>0&&php>0){php=Math.min(pS.hp,php+phv);round.events.push({type:"heal",isPlayer:true,dmg:phv})}
    const ehv=healV(eEff);if(ehv>0&&ehp>0){ehp=Math.min(eS.hp,ehp+ehv);round.events.push({type:"heal",isPlayer:false,dmg:ehv})}
    round.phpAfter=php;round.ehpAfter=ehp;rounds.push(round);
  }
  return{rounds,playerWon:php>ehp,finalPhp:Math.max(0,php),finalEhp:Math.max(0,ehp)};
}

// ═══ PHASES ═══
const PH={DRAFT:0,APPROACH:1,FACEOFF:2,BATTLE:3,REWARD:4,RESULT:5};

function TheWilds(){
  // Run state
  const[phase,setPhase]=useState(PH.DRAFT);
  const[enc,setEnc]=useState(1);
  const[runPool,setRunPool]=useState([]);
  const[newCardIds,setNewCardIds]=useState([]);
  const[fatigued,setFatigued]=useState({});// {cardId: encountersLeft}
  const[selected,setSelected]=useState([]);
  const[currentHp,setCurrentHp]=useState(0);
  const[maxHp,setMaxHp]=useState(0);
  const[enemy,setEnemy]=useState(null);
  const[zone,setZone]=useState(()=>pick(ZONES));
  const[mod,setMod]=useState(MODIFIERS[0]);
  const[flavor,setFlavor]=useState(()=>pick(FLAV));
  const[journey,setJourney]=useState([]);
  const[score,setScore]=useState(0);

  // Battle state
  const[battleLog,setBattleLog]=useState([]);
  const[playerHp,setPlayerHp]=useState(0);
  const[enemyHp,setEnemyHp]=useState(0);
  const[curRound,setCurRound]=useState(0);
  const[pShake,setPShake]=useState(false);
  const[eShake,setEShake]=useState(false);
  const[pFlash,setPFlash]=useState(null);
  const[eFlash,setEFlash]=useState(null);
  const[battleResult,setBattleResult]=useState(null);
  const[rewards,setRewards]=useState([]);
  const[animKey,setAnimKey]=useState(0);

  const pColor=PB.houseData.color,eColor=enemy?.houseData?.color||"#888";
  const pStats=calcPS(selected,mod);
  const hpForCombat=phase===PH.APPROACH?Math.min(currentHp,pStats.hp):playerHp;

  // ═══ ACTIONS ═══
  const startRun=()=>{
    const draft=pickN(FULL_COLLECTION,12);
    const baseS=calcPS([],null);
    setRunPool(draft);setNewCardIds([]);setFatigued({});setSelected([]);
    setCurrentHp(baseS.hp);setMaxHp(baseS.hp);setEnc(1);setJourney([]);setScore(0);
    const e=genEnemy(1);const z=pick(ZONES);const m=getModifier(1);
    setEnemy(e);setZone(z);setMod(m);setFlavor(pick(FLAV));
    setBattleLog([]);setBattleResult(null);setRewards([]);
    setPhase(PH.APPROACH);setAnimKey(k=>k+1);
  };

  const selectCard=c=>{if(selected.find(s=>s.id===c.id)||selected.length>=3||fatigued[c.id])return;setSelected([...selected,c])};
  const removeCard=i=>setSelected(selected.filter((_,j)=>j!==i));

  const approach=()=>{
    const ps=calcPS(selected,mod);
    const hp=Math.min(currentHp,ps.hp);
    setPlayerHp(hp);setEnemyHp(enemy.stats.hp);
    setPhase(PH.FACEOFF);
  };

  const fight=()=>{
    setPhase(PH.BATTLE);
    const ps=calcPS(selected,mod);
    const esMod=mod?.apply?mod.apply({...enemy.stats}):{...enemy.stats};
    const initHp=Math.min(currentHp,ps.hp);
    const result=simulate({...ps,hp:initHp},esMod,selected,enemy.cards,mod);
    let php=initHp,ehp=esMod.hp;const log=[];let delay=0;

    result.rounds.forEach(round=>{
      delay+=400;setTimeout(()=>{setCurRound(round.num);log.push({text:`── ROUND ${round.num} ──`,color:"#D4A64B"});setBattleLog([...log])},delay);
      delay+=450;setTimeout(()=>{log.push({text:round.pFirst?"⚡ You seize initiative!":"⚡ Enemy strikes first!",color:round.pFirst?"#6acd8a":"#e85a6a"});setBattleLog([...log])},delay);
      round.events.forEach(ev=>{
        delay+=450;setTimeout(()=>{
          const who=ev.isPlayer?PB.name:enemy.name.split(" ")[0];const tgt=ev.isPlayer?enemy.name.split(" ")[0]:PB.name;
          if(ev.type==="dodge")log.push({text:`${tgt} dodged! 🌀`,color:"#6ac8d8"});
          else if(ev.type==="crit")log.push({text:`${who} CRITS for ${ev.dmg}! 💥`,color:"#D4A64B"});
          else if(ev.type==="burn")log.push({text:`🔥 BURN ${ev.dmg} → ${ev.isPlayer?enemy.name.split(" ")[0]:PB.name}`,color:"#ffaa55"});
          else if(ev.type==="heal")log.push({text:`✨ ${ev.isPlayer?PB.name:enemy.name.split(" ")[0]} heals ${ev.dmg}`,color:"#6acd8a"});
          else if(ev.type==="thorns")log.push({text:`🌿 Thorns reflect ${ev.dmg}!`,color:"#5CB338"});
          else log.push({text:`${who} → ${ev.dmg} dmg`,color:ev.isPlayer?"#6acd8a":"#e85a6a"});
          setBattleLog([...log]);
          if(ev.dmg>0&&ev.type!=="heal"){
            if(ev.isPlayer){ehp=Math.max(0,ehp-ev.dmg);setEnemyHp(ehp);setEShake(true);setEFlash(ev.type==="crit"?"#D4A64B":ev.type==="burn"?"#ffaa55":"#e85a6a");setTimeout(()=>{setEShake(false);setEFlash(null)},220)}
            else{php=Math.max(0,php-ev.dmg);setPlayerHp(php);setPShake(true);setPFlash(ev.type==="crit"?"#D4A64B":"#e85a6a");setTimeout(()=>{setPShake(false);setPFlash(null)},220)}
          }
          if(ev.type==="heal"){if(ev.isPlayer){php=Math.min(ps.hp,php+ev.dmg);setPlayerHp(php)}else{ehp=Math.min(esMod.hp,ehp+ev.dmg);setEnemyHp(ehp)}}
          if(ev.type==="thorns"){if(ev.isPlayer){php=Math.max(0,php-ev.dmg);setPlayerHp(php)}else{ehp=Math.max(0,ehp-ev.dmg);setEnemyHp(ehp)}}
        },delay);
      });
    });

    delay+=600;
    setTimeout(()=>{
      const won=result.playerWon;
      setBattleResult(won?"win":"lose");
      log.push({text:won?"🏆 VICTORY!":"💀 DEFEATED",color:won?"#D4A64B":"#e85a6a"});
      setBattleLog([...log]);
      setJourney(j=>[...j,{enc,zone:zone.name,enemy:enemy.name,house:enemy.house,won}]);
      if(won){
        const newFat={...fatigued};selected.forEach(c=>{newFat[c.id]=1});
        Object.keys(newFat).forEach(k=>{if(newFat[k]!==undefined){newFat[k]--;if(newFat[k]<=0)delete newFat[k]}});
        // Wait actually: selected cards get fatigue=1, existing fatigue decrements
        const updatedFat={};
        // First decrement existing
        Object.keys(fatigued).forEach(k=>{const v=fatigued[k]-1;if(v>0)updatedFat[k]=v});
        // Then add new fatigue for played cards
        selected.forEach(c=>{updatedFat[c.id]=1});
        setFatigued(updatedFat);

        const heal=Math.floor(ps.hp*.2);
        const newHp=Math.min(ps.hp,result.finalPhp+heal);
        setCurrentHp(newHp);setScore(s=>s+enc*10+5);

        const rw=pickN(REWARD_POOL.filter(c=>!runPool.find(p=>p.id===c.id)),3);
        setRewards(rw);
        setPhase(PH.REWARD);
      } else {
        setCurrentHp(0);setPhase(PH.RESULT);
      }
    },delay);
  };

  const pickReward=(card)=>{
    setRunPool(p=>[...p,card]);setNewCardIds(n=>[...n,card.id]);setRewards([]);
    const e=genEnemy(enc+1);const z=pick(ZONES);const m=getModifier(enc+1);
    setEnemy(e);setZone(z);setMod(m);setFlavor(pick(FLAV));setEnc(enc+1);
    setSelected([]);setBattleLog([]);setCurRound(0);setBattleResult(null);
    setAnimKey(k=>k+1);setPhase(PH.APPROACH);
  };

  const skipReward=()=>{
    setRewards([]);
    const e=genEnemy(enc+1);const z=pick(ZONES);const m=getModifier(enc+1);
    setEnemy(e);setZone(z);setMod(m);setFlavor(pick(FLAV));setEnc(enc+1);
    setSelected([]);setBattleLog([]);setCurRound(0);setBattleResult(null);
    setAnimKey(k=>k+1);setPhase(PH.APPROACH);
  };

  const diff=enc<=3?"Quiet Path":enc<=5?"Contested Trail":enc<=8?"Dangerous Territory":enc<=11?"The Deep Wilds":"Edge of Nethara";
  const canFight=selected.length>=1;
  const fatiguedCount=Object.keys(fatigued).length;
  const availCount=runPool.filter(c=>!fatigued[c.id]).length;

  // ═══ DRAFT SCREEN ═══
  if(phase===PH.DRAFT){
    return(<div style={{minHeight:"100vh",background:"#0a0812",color:"#D4C8B8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Crimson Text',serif"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:24,fontWeight:700,color:"#D4A64B",letterSpacing:4,marginBottom:4}}>THE WILDS</div>
      <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:"#6B5E50",marginBottom:20,letterSpacing:1}}>A ROGUELIKE ADVENTURE THROUGH NETHARA</div>
      <div style={{maxWidth:400,textAlign:"center",marginBottom:20}}>
        <div style={{fontFamily:"'Crimson Text',serif",fontSize:15,color:"#9B8E7E",lineHeight:1.6,marginBottom:12}}>
          Your Nine wanders The Wilds — unknown lands where danger lurks at every turn. You'll be dealt a random hand of cards from your collection. Choose wisely — cards get <span style={{color:"#e85a6a"}}>tired after use</span>, your <span style={{color:"#6acd8a"}}>HP carries between fights</span>, and each zone has its own rules.
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:16}}>
          {[{icon:"🃏",label:"12 random cards",desc:"from your collection"},{icon:"❤️",label:"HP carries over",desc:"+20% heal between fights"},{icon:"😴",label:"Card fatigue",desc:"used cards rest 1 encounter"},{icon:"🎁",label:"Win rewards",desc:"pick new cards after wins"},{icon:"⚡",label:"Zone modifiers",desc:"change combat rules"}].map((f,i)=>
            <div key={i} style={{padding:"6px 10px",borderRadius:6,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.04)",textAlign:"center",width:130}}>
              <div style={{fontSize:16,marginBottom:2}}>{f.icon}</div>
              <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:"#D4A64B",marginBottom:1}}>{f.label}</div>
              <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#6B5E50"}}>{f.desc}</div>
            </div>
          )}
        </div>
      </div>
      <button onClick={startRun} style={{padding:"14px 40px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:16,fontWeight:700,letterSpacing:4,background:"linear-gradient(135deg,#D4A64B,#c49a3a)",color:"#120e1e",boxShadow:"0 4px 20px rgba(212,166,75,.3)"}}>
        BEGIN JOURNEY
      </button>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=Grenze+Gotisch:wght@400;700&family=Cormorant+SC:wght@400;600;700&family=Almendra&family=Fondamento&family=Pirata+One&family=IM+Fell+English+SC&family=MedievalSharp&family=Griffy&display=swap');`}</style>
    </div>);
  }

  // ═══ RESULT SCREEN (death) ═══
  if(phase===PH.RESULT&&battleResult==="lose"){
    return(<div style={{minHeight:"100vh",background:"#0a0812",color:"#D4C8B8",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Crimson Text',serif"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:22,fontWeight:900,color:"#e85a6a",letterSpacing:3,marginBottom:4}}>JOURNEY'S END</div>
      <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:"#6B5E50",marginBottom:16}}>DEFEATED AT ENCOUNTER {enc} · {zone.name.toUpperCase()}</div>
      <div style={{display:"flex",gap:3,marginBottom:16,flexWrap:"wrap",justifyContent:"center"}}>
        {journey.map((j,i)=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:j.won?HS[j.house].color:"#e85a6a40",border:`1px solid ${j.won?HS[j.house].color+"50":"#e85a6a30"}`}} title={`${j.zone}: ${j.enemy}`}/>)}
      </div>
      <div style={{display:"flex",gap:16,marginBottom:20}}>
        <div style={{textAlign:"center"}}><div style={{fontFamily:"'Press Start 2P',monospace",fontSize:16,color:"#D4A64B",fontWeight:700}}>{enc-1}</div><div style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:"#6B5E50"}}>VICTORIES</div></div>
        <div style={{textAlign:"center"}}><div style={{fontFamily:"'Press Start 2P',monospace",fontSize:16,color:"#6acd8a",fontWeight:700}}>{score}</div><div style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:"#6B5E50"}}>POINTS</div></div>
        <div style={{textAlign:"center"}}><div style={{fontFamily:"'Press Start 2P',monospace",fontSize:16,color:"#6ac8d8",fontWeight:700}}>{runPool.length}</div><div style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:"#6B5E50"}}>CARDS</div></div>
      </div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>setPhase(PH.DRAFT)} style={{padding:"12px 30px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,letterSpacing:3,background:"linear-gradient(135deg,#D4A64B,#c49a3a)",color:"#120e1e"}}>NEW JOURNEY</button>
      </div>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Press+Start+2P&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');`}</style>
    </div>);
  }

  // ═══ MAIN GAME LOOP ═══
  return(
    <div style={{minHeight:"100vh",background:"#0a0812",color:"#D4C8B8",fontFamily:"'Crimson Text',serif",display:"flex",flexDirection:"column",alignItems:"center",maxWidth:520,margin:"0 auto"}}>
      {/* Header */}
      <div style={{width:"100%",padding:"8px 12px 2px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color:"#D4A64B",letterSpacing:3}}>THE WILDS</div>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#6B5E50"}}>ENC {enc} · {diff.toUpperCase()}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{display:"flex",alignItems:"center",gap:3,justifyContent:"flex-end"}}>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#6B5E50"}}>HP</span>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:8,color:currentHp<maxHp*.3?"#e85a6a":"#6acd8a",fontWeight:700}}>{phase>=PH.BATTLE?playerHp:currentHp}</span>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#6B5E50"}}>/{maxHp}</span>
          </div>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#D4A64B",marginTop:1}}>🃏 {runPool.length} cards · ⭐ {score} pts</div>
        </div>
      </div>

      {/* Journey dots */}
      {journey.length>0&&<div style={{display:"flex",gap:2,padding:"2px 12px",flexWrap:"wrap"}}>
        {journey.map((j,i)=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:j.won?HS[j.house].color:"#e85a6a35",border:`1px solid ${j.won?HS[j.house].color+"40":"#e85a6a20"}`}}/>)}
        <div style={{width:6,height:6,borderRadius:"50%",border:"1px solid #D4A64B30",animation:"pulse 1.5s infinite"}}/>
      </div>}

      {/* ═══ ARENA ═══ */}
      <div key={animKey} style={{width:"100%",aspectRatio:"16/9",position:"relative",overflow:"hidden",borderRadius:12,margin:"5px 10px",border:"1px solid rgba(255,255,255,.04)",background:"#0e0a18"}}>
        <div style={{position:"absolute",inset:0,backgroundImage:`url(${ZP}${zone.img})`,backgroundSize:"cover",backgroundPosition:"center",filter:phase===PH.APPROACH||phase===PH.REWARD?"brightness(.5) saturate(.55)":"brightness(.28) saturate(.4)",transition:"filter .7s"}}>
          <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 80%,transparent 15%,rgba(10,8,18,.7) 60%)"}}/>
        </div>

        {/* Zone name */}
        <div style={{position:"absolute",bottom:3,left:"50%",transform:"translateX(-50%)",zIndex:20,fontFamily:"'Cinzel',serif",fontSize:7,color:"rgba(255,255,255,.18)",letterSpacing:2}}>{zone.name.toUpperCase()}</div>

        {/* Modifier banner */}
        {mod.id!=="none"&&<div style={{position:"absolute",top:4,left:4,right:4,zIndex:20,display:"flex",justifyContent:"center"}}>
          <div style={{padding:"3px 10px",borderRadius:5,background:`${mod.color}12`,border:`1px solid ${mod.color}25`,textAlign:"center",maxWidth:"90%"}}>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:mod.color}}>{mod.icon} {mod.name.toUpperCase()}</span>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#9B8E7E",marginLeft:4}}>{mod.desc}</span>
          </div>
        </div>}

        {/* Encounter # */}
        {mod.id==="none"&&<div style={{position:"absolute",top:5,left:"50%",transform:"translateX(-50%)",zIndex:20,fontFamily:"'Press Start 2P',monospace",fontSize:6,color:"#D4A64B",letterSpacing:2,textShadow:"0 0 6px rgba(212,166,75,.3)"}}>ENCOUNTER {enc}</div>}
        {curRound>0&&phase===PH.BATTLE&&<div style={{position:"absolute",top:mod.id!=="none"?22:16,left:"50%",transform:"translateX(-50%)",zIndex:20,fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#6ac8d8",animation:"pulse .8s infinite"}}>ROUND {curRound}</div>}

        {/* Approach flavor */}
        {phase===PH.APPROACH&&<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",zIndex:15,textAlign:"center",maxWidth:"80%",animation:"fadeUp .6s ease"}}>
          <div style={{fontFamily:"'Crimson Text',serif",fontSize:14,fontStyle:"italic",color:"rgba(255,255,255,.45)",lineHeight:1.5,textShadow:"0 2px 6px rgba(0,0,0,.8)"}}>"{flavor}"</div>
        </div>}

        {/* Reward overlay */}
        {phase===PH.REWARD&&<div style={{position:"absolute",top:"42%",left:"50%",transform:"translate(-50%,-50%)",zIndex:25,textAlign:"center",animation:"fadeUp .5s ease"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:900,color:"#D4A64B",letterSpacing:3,textShadow:"0 0 20px rgba(212,166,75,.4)"}}>VICTORY</div>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#6acd8a",marginTop:2}}>+{Math.floor(pStats.hp*.2)} HP healed · +{enc*10+5} pts</div>
        </div>}

        {/* VS / Result */}
        {phase===PH.FACEOFF&&<div style={{position:"absolute",top:"48%",left:"50%",transform:"translate(-50%,-50%)",zIndex:15,fontFamily:"'Cinzel',serif",fontSize:24,fontWeight:900,color:"#D4A64B",textShadow:"0 0 15px rgba(212,166,75,.35)",letterSpacing:5}}>VS</div>}
        {phase===PH.BATTLE&&battleResult&&<div style={{position:"absolute",top:"44%",left:"50%",transform:"translate(-50%,-50%)",zIndex:25,fontFamily:"'Cinzel',serif",fontSize:22,fontWeight:900,color:battleResult==="win"?"#D4A64B":"#e85a6a",textShadow:`0 0 20px ${battleResult==="win"?"rgba(212,166,75,.4)":"rgba(232,90,106,.35)"}`,animation:"fadeUp .5s ease"}}>{battleResult==="win"?"VICTORY":"DEFEATED"}</div>}

        {phase!==PH.APPROACH&&phase!==PH.REWARD&&<div style={{position:"absolute",top:"8%",bottom:"8%",left:"50%",width:1,background:"linear-gradient(180deg,transparent,rgba(212,166,75,.05),transparent)",zIndex:4}}/>}

        {/* Player fighter */}
        {phase!==PH.APPROACH&&phase!==PH.REWARD&&<div style={{position:"absolute",bottom:10,left:"4%",width:"42%",height:"76%",zIndex:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",animation:"slideInLeft .5s ease both"}}>
          <div style={{textAlign:"center",marginBottom:2}}>
            <div style={{fontFamily:PB.houseData.font,fontSize:12,fontWeight:700,color:"#F5F0E8",textShadow:`0 0 8px ${pColor}40`}}>{PB.name}</div>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:3,color:pColor}}>{PB.houseData.icon} {PB.houseData.name.toUpperCase()}</div>
          </div>
          <Fighter color={pColor} shake={pShake} flash={pFlash!==null} flashColor={pFlash}/>
          {phase>=PH.BATTLE&&<HpBar current={playerHp} max={pStats.hp} color={pColor} side="left"/>}
        </div>}

        {/* Enemy fighter */}
        {phase!==PH.APPROACH&&phase!==PH.REWARD&&enemy&&<div style={{position:"absolute",bottom:10,right:"4%",width:"42%",height:"76%",zIndex:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",animation:"slideInRight .5s ease .12s both"}}>
          <div style={{textAlign:"center",marginBottom:2}}>
            <div style={{fontFamily:enemy.houseData.font,fontSize:12,fontWeight:700,color:"#F5F0E8",textShadow:`0 0 8px ${eColor}40`}}>{enemy.name}</div>
            <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:3,color:eColor}}>{enemy.houseData.icon} {enemy.houseData.name.toUpperCase()}</div>
          </div>
          <Fighter color={eColor} shake={eShake} flash={eFlash!==null} flashColor={eFlash}/>
          {phase>=PH.BATTLE&&<HpBar current={enemyHp} max={enemy.stats.hp} color={eColor} side="right"/>}
        </div>}
      </div>

      {/* ═══ BELOW ARENA ═══ */}
      <div style={{width:"100%",padding:"0 10px"}}>

        {/* CARD SELECT — approach */}
        {phase===PH.APPROACH&&<div style={{marginTop:4}}>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:"#D4A64B",letterSpacing:1,marginBottom:3}}>YOUR HAND — {selected.length}/3 CARDS</div>
          <div style={{display:"flex",gap:6,minHeight:145,marginBottom:4,justifyContent:"center"}}>
            {[0,1,2].map(i=>selected[i]?<SpellCard key={i} card={selected[i]} size="slot" onClick={()=>removeCard(i)}/>:<EmptySlot key={i} i={i}/>)}
          </div>
          {selected.length>0&&<div style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#6B5E50",marginBottom:4}}>
            BONUS: <span style={{color:"#e85a6a"}}>+{selected.reduce((a,c)=>a+c.atk,0)}A</span> <span style={{color:"#6acd8a"}}>+{selected.reduce((a,c)=>a+c.hp,0)}H</span>
            {selected.reduce((a,c)=>a+c.spd,0)>0&&<span style={{color:"#6ac8d8"}}> +{selected.reduce((a,c)=>a+c.spd,0)}S</span>}
            {selected.reduce((a,c)=>a+c.luck,0)>0&&<span style={{color:"#D4A64B"}}> +{selected.reduce((a,c)=>a+c.luck,0)}L</span>}
          </div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:"#6B5E50"}}>YOUR POOL — {availCount} AVAILABLE{fatiguedCount>0?` · ${fatiguedCount} TIRED`:""}</span>
          </div>
          <div style={{maxHeight:340,overflowY:"auto",paddingRight:3}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
            {runPool.map(c=><SpellCard key={c.id} card={c} size="pool" onClick={()=>selectCard(c)} disabled={!!selected.find(s=>s.id===c.id)||!!fatigued[c.id]} fatigued={!!fatigued[c.id]} isNew={newCardIds.includes(c.id)} isSelected={!!selected.find(s=>s.id===c.id)}/>)}
            </div>
          </div>
        </div>}

        {/* Battle log */}
        {battleLog.length>0&&<BattleLog events={battleLog}/>}

        {/* Stat compare (faceoff) */}
        {phase===PH.FACEOFF&&<div style={{marginTop:3}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:pColor}}>{PB.houseData.icon} YOU ({selected.length} cards)</span>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:eColor}}>ENEMY ({enemy.cards.length}) {enemy.houseData.icon}</span>
          </div>
          {mod.hideStats?
            <div style={{textAlign:"center",padding:12,fontFamily:"'Press Start 2P',monospace",fontSize:5,color:"#847C98"}}>🌫️ FOG OF WAR — Enemy stats hidden</div>
          : STATS.map(s=><StatBar key={s.key} s={s} pv={pStats[s.key]} ev={(mod?.apply?mod.apply({...enemy.stats}):enemy.stats)[s.key]}/>)}

          {/* Effects */}
          {selected.some(c=>c.effects.length>0)&&<div style={{display:"flex",gap:2,flexWrap:"wrap",marginTop:3}}>
            <span style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#6B5E50"}}>YOUR FX:</span>
            {selected.flatMap(c=>c.effects).map((e,i)=><span key={i} style={{fontSize:5,padding:"1px 4px",borderRadius:3,background:`${e.color}12`,color:e.color,fontFamily:"'Press Start 2P',monospace"}}>{e.tag}</span>)}
          </div>}
        </div>}

        {/* REWARD PICK */}
        {phase===PH.REWARD&&<div style={{marginTop:6}}>
          <div style={{fontFamily:"'Press Start 2P',monospace",fontSize:5,color:"#D4A64B",letterSpacing:1,textAlign:"center",marginBottom:6}}>🎁 PICK A REWARD CARD</div>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>
            {rewards.map((c,i)=><SpellCard key={i} card={c} size="reward" onClick={()=>pickReward(c)}/>)}
          </div>
          <div style={{textAlign:"center",marginTop:6}}>
            <button onClick={skipReward} style={{fontFamily:"'Press Start 2P',monospace",fontSize:4,color:"#6B5E50",background:"none",border:"1px solid rgba(255,255,255,.06)",borderRadius:4,padding:"4px 12px",cursor:"pointer"}}>SKIP →</button>
          </div>
        </div>}

        {/* ACTIONS */}
        <div style={{textAlign:"center",margin:"10px 0 16px"}}>
          {phase===PH.APPROACH&&<button onClick={approach} disabled={!canFight} style={{
            padding:"11px 34px",borderRadius:10,border:`1px solid ${canFight?"rgba(255,255,255,.1)":"rgba(255,255,255,.04)"}`,cursor:canFight?"pointer":"not-allowed",
            fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,letterSpacing:3,
            background:canFight?"linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.03))":"rgba(255,255,255,.02)",
            color:canFight?"#D4C8B8":"#6B5E50",opacity:canFight?1:.4}}>
            🐾 APPROACH{!canFight?" — PICK CARDS":""}
          </button>}

          {phase===PH.FACEOFF&&<button onClick={fight} style={{
            padding:"11px 34px",borderRadius:10,border:"none",cursor:"pointer",
            fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,letterSpacing:3,
            background:"linear-gradient(135deg,#D4A64B,#c49a3a)",color:"#120e1e",boxShadow:"0 4px 16px rgba(212,166,75,.25)"}}>
            ⚔️ FIGHT
          </button>}
        </div>
      </div>

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=Grenze+Gotisch:wght@400;700&family=Cormorant+SC:wght@400;600;700&family=Almendra&family=Fondamento&family=Pirata+One&family=IM+Fell+English+SC&family=MedievalSharp&family=Griffy&display=swap');
        @keyframes slideInLeft{from{transform:translateX(-25px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slideInRight{from{transform:translateX(25px);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
      `}</style>
    </div>
  );
}

ReactDOM.render(React.createElement(TheWilds), document.getElementById("root"));
  </script>
</body>
</html>
