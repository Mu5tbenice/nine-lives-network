<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spellbook | Nine Lives Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(232,133,90,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,180,224,0.06) 0%,transparent 40%),linear-gradient(180deg,var(--bg-warm) 0%,var(--bg-mid) 30%,var(--bg-deep) 100%);font-family:var(--font-body);color:var(--text-body)}

    /* ─── Header ─── */
    .sb-header{text-align:center;padding:68px 16px 8px}
    .sb-title{font-family:var(--font-title);font-size:28px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
    .sb-sub{font-size:14px;color:var(--text-muted);margin-bottom:12px}

    /* ─── Discovery Progress ─── */
    .sb-progress{max-width:400px;margin:0 auto 8px;padding:0 16px}
    .sb-progress-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.04);overflow:hidden;margin-bottom:4px}
    .sb-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width 0.8s ease}
    .sb-progress-text{font-family:var(--font-data);font-size:8px;color:var(--text-faint);text-align:center;letter-spacing:1px}

    /* ─── Tabs ─── */
    .sb-tabs{display:flex;justify-content:center;gap:0;margin:16px auto 0;max-width:400px;border-bottom:1px solid var(--border-subtle)}
    .sb-tab{font-family:var(--font-title);font-size:13px;font-weight:600;color:var(--text-faint);padding:10px 24px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all 0.2s;letter-spacing:1px}
    .sb-tab:hover{color:var(--text-muted)}
    .sb-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

    /* ─── Filters ─── */
    .sb-filters{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;align-items:center;max-width:1100px;margin:0 auto}
    .filter-group{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
    .filter-label{font-family:var(--font-data);font-size:7px;color:var(--text-faint);padding:6px 0;margin-right:4px;white-space:nowrap;letter-spacing:1px}
    .fbtn{font-family:var(--font-data);font-size:7px;padding:5px 10px;border-radius:6px;border:1px solid var(--border-subtle);background:rgba(255,255,255,0.03);color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap}
    .fbtn:hover{border-color:var(--gold-border);color:var(--text-body)}
    .fbtn.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold)}
    .filter-sep{width:1px;height:20px;background:rgba(255,255,255,0.06);margin:0 4px}

    /* ─── Sort ─── */
    .sort-bar{display:flex;gap:8px;padding:0 16px 12px;max-width:1100px;margin:0 auto}
    .sort-bar select{font-family:var(--font-mono);font-size:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text-body);padding:5px 10px;border-radius:6px;cursor:pointer}

    /* ─── Card grid ─── */
    .sb-grid{display:flex;flex-wrap:wrap;gap:14px;padding:0 16px 80px;max-width:1100px;margin:0 auto;justify-content:center}

    /* ─── Card wrapper ─── */
    .card-wrap{position:relative;flex-shrink:0}

    /* ─── Duplicate badge ─── */
    .card-wrap .dupe-badge{position:absolute;top:-4px;right:-4px;z-index:20;min-width:24px;height:24px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#b8903d);color:var(--bg-deep);font-family:var(--font-data);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px;box-shadow:0 2px 8px rgba(0,0,0,0.5);pointer-events:none}

    /* ─── Undiscovered card ─── */
    .card-wrap--undiscovered .spell-card{filter:brightness(0.12) saturate(0.2);pointer-events:none}
    .card-wrap--undiscovered{position:relative}
    .card-wrap--undiscovered .undiscovered-overlay{position:absolute;inset:0;z-index:15;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;pointer-events:none;border-radius:12px}
    .card-wrap--undiscovered .undiscovered-q{font-family:var(--font-title);font-size:36px;font-weight:800;color:rgba(255,255,255,0.08);letter-spacing:4px}
    .card-wrap--undiscovered .undiscovered-text{font-family:var(--font-data);font-size:7px;color:rgba(255,255,255,0.1);letter-spacing:2px}

    /* ─── Exhausted overlay ─── */
    .card-wrap--exhausted{opacity:0.4;filter:grayscale(0.6)}
    .card-wrap--worn{opacity:0.75}

    /* ─── Deployed badge ─── */
    .coll-badge-deployed{position:absolute;top:6px;left:6px;z-index:10;background:rgba(212,166,75,0.25);border:1px solid rgba(212,166,75,0.4);color:var(--gold);font-family:var(--font-data);font-size:6px;padding:2px 6px;border-radius:4px;pointer-events:none}

    /* ─── Empty / Loading ─── */
    .sb-empty{text-align:center;padding:60px 20px}
    .sb-empty-icon{font-size:48px;margin-bottom:12px;opacity:0.4}
    .sb-empty-title{font-family:var(--font-title);font-size:18px;color:var(--text-bright);margin-bottom:8px}
    .sb-empty-text{font-size:14px;color:var(--text-muted)}
    .sb-empty a{display:inline-block;margin-top:16px;padding:8px 20px;background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:8px;color:var(--gold);font-family:var(--font-data);font-size:9px;text-decoration:none}
    .sb-loading{text-align:center;padding:80px 20px}
    .sb-spinner{width:32px;height:32px;border:3px solid var(--gold-dim);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}

    /* ─── Search bar ─── */
    .sb-search{display:flex;align-items:center;gap:8px;max-width:1100px;margin:0 auto;padding:0 16px 8px}
    .sb-search-wrap{position:relative;flex:1;max-width:260px}
    .sb-search-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border-subtle);border-radius:8px;padding:7px 12px 7px 30px;color:var(--text-body);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color 0.2s;box-sizing:border-box}
    .sb-search-input::placeholder{color:var(--text-faint)}
    .sb-search-input:focus{border-color:var(--gold-border)}
    .sb-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-faint);pointer-events:none}

    /* ─── Needs Sharpening badge ─── */
    .card-wrap .sharp-alert{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(255,140,0,0.2);border:1px solid rgba(255,140,0,0.4);color:#ffaa44;font-family:var(--font-data);font-size:6px;padding:2px 8px;border-radius:4px;pointer-events:none;white-space:nowrap;letter-spacing:0.5px}

    /* ─── Zoom overlay — enhanced ─── */
    .zoom-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:20px;overflow-y:auto}
    .zoom-overlay.active{display:flex}
    .zoom-layout{display:flex;gap:28px;align-items:flex-start;max-width:700px;width:100%}
    .zoom-card-col{flex-shrink:0;position:relative}
    .zoom-close{position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:var(--text-bright);font-size:16px;cursor:pointer;z-index:1010;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
    .zoom-close:hover{background:rgba(255,255,255,0.15)}

    /* ─── Detail Panel (right of zoomed card) ─── */
    .zoom-detail{flex:1;min-width:240px}
    .zd-name{font-family:var(--font-title);font-size:22px;font-weight:700;color:var(--text-bright);margin-bottom:2px}
    .zd-sub{font-family:var(--font-data);font-size:8px;color:var(--text-faint);letter-spacing:1.5px;margin-bottom:14px}
    .zd-section{margin-bottom:14px}
    .zd-section-title{font-family:var(--font-data);font-size:7px;color:var(--text-faint);letter-spacing:2px;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:4px}
    .zd-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px}
    .zd-stat{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0}
    .zd-stat-label{font-family:var(--font-data);font-size:9px;color:var(--text-muted)}
    .zd-stat-val{font-family:var(--font-data);font-size:12px;font-weight:700}
    .zd-stat-eff{font-family:var(--font-data);font-size:9px;color:var(--text-faint);margin-left:4px}

    /* Sharpness bar in detail */
    .zd-sharp-bar{height:8px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;margin-top:4px}
    .zd-sharp-fill{height:100%;border-radius:4px;transition:width 0.5s}
    .zd-sharp-text{font-family:var(--font-data);font-size:10px;margin-top:4px;display:flex;justify-content:space-between}

    /* Effects list */
    .zd-effect{padding:6px 10px;background:rgba(255,255,255,0.03);border-radius:6px;margin-bottom:4px;border-left:2px solid var(--gold)}
    .zd-effect-tag{font-family:var(--font-data);font-size:9px;font-weight:700;color:var(--gold);letter-spacing:0.5px}
    .zd-effect-desc{font-family:var(--font-body);font-size:12px;color:var(--text-body);margin-top:2px;line-height:1.3}
    .zd-effect-trigger{font-family:var(--font-data);font-size:7px;color:var(--text-faint);margin-top:1px;letter-spacing:0.5px}

    /* Action buttons */
    .zd-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
    .zd-btn{font-family:var(--font-data);font-size:8px;padding:8px 16px;border-radius:8px;border:1px solid var(--border-subtle);background:rgba(255,255,255,0.04);color:var(--text-body);cursor:pointer;transition:all 0.15s;letter-spacing:1px}
    .zd-btn:hover{border-color:var(--gold-border);color:var(--gold)}
    .zd-btn--primary{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold)}
    .zd-btn--primary:hover{background:rgba(212,166,75,0.2)}
    .zd-btn:disabled{opacity:0.3;cursor:not-allowed}
    .zd-deployed-badge{display:inline-block;background:rgba(212,166,75,0.15);border:1px solid rgba(212,166,75,0.3);color:var(--gold);font-family:var(--font-data);font-size:8px;padding:4px 10px;border-radius:6px;letter-spacing:1px}

    /* ─── Sharpening Modal ─── */
    .sharpen-overlay{display:none;position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,0.92);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px}
    .sharpen-overlay.active{display:flex}
    .sharpen-modal{background:var(--bg-card,#1a1528);border:1px solid var(--border-subtle);border-radius:16px;padding:24px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto}
    .sharpen-title{font-family:var(--font-title);font-size:20px;font-weight:700;color:var(--gold);margin-bottom:4px}
    .sharpen-sub{font-family:var(--font-data);font-size:8px;color:var(--text-faint);letter-spacing:1px;margin-bottom:16px}
    .sharpen-target{display:flex;gap:12px;align-items:center;padding:12px;background:rgba(255,255,255,0.03);border-radius:10px;margin-bottom:16px}
    .sharpen-target-name{font-family:var(--font-title);font-size:14px;color:var(--text-bright)}
    .sharpen-target-sharp{font-family:var(--font-data);font-size:9px;color:var(--text-faint);margin-top:2px}

    .sharpen-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
    .sharpen-option{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border-subtle);border-radius:10px;cursor:pointer;transition:all 0.15s;background:rgba(255,255,255,0.02)}
    .sharpen-option:hover:not(.disabled){border-color:var(--gold-border);background:rgba(212,166,75,0.05)}
    .sharpen-option.active{border-color:var(--gold);background:var(--gold-dim)}
    .sharpen-option.disabled{opacity:0.3;cursor:not-allowed}
    .sharpen-option-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
    .sharpen-option-title{font-family:var(--font-data);font-size:9px;font-weight:700;color:var(--text-bright);letter-spacing:0.5px}
    .sharpen-option-desc{font-family:var(--font-body);font-size:12px;color:var(--text-muted);margin-top:2px}
    .sharpen-option-avail{font-family:var(--font-data);font-size:7px;letter-spacing:1px;margin-top:3px}
    .sharpen-option-avail.has{color:#6acd8a}
    .sharpen-option-avail.lacks{color:#e85a6a}

    .sharpen-fuel{margin-bottom:16px;display:none}
    .sharpen-fuel-title{font-family:var(--font-data);font-size:8px;color:var(--text-faint);letter-spacing:1px;margin-bottom:8px}
    .sharpen-fuel-grid{display:flex;flex-wrap:wrap;gap:6px;max-height:200px;overflow-y:auto;padding:4px}
    .fuel-card{width:90px;padding:6px 4px;border:1px solid var(--border-subtle);border-radius:8px;cursor:pointer;transition:all 0.15s;background:rgba(255,255,255,0.02);text-align:center}
    .fuel-card:hover{border-color:var(--gold-border)}
    .fuel-card.selected{border-color:var(--gold);background:var(--gold-dim)}
    .fuel-card-name{font-family:var(--font-data);font-size:7px;color:var(--text-body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fuel-card-rarity{font-family:var(--font-data);font-size:6px;color:var(--text-faint);margin-top:1px;text-transform:uppercase;letter-spacing:0.5px}
    .fuel-card-sharp{font-family:var(--font-data);font-size:6px;color:var(--text-faint);margin-top:1px}

    .sharpen-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
    .sharpen-btn{font-family:var(--font-data);font-size:9px;padding:10px 20px;border-radius:8px;border:1px solid var(--border-subtle);background:rgba(255,255,255,0.04);color:var(--text-body);cursor:pointer;transition:all 0.15s;letter-spacing:1px}
    .sharpen-btn:hover{border-color:var(--gold-border)}
    .sharpen-btn--confirm{background:linear-gradient(135deg,rgba(212,166,75,0.2),rgba(212,166,75,0.1));border-color:var(--gold-border);color:var(--gold)}
    .sharpen-btn--confirm:hover{background:rgba(212,166,75,0.25)}
    .sharpen-btn:disabled{opacity:0.3;cursor:not-allowed}

    @media(max-width:600px){
      .zoom-layout{flex-direction:column;align-items:center}
      .zoom-detail{min-width:auto;width:100%;max-width:340px}
      .sharpen-modal{padding:16px}
      .sharpen-fuel-grid{max-height:150px}
    }

    /* ─── House filter pills (Codex) ─── */
    .house-pills{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .house-pill{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;padding:3px;background:rgba(255,255,255,0.03)}
    .house-pill:hover{border-color:rgba(255,255,255,0.3);transform:scale(1.15)}
    .house-pill.active{border-color:currentColor;box-shadow:0 0 10px currentColor}
    .house-pill img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 2px rgba(0,0,0,0.5))}

    /* ─── Stats Banner ─── */
    .sb-stats{display:flex;gap:0;justify-content:center;max-width:560px;margin:0 auto 4px;padding:0 16px}
    .sb-stat{flex:1;text-align:center;padding:10px 6px;border-right:1px solid rgba(255,255,255,0.04)}
    .sb-stat:last-child{border-right:none}
    .sb-stat-num{font-family:var(--font-data);font-size:18px;font-weight:700;color:var(--gold);line-height:1}
    .sb-stat-label{font-family:var(--font-data);font-size:6px;color:var(--text-faint);letter-spacing:1.5px;margin-top:4px}
    .sb-stat-num.clr-c{color:#999} .sb-stat-num.clr-u{color:#66dd66} .sb-stat-num.clr-r{color:#55bbff} .sb-stat-num.clr-e{color:#bb88ff} .sb-stat-num.clr-l{color:#ffd700}

    @media(max-width:600px){
      .sb-grid{gap:8px;padding:0 8px 80px}
      .sb-header{padding:62px 12px 8px}
      .sb-title{font-size:22px}
      .sb-tabs{max-width:100%}
      .sb-tab{padding:8px 16px;font-size:11px}
    }
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>
<script src="/js/nav.js"></script>

<!-- HEADER -->
<div class="sb-header">
  <div class="sb-title">SPELLBOOK</div>
  <div class="sb-sub" id="headerSub">Your collection of spells from across Nethara</div>
  <div class="sb-progress" id="progressWrap" style="display:none">
    <div class="sb-progress-bar"><div class="sb-progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="sb-progress-text" id="progressText">0 / 84 DISCOVERED</div>
  </div>
  <div class="sb-stats" id="statsBanner" style="display:none">
    <div class="sb-stat"><div class="sb-stat-num" id="statTotal">0</div><div class="sb-stat-label">TOTAL CARDS</div></div>
    <div class="sb-stat"><div class="sb-stat-num" id="statUnique">0</div><div class="sb-stat-label">UNIQUE</div></div>
    <div class="sb-stat"><div class="sb-stat-num clr-r" id="statRare">0</div><div class="sb-stat-label">RARE+</div></div>
    <div class="sb-stat"><div class="sb-stat-num clr-e" id="statEpic">0</div><div class="sb-stat-label">EPIC+</div></div>
    <div class="sb-stat"><div class="sb-stat-num" id="statSharp">—</div><div class="sb-stat-label">AVG SHARP</div></div>
  </div>
</div>

<!-- TABS -->
<div class="sb-tabs">
  <button class="sb-tab active" data-tab="mycards" onclick="switchTab('mycards')">MY CARDS</button>
  <button class="sb-tab" data-tab="codex" onclick="switchTab('codex')">CODEX</button>
</div>

<!-- FILTERS -->
<div class="sb-filters" id="filters">
  <div class="filter-group">
    <span class="filter-label">RARITY</span>
    <button class="fbtn active" data-filter="rarity" data-val="all">All</button>
    <button class="fbtn" data-filter="rarity" data-val="common">Common</button>
    <button class="fbtn" data-filter="rarity" data-val="uncommon">Uncommon</button>
    <button class="fbtn" data-filter="rarity" data-val="rare">Rare</button>
    <button class="fbtn" data-filter="rarity" data-val="epic">Epic</button>
    <button class="fbtn" data-filter="rarity" data-val="legendary">Legendary</button>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">TYPE</span>
    <button class="fbtn active" data-filter="type" data-val="all">All</button>
    <button class="fbtn" data-filter="type" data-val="attack">ATK</button>
    <button class="fbtn" data-filter="type" data-val="defend">DEF</button>
    <button class="fbtn" data-filter="type" data-val="support">SUP</button>
    <button class="fbtn" data-filter="type" data-val="manipulation">MAN</button>
    <button class="fbtn" data-filter="type" data-val="utility">UTL</button>
  </div>
  <div class="filter-sep" id="statusFilterSep"></div>
  <div class="filter-group" id="statusFilters">
    <span class="filter-label">STATUS</span>
    <button class="fbtn active" data-filter="status" data-val="all">All</button>
    <button class="fbtn" data-filter="status" data-val="ready">Ready</button>
    <button class="fbtn" data-filter="status" data-val="deployed">Deployed</button>
    <button class="fbtn" data-filter="status" data-val="worn">Worn</button>
    <button class="fbtn" data-filter="status" data-val="degraded">Degraded</button>
  </div>
  <div class="filter-sep" id="houseFilterSep"></div>
  <div class="filter-group" id="houseFilters">
    <span class="filter-label">HOUSE</span>
    <button class="fbtn active" data-filter="house" data-val="all">All</button>
    <div class="house-pills" id="housePills"></div>
  </div>
</div>

<!-- SORT + SEARCH -->
<div class="sort-bar" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
  <select id="sortBy" onchange="render()">
    <option value="rarity">Sort: Rarity</option>
    <option value="atk">Sort: ATK</option>
    <option value="hp">Sort: HP</option>
    <option value="spd">Sort: SPD</option>
    <option value="def">Sort: DEF</option>
    <option value="luck">Sort: LUCK</option>
    <option value="sharpness">Sort: Sharpness</option>
    <option value="name">Sort: Name</option>

/* ═══ CONSTANTS ═══ */
var HO = ['smoulders','darktide','stonebark','ashenvale','stormrage','nighthollow','dawnbringer','manastorm','plaguemire','universal'];

/* ═══ STATE ═══ */
var playerId = null;
var playerCards = [];
var allSpells = [];
var spellLookup = {};
var discoveredSet = {};
var activeTab = 'mycards';
var activeFilters = { rarity:'all', type:'all', status:'all', house:'all' };

};

function getPlayerId() {
  var p = new URLSearchParams(window.location.search);
  var f = p.get('player_id') || p.get('pid');
  if (f) { localStorage.setItem('player_id', f); return f; }
  // 9lv_player is set by register.html — check it first
  try {
    var ninePlayer = JSON.parse(localStorage.getItem('9lv_player'));
    if (ninePlayer && ninePlayer.id) return String(ninePlayer.id);
  } catch(e) {}
  return localStorage.getItem('player_id');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══ LOAD DATA ═══ */
async function loadData() {
  playerId = getPlayerId();

  try {
    var sR = await fetch('/api/spells');
    if (sR.ok) {
      var sd = await sR.json();
      allSpells = (sd.spells || sd || []).map(function(s) {
        return {
          spell_id: s.id,
          name: s.name || 'Unknown',
          house: (s.house || 'universal').toLowerCase(),
          spell_type: (s.spell_type || s.type || 'attack').toLowerCase(),
          mana_cost: s.mana_cost || 1,
          tier: s.tier || 0,
          base_atk: s.base_atk || 0,
          base_hp: s.base_hp || 0,
          base_spd: s.base_spd || 0,
          base_def: s.base_def || 0,
          base_luck: s.base_luck || 0,
          bonus_effects: parseEffects(s.bonus_effects || s.effect_tags || []),
          flavor_text: s.flavor_text || s.motto || '',
          image_url: s.image_url || ''
        };
      });
      allSpells.forEach(function(s) { spellLookup[s.name.toLowerCase()] = s; });
    }
  } catch(e) { console.error('Spells load error:', e); }

  if (playerId) {
    try {
      var cR = await fetch('/api/packs/collection/' + playerId);
      if (cR.ok) {
        var cd = await cR.json();
        playerCards = (cd.cards || cd || []).map(normalizePlayerCard);
        playerCards.forEach(function(c) { discoveredSet[c.name.toLowerCase()] = true; });
      }
    } catch(e) { console.error('Collection load error:', e); }
  }

  updateProgress();
  render();
}

function parseEffects(raw) {
  if (!raw) return [];
  if (typeof raw === 'string') {
    try { return JSON.parse(raw); } catch(e) {
      return raw.split(',').map(function(e){ return e.trim(); }).filter(Boolean);
    }
  }
  if (Array.isArray(raw)) return raw;
  return [];
}

function normalizePlayerCard(c) {
  var sp = c.spell || {};
  var spellName = (c.spell_name || sp.name || c.name || 'Unknown').toLowerCase();
  var ref = spellLookup[spellName] || {};
  var effects = parseEffects(c.spell_effects || sp.bonus_effects || ref.bonus_effects || []);

  return {
    id: c.id,
    spell_id: c.spell_id,
    name: c.spell_name || sp.name || c.name || 'Unknown',
    type: (c.spell_type || ref.spell_type || 'attack').toLowerCase(),
    spell_type: (c.spell_type || ref.spell_type || 'attack').toLowerCase(),
    rarity: (c.rarity || 'common').toLowerCase(),
    house: (c.spell_house || ref.house || 'universal').toLowerCase(),
    mana_cost: sp.mana_cost || ref.mana_cost || 1,
    base_atk: sp.base_atk || ref.base_atk || 0,
    base_hp: sp.base_hp || ref.base_hp || 0,
    base_spd: sp.base_spd || ref.base_spd || 0,
    base_def: sp.base_def || ref.base_def || 0,
    base_luck: sp.base_luck || ref.base_luck || 0,
    base_effect: '',
    effects: effects,
    bonus_effects: effects,
    flavor_text: sp.flavor_text || ref.flavor_text || '',
    image_url: sp.image_url || ref.image_url || '',
    sharpness: c.sharpness != null ? c.sharpness : (c.current_charges != null ? Math.round((c.current_charges / (c.max_charges || 1)) * 100) : 100),
    current_charges: c.current_charges != null ? c.current_charges : null,
    max_charges: c.max_charges || 0,
    is_exhausted: c.is_exhausted || (c.sharpness != null && c.sharpness === 0) || false,
    deployed_zone: c.deployed_zone || c.zone_name || null
  };
}

/* ═══ Discovery Progress ═══ */
function updateProgress() {
  var total = allSpells.length || 84;
  var found = Object.keys(discoveredSet).length;
  var pct = Math.round((found / total) * 100);
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = found + ' / ' + total + ' DISCOVERED';

  if (playerCards.length > 0) {
    document.getElementById('statsBanner').style.display = 'flex';
    document.getElementById('statTotal').textContent = playerCards.length;
    document.getElementById('statUnique').textContent = found;
    document.getElementById('statRare').textContent = playerCards.filter(function(c){ return ['rare','epic','legendary'].includes(c.rarity); }).length;
    document.getElementById('statEpic').textContent = playerCards.filter(function(c){ return ['epic','legendary'].includes(c.rarity); }).length;
    var sharps = playerCards.map(function(c){ return c.sharpness != null ? c.sharpness : 100; });
    document.getElementById('statSharp').textContent = Math.round(sharps.reduce(function(a,b){ return a+b; }, 0) / sharps.length) + '%';
  }
  buildHousePills();
}

function buildHousePills() {
  var container = document.getElementById('housePills');
  if (!container) return;
  container.innerHTML = '';
  HO.forEach(function(h) {
    var pill = document.createElement('div');
    pill.className = 'house-pill';
    pill.style.color = HOUSE_COLORS[h];
    pill.title = h.charAt(0).toUpperCase() + h.slice(1);
    if (HOUSE_IMG_MAP[h]) {
      var img = document.createElement('img');
      img.src = HOUSE_IMG_MAP[h]; img.alt = h;
      pill.appendChild(img);
    } else {
      pill.textContent = '✦'; pill.style.fontSize = '14px';
    }
    pill.dataset.house = h;
    if (activeFilters.house === h) pill.classList.add('active');
    pill.addEventListener('click', function() {
      if (activeFilters.house === h) {
        activeFilters.house = 'all'; pill.classList.remove('active');
        container.parentElement.querySelector('.fbtn').classList.add('active');
      } else {
        activeFilters.house = h;
        container.querySelectorAll('.house-pill').forEach(function(p){ p.classList.remove('active'); });
        container.parentElement.querySelector('.fbtn').classList.remove('active');
        pill.classList.add('active');
      }
      render();
    });
    container.appendChild(pill);
  });
  var allBtn = container.parentElement.querySelector('.fbtn');
  allBtn.addEventListener('click', function() {
    activeFilters.house = 'all';
    container.querySelectorAll('.house-pill').forEach(function(p){ p.classList.remove('active'); });
    allBtn.classList.add('active');
    render();
  });
}

/* ═══ TAB SWITCHING ═══ */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.sb-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  var sf = document.getElementById('statusFilters');
  var ss = document.getElementById('statusFilterSep');
  if (tab === 'codex') {
    sf.style.display = 'none'; ss.style.display = 'none';
    document.getElementById('headerSub').textContent = 'All 84 spells of Nethara \u2014 discover them all';
    document.getElementById('statsBanner').style.display = 'none';
  } else {
    sf.style.display = ''; ss.style.display = '';
    document.getElementById('headerSub').textContent = 'Your collection of spells from across Nethara';
    if (playerCards.length > 0) document.getElementById('statsBanner').style.display = 'flex';
  }
  render();
}

/* ═══ RENDER ═══ */
function render() {
  if (activeTab === 'mycards') renderMyCards();
  else renderCodex();
}

/* ═══ MY CARDS TAB ═══ */
function renderMyCards() {
  if (!playerId) {
    document.getElementById('content').innerHTML =
      '<div class="sb-empty"><div class="sb-empty-icon">&#128302;</div>'
      + '<div class="sb-empty-title">No player found</div>'
      + '<div class="sb-empty-text">Register to start collecting cards</div>'
      + '<a href="/register.html">Register &rarr;</a></div>';
    return;
  }

  var groups = {};
  playerCards.forEach(function(c) {
    var key = c.name.toLowerCase();
    if (!groups[key]) groups[key] = [];
    groups[key].push(c);
  });

  var stacked = [];
  Object.keys(groups).forEach(function(key) {
    var copies = groups[key];
    copies.sort(function(a, b) { return (RARITY_ORDER[a.rarity] || 9) - (RARITY_ORDER[b.rarity] || 9); });
    stacked.push({ card: copies[0], count: copies.length, allCopies: copies });
  });

  var items = stacked.slice();
  if (activeFilters.rarity !== 'all') items = items.filter(function(s){ return s.card.rarity === activeFilters.rarity; });
  if (activeFilters.type !== 'all') items = items.filter(function(s){ return s.card.type === activeFilters.type; });
  if (activeFilters.house !== 'all') items = items.filter(function(s){ return s.card.house === activeFilters.house; });
  if (activeFilters.status === 'ready') items = items.filter(function(s){ return !s.card.is_exhausted && !s.card.deployed_zone && (s.card.sharpness == null || s.card.sharpness > 50); });
  if (activeFilters.status === 'deployed') items = items.filter(function(s){ return !!s.card.deployed_zone; });
  if (activeFilters.status === 'worn') items = items.filter(function(s){ return s.card.sharpness != null && s.card.sharpness > 0 && s.card.sharpness <= 50; });
  if (activeFilters.status === 'degraded') items = items.filter(function(s){ return s.card.sharpness != null && s.card.sharpness === 0; });

  // Search filter
  var search = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  if (search) items = items.filter(function(s){ return s.card.name.toLowerCase().includes(search); });

  // Sort
  var sortBy = document.getElementById('sortBy').value;
  if (sortBy === 'rarity') items.sort(function(a,b){ return (RARITY_ORDER[a.card.rarity]||9) - (RARITY_ORDER[b.card.rarity]||9); });
  else if (sortBy === 'atk') items.sort(function(a,b){ return b.card.base_atk - a.card.base_atk; });
  else if (sortBy === 'hp') items.sort(function(a,b){ return b.card.base_hp - a.card.base_hp; });
  else if (sortBy === 'spd') items.sort(function(a,b){ return b.card.base_spd - a.card.base_spd; });
  else if (sortBy === 'def') items.sort(function(a,b){ return b.card.base_def - a.card.base_def; });
  else if (sortBy === 'luck') items.sort(function(a,b){ return b.card.base_luck - a.card.base_luck; });
  else if (sortBy === 'sharpness') items.sort(function(a,b){ return (a.card.sharpness != null ? a.card.sharpness : 100) - (b.card.sharpness != null ? b.card.sharpness : 100); });
  else if (sortBy === 'name') items.sort(function(a,b){ return a.card.name.localeCompare(b.card.name); });
  else if (sortBy === 'house') items.sort(function(a,b){ return HO.indexOf(a.card.house) - HO.indexOf(b.card.house); });
  else if (sortBy === 'type') items.sort(function(a,b){ return a.card.type.localeCompare(b.card.type); });

  if (items.length === 0 && playerCards.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="sb-empty"><div class="sb-empty-icon">&#128230;</div>'
      + '<div class="sb-empty-title">No cards yet</div>'
      + '<div class="sb-empty-text">Open packs to start building your collection</div>'
      + '<a href="/packs.html">Open Packs &rarr;</a></div>';
    return;
  }
  if (items.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="sb-empty"><div class="sb-empty-icon">&#128269;</div>'
      + '<div class="sb-empty-title">No matches</div>'
      + '<div class="sb-empty-text">Try changing your filters</div></div>';
    return;
  }

  var html = '<div class="sb-grid">';
  items.forEach(function(item, i) {
    var c = item.card;
    var wrapClass = 'card-wrap';
    if (c.sharpness != null && c.sharpness === 0) wrapClass += ' card-wrap--exhausted';
    else if (c.sharpness != null && c.sharpness <= 50) wrapClass += ' card-wrap--worn';

    html += '<div class="' + wrapClass + '" data-card-idx="' + i + '">';
    html += buildCardV4(c, { size: 'mini', delay: Math.min(i * 0.03, 0.5) });

    if (item.count > 1) html += '<div class="dupe-badge">&times;' + item.count + '</div>';
    if (c.deployed_zone) html += '<div class="coll-badge-deployed">&#9876; ' + esc(c.deployed_zone) + '</div>';
    // Needs sharpening alert
    if (c.sharpness != null && c.sharpness < 50 && c.sharpness > 0 && !c.deployed_zone) {
      html += '<div class="sharp-alert">\u2692 NEEDS SHARPENING</div>';
    } else if (c.sharpness != null && c.sharpness === 0) {
      html += '<div class="sharp-alert" style="color:#e85a6a;border-color:rgba(232,90,106,0.4);background:rgba(232,90,106,0.15)">\u26A0 DULL \u2014 50% POWER</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;

  // Store items for zoom lookup
  window._renderedItems = items;
  initCardsAndBindClicks('mycards');
}

/* ═══ CODEX TAB ═══ */
function renderCodex() {
  var spells = allSpells.slice();
  if (activeFilters.type !== 'all') spells = spells.filter(function(s){ return s.spell_type === activeFilters.type; });
  if (activeFilters.house !== 'all') spells = spells.filter(function(s){ return s.house === activeFilters.house; });

  var search = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  if (search) spells = spells.filter(function(s){ return s.name.toLowerCase().includes(search); });

  var sortBy = document.getElementById('sortBy').value;
  if (sortBy === 'rarity') spells.sort(function(a,b){ return (a.tier||0) - (b.tier||0) || a.name.localeCompare(b.name); });
  else if (sortBy === 'atk') spells.sort(function(a,b){ return b.base_atk - a.base_atk; });
  else if (sortBy === 'hp') spells.sort(function(a,b){ return b.base_hp - a.base_hp; });
  else if (sortBy === 'spd') spells.sort(function(a,b){ return b.base_spd - a.base_spd; });
  else if (sortBy === 'def') spells.sort(function(a,b){ return b.base_def - a.base_def; });
  else if (sortBy === 'luck') spells.sort(function(a,b){ return b.base_luck - a.base_luck; });
  else if (sortBy === 'name') spells.sort(function(a,b){ return a.name.localeCompare(b.name); });
  else if (sortBy === 'house') spells.sort(function(a,b){ return HO.indexOf(a.house) - HO.indexOf(b.house); });
  else if (sortBy === 'type') spells.sort(function(a,b){ return a.spell_type.localeCompare(b.spell_type); });

  if (spells.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="sb-empty"><div class="sb-empty-icon">&#128218;</div>'
      + '<div class="sb-empty-title">No spells found</div>'
      + '<div class="sb-empty-text">Try changing your filters</div></div>';
    return;
  }

  var ownedCounts = {};
  playerCards.forEach(function(c) { ownedCounts[c.name.toLowerCase()] = (ownedCounts[c.name.toLowerCase()] || 0) + 1; });

  var html = '<div class="sb-grid">';
  spells.forEach(function(spell, i) {
    var key = spell.name.toLowerCase();
    var discovered = !!discoveredSet[key];
    var count = ownedCounts[key] || 0;

    if (discovered) {
      var cardData = {
        name: spell.name, house: spell.house, spell_type: spell.spell_type, rarity: 'common',
        mana_cost: spell.mana_cost, base_atk: spell.base_atk, base_hp: spell.base_hp,
        base_spd: spell.base_spd, base_def: spell.base_def, base_luck: spell.base_luck,
        base_effect: '', bonus_effects: spell.bonus_effects, flavor_text: spell.flavor_text, image_url: spell.image_url
      };
      html += '<div class="card-wrap" data-spell-name="' + esc(key) + '">';
      html += buildCardV4(cardData, { size: 'mini', delay: Math.min(i * 0.02, 0.4) });
      if (count > 0) html += '<div class="dupe-badge">&times;' + count + '</div>';
      html += '</div>';
    } else {
      var ghostData = {
        name: '???', house: spell.house, spell_type: spell.spell_type, rarity: 'common',
        mana_cost: spell.mana_cost, base_atk: 0, base_hp: 0, base_spd: 0, base_def: 0, base_luck: 0,
        base_effect: '', bonus_effects: [], flavor_text: '', image_url: ''
      };
      html += '<div class="card-wrap card-wrap--undiscovered">';
      html += buildCardV4(ghostData, { size: 'mini', delay: Math.min(i * 0.02, 0.4) });
      html += '<div class="undiscovered-overlay"><div class="undiscovered-q">???</div><div class="undiscovered-text">UNDISCOVERED</div></div>';
      html += '</div>';
    }
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;

  window._renderedCodexSpells = spells;
  initCardsAndBindClicks('codex');
}

/* ═══ INIT CARDS + CLICK HANDLERS ═══ */
function initCardsAndBindClicks(mode) {
  setTimeout(function() {
    if (typeof initCards === 'function') initCards();
    else if (typeof initParticles === 'function') {
      document.querySelectorAll('.spell-card canvas.sc-particles').forEach(function(cv) {
        var card = cv.closest('.spell-card');
        if (card) initParticles(cv, card.dataset.particle || 'mote', card.dataset.color || '#D4A64B');
      });
    }
    document.querySelectorAll('.card-wrap:not(.card-wrap--undiscovered)').forEach(function(wrap, idx) {
      wrap.style.cursor = 'pointer';
      wrap.addEventListener('click', function() { openZoom(idx, mode); });
    });
  }, 120);
}

/* ═══════════════════════════════════════════════════════
   ZOOM — Enhanced with full detail panel
   ═══════════════════════════════════════════════════════ */
function openZoom(idx, mode) {
  var cardData = null;
  var stackData = null;

  if (mode === 'mycards' && window._renderedItems && window._renderedItems[idx]) {
    stackData = window._renderedItems[idx];
    cardData = stackData.card;
  } else if (mode === 'codex' && window._renderedCodexSpells) {
    var spell = window._renderedCodexSpells[idx];
    if (!spell || !discoveredSet[spell.name.toLowerCase()]) return;
    cardData = spell;
    cardData.rarity = cardData.rarity || 'common';
    cardData.sharpness = null;
  }

  if (!cardData) return;
  zoomCardData = cardData;

  // Render zoomed card
  var container = document.getElementById('zoomCard');
  container.innerHTML = buildCardV4(cardData, { size: 'zoom' });
  setTimeout(function() { if (typeof initCards === 'function') initCards(container); }, 60);

  // Render detail panel
  var detail = document.getElementById('zoomDetail');
  var sharp = cardData.sharpness != null ? cardData.sharpness : 100;
  var sharpMult = 0.5 + sharp / 200;
  var rColor = RARITY_COLORS[cardData.rarity] || '#999';
  var houseName = (cardData.house || 'universal').charAt(0).toUpperCase() + (cardData.house || 'universal').slice(1);

  var h = '';
  h += '<div class="zd-name">' + esc(cardData.name) + '</div>';
  h += '<div class="zd-sub">' + (cardData.rarity || 'COMMON').toUpperCase() + ' \u00B7 ' + (cardData.spell_type || 'ATTACK').toUpperCase() + ' \u00B7 ' + houseName.toUpperCase() + '</div>';

  // Sharpness section (only for owned cards)
  if (cardData.sharpness != null) {
    var sharpColor = sharp > 70 ? '#6acd8a' : sharp > 30 ? '#ffaa44' : '#e85a6a';
    var effLabel = sharp === 100 ? 'PRISTINE' : sharp >= 75 ? 'SHARP' : sharp >= 50 ? 'WORN' : sharp > 0 ? 'DULL' : 'DEGRADED';
    h += '<div class="zd-section">';
    h += '<div class="zd-section-title">SHARPNESS</div>';
    h += '<div class="zd-sharp-bar"><div class="zd-sharp-fill" style="width:' + sharp + '%;background:' + sharpColor + '"></div></div>';
    h += '<div class="zd-sharp-text"><span style="color:' + sharpColor + '">' + sharp + '% \u2014 ' + effLabel + '</span><span style="color:var(--text-faint)">' + Math.round(sharpMult * 100) + '% POWER</span></div>';
    h += '</div>';
  }

  // Stats section — show base and effective
  h += '<div class="zd-section">';
  h += '<div class="zd-section-title">COMBAT STATS' + (cardData.sharpness != null && sharp < 100 ? ' (at ' + sharp + '% sharp)' : '') + '</div>';
  h += '<div class="zd-stat-grid">';
  var stats = [
    { key:'atk', label:'ATK', icon:'⚔', val: cardData.base_atk },
    { key:'hp',  label:'HP',  icon:'♥', val: cardData.base_hp },
    { key:'spd', label:'SPD', icon:'◈', val: cardData.base_spd },
    { key:'def', label:'DEF', icon:'⛊', val: cardData.base_def },
    { key:'luck',label:'LUCK',icon:'★', val: cardData.base_luck },
  ];
  stats.forEach(function(s) {
    if (s.val > 0) {
      var eff = cardData.sharpness != null ? Math.round(s.val * sharpMult) : s.val;
      var effStr = (cardData.sharpness != null && sharp < 100) ? '<span class="zd-stat-eff">(\u2192' + eff + ')</span>' : '';
      h += '<div class="zd-stat"><span class="zd-stat-label">' + s.icon + ' ' + s.label + '</span><span class="zd-stat-val" style="color:' + STAT_COLORS[s.key] + '">+' + s.val + effStr + '</span></div>';
    }
  });
  h += '</div></div>';

  // Effects section — V2 descriptions
  var effects = cardData.bonus_effects || cardData.effects || [];
  if (effects.length > 0) {
    h += '<div class="zd-section">';
    h += '<div class="zd-section-title">EFFECTS (V2 COMBAT)</div>';
    effects.forEach(function(eff) {
      var tag = '', desc = '', trigger = '';
      if (typeof eff === 'string') {
        tag = eff.replace(/[^A-Z ]/gi, '').trim().toUpperCase();
      } else if (eff.tag) {
        tag = eff.tag.toUpperCase();
      } else if (eff.name) {
        tag = eff.name.toUpperCase();
      }
      // Extract effect name without numbers
      var effectKey = tag.replace(/[\s+\-\d]+/g, '').trim();
      var v2 = V2_EFFECTS[effectKey];
      if (v2) {
        desc = v2.desc;
        trigger = v2.trigger;
      } else {
        desc = eff.desc || eff.description || tag;
        trigger = eff.trigger || '';
      }
      h += '<div class="zd-effect">';
      h += '<div class="zd-effect-tag">' + esc(tag) + '</div>';
      h += '<div class="zd-effect-desc">' + esc(desc) + '</div>';
      if (trigger) h += '<div class="zd-effect-trigger">' + esc(trigger) + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Deployed badge
  if (cardData.deployed_zone) {
    h += '<div class="zd-deployed-badge">\u2694 DEPLOYED: ' + esc(cardData.deployed_zone) + '</div>';
  }

  // Action buttons
  h += '<div class="zd-actions">';
  if (cardData.sharpness != null && cardData.sharpness < 100 && !cardData.deployed_zone) {
    h += '<button class="zd-btn zd-btn--primary" onclick="openSharpen()">&#9874; SHARPEN</button>';
  } else if (cardData.deployed_zone) {
    h += '<button class="zd-btn" disabled title="Undeploy from zone first">&#9874; SHARPEN (DEPLOYED)</button>';
  }
  h += '</div>';

  detail.innerHTML = h;
  document.getElementById('zoomOverlay').classList.add('active');
}

function closeZoom(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('zoom-close')) return;
  document.getElementById('zoomOverlay').classList.remove('active');
  zoomCardData = null;
}

/* ═══════════════════════════════════════════════════════
   SHARPENING SYSTEM
   ═══════════════════════════════════════════════════════ */
function openSharpen() {
  if (!zoomCardData) return;
  sharpenTarget = zoomCardData;
  sharpenMethod = null;
  sharpenFuelIds = [];

  var targetEl = document.getElementById('sharpenTarget');
  targetEl.innerHTML = '<div>'
    + '<div class="sharpen-target-name">' + esc(sharpenTarget.name) + '</div>'
    + '<div class="sharpen-target-sharp">Current sharpness: ' + (sharpenTarget.sharpness || 0) + '% \u2192 100%</div>'
    + '</div>';

  // Count available fuel
  var targetName = sharpenTarget.name.toLowerCase();
  var targetHouse = sharpenTarget.house;
  var targetId = sharpenTarget.id;

  var dupes = playerCards.filter(function(c) {
    return c.name.toLowerCase() === targetName && c.id !== targetId && !c.deployed_zone;
  });
  var sameHouse = playerCards.filter(function(c) {
    return c.house === targetHouse && c.id !== targetId && !c.deployed_zone;
  });
  var anyCards = playerCards.filter(function(c) {
    return c.id !== targetId && !c.deployed_zone;
  });

  var optsHtml = '';

  // Option 1: Exact duplicate
  var hasDupe = dupes.length >= 1;
  optsHtml += '<div class="sharpen-option ' + (hasDupe ? '' : 'disabled') + '" data-method="dupe" onclick="selectSharpenMethod(\'dupe\')">'
    + '<div class="sharpen-option-icon">\uD83C\uDFAF</div><div>'
    + '<div class="sharpen-option-title">EXACT DUPLICATE</div>'
    + '<div class="sharpen-option-desc">Sacrifice 1 copy of ' + esc(sharpenTarget.name) + '</div>'
    + '<div class="sharpen-option-avail ' + (hasDupe ? 'has' : 'lacks') + '">'
    + (hasDupe ? '\u2713 ' + dupes.length + ' AVAILABLE' : '\u2717 NEED 1 COPY') + '</div>'
    + '</div></div>';

  // Option 2: Same house
  var hasHouse = sameHouse.length >= 3;
  optsHtml += '<div class="sharpen-option ' + (hasHouse ? '' : 'disabled') + '" data-method="house" onclick="selectSharpenMethod(\'house\')">'
    + '<div class="sharpen-option-icon">\uD83C\uDFE0</div><div>'
    + '<div class="sharpen-option-title">3 SAME-HOUSE CARDS</div>'
    + '<div class="sharpen-option-desc">Sacrifice 3 ' + esc(targetHouse.charAt(0).toUpperCase() + targetHouse.slice(1)) + ' cards</div>'
    + '<div class="sharpen-option-avail ' + (hasHouse ? 'has' : 'lacks') + '">'
    + (hasHouse ? '\u2713 ' + sameHouse.length + ' AVAILABLE' : '\u2717 NEED 3, HAVE ' + sameHouse.length) + '</div>'
    + '</div></div>';

  // Option 3: Any 5 cards
  var hasAny = anyCards.length >= 5;
  optsHtml += '<div class="sharpen-option ' + (hasAny ? '' : 'disabled') + '" data-method="any" onclick="selectSharpenMethod(\'any\')">'
    + '<div class="sharpen-option-icon">\uD83C\uDCCF</div><div>'
    + '<div class="sharpen-option-title">5 ANY CARDS</div>'
    + '<div class="sharpen-option-desc">Sacrifice 5 cards from your collection</div>'
    + '<div class="sharpen-option-avail ' + (hasAny ? 'has' : 'lacks') + '">'
    + (hasAny ? '\u2713 ' + anyCards.length + ' AVAILABLE' : '\u2717 NEED 5, HAVE ' + anyCards.length) + '</div>'
    + '</div></div>';

  document.getElementById('sharpenOptions').innerHTML = optsHtml;
  document.getElementById('sharpenFuel').style.display = 'none';
  document.getElementById('sharpenConfirm').disabled = true;
  document.getElementById('sharpenOverlay').classList.add('active');
}

function selectSharpenMethod(method) {
  sharpenMethod = method;
  sharpenFuelIds = [];

  // Highlight selected option
  document.querySelectorAll('.sharpen-option').forEach(function(el) {
    el.classList.toggle('active', el.dataset.method === method);
  });

  if (method === 'dupe') {
    // Auto-select first available dupe
    var dupes = playerCards.filter(function(c) {
      return c.name.toLowerCase() === sharpenTarget.name.toLowerCase() && c.id !== sharpenTarget.id && !c.deployed_zone;
    });
    if (dupes.length > 0) {
      sharpenFuelIds = [dupes[0].id];
      document.getElementById('sharpenFuel').style.display = 'none';
      document.getElementById('sharpenConfirm').disabled = false;
      document.getElementById('sharpenConfirm').textContent = '\u2692 SHARPEN (sacrifice 1 ' + esc(sharpenTarget.name) + ')';
    }
    return;
  }

  // Show fuel picker for house/any
  var needed = method === 'house' ? 3 : 5;
  var pool = [];
  if (method === 'house') {
    pool = playerCards.filter(function(c) {
      return c.house === sharpenTarget.house && c.id !== sharpenTarget.id && !c.deployed_zone;
    });
  } else {
    pool = playerCards.filter(function(c) {
      return c.id !== sharpenTarget.id && !c.deployed_zone;
    });
  }

  // Sort fuel: lowest rarity first, then lowest sharpness (sacrifice your worst)
  pool.sort(function(a, b) {
    var ra = RARITY_ORDER[a.rarity] || 9, rb = RARITY_ORDER[b.rarity] || 9;
    if (ra !== rb) return rb - ra; // common first
    return (a.sharpness || 0) - (b.sharpness || 0);
  });

  var fuelHtml = '';
  pool.forEach(function(c) {
    fuelHtml += '<div class="fuel-card" data-fuel-id="' + c.id + '" onclick="toggleFuel(' + c.id + ',' + needed + ')">'
      + '<div class="fuel-card-name">' + esc(c.name) + '</div>'
      + '<div class="fuel-card-rarity" style="color:' + (RARITY_COLORS[c.rarity] || '#999') + '">' + (c.rarity || 'common') + '</div>'
      + '<div class="fuel-card-sharp">' + (c.sharpness != null ? c.sharpness + '%' : '100%') + ' sharp</div>'
      + '</div>';
  });

  document.getElementById('sharpenFuelTitle').textContent = 'SELECT ' + needed + ' FUEL CARDS (will be destroyed)';
  document.getElementById('sharpenFuelGrid').innerHTML = fuelHtml;
  document.getElementById('sharpenFuel').style.display = 'block';
  document.getElementById('sharpenConfirm').disabled = true;
  document.getElementById('sharpenConfirm').textContent = '\u2692 SELECT ' + needed + ' CARDS';
}

function toggleFuel(cardId, needed) {
  var idx = sharpenFuelIds.indexOf(cardId);
  if (idx >= 0) {
    sharpenFuelIds.splice(idx, 1);
  } else if (sharpenFuelIds.length < needed) {
    sharpenFuelIds.push(cardId);
  }
  // Update visual
  document.querySelectorAll('.fuel-card').forEach(function(el) {
    el.classList.toggle('selected', sharpenFuelIds.indexOf(parseInt(el.dataset.fuelId)) >= 0);
  });
  // Update confirm button
  var ready = sharpenFuelIds.length === needed;
  document.getElementById('sharpenConfirm').disabled = !ready;
  document.getElementById('sharpenConfirm').textContent = ready
    ? '\u2692 SHARPEN (sacrifice ' + needed + ' cards)'
    : '\u2692 SELECT ' + (needed - sharpenFuelIds.length) + ' MORE';
}

async function confirmSharpen() {
  if (!sharpenTarget || !sharpenMethod || sharpenFuelIds.length === 0) return;

  var btn = document.getElementById('sharpenConfirm');
  btn.disabled = true;
  btn.textContent = 'SHARPENING...';

  try {
    var res = await fetch('/api/cards/sharpen', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        player_id: playerId,
        card_id: sharpenTarget.id,
        method: sharpenMethod,
        fuel_card_ids: sharpenFuelIds
      })
    });

    var data = await res.json();
    if (data.success) {
      // Update local state
      sharpenTarget.sharpness = 100;
      // Remove fuel cards from local array
      playerCards = playerCards.filter(function(c) { return sharpenFuelIds.indexOf(c.id) < 0; });
      closeSharpenModal();
      closeZoom({ target: document.getElementById('zoomOverlay') });
      updateProgress();
      render();
      // Show success feedback
      showToast('\u2692 ' + sharpenTarget.name + ' restored to 100% sharpness!');
    } else {
      btn.textContent = '\u2717 ' + (data.error || 'FAILED');
      setTimeout(function() { btn.disabled = false; btn.textContent = '\u2692 SHARPEN'; }, 2000);
    }
  } catch(e) {
    btn.textContent = '\u2717 ERROR';
    setTimeout(function() { btn.disabled = false; btn.textContent = '\u2692 SHARPEN'; }, 2000);
  }
}

function closeSharpenModal() {
  document.getElementById('sharpenOverlay').classList.remove('active');
  sharpenTarget = null;
  sharpenMethod = null;
  sharpenFuelIds = [];
}

function closeSharpen(e) {
  if (e.target === e.currentTarget) closeSharpenModal();
}

function showToast(msg) {
  var toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;background:var(--gold-dim,rgba(212,166,75,0.2));border:1px solid var(--gold-border,rgba(212,166,75,0.3));color:var(--gold,#D4A64B);font-family:var(--font-data);font-size:10px;padding:10px 20px;border-radius:10px;letter-spacing:1px;animation:fadeIn 0.3s ease';
  document.body.appendChild(toast);
  setTimeout(function() { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.5s'; }, 2500);
  setTimeout(function() { toast.remove(); }, 3000);
}

/* ═══ FILTER CLICKS ═══ */
document.getElementById('filters').addEventListener('click', function(e) {
  var btn = e.target.closest('.fbtn');
  if (!btn) return;
  var siblings = btn.parentElement.querySelectorAll('.fbtn');
  for (var i = 0; i < siblings.length; i++) siblings[i].classList.remove('active');
  btn.classList.add('active');
  activeFilters[btn.dataset.filter] = btn.dataset.val;
  render();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('sharpenOverlay').classList.contains('active')) closeSharpenModal();
    else document.getElementById('zoomOverlay').classList.remove('active');
  }
});

/* ═══ INIT ═══ */
loadData();
</script>
