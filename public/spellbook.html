<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spellbook &#8212; Nine Lives Network</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/variables-v2.css">
<link rel="stylesheet" href="/css/components-v2.css">
<link rel="stylesheet" href="/css/nav-v2.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Text',Georgia,serif;background:var(--bg-deep);color:#e8e4d9;min-height:100vh;overflow-x:hidden}
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 50% 40% at 15% 5%,rgba(255,215,0,0.02),transparent 70%),
  radial-gradient(ellipse 40% 50% at 85% 95%,rgba(138,43,226,0.015),transparent 70%)}
.main-container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 16px 60px}

/* Hero */
.hero{text-align:center;padding:14px 0 6px}
.hero h1{font-family:var(--font-title);font-weight:700;font-size:24px;color:var(--gold);letter-spacing:3px}
.hero p{font-family:var(--font-body);font-size:15px;font-style:italic;color:var(--text-muted);margin-top:4px}

/* Sticky house tabs */
.tab-bar{position:sticky;top:0;z-index:100;padding:8px 0 14px;
  background:linear-gradient(180deg, var(--bg-deep) 60%, rgba(8,6,30,0.9) 85%, transparent)}
.tab-row{display:flex;gap:3px;overflow-x:auto;padding:2px 0}
.tab-row::-webkit-scrollbar{height:3px}
.tab-row::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}
.htab{flex-shrink:0;padding:6px 11px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);
  background:transparent;color:#554E68;font-family:'Cinzel',serif;font-size:9px;font-weight:600;
  cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;display:flex;align-items:center;gap:5px}
.htab.active{border-color:var(--gold-border);background:rgba(212,166,75,0.08);color:var(--gold)}
.htab__dot{width:7px;height:7px;border-radius:50%;transition:all 0.2s;flex-shrink:0}
.htab.active .htab__dot{box-shadow:0 0 6px currentColor}
.htab__img{width:16px;height:16px;border-radius:50%;object-fit:contain}

/* Type filter row */
.type-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.ttab{font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:0.06em;
  text-transform:uppercase;padding:5px 12px;border-radius:4px;border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.02);color:#554E68;cursor:pointer;transition:all 0.2s}
.ttab:hover{border-color:rgba(212,166,75,0.2);color:#8a8677}
.ttab.active{background:rgba(212,166,75,0.08);border-color:var(--gold-border);color:var(--gold)}

/* Section headers */
.section-head{display:flex;align-items:center;gap:10px;margin:1.8rem 0 0.8rem}
.section-head h2{font-family:'Cinzel',serif;font-weight:700;font-size:1rem;color:var(--gold);letter-spacing:0.04em;white-space:nowrap}
.section-head .line{flex:1;height:1px;background:linear-gradient(90deg,rgba(212,166,75,0.3),transparent)}
.section-head .tag{font-family:'Press Start 2P',monospace;font-size:6px;color:#554E68;
  letter-spacing:0.08em;padding:3px 6px;border:1px solid rgba(255,255,255,0.06);border-radius:2px;white-space:nowrap}
.section-head__img{width:22px;height:22px;border-radius:50%;object-fit:contain}

/* Card grid */
.card-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:1rem}

/* ═══════════════════════════════════════════════════════════
   SPELL CARD — Spellbook grid size (200px)
   ═══════════════════════════════════════════════════════════ */
.spell-card{width:200px;min-height:300px;cursor:pointer}
.spell-card.show{opacity:1;transform:translateY(0)}
.spell-card.hide{display:none}
.spell-card .sc-body{pointer-events:none}

/* ═══ TOP ROW — FLEXBOX: [logo] [name] [mana] ═══
   This is THE fix. The old design used absolute positioning
   for the mana pill and a padding hack for the name.
   Now it's a simple flex row — logo and pill are fixed width,
   name takes the remaining space. fitCardNames() scales
   the font down so text always fits. Never clips or ellipsis. */
.spell-card .sc-top{
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 8px;
  position:relative;
}
.sc-house-logo--inline{
  width:24px;height:24px;flex-shrink:0;
  object-fit:contain;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,0.9));
}
.spell-card .sc-name{
  flex:1;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
  font-size:13px;
  line-height:1.15;
}
.spell-card .sc-mana{
  position:static;
  transform:none;
  flex-shrink:0;
  min-width:38px;
  text-align:center;
  font-size:9px;
  padding:3px 6px;
}

/* Art frame */
.sc-art{margin:0 0 6px;height:130px;border-radius:5px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  border:1px solid rgba(255,255,255,0.03)}
.sc-art__bg{position:absolute;inset:0}
.sc-art__glow{position:absolute;width:100px;height:100px;border-radius:50%;filter:blur(8px)}
.sc-art img{width:60px;height:60px;object-fit:contain;position:relative;z-index:1;filter:drop-shadow(0 2px 12px rgba(0,0,0,0.6))}
.sc-art__tier{position:absolute;bottom:2px;right:4px;font-family:var(--font-data);font-size:5px;letter-spacing:0.5px;opacity:0.5}
.sc-art__corner{position:absolute;width:4px;height:4px;border-radius:1px;transform:rotate(45deg)}
.sc-art__corner--tl{top:3px;left:3px}.sc-art__corner--tr{top:3px;right:3px}
.sc-art__corner--bl{bottom:3px;left:3px}.sc-art__corner--br{bottom:3px;right:3px}

/* Rarity pill — label only, tooltip on hover */
.sc-rarity{position:relative;cursor:default}
.sc-rarity__tip{
  display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  white-space:nowrap;font-family:'Crimson Text',serif;font-size:12px;font-weight:400;
  color:#e8e4d9;background:rgba(10,8,18,0.97);border:1px solid rgba(255,255,255,0.1);
  border-radius:5px;padding:5px 10px;z-index:999;pointer-events:none;
  box-shadow:0 6px 20px rgba(0,0,0,0.6);line-height:1.3}
.sc-rarity:hover .sc-rarity__tip{display:block}

/* ═══════════════════════════════════════════════════════════
   ZOOM MODAL — enlarged card
   ═══════════════════════════════════════════════════════════ */
.zoom-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9000;
  justify-content:center;align-items:center;padding:20px;cursor:pointer;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.zoom-overlay.active{display:flex}
.zoom-card{position:relative;cursor:default;animation:zoomIn 0.25s ease-out}
@keyframes zoomIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}

.zoom-card .spell-card{
  width:340px!important;min-height:510px!important;border-radius:14px;
  opacity:1!important;cursor:default;transform-style:preserve-3d;
  box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 40px rgba(212,166,75,0.08)}
.zoom-card .sc-border{inset:-3px;border-radius:17px}
.zoom-card .sc-edge{border-radius:15px}
.zoom-card .sc-face{border-radius:13px}
.zoom-card .sc-body{padding:0}
.zoom-card .sc-top{padding:14px 14px;gap:10px}
.zoom-card .sc-info{padding:0 18px 16px}
.zoom-card .sc-name{font-size:20px;
  text-shadow:0 1px 3px #000,0 0 6px #000,2px 0 3px #000,-2px 0 3px #000,0 -1px 3px #000}
.zoom-card .sc-mana{font-size:12px;padding:5px 10px 5px 8px;min-width:52px}
.zoom-card .sc-house-logo--inline{width:36px;height:36px}
.zoom-card .sc-house-logo{display:none}
.zoom-card .sc-crest-watermark{width:90px;height:90px;bottom:20px;right:12px;opacity:0.15}
.zoom-card .sc-art-spacer{flex:0 0 240px}
.zoom-card .sc-art{height:220px;border-radius:8px}
.zoom-card .sc-art img{width:120px;height:120px}
.zoom-card .sc-art__tier{font-size:8px}
.zoom-card .sc-art__corner{width:6px;height:6px}
.zoom-card .sc-type{font-size:12px;padding:4px 12px}
.zoom-card .sc-rarity{font-size:10px;padding:4px 10px}
.zoom-card .sc-type-row{margin-bottom:10px;padding-bottom:8px}
.zoom-card .sc-effect{padding:10px 12px;margin-bottom:8px}
.zoom-card .sc-effect__base{font-size:12px;line-height:1.7}
.zoom-card .sc-pills{gap:6px;margin-bottom:10px}
.zoom-card .pill{font-size:11px;padding:5px 12px;border-radius:4px}
.zoom-card .sc-flavor{font-size:14px;padding-top:8px}
.zoom-card .sc-bottom{font-size:7px;margin-top:10px;padding-top:6px}

/* Rarity pill clickable in zoom mode */
.zoom-card .sc-rarity{cursor:pointer;transition:all 0.2s}
.zoom-card .sc-rarity:hover{transform:translateY(-1px);filter:brightness(1.2)}
.zoom-card .sc-rarity::after{content:'\25B2';margin-left:4px;font-size:6px;opacity:0.5}
.zoom-card .sc-rarity__tip{display:none!important}

.sc-rarity--preview{animation:rarityPulse 0.3s ease}
@keyframes rarityPulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}

.zoom-close{position:absolute;top:-8px;right:-8px;width:28px;height:28px;border-radius:50%;
  font-size:14px;color:var(--gold);background:rgba(10,8,18,0.9);border:1px solid rgba(212,166,75,0.3);
  cursor:pointer;z-index:1;transition:all 0.2s;display:flex;align-items:center;justify-content:center;line-height:1}
.zoom-close:hover{background:rgba(212,166,75,0.2);border-color:var(--gold)}

.rarity-preview-bar{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,0.85);border-top:1px solid rgba(255,255,255,0.08);
  padding:8px 14px;font-family:'Crimson Text',serif;font-size:13px;color:var(--text-muted);
  text-align:center;border-radius:0 0 13px 13px;z-index:20;
  display:none;animation:fadeUp 0.2s ease}
.rarity-preview-bar.visible{display:block}
.rarity-preview-bar strong{color:#fff}

@media(max-width:400px){
  .zoom-card .spell-card{width:300px!important;min-height:450px!important}
  .zoom-card .sc-name{font-size:16px}
  .zoom-card .sc-art{height:120px}
}

/* Combos */
.combo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:1rem}
.combo-card{background:var(--bg-card);border:1px solid rgba(255,255,255,0.06);border-radius:8px;
  padding:0.9rem 1rem;position:relative;overflow:hidden;opacity:0;animation:fu 0.35s ease forwards}
.combo-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),#00D4FF,#8A2BE2);opacity:0.5}
.combo-name{font-family:'Cinzel',serif;font-weight:700;font-size:0.95rem;color:#fff;margin-bottom:0.2rem}
.combo-threshold{display:inline-flex;font-family:'Press Start 2P',monospace;font-size:6px;color:#00D4FF;
  padding:2px 6px;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.15);border-radius:3px;margin-bottom:0.3rem}
.combo-note{font-size:0.78rem;color:#8a8677;margin-bottom:0.25rem}
.combo-effect{font-size:0.9rem;margin-bottom:0.2rem;color:#00D4FF}
.combo-flavor{font-style:italic;font-size:0.82rem;color:#4a4840;border-top:1px solid rgba(255,255,255,0.05);padding-top:0.3rem;margin-top:0.2rem}
.loading{text-align:center;padding:40px;font-family:'Crimson Text',serif;font-style:italic;color:#554E68}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  .card-grid{gap:8px}
  .spell-card{width:160px;min-height:260px}
  .spell-card .sc-top{padding:6px 5px;gap:4px}
  .spell-card .sc-name{font-size:11px}
  .spell-card .sc-mana{font-size:8px;padding:2px 4px;min-width:32px}
  .sc-house-logo--inline{width:18px;height:18px}
  .sc-art{height:90px}
  .sc-art img{width:45px;height:45px}
  .combo-grid{grid-template-columns:1fr}
  .htab{padding:5px 8px;font-size:8px}
}
</style>
</head>

<script src="/js/spell-particles.js"></script>
<script>
/* ═══ HOUSES ═══ */
var HOUSES={
  universal:{name:'Universal',color:'#D4A64B',rgb:'212,166,75',img:null,element:'ALL HOUSES'},
  smoulders:{name:'Smoulders',color:'#E03C31',rgb:'224,60,49',img:'/assets/images/houses/House-smoulders.png',element:'FIRE \u00b7 AGGRESSION'},
  darktide:{name:'Darktide',color:'#00B4D8',rgb:'0,180,216',img:'/assets/images/houses/House-darktide.png',element:'WATER \u00b7 CONTROL'},
  stonebark:{name:'Stonebark',color:'#5CB338',rgb:'92,179,56',img:'/assets/images/houses/House-stonebark.png',element:'EARTH \u00b7 ENDURANCE'},
  ashenvale:{name:'Ashenvale',color:'#90E0EF',rgb:'144,224,239',img:'/assets/images/houses/House-Ashenvale.png',element:'WIND \u00b7 SPEED'},
  stormrage:{name:'Stormrage',color:'#FFC800',rgb:'255,200,0',img:'/assets/images/houses/House-stormrage.png',element:'LIGHTNING \u00b7 HIGH RISK'},
  nighthollow:{name:'Nighthollow',color:'#7B2D8E',rgb:'123,45,142',img:'/assets/images/houses/House-nighthollow.png',element:'SHADOW \u00b7 DISRUPTION'},
  dawnbringer:{name:'Dawnbringer',color:'#FF8C00',rgb:'255,140,0',img:'/assets/images/houses/House-dawnbringer.png',element:'LIGHT \u00b7 SUPPORT'},
  manastorm:{name:'Manastorm',color:'#5B8FE0',rgb:'91,143,224',img:'/assets/images/houses/House-manastorm.png',element:'ARCANE \u00b7 MANIPULATION'},
  plaguemire:{name:'Plaguemire',color:'#E84393',rgb:'232,67,147',img:'/assets/images/houses/House-plaguemire.png',element:'POISON \u00b7 ATTRITION'}
};
var HO=['universal','smoulders','darktide','stonebark','ashenvale','stormrage','nighthollow','dawnbringer','manastorm','plaguemire'];

var PC={'BURN':'orange','SCALD':'orange','SPREAD':'red','STRIP':'red','ERUPTION':'red','DRAIN':'purple','PULL':'blue','REFLECT':'cyan','CLOAK':'dark','STEALTH':'dark','SWAP':'pink','WEAKEN':'orange','ANCHOR':'brown','HEAL':'green','THORNS':'green','CONVERT':'cyan','PERSIST':'gold','SWIFT':'white','HASTE':'cyan','FREE':'cyan','DODGE':'ice','REACH':'white','SWEEP':'gray','CRIT':'yellow','FIZZLE':'yellow','CHAIN':'blue','AMPLIFY':'purple','NIGHT':'dark','HEX':'purple','SILENCE':'gray','STEAL':'red','FREEZE':'ice','PIERCE':'white','ABSORB':'blue','RANDOMIZE':'pink','NEGATE':'white','REFUND':'cyan','INFECT':'toxic','WITHER':'brown','CORRODE':'toxic','PLAGUE':'toxic','TOXIC':'toxic','LOCKOUT':'red','UNDERDOG':'gold','AURA':'gold','GIFT':'white','JUSTICE':'gold','SAFE':'gold','RESTORE':'cyan','RESET':'cyan','INSPIRE':'gold','REVEAL':'white','DOT':'green','BONUS':'gold','BLESS':'gold','WARD':'gold','PURGE':'orange','PUSH':'ice','SHUFFLE':'blue','CURSE':'purple','VANISH':'dark','SIPHON':'purple','POISON':'toxic','IMMUNE':'cyan','SURGE':'yellow'};
function pillCol(tag){var k=tag.replace(/[^A-Z]/g,'').toUpperCase();for(var p in PC){if(k.indexOf(p)!==-1)return PC[p];}return'gray';}
var PARTICLE_MAP={smoulders:'ember',darktide:'rain',stonebark:'leaf',ashenvale:'wind',stormrage:'spark',nighthollow:'shadow',dawnbringer:'light',manastorm:'arcane',plaguemire:'toxic',universal:'stardust'};

var RARITY_LADDER=[
  {key:'basic',     label:'BASIC',     mult:1.0,  infMult:1.0, cls:'sc-rarity--basic',     manaAdd:0, tipColor:'#aaa'},
  {key:'common',    label:'COMMON',    mult:1.0,  infMult:1.0, cls:'sc-rarity--common',    manaAdd:0, tipColor:'#bbb'},
  {key:'uncommon',  label:'UNCOMMON',  mult:1.25, infMult:1.1, cls:'sc-rarity--uncommon',  manaAdd:0, tipColor:'#66dd66'},
  {key:'rare',      label:'RARE',      mult:1.5,  infMult:1.25,cls:'sc-rarity--rare',      manaAdd:1, tipColor:'#55bbff'},
  {key:'epic',      label:'EPIC',      mult:2.0,  infMult:1.5, cls:'sc-rarity--epic',      manaAdd:1, tipColor:'#bb88ff'},
  {key:'legendary', label:'LEGENDARY', mult:3.0,  infMult:2.0, cls:'sc-rarity--legendary', manaAdd:2, tipColor:'#ffd700'}
];

var allSpells=[],aH='all',aT='all';
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ═══════════════════════════════════════════
   fitCardNames(root?)
   Scales .sc-name font down until text fits.
   No ellipsis ever. Call after rendering cards.
   ═══════════════════════════════════════════ */
function fitCardNames(root){
  var names=(root||document).querySelectorAll('.sc-name');
  names.forEach(function(el){
    el.style.fontSize='';
    if(el.scrollWidth<=el.clientWidth||el.clientWidth===0)return;
    var base=parseFloat(getComputedStyle(el).fontSize)||15;
    var size=base;
    while(el.scrollWidth>el.clientWidth&&size>7){
      size-=0.5;
      el.style.fontSize=size+'px';
    }
  });
}

function buildTabs(){
  var h='<button class="htab active" data-h="all" onclick="swH(\'all\',this)"><span class="htab__dot" style="background:#D4A64B"></span>All</button>';
  HO.forEach(function(k){var house=HOUSES[k];
    h+='<button class="htab" data-h="'+k+'" onclick="swH(\''+k+'\',this)">'+(house.img?'<img class="htab__img" src="'+house.img+'" onerror="this.style.display=\'none\'">':'<span class="htab__dot" style="background:'+house.color+'"></span>')+house.name+'</button>';
  });
  document.getElementById('houseTabs').innerHTML=h;
}

/* ═══════════════════════════════════════════
   buildCard(spell, delay)
   Top row = flexbox: [logo] [name] [mana]
   ═══════════════════════════════════════════ */
function buildCard(s,delay){
  var h=HOUSES[s.house]||HOUSES.universal;
  var bn=[];
  try{bn=typeof s.bonus_effects==='string'?JSON.parse(s.bonus_effects):(s.bonus_effects||[]);}catch(e){bn=[];}
  if(!Array.isArray(bn))bn=[];
  var pType=PARTICLE_MAP[s.house]||'stardust';
  var spellType=s.spell_type||'attack';

  var logoInline=h.img
    ?'<img class="sc-house-logo--inline" src="'+h.img+'" onerror="this.style.display=\'none\'">'
    :'<span class="sc-house-logo--inline" style="display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0.5">&#10022;</span>';
  var crestWM=h.img?'<img class="sc-crest-watermark" src="'+h.img+'" onerror="this.style.display=\'none\'">':'';
  var manaHtml='<div class="sc-mana" data-base-mana="'+s.mana_cost+'">'+s.mana_cost+' MP</div>';

  var hasArt=s.image_url&&s.image_url.length>0;
  var artImg=hasArt?'<div class="sc-art-img" style="background-image:url(/assets/images/spells/'+esc(s.image_url)+')"></div>':'';
  var artIcon=h.img?'<img src="'+h.img+'" onerror="this.style.display=\'none\'">':'<span style="font-size:28px;position:relative;z-index:1">&#10022;</span>';
  var artBlock=hasArt?'<div class="sc-art-spacer"></div>'
    :'<div class="sc-art"><div class="sc-art__bg" style="background:radial-gradient(ellipse at 50% 40%,'+h.color+'12,transparent 65%),linear-gradient(180deg,rgba(10,8,6,0.5),rgba(14,12,10,0.7))"></div><div class="sc-art__glow" style="background:radial-gradient(circle,'+h.color+'0A,transparent 70%)"></div>'+artIcon+'<div class="sc-art__corner sc-art__corner--tl" style="background:'+h.color+'25"></div><div class="sc-art__corner sc-art__corner--tr" style="background:'+h.color+'25"></div><div class="sc-art__corner sc-art__corner--bl" style="background:'+h.color+'25"></div><div class="sc-art__corner sc-art__corner--br" style="background:'+h.color+'25"></div></div>';

  var r0=RARITY_LADDER[0];
  var rarityHtml='<span class="sc-rarity '+r0.cls+'" data-rarity-idx="0" data-base-effect="'+esc(s.base_effect||'')+'" data-base-mana="'+s.mana_cost+'">'+r0.label+'<span class="sc-rarity__tip" style="color:'+r0.tipColor+'">\u00d71.0 power \u00b7 \u00d71.0 influence</span></span>';

  var effectHtml='';
  if(s.base_effect&&s.base_effect!=='\u2014'&&s.base_effect!=='-')effectHtml='<div class="sc-effect"><div class="sc-effect__base" style="color:'+h.color+'">'+esc(s.base_effect)+'</div></div>';

  var pillsHtml='';
  if(bn.length>0){pillsHtml='<div class="sc-pills">';bn.forEach(function(b){var tag=b.tag||b.key||'';var desc=b.desc||b.description||tag;pillsHtml+='<span class="pill p-'+pillCol(tag)+'">'+esc(tag)+'<span class="tip">'+esc(desc)+'</span></span>';});pillsHtml+='</div>';}

  return '<div class="spell-card" data-house="'+s.house+'" data-type="'+spellType+'" data-color="'+h.color+'" data-glow="'+h.color+'" data-particle="'+pType+'" data-foil-s="0.18" data-foil-w="0.1" data-num="35" style="--hc:'+h.color+';--hc-shadow:'+h.color+'30;--edge-color:'+h.color+'20;--edge-hover:'+h.color+'40;--inner-glow:'+h.color+'08;--inner-glow-hover:'+h.color+'15;--card-bg:linear-gradient(180deg,'+h.color+'0A,#0c0a14 35%,#0a0810);transition-delay:'+delay+'s">'
    +'<div class="sc-border"></div><div class="sc-edge"></div>'
    +'<div class="sc-face">'+artImg+'<div class="sc-inner-edge"></div><div class="sc-foil"></div><div class="sc-rainbow"></div><canvas class="sc-particles"></canvas><div class="sc-glow"></div></div>'
    +crestWM
    +'<div class="sc-body">'
    +'<div class="sc-top">'+logoInline+'<div class="sc-name">'+esc(s.name)+'</div>'+manaHtml+'</div>'
    +artBlock
    +'<div class="sc-info">'
    +'<div class="sc-type-row"><span class="sc-type sc-type--'+spellType+'">'+spellType+'</span><span class="sc-type-spacer"></span>'+rarityHtml+'</div>'
    +effectHtml+pillsHtml
    +'<div class="sc-flavor">"'+esc(s.flavor_text||s.motto||'')+'"</div>'
    +'<div class="sc-bottom" style="color:'+h.color+'">'+h.name.toUpperCase()+'</div>'
    +'</div></div></div>';
}

function render(){
  var f=allSpells.filter(function(s){
    if(aH!=='all'&&s.house!==aH)return false;
    if(aT!=='all'&&(s.spell_type||'attack')!==aT)return false;
    return s.is_active!==false;
  });
  var g={};HO.forEach(function(h){g[h]=[];});
  f.forEach(function(s){var h=s.house||'universal';if(!g[h])g[h]=[];g[h].push(s);});
  var html='',d=0;
  HO.forEach(function(k){
    var sp=g[k];if(!sp||!sp.length)return;var h=HOUSES[k]||HOUSES.universal;
    var im=h.img?'<img class="section-head__img" src="'+h.img+'" onerror="this.style.display=\'none\'">':'';
    html+='<div class="section-head">'+im+'<h2>'+(k==='universal'?'Universal Spells':'House '+h.name)+'</h2><div class="line"></div><span class="tag">'+h.element+'</span></div>';
    html+='<div class="card-grid">';sp.forEach(function(s){html+=buildCard(s,Math.min(d*0.04,0.5));d++;});html+='</div>';
  });
  if(!html)html='<div class="loading">No spells found</div>';
  document.getElementById('spellContent').innerHTML=html;
  setTimeout(function(){
    document.querySelectorAll('.spell-card').forEach(function(c){c.classList.add('show');});
    attachCardClicks();
    fitCardNames();
    if('IntersectionObserver' in window){
      var obs=new IntersectionObserver(function(entries){entries.forEach(function(en){
        if(en.isIntersecting&&!en.target._particleInit){en.target._particleInit=true;initSpellCard(en.target);}
      });},{rootMargin:'200px'});
      document.querySelectorAll('.spell-card').forEach(function(c){obs.observe(c);});
    }else{initAllSpellCards();}
  },50);
}

function swH(h,btn){aH=h;document.querySelectorAll('.htab').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');render();}
document.getElementById('typeTabs').addEventListener('click',function(e){var b=e.target.closest('.ttab');if(!b)return;document.querySelectorAll('.ttab').forEach(function(x){x.classList.remove('active');});b.classList.add('active');aT=b.dataset.t;render();});

function openZoom(cardEl){
  var clone=cardEl.cloneNode(true);clone.classList.add('show');clone.style.transition='none';
  var zc=document.getElementById('zoomCard');
  zc.innerHTML='<button class="zoom-close" onclick="closeZoom(event)">&#10005;</button>';
  zc.appendChild(clone);
  var bar=document.createElement('div');bar.className='rarity-preview-bar';clone.appendChild(bar);
  document.getElementById('zoomOverlay').classList.add('active');
  document.body.style.overflow='hidden';
  setTimeout(function(){
    initSpellCard(clone);
    fitCardNames(document.getElementById('zoomCard'));
  },100);
}
function closeZoom(e){
  if(e&&e.target.closest('.spell-card')&&!e.target.closest('.zoom-close'))return;
  document.getElementById('zoomOverlay').classList.remove('active');
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeZoom();});

/* ═══ RARITY CYCLING (zoom only) ═══ */
function scaleEffect(baseEffect,mult){
  if(!baseEffect||mult===1)return baseEffect;
  return baseEffect.replace(/(\d+(\.\d+)?)/g,function(m){
    var n=parseFloat(m);var scaled=Math.round(n*mult);
    return scaled===n?m:'<b style="color:#fff">'+scaled+'</b>';
  });
}
document.addEventListener('click',function(e){
  var pill=e.target.closest('.zoom-card .sc-rarity');if(!pill)return;e.stopPropagation();
  var curIdx=parseInt(pill.getAttribute('data-rarity-idx'))||0;
  var nextIdx=(curIdx+1)%RARITY_LADDER.length;
  var tier=RARITY_LADDER[nextIdx];
  var baseEffect=pill.getAttribute('data-base-effect');
  var baseMana=parseInt(pill.getAttribute('data-base-mana'))||1;

  pill.className='sc-rarity '+tier.cls;
  pill.setAttribute('data-rarity-idx',nextIdx);
  pill.innerHTML=tier.label+'<span class="sc-rarity__tip" style="color:'+tier.tipColor+'">\u00d7'+tier.mult+' power \u00b7 \u00d7'+tier.infMult+' influence</span>';
  pill.classList.add('sc-rarity--preview');
  setTimeout(function(){pill.classList.remove('sc-rarity--preview');},300);

  var card=pill.closest('.spell-card');if(!card)return;
  var effectEl=card.querySelector('.sc-effect__base');
  if(effectEl&&baseEffect&&baseEffect!=='\u2014'&&baseEffect!=='-'){
    effectEl.innerHTML=(tier.mult===1)?esc(baseEffect):scaleEffect(baseEffect,tier.mult);
  }
  var manaEl=card.querySelector('.sc-mana');
  if(manaEl){var newMana=baseMana+tier.manaAdd;manaEl.textContent=newMana+' MP';
    if(tier.manaAdd>0){manaEl.style.color='#ff8844';manaEl.style.borderColor='rgba(255,136,68,0.3)';}
    else{manaEl.style.color='';manaEl.style.borderColor='';}}
  var edge=card.querySelector('.sc-edge');
  if(edge){
    if(nextIdx>=5){edge.style.borderColor='rgba(255,200,0,0.5)';edge.style.boxShadow='0 0 16px rgba(255,200,0,0.2)';}
    else if(nextIdx>=4){edge.style.borderColor='rgba(160,80,240,0.4)';edge.style.boxShadow='0 0 12px rgba(160,80,240,0.15)';}
    else if(nextIdx>=3){edge.style.borderColor='rgba(0,150,255,0.3)';edge.style.boxShadow='0 0 8px rgba(0,150,255,0.1)';}
    else{edge.style.borderColor='';edge.style.boxShadow='';}}
  var bar=card.querySelector('.rarity-preview-bar');
  if(bar){if(nextIdx===0){bar.classList.remove('visible');}
    else{bar.innerHTML='<strong>'+tier.label+'</strong> preview \u2014 \u00d7'+tier.mult+' points, \u00d7'+tier.infMult+' influence'+(tier.manaAdd>0?', +'+tier.manaAdd+' mana cost':'');bar.classList.add('visible');}}
},false);

/* ═══ PILL TOOLTIPS ═══ */
(function(){
  var ft=document.createElement('div');ft.id='floatTip';
  ft.style.cssText='display:none;position:fixed;z-index:99999;font-family:Crimson Text,serif;font-size:12px;font-weight:400;color:#e8e4d9;white-space:normal;width:max-content;max-width:200px;background:rgba(10,8,18,0.97);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:6px 10px;line-height:1.4;box-shadow:0 6px 20px rgba(0,0,0,0.6);pointer-events:none';
  document.body.appendChild(ft);
  document.addEventListener('mouseenter',function(e){
    var pill=e.target.closest('.pill');if(!pill)return;var tip=pill.querySelector('.tip');if(!tip)return;
    var style=getComputedStyle(pill);ft.style.borderColor=style.borderColor||'rgba(212,166,75,0.3)';ft.style.color=style.color||'#D4A64B';
    ft.textContent=tip.textContent;ft.style.display='block';
    var r=pill.getBoundingClientRect();var tw=ft.offsetWidth,th=ft.offsetHeight;
    var left=r.left+r.width/2-tw/2;var top=r.top-th-10;
    if(left<8)left=8;if(left+tw>window.innerWidth-8)left=window.innerWidth-tw-8;if(top<8)top=r.bottom+10;
    ft.style.left=left+'px';ft.style.top=top+'px';
  },true);
  document.addEventListener('mouseleave',function(e){var pill=e.target.closest('.pill');if(!pill)return;ft.style.display='none';},true);
})();

function attachCardClicks(){
  document.querySelectorAll('.spell-card').forEach(function(c){
    c.onclick=function(e){if(!e.target.closest('.pill')&&!e.target.closest('.sc-rarity'))openZoom(c);};
  });
}

async function load(){
  try{var r=await fetch('/api/spells');var d=await r.json();allSpells=d||[];
    allSpells.sort(function(a,b){var ha=HO.indexOf(a.house),hb=HO.indexOf(b.house);if(ha===-1)ha=99;if(hb===-1)hb=99;if(ha!==hb)return ha-hb;if(a.tier!==b.tier)return a.tier-b.tier;return(a.name||'').localeCompare(b.name||'');});
    render();
  }catch(e){console.error('Spells load error:',e);document.getElementById('spellContent').innerHTML='<div class="loading">Failed to load spells. Add spells via spell-admin.</div>';}
}

function toggleMobileMenu(){var m=document.getElementById('mobileMenu');var h=document.getElementById('hamburger');m.classList.toggle('open');h.classList.toggle('active');}
function doLogout(){localStorage.removeItem('player_id');window.location.href='/';}

buildTabs();
if(localStorage.getItem('player_id')){var nl=document.getElementById('navLogout');if(nl)nl.style.display='';var ml=document.getElementById('mobileLogout');if(ml)ml.style.display='';}
load();
</script>
