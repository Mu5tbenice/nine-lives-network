<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spellbook | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg-deep:#120e1e;--bg-warm:#1a1528;--bg-card:rgba(30,22,42,0.7);--border:rgba(212,166,75,0.12);--border-glow:rgba(212,166,75,0.3);--gold:#D4A64B;--gold-dim:rgba(212,166,75,0.15);--text-bright:#F5F0E8;--text-body:#D4C8B8;--text-muted:#9B8E7E;--text-faint:#6B5E50;--sunset:#e8855a;--sky:#8BB4E0;--green:#6acd8a;--red:#e85a6a;--cyan:#6ac8d8;--purple:#b088e8;--font-title:'Cinzel',serif;--font-body:'Crimson Text',Georgia,serif;--font-data:'Press Start 2P',monospace;--font-mono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(232,133,90,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,180,224,0.06) 0%,transparent 40%),linear-gradient(180deg,#1a1528 0%,#120e1e 30%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body)}
    a{color:var(--gold);text-decoration:none}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}
    .top-nav{position:sticky;top:0;z-index:100;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(18,14,30,0.85);backdrop-filter:blur(12px)}
    .nav-logo{font-family:var(--font-title);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px;text-decoration:none}
    .nav-links{display:flex;gap:4px;list-style:none}
    .nav-links a{font-family:var(--font-mono);font-size:8px;padding:4px 8px;border-radius:6px;color:var(--text-muted);text-decoration:none;border:1px solid transparent;transition:all 0.15s}
    .nav-links a:hover,.nav-links a.active{color:var(--gold);border-color:rgba(212,166,75,0.15);background:var(--gold-dim)}
    .hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px}
    .hamburger span{display:block;width:18px;height:2px;background:var(--text-muted);margin:3px 0;border-radius:1px}
    .mobile-menu{display:none;position:fixed;top:44px;left:0;right:0;z-index:99;background:rgba(18,14,30,0.95);backdrop-filter:blur(12px);padding:12px 16px;border-bottom:1px solid var(--border);flex-direction:column;gap:8px}
    .mobile-menu.active{display:flex}
    .mobile-menu a{font-family:var(--font-mono);font-size:9px;padding:8px 12px;border-radius:8px;color:var(--text-muted);text-decoration:none;border:1px solid var(--border)}
    @media(max-width:700px){.nav-links{display:none}.hamburger{display:block}}
    @media(min-width:701px){.mobile-menu{display:none!important}}
    .main{max-width:600px;margin:0 auto;padding:14px}
    .section-label{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
    .section-label__text{font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
    .section-label__line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

    .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
    .filter-btn{font-family:var(--font-mono);font-size:8px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.15s}
    .filter-btn.active{color:var(--gold);border-color:rgba(212,166,75,0.25);background:var(--gold-dim)}

    .card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    @media(min-width:500px){.card-grid{grid-template-columns:repeat(3,1fr)}}

    .spell-card{border-radius:12px;background:var(--bg-card);border:1.5px solid var(--border);padding:12px;transition:all 0.2s;cursor:pointer;position:relative;overflow:hidden}
    .spell-card:hover{transform:translateY(-2px);border-color:rgba(212,166,75,0.25)}
    .spell-card .rarity-stripe{position:absolute;top:0;left:0;right:0;height:3px}

    .card-detail{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
    .card-detail.open{display:flex}
    .detail-inner{max-width:360px;width:100%;border-radius:16px;background:#1e1630;border:1px solid var(--border-glow);padding:24px;position:relative}
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="/" class="nav-logo">Nine Lives Network</a>
    <ul class="nav-links"><li><a href="/dashboard.html">Dashboard</a></li><li><a href="/nethara-live.html">Nethara Live</a></li><li><a href="/duels.html">Duels</a></li><li><a href="/gauntlet.html">Gauntlet</a></li><li><a href="/boss.html">Boss</a></li><li><a href="/leaderboards.html">Ranks</a></li><li><a href="/packs.html">Packs</a></li><li><a href="/collection.html" class="active">Spellbook</a></li></ul>
    <button class="hamburger" onclick="document.getElementById('mm').classList.toggle('active')"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu" id="mm"><a href="/dashboard.html">Dashboard</a><a href="/nethara-live.html">Nethara Live</a><a href="/duels.html">Duels</a><a href="/gauntlet.html">Gauntlet</a><a href="/boss.html">Boss</a><a href="/leaderboards.html">Ranks</a><a href="/packs.html">Packs</a></li><li><a href="/collection.html" class="active">Spellbook</a></div>
  <div class="main" id="content"><div style="text-align:center;padding:60px 20px;"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div></div></div>

  <!-- Card detail modal -->
  <div class="card-detail" id="cardDetail" onclick="if(event.target===this)closeDetail()">
    <div class="detail-inner" id="detailInner"></div>
  </div>

<script>
var playerId=null,allCards=[],currentFilter='all';
var RARITY_COLORS={common:'#bbb',uncommon:'#6acd8a',rare:'#5588ff',epic:'#b088e8',legendary:'#ffd700'};
var TYPE_COLORS={attack:'#e85a6a',defend:'#5588ff',support:'#6acd8a',manipulation:'#b088e8'};

function getPlayerId(){var p=new URLSearchParams(window.location.search);var f=p.get('player_id');if(f){localStorage.setItem('player_id',f);return f;}return localStorage.getItem('player_id');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

async function loadCollection(){
  playerId=getPlayerId();
  if(!playerId){document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px"><a href="/register.html" style="font-family:var(--font-title);font-size:16px;">Register to play →</a></div>';return;}

  try{
    var cR=await fetch('/api/packs/collection/'+playerId);
    if(cR.ok){var cd=await cR.json();allCards=(cd.cards||cd||[]).map(function(c){return{id:c.id,name:c.spell_name||c.name,spell_type:c.spell_type||'attack',rarity:c.rarity||'common',atk:(c.spell&&c.spell.base_atk)||c.base_atk||0,hp:(c.spell&&c.spell.base_hp)||c.base_hp||0,image_url:c.image_url||null,house:c.spell_house||c.house||'universal',effects:c.spell_effects||[],durability:(c.current_charges||0)+'/'+(c.max_charges||0),mana_cost:c.cost||1,description:c.base_effect||''};});}
  }catch(e){}

  // Also try spells endpoint as fallback
  if(allCards.length===0){
    try{var sR=await fetch('/api/spells');if(sR.ok){var sd=await sR.json();allCards=sd.spells||sd||[];}}catch(e){}
  }

  render();
}

function render(){
  var filtered=currentFilter==='all'?allCards:allCards.filter(function(c){return(c.rarity||'').toLowerCase()===currentFilter;});
  var counts={};allCards.forEach(function(c){var r=(c.rarity||'common').toLowerCase();counts[r]=(counts[r]||0)+1;});

  var html='';
  html+='<div class="section-label"><span style="font-size:14px;">📖</span><span class="section-label__text">SPELLBOOK</span><span class="section-label__line"></span></div>';
  html+='<p style="font-family:var(--font-body);font-size:14px;color:var(--text-muted);margin-bottom:14px;">'+allCards.length+' cards collected</p>';

  // Filters
  html+='<div class="filters">';
  html+='<button class="filter-btn '+(currentFilter==='all'?'active':'')+'" onclick="setFilter(\'all\')">ALL ('+allCards.length+')</button>';
  ['common','uncommon','rare','epic','legendary'].forEach(function(r){
    if(counts[r])html+='<button class="filter-btn '+(currentFilter===r?'active':'')+'" onclick="setFilter(\''+r+'\')" style="'+(currentFilter===r?'color:'+RARITY_COLORS[r]+';border-color:'+RARITY_COLORS[r]+'40;':'')+'">'+r.toUpperCase()+' ('+counts[r]+')</button>';
  });
  html+='</div>';

  // Card grid
  html+='<div class="card-grid">';
  if(filtered.length>0){
    filtered.forEach(function(c,i){
      var rc=RARITY_COLORS[(c.rarity||'common').toLowerCase()]||'#bbb';
      var tc=TYPE_COLORS[(c.spell_type||'attack').toLowerCase()]||'#e85a6a';
      var imgH=c.image_url?'<img src="'+c.image_url+'" style="width:100%;height:80px;object-fit:cover;border-radius:6px;margin-bottom:6px;">':'';
      html+='<div class="spell-card" onclick="showDetail('+i+')">';
      html+='<div class="rarity-stripe" style="background:linear-gradient(90deg,'+rc+',transparent);"></div>';
      html+=imgH;
      html+='<div style="font-family:var(--font-data);font-size:6px;color:'+tc+';margin-bottom:3px;">'+(c.spell_type||'ATTACK').toUpperCase()+'</div>';
      html+='<div style="font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--text-bright);line-height:1.2;margin-bottom:4px;">'+esc(c.name)+'</div>';
      html+='<div style="font-family:var(--font-data);font-size:6px;color:'+rc+';margin-bottom:6px;">'+(c.rarity||'common').toUpperCase()+'</div>';
      html+='<div style="display:flex;justify-content:space-between;">';
      html+='<span style="font-family:var(--font-data);font-size:7px;color:var(--red);">⚔️'+(c.atk||c.base_atk||'?')+'</span>';
      html+='<span style="font-family:var(--font-data);font-size:7px;color:var(--green);">💚'+(c.hp||c.base_hp||'?')+'</span>';
      if(c.mana_cost)html+='<span style="font-family:var(--font-data);font-size:7px;color:var(--cyan);">💧'+c.mana_cost+'</span>';
      html+='</div></div>';
    });
  }else{
    html+='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-faint);font-style:italic;">No cards found. <a href="/packs.html">Open a pack!</a></div>';
  }
  html+='</div>';

  document.getElementById('content').innerHTML=html;
}

function setFilter(f){currentFilter=f;render();}

function showDetail(idx){
  var filtered=currentFilter==='all'?allCards:allCards.filter(function(c){return(c.rarity||'').toLowerCase()===currentFilter;});
  var c=filtered[idx];if(!c)return;
  var rc=RARITY_COLORS[(c.rarity||'common').toLowerCase()]||'#bbb';
  var tc=TYPE_COLORS[(c.spell_type||'attack').toLowerCase()]||'#e85a6a';

  var h='<span style="position:absolute;top:12px;right:16px;font-size:18px;cursor:pointer;color:var(--text-faint);" onclick="closeDetail()">✕</span>';
  h+='<div style="text-align:center;">';
  if(c.image_url)h+='<img src="'+c.image_url+'" style="width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-bottom:12px;">';
  h+='<div style="font-family:var(--font-data);font-size:7px;color:'+tc+';letter-spacing:1px;margin-bottom:4px;">'+(c.spell_type||'ATTACK').toUpperCase()+'</div>';
  h+='<div style="font-family:var(--font-title);font-size:20px;font-weight:700;color:var(--text-bright);letter-spacing:1px;">'+esc(c.name)+'</div>';
  h+='<div style="font-family:var(--font-data);font-size:7px;color:'+rc+';margin:6px 0;">'+('★'.repeat({common:1,uncommon:2,rare:3,epic:4,legendary:5}[(c.rarity||'common').toLowerCase()]||1))+' '+(c.rarity||'common').toUpperCase()+'</div>';
  h+='</div>';

  h+='<div style="display:flex;justify-content:center;gap:16px;margin:16px 0;padding:12px;background:rgba(0,0,0,0.2);border-radius:10px;">';
  h+='<div style="text-align:center;"><div style="font-family:var(--font-data);font-size:14px;color:var(--red);">⚔️ '+(c.atk||c.base_atk||'?')+'</div><div style="font-family:var(--font-mono);font-size:7px;color:var(--text-faint);">ATK</div></div>';
  h+='<div style="text-align:center;"><div style="font-family:var(--font-data);font-size:14px;color:var(--green);">💚 '+(c.hp||c.base_hp||'?')+'</div><div style="font-family:var(--font-mono);font-size:7px;color:var(--text-faint);">HP</div></div>';
  if(c.mana_cost)h+='<div style="text-align:center;"><div style="font-family:var(--font-data);font-size:14px;color:var(--cyan);">💧 '+c.mana_cost+'</div><div style="font-family:var(--font-mono);font-size:7px;color:var(--text-faint);">COST</div></div>';
  h+='</div>';

  if(c.description||c.effect_description){
    h+='<p style="font-family:var(--font-body);font-size:14px;color:var(--text-body);line-height:1.6;text-align:center;font-style:italic;">'+esc(c.description||c.effect_description)+'</p>';
  }
  if(c.durability)h+='<div style="text-align:center;margin-top:8px;font-family:var(--font-data);font-size:7px;color:var(--text-faint);">DURABILITY: '+c.durability+' CHARGES</div>';

  document.getElementById('detailInner').innerHTML=h;
  document.getElementById('cardDetail').classList.add('open');
}
function closeDetail(){document.getElementById('cardDetail').classList.remove('open');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDetail();});

loadCollection();
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
