<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spellbook | Nine Lives Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(232,133,90,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,180,224,0.06) 0%,transparent 40%),linear-gradient(180deg,#1a1528 0%,#120e1e 30%,#0e0a18 100%);font-family:'Crimson Text',Georgia,serif;color:#D4C8B8}

    /* ─── Header ─── */
    .coll-header{text-align:center;padding:24px 16px 8px}
    .coll-title{font-family:'Cinzel',serif;font-size:26px;font-weight:700;color:#F5F0E8;margin-bottom:4px}
    .coll-sub{font-size:14px;color:#847C98}
    .coll-count{font-family:'Press Start 2P',monospace;font-size:10px;color:#D4A64B;margin-top:8px}

    /* ─── Filters ─── */
    .coll-filters{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;align-items:center;max-width:1100px;margin:0 auto}
    .filter-group{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
    .filter-label{font-family:'Press Start 2P',monospace;font-size:7px;color:#554E68;padding:6px 0;margin-right:4px;white-space:nowrap}
    .fbtn{font-family:'Press Start 2P',monospace;font-size:7px;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#847C98;cursor:pointer;transition:all 0.15s;white-space:nowrap}
    .fbtn:hover{border-color:rgba(212,166,75,0.3);color:#CCC5DB}
    .fbtn.active{background:rgba(212,166,75,0.15);border-color:rgba(212,166,75,0.4);color:#D4A64B}
    .filter-sep{width:1px;height:20px;background:rgba(255,255,255,0.06);margin:0 4px}

    /* ─── Sort ─── */
    .sort-bar{display:flex;gap:8px;padding:0 16px 12px;max-width:1100px;margin:0 auto}
    .sort-bar select{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#CCC5DB;padding:5px 10px;border-radius:6px;cursor:pointer}

    /* ─── Card grid ─── */
    .coll-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:0 16px;max-width:1100px;margin:0 auto}
    @media(max-width:600px){.coll-grid{grid-template-columns:repeat(2,1fr);gap:8px}}

    /* ─── Deployed / Exhausted badges ─── */
    .card-wrap{position:relative}
    .coll-badge-deployed{position:absolute;top:6px;right:6px;z-index:10;background:rgba(212,166,75,0.25);border:1px solid rgba(212,166,75,0.4);color:#D4A64B;font-family:'Press Start 2P',monospace;font-size:6px;padding:2px 6px;border-radius:4px;pointer-events:none}
    .coll-badge-exhausted{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.55);backdrop-filter:blur(2px);border-radius:inherit;font-family:'Press Start 2P',monospace;font-size:10px;color:#e85a6a;letter-spacing:1px;pointer-events:none}
    .coll-badge-charges{position:absolute;bottom:6px;right:6px;z-index:10;font-family:'Press Start 2P',monospace;font-size:7px;color:#847C98;pointer-events:none}

    /* ─── Empty / Loading ─── */
    .coll-empty{text-align:center;padding:60px 20px}
    .coll-empty-icon{font-size:48px;margin-bottom:12px;opacity:0.4}
    .coll-empty-title{font-family:'Cinzel',serif;font-size:18px;color:#F5F0E8;margin-bottom:8px}
    .coll-empty-text{font-size:14px;color:#847C98}
    .coll-empty a{display:inline-block;margin-top:16px;padding:8px 20px;background:rgba(212,166,75,0.15);border:1px solid rgba(212,166,75,0.3);border-radius:8px;color:#D4A64B;font-family:'Press Start 2P',monospace;font-size:9px;text-decoration:none}
    .coll-loading{text-align:center;padding:80px 20px}
    .coll-spinner{width:32px;height:32px;border:3px solid rgba(212,166,75,0.12);border-top-color:#D4A64B;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ─── Zoom overlay ─── */
    .zoom-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);align-items:center;justify-content:center}
    .zoom-overlay.active{display:flex}
    .zoom-card{position:relative;transform:scale(1.5)}
    .zoom-close{position:absolute;top:-30px;right:-10px;background:none;border:none;color:#F5F0E8;font-size:20px;cursor:pointer;z-index:10}
  </style>
</head>
<body>

<!-- NAV -->
<nav class="top-nav">
  <a href="/" class="nav-logo">Nine Lives Network</a>
  <div class="nav-links" id="navLinks">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/nethara-live.html">Nethara Live</a>
    <a href="/duels.html">Duels</a>
    <a href="/gauntlet.html">Gauntlet</a>
    <a href="/boss.html">Boss</a>
    <a href="/leaderboards.html">Ranks</a>
    <a href="/packs.html">Packs</a>
    <a href="/collection.html" class="active">Spellbook</a>
  </div>
  <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">&#9776;</button>
</nav>

<!-- HEADER -->
<div class="coll-header">
  <div class="coll-title">&#128220; Your Spellbook</div>
  <div class="coll-sub">Every card you've collected</div>
  <div class="coll-count" id="cardCount"></div>
</div>

<!-- FILTERS -->
<div class="coll-filters" id="filters">
  <div class="filter-group">
    <span class="filter-label">RARITY</span>
    <button class="fbtn active" data-filter="rarity" data-val="all">All</button>
    <button class="fbtn" data-filter="rarity" data-val="common">Common</button>
    <button class="fbtn" data-filter="rarity" data-val="uncommon">Uncommon</button>
    <button class="fbtn" data-filter="rarity" data-val="rare">Rare</button>
    <button class="fbtn" data-filter="rarity" data-val="epic">Epic</button>
    <button class="fbtn" data-filter="rarity" data-val="legendary">Legendary</button>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">TYPE</span>
    <button class="fbtn active" data-filter="type" data-val="all">All</button>
    <button class="fbtn" data-filter="type" data-val="attack">ATK</button>
    <button class="fbtn" data-filter="type" data-val="defend">DEF</button>
    <button class="fbtn" data-filter="type" data-val="support">SUP</button>
    <button class="fbtn" data-filter="type" data-val="manipulation">MAN</button>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">STATUS</span>
    <button class="fbtn active" data-filter="status" data-val="all">All</button>
    <button class="fbtn" data-filter="status" data-val="ready">Ready</button>
    <button class="fbtn" data-filter="status" data-val="deployed">Deployed</button>
    <button class="fbtn" data-filter="status" data-val="exhausted">Exhausted</button>
  </div>
</div>

<!-- SORT -->
<div class="sort-bar">
  <select id="sortBy" onchange="renderCards()">
    <option value="rarity">Sort: Rarity</option>
    <option value="atk">Sort: ATK</option>
    <option value="hp">Sort: HP</option>
    <option value="name">Sort: Name</option>
    <option value="house">Sort: House</option>
    <option value="type">Sort: Type</option>
  </select>
</div>

<!-- CARDS -->
<div id="content">
  <div class="coll-loading"><div class="coll-spinner"></div><div style="font-family:'Press Start 2P',monospace;font-size:9px;color:#554E68">Loading spellbook...</div></div>
</div>

<!-- ZOOM OVERLAY -->
<div class="zoom-overlay" id="zoomOverlay" onclick="closeZoom(event)">
  <div class="zoom-card" id="zoomCard"><button class="zoom-close" onclick="closeZoom(event)">&#10005;</button></div>
</div>

<!-- SCRIPTS: using REAL filenames -->
<script src="/js/card-global.js"></script>
<script src="/js/spell-particles.js"></script>
<script src="/js/spell-card-builder.js"></script>
<script>
/* ═══ STATE ═══ */
var playerId = null;
var allCards = [];
var activeFilters = { rarity:'all', type:'all', status:'all' };

function getPlayerId() {
  var p = new URLSearchParams(window.location.search);
  var f = p.get('player_id') || p.get('pid');
  if (f) { localStorage.setItem('player_id', f); return f; }
  return localStorage.getItem('player_id');
}

/* ═══ LOAD ═══ */
async function loadCollection() {
  playerId = getPlayerId();
  if (!playerId) {
    document.getElementById('content').innerHTML =
      '<div class="coll-empty"><div class="coll-empty-icon">&#128302;</div>'
      + '<div class="coll-empty-title">No player found</div>'
      + '<div class="coll-empty-text">Register to start collecting cards</div>'
      + '<a href="/register.html">Register &rarr;</a></div>';
    return;
  }

  try {
    var cR = await fetch('/api/packs/collection/' + playerId);
    if (cR.ok) {
      var cd = await cR.json();
      allCards = (cd.cards || cd || []).map(normalizeCard);
    }

    // Fallback: load all spells if collection empty
    if (allCards.length === 0) {
      var sR = await fetch('/api/spells');
      if (sR.ok) {
        var sd = await sR.json();
        allCards = (sd.spells || sd || []).map(normalizeCard);
      }
    }
  } catch(e) {
    console.error('Load error:', e);
  }

  renderCards();
}

/* ═══ Normalize API data → buildSpellCard format ═══ */
function normalizeCard(c) {
  var effects = c.spell_effects || c.effects || c.effect_tags || c.bonus_effects || [];
  if (typeof effects === 'string') {
    try { effects = JSON.parse(effects); } catch(e) {
      effects = effects.split(',').map(function(e){ return e.trim(); }).filter(Boolean);
    }
  }
  if (!Array.isArray(effects)) effects = [];

  return {
    id: c.id,
    name: c.spell_name || c.name || 'Unknown',
    type: (c.spell_type || c.card_type || c.type || 'attack').toLowerCase(),
    spell_type: (c.spell_type || c.card_type || c.type || 'attack').toLowerCase(),
    rarity: (c.rarity || 'common').toLowerCase(),
    base_atk: c.atk || c.base_atk || 3,
    base_hp: c.hp || c.base_hp || 2,
    house: (c.spell_house || c.house || 'universal').toString().toLowerCase(),
    base_effect: c.description || c.effect_description || c.base_effect || '',
    effects: effects,
    bonus_effects: effects,
    flavor_text: c.flavor_text || c.motto || '',
    image_url: c.image_url || '',
    cost: c.mana_cost || c.cost || 1,
    mana_cost: c.mana_cost || c.cost || 1,
    // Collection-specific
    current_charges: c.current_charges != null ? c.current_charges : null,
    max_charges: c.max_charges || 0,
    is_exhausted: c.is_exhausted || false,
    deployed_zone: c.deployed_zone || c.zone_name || null
  };
}

/* ═══ FILTER + SORT + RENDER ═══ */
function renderCards() {
  var cards = allCards.slice();

  // Filters
  if (activeFilters.rarity !== 'all') cards = cards.filter(function(c){ return c.rarity === activeFilters.rarity; });
  if (activeFilters.type !== 'all') cards = cards.filter(function(c){ return c.type === activeFilters.type; });
  if (activeFilters.status === 'ready') cards = cards.filter(function(c){ return !c.is_exhausted && !c.deployed_zone; });
  if (activeFilters.status === 'deployed') cards = cards.filter(function(c){ return !!c.deployed_zone; });
  if (activeFilters.status === 'exhausted') cards = cards.filter(function(c){ return c.is_exhausted; });

  // Sort
  var sortBy = document.getElementById('sortBy').value;
  var ro = { legendary:0, epic:1, rare:2, uncommon:3, common:4 };
  if (sortBy === 'rarity') cards.sort(function(a,b){ return (ro[a.rarity]||9) - (ro[b.rarity]||9); });
  else if (sortBy === 'atk') cards.sort(function(a,b){ return b.base_atk - a.base_atk; });
  else if (sortBy === 'hp') cards.sort(function(a,b){ return b.base_hp - a.base_hp; });
  else if (sortBy === 'name') cards.sort(function(a,b){ return (a.name||'').localeCompare(b.name||''); });
  else if (sortBy === 'house') cards.sort(function(a,b){ return HO.indexOf(a.house) - HO.indexOf(b.house); });
  else if (sortBy === 'type') cards.sort(function(a,b){ return (a.type||'').localeCompare(b.type||''); });

  // Count
  document.getElementById('cardCount').textContent = cards.length + ' / ' + allCards.length + ' CARDS';

  // Empty states
  if (cards.length === 0 && allCards.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="coll-empty"><div class="coll-empty-icon">&#128230;</div>'
      + '<div class="coll-empty-title">No cards yet</div>'
      + '<div class="coll-empty-text">Open packs to start building your collection</div>'
      + '<a href="/packs.html">Open Packs &rarr;</a></div>';
    return;
  }
  if (cards.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="coll-empty"><div class="coll-empty-icon">&#128269;</div>'
      + '<div class="coll-empty-title">No matches</div>'
      + '<div class="coll-empty-text">Try changing your filters</div></div>';
    return;
  }

  // Build cards using buildSpellCard()
  var html = '<div class="coll-grid">';
  cards.forEach(function(c, i) {
    html += '<div class="card-wrap">';
    html += buildSpellCard(c, { delay: Math.min(i * 0.03, 0.5), rarity: c.rarity });

    if (c.deployed_zone) {
      html += '<div class="coll-badge-deployed">&#9876; ' + esc(c.deployed_zone) + '</div>';
    }
    if (c.is_exhausted) {
      html += '<div class="coll-badge-exhausted">EXHAUSTED</div>';
    }
    if (c.current_charges != null && c.max_charges > 0) {
      html += '<div class="coll-badge-charges">&#9889;' + c.current_charges + '/' + c.max_charges + '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;

  // Init particles + show animation
  setTimeout(function() {
    if (typeof initParticles === 'function') {
      document.querySelectorAll('.spell-card canvas.sc-particles').forEach(function(cv) {
        initParticles(cv);
      });
    }
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('show'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.spell-card').forEach(function(c) { obs.observe(c); });

    // Click to zoom
    document.querySelectorAll('.spell-card').forEach(function(card, idx) {
      card.style.cursor = 'pointer';
      card.addEventListener('click', function() { openZoom(idx); });
    });
  }, 100);
}

/* ═══ ZOOM ═══ */
function openZoom(idx) {
  var cards = document.querySelectorAll('.coll-grid .spell-card');
  if (!cards[idx]) return;
  var clone = cards[idx].cloneNode(true);
  var container = document.getElementById('zoomCard');
  var closeBtn = container.querySelector('.zoom-close');
  container.innerHTML = '';
  container.appendChild(closeBtn);
  container.appendChild(clone);
  document.getElementById('zoomOverlay').classList.add('active');
  setTimeout(function() {
    if (typeof initParticles === 'function') {
      clone.querySelectorAll('canvas.sc-particles').forEach(function(cv) { initParticles(cv); });
    }
  }, 50);
}

function closeZoom(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('zoom-close')) return;
  document.getElementById('zoomOverlay').classList.remove('active');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('zoomOverlay').classList.remove('active');
});

/* ═══ FILTER CLICKS ═══ */
document.getElementById('filters').addEventListener('click', function(e) {
  var btn = e.target.closest('.fbtn');
  if (!btn) return;
  var siblings = btn.parentElement.querySelectorAll('.fbtn');
  for (var i = 0; i < siblings.length; i++) siblings[i].classList.remove('active');
  btn.classList.add('active');
  activeFilters[btn.dataset.filter] = btn.dataset.val;
  renderCards();
});

/* ═══ INIT ═══ */
loadCollection();
</script>
</body>
</html>
