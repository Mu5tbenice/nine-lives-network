<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection — Nine Lives Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#08060e;--card:#0e0c16;--border:rgba(212,166,75,0.08);--gold:#d4a64b;--gold-dim:rgba(212,166,75,0.08);--text:#e0ddd8;--muted:rgba(255,255,255,0.4);--red:#ff4444;--green:#44cc66;--blue:#4488ff;--purple:#aa55ff;--orange:#ffaa00}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
    .header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(8,6,14,0.95)}
    .header-title{font-family:'Cinzel',serif;font-size:16px;font-weight:900;letter-spacing:2px;color:var(--gold)}
    .container{max-width:640px;margin:0 auto;padding:16px}
    .section-label{font-family:'Cinzel',serif;font-size:12px;font-weight:900;color:var(--gold);letter-spacing:2px;margin:16px 0 8px}

    /* Stats bar */
    .stats-bar{display:flex;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;flex-wrap:wrap}
    .coll-stat{font-size:10px;font-family:'Fira Code',monospace;color:var(--muted)}
    .coll-stat strong{color:#fff}

    /* Filters */
    .filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
    .filter-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:9px;font-family:'Fira Code',monospace;cursor:pointer;transition:all 0.15s}
    .filter-btn.active{background:var(--gold-dim);border-color:rgba(212,166,75,0.2);color:var(--gold)}

    /* Card Grid */
    .card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .spell-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative}
    .spell-card:hover{transform:translateY(-2px);border-color:rgba(212,166,75,0.2)}
    .spell-card.exhausted{opacity:0.5}
    .spell-card.rarity-common{border-color:rgba(255,255,255,0.06)}
    .spell-card.rarity-uncommon{border-color:rgba(68,204,102,0.2)}
    .spell-card.rarity-rare{border-color:rgba(68,136,255,0.25)}
    .spell-card.rarity-epic{border-color:rgba(170,85,255,0.25)}
    .spell-card.rarity-legendary{border-color:rgba(255,170,0,0.3)}

    .card-art{height:80px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative}
    .card-rarity{position:absolute;top:4px;left:4px;font-size:7px;padding:1px 5px;border-radius:4px;font-family:'Fira Code',monospace;font-weight:700;letter-spacing:0.5px}
    .rarity-common .card-rarity{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4)}
    .rarity-uncommon .card-rarity{background:rgba(68,204,102,0.1);color:var(--green)}
    .rarity-rare .card-rarity{background:rgba(68,136,255,0.1);color:var(--blue)}
    .rarity-epic .card-rarity{background:rgba(170,85,255,0.1);color:var(--purple)}
    .rarity-legendary .card-rarity{background:rgba(255,170,0,0.1);color:var(--orange)}
    .exhausted-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:8px;padding:2px 8px;border-radius:4px;background:rgba(255,68,68,0.9);color:#fff;font-weight:800;font-family:'Fira Code',monospace;letter-spacing:1px}

    .card-body{padding:6px 8px}
    .card-name{font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .card-house{font-size:7px;color:var(--muted);font-family:'Fira Code',monospace}
    .card-stats-row{display:flex;gap:6px;margin-top:4px}
    .card-stat{font-size:8px;font-family:'Fira Code',monospace;font-weight:700}
    .card-effects{font-size:7px;color:var(--purple);font-family:'Fira Code',monospace;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* Durability bar */
    .dura-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.06);margin-top:4px;overflow:hidden}
    .dura-fill{height:100%;border-radius:2px;transition:width 0.3s}

    /* Card Detail Modal */
    .modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);overflow-y:auto}
    .modal-overlay.open{display:flex;align-items:center;justify-content:center}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:360px;width:90%;position:relative}
    .modal-close{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
    .modal-art{height:120px;display:flex;align-items:center;justify-content:center;font-size:64px;margin-bottom:12px}
    .modal-name{font-family:'Cinzel',serif;font-size:18px;font-weight:900;text-align:center}
    .modal-house{font-size:10px;color:var(--muted);text-align:center;font-family:'Fira Code',monospace;margin-top:2px}
    .modal-stats{display:flex;justify-content:center;gap:16px;margin:12px 0}
    .modal-stat{text-align:center}
    .modal-stat-val{font-size:22px;font-weight:900;font-family:'Fira Code',monospace}
    .modal-stat-lbl{font-size:8px;color:var(--muted);letter-spacing:1px;font-family:'Fira Code',monospace}
    .modal-effects{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:8px 0}
    .modal-effect{font-size:9px;padding:3px 8px;border-radius:6px;background:rgba(170,85,255,0.08);border:1px solid rgba(170,85,255,0.15);color:var(--purple);font-family:'Fira Code',monospace}
    .modal-dura{margin:12px 0}
    .modal-dura-label{font-size:9px;color:var(--muted);font-family:'Fira Code',monospace;margin-bottom:4px}
    .modal-dura-bar{height:8px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden}
    .modal-dura-fill{height:100%;border-radius:4px}
    .modal-flavor{font-size:10px;color:rgba(255,255,255,0.3);font-style:italic;text-align:center;margin-top:10px}

    /* Crafting Section */
    .craft-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
    .craft-title{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px}
    .craft-desc{font-size:10px;color:var(--muted);margin-bottom:8px}
    .craft-slots{display:flex;gap:6px;margin-bottom:8px}
    .craft-slot{width:56px;height:56px;border-radius:8px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(255,255,255,0.1);cursor:pointer;transition:all 0.15s}
    .craft-slot.filled{border-style:solid;border-color:rgba(212,166,75,0.2);background:var(--gold-dim)}
    .craft-arrow{font-size:20px;color:var(--muted);display:flex;align-items:center}
    .craft-result{width:56px;height:56px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(255,255,255,0.02)}
    .craft-btn{width:100%;padding:8px;border-radius:8px;border:none;background:var(--gold-dim);color:var(--gold);font-size:10px;font-weight:700;cursor:pointer;font-family:'Fira Code',monospace;letter-spacing:1px}
    .craft-btn:disabled{opacity:0.3;cursor:not-allowed}

    @media(max-width:400px){.card-grid{grid-template-columns:repeat(2,1fr)}}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:3px}
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px">🃏</span>
    <span class="header-title">COLLECTION</span>
    <div style="flex:1"></div>
    <a href="/packs.html" style="font-size:10px;color:var(--gold);text-decoration:none;font-family:'Fira Code',monospace;padding:4px 8px;border-radius:6px;border:1px solid rgba(212,166,75,0.15)">🎴 OPEN PACK</a>
  </div>
  <div class="container">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="filters" id="filters"></div>
    <div class="card-grid" id="card-grid"></div>

    <div class="section-label">🔨 CRAFTING</div>
    <div class="craft-card">
      <div class="craft-title">Fuse Cards</div>
      <div class="craft-desc">Combine 3 cards of the same rarity → 1 card of next rarity tier</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="craft-slots" id="fuse-slots">
          <div class="craft-slot" id="fuse-0">+</div>
          <div class="craft-slot" id="fuse-1">+</div>
          <div class="craft-slot" id="fuse-2">+</div>
        </div>
        <div class="craft-arrow">→</div>
        <div class="craft-result">✨</div>
      </div>
      <button class="craft-btn" id="fuse-btn" disabled onclick="fuseCards()">FUSE 3 CARDS</button>
    </div>

    <div class="craft-card">
      <div class="craft-title">Recharge Card</div>
      <div class="craft-desc">Feed 3 common cards to restore charges on an exhausted card</div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="craft-slot" id="recharge-target" style="border-color:rgba(0,204,255,0.2)">🔋</div>
        <div class="craft-arrow">←</div>
        <div class="craft-slots" id="recharge-fuel">
          <div class="craft-slot" id="fuel-0">+</div>
          <div class="craft-slot" id="fuel-1">+</div>
          <div class="craft-slot" id="fuel-2">+</div>
        </div>
      </div>
      <button class="craft-btn" id="recharge-btn" disabled onclick="rechargeCard()">RECHARGE</button>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal" id="modal-content"></div>
  </div>

<script>
let playerId = null;
let cards = [];
let filterRarity = 'all';
let filterHouse = 'all';
let sortBy = 'rarity';

const RARITY_ORDER = {common:0,uncommon:1,rare:2,epic:3,legendary:4};
const RARITY_COLORS = {common:'rgba(255,255,255,0.4)',uncommon:'#44cc66',rare:'#4488ff',epic:'#aa55ff',legendary:'#ffaa00'};
const CARD_EMOJIS = {fire:'🔥',water:'🌊',earth:'🌿',wind:'💨',shadow:'🌙',light:'☀️',poison:'☠️',storm:'⚡',arcane:'💎',universal:'✨'};

document.addEventListener('DOMContentLoaded', async () => {
  try { const s=JSON.parse(localStorage.getItem('9lv_session')||'{}'); if(s.player_id) playerId=s.player_id; } catch(e){}
  await loadCollection();
  renderAll();
});

async function loadCollection() {
  if (!playerId) return;
  try {
    const res = await fetch(`/api/packs/collection/${playerId}`).then(r=>r.json());
    cards = res.cards || res || [];
  } catch(e) { console.error(e); }
}

function renderAll() {
  renderStats();
  renderFilters();
  renderGrid();
}

function renderStats() {
  const total = cards.length;
  const exhausted = cards.filter(c=>c.is_exhausted).length;
  const byRarity = {};
  cards.forEach(c => { const r=c.rarity||'common'; byRarity[r]=(byRarity[r]||0)+1; });
  document.getElementById('stats-bar').innerHTML = `
    <span class="coll-stat"><strong>${total}</strong> cards</span>
    <span class="coll-stat"><strong style="color:var(--red)">${exhausted}</strong> exhausted</span>
    ${Object.entries(byRarity).map(([r,n])=>`<span class="coll-stat"><strong style="color:${RARITY_COLORS[r]||'#fff'}">${n}</strong> ${r}</span>`).join('')}
  `;
}

function renderFilters() {
  const rarities = ['all','common','uncommon','rare','epic','legendary'];
  document.getElementById('filters').innerHTML = rarities.map(r =>
    `<button class="filter-btn ${filterRarity===r?'active':''}" onclick="setFilter('${r}')">${r.toUpperCase()}</button>`
  ).join('') + `<button class="filter-btn ${sortBy==='atk'?'active':''}" onclick="setSort('atk')">↑ ATK</button>` +
  `<button class="filter-btn ${sortBy==='hp'?'active':''}" onclick="setSort('hp')">↑ HP</button>`;
}

function setFilter(r) { filterRarity=r; renderAll(); }
function setSort(s) { sortBy=sortBy===s?'rarity':s; renderAll(); }

function renderGrid() {
  let filtered = filterRarity==='all' ? [...cards] : cards.filter(c=>(c.rarity||'common')===filterRarity);
  if (sortBy==='atk') filtered.sort((a,b)=>(b.base_atk||b.atk||0)-(a.base_atk||a.atk||0));
  else if (sortBy==='hp') filtered.sort((a,b)=>(b.base_hp||b.hp||0)-(a.base_hp||a.hp||0));
  else filtered.sort((a,b)=>(RARITY_ORDER[b.rarity||'common']||0)-(RARITY_ORDER[a.rarity||'common']||0));

  document.getElementById('card-grid').innerHTML = filtered.map(c => {
    const r = c.rarity||'common';
    const charges = c.current_charges ?? c.max_charges ?? 3;
    const maxCharges = c.max_charges ?? 3;
    const pct = maxCharges > 0 ? (charges/maxCharges)*100 : 100;
    const duraColor = pct > 50 ? 'var(--green)' : pct > 20 ? 'var(--orange)' : 'var(--red)';
    const house = c.house || c.school_name || 'universal';
    const emoji = CARD_EMOJIS[house.toLowerCase()] || '🃏';
    return `
      <div class="spell-card rarity-${r} ${c.is_exhausted?'exhausted':''}" onclick="openDetail(${c.id})">
        <div class="card-art">
          ${emoji}
          <span class="card-rarity">${r.toUpperCase()}</span>
          ${c.is_exhausted ? '<span class="exhausted-badge">EXHAUSTED</span>' : ''}
        </div>
        <div class="card-body">
          <div class="card-name">${c.spell_name||c.name||'Card'}</div>
          <div class="card-house">${house}</div>
          <div class="card-stats-row">
            <span class="card-stat" style="color:var(--red)">⚔️${c.base_atk||c.atk||'?'}</span>
            <span class="card-stat" style="color:var(--green)">💚${c.base_hp||c.hp||'?'}</span>
            <span class="card-stat" style="color:${duraColor}">🔋${charges}/${maxCharges}</span>
          </div>
          ${c.effects ? `<div class="card-effects">${Array.isArray(c.effects)?c.effects.join(' · '):c.effects}</div>` : ''}
          <div class="dura-bar"><div class="dura-fill" style="width:${pct}%;background:${duraColor}"></div></div>
        </div>
      </div>`;
  }).join('') || '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:30px">No cards found. Open a pack!</div>';
}

function openDetail(cardId) {
  const c = cards.find(x=>x.id===cardId);
  if (!c) return;
  const r = c.rarity||'common';
  const charges = c.current_charges ?? c.max_charges ?? 3;
  const maxCharges = c.max_charges ?? 3;
  const pct = maxCharges > 0 ? (charges/maxCharges)*100 : 100;
  const duraColor = pct > 50 ? 'var(--green)' : pct > 20 ? 'var(--orange)' : 'var(--red)';
  const house = c.house || c.school_name || 'universal';
  const emoji = CARD_EMOJIS[house.toLowerCase()] || '🃏';
  const effects = c.effects ? (Array.isArray(c.effects) ? c.effects : [c.effects]) : [];

  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeDetail()">✕</button>
    <div class="modal-art">${emoji}</div>
    <div class="modal-name" style="color:${RARITY_COLORS[r]}">${c.spell_name||c.name||'Card'}</div>
    <div class="modal-house">${house} · ${r.toUpperCase()}</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-val" style="color:var(--red)">${c.base_atk||c.atk||'?'}</div><div class="modal-stat-lbl">ATK</div></div>
      <div class="modal-stat"><div class="modal-stat-val" style="color:var(--green)">${c.base_hp||c.hp||'?'}</div><div class="modal-stat-lbl">HP</div></div>
    </div>
    ${effects.length ? `<div class="modal-effects">${effects.map(e=>`<span class="modal-effect">${e}</span>`).join('')}</div>` : ''}
    <div class="modal-dura">
      <div class="modal-dura-label">DURABILITY: ${charges} / ${maxCharges} charges</div>
      <div class="modal-dura-bar"><div class="modal-dura-fill" style="width:${pct}%;background:${duraColor}"></div></div>
    </div>
    ${c.deployed_zone ? `<div style="font-size:9px;color:var(--orange);text-align:center;font-family:'Fira Code',monospace;margin-top:6px">📍 Deployed on ${c.deployed_zone}</div>` : ''}
    ${c.flavor_text ? `<div class="modal-flavor">"${c.flavor_text}"</div>` : ''}
  `;
  document.getElementById('modal').classList.add('open');
}

function closeDetail() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') closeDetail(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeDetail(); });

async function fuseCards() { alert('Crafting coming soon!'); }
async function rechargeCard() { alert('Recharging coming soon!'); }
</script>
</body>
</html>
