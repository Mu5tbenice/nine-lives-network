<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone Admin | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <style>
    body { background: var(--bg-deep); color: var(--text-bright); }
    .admin-wrap { max-width: 960px; margin: 0 auto; padding: 20px 15px; }
    h1 { font-family: var(--font-title); color: var(--gold); font-size: 24px; letter-spacing: 3px; margin-bottom: 6px; }
    .sub { font-family: var(--font-body); color: var(--text-muted); font-style: italic; margin-bottom: 20px; }

    /* Auth */
    .auth-box { text-align: center; padding: 40px; }
    .auth-box input { background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-bright); padding: 10px 16px; border-radius: 6px; font-size: 14px; width: 250px; font-family: var(--font-body); }
    .auth-box button { margin-left: 8px; }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px;
      padding: 8px 14px; display: flex; align-items: center; gap: 6px;
    }
    .stat-chip__val { font-family: var(--font-data); font-size: 14px; color: var(--gold); letter-spacing: 1px; }
    .stat-chip__label { font-family: var(--font-data); font-size: 7px; color: var(--text-faint); letter-spacing: 1px; }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .search-input {
      background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-bright);
      padding: 9px 14px; border-radius: 6px; font-family: var(--font-body); font-size: 14px; width: 200px;
    }
    .search-input:focus { outline: none; border-color: var(--gold); }
    .filter-btn {
      padding: 7px 14px; border: 1px solid var(--border-subtle); border-radius: 6px;
      background: var(--bg-card); color: var(--text-muted);
      font-family: var(--font-title); font-size: 10px; font-weight: 600;
      letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold-border); }
    .btn-create {
      margin-left: auto;
      background: linear-gradient(180deg, #44cc44, #339933); color: #fff;
      border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer;
      font-family: var(--font-title); font-size: 12px; font-weight: 700; letter-spacing: 1px;
      transition: all 0.15s;
    }
    .btn-create:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(68,204,68,0.3); }

    /* Zone card */
    .zone-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px;
      padding: 16px; margin-bottom: 10px; transition: border-color 0.3s;
    }
    .zone-card.changed { border-color: var(--gold-border); }
    .zone-card.saved { border-color: #44cc44; }
    .zone-card.disabled-zone { opacity: 0.5; }
    .zone-card.new-zone { border-color: #44cc44; border-style: dashed; }

    .zone-card__header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .zone-card__id {
      font-family: var(--font-data); font-size: 8px; color: var(--text-faint);
      letter-spacing: 1px; background: var(--bg-inset); padding: 3px 8px; border-radius: 4px;
    }
    .zone-card__type {
      font-family: var(--font-data); font-size: 7px; letter-spacing: 1px;
      padding: 3px 8px; border-radius: 4px;
    }
    .zone-card__type--home { background: rgba(255,165,0,0.1); color: #ffaa00; border: 1px solid rgba(255,165,0,0.2); }
    .zone-card__type--neutral { background: rgba(100,180,255,0.1); color: #88bbff; border: 1px solid rgba(100,180,255,0.2); }
    .zone-card__status {
      font-family: var(--font-data); font-size: 7px; letter-spacing: 1px;
      padding: 3px 8px; border-radius: 4px; margin-left: auto;
    }
    .zone-card__status--active { background: rgba(68,204,68,0.1); color: #44cc44; }
    .zone-card__status--disabled { background: rgba(204,68,68,0.1); color: #cc4444; }

    /* Grid layout for fields */
    .zone-card__grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .zone-card__grid--full { grid-column: 1 / -1; }
    .field-group { display: flex; flex-direction: column; gap: 3px; }
    .field-label { font-family: var(--font-data); font-size: 7px; color: var(--text-faint); letter-spacing: 1px; }
    .zone-input {
      background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-bright);
      padding: 7px 10px; border-radius: 6px; font-family: var(--font-body); font-size: 13px;
      width: 100%; transition: border-color 0.2s; box-sizing: border-box;
    }
    .zone-input:focus { outline: none; border-color: var(--gold); }
    .zone-input--title { font-family: var(--font-title); font-weight: 600; font-size: 15px; }
    .zone-input--mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    .zone-select {
      background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-bright);
      padding: 7px 10px; border-radius: 6px; font-family: var(--font-body); font-size: 13px;
      width: 100%; cursor: pointer;
    }
    .zone-select:focus { outline: none; border-color: var(--gold); }

    /* Image preview */
    .img-preview {
      width: 100%; height: 60px; border-radius: 6px; overflow: hidden;
      background: var(--bg-inset); border: 1px dashed var(--border-subtle);
      display: flex; align-items: center; justify-content: center; margin-top: 4px;
    }
    .img-preview img { width: 100%; height: 100%; object-fit: cover; }
    .img-preview .placeholder { font-family: var(--font-data); font-size: 7px; color: var(--text-faint); }

    /* Actions row */
    .zone-card__actions {
      display: flex; gap: 6px; margin-top: 12px; align-items: center;
      padding-top: 10px; border-top: 1px solid var(--border-subtle);
    }
    .btn-save {
      background: linear-gradient(180deg, #D4A64B, #b8903d); color: var(--bg-deep);
      border: none; padding: 7px 16px; border-radius: 6px; cursor: pointer;
      font-family: var(--font-title); font-size: 11px; font-weight: 600; letter-spacing: 1px;
    }
    .btn-save:disabled { opacity: 0.3; cursor: default; }
    .btn-toggle {
      background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-muted);
      padding: 7px 14px; border-radius: 6px; cursor: pointer;
      font-family: var(--font-data); font-size: 8px; letter-spacing: 1px;
    }
    .btn-toggle:hover { border-color: var(--gold); color: var(--text-bright); }
    .btn-delete {
      background: none; border: 1px solid rgba(204,68,68,0.3); color: #cc4444;
      padding: 7px 14px; border-radius: 6px; cursor: pointer;
      font-family: var(--font-data); font-size: 8px; letter-spacing: 1px;
    }
    .btn-delete:hover { background: rgba(204,68,68,0.1); border-color: #cc4444; }
    .status-msg { font-family: var(--font-data); font-size: 7px; color: #44cc44; margin-left: auto; letter-spacing: 0.5px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      padding: 10px 24px; border-radius: 8px; font-family: var(--font-title); font-size: 13px; font-weight: 600;
      display: none; z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast--success { background: #1a3a1a; color: #44cc44; border: 1px solid #2a5a2a; }
    .toast--error { background: #3a1a1a; color: #cc4444; border: 1px solid #5a2a2a; }
    .toast.active { display: block; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

    /* Confirm dialog */
    .confirm-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 200; justify-content: center; align-items: center;
    }
    .confirm-overlay.active { display: flex; }
    .confirm-box {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px;
      padding: 24px; max-width: 400px; width: 90%; text-align: center;
    }
    .confirm-box__title { font-family: var(--font-title); font-size: 16px; color: var(--text-bright); margin-bottom: 8px; }
    .confirm-box__text { font-family: var(--font-body); font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .confirm-box__btns { display: flex; gap: 10px; justify-content: center; }
    .confirm-box__btn {
      padding: 9px 20px; border-radius: 6px; border: none; cursor: pointer;
      font-family: var(--font-title); font-size: 12px; font-weight: 600; letter-spacing: 1px;
    }
    .confirm-box__btn--cancel { background: var(--bg-inset); color: var(--text-muted); border: 1px solid var(--border-subtle); }
    .confirm-box__btn--danger { background: #cc3333; color: #fff; }

    @media (max-width: 600px) {
      .zone-card__grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; }
      .search-input { width: 100%; }
      .btn-create { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Auth -->
  <div class="admin-wrap" id="authScreen">
    <div class="auth-box">
      <h1>Zone Admin</h1>
      <p class="sub">Enter admin key to manage zones</p>
      <input type="password" id="adminKeyInput" placeholder="Admin key..." onkeydown="if(event.key==='Enter')authenticate()">
      <button class="btn-save" onclick="authenticate()" style="margin-left:8px;padding:10px 18px;">Enter</button>
    </div>
  </div>

  <!-- Admin panel -->
  <div class="admin-wrap" id="adminPanel" style="display:none;">
    <h1>Zone Manager</h1>
    <p class="sub">Create, configure, and manage all game zones</p>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input class="search-input" id="searchInput" placeholder="Search zones..." oninput="renderZones()">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-filter="neutral" onclick="setFilter('neutral',this)">Neutral</button>
      <button class="filter-btn" data-filter="home" onclick="setFilter('home',this)">Home</button>
      <button class="filter-btn" data-filter="bonus" onclick="setFilter('bonus',this)">Has Bonus</button>
      <button class="filter-btn" data-filter="disabled" onclick="setFilter('disabled',this)">Disabled</button>
      <button class="btn-create" onclick="createNewZone()">+ New Zone</button>
    </div>

    <div id="zoneList"></div>
  </div>

  <!-- Confirm dialog -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-box__title" id="confirmTitle"></div>
      <div class="confirm-box__text" id="confirmText"></div>
      <div class="confirm-box__btns">
        <button class="confirm-box__btn confirm-box__btn--cancel" onclick="closeConfirm()">Cancel</button>
        <button class="confirm-box__btn confirm-box__btn--danger" id="confirmAction">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var ADMIN_KEY = '';
    var zones = [];
    var changes = {};
    var currentFilter = 'all';
    var nextTempId = -1; // negative IDs for unsaved new zones

    var BONUS_OPTIONS = [
      { value: '', label: 'No bonus' },
      { value: '+50% points', label: '+50% points' },
      { value: '+100% points', label: '+100% points' },
      { value: 'Double mana regen', label: 'Double mana regen' },
      { value: '+25% attack power', label: '+25% attack power' },
      { value: '+25% defend power', label: '+25% defend power' },
      { value: 'Triple XP', label: 'Triple XP' }
    ];

    function authenticate() {
      ADMIN_KEY = document.getElementById('adminKeyInput').value;
      loadZones();
    }

    async function loadZones() {
      try {
        var res = await fetch('/api/zones', { headers: { 'x-admin-key': ADMIN_KEY } });
        zones = await res.json();
        if (!Array.isArray(zones) || zones.length === 0) {
          showToast('Invalid admin key or no zones found', 'error'); return;
        }
        // Ensure all zones have is_active field
        zones.forEach(function(z) { if (z.is_active === undefined) z.is_active = true; });
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        renderStats();
        renderZones();
      } catch (e) { showToast('Error loading zones', 'error'); }
    }

    function renderStats() {
      var total = zones.filter(function(z) { return z.id > 0; }).length;
      var neutral = zones.filter(function(z) { return z.zone_type === 'neutral' && z.id > 0; }).length;
      var home = zones.filter(function(z) { return z.zone_type === 'home' && z.id > 0; }).length;
      var bonus = zones.filter(function(z) { return z.bonus_effect && z.id > 0; }).length;
      var disabled = zones.filter(function(z) { return !z.is_active && z.id > 0; }).length;
      document.getElementById('statsBar').innerHTML =
        chip(total, 'TOTAL') + chip(neutral, 'NEUTRAL') + chip(home, 'HOME') + chip(bonus, 'BONUS') + chip(disabled, 'DISABLED');
    }
    function chip(val, label) {
      return '<div class="stat-chip"><span class="stat-chip__val">' + val + '</span><span class="stat-chip__label">' + label + '</span></div>';
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderZones();
    }

    function getFilteredZones() {
      var search = document.getElementById('searchInput').value.toLowerCase();
      return zones.filter(function(z) {
        if (search && !(z.name || '').toLowerCase().includes(search) && !(z.description || '').toLowerCase().includes(search)) return false;
        if (currentFilter === 'neutral') return z.zone_type === 'neutral';
        if (currentFilter === 'home') return z.zone_type === 'home';
        if (currentFilter === 'bonus') return !!z.bonus_effect;
        if (currentFilter === 'disabled') return !z.is_active;
        return true;
      });
    }

    function renderZones() {
      var filtered = getFilteredZones();
      var el = document.getElementById('zoneList');
      if (filtered.length === 0) {
        el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-faint);font-style:italic;">No zones match filters</div>';
        return;
      }
      var html = '';
      filtered.forEach(function(z) {
        var isNew = z.id < 0;
        var isDisabled = !z.is_active;
        var cardClass = 'zone-card' + (isNew ? ' new-zone' : '') + (isDisabled ? ' disabled-zone' : '') + (changes[z.id] ? ' changed' : '');
        var typeClass = z.zone_type === 'home' ? 'zone-card__type--home' : 'zone-card__type--neutral';
        var statusClass = z.is_active ? 'zone-card__status--active' : 'zone-card__status--disabled';

        var imgPath = z.image_url || '';
        var imgHTML = imgPath
          ? '<img src="/assets/images/zones/' + esc(imgPath) + '" onerror="this.parentElement.innerHTML=\'<div class=placeholder>NOT FOUND</div>\'">'
          : '<div class="placeholder">NO IMAGE</div>';

        // Bonus select options
        var bonusOptions = '';
        BONUS_OPTIONS.forEach(function(opt) {
          var sel = (z.bonus_effect || '') === opt.value ? ' selected' : '';
          bonusOptions += '<option value="' + esc(opt.value) + '"' + sel + '>' + opt.label + '</option>';
        });

        // Zone type select
        var typeOptions = '<option value="neutral"' + (z.zone_type === 'neutral' ? ' selected' : '') + '>Neutral</option>'
          + '<option value="home"' + (z.zone_type === 'home' ? ' selected' : '') + '>Home</option>';

        html += '<div class="' + cardClass + '" id="zcard-' + z.id + '">'
          // Header
          + '<div class="zone-card__header">'
          + (isNew ? '<span class="zone-card__id">NEW</span>' : '<span class="zone-card__id">ZONE #' + z.id + '</span>')
          + '<span class="zone-card__type ' + typeClass + '">' + (z.zone_type || 'neutral').toUpperCase() + '</span>'
          + '<span class="zone-card__status ' + statusClass + '">' + (z.is_active ? 'ACTIVE' : 'DISABLED') + '</span>'
          + '</div>'

          // Fields grid
          + '<div class="zone-card__grid">'

          // Name (full width)
          + '<div class="field-group zone-card__grid--full">'
          + '<span class="field-label">NAME</span>'
          + '<input class="zone-input zone-input--title" value="' + esc(z.name) + '" onchange="mark(' + z.id + ',\'name\',this.value)" placeholder="Zone name...">'
          + '</div>'

          // Description (full width)
          + '<div class="field-group zone-card__grid--full">'
          + '<span class="field-label">DESCRIPTION</span>'
          + '<input class="zone-input" value="' + esc(z.description || '') + '" onchange="mark(' + z.id + ',\'description\',this.value)" placeholder="Short description...">'
          + '</div>'

          // Type
          + '<div class="field-group">'
          + '<span class="field-label">TYPE</span>'
          + '<select class="zone-select" onchange="mark(' + z.id + ',\'zone_type\',this.value);updateTypeLabel(' + z.id + ',this.value)">' + typeOptions + '</select>'
          + '</div>'

          // Bonus effect
          + '<div class="field-group">'
          + '<span class="field-label">BONUS EFFECT</span>'
          + '<select class="zone-select" onchange="mark(' + z.id + ',\'bonus_effect\',this.value)">' + bonusOptions + '</select>'
          + '</div>'

          // Image filename
          + '<div class="field-group">'
          + '<span class="field-label">IMAGE FILENAME</span>'
          + '<input class="zone-input zone-input--mono" value="' + esc(imgPath) + '" onchange="mark(' + z.id + ',\'image_url\',this.value);updateImg(' + z.id + ',this.value)" placeholder="zone-image.jpg">'
          + '<div class="img-preview" id="imgprev-' + z.id + '">' + imgHTML + '</div>'
          + '</div>'

          // Time limit
          + '<div class="field-group">'
          + '<span class="field-label">TIME LIMIT (HOURS) — 0 = no limit</span>'
          + '<input class="zone-input zone-input--mono" type="number" min="0" max="24" value="' + (z.time_limit_hours || 0) + '" onchange="mark(' + z.id + ',\'time_limit_hours\',parseInt(this.value)||0)" placeholder="0">'
          + '</div>'

          + '</div>' // end grid

          // Actions
          + '<div class="zone-card__actions">'
          + '<button class="btn-save" id="btn-' + z.id + '" onclick="saveZone(' + z.id + ')" ' + (changes[z.id] || isNew ? '' : 'disabled') + '>' + (isNew ? 'Create' : 'Save') + '</button>'
          + '<button class="btn-toggle" onclick="toggleZone(' + z.id + ')">' + (z.is_active ? 'Disable' : 'Enable') + '</button>'
          + (z.zone_type !== 'home' ? '<button class="btn-delete" onclick="confirmDelete(' + z.id + ',\'' + esc(z.name) + '\')">Delete</button>' : '')
          + '<span class="status-msg" id="status-' + z.id + '"></span>'
          + '</div>'

          + '</div>';
      });
      el.innerHTML = html;
    }

    function esc(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/'/g, '&#39;');
    }

    function mark(zoneId, field, value) {
      if (!changes[zoneId]) changes[zoneId] = {};
      changes[zoneId][field] = value;
      var card = document.getElementById('zcard-' + zoneId);
      if (card) { card.classList.add('changed'); card.classList.remove('saved'); }
      var btn = document.getElementById('btn-' + zoneId);
      if (btn) btn.disabled = false;
    }

    function updateImg(zoneId, filename) {
      var prev = document.getElementById('imgprev-' + zoneId);
      if (!prev) return;
      if (filename) {
        prev.innerHTML = '<img src="/assets/images/zones/' + filename + '" onerror="this.parentElement.innerHTML=\'<div class=placeholder>NOT FOUND</div>\'">';
      } else {
        prev.innerHTML = '<div class="placeholder">NO IMAGE</div>';
      }
    }

    function updateTypeLabel(zoneId, type) {
      // Re-render will catch this on next save
    }

    function createNewZone() {
      var newZone = {
        id: nextTempId--,
        name: '',
        description: '',
        zone_type: 'neutral',
        bonus_effect: '',
        image_url: '',
        time_limit_hours: 0,
        is_active: true,
        _isNew: true
      };
      zones.unshift(newZone);
      // Mark all fields as changed so Create button works
      changes[newZone.id] = {
        name: '', description: '', zone_type: 'neutral',
        bonus_effect: '', image_url: '', time_limit_hours: 0, is_active: true
      };
      renderZones();
      // Focus the name field
      setTimeout(function() {
        var card = document.getElementById('zcard-' + newZone.id);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'start' });
          var nameInput = card.querySelector('.zone-input--title');
          if (nameInput) nameInput.focus();
        }
      }, 100);
    }

    async function saveZone(zoneId) {
      var zone = zones.find(function(z) { return z.id === zoneId; });
      if (!zone) return;

      var btn = document.getElementById('btn-' + zoneId);
      var status = document.getElementById('status-' + zoneId);
      btn.disabled = true;
      btn.textContent = '...';

      var isNew = zone._isNew || zoneId < 0;

      try {
        var payload = changes[zoneId] || {};
        // For new zones, merge all current field values
        if (isNew) {
          var card = document.getElementById('zcard-' + zoneId);
          var inputs = card.querySelectorAll('.zone-input, .zone-select');
          // Use existing changes + zone defaults
          payload.name = payload.name || zone.name || 'Unnamed Zone';
          payload.zone_type = payload.zone_type || zone.zone_type || 'neutral';
          payload.is_active = zone.is_active !== false;
        }

        var url, method;
        if (isNew) {
          url = '/api/admin/zones';
          method = 'POST';
        } else {
          url = '/api/admin/zone/' + zoneId;
          method = 'PUT';
        }

        var res = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
          body: JSON.stringify(payload)
        });

        var result = await res.json();
        if (result.error) throw new Error(result.error);

        if (isNew && result.zone) {
          // Replace temp zone with real one from server
          var idx = zones.findIndex(function(z) { return z.id === zoneId; });
          if (idx !== -1) zones[idx] = result.zone;
        } else if (result.zone) {
          var idx = zones.findIndex(function(z) { return z.id === zoneId; });
          if (idx !== -1) Object.assign(zones[idx], result.zone);
        }

        delete changes[zoneId];
        renderStats();
        renderZones();
        showToast(isNew ? 'Zone created!' : 'Saved!', 'success');
      } catch (e) {
        if (status) { status.textContent = 'ERROR: ' + e.message; status.style.color = '#cc4444'; }
        showToast('Error: ' + e.message, 'error');
      }

      btn.textContent = zoneId < 0 ? 'Create' : 'Save';
      btn.disabled = !changes[zoneId];
    }

    async function toggleZone(zoneId) {
      var zone = zones.find(function(z) { return z.id === zoneId; });
      if (!zone || zone._isNew) return;

      var newStatus = !zone.is_active;
      try {
        var res = await fetch('/api/admin/zone/' + zoneId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
          body: JSON.stringify({ is_active: newStatus })
        });
        var result = await res.json();
        if (result.error) throw new Error(result.error);

        zone.is_active = newStatus;
        renderStats();
        renderZones();
        showToast(zone.name + ' ' + (newStatus ? 'enabled' : 'disabled'), 'success');
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }

    var pendingDeleteId = null;
    function confirmDelete(zoneId, zoneName) {
      var zone = zones.find(function(z) { return z.id === zoneId; });
      if (!zone) return;

      // New unsaved zones just remove from array
      if (zone._isNew || zoneId < 0) {
        zones = zones.filter(function(z) { return z.id !== zoneId; });
        delete changes[zoneId];
        renderStats();
        renderZones();
        return;
      }

      pendingDeleteId = zoneId;
      document.getElementById('confirmTitle').textContent = 'Delete Zone';
      document.getElementById('confirmText').textContent = 'Permanently delete "' + zoneName + '"? This cannot be undone.';
      document.getElementById('confirmAction').onclick = doDelete;
      document.getElementById('confirmOverlay').classList.add('active');
    }

    function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('active'); pendingDeleteId = null; }

    async function doDelete() {
      if (!pendingDeleteId) return;
      closeConfirm();
      try {
        var res = await fetch('/api/admin/zone/' + pendingDeleteId, {
          method: 'DELETE',
          headers: { 'x-admin-key': ADMIN_KEY }
        });
        var result = await res.json();
        if (result.error) throw new Error(result.error);

        zones = zones.filter(function(z) { return z.id !== pendingDeleteId; });
        delete changes[pendingDeleteId];
        renderStats();
        renderZones();
        showToast('Zone deleted', 'success');
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
      pendingDeleteId = null;
    }

    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast toast--' + (type || 'success') + ' active';
      setTimeout(function() { t.classList.remove('active'); }, 3000);
    }
    /**
     * Admin Routes - Zone Management
     * 
     * ADD THESE ROUTES to your existing server/routes/admin.js
     * (or replace the zone-related routes if they already exist)
     * 
     * Existing route to UPDATE:
     *   PUT /api/admin/zone/:id  — now also handles is_active, time_limit_hours, zone_type
     * 
     * New routes to ADD:
     *   POST /api/admin/zones    — create a new zone
     *   DELETE /api/admin/zone/:id — delete a zone
     */

    // ============================================
    // PUT /api/admin/zone/:id  (UPDATE — replace existing)
    // ============================================
    router.put('/zone/:id', async (req, res) => {
      try {
        const adminKey = req.headers['x-admin-key'];
        if (adminKey !== process.env.ADMIN_KEY) {
          return res.status(401).json({ error: 'Invalid admin key' });
        }

        const zoneId = parseInt(req.params.id);
        const updates = {};

        // Allow updating these fields
        const allowedFields = [
          'name', 'description', 'image_url', 'bonus_effect',
          'zone_type', 'is_active', 'time_limit_hours'
        ];

        allowedFields.forEach(field => {
          if (req.body[field] !== undefined) {
            updates[field] = req.body[field];
          }
        });

        if (Object.keys(updates).length === 0) {
          return res.status(400).json({ error: 'No valid fields to update' });
        }

        const { data, error } = await supabase
          .from('zones')
          .update(updates)
          .eq('id', zoneId)
          .select()
          .single();

        if (error) throw error;

        res.json({ success: true, zone: data });
      } catch (e) {
        console.error('Zone update error:', e);
        res.status(500).json({ error: e.message || 'Failed to update zone' });
      }
    });


    // ============================================
    // POST /api/admin/zones  (CREATE — new route)
    // ============================================
    router.post('/zones', async (req, res) => {
      try {
        const adminKey = req.headers['x-admin-key'];
        if (adminKey !== process.env.ADMIN_KEY) {
          return res.status(401).json({ error: 'Invalid admin key' });
        }

        const {
          name = 'Unnamed Zone',
          description = '',
          zone_type = 'neutral',
          bonus_effect = null,
          image_url = null,
          time_limit_hours = 0,
          is_active = true
        } = req.body;

        if (!name || name.trim() === '') {
          return res.status(400).json({ error: 'Zone name is required' });
        }

        const { data, error } = await supabase
          .from('zones')
          .insert({
            name: name.trim(),
            description: description.trim(),
            zone_type,
            bonus_effect: bonus_effect || null,
            image_url: image_url || null,
            time_limit_hours: time_limit_hours || 0,
            is_active
          })
          .select()
          .single();

        if (error) throw error;

        console.log(`[Admin] Created zone: ${data.id} - ${data.name}`);
        res.json({ success: true, zone: data });
      } catch (e) {
        console.error('Zone create error:', e);
        res.status(500).json({ error: e.message || 'Failed to create zone' });
      }
    });


    // ============================================
    // DELETE /api/admin/zone/:id  (DELETE — new route)
    // ============================================
    router.delete('/zone/:id', async (req, res) => {
      try {
        const adminKey = req.headers['x-admin-key'];
        if (adminKey !== process.env.ADMIN_KEY) {
          return res.status(401).json({ error: 'Invalid admin key' });
        }

        const zoneId = parseInt(req.params.id);

        // Don't allow deleting home zones
        const { data: zone } = await supabase
          .from('zones')
          .select('zone_type, name')
          .eq('id', zoneId)
          .single();

        if (!zone) {
          return res.status(404).json({ error: 'Zone not found' });
        }

        if (zone.zone_type === 'home') {
          return res.status(400).json({ error: 'Cannot delete home zones' });
        }

        // Clean up related data first
        await supabase.from('territory_actions').delete().eq('zone_id', zoneId);
        await supabase.from('zone_control').delete().eq('zone_id', zoneId);

        // Delete the zone
        const { error } = await supabase
          .from('zones')
          .delete()
          .eq('id', zoneId);

        if (error) throw error;

        console.log(`[Admin] Deleted zone: ${zoneId} - ${zone.name}`);
        res.json({ success: true });
      } catch (e) {
        console.error('Zone delete error:', e);
        res.status(500).json({ error: e.message || 'Failed to delete zone' });
      }
    });
  </script>
