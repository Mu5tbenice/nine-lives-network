<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Your Nine | Character Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg-deep:#120e1e;--bg-warm:#1a1528;--bg-card:rgba(30,22,42,0.7);--bg-card-solid:#1e1630;--border:rgba(212,166,75,0.12);--border-glow:rgba(212,166,75,0.3);--gold:#D4A64B;--gold-dim:rgba(212,166,75,0.15);--text-bright:#F5F0E8;--text-body:#D4C8B8;--text-muted:#9B8E7E;--text-faint:#6B5E50;--sunset:#e8855a;--sky:#8BB4E0;--green:#6acd8a;--red:#e85a6a;--cyan:#6ac8d8;--purple:#b088e8;--font-title:'Cinzel',serif;--font-body:'Crimson Text',Georgia,serif;--font-data:'Press Start 2P',monospace;--font-mono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(212,166,75,0.08) 0%,transparent 50%),linear-gradient(180deg,#1a1528 0%,#120e1e 50%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body)}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}
    .page{max-width:480px;margin:0 auto;padding:12px 14px 80px}
    .nav{display:flex;align-items:center;justify-content:space-between;padding:10px 0;margin-bottom:8px}
    .nav a{color:var(--gold);text-decoration:none;font-family:var(--font-data);font-size:7px;letter-spacing:1px}

    /* ── CHARACTER PREVIEW ── */
    .preview-frame{position:relative;width:100%;aspect-ratio:1;max-width:320px;margin:0 auto 12px;border-radius:16px;background:radial-gradient(circle at 50% 40%,rgba(30,22,42,0.9),rgba(18,14,30,1));border:2px solid var(--border-glow);overflow:hidden;box-shadow:0 0 40px rgba(212,166,75,0.08)}
    .preview-canvas{width:100%;height:100%;display:block}
    .preview-name{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-family:var(--font-data);font-size:8px;color:var(--gold);letter-spacing:2px;background:rgba(18,14,30,0.85);padding:4px 12px;border-radius:4px;border:1px solid var(--border)}
    .house-badge{position:absolute;top:10px;right:10px;font-family:var(--font-data);font-size:7px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:rgba(18,14,30,0.85)}

    /* ── STATS BAR ── */
    .stats-bar{display:flex;justify-content:space-between;gap:4px;margin-bottom:14px;padding:10px 8px;border-radius:10px;background:rgba(0,0,0,0.3);border:1px solid var(--border)}
    .stat-item{text-align:center;flex:1}
    .stat-val{font-family:var(--font-data);font-size:14px;font-weight:700;line-height:1;margin-bottom:3px}
    .stat-label{font-family:var(--font-data);font-size:6px;letter-spacing:1px;color:var(--text-faint)}
    .stat-bonus{font-family:var(--font-data);font-size:7px;margin-top:2px}

    /* ── EQUIPMENT GRID ── */
    .equip-title{font-family:var(--font-data);font-size:8px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;text-align:center}
    .equip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;max-width:360px;margin-left:auto;margin-right:auto}
    .save-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #8a6d2f,0 0 40px rgba(212,166,75,0.5)}
    .equip-slot{aspect-ratio:1;border-radius:10px;background:rgba(0,0,0,0.3);border:2px dashed var(--border);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:all 0.15s;overflow:hidden}
    .equip-slot:hover{border-color:var(--gold);transform:translateY(-2px)}
    .equip-slot.filled{border-style:solid;border-color:rgba(212,166,75,0.25)}
    .equip-slot.active{border-color:var(--gold);box-shadow:0 0 12px rgba(212,166,75,0.2)}
    .equip-slot-label{font-family:var(--font-data);font-size:5px;color:var(--text-faint);letter-spacing:0.5px;position:absolute;bottom:3px}
    .equip-slot-icon{font-size:20px;opacity:0.3}
    .equip-slot-img{width:80%;height:80%;object-fit:contain;position:absolute;top:10%;left:10%}
    .equip-slot-rarity{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%}

    /* ── INVENTORY DRAWER ── */
    .inv-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50}
    .inv-overlay.open{display:block}
    .inv-drawer{position:fixed;bottom:0;left:0;right:0;max-height:60vh;background:var(--bg-card-solid);border-top:2px solid var(--border-glow);border-radius:16px 16px 0 0;z-index:51;padding:16px;overflow-y:auto;transform:translateY(100%);transition:transform 0.25s ease}
    .inv-drawer.open{transform:translateY(0)}
    .inv-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .inv-title{font-family:var(--font-data);font-size:9px;color:var(--gold);letter-spacing:1px}
    .inv-close{font-family:var(--font-data);font-size:8px;color:var(--text-faint);cursor:pointer;padding:6px;border:none;background:none}
    .inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .inv-item{aspect-ratio:1;border-radius:8px;background:rgba(0,0,0,0.3);border:1.5px solid var(--border);cursor:pointer;position:relative;overflow:hidden;transition:all 0.15s}
    .inv-item:hover{border-color:var(--gold);transform:translateY(-2px)}
    .inv-item.equipped{border-color:var(--green);box-shadow:0 0 8px rgba(106,205,138,0.2)}
    .inv-item-img{width:85%;height:85%;object-fit:contain;position:absolute;top:7.5%;left:7.5%}
    .inv-item-name{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-family:var(--font-data);font-size:5px;color:var(--text-body);background:rgba(0,0,0,0.7);padding:2px}
    .inv-item-stats{font-family:var(--font-data);font-size:5px;color:var(--green);position:absolute;top:2px;left:3px}

    .r-common{color:#bbb}.r-uncommon{color:#6acd8a}.r-rare{color:#5b8fe0}.r-epic{color:#b088e8}.r-legendary{color:#D4A64B}
    .rd-common{background:#bbb}.rd-uncommon{background:#6acd8a}.rd-rare{background:#5b8fe0}.rd-epic{background:#b088e8}.rd-legendary{background:#D4A64B}

    .unequip-btn{width:100%;padding:8px;border-radius:6px;border:1px solid var(--red);background:rgba(232,90,106,0.1);color:var(--red);font-family:var(--font-data);font-size:7px;cursor:pointer;margin-top:8px;letter-spacing:1px}
    .unequip-btn:hover{background:rgba(232,90,106,0.2)}
    .loading-msg{text-align:center;padding:40px;font-family:var(--font-data);font-size:8px;color:var(--text-faint)}
  </style>
</head>
<body>
  <div class="page">
    <div class="nav">
      <a href="/dashboard.html">← DASHBOARD</a>
      <a href="/nethara-live.html">NETHARA →</a>
    </div>
    <div id="loading" class="loading-msg">LOADING YOUR NINE...</div>
    <div id="builder" style="display:none;">
      <div class="preview-frame">
        <canvas id="charCanvas" class="preview-canvas" width="640" height="640"></canvas>
        <div class="preview-name" id="nineName">???</div>
        <div class="house-badge" id="houseBadge"></div>
      </div>
      <div class="stats-bar" id="statsBar"></div>
      <div class="equip-title">⚔ EQUIPMENT ⚔</div>
      <div class="equip-grid" id="equipGrid"></div>
      <a href="/dashboard.html" id="saveBtn" style="display:block;max-width:360px;margin:0 auto 20px;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-data);font-size:10px;letter-spacing:2px;text-align:center;text-decoration:none;background:linear-gradient(180deg,#D4A64B 0%,#b8903d 100%);color:#080810;box-shadow:0 4px 0 #8a6d2f,0 0 30px rgba(212,166,75,0.3);">SAVE &amp; ENTER WORLD</a>
    </div>
  </div>

  <div class="inv-overlay" id="invOverlay" onclick="closeDrawer()"></div>
  <div class="inv-drawer" id="invDrawer">
    <div class="inv-header">
      <div class="inv-title" id="invTitle">INVENTORY</div>
      <button class="inv-close" onclick="closeDrawer()">✕ CLOSE</button>
    </div>
    <div class="inv-grid" id="invGrid"></div>
    <button class="unequip-btn" id="unequipBtn" style="display:none;" onclick="unequipSlot()">✕ REMOVE ITEM</button>
  </div>

<script>
var SLOT_META={
  fur:{icon:'🐱',label:'FUR',path:'/assets/nine/fur/'},
  expression:{icon:'👁',label:'EYES',path:'/assets/nine/expression/'},
  headwear:{icon:'🎩',label:'HEAD',path:'/assets/nine/headwear/'},
  outfit:{icon:'👘',label:'OUTFIT',path:'/assets/nine/outfit/'},
  weapon:{icon:'⚔️',label:'WEAPON',path:'/assets/nine/weapon/'},
  familiar:{icon:'🔮',label:'PET',path:'/assets/nine/familiar/'},
  trinket_1:{icon:'💍',label:'TRINKET 1'},
  trinket_2:{icon:'📿',label:'TRINKET 2'}
};
var LAYER_ORDER=['fur','expression','headwear','outfit','weapon','familiar'];
var STAT_COLORS={atk:'#e85a6a',hp:'#6acd8a',spd:'#6ac8d8',def:'#b088e8',luck:'#D4A64B'};
var HOUSE_DATA={1:{name:'Smoulders',color:'#E03C31',icon:'🔥'},2:{name:'Darktide',color:'#00B4D8',icon:'🌊'},3:{name:'Stonebark',color:'#5CB338',icon:'🌿'},4:{name:'Ashenvale',color:'#90E0EF',icon:'💨'},5:{name:'Stormrage',color:'#FFC800',icon:'⚡'},6:{name:'Nighthollow',color:'#7B2D8E',icon:'🌙'},7:{name:'Dawnbringer',color:'#FF8C00',icon:'☀️'},8:{name:'Manastorm',color:'#5B8FE0',icon:'🔮'},9:{name:'Plaguemire',color:'#E84393',icon:'☠️'}};

var playerId=null,nineData=null,equipped={},inventory=[],allItems=[],activeSlot=null,imageCache={};

function getPlayerId(){var p=new URLSearchParams(window.location.search);return p.get('player_id')||localStorage.getItem('player_id');}

async function init(){
  playerId=getPlayerId();
  if(!playerId){document.getElementById('loading').textContent='NO PLAYER FOUND';return;}
  try{
    var eR=await fetch('/api/items/equipped/'+playerId);
    if(!eR.ok) throw new Error('Failed to load Nine');
    var eD=await eR.json();
    nineData=eD.nine;equipped=eD.equipped;

    var iR=await fetch('/api/items/inventory/'+playerId);
    if(iR.ok){inventory=await iR.json();}

    var aR=await fetch('/api/items');
    if(aR.ok){allItems=await aR.json();}

    // Auto-grant starters if empty inventory
    if(inventory.length===0){
      // Auto-equip random starters after granting
      var autoEquip=true;
      await fetch('/api/items/grant-starters',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(playerId)})});
      var iR2=await fetch('/api/items/inventory/'+playerId);
      if(iR2.ok){inventory=await iR2.json();}
      // Auto-equip one random item per slot
      if(autoEquip && inventory.length>0){
        var slots=["fur","expression","headwear","outfit","weapon"];
        for(var si=0;si<slots.length;si++){
          var slot=slots[si];
          var candidates=inventory.filter(function(pi){return pi.item && pi.item.slot===slot;});
          if(candidates.length>0){
            var pick=candidates[Math.floor(Math.random()*candidates.length)];
            await fetch("/api/items/equip",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({player_id:parseInt(playerId),item_slug:pick.item.slug})});
          }
        }
        var eR2=await fetch("/api/items/equipped/"+playerId);
        if(eR2.ok){var eD2=await eR2.json();nineData=eD2.nine;equipped=eD2.equipped;}
      }
    }

    document.getElementById('loading').style.display='none';
    document.getElementById('builder').style.display='block';
    renderAll();
  }catch(err){
    console.error(err);
    document.getElementById('loading').textContent='FAILED TO LOAD: '+err.message;
  }
}

function renderAll(){renderName();renderStats();renderEquipSlots();renderCanvas();}

function renderName(){
  var house=HOUSE_DATA[nineData.house_id]||{name:'???',icon:'?',color:'#888'};
  document.getElementById('nineName').textContent=(nineData.name||'UNNAMED NINE').toUpperCase();
  var badge=document.getElementById('houseBadge');
  badge.textContent=house.icon+' '+house.name;
  badge.style.color=house.color;badge.style.borderColor=house.color+'40';
}

function renderStats(){
  var stats=['atk','hp','spd','def','luck'];
  var labels={atk:'ATK',hp:'HP',spd:'SPD',def:'DEF',luck:'LUCK'};
  var h='';
  stats.forEach(function(s){
    var base=nineData.base[s]||0;var total=nineData.total[s]||0;var bonus=total-base;
    h+='<div class="stat-item">';
    h+='<div class="stat-val" style="color:'+STAT_COLORS[s]+'">'+total+'</div>';
    h+='<div class="stat-label">'+labels[s]+'</div>';
    if(bonus>0)h+='<div class="stat-bonus" style="color:'+STAT_COLORS[s]+'">+'+bonus+'</div>';
    else if(bonus<0)h+='<div class="stat-bonus" style="color:var(--red)">'+bonus+'</div>';
    h+='</div>';
  });
  document.getElementById('statsBar').innerHTML=h;
}

function renderEquipSlots(){
  var slots=['fur','expression','headwear','outfit','weapon','familiar','trinket_1','trinket_2'];
  var g=document.getElementById('equipGrid');var h='';
  slots.forEach(function(slot){
    var meta=SLOT_META[slot]||{icon:'?',label:slot};
    var equippedSlug=equipped[slot];
    var item=equippedSlug?findItem(equippedSlug):null;
    var filled=!!item;
    h+='<div class="equip-slot'+(filled?' filled':'')+'" onclick="openSlot(\''+slot+'\')">';
    if(item&&item.image_file){
      var basePath=SLOT_META[item.slot]?SLOT_META[item.slot].path:'/assets/nine/';
      h+='<img class="equip-slot-img" src="'+basePath+item.image_file+'" onerror="this.style.display=\'none\'">';
      h+='<div class="equip-slot-rarity rd-'+(item.rarity||'common')+'"></div>';
    }else{
      h+='<div class="equip-slot-icon">'+meta.icon+'</div>';
    }
    h+='<div class="equip-slot-label">'+meta.label+'</div>';
    h+='</div>';
  });
  g.innerHTML=h;
}

function findItem(slug){for(var i=0;i<allItems.length;i++){if(allItems[i].slug===slug)return allItems[i];}return null;}

function renderCanvas(){
  var canvas=document.getElementById('charCanvas');var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var layers=[];
  LAYER_ORDER.forEach(function(slot){
    var slug=equipped[slot];if(!slug)return;
    var item=findItem(slug);if(!item||!item.image_file)return;
    layers.push((SLOT_META[slot]?SLOT_META[slot].path:'')+item.image_file);
  });
  if(layers.length===0){
    ctx.fillStyle='rgba(212,166,75,0.1)';ctx.fillRect(0,0,640,640);
    ctx.font='16px "Press Start 2P"';ctx.fillStyle='#6B5E50';ctx.textAlign='center';
    ctx.fillText('EQUIP ITEMS',320,300);ctx.fillText('TO SEE YOUR NINE',320,330);
    return;
  }
  var loaded=0,images=[];
  layers.forEach(function(src,i){
    if(imageCache[src]){images[i]=imageCache[src];loaded++;if(loaded===layers.length)drawLayers(ctx,images);}
    else{var img=new Image();img.onload=function(){imageCache[src]=img;images[i]=img;loaded++;if(loaded===layers.length)drawLayers(ctx,images);};img.onerror=function(){loaded++;if(loaded===layers.length)drawLayers(ctx,images);};img.src=src;}
  });
}

function drawLayers(ctx,images){ctx.clearRect(0,0,640,640);images.forEach(function(img){if(img)ctx.drawImage(img,0,0,640,640);});}

function openSlot(slot){
  activeSlot=slot;
  var lookupSlot=slot.startsWith('trinket')?'trinket':slot;
  document.getElementById('invTitle').textContent=(SLOT_META[slot]?SLOT_META[slot].label:slot).toUpperCase()+' INVENTORY';
  var slotItems=inventory.filter(function(pi){return pi.item&&pi.item.slot===lookupSlot;});
  var g=document.getElementById('invGrid');
  if(slotItems.length===0){
    g.innerHTML='<div style="grid-column:1/-1;text-align:center;font-family:var(--font-data);font-size:7px;color:var(--text-faint);padding:20px;">NO ITEMS FOR THIS SLOT</div>';
  }else{
    var h='';
    slotItems.forEach(function(pi){
      var item=pi.item;var isEquipped=equipped[slot]===item.slug;
      var basePath=SLOT_META[item.slot]?SLOT_META[item.slot].path:'/assets/nine/';
      var bonusStr=getItemBonusStr(item);
      h+='<div class="inv-item'+(isEquipped?' equipped':'')+'" onclick="equipItem(\''+item.slug+'\')">';
      if(item.image_file)h+='<img class="inv-item-img" src="'+basePath+item.image_file+'" onerror="this.style.display=\'none\'">';
      if(bonusStr)h+='<div class="inv-item-stats">'+bonusStr+'</div>';
      h+='<div class="inv-item-name r-'+(item.rarity||'common')+'">'+item.name+'</div>';
      h+='</div>';
    });
    g.innerHTML=h;
  }
  document.getElementById('unequipBtn').style.display=equipped[slot]?'block':'none';
  document.getElementById('invOverlay').classList.add('open');
  document.getElementById('invDrawer').classList.add('open');
}

function closeDrawer(){document.getElementById('invOverlay').classList.remove('open');document.getElementById('invDrawer').classList.remove('open');activeSlot=null;}

function getItemBonusStr(item){
  var p=[];
  if(item.bonus_atk>0)p.push('+'+item.bonus_atk+'A');if(item.bonus_atk<0)p.push(item.bonus_atk+'A');
  if(item.bonus_hp>0)p.push('+'+item.bonus_hp+'H');if(item.bonus_hp<0)p.push(item.bonus_hp+'H');
  if(item.bonus_spd>0)p.push('+'+item.bonus_spd+'S');if(item.bonus_spd<0)p.push(item.bonus_spd+'S');
  if(item.bonus_def>0)p.push('+'+item.bonus_def+'D');if(item.bonus_def<0)p.push(item.bonus_def+'D');
  if(item.bonus_luck>0)p.push('+'+item.bonus_luck+'L');if(item.bonus_luck<0)p.push(item.bonus_luck+'L');
  return p.join(' ');
}

async function equipItem(slug){
  if(!activeSlot||!playerId)return;
  try{
    var r=await fetch('/api/items/equip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(playerId),item_slug:slug})});
    if(r.ok){equipped[activeSlot]=slug;
      var eR=await fetch('/api/items/equipped/'+playerId);if(eR.ok){var eD=await eR.json();nineData=eD.nine;equipped=eD.equipped;}
      closeDrawer();renderAll();
    }else{var err=await r.json();alert(err.error||'Failed to equip');}
  }catch(e){console.error(e);}
}

async function unequipSlot(){
  if(!activeSlot||!playerId)return;
  try{
    var r=await fetch('/api/items/unequip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(playerId),slot:activeSlot})});
    if(r.ok){equipped[activeSlot]=null;
      var eR=await fetch('/api/items/equipped/'+playerId);if(eR.ok){var eD=await eR.json();nineData=eD.nine;equipped=eD.equipped;}
      closeDrawer();renderAll();
    }
  }catch(e){console.error(e);}
}

init();
</script>
</body>
</html>
