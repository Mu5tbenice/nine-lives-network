<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leaderboards | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .lb-hero{text-align:center;padding:16px 0 8px}
    .lb-hero__title{font-family:var(--font-title);font-weight:700;font-size:24px;color:var(--gold);letter-spacing:3px}
    .lb-hero__sub{font-family:var(--font-body);font-size:15px;font-style:italic;color:var(--text-muted);margin-top:4px}
    .lb-season{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 0}
    .lb-tabs{display:flex;gap:4px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;padding:4px}
    .lb-tab{flex:1;padding:10px 8px;border:none;border-radius:8px;background:transparent;color:var(--text-muted);font-family:var(--font-title);font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s;text-align:center}
    .lb-tab.active{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
    .lb-content{display:none}.lb-content.active{display:block}

    /* √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê CHART AREA √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê */
    .lb-chart-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;padding:16px;margin-bottom:16px;position:relative;overflow:hidden}
    .lb-chart-card__bg{position:absolute;top:0;right:0;width:120px;height:100%;object-fit:contain;opacity:0.04;pointer-events:none}
    .lb-chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;position:relative;z-index:1}
    .lb-chart-title{font-family:var(--font-data);font-size:8px;color:var(--text-muted);letter-spacing:2px}
    .lb-chart-toggles{display:flex;gap:2px}
    .lb-chart-toggle{background:transparent;border:1px solid var(--border-subtle);color:var(--text-faint);font-family:var(--font-data);font-size:7px;padding:3px 8px;border-radius:4px;cursor:pointer;letter-spacing:0.5px}
    .lb-chart-toggle.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border)}
    .lb-chart-wrap{position:relative;height:180px;z-index:1}

    /* √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê PODIUM √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê */
    .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:16px 0 20px}
    .podium-slot{display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none}
    .podium-slot--1{order:2}.podium-slot--2{order:1}.podium-slot--3{order:3}
    .podium-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2.5px solid var(--text-faint)}
    .podium-slot--1 .podium-avatar{width:64px;height:64px;border-color:var(--gold);box-shadow:0 0 15px var(--gold-glow)}
    .podium-slot--2 .podium-avatar{width:56px;height:56px;border-color:#C0C0C0}
    .podium-slot--3 .podium-avatar{border-color:#CD7F32}
    .podium-avatar--placeholder{display:flex;align-items:center;justify-content:center;background:var(--bg-card)}
    .podium-avatar--placeholder img{width:60%;height:60%;object-fit:contain}
    .podium-medal{font-family:var(--font-data);font-size:10px;color:var(--gold);margin-bottom:-2px}
    .podium-slot--2 .podium-medal{color:#C0C0C0}.podium-slot--3 .podium-medal{color:#CD7F32}
    .podium-name{font-family:var(--font-data);font-size:8px;font-weight:600;color:var(--text-bright);letter-spacing:.5px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
    .podium-pts{font-family:var(--font-data);font-size:9px;color:var(--gold)}
    .podium-bar{width:70px;border-radius:6px 6px 0 0;background:var(--bg-card);border:1px solid var(--border-subtle);border-bottom:none}
    .podium-slot--1 .podium-bar{height:60px;width:80px;border-color:var(--gold-border);background:var(--gold-dim)}
    .podium-slot--2 .podium-bar{height:44px}.podium-slot--3 .podium-bar{height:32px}

    /* √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê LIST ROWS √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê */
    .lb-list{display:flex;flex-direction:column;gap:4px}
    .lb-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;text-decoration:none;transition:all .2s;cursor:pointer}
    .lb-row:hover{background:var(--bg-card-hover);border-color:var(--border-medium)}
    .lb-row--you{background:rgba(212,166,75,.06);border-color:var(--gold-border)}
    .lb-rank{font-family:var(--font-data);font-size:10px;color:var(--text-faint);width:24px;text-align:center;flex-shrink:0}
    .lb-rank--gold{color:var(--gold)}
    .lb-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--border-subtle);flex-shrink:0}
    .lb-avatar--placeholder{width:36px;height:36px;border-radius:50%;border:2px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;background:var(--bg-inset);flex-shrink:0}
    .lb-avatar--placeholder img{width:22px;height:22px;object-fit:contain}
    .lb-info{flex:1;min-width:0}
    .lb-name{font-family:var(--font-data);font-size:9px;font-weight:600;color:var(--text-bright);letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-meta{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);display:flex;align-items:center;gap:6px;margin-top:2px}
    .lb-house-img{width:16px;height:16px;object-fit:contain}
    .lb-tag-badge{font-family:var(--font-data);font-size:7px;color:var(--gold);background:var(--gold-dim);border:1px solid var(--gold-border);padding:2px 6px;border-radius:3px;margin-left:4px}
    .lb-points{text-align:right;flex-shrink:0}
    .lb-points__val{font-family:var(--font-data);font-size:12px;color:var(--text-bright)}
    .lb-points__label{font-family:var(--font-data);font-size:7px;color:var(--text-faint)}
    .lb-house-icon-lg{width:32px;height:32px;object-fit:contain;flex-shrink:0}
    .lb-members{font-family:var(--font-data);font-size:8px;color:var(--text-faint)}
    .lb-tag{font-family:var(--font-title);font-size:15px;font-weight:700;color:var(--text-bright);letter-spacing:.5px}
    .lb-empty{text-align:center;padding:30px 16px;color:var(--text-faint);font-family:var(--font-body);font-style:italic;font-size:15px}

    /* √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê HOUSE ROWS √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê */
    .house-row{display:flex;align-items:center;gap:10px;padding:14px;border-radius:12px;border:1px solid;margin-bottom:6px;position:relative;overflow:hidden;transition:all .2s}
    .house-row:hover{transform:translateY(-1px)}
    .house-row__bg{position:absolute;top:-10px;right:-10px;width:80px;height:80px;object-fit:contain;opacity:0.08;pointer-events:none}
    .house-row__rank{font-family:var(--font-data);font-size:10px;width:24px;text-align:center;flex-shrink:0;position:relative;z-index:1}
    .house-row__icon{width:36px;height:36px;object-fit:contain;flex-shrink:0;position:relative;z-index:1}
    .house-row__info{flex:1;min-width:0;position:relative;z-index:1}
    .house-row__name{font-family:var(--font-title);font-size:14px;font-weight:700;letter-spacing:.5px}
    .house-row__bar-wrap{display:flex;align-items:center;gap:8px;margin-top:4px}
    .house-row__bar{flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,0.04);overflow:hidden}
    .house-row__bar-fill{height:100%;border-radius:4px;transition:width 0.6s}
    .house-row__points{text-align:right;flex-shrink:0;position:relative;z-index:1}
    .house-row__pts-val{font-family:var(--font-data);font-size:14px;font-weight:700}
    .house-row__pts-label{font-family:var(--font-data);font-size:6px;letter-spacing:1px}

    /* √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê COMMUNITY ROWS √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê */
    .comm-row{cursor:pointer}
    .comm-icon{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold-border);display:flex;align-items:center;justify-content:center;background:var(--gold-dim);flex-shrink:0;font-family:var(--font-data);font-size:8px;color:var(--gold)}
    .comm-members{display:none;padding:0 14px 12px;margin-top:-6px;background:var(--bg-card);border:1px solid var(--border-subtle);border-top:none;border-radius:0 0 10px 10px}
    .comm-members.expanded{display:block}
    .comm-member-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-subtle)}
    .comm-member-row:last-child{border-bottom:none}
    .comm-member-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--border-subtle)}
    .comm-member-name{font-family:var(--font-data);font-size:7px;color:var(--text-body);flex:1}
    .comm-member-pts{font-family:var(--font-data);font-size:8px;color:var(--text-muted)}
    .comm-arrow{font-size:10px;color:var(--text-faint);transition:transform .2s;flex-shrink:0}
    .comm-row.open .comm-arrow{transform:rotate(90deg)}

    /* √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê PLAYER POPUP √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê */
    .player-popup{position:fixed;z-index:9999;background:rgba(16,12,28,0.97);border:1px solid rgba(212,166,75,0.3);border-radius:10px;padding:14px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,0.6);display:none;cursor:pointer;transition:opacity 0.15s}
    .player-popup.visible{display:block}
    .player-popup__row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .player-popup__avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
    .player-popup__name{font-family:var(--font-data);font-size:9px;color:var(--text-bright);letter-spacing:0.5px}
    .player-popup__house{font-family:var(--font-title);font-size:11px;display:flex;align-items:center;gap:4px;margin-top:2px}
    .player-popup__house img{width:14px;height:14px}
    .player-popup__stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding-top:8px;border-top:1px solid var(--border-subtle)}
    .player-popup__stat{text-align:center}
    .player-popup__stat-val{font-family:var(--font-data);font-size:8px;color:var(--text-bright)}
    .player-popup__stat-label{font-family:var(--font-data);font-size:5px;color:var(--text-faint);letter-spacing:0.5px;margin-top:2px}
    .player-popup__link{display:block;text-align:center;margin-top:8px;font-family:var(--font-data);font-size:6px;color:var(--gold);letter-spacing:1px;text-decoration:none;padding:4px 0;border-top:1px solid var(--border-subtle)}

    @media(max-width:480px){.lb-hero__title{font-size:20px}.lb-tab{font-size:10px;padding:8px 4px}.podium{gap:6px}.podium-slot--1 .podium-avatar{width:56px;height:56px}.podium-slot--2 .podium-avatar{width:48px;height:48px}.podium-avatar{width:44px;height:44px}.podium-bar{width:60px}.podium-slot--1 .podium-bar{width:70px}.podium-name{font-size:7px;max-width:70px}.lb-row{padding:10px 12px;gap:8px}}
  </style>
</head>

  <div class="player-popup" id="playerPopup"></div>

<script>
var HOUSES={1:{name:'Smoulders',color:'#E03C31',img:'Housesmoulders.png'},2:{name:'Darktide',color:'#00B4D8',img:'Housedarktide.png'},3:{name:'Stonebark',color:'#5CB338',img:'Housestonebark.png'},4:{name:'Ashenvale',color:'#90E0EF',img:'HouseAshenvale.png'},5:{name:'Stormrage',color:'#FFC800',img:'Housestormrage.png'},6:{name:'Nighthollow',color:'#7B2D8E',img:'Housenighthollow.png'},7:{name:'Dawnbringer',color:'#FF8C00',img:'HouseDwnbringer.png'},8:{name:'Manastorm',color:'#5B8FE0',img:'Housemanastorm.png'},9:{name:'Plaguemire',color:'#E84393',img:'Houseplaguemire.png'}};
var COMM_COLORS=['#D4A64B','#00D4FF','#FF6B6B','#44cc44','#CC44DD','#FF8C00','#5B8FE0','#E84393','#90E0EF','#FFC800'];
var myPlayerId=localStorage.getItem('player_id');
var allPlayers=[],allSchools=[],allCommunities=[];
function toggleMobileMenu(){document.getElementById('hamburger').classList.toggle('active');document.getElementById('mobileMenu').classList.toggle('active');}
function doLogout(){localStorage.removeItem('player_id');window.location.href='/';}
if(localStorage.getItem('player_id')){var nl=document.getElementById('navLogout'),ml=document.getElementById('mobileLogout');if(nl)nl.style.display='';if(ml)ml.style.display='';}
function hImg(f,s){return'<img src="/assets/images/houses/'+f+'" style="width:'+s+'px;height:'+s+'px;object-fit:contain;" onerror="this.style.display=\'none\'">';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

function switchTab(t){
  var c=document.querySelectorAll('.lb-content');for(var i=0;i<c.length;i++)c[i].classList.remove('active');
  var b=document.querySelectorAll('.lb-tab');for(var i=0;i<b.length;i++){b[i].classList.remove('active');if(b[i].textContent.toLowerCase().indexOf(t)!==-1)b[i].classList.add('active');}
  document.getElementById('tab-'+t).classList.add('active');
}

// √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê PLAYER POPUP √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê
var popupTimeout=null;
function showPlayerPopup(e,p){
  clearTimeout(popupTimeout);
  var popup=document.getElementById('playerPopup');
  var h=HOUSES[p.school_id]||{name:'?',color:'#888',img:''};
  popup.innerHTML='<div class="player-popup__row">'
    +(p.profile_image?'<img src="'+p.profile_image+'" class="player-popup__avatar">':'')
    +'<div><div class="player-popup__name">@'+esc(p.twitter_handle||'unknown')+'</div>'
    +'<div class="player-popup__house" style="color:'+h.color+';">'+hImg(h.img,14)+h.name+'</div></div></div>'
    +'<div class="player-popup__stats">'
    +'<div class="player-popup__stat"><div class="player-popup__stat-val">'+(p.seasonal_points||'√¢‚Ç¨‚Äù')+'</div><div class="player-popup__stat-label">POINTS</div></div>'
    +'<div class="player-popup__stat"><div class="player-popup__stat-val">'+(p.streak||'√¢‚Ç¨‚Äù')+'</div><div class="player-popup__stat-label">STREAK</div></div>'
    +'<div class="player-popup__stat"><div class="player-popup__stat-val">'+(p.mana!=null?p.mana:'√¢‚Ç¨‚Äù')+'</div><div class="player-popup__stat-label">MANA</div></div>'
    +'<div class="player-popup__stat"><div class="player-popup__stat-val">'+(p.lives!=null?p.lives:'√¢‚Ç¨‚Äù')+'</div><div class="player-popup__stat-label">LIVES</div></div></div>'
    +'<a href="/profile.html?player_id='+p.id+'" class="player-popup__link">VIEW PROFILE √¢‚ÄÝ‚Äô</a>';
  popup.style.left=Math.min(e.clientX+10,window.innerWidth-220)+'px';
  popup.style.top=Math.max(e.clientY-140,10)+'px';
  popup.classList.add('visible');
}
function hidePlayerPopup(){popupTimeout=setTimeout(function(){document.getElementById('playerPopup').classList.remove('visible');},200);}
document.getElementById('playerPopup').addEventListener('mouseenter',function(){clearTimeout(popupTimeout);});
document.getElementById('playerPopup').addEventListener('mouseleave',function(){hidePlayerPopup();});

// √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê

// ‚ïê‚ïê‚ïê COMMUNITY CLASH LEAGUE ‚ïê‚ïê‚ïê
var clashData=null;
async function loadClashData(){
  try{
    var r=await fetch('/api/clashes/current');
    var d=await r.json();
    if(d.success&&d.data)clashData=d.data;
    renderLeague();
  }catch(e){console.error('Clash load error:',e);}
}
function renderLeague(){
  var el=document.getElementById('leagueHero');
  if(!clashData||(!clashData.matchups&&!clashData.table)){el.style.display='none';return;}
  el.style.display='block';
  var html='<div class="league-header">';
  html+='<div class="league-header__label">COMMUNITY CLASH</div>';
  html+='<div class="league-header__title">Battle League</div>';
  if(clashData.current_week)html+='<div class="league-header__week">Week '+clashData.current_week+(clashData.total_weeks?' of '+clashData.total_weeks:'')+'</div>';
  html+='</div>';

  // This week's matchups
  var matchups=clashData.matchups||[];
  if(matchups.length>0){
    html+='<div class="league-matchups">';
    matchups.forEach(function(m){
      var a=m.team_a||{};var b=m.team_b||{};
      var apts=a.points||0;var bpts=b.points||0;var total=apts+bpts||1;
      var apct=Math.round(apts/total*100);var bpct=100-apct;
      var ac=a.color||'#D4A64B';var bc=b.color||'#00D4FF';
      var aInit=(a.tag||'?').replace('$','').substring(0,3);
      var bInit=(b.tag||'?').replace('$','').substring(0,3);
      var liveCls=m.status==='live'?' league-matchup--live':'';
      html+='<div class="league-matchup'+liveCls+'">';
      html+='<div class="lm-side">';
      html+='<div class="lm-icon" style="border-color:'+ac+';color:'+ac+';">'+aInit+'</div>';
      html+='<div><div class="lm-name" style="color:'+ac+';">'+esc(a.tag)+'</div><div style="font-family:var(--font-data);font-size:6px;color:var(--text-faint);">'+(a.members||0)+' raiders</div></div>';
      html+='</div>';
      html+='<div class="lm-pts" style="color:'+ac+';">'+apts+'</div>';
      if(m.status==="live")html+='<div class="lm-live"></div>';
      html+='<div class="lm-vs">VS</div>';
      if(m.status==="live")html+='<div class="lm-live"></div>';
      html+='<div class="lm-pts" style="color:'+bc+';">'+bpts+'</div>';
      html+='<div class="lm-side lm-side--right">';
      html+='<div><div class="lm-name" style="color:'+bc+';text-align:right;">'+esc(b.tag)+'</div><div style="font-family:var(--font-data);font-size:6px;color:var(--text-faint);text-align:right;">'+(b.members||0)+' raiders</div></div>';
      html+='<div class="lm-icon" style="border-color:'+bc+';color:'+bc+';">'+bInit+'</div>';
      html+='</div></div>';
      // Power bar under matchup
      html+='<div class="lm-bar" style="margin:-2px 16px 8px;"><div class="lm-bar__seg" style="width:'+apct+'%;background:'+ac+';"></div><div class="lm-bar__seg" style="width:'+bpct+'%;background:'+bc+';"></div></div>';
    });
    html+='</div>';
  }

  // League table
  var table=clashData.table||[];
  if(table.length>0){
    html+='<div class="league-table">';
    html+='<div class="league-table__header"><span>#</span><span>COMMUNITY</span><span>P</span><span>W</span><span>D</span><span>L</span><span>PTS</span></div>';
    var myTag='';
    if(myPlayerId){
      var me=allPlayers.find(function(p){return String(p.id)===String(myPlayerId);});
      if(me)myTag=(me.community_tag||'').toUpperCase();
    }
    table.forEach(function(t,i){
      var tc=t.color||COMM_COLORS[i%COMM_COLORS.length];
      var init=(t.tag||'?').replace('$','').substring(0,3);
      var isYou=myTag&&t.tag&&t.tag.toUpperCase()===myTag;
      var rowCls='league-table__row'+(isYou?' league-table__row--you':'');
      var rankColors=['#FFD700','#C0C0C0','#CD7F32'];
      var rc=i<3?rankColors[i]:tc;
      html+='<div class="'+rowCls+'">';
      html+='<div class="lt-rank" style="color:'+rc+';">'+(i+1)+'</div>';
      html+='<div class="lt-team"><div class="lt-team__icon" style="border-color:'+tc+';color:'+tc+';">'+init+'</div><div class="lt-team__name" style="color:'+tc+';">'+esc(t.tag)+'</div></div>';
      html+='<div class="lt-stat">'+(t.played||0)+'</div>';
      html+='<div class="lt-stat" style="color:#44cc44;">'+(t.wins||0)+'</div>';
      html+='<div class="lt-stat" style="color:#ccaa44;">'+(t.draws||0)+'</div>';
      html+='<div class="lt-stat" style="color:#cc4444;">'+(t.losses||0)+'</div>';
      html+='<div class="lt-stat lt-stat--pts" style="color:'+rc+';">'+(t.league_pts||0)+'</div>';
      html+='</div>';
    });
    html+='</div>';
  }

  el.innerHTML=html;
}

// ‚ïê‚ïê‚ïê COMMUNITY POWER HERO ‚ïê‚ïê‚ïê
function renderPowerHero(communities){
  var el=document.getElementById('powerHero');
  if(!communities||!communities.length){el.style.display='none';return;}
  el.style.display='block';
  var total=0;communities.forEach(function(c){total+=(c.total_points||0);});
  var top=communities.slice(0,6);
  var maxPts=top.length>0?(top[0].total_points||1):1;

  var html='<div class="power-hero__header">';
  html+='<div class="power-hero__label">SEASON 0</div>';
  html+='<div class="power-hero__title">Community Power Race</div>';
  html+='<div class="power-hero__sub">'+communities.length+' communities battling for dominance</div>';
  html+='</div>';

  // Animated bars
  html+='<div class="power-hero__bars">';
  top.forEach(function(cm,i){
    var initials=cm.community_tag.replace('$','').substring(0,3);
    var color=COMM_COLORS[i%COMM_COLORS.length];
    var pct=total>0?((cm.total_points/total)*100).toFixed(1):0;
    var barW=Math.max(3,((cm.total_points||0)/maxPts)*100);
    var rankColors=['#FFD700','#C0C0C0','#CD7F32'];
    var rankCol=i<3?rankColors[i]:color;

    html+='<div class="power-bar">';
    html+='<div class="power-bar__rank" style="color:'+rankCol+';">'+(i+1)+'</div>';
    html+='<div class="power-bar__icon" style="border-color:'+color+'60;color:'+color+';">'+initials+'</div>';
    html+='<div class="power-bar__info">';
    html+='<div style="display:flex;align-items:baseline;gap:8px;">';
    html+='<div class="power-bar__name" style="color:'+color+';">'+esc(cm.community_tag)+'</div>';
    html+='<div class="power-bar__meta"><span>'+(cm.member_count||0)+' raiders</span></div>';
    html+='</div>';
    html+='<div class="power-bar__track"><div class="power-bar__fill" style="width:'+barW+'%;background:linear-gradient(90deg,'+color+','+color+'88);"></div></div>';
    html+='</div>';
    html+='<div class="power-bar__pts" style="color:'+color+';">'+(cm.total_points||0)+'</div>';
    html+='<div class="power-bar__pct" style="color:'+color+'80;">'+pct+'%</div>';
    html+='</div>';
  });
  html+='</div>';

  // CTA to communities tab
  if(communities.length>6)html+='<a href="#" class="power-hero__cta" onclick="event.preventDefault();document.querySelectorAll(\'.lb-tab\')[2].click();">View All '+communities.length+' Communities &#8594;</a>';

  el.innerHTML=html;
}

function drawPlayerChart(players){

      +'<div class="house-row__info"><div class="house-row__name" style="color:'+h.color+';">'+h.name+'</div>'
      +'<div class="house-row__bar-wrap"><div class="house-row__bar"><div class="house-row__bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,'+h.color+','+h.color+'88);"></div></div>'
      +'<span class="lb-members">'+(s.member_count||0)+' wizards</span></div></div>'
      +'<div class="house-row__points"><div class="house-row__pts-val" style="color:'+h.color+';">'+(s.total_points||0)+'</div><div class="house-row__pts-label" style="color:'+h.color+'80;">PTS</div></div></div>';

function drawHouseChart(schools){
  var cv=document.getElementById('houseChart');if(!cv)return;
  // Fill all 9 houses, same as dashboard
  var labels=[],colors=[],pts=[];
  var schoolMap={};schools.forEach(function(s){schoolMap[s.school_id]=s;});
  for(var id=1;id<=9;id++){
    var h=HOUSES[id];var s=schoolMap[id];
    labels.push(h.name);colors.push(h.color);pts.push(s?s.total_points||0:0);
  }
  new Chart(cv,{type:'bar',data:{labels:labels,datasets:[{data:pts,backgroundColor:colors.map(function(c){return c+'40';}),borderColor:colors,borderWidth:2,borderRadius:6,barPercentage:0.7}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a2e',borderColor:'#D4A64B44',borderWidth:1,titleFont:{family:'Cinzel',size:12},bodyFont:{family:'JetBrains Mono',size:10},callbacks:{label:function(ctx){return ctx.raw+' pts';}}}},
      scales:{x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#606070',font:{family:'JetBrains Mono',size:8}}},y:{grid:{display:false},ticks:{color:function(ctx){return colors[ctx.index]||'#aaa';},font:{family:'Cinzel',size:10,weight:600}}}}}});
}

// √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê
function renderCommunities(communities){
  allCommunities=communities;
  var c=document.getElementById('tab-communities');
  if(!communities||!communities.length){c.innerHTML='<div class="lb-empty">No communities yet. Add a community tag in your profile!</div>';return;}
  var html='';

  // Dopamine chart
  html+='<div class="lb-chart-card fade-up" style="border-color:rgba(212,166,75,0.2);"><div class="lb-chart-header"><div class="lb-chart-title">COMMUNITY POWER RACE</div></div><div class="lb-chart-wrap" style="height:200px;"><canvas id="commChart"></canvas></div></div>';

  // Community rows √¢‚Ç¨‚Äù clickable to expand members
  html+='<div class="lb-list" id="commList">';
  for(var i=0;i<communities.length;i++){
    var cm=communities[i];var rc=i<3?'lb-rank--gold':'';
    var initials=cm.community_tag.replace('$','').substring(0,3);
    var color=COMM_COLORS[i%COMM_COLORS.length];
    html+='<div class="lb-row comm-row fade-up" data-comm-idx="'+i+'" onclick="toggleComm('+i+')" style="border-radius:10px 10px 10px 10px;">'
      +'<span class="lb-rank '+rc+'">'+(i+1)+'</span>'
      +'<div class="comm-icon" style="border-color:'+color+'60;background:'+color+'15;color:'+color+';">'+initials+'</div>'
      +'<div class="lb-info"><div class="lb-tag" style="color:'+color+';">'+esc(cm.community_tag)+'</div>'
      +'<div class="lb-meta">'+(cm.member_count||0)+' members</div></div>'

      +'<span class="comm-arrow">√¢‚Äì¬∏</span></div>'
      +'<div class="comm-members" id="commMembers'+i+'"><div style="padding:10px 0;text-align:center;color:var(--text-faint);font-family:var(--font-body);font-size:13px;">Loading members...</div></div>';
  }

function toggleComm(idx){
  var row=document.querySelector('[data-comm-idx="'+idx+'"]');
  var panel=document.getElementById('commMembers'+idx);
  if(row.classList.contains('open')){
    row.classList.remove('open');panel.classList.remove('expanded');return;
  }
  // Close others
  document.querySelectorAll('.comm-row.open').forEach(function(r){r.classList.remove('open');});
  document.querySelectorAll('.comm-members.expanded').forEach(function(p){p.classList.remove('expanded');});
  row.classList.add('open');panel.classList.add('expanded');
  // Load members for this community
  var cm=allCommunities[idx];if(!cm)return;
  var members=allPlayers.filter(function(p){return p.community_tag&&p.community_tag.toUpperCase()===cm.community_tag.toUpperCase();});
  if(!members.length){panel.innerHTML='<div style="padding:12px;text-align:center;color:var(--text-faint);font-family:var(--font-body);font-size:13px;">No members found</div>';return;}
  members.sort(function(a,b){return(b.seasonal_points||0)-(a.seasonal_points||0);});
  var mhtml='';
  members.forEach(function(p){
    var h=HOUSES[p.school_id]||{img:''};
    mhtml+='<a href="/profile.html?player_id='+p.id+'" class="comm-member-row" style="text-decoration:none;" onmouseenter="showPlayerPopup(event,'+JSON.stringify(p).replace(/"/g,'&quot;')+')" onmouseleave="hidePlayerPopup()">'
      +(p.profile_image?'<img src="'+p.profile_image+'" class="comm-member-avatar">':'<div class="comm-member-avatar" style="display:flex;align-items:center;justify-content:center;background:var(--bg-inset);">'+hImg(h.img,14)+'</div>')
      +'<span class="comm-member-name">@'+esc(p.twitter_handle)+'</span>'
      +hImg(h.img,14)
      +'<span class="comm-member-pts">'+p.seasonal_points+' pts</span></a>';
  });
  panel.innerHTML=mhtml;
}

function drawCommChart(communities){
  var cv=document.getElementById('commChart');if(!cv||!communities.length)return;
  // Polarized dopamine chart √¢‚Ç¨‚Äù radial/doughnut for community power share
  var labels=communities.slice(0,8).map(function(c){return c.community_tag;});
  var data=communities.slice(0,8).map(function(c){return c.total_points||0;});
  var colors=communities.slice(0,8).map(function(c,i){return COMM_COLORS[i%COMM_COLORS.length];});
  new Chart(cv,{type:'doughnut',data:{labels:labels,datasets:[{data:data,backgroundColor:colors.map(function(c){return c+'80';}),borderColor:colors,borderWidth:2,hoverBorderWidth:3,hoverOffset:8}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{legend:{position:'right',labels:{color:'#847C98',font:{family:'Press Start 2P',size:7},padding:8,boxWidth:10,boxHeight:10}},
        tooltip:{backgroundColor:'#1a1a2e',borderColor:'#D4A64B44',borderWidth:1,titleFont:{family:'Cinzel',size:12},bodyFont:{family:'JetBrains Mono',size:10},callbacks:{label:function(ctx){var total=ctx.dataset.data.reduce(function(a,b){return a+b;},0);var pct=total>0?((ctx.raw/total)*100).toFixed(1):'0';return ctx.label+': '+ctx.raw+' pts ('+pct+'%)';}}}}}});
}

// √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê LOAD √¢‚Ä¢¬ê√¢‚Ä¢¬ê√¢‚Ä¢¬ê
async function loadLeaderboards(){
  try{
    var r=await Promise.all([
      fetch('/api/leaderboards/players').then(function(r){return r.json();}),
      fetch('/api/leaderboards/schools').then(function(r){return r.json();}),
      fetch('/api/leaderboards/communities').then(function(r){return r.json();})
    ]);
    renderPowerHero(r[2]||[]);loadClashData();renderPlayers(r[0]||[]);renderHouses(r[1]||[]);renderCommunities(r[2]||[]);
    var l=document.getElementById('loadingState');if(l)l.style.display='none';
  }catch(e){
    console.error('Leaderboards error:',e);
    var l=document.getElementById('loadingState');if(l)l.style.display='none';
    document.getElementById('tab-players').innerHTML='<div class="lb-empty">Error loading leaderboards.</div>';
  }
}
loadLeaderboards();
