<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leaderboards | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <script src="/js/game-icons.js"></script>
  <style>
    /* Tokens come from /css/variables-v2.css (Warm Night). Page-specific styles only below.
       Game-icon sizing (.gi / .gi-sm / .gi-md / .gi-lg) lives in /css/components-v2.css. */
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(212,166,75,0.06) 0%,transparent 50%),linear-gradient(180deg,#1a1528 0%,#120e1e 30%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body)}
    a{color:var(--gold);text-decoration:none}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}

    /* Mobile-first base. Desktop bumps width below to fight the
       sparse-strip-on-1440 problem from the post-PR #261 smoke. */
    .main{max-width:500px;margin:0 auto;padding:14px 14px 80px}
    @media (min-width: 768px)  { .main{max-width:680px;padding:14px 20px 80px} }
    @media (min-width: 1100px) { .main{max-width:780px;padding:14px 24px 80px} }

    /* ── HERO BANNER — full-bleed, breaks out of .main padding via negative
       margins. Aspect-ratio locks at the source image's 2.36:1 so we don't
       have to manually size per breakpoint. Bottom gradient fades into the
       page bg so the heading text reads cleanly. */
    .lb-banner{
      position:relative;
      margin:-14px -14px 18px;
      aspect-ratio:236/100;
      max-height:340px;
      overflow:hidden;
      background:#0e0a18;
    }
    @media (min-width: 768px)  { .lb-banner{margin:-14px -20px 18px;border-radius:0 0 16px 16px} }
    @media (min-width: 1100px) { .lb-banner{margin:-14px -24px 18px} }
    .lb-banner__img{
      width:100%;height:100%;object-fit:cover;display:block;
    }
    .lb-banner__overlay{
      position:absolute;inset:0;pointer-events:none;
      background:
        linear-gradient(180deg, rgba(14,10,24,0) 0%, rgba(14,10,24,0.35) 55%, var(--bg-deep) 100%),
        linear-gradient(90deg, rgba(14,10,24,0.25) 0%, transparent 35%, transparent 65%, rgba(14,10,24,0.25) 100%);
    }
    .lb-banner__copy{
      position:absolute;left:0;right:0;bottom:14px;
      text-align:center;padding:0 16px;
    }
    .lb-banner__eyebrow{
      font-family:var(--font-data);font-size:7px;
      color:var(--gold);letter-spacing:3px;
      margin-bottom:6px;
      text-shadow:0 1px 4px rgba(0,0,0,0.7);
    }
    @media (min-width: 768px) { .lb-banner__eyebrow{font-size:9px;letter-spacing:4px} }
    .lb-banner__heading{
      font-family:var(--font-title);font-weight:800;
      font-size:clamp(20px,5vw,38px);
      letter-spacing:clamp(3px,0.6vw,6px);
      color:var(--text-bright);
      text-shadow:0 2px 10px rgba(0,0,0,0.85), 0 0 22px rgba(212,166,75,0.18);
    }

    /* Header */
    .page-header{text-align:center;padding:10px 0 4px}
    .page-title{font-family:var(--font-title);font-size:22px;font-weight:800;color:var(--gold);letter-spacing:3px}
    .page-sub{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);margin-top:4px}

    /* Season progress */
    .season-bar{margin:10px 0 14px;padding:0 4px}
    .season-bar__track{height:4px;border-radius:2px;background:rgba(255,255,255,0.04);overflow:hidden}
    .season-bar__fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--sunset));transition:width 0.8s}
    .season-bar__labels{display:flex;justify-content:space-between;margin-top:4px;font-family:var(--font-mono);font-size:8px;color:var(--text-faint)}

    /* Section label */
    .section-label{display:flex;align-items:center;gap:10px;margin:18px 0 10px}
    /* Gold square accent — paired with an optional thematic ICONS-key
       glyph via section-label__icon. Even when no icon is passed the
       accent bar reads as intentional chrome. */
    .section-label__accent{width:6px;height:14px;background:linear-gradient(180deg,#F8DA72,#9C7B2F);border-radius:2px;box-shadow:0 0 6px rgba(212,166,75,0.4);flex-shrink:0}
    .section-label__icon{color:var(--gold);display:inline-flex;align-items:center}
    .section-label__text{font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
    .section-label__line{flex:1;height:1px;background:linear-gradient(90deg,rgba(212,166,75,0.25),transparent)}

    /* Tabs */
    .tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
    .tab{font-family:var(--font-mono);font-size:8px;font-weight:400;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
    .tab .gi-md{color:currentColor}
    .tab.active{font-weight:700}
    .tab[data-color="gold"].active{color:var(--gold);border-color:rgba(212,166,75,0.25);background:var(--gold-dim)}
    .tab[data-color="sunset"].active{color:var(--sunset);border-color:rgba(232,133,90,0.25);background:rgba(232,133,90,0.1)}
    .tab[data-color="red"].active{color:var(--red);border-color:rgba(232,90,106,0.25);background:rgba(232,90,106,0.1)}
    .tab[data-color="cyan"].active{color:var(--cyan);border-color:rgba(106,200,216,0.25);background:rgba(106,200,216,0.1)}

    /* Podium */
    .podium{display:flex;gap:6px;margin-bottom:16px;align-items:flex-end;position:relative}
    .podium__card{flex:1;text-align:center;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);animation:fadeSlideIn 0.4s ease both;position:relative;overflow:hidden}
    /* #1 — elevated stage feel: warm glow, subtle pulse, larger than siblings */
    .podium__card.first{
      padding:18px 8px 14px;
      border:1px solid rgba(212,166,75,0.45);
      background:linear-gradient(180deg,rgba(212,166,75,0.14) 0%,rgba(212,166,75,0.04) 60%,var(--bg-card) 100%);
      box-shadow:0 0 24px rgba(212,166,75,0.2),inset 0 1px 0 rgba(255,220,130,0.18);
      transform:translateY(-4px);
    }
    .podium__card.second{padding:12px 8px 10px;border-color:rgba(220,220,220,0.18);background:linear-gradient(180deg,rgba(220,220,220,0.06),var(--bg-card))}
    .podium__card.third{padding:12px 8px 10px;border-color:rgba(179,107,67,0.18);background:linear-gradient(180deg,rgba(179,107,67,0.06),var(--bg-card))}
    .podium__medal{margin-bottom:6px;display:flex;justify-content:center}
    .podium__sigil-wrap{display:flex;justify-content:center;margin-bottom:6px}
    .podium__sigil{width:40px;height:40px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))}
    .podium__card.first .podium__sigil{width:52px;height:52px}
    .podium__name{font-family:var(--font-mono);font-size:10px;color:var(--text-bright);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .podium__card.first .podium__name{font-size:11px;color:var(--gold)}
    .podium__pts{font-family:var(--font-data);font-size:9px;color:var(--gold);margin-top:4px}
    .podium__card.first .podium__pts{font-size:12px;text-shadow:0 0 8px rgba(212,166,75,0.4)}
    .podium__label{font-family:var(--font-mono);font-size:8px;color:var(--text-faint);margin-top:2px}

    /* Player row */
    .lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:4px;transition:all 0.15s}
    .lb-row.top3{border-color:rgba(212,166,75,0.2)}
    .lb-row.me{border-color:rgba(106,200,216,0.3);background:rgba(106,200,216,0.04)}
    .lb-row:hover{background:rgba(30,22,42,0.9)}
    /* Density bump on desktop — more gap, taller rows, wider sparkline. */
    @media (min-width: 768px) {
      .lb-row{gap:14px;padding:12px 16px;margin-bottom:6px}
      .lb-row .sparkline{width:110px !important}
    }

    .rank{font-family:var(--font-data);font-size:10px;min-width:30px;text-align:center;color:var(--text-muted)}

    /* CSS-drawn rank badges for top 3 — replaces 🥇🥈🥉 system emoji.
       Same shape across all OS, with intentional gradient/glow per tier. */
    .rank-badge{
      width:28px;height:28px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-family:var(--font-data);font-size:11px;font-weight:700;
      color:var(--bg-deep);letter-spacing:0;
      border:1.5px solid;
      flex-shrink:0;
    }
    .rank-badge--1{
      background:linear-gradient(135deg,#F8DA72 0%,#D4A64B 50%,#9C7B2F 100%);
      border-color:#FFE38A;
      box-shadow:0 0 12px rgba(212,166,75,0.55), inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .rank-badge--2{
      background:linear-gradient(135deg,#E8E8E8 0%,#B8B8B8 50%,#7E7E7E 100%);
      border-color:#F0F0F0;
      box-shadow:0 0 8px rgba(220,220,220,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .rank-badge--3{
      background:linear-gradient(135deg,#E0976C 0%,#B36B43 50%,#7B442A 100%);
      border-color:#EBA77E;
      box-shadow:0 0 8px rgba(179,107,67,0.4), inset 0 1px 0 rgba(255,255,255,0.25);
    }

    /* Rank-delta arrows — visible movement vs yesterday's leaderboard.
       Positive (climbed) = green, negative (fell) = red, zero = muted dash.
       Tucked under the rank/medal so the position number stays the
       primary read; delta is ambient context. */
    .rank-cell{display:flex;flex-direction:column;align-items:center;min-width:30px;gap:1px}
    .rank-delta{font-family:var(--font-data);font-size:6px;letter-spacing:0.5px;line-height:1}
    .rank-delta--up{color:var(--green)}
    .rank-delta--down{color:var(--red)}
    .rank-delta--steady{color:var(--text-faint)}

    /* Streak fire — appears next to handle when streak >= 3.
       Inline with the name row so it reads as a status badge, not a separate UI. */
    .streak-fire{font-family:var(--font-data);font-size:9px;color:#FF8C00;letter-spacing:0.5px;display:inline-flex;align-items:center;gap:3px;filter:drop-shadow(0 0 4px rgba(255,140,0,0.4))}
    .streak-fire .gi-sm{color:#FF8C00}

    /* Gap-to-next — appears on YOU pin only. "23 pts behind @leader_handle"
       or "🏆 #1!" when at the top. Sub-line of the YOU pin. */
    .gap-to-next{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);font-style:italic;margin-top:1px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
    .gap-to-next .gi-sm{color:var(--gold)}
    .gap-to-next strong{color:var(--cyan);font-style:normal;font-weight:600}

    /* Lone-wolf nudge — sub-line on YOU pin for guild-less players. */
    .lonewolf-nudge{font-family:var(--font-mono);font-size:9px;margin-top:2px}
    .lonewolf-nudge a{color:#FF8C00;text-decoration:none;border-bottom:1px dashed rgba(255,140,0,0.4);transition:border-color 0.15s}
    .lonewolf-nudge a:hover{border-bottom-color:#FF8C00}

    /* Per-house rivalry sub-line on YOU pin. Surfaces guild context even
       when personal rank is low — "your tribe is winning" framing. */
    .house-rivalry{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);margin-top:2px}
    .house-rivalry strong{font-weight:600;color:var(--text-bright)}

    /* Share-to-X button on the YOU pin. Tucked under the score so the row
       reads as a single shareable unit. Tap surface ≥28px for thumbs;
       opens twitter.com/intent/tweet in a new tab. */
    .me-share{
      display:inline-flex;align-items:center;justify-content:center;
      width:28px;height:28px;
      background:rgba(212,166,75,0.08);
      border:1px solid rgba(212,166,75,0.25);
      border-radius:6px;
      color:var(--gold);
      cursor:pointer;
      transition:all 0.15s;
      padding:0;
    }
    .me-share:hover{background:rgba(212,166,75,0.18);border-color:rgba(212,166,75,0.5);transform:translateY(-1px)}
    .me-share:active{transform:translateY(0)}

    /* ── CLIMBER SPOTLIGHT — top mover today, hero card above the standings.
       Green-tinted to match the rank-delta arrow / sparkline color story.
       Renders only when the server returns a climber (someone climbed >0). */
    .climber-card{
      display:flex;align-items:center;gap:14px;
      padding:12px 14px;border-radius:12px;
      background:linear-gradient(135deg,rgba(106,205,138,0.16),rgba(106,205,138,0.03));
      border:1px solid rgba(106,205,138,0.35);
      box-shadow:0 0 18px rgba(106,205,138,0.12);
      margin-bottom:14px;
      animation:fadeSlideIn 0.35s ease both;
      text-decoration:none;color:inherit;
    }
    .climber-card:hover{background:linear-gradient(135deg,rgba(106,205,138,0.22),rgba(106,205,138,0.05))}
    .climber-card__label{font-family:var(--font-data);font-size:6px;color:#6acd8a;letter-spacing:2px;margin-bottom:2px;display:flex;align-items:center;gap:4px}
    .climber-card__name{font-family:var(--font-mono);font-size:13px;color:var(--text-bright)}
    .climber-card__delta{font-family:var(--font-data);font-size:14px;color:#6acd8a;text-shadow:0 0 8px rgba(106,205,138,0.4);flex-shrink:0;margin-left:auto}
    .climber-card__delta-label{font-family:var(--font-data);font-size:5px;color:#6acd8a;opacity:0.7;letter-spacing:1px;margin-top:2px;text-align:right}

    .lb-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative}
    .lb-avatar__sigil{width:100%;height:100%;object-fit:contain;padding:3px;filter:drop-shadow(0 1px 1px rgba(0,0,0,0.4))}
    .lb-avatar__initial{font-family:var(--font-title);font-size:14px;font-weight:700;color:var(--text-bright);text-shadow:0 1px 0 rgba(0,0,0,0.3)}
    .lb-info{flex:1;min-width:0}
    .lb-name-row{display:flex;align-items:center;gap:6px}
    .lb-name{font-family:var(--font-mono);font-size:11px;color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-guild{font-family:var(--font-mono);font-size:8px;color:var(--text-faint);background:rgba(255,255,255,0.04);padding:1px 5px;border-radius:3px}
    .lb-house{font-family:var(--font-mono);font-size:8px;margin-top:2px}
    .lb-lvl{font-family:var(--font-data);font-size:7px;color:var(--gold);background:rgba(212,166,75,0.12);padding:1px 5px;border-radius:3px;border:1px solid rgba(212,166,75,0.2)}
    .lb-score{text-align:right;min-width:55px}
    .lb-score__val{font-family:var(--font-data);font-size:9px;color:var(--gold)}
    .lb-score__label{font-family:var(--font-mono);font-size:8px;color:var(--text-faint)}

    /* Sparkline canvas */
    .sparkline{display:block}

    /* ── HOUSE WAR BAR — stacked horizontal showing each house's % share
       of total season points. Single-glance "who's winning the season". */
    .house-war{margin-bottom:14px}
    .house-war__bar{display:flex;height:14px;border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);background:rgba(0,0,0,0.3);box-shadow:inset 0 1px 2px rgba(0,0,0,0.4)}
    .house-war__seg{transition:flex 0.6s ease;min-width:1px}
    .house-war__seg:hover{filter:brightness(1.2)}
    .house-war__legend{display:flex;flex-wrap:wrap;gap:10px 14px;margin-top:8px;justify-content:center;font-family:var(--font-mono);font-size:9px;color:var(--text-muted)}
    .house-war__legend-item{display:inline-flex;align-items:center;gap:5px}
    .house-war__legend-item strong{color:var(--text-bright);font-weight:600}
    .house-war__dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* ── HOUSE PODIUM — top-3 elevated cards, sigil-forward. #1 gets the
       gold halo treatment that the player podium uses. */
    .house-podium{display:flex;gap:6px;margin-bottom:16px;align-items:flex-end}
    .house-podium__card{flex:1;text-align:center;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);padding:14px 8px 10px;animation:fadeSlideIn 0.4s ease both;position:relative;overflow:hidden}
    .house-podium__card.first{
      padding:18px 8px 14px;
      border:1px solid rgba(212,166,75,0.45);
      background:linear-gradient(180deg,rgba(212,166,75,0.14) 0%,rgba(212,166,75,0.04) 60%,var(--bg-card) 100%);
      box-shadow:0 0 24px rgba(212,166,75,0.2),inset 0 1px 0 rgba(255,220,130,0.18);
      transform:translateY(-4px);
    }
    .house-podium__rank{display:flex;justify-content:center;margin-bottom:6px}
    .house-podium__sigil-wrap{display:flex;justify-content:center;margin-bottom:6px}
    .house-podium__sigil{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))}
    .house-podium__card.first .house-podium__sigil{width:60px;height:60px}
    .house-podium__name{font-family:var(--font-title);font-size:11px;font-weight:700;letter-spacing:1px}
    .house-podium__card.first .house-podium__name{font-size:13px}
    .house-podium__pts{font-family:var(--font-data);font-size:11px;color:var(--gold);margin-top:4px}
    .house-podium__card.first .house-podium__pts{font-size:13px;text-shadow:0 0 8px rgba(212,166,75,0.4)}
    .house-podium__meta{font-family:var(--font-mono);font-size:8px;color:var(--text-faint);margin-top:2px}

    /* ── HOUSE MOMENTUM CHIP — green pill showing today's points delta.
       Inline variant tucks into the row's name line; podium variant sits
       below the metadata as its own line. */
    .house-momentum{display:inline-flex;align-items:center;font-family:var(--font-data);font-size:7px;letter-spacing:1px;color:#6acd8a;background:rgba(106,205,138,0.12);border:1px solid rgba(106,205,138,0.25);border-radius:4px;padding:2px 6px;margin-top:6px}
    .house-momentum--inline{margin-top:0;margin-left:auto;flex-shrink:0}

    /* House card */
    .house-card{padding:14px 16px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);border-left:3px solid;margin-bottom:6px}
    .house-card.top3{border-color:rgba(212,166,75,0.2)}
    .house-card__inner{display:flex;align-items:center;gap:12px}
    .house-card__icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .house-card__sigil{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))}
    .house-card__body{flex:1}
    .house-card__namerow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .house-card__name{font-family:var(--font-title);font-size:15px;font-weight:700}
    .house-card__role{font-family:var(--font-mono);font-size:8px;color:var(--text-faint)}
    .house-card__bar{height:8px;border-radius:4px;background:rgba(255,255,255,0.04);overflow:hidden;margin-top:6px}
    .house-card__fill{height:100%;border-radius:4px;transition:width 0.8s ease}
    .house-card__meta{display:flex;gap:12px;margin-top:6px;font-family:var(--font-mono);font-size:9px;color:var(--text-muted)}
    .house-card__score{text-align:right}
    .house-card__pts{font-family:var(--font-data);font-size:10px;color:var(--gold)}

    /* Chart container */
    .chart-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;margin-bottom:14px}
    .chart-legend{display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap}
    .chart-legend__item{display:flex;align-items:center;gap:4px}
    .chart-legend__dot{width:8px;height:3px;border-radius:1px}
    .chart-legend__name{font-family:var(--font-mono);font-size:8px;color:var(--text-faint)}

    /* Clash card */
    .clash-card{padding:14px 16px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:8px}
    .clash-card.live{border-color:rgba(106,200,216,0.3);background:rgba(106,200,216,0.04)}
    .clash-live-badge{display:flex;align-items:center;gap:6px;margin-bottom:10px}
    .clash-live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    .clash-live-text{font-family:var(--font-mono);font-size:9px;color:var(--green);font-weight:700;letter-spacing:1px}
    .clash-inner{display:flex;align-items:center;gap:8px}
    .clash-guild{flex:1;text-align:center}
    .clash-guild__name{font-family:var(--font-title);font-size:12px;font-weight:700}

    .clash-guild__score{font-family:var(--font-data);font-size:14px;margin-top:6px}
    .clash-guild__score.live{font-size:16px;color:var(--cyan)}

    .clash-vs{font-family:var(--font-title);font-size:11px;color:var(--text-faint);width:40px;text-align:center;border-radius:8px;padding:4px 0;display:flex;align-items:center;justify-content:center}

    .clash-week{text-align:center;margin-top:8px;font-family:var(--font-mono);font-size:8px;color:var(--text-faint)}

    /* Standings table */
    .standings{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:16px}
    .standings__head{display:grid;grid-template-columns:1fr 36px 36px 50px;padding:8px 12px;background:var(--gold-dim);font-family:var(--font-mono);font-size:8px;color:var(--gold);font-weight:700;letter-spacing:1px}
    .standings__row{display:grid;grid-template-columns:1fr 36px 36px 50px;align-items:center;padding:10px 12px;border-top:1px solid var(--border)}

    .prize-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:4px}

    .clash-prizes__title{font-family:var(--font-title);font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:8px}
    .clash-prizes__item{display:flex;align-items:center;gap:8px;margin-bottom:6px}

    /* Info box */
    .info-box{padding:10px 12px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:12px;font-family:var(--font-mono);font-size:9px;color:var(--text-muted);text-align:center}

      font-family:var(--font-body);font-size:14px;

    /* Loading */
    .loading{text-align:center;padding:60px 20px}

    .admin-bar{background:rgba(232,90,106,0.08);border:1px solid rgba(232,90,106,0.2);border-radius:10px;padding:12px;margin-bottom:16px}

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

    /* Sub-tabs */
    .sub-tabs{display:flex;gap:4px;margin-bottom:12px}
    .sub-tab{font-family:var(--font-mono);font-size:8px;padding:6px 12px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:all 0.15s}

<script>
// ═══════════════════════════════════════
// HOUSES DATA
// ═══════════════════════════════════════
// Game-icons registry + gameIcon() helper now live in /js/game-icons.js
// (loaded via script tag in <head>). To add an icon, edit that file.
//
// Sigil paths follow `reference_house_sigils.md` — Ashenvale uses capital A,
// the rest are lowercase. icon: kept as fallback only (used if the <img>
// 404s, e.g. during local dev with stale assets).
var HOUSES = {
  1:{name:'Smoulders',  color:'#E03C31',icon:'🔥',role:'Glass Cannon',sigil:'/assets/images/houses/House-smoulders.png'},
  2:{name:'Darktide',   color:'#00B4D8',icon:'🌊',role:'Thief',       sigil:'/assets/images/houses/House-darktide.png'},
  3:{name:'Stonebark',  color:'#5CB338',icon:'🌿',role:'Wall',        sigil:'/assets/images/houses/House-stonebark.png'},
  4:{name:'Ashenvale',  color:'#B0C4DE',icon:'💨',role:'Rogue',       sigil:'/assets/images/houses/House-Ashenvale.png'},
  5:{name:'Stormrage',  color:'#FFC800',icon:'⚡',role:'Glass Cannon',sigil:'/assets/images/houses/House-stormrage.png'},
  6:{name:'Nighthollow',color:'#7B2D8E',icon:'🌙',role:'Disruptor',   sigil:'/assets/images/houses/House-nighthollow.png'},
  7:{name:'Dawnbringer',color:'#FF8C00',icon:'☀️',role:'Healer',      sigil:'/assets/images/houses/House-dawnbringer.png'},
  8:{name:'Manastorm',  color:'#5B8FE0',icon:'🔮',role:'Controller',  sigil:'/assets/images/houses/House-manastorm.png'},
  9:{name:'Plaguemire', color:'#E84393',icon:'☠️',role:'DOT',         sigil:'/assets/images/houses/House-plaguemire.png'}
};

// `icon` is now an ICONS key (rendered by gameIcon below), `place` stays as
// a small text label. The legacy `🏠` place value is kept as text since the
// position column is just a short label, not an icon target.
var SEASON_PRIZES = [
  {place:'#1',    prize:'Design a permanent spell card',         icon:'sparkles'},
  {place:'#1-3',  prize:'Named in Season 2 storyline',           icon:'laurels'},
  {place:'#1-5',  prize:'Champion card frame + First Nine badge',icon:'crown'},
  {place:'#1-10', prize:'Council membership + Nines priority',   icon:'flag'},
  {place:'House', prize:'Winning house gets exclusive seasonal spell', icon:'swords'}
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
var playerId = null;
var currentTab = 'season';
// Time-window sub-tab on the Season tab. 'season' = sort by seasonal_points
// (current behavior); 'week' = sum point_log over last 7 days from p.history;
// 'today' = sort by points_today. All client-side re-sort using existing
// server data — no extra fetches required.
var seasonWindow = 'season';
var clashView = 'standings';
var isAdmin = false;
var data = { players:[], houses:[], duels:[], clashes:{ matches:[], standings:[] } };

// Score function for the active time-window. Used by getRankedPlayers()
// for both the rendered list and the YOU pin's gap calculation.
function getWindowScore(p, win) {
  if (win === 'today') return p.points_today || 0;
  if (win === 'week') {
    if (!p.history || p.history.length < 2) return 0;
    return (p.history[p.history.length - 1] || 0) - (p.history[0] || 0);
  }
  return p.seasonal_points || 0;
}
function getRankedPlayers(list, win) {
  if (win === 'season') return list; // already in this order from server
  return list.slice().sort(function(a, b) {
    return getWindowScore(b, win) - getWindowScore(a, win);
  });
}
window.switchSeasonWindow = function(win) {
  if (seasonWindow === win) return;
  seasonWindow = win;
  render();
};

function getPlayerId() {
  var p = new URLSearchParams(window.location.search);
  var f = p.get('player_id');
  if (f) { localStorage.setItem('player_id', f); return f; }
  return localStorage.getItem('player_id');
}

function checkAdmin() {
  var p = new URLSearchParams(window.location.search);
  return !!p.get('admin_key');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════
// SPARKLINE
// ═══════════════════════════════════════
function drawSparkline(canvasId, dataPoints, color) {
  var canvas = document.getElementById(canvasId);
  if (!canvas || !dataPoints || !dataPoints.length) return;
  var ctx = canvas.getContext('2d');
  var w = 70, h = 22;
  var dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  var min = Math.min.apply(null, dataPoints);
  var max = Math.max.apply(null, dataPoints);
  var range = max - min || 1;
  var step = w / (dataPoints.length - 1);

  // Fill
  var grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '40');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.moveTo(0, h);
  dataPoints.forEach(function(v, i) {
    var x = i * step;
    var y = h - ((v - min) / range) * (h - 4) - 2;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  dataPoints.forEach(function(v, i) {
    var x = i * step;
    var y = h - ((v - min) / range) * (h - 4) - 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Dot
  var lastX = (dataPoints.length - 1) * step;
  var lastY = h - ((dataPoints[dataPoints.length - 1] - min) / range) * (h - 4) - 2;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 2, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

// ═══════════════════════════════════════
// HOUSE PROGRESSION CHART
// ═══════════════════════════════════════
function drawHouseChart(canvasId, houseData) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var w = 440, h = 140;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  var pad = { l: 5, r: 5, t: 10, b: 20 };
  var cw = w - pad.l - pad.r;
  var ch = h - pad.t - pad.b;

  // If we have real data, use it. Otherwise generate mock
  var houseIds = Object.keys(houseData);
  if (houseIds.length === 0) {
    // Generate mock progression for top 5 houses
    var topHouses = data.houses.slice(0, 5);
    topHouses.forEach(function(hd) {
      houseData[hd.school_id] = [];
      var sum = 0;
      for (var d = 0; d < 14; d++) {
        sum += Math.round(50 + Math.random() * 150 + (hd.total_points / 50));
        houseData[hd.school_id].push(sum);
      }
    });
    houseIds = Object.keys(houseData);
  }

  if (houseIds.length === 0) return;

  var maxVal = 0;
  houseIds.forEach(function(hid) {
    var mx = Math.max.apply(null, houseData[hid]);
    if (mx > maxVal) maxVal = mx;
  });

  houseIds.forEach(function(hid) {
    var house = HOUSES[hid];
    if (!house) return;
    var pts = houseData[hid];
    var step = cw / (pts.length - 1);

    ctx.beginPath();
    pts.forEach(function(v, i) {
      var x = pad.l + i * step;
      var y = pad.t + ch - (v / maxVal) * ch;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = house.color + 'aa';
    ctx.lineWidth = 2;
    ctx.stroke();

    // End label
    var lastY = pad.t + ch - (pts[pts.length - 1] / maxVal) * ch;
    ctx.fillStyle = house.color;
    ctx.font = 'bold 9px JetBrains Mono, monospace';
    ctx.fillText(house.icon, pad.l + (pts.length - 1) * step + 4, lastY + 3);
  });

  // X labels
  ctx.fillStyle = '#6B5E50';
  ctx.font = '8px JetBrains Mono, monospace';
  var days = houseData[houseIds[0]] ? houseData[houseIds[0]].length : 14;
  var step = cw / (days - 1);
  for (var d = 0; d < days; d += 2) {
    ctx.fillText('D' + (d + 1), pad.l + d * step - 5, h - 4);
  }
}

// ═══════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════
async function loadAll() {
  playerId = getPlayerId();
  isAdmin = checkAdmin();

  // Per-endpoint failure tracking. Each .catch bumps the counter so we can
  // tell the difference between "no data yet" (200 with empty array) and
  // "network died" (all four endpoints threw). Empty-board copy stays for
  // partial failures; error state surfaces only when everything dies.
  var _loadFailures = 0;
  function catchAndFlag(fallback) {
    return function() { _loadFailures++; return fallback; };
  }

  try {
    var [pR, hR, dR, cR] = await Promise.all([
      fetch('/api/leaderboards/players' + (playerId ? '?me=' + encodeURIComponent(playerId) : '')).then(function(r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); }).catch(catchAndFlag([])),
      fetch('/api/leaderboards/schools').then(function(r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); }).catch(catchAndFlag([])),
      fetch('/api/leaderboards/duels').then(function(r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); }).catch(catchAndFlag([])),
      fetch('/api/leaderboards/clashes').then(function(r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); }).catch(catchAndFlag({ matches:[], standings:[] }))
    ]);

    if (_loadFailures === 4) {
      // Total network failure — surface a visible error state instead of
      // letting the page render four "no data yet" tabs that lie about
      // the underlying problem.
      var content = document.getElementById('content') || document.body;
      content.innerHTML =
        '<div style="text-align:center;padding:80px 20px;font-family:var(--font-body);">'
        + '<div style="font-size:48px;opacity:0.4;margin-bottom:14px;">&#9888;</div>'
        + '<h2 style="font-family:var(--font-title);font-size:20px;color:var(--text-bright);margin-bottom:8px;">leaderboards timed out</h2>'
        + '<p style="font-family:var(--font-mono);font-size:13px;color:var(--text-muted);font-style:italic;margin-bottom:18px;">"the void is being weird. try again."<br>— nerm</p>'
        + '<button onclick="window.location.reload()" style="font-family:var(--font-data);font-size:9px;padding:10px 22px;border-radius:8px;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);cursor:pointer;letter-spacing:1.5px;">TRY AGAIN</button>'
        + '</div>';
      return;
    }

    data.players = Array.isArray(pR) ? pR : pR.players || [];
    data.climber = pR && !Array.isArray(pR) ? pR.climber || null : null;
    data.me_row = pR && !Array.isArray(pR) ? pR.me_row || null : null;
    data.houses = Array.isArray(hR) ? hR : hR.schools || hR.houses || [];
    data.duels = Array.isArray(dR) ? dR : dR.players || [];
    data.clashes = cR && cR.matches ? cR : { matches: [], standings: [] };

    // V5: Fetch levels for all players and merge
    try {
      var playerIds = data.players.map(function(p){ return p.id; });
      var levelPromises = playerIds.slice(0,50).map(function(id){
        return fetch('/api/levels/'+id).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
      });
      var levels = await Promise.all(levelPromises);
      var levelMap = {};
      levels.forEach(function(l){ if(l && l.player_id) levelMap[l.player_id]=l; });
      data.players.forEach(function(p){ if(levelMap[p.id]) p._level=levelMap[p.id].level; });
      data.duels.forEach(function(p){ if(levelMap[p.id]) p._level=levelMap[p.id].level; });
    } catch(e){ /* levels optional */ }
  } catch (e) {
    console.error('Failed to load leaderboard data:', e);
  }

  render();
}

// ═══════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════
function medal(rank) {
  if (rank === 1) return '<span class="rank-badge rank-badge--1">1</span>';
  if (rank === 2) return '<span class="rank-badge rank-badge--2">2</span>';
  if (rank === 3) return '<span class="rank-badge rank-badge--3">3</span>';
  return '<span class="rank">#' + rank + '</span>';
}

// Avatar — house sigil PNG over house-colored backdrop. Falls back to the
// player's first-letter initial in white over the same color when the sigil
// fails to load (defensive — Ashenvale's case-sensitive filename has bitten
// us elsewhere) or when no school_id is set.
function avatar(p, h) {
  var bg = h.color + '20';
  var border = h.color + '40';
  var initial = (p && p.twitter_handle) ? esc(p.twitter_handle.charAt(0).toUpperCase()) : '?';
  var sigil = h.sigil
    ? '<img class="lb-avatar__sigil" src="' + h.sigil + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">'
    : '';
  var initialBlock = '<span class="lb-avatar__initial" style="' + (h.sigil ? 'display:none;position:absolute;inset:0;align-items:center;justify-content:center;' : 'display:flex;align-items:center;justify-content:center;width:100%;height:100%;') + '">' + initial + '</span>';
  return '<div class="lb-avatar" style="background:' + bg + ';border:2px solid ' + border + '">' + sigil + initialBlock + '</div>';
}

// Rank-delta arrow — paired with medal() inside .rank-cell. p.rank_change
// comes from the server: positive = climbed since yesterday, negative = fell,
// zero = steady. New players (no prev rank) come in as huge climbers, which
// is intentional — they should feel like they're entering the chart.
function rankDelta(p) {
  if (p == null || typeof p.rank_change !== 'number') return '';
  var c = p.rank_change;
  if (c > 0) return '<span class="rank-delta rank-delta--up">▲' + c + '</span>';
  if (c < 0) return '<span class="rank-delta rank-delta--down">▼' + Math.abs(c) + '</span>';
  return '<span class="rank-delta rank-delta--steady">—</span>';
}

// Streak fire — appears in the name row when streak >= 3. Day count makes the
// visible momentum tangible (a 7-day streak reads as a real commitment).
function streakBadge(p) {
  if (!p || !p.streak || p.streak < 3) return '';
  return '<span class="streak-fire">' + gameIcon('fire','gi-sm') + p.streak + '</span>';
}

// Find current player in a ranked list. Returns {player, rank} or null.
// Used by mePin() to surface a sticky "YOU" row regardless of scroll depth.
function findMe(list) {
  if (!playerId || !list || !list.length) return null;
  for (var i = 0; i < list.length; i++) {
    if (list[i] && list[i].id == playerId) {
      return { player: list[i], rank: i + 1 };
    }
  }
  return null;
}

// Like findMe but with a fallback: when the player isn't in the visible
// top-N, the server returns their row separately as `me_row` (rank
// computed against the full ladder). Lets a rank-87 player still see
// their YOU pin.
function findMeWithFallback(list, meRow) {
  var hit = findMe(list);
  if (hit) return hit;
  if (meRow && meRow.id) return { player: meRow, rank: meRow.rank, outOfList: true };
  return null;
}

// Share button HTML for the YOU pin. Composes a twitter.com/intent URL
// with rank-aware character-voice copy and links to the player's public
// profile so the embed pulls their OG card. Returns empty when the player
// has no handle (defensive — shouldn't happen in practice).
function meShareButton(p, rank, win) {
  if (!p || !p.twitter_handle) return '';
  var handle = String(p.twitter_handle).toLowerCase();
  var url = 'https://9lv.net/p/' + encodeURIComponent(handle);
  var text;
  if (win === 'today') {
    text = rank === 1 ? "Top of the daily on @9LVNetwork 🔥"
         : rank <= 3 ? "Top 3 today on @9LVNetwork ⚡"
         : "Hunting daily glory on @9LVNetwork — currently #" + rank;
  } else if (win === 'week') {
    text = rank <= 3 ? "Top 3 this week on @9LVNetwork 🔥"
         : rank <= 10 ? "Top 10 weekly on @9LVNetwork ⚔️"
         : "Climbing this week on @9LVNetwork — currently #" + rank;
  } else {
    text = rank === 1 ? "I'm leading Season 1 on @9LVNetwork 🏆"
         : rank <= 10 ? "Climbed to #" + rank + " in Season 1 on @9LVNetwork ⚔️"
         : "Currently #" + rank + " in Season 1, climbing 🐾 @9LVNetwork";
  }
  var intent = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(url);
  // Inline onclick: stopPropagation + preventDefault so the button doesn't
  // also navigate the wrapping <a>'s href to /p/<handle>. window.open new tab.
  return '<button class="me-share" onclick="event.stopPropagation();event.preventDefault();window.open(\'' + intent + '\',\'_blank\',\'noopener\');return false" title="Share to X" aria-label="Share to X">'
    + '<svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817-5.97 6.817H1.67l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
    + '</button>';
}

// House rivalry sub-line for the YOU pin. Renders "Your house <X> is #N
// in the war" using the houses leaderboard. Hidden when the player has
// no school_id or houses data isn't loaded yet.
function houseRivalryLine(p, houses) {
  if (!p || !p.school_id || !houses || !houses.length) return '';
  var sorted = houses.slice().sort(function(a, b) { return (b.total_points||0) - (a.total_points||0); });
  var idx = -1;
  for (var i = 0; i < sorted.length; i++) {
    if (sorted[i].school_id == p.school_id) { idx = i; break; }
  }
  if (idx < 0) return '';
  var h = HOUSES[p.school_id] || { name: '?', color: 'var(--gold)' };
  return '<div class="house-rivalry">Your house <strong style="color:' + h.color + '">' + h.name + '</strong> is <strong>#' + (idx + 1) + '</strong> in the war</div>';
}

// Sticky "YOU" pin — appears above rankings when player exists in the
// list. Stays visible as the user scrolls so they always know where they
// stand. Tappable like any row to land on /p/<own-handle>. Per
// docs/ux-plan-mobile.md polish recommendation.
function mePin(found, opts) {
  if (!found) return '';
  opts = opts || {};
  var p = found.player;
  var rank = found.rank;
  var h = HOUSES[p.school_id] || { name:'?', color:'#888', icon:'🐱' };
  var handle = p.twitter_handle ? String(p.twitter_handle).toLowerCase() : null;
  var hrefAttr = handle ? ' href="/p/' + encodeURIComponent(handle) + '"' : '';
  var win = opts.window || 'season';
  var scoreVal, scoreLabel;
  if (opts.showDuels) {
    scoreVal = (p.duel_wins||0) + 'W';
    scoreLabel = (p.duel_losses||0) + 'L';
  } else if (win === 'today') {
    scoreVal = (p.points_today||0).toLocaleString();
    scoreLabel = 'today';
  } else if (win === 'week') {
    var wk = (p.history && p.history.length >= 2) ? (p.history[p.history.length - 1] - p.history[0]) : 0;
    scoreVal = wk.toLocaleString();
    scoreLabel = 'this wk';
  } else {
    scoreVal = (p.seasonal_points||0).toLocaleString();
    scoreLabel = 'pts';
  }

  // Gap-to-next-rank — a concrete number the player is chasing. At #1 we
  // flip the framing to celebrate and call out the gap to #2 (defending the
  // crown). Gap math uses the active window's score so the "behind by X"
  // copy reflects what's being viewed (TODAY view → today's points gap, etc).
  // Tied detection — when the player ahead has the same score, frame as
  // "tied at #N with @them" instead of "0 pts behind."
  // Day-1 — when the player has zero score in the active window, framing
  // flips from gap-chasing to onboarding ("Earn your first points to climb").
  var gapHtml = '';
  var pScore = win === 'today' ? (p.points_today||0)
              : win === 'week' ? ((p.history && p.history.length >= 2) ? (p.history[p.history.length-1] - p.history[0]) : 0)
              : (p.seasonal_points||0);
  if (!opts.showDuels && opts.fullList && opts.fullList.length) {
    if (pScore === 0) {
      // Day-1 / dormant player. Identical message regardless of window.
      var firstPlace = opts.fullList[0];
      var seal = firstPlace ? Math.max(1, Math.round((firstPlace.seasonal_points || 100) / 50)) : 100;
      gapHtml = '<div class="gap-to-next">' + gameIcon('sparkles','gi-sm') + ' Earn your first <strong>' + seal + '</strong> pts to break the seal</div>';
    } else if (rank === 1) {
      var second = opts.fullList[1];
      if (second) {
        var sScore = win === 'today' ? (second.points_today||0)
                    : win === 'week' ? ((second.history && second.history.length >= 2) ? (second.history[second.history.length-1] - second.history[0]) : 0)
                    : (second.seasonal_points||0);
        var lead = pScore - sScore;
        gapHtml = '<div class="gap-to-next">' + gameIcon('laurels','gi-sm') + ' #1 — leading by <strong>' + lead.toLocaleString() + '</strong> pts</div>';
      } else {
        gapHtml = '<div class="gap-to-next">' + gameIcon('laurels','gi-sm') + ' #1!</div>';
      }
    } else {
      var ahead = opts.fullList[rank - 2];
      if (ahead) {
        var aScore = win === 'today' ? (ahead.points_today||0)
                    : win === 'week' ? ((ahead.history && ahead.history.length >= 2) ? (ahead.history[ahead.history.length-1] - ahead.history[0]) : 0)
                    : (ahead.seasonal_points||0);
        var diff = aScore - pScore;
        if (diff === 0) {
          gapHtml = '<div class="gap-to-next">Tied at #' + rank + ' with @<strong>' + esc(ahead.twitter_handle || '???') + '</strong> — break the tie</div>';
        } else {
          gapHtml = '<div class="gap-to-next"><strong>' + diff.toLocaleString() + '</strong> pts behind @' + esc(ahead.twitter_handle || '???') + '</div>';
        }
      }
    }
  }

  return '<a' + hrefAttr + ' class="lb-me-pin" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px;position:sticky;top:calc(var(--nav-height,76px) + 8px);z-index:50;padding:10px 12px;border-radius:10px;background:linear-gradient(180deg,rgba(106,200,216,0.18),rgba(106,200,216,0.06));border:1px solid rgba(106,200,216,0.45);box-shadow:0 4px 16px rgba(0,0,0,0.35),0 0 16px rgba(106,200,216,0.15);backdrop-filter:blur(8px);margin-bottom:10px;">'
    + '<div class="rank-cell" style="min-width:36px;">'
    + '<span style="font-family:var(--font-data);font-size:6px;color:var(--cyan);letter-spacing:1.5px;">YOU</span>'
    + '<span style="font-family:var(--font-data);font-size:11px;color:var(--text-bright);">#' + rank + '</span>'
    + rankDelta(p)
    + '</div>'
    + avatar(p, h)
    + '<div class="lb-info" style="flex:1;min-width:0;">'
    + '<div class="lb-name-row"><span class="lb-name">@' + esc(p.twitter_handle || '???') + '</span>'
    + streakBadge(p)
    + (p._level ? '<span class="lb-lvl">Lv.' + p._level + '</span>' : '')
    + (p.guild_tag ? '<span class="lb-guild">' + esc(p.guild_tag) + '</span>' : '')
    + '</div>'
    + '<div class="lb-house" style="color:' + h.color + ';font-size:10px;">' + h.name + '</div>'
    + gapHtml
    // Per-house rivalry — gives guild-affiliated players competitive
    // context even when their personal rank is low. Skipped on Duels tab.
    + (!opts.showDuels ? houseRivalryLine(p, opts.houses) : '')
    // Lone-wolf nudge — players without a guild get an actionable prompt
    // instead of empty space. Tappable link to the dashboard guild input.
    + ((!p.guild_tag || p.guild_tag === 'lone_wolf')
        ? '<div class="lonewolf-nudge"><a href="/dashboard.html#guild" onclick="event.stopPropagation()">Find a guild → shared bonuses</a></div>'
        : '')
    + '</div>'
    + '<div class="lb-score" style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;">'
    + '<div>'
    +   '<div class="lb-score__val" style="font-size:13px;color:var(--cyan);">' + scoreVal + '</div>'
    +   '<div class="lb-score__label" style="font-size:7px;">' + scoreLabel + '</div>'
    + '</div>'
    // Share button skipped on Duels tab — copy strings are season/today/week
    // flavored. Duels-specific share copy can land in a follow-up.
    + (!opts.showDuels ? meShareButton(p, rank, win) : '')
    + '</div>'
    + '</a>';
}

function playerRow(p, rank, opts) {
  opts = opts || {};
  var h = HOUSES[p.school_id] || { name:'?', color:'#888', icon:'🐱' };
  var isMe = playerId && (p.id == playerId);
  var delay = (rank - 1) * 0.03;
  var sparkId = 'spark_' + (opts.prefix || '') + p.id;
  var win = opts.window || 'season';

  var scoreHtml = '';
  if (opts.showDuels) {
    var wr = Math.round(((p.duel_wins||0) / ((p.duel_wins||0) + (p.duel_losses||0) || 1)) * 100);
    scoreHtml = '<div class="lb-score"><div class="lb-score__val" style="color:var(--green)">' + (p.duel_wins||0) + 'W</div><div style="font-family:var(--font-mono);font-size:8px;color:var(--red)">' + (p.duel_losses||0) + 'L <span style="color:var(--text-faint)">(' + wr + '%)</span></div></div>';
  } else if (win === 'today') {
    scoreHtml = '<div class="lb-score"><div class="lb-score__val">' + (p.points_today||0).toLocaleString() + '</div><div class="lb-score__label">today</div></div>';
  } else if (win === 'week') {
    var wkPts = (p.history && p.history.length >= 2) ? (p.history[p.history.length-1] - p.history[0]) : 0;
    scoreHtml = '<div class="lb-score"><div class="lb-score__val">' + wkPts.toLocaleString() + '</div><div class="lb-score__label">this wk</div></div>';
  } else {
    scoreHtml = '<div class="lb-score"><div class="lb-score__val">' + (p.seasonal_points||0).toLocaleString() + '</div><div class="lb-score__label">pts</div></div>';
  }

  // Wrap row in <a> so taps go to /p/<handle>. Falls back to <div> if no
  // handle (defensive — shouldn't happen given the data fetch). Inline
  // text-decoration override keeps the link styled like a row, not a link.
  const handle = p.twitter_handle ? String(p.twitter_handle).toLowerCase() : null;
  const tag = handle ? 'a' : 'div';
  const hrefAttr = handle ? ' href="/p/' + encodeURIComponent(handle) + '" style="text-decoration:none;color:inherit;display:block;"' : '';
  return '<' + tag + hrefAttr + ' class="lb-row' + (rank <= 3 ? ' top3' : '') + (isMe ? ' me' : '') + '" style="animation-delay:' + delay + 's;animation:fadeSlideIn 0.3s ease ' + delay + 's both;display:flex;align-items:center;gap:10px;">'
    + '<div class="rank-cell">' + medal(rank) + (win === 'season' ? rankDelta(p) : '') + '</div>'
    + avatar(p, h)
    + '<div class="lb-info">'
    + '<div class="lb-name-row">'
    + (isMe ? '<span style="color:var(--cyan);font-size:10px">★</span> ' : '')
    + '<span class="lb-name">@' + esc(p.twitter_handle || '???') + '</span>'
    + streakBadge(p)
    + (p._level ? '<span class="lb-lvl">Lv.' + p._level + '</span>' : '')
    + (p.guild_tag ? '<span class="lb-guild">' + esc(p.guild_tag) + '</span>' : '')
    + '</div>'
    + '<div class="lb-house" style="color:' + h.color + '">' + h.name + '</div>'
    + '</div>'
    + '<canvas id="' + sparkId + '" class="sparkline" style="width:70px;height:22px"></canvas>'
    + scoreHtml
    + '</' + tag + '>';
}

// ═══════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════
function render() {
  var html = '';

  // Hero banner — full-bleed at top of the page. Replaces the plain text
  // "LEADERBOARDS / Season 1" header. Image is decorative so alt="".
  html += '<div class="lb-banner">'
    + '<img class="lb-banner__img" src="/assets/images/banners/season-1-hero.jpg" srcset="/assets/images/banners/season-1-hero.jpg 1200w, /assets/images/banners/season-1-hero@2x.jpg 2400w" sizes="100vw" alt="" loading="eager">'
    + '<div class="lb-banner__overlay"></div>'
    + '<div class="lb-banner__copy">'
    +   '<div class="lb-banner__eyebrow">SEASON 1 · BATTLE FOR NETHARA</div>'
    +   '<div class="lb-banner__heading">LEADERBOARDS</div>'
    + '</div>'
    + '</div>';

  // Season progress
  html += '<div class="season-bar"><div class="season-bar__track"><div class="season-bar__fill" style="width:25%"></div></div>';
  html += '<div class="season-bar__labels"><span>Week 2</span><span>8 weeks total</span></div></div>';

  // Tabs
  html += '<div class="tabs">';
  html += '<button class="tab' + (currentTab==='season'?' active':'') + '" data-color="gold" onclick="switchTab(\'season\')">' + gameIcon('laurels','gi-md') + 'SEASON</button>';
  html += '<button class="tab' + (currentTab==='houses'?' active':'') + '" data-color="sunset" onclick="switchTab(\'houses\')">' + gameIcon('flag','gi-md') + 'HOUSES</button>';
  html += '<button class="tab' + (currentTab==='duels'?' active':'') + '" data-color="red" onclick="switchTab(\'duels\')">' + gameIcon('swords','gi-md') + 'DUELS</button>';
  html += '<button class="tab' + (currentTab==='clash'?' active':'') + '" data-color="cyan" onclick="switchTab(\'clash\')">' + gameIcon('burst','gi-md') + 'CLASH</button>';
  html += '</div>';

  // ═══ SEASON TAB ═══
  if (currentTab === 'season') {
    // Time-window sub-tabs. SEASON is the default lifetime/cumulative view.
    // TODAY uses points_today as the score; WEEK uses 7-day cumulative gain
    // from p.history. Both views re-rank client-side; the rendered list
    // dataset is the same (same server payload, different sort).
    html += '<div class="sub-tabs sub-tabs--season">';
    html += '<button class="sub-tab' + (seasonWindow==='today'?' active':'') + '" onclick="switchSeasonWindow(\'today\')">TODAY</button>';
    html += '<button class="sub-tab' + (seasonWindow==='week'?' active':'') + '" onclick="switchSeasonWindow(\'week\')">WEEK</button>';
    html += '<button class="sub-tab' + (seasonWindow==='season'?' active':'') + '" onclick="switchSeasonWindow(\'season\')">SEASON</button>';
    html += '</div>';

    // Server returns players sorted by seasonal_points. For TODAY/WEEK we
    // need a different score, so re-rank client-side.
    var players = getRankedPlayers(data.players, seasonWindow);

    // Climber spotlight — top mover today. Only renders on SEASON view —
    // TODAY/WEEK don't have a meaningful "rank change" since they're already
    // ephemeral leaderboards.
    if (seasonWindow === 'season' && data.climber && data.climber.id !== playerId) {
      var cl = data.climber;
      var clHandle = cl.twitter_handle ? String(cl.twitter_handle).toLowerCase() : null;
      var clHref = clHandle ? '/p/' + encodeURIComponent(clHandle) : '#';
      html += '<a class="climber-card" href="' + clHref + '">'
        + avatar(cl, HOUSES[cl.school_id] || {color:'#888',sigil:null})
        + '<div style="flex:1;min-width:0;">'
        +   '<div class="climber-card__label">' + gameIcon('burst','gi-sm') + ' TOP MOVER TODAY</div>'
        +   '<div class="climber-card__name">@' + esc(cl.twitter_handle || '???') + '</div>'
        + '</div>'
        + '<div style="text-align:right;flex-shrink:0;">'
        +   '<div class="climber-card__delta">▲' + cl.rank_change + '</div>'
        +   '<div class="climber-card__delta-label">RANKS</div>'
        + '</div>'
        + '</a>';
    } else if (seasonWindow === 'season' && data.climber && data.climber.id === playerId) {
      // YOU are the climber — flip framing for extra bragging fuel.
      var cl2 = data.climber;
      html += '<div class="climber-card" style="cursor:default;">'
        + avatar(cl2, HOUSES[cl2.school_id] || {color:'#888',sigil:null})
        + '<div style="flex:1;min-width:0;">'
        +   '<div class="climber-card__label">' + gameIcon('burst','gi-sm') + ' YOU\'RE THE TOP MOVER TODAY</div>'
        +   '<div class="climber-card__name">Climbed ' + cl2.rank_change + ' rank' + (cl2.rank_change === 1 ? '' : 's') + ' — keep it up</div>'
        + '</div>'
        + '<div style="text-align:right;flex-shrink:0;">'
        +   '<div class="climber-card__delta">▲' + cl2.rank_change + '</div>'
        + '</div>'
        + '</div>';
    }

    // Sticky YOU pin — shows above rankings regardless of scroll depth.
    // findMeWithFallback uses data.me_row when player isn't in top-N
    // (server includes them as a separate row with rank computed against
    // the full ladder). Pass the active window so the pin's score + gap
    // copy reflect what's being viewed.
    html += mePin(findMeWithFallback(players, data.me_row), { fullList: players, window: seasonWindow, houses: data.houses });
    if (players.length >= 3) {
      // Podium: #2, #1, #3
      var order = [1, 0, 2];
      html += '<div class="podium">';
      order.forEach(function(idx) {
        var p = players[idx];
        var h = HOUSES[p.school_id] || { color:'#888', sigil:null };
        var cls = idx === 0 ? 'first' : (idx === 1 ? 'second' : 'third');
        var rank = idx + 1;
        html += '<div class="podium__card ' + cls + '" style="animation-delay:' + (idx * 0.1) + 's">';
        html += '<div class="podium__medal"><span class="rank-badge rank-badge--' + rank + '" style="width:' + (idx===0?'34px':'28px') + ';height:' + (idx===0?'34px':'28px') + ';font-size:' + (idx===0?'13px':'11px') + ';">' + rank + '</span></div>';
        if (h.sigil) {
          html += '<div class="podium__sigil-wrap"><img class="podium__sigil" src="' + h.sigil + '" alt="" loading="lazy"></div>';
        }
        html += '<div class="podium__name">@' + esc(p.twitter_handle) + '</div>';
        var podiumScore = seasonWindow === 'today' ? (p.points_today||0)
                        : seasonWindow === 'week' ? ((p.history && p.history.length >= 2) ? (p.history[p.history.length-1] - p.history[0]) : 0)
                        : (p.seasonal_points||0);
        var podiumLabel = seasonWindow === 'today' ? 'today' : seasonWindow === 'week' ? 'this wk' : 'pts';
        html += '<div class="podium__pts">' + podiumScore.toLocaleString() + '</div>';
        html += '<div class="podium__label">' + podiumLabel + '</div>';
        html += '</div>';
      });
      html += '</div>';

      // Rest of rankings
      html += sectionLabel('laurels', 'RANKINGS');
      players.slice(3).forEach(function(p, i) {
        html += playerRow(p, i + 4, { prefix: 'season_', window: seasonWindow });
      });
    } else if (players.length > 0) {
      html += sectionLabel('laurels', 'RANKINGS');
      players.forEach(function(p, i) {
        html += playerRow(p, i + 1, { prefix: 'season_', window: seasonWindow });
      });
    } else {
      html += '<div class="empty">No players yet. Be the first to earn points!</div>';
    }

    // Season Prizes
    html += sectionLabel('sparkles', 'SEASON PRIZES');
    SEASON_PRIZES.forEach(function(pr, i) {
      html += '<div class="prize-row" style="animation:fadeSlideIn 0.3s ease ' + (i * 0.05) + 's both">';
      html += '<span class="prize-icon" style="color:var(--gold)">' + gameIcon(pr.icon, 'gi-md') + '</span>';
      html += '<span class="prize-text">' + pr.prize + '</span>';
      html += '<span class="prize-place">' + pr.place + '</span>';
      html += '</div>';
    });
  }

  // ═══ HOUSES TAB ═══
  if (currentTab === 'houses') {
    var houses = data.houses.sort(function(a, b) { return (b.total_points||0) - (a.total_points||0); });
    var maxPts = houses.length ? houses[0].total_points : 1;
    var totalAll = houses.reduce(function(s, hd) { return s + (hd.total_points||0); }, 0) || 1;

    // ── HOUSE WAR BAR — stacked horizontal bar showing each house's % share
    //    of total season points. Visceral "who's winning" read at a glance.
    if (houses.length > 0 && totalAll > 1) {
      html += sectionLabel('flag', 'SEASON 1 — HOUSE WAR');
      html += '<div class="house-war">';
      html += '<div class="house-war__bar">';
      houses.forEach(function(hd) {
        var h = HOUSES[hd.school_id] || { color:'#888', name:'?' };
        var pct = (hd.total_points||0) / totalAll * 100;
        if (pct < 0.5) return;
        html += '<div class="house-war__seg" style="flex:' + pct.toFixed(2) + ';background:' + h.color + ';" title="' + h.name + ' — ' + pct.toFixed(1) + '%"></div>';
      });
      html += '</div>';
      // Mini-legend: top 3 with their share %
      html += '<div class="house-war__legend">';
      houses.slice(0, 4).forEach(function(hd) {
        var h = HOUSES[hd.school_id] || { color:'#888', name:'?' };
        var pct = ((hd.total_points||0) / totalAll * 100).toFixed(0);
        html += '<div class="house-war__legend-item"><span class="house-war__dot" style="background:' + h.color + ';"></span>' + h.name + ' <strong>' + pct + '%</strong></div>';
      });
      html += '</div></div>';
    }

    // ── TOP-3 PODIUM — elevated cards for the leading houses, sigil-forward.
    //    #1 gets the gold-halo treatment matching the player podium.
    if (houses.length >= 3) {
      var podiumOrder = [1, 0, 2]; // #2, #1, #3
      html += '<div class="house-podium">';
      podiumOrder.forEach(function(idx) {
        var hd = houses[idx];
        var h = HOUSES[hd.school_id] || { name:'?', color:'#888', sigil:null };
        var rank = idx + 1;
        var cls = idx === 0 ? 'first' : (idx === 1 ? 'second' : 'third');
        var todayDelta = hd.points_today || 0;
        html += '<div class="house-podium__card ' + cls + '" style="animation-delay:' + (idx * 0.1) + 's;border-color:' + h.color + '40;">';
        html += '<div class="house-podium__rank"><span class="rank-badge rank-badge--' + rank + '">' + rank + '</span></div>';
        if (h.sigil) {
          html += '<div class="house-podium__sigil-wrap"><img class="house-podium__sigil" src="' + h.sigil + '" alt="" loading="lazy"></div>';
        }
        html += '<div class="house-podium__name" style="color:' + h.color + '">' + h.name + '</div>';
        html += '<div class="house-podium__pts">' + (hd.total_points||0).toLocaleString() + '</div>';
        html += '<div class="house-podium__meta">' + hd.member_count + ' members</div>';
        if (todayDelta > 0) {
          html += '<div class="house-momentum">+' + todayDelta.toLocaleString() + ' today</div>';
        }
        html += '</div>';
      });
      html += '</div>';
    }

    html += sectionLabel('flag', 'HOUSE RANKINGS');
    if (houses.length > 0) {
      houses.forEach(function(hd, i) {
        var h = HOUSES[hd.school_id] || { name:'?', color:'#888', icon:'?', role:'' };
        var pct = maxPts ? Math.round((hd.total_points||0) / maxPts * 100) : 0;
        var avg = hd.member_count ? Math.round(hd.total_points / hd.member_count) : 0;
        var delay = i * 0.05;
        var todayDelta = hd.points_today || 0;

        html += '<div class="house-card' + (i < 3 ? ' top3' : '') + '" style="border-left-color:' + h.color + ';animation:fadeSlideIn 0.3s ease ' + delay + 's both">';
        html += '<div class="house-card__inner">';
        html += '<div style="min-width:28px;text-align:center">' + medal(i + 1) + '</div>';
        html += h.sigil
          ? '<span class="house-card__icon"><img class="house-card__sigil" src="' + h.sigil + '" alt="" loading="lazy"></span>'
          : '<span class="house-card__icon" style="font-size:28px">' + h.icon + '</span>';
        html += '<div class="house-card__body">';
        html += '<div class="house-card__namerow"><span class="house-card__name" style="color:' + h.color + '">' + h.name + '</span>';
        html += '<span class="house-card__role">' + h.role + '</span>';
        if (todayDelta > 0) html += '<span class="house-momentum house-momentum--inline">+' + todayDelta.toLocaleString() + ' today</span>';
        html += '</div>';
        html += '<div class="house-card__bar"><div class="house-card__fill" style="width:' + pct + '%;background:linear-gradient(90deg,' + h.color + ',' + h.color + '80)' + (i === 0 ? ';box-shadow:0 0 8px ' + h.color + '40' : '') + '"></div></div>';
        html += '<div class="house-card__meta"><span>' + hd.member_count + ' members</span><span>' + avg.toLocaleString() + ' avg</span></div>';
        html += '</div>';
        html += '<div class="house-card__score"><div class="house-card__pts">' + (hd.total_points||0).toLocaleString() + '</div><div class="lb-score__label">total pts</div></div>';
        html += '</div></div>';
      });
    } else {
      html += '<div class="empty">No house data yet.</div>';
    }
  }

  // ═══ DUELS TAB ═══
  if (currentTab === 'duels') {
    html += sectionLabel('swords', 'DUEL RANKINGS');
    html += '<div class="info-box">Ranked by wins · All active duelists shown</div>';

    var duelists = data.duels;
    // Sticky YOU pin — same pattern as season tab.
    html += mePin(findMe(duelists), { showDuels: true });
    if (duelists.length > 0) {
      duelists.forEach(function(p, i) {
        html += playerRow(p, i + 1, { showDuels: true, prefix: 'duel_' });
      });
    } else {
      html += '<div class="empty">No duels fought yet. Challenge someone!</div>';
    }
  }

  // ═══ GUILD CLASH TAB ═══
  if (currentTab === 'clash') {
    // Admin controls
    if (isAdmin) {
      html += '<div class="admin-bar">';
      html += '<div class="admin-bar__title">🔧 ADMIN CONTROLS</div>';
      html += '<button onclick="openClashModal()">+ New Clash Matchup</button>';
      html += '<button onclick="refreshClashes()">↻ Refresh</button>';
      html += '</div>';
    }

    // Sub-tabs
    html += '<div class="sub-tabs">';
    html += '<button class="sub-tab' + (clashView==='standings'?' active':'') + '" onclick="switchClashView(\'standings\')">' + gameIcon('laurels','gi-sm') + ' Standings</button>';
    html += '<button class="sub-tab' + (clashView==='matches'?' active':'') + '" onclick="switchClashView(\'matches\')">' + gameIcon('swords','gi-sm') + ' Matches</button>';
    html += '</div>';

    var matches = data.clashes.matches || [];
    var standings = data.clashes.standings || [];

    if (clashView === 'standings') {
      // Standings table
      if (standings.length > 0) {
        html += sectionLabel('laurels', 'ROUND ROBIN STANDINGS');
        html += '<div class="standings">';
        html += '<div class="standings__head"><span>GUILD</span><span style="text-align:center">W</span><span style="text-align:center">L</span><span style="text-align:right">PTS</span></div>';
        standings.forEach(function(g, i) {
          html += '<div class="standings__row" style="animation:fadeSlideIn 0.3s ease ' + (i * 0.05) + 's both">';
          html += '<div class="standings__guild">' + medal(i + 1) + '<div class="standings__dot" style="background:' + (g.color||'#888') + '"></div>';
          html += '<span class="standings__name">' + esc(g.name) + '</span></div>';
          html += '<span class="standings__w">' + (g.w||0) + '</span>';
          html += '<span class="standings__l">' + (g.l||0) + '</span>';
          html += '<span class="standings__pts">' + (g.pts||0) + '</span>';
          html += '</div>';
        });
        html += '</div>';
      }

      // This week's matches
      var currentWeek = 0;
      matches.forEach(function(m) { if (m.week > currentWeek) currentWeek = m.week; });
      var thisWeek = matches.filter(function(m) { return m.week === currentWeek; });

      if (thisWeek.length > 0) {
        html += sectionLabel('burst', 'THIS WEEK');
        thisWeek.forEach(function(c, i) { html += clashCard(c, i); });
      }

      if (standings.length === 0 && thisWeek.length === 0) {
        html += '<div class="empty">No guild clashes yet. ' + (isAdmin ? 'Use admin controls to create matchups!' : 'Coming soon!') + '</div>';
      }
    }

    if (clashView === 'matches') {
      if (matches.length > 0) {
        html += sectionLabel(null, 'ALL MATCH RESULTS');
        // Group by week, newest first
        var weeks = {};
        matches.forEach(function(m) {
          if (!weeks[m.week]) weeks[m.week] = [];
          weeks[m.week].push(m);
        });
        var weekNums = Object.keys(weeks).sort(function(a,b){return b-a;});
        weekNums.forEach(function(w) {
          html += '<div class="week-label">WEEK ' + w + '</div>';
          weeks[w].forEach(function(c, i) { html += clashCard(c, i); });
        });
      } else {
        html += '<div class="empty">No matches played yet.</div>';
      }
    }

    // Clash Prizes
    html += sectionLabel('sparkles', 'CLASH PRIZES');
    html += '<div class="clash-prizes">';
    html += '<div class="clash-prizes__title">Season Clash Champion</div>';
    var clashPrizes = [
      {icon:'crown',    text:'"Warlord" title for your guild'},
      {icon:'swords',   text:'Choose one featured clash matchup next season'},
      {icon:'sparkles', text:'Victory spotlight thread from @9LVNetwork'},
      {icon:'fire',     text:'Undefeated streak (3+ wins) = "Unbeatable" badge'}
    ];
    clashPrizes.forEach(function(cp) {
      html += '<div class="clash-prizes__item"><span class="clash-prizes__item-icon" style="color:var(--cyan)">' + gameIcon(cp.icon, 'gi-md') + '</span>';
      html += '<span class="clash-prizes__item-text">' + cp.text + '</span></div>';
    });
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;

  // Draw sparklines after DOM update. Real 7-day cumulative point trend per
  // player from point_log (server-attached p.history). Color matches the
  // rank-delta arrow story: climbing = green, falling = red, flat = muted.
  // No history (e.g. duels endpoint) → no sparkline drawn (safe no-op).
  requestAnimationFrame(function() {
    // TODAY view doesn't have a meaningful sparkline (single data point).
    // Skip sparkline rendering entirely on that window — the canvas
    // elements exist but stay blank, sized via CSS so layout doesn't shift.
    if (currentTab === 'season' && seasonWindow === 'today') return;
    var allPlayers = currentTab === 'duels' ? data.duels : data.players;
    var prefix = currentTab === 'duels' ? 'duel_' : 'season_';
    allPlayers.forEach(function(p) {
      var canvas = document.getElementById('spark_' + prefix + p.id);
      if (!canvas) return;
      var hist = p.history;
      if (!hist || hist.length < 2) return;
      // Trend color from the existing rank_change signal so the sparkline
      // reads as the same story the arrow tells. Fall back to gold for
      // brand-new players (no rank_change).
      var trendColor;
      if (typeof p.rank_change === 'number' && p.rank_change > 0) trendColor = '#6acd8a';
      else if (typeof p.rank_change === 'number' && p.rank_change < 0) trendColor = '#e85a6a';
      else trendColor = '#9B8E7E';
      drawSparkline('spark_' + prefix + p.id, hist, trendColor);
    });

    // House progression chart was replaced by the war-bar + podium treatment.
    // drawHouseChart() / chart-box / chart-legend CSS retained as dead code in
    // case a future "history over time" view wants to revive them.
  });
}

// Section label with optional thematic icon. Pass an ICONS key (e.g.
// 'laurels', 'flag', 'swords', 'burst', 'sparkles') to render a small
// inline SVG between the accent bar and the text. Pass null/undefined
// to keep just the gold accent bar (for generic sections).
function sectionLabel(icon, text) {
  var iconHtml = (icon && ICONS[icon]) ? '<span class="section-label__icon">' + gameIcon(icon, 'gi-md') + '</span>' : '';
  return '<div class="section-label"><span class="section-label__accent"></span>' + iconHtml + '<span class="section-label__text">' + text + '</span><span class="section-label__line"></span></div>';
}

function clashCard(c, i) {
  var isLive = c.status === 'live';
  var isComplete = c.status === 'complete';
  var aWon = isComplete && (c.score_a||0) > (c.score_b||0);
  var bWon = isComplete && (c.score_b||0) > (c.score_a||0);
  var delay = i * 0.05;

  var h = '<div class="clash-card' + (isLive ? ' live' : '') + '" style="animation:fadeSlideIn 0.3s ease ' + delay + 's both">';

  if (isLive) {
    h += '<div class="clash-live-badge"><div class="clash-live-dot"></div><span class="clash-live-text">LIVE NOW</span></div>';
  }

  h += '<div class="clash-inner">';
  // Guild A
  h += '<div class="clash-guild">';
  h += '<div class="clash-guild__name' + (bWon ? ' dim' : '') + '" style="color:' + (aWon ? (c.color_a||'#fff') : '') + '">' + esc(c.guild_a) + '</div>';
  h += '<div class="clash-guild__score' + (isLive ? ' live' : '') + (aWon ? ' won' : '') + '">' + (c.score_a||0).toLocaleString() + '</div>';
  if (aWon) h += '<div class="clash-crown">' + gameIcon('crown','gi-lg') + '</div>';
  h += '</div>';
  // VS
  h += '<div class="clash-vs' + (isLive ? ' live' : '') + '">' + (isLive ? gameIcon('swords','gi-md') : c.status === 'upcoming' ? 'TBD' : 'VS') + '</div>';
  // Guild B
  h += '<div class="clash-guild">';
  h += '<div class="clash-guild__name' + (aWon ? ' dim' : '') + '" style="color:' + (bWon ? (c.color_b||'#fff') : '') + '">' + esc(c.guild_b) + '</div>';
  h += '<div class="clash-guild__score' + (isLive ? ' live' : '') + (bWon ? ' won' : '') + '">' + (c.score_b||0).toLocaleString() + '</div>';
  if (bWon) h += '<div class="clash-crown">' + gameIcon('crown','gi-lg') + '</div>';
  h += '</div>';
  h += '</div>';

  h += '<div class="clash-week">WEEK ' + c.week + '</div>';

  // Admin: edit buttons
  if (isAdmin) {
    h += '<div style="text-align:center;margin-top:8px;border-top:1px solid var(--border);padding-top:8px">';
    h += '<button onclick="editClash(' + c.id + ')" style="font-family:var(--font-mono);font-size:8px;padding:4px 10px;border-radius:4px;border:1px solid rgba(212,166,75,0.2);background:rgba(212,166,75,0.08);color:var(--gold);cursor:pointer;margin:0 2px">✏️ Edit</button>';
    h += '<button onclick="deleteClash(' + c.id + ')" style="font-family:var(--font-mono);font-size:8px;padding:4px 10px;border-radius:4px;border:1px solid rgba(232,90,106,0.2);background:rgba(232,90,106,0.08);color:var(--red);cursor:pointer;margin:0 2px">🗑️ Delete</button>';
    h += '</div>';
  }

  h += '</div>';
  return h;
}

// ═══════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════
function switchTab(t) { currentTab = t; render(); }
function switchClashView(v) { clashView = v; render(); }

// ═══════════════════════════════════════
// ADMIN: CLASH MANAGEMENT
// ═══════════════════════════════════════
var editingClashId = null;

function openClashModal() {
  editingClashId = null;
  document.getElementById('clashWeek').value = 1;
  document.getElementById('clashGuildA').value = '';
  document.getElementById('clashGuildB').value = '';
  document.getElementById('clashColorA').value = '#FFD700';
  document.getElementById('clashColorB').value = '#00BFFF';
  document.getElementById('clashStatus').value = 'upcoming';
  document.getElementById('clashScoreA').value = 0;
  document.getElementById('clashScoreB').value = 0;
  document.getElementById('clashModal').style.display = 'flex';
}

function closeClashModal() {
  document.getElementById('clashModal').style.display = 'none';
  editingClashId = null;
}

function editClash(id) {
  var match = (data.clashes.matches || []).find(function(m) { return m.id === id; });
  if (!match) return;
  editingClashId = id;
  document.getElementById('clashWeek').value = match.week;
  document.getElementById('clashGuildA').value = match.guild_a;
  document.getElementById('clashGuildB').value = match.guild_b;
  document.getElementById('clashColorA').value = match.color_a || '#FFD700';
  document.getElementById('clashColorB').value = match.color_b || '#00BFFF';
  document.getElementById('clashStatus').value = match.status;
  document.getElementById('clashScoreA').value = match.score_a || 0;
  document.getElementById('clashScoreB').value = match.score_b || 0;
  document.getElementById('clashModal').style.display = 'flex';
}

async function saveClash() {
  var adminKey = new URLSearchParams(window.location.search).get('admin_key');
  var payload = {
    week: parseInt(document.getElementById('clashWeek').value),
    guild_a: document.getElementById('clashGuildA').value.trim(),
    guild_b: document.getElementById('clashGuildB').value.trim(),
    color_a: document.getElementById('clashColorA').value,
    color_b: document.getElementById('clashColorB').value,
    status: document.getElementById('clashStatus').value,
    score_a: parseInt(document.getElementById('clashScoreA').value) || 0,
    score_b: parseInt(document.getElementById('clashScoreB').value) || 0
  };

  if (!payload.guild_a || !payload.guild_b) {
    alert('Please enter both guild names');
    return;
  }

  try {
    var url = editingClashId
      ? '/api/admin/clashes/' + editingClashId + '?admin_key=' + adminKey
      : '/api/admin/clashes?admin_key=' + adminKey;
    var method = editingClashId ? 'PUT' : 'POST';

    var r = await fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (r.ok) {
      closeClashModal();
      await refreshClashes();
    } else {
      var err = await r.json();
      alert('Error: ' + (err.error || 'Failed to save'));
    }
  } catch (e) {
    alert('Error saving clash: ' + e.message);
  }
}

async function deleteClash(id) {
  if (!confirm('Delete this clash matchup?')) return;
  var adminKey = new URLSearchParams(window.location.search).get('admin_key');
  try {
    await fetch('/api/admin/clashes/' + id + '?admin_key=' + adminKey, { method: 'DELETE' });
    await refreshClashes();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function refreshClashes() {
  try {
    var r = await fetch('/api/leaderboards/clashes');
    if (r.ok) {
      data.clashes = await r.json();
    }
  } catch (e) {}
  render();
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadAll();
</script>
