<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboards | Nine Lives Network</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a14; color: #fff; min-height: 100vh; }

    .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; }
    .video-background video { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); min-width: 100%; min-height: 100%; object-fit: cover; }
    .video-background::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 0%, transparent 20%, rgba(10, 10, 20, 0.4) 40%, rgba(10, 10, 20, 0.7) 60%, rgba(10, 10, 20, 0.9) 80%, rgba(10, 10, 20, 1) 100%); }
    .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 20, 0.3); z-index: -1; }

    .leaderboards-container { min-height: 100vh; padding-top: 76px; padding-bottom: 40px; position: relative; z-index: 1; }
    .leaderboards-content { max-width: 800px; margin: 0 auto; padding: 20px 15px; }
    .page-title { font-family: 'Press Start 2P', monospace; font-size: 1rem; color: #FFD700; margin-bottom: 24px; text-align: center; text-shadow: 0 2px 20px rgba(255, 215, 0, 0.3); }

    .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab-btn { font-family: 'Press Start 2P', monospace; font-size: 0.4rem; padding: 12px 20px; background: rgba(30, 30, 50, 0.8); border: 2px solid #2a2a4a; color: #a0a0b0; cursor: pointer; border-radius: 6px; backdrop-filter: blur(5px); transition: all 0.3s; }
    .tab-btn:hover { border-color: #FFD700; color: #fff; }
    .tab-btn.active { background: #FFD700; border-color: #FFD700; color: #0a0a14; }

    .leaderboard-section { display: none; }
    .leaderboard-section.active { display: block; }

    .leaderboard-table { width: 100%; background: rgba(20, 20, 35, 0.85); border: 2px solid #2a2a4a; border-radius: 12px; overflow: hidden; backdrop-filter: blur(10px); }
    .leaderboard-header { display: grid; grid-template-columns: 50px 1fr 90px; padding: 12px 16px; background: rgba(40, 40, 60, 0.9); font-family: 'Press Start 2P', monospace; font-size: 0.35rem; color: #a0a0b0; text-transform: uppercase; }
    .leaderboard-row { display: grid; grid-template-columns: 50px 1fr 90px; padding: 12px 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); align-items: center; transition: background 0.2s; }
    .leaderboard-row:hover { background: rgba(255, 215, 0, 0.05); }
    .leaderboard-row:last-child { border-bottom: none; }
    .leaderboard-row.highlight { background: rgba(255, 215, 0, 0.15); border-left: 3px solid #FFD700; }

    .rank { font-family: 'Press Start 2P', monospace; font-size: 0.6rem; color: #606070; }
    .rank-1 { color: #FFD700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    .rank-2 { color: #C0C0C0; }
    .rank-3 { color: #CD7F32; }

    .player-cell { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .player-avatar { width: 36px; height: 36px; border-radius: 50%; background: #2a2a4a; display: flex; align-items: center; justify-content: center; font-size: 1rem; overflow: hidden; border: 2px solid rgba(255, 255, 255, 0.2); flex-shrink: 0; }
    .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .player-info { min-width: 0; overflow: hidden; }
    .player-name { font-family: 'Press Start 2P', monospace; font-size: 0.4rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-school { display: flex; align-items: center; gap: 4px; margin-top: 2px; }
    .school-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .school-name { font-family: 'Press Start 2P', monospace; font-size: 0.3rem; color: #a0a0b0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-tag { font-family: 'Press Start 2P', monospace; font-size: 0.3rem; color: #8A2BE2; margin-top: 2px; }

    .points { font-family: 'Press Start 2P', monospace; font-size: 0.45rem; color: #FFD700; text-align: right; white-space: nowrap; }

    .school-cell { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .school-color-block { width: 36px; height: 36px; border-radius: 6px; flex-shrink: 0; }
    .school-info { min-width: 0; overflow: hidden; }
    .school-full-name { font-family: 'Press Start 2P', monospace; font-size: 0.4rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .school-element { font-family: 'Press Start 2P', monospace; font-size: 0.3rem; color: #606070; margin-top: 2px; }

    .community-tag-name { font-family: 'Press Start 2P', monospace; font-size: 0.5rem; color: #8A2BE2; }

    .empty-state, .loading { text-align: center; padding: 40px 20px; color: #606070; font-family: 'Press Start 2P', monospace; font-size: 0.4rem; }

    @media (max-width: 600px) {
      .leaderboard-header, .leaderboard-row { grid-template-columns: 40px 1fr 70px; padding: 10px 12px; font-size: 0.3rem; }
      .player-avatar, .school-color-block { width: 28px; height: 28px; }
      .player-name, .school-full-name { font-size: 0.35rem; }
      .points { font-size: 0.4rem; }
      .page-title { font-size: 0.8rem; }
      .tab-btn { font-size: 0.35rem; padding: 10px 14px; }
    }
  </style>
</head>
<body>
  <div class="video-background">
    <video autoplay muted loop playsinline><source src="/assets/images/wizard-cat.mp4" type="video/mp4"></video>
  </div>
  <div class="video-overlay"></div>

  <nav class="top-nav">
    <div class="top-nav-content">
      <a href="/" class="nav-logo">Nine Lives Network</a>
      <ul class="nav-links">
        <li><a href="/dashboard.html">Dashboard</a></li>
        <li><a href="/world.html">World</a></li>
        <li><a href="/leaderboards.html" class="active">Leaderboards</a></li>
        <li><a href="/how-to-play.html">Help</a></li>
        <li><a href="#" class="logout-btn" id="logoutBtn">Logout</a></li>
      </ul>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="/dashboard.html"><span class="menu-icon">📊</span> Dashboard</a>
    <a href="/world.html"><span class="menu-icon">🌍</span> World</a>
    <a href="/leaderboards.html" class="active"><span class="menu-icon">🏆</span> Leaderboards</a>
    <a href="/how-to-play.html"><span class="menu-icon">❓</span> Help</a>
    <a href="#" class="logout-btn" id="mobileLogoutBtn"><span class="menu-icon">🚪</span> Logout</a>
  </div>

  <main class="leaderboards-container">
    <div class="leaderboards-content">
      <h1 class="page-title">🏆 Leaderboards</h1>
      <div class="tabs">
        <button class="tab-btn active" data-tab="players">Players</button>
        <button class="tab-btn" data-tab="schools">Schools</button>
        <button class="tab-btn" data-tab="communities">Communities</button>
      </div>

      <div class="leaderboard-section active" id="players-section">
        <div class="leaderboard-table">
          <div class="leaderboard-header"><div>Rank</div><div>Player</div><div style="text-align:right;">Points</div></div>
          <div id="players-list" class="loading">Loading...</div>
        </div>
      </div>

      <div class="leaderboard-section" id="schools-section">
        <div class="leaderboard-table">
          <div class="leaderboard-header"><div>Rank</div><div>School</div><div style="text-align:right;">Points</div></div>
          <div id="schools-list" class="loading">Loading...</div>
        </div>
      </div>

      <div class="leaderboard-section" id="communities-section">
        <div class="leaderboard-table">
          <div class="leaderboard-header"><div>Rank</div><div>Community</div><div style="text-align:right;">Points</div></div>
          <div id="communities-list" class="loading">Loading...</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const schools = {
      1: { name: 'House Smoulders', element: 'Fire', color: '#FF4500' },
      2: { name: 'House Darktide', element: 'Water', color: '#00BFFF' },
      3: { name: 'House Ironbark', element: 'Earth', color: '#8B4513' },
      4: { name: 'House Ashenvale', element: 'Air', color: '#98FB98' },
      5: { name: 'House Stormrage', element: 'Lightning', color: '#FFD700' },
      6: { name: 'House Darkhollow', element: 'Shadow', color: '#9932CC' },
      7: { name: 'House Dawnbringer', element: 'Light', color: '#FFFFE0' },
      8: { name: 'House Manastorm', element: 'Arcane', color: '#00FFFF' },
      9: { name: 'House Plaguemire', element: 'Chaos', color: '#FF1493' },
    };
    const currentPlayerId = localStorage.getItem('player_id');

    document.getElementById('hamburger').addEventListener('click', () => { document.getElementById('hamburger').classList.toggle('active'); document.getElementById('mobileMenu').classList.toggle('active'); });
    document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); localStorage.removeItem('player_id'); window.location.href = '/'; });
    document.getElementById('mobileLogoutBtn').addEventListener('click', (e) => { e.preventDefault(); localStorage.removeItem('player_id'); window.location.href = '/'; });

    document.addEventListener('DOMContentLoaded', () => { setupTabs(); loadPlayersLeaderboard(); loadSchoolsLeaderboard(); loadCommunitiesLeaderboard(); });

    function setupTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.querySelectorAll('.leaderboard-section').forEach(s => s.classList.remove('active'));
          document.getElementById(`${btn.dataset.tab}-section`).classList.add('active');
        });
      });
    }

    async function loadPlayersLeaderboard() {
      try {
        const res = await fetch('/api/leaderboards/players');
        const players = await res.json();
        const c = document.getElementById('players-list');
        if (!players.length) { c.innerHTML = '<div class="empty-state">No players yet!</div>'; return; }
        c.innerHTML = players.map((p, i) => {
          const s = schools[p.school_id];
          return `<div class="leaderboard-row ${p.id == currentPlayerId ? 'highlight' : ''}">
            <div class="rank rank-${i+1}">#${i+1}</div>
            <div class="player-cell">
              <div class="player-avatar">${p.profile_image ? `<img src="${p.profile_image}">` : '🐱'}</div>
              <div class="player-info">
                <div class="player-name">@${p.twitter_handle}</div>
                <div class="player-school"><div class="school-dot" style="background:${s.color}"></div><span class="school-name">${s.name.split(' ')[0]}</span></div>
                ${p.community_tag ? `<div class="player-tag">${p.community_tag}</div>` : ''}
              </div>
            </div>
            <div class="points">${p.seasonal_points.toLocaleString()}</div>
          </div>`;
        }).join('');
      } catch (e) { document.getElementById('players-list').innerHTML = '<div class="empty-state">Failed to load</div>'; }
    }

    async function loadSchoolsLeaderboard() {
      try {
        const res = await fetch('/api/leaderboards/schools');
        const stats = await res.json();
        const c = document.getElementById('schools-list');
        if (!stats.length) { c.innerHTML = '<div class="empty-state">No data</div>'; return; }
        c.innerHTML = stats.map((st, i) => {
          const s = schools[st.school_id];
          return `<div class="leaderboard-row">
            <div class="rank rank-${i+1}">#${i+1}</div>
            <div class="school-cell">
              <div class="school-color-block" style="background:${s.color}"></div>
              <div class="school-info"><div class="school-full-name">${s.name}</div><div class="school-element">${s.element} • ${st.member_count} wizards</div></div>
            </div>
            <div class="points">${st.total_points.toLocaleString()}</div>
          </div>`;
        }).join('');
      } catch (e) { document.getElementById('schools-list').innerHTML = '<div class="empty-state">Failed to load</div>'; }
    }

    async function loadCommunitiesLeaderboard() {
      try {
        const res = await fetch('/api/leaderboards/communities');
        const communities = await res.json();
        const c = document.getElementById('communities-list');
        if (!communities.length) { c.innerHTML = '<div class="empty-state">No communities yet!</div>'; return; }
        c.innerHTML = communities.map((cm, i) => `<div class="leaderboard-row">
          <div class="rank rank-${i+1}">#${i+1}</div>
          <div class="player-info"><div class="community-tag-name">${cm.community_tag}</div><div class="school-name">${cm.member_count} members</div></div>
          <div class="points">${cm.total_points.toLocaleString()}</div>
        </div>`).join('');
      } catch (e) { document.getElementById('communities-list').innerHTML = '<div class="empty-state">Failed to load</div>'; }
    }
  </script>
</body>
</html>
