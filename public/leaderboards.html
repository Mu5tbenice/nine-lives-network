<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leaderboards | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    .lb-hero{text-align:center;padding:16px 0 8px}
    .lb-hero__title{font-family:var(--font-title);font-weight:700;font-size:24px;color:var(--gold);letter-spacing:3px}
    .lb-hero__sub{font-family:var(--font-body);font-size:15px;font-style:italic;color:var(--text-muted);margin-top:4px}
    .lb-tabs{display:flex;gap:4px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;padding:4px}
    .lb-tab{flex:1;padding:10px 8px;border:none;border-radius:8px;background:transparent;color:var(--text-muted);font-family:var(--font-title);font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:all .2s;text-align:center}
    .lb-tab.active{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
    .lb-content{display:none}.lb-content.active{display:block}
    .lb-season{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 0}
    .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:16px 0 20px}
    .podium-slot{display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none}
    .podium-slot--1{order:2}.podium-slot--2{order:1}.podium-slot--3{order:3}
    .podium-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2.5px solid var(--text-faint)}
    .podium-slot--1 .podium-avatar{width:64px;height:64px;border-color:var(--gold);box-shadow:0 0 15px var(--gold-glow)}
    .podium-slot--2 .podium-avatar{width:56px;height:56px;border-color:#C0C0C0}
    .podium-slot--3 .podium-avatar{border-color:#CD7F32}
    .podium-avatar--placeholder{display:flex;align-items:center;justify-content:center;background:var(--bg-card)}
    .podium-avatar--placeholder img{width:60%;height:60%;object-fit:contain}
    .podium-medal{font-family:var(--font-data);font-size:10px;color:var(--gold);margin-bottom:-2px}
    .podium-slot--2 .podium-medal{color:#C0C0C0}.podium-slot--3 .podium-medal{color:#CD7F32}
    .podium-name{font-family:'Press Start 2P',cursive;font-size:9px;font-weight:600;color:var(--text-bright);letter-spacing:.5px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
    .podium-pts{font-family:var(--font-data);font-size:9px;color:var(--gold)}
    .podium-bar{width:70px;border-radius:6px 6px 0 0;background:var(--bg-card);border:1px solid var(--border-subtle);border-bottom:none}
    .podium-slot--1 .podium-bar{height:60px;width:80px;border-color:var(--gold-border);background:var(--gold-dim)}
    .podium-slot--2 .podium-bar{height:44px}.podium-slot--3 .podium-bar{height:32px}
    .lb-list{display:flex;flex-direction:column;gap:4px}
    .lb-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;text-decoration:none;transition:all .2s}
    .lb-row:hover{background:var(--bg-card-hover);border-color:var(--border-medium)}
    .lb-row--you{background:rgba(212,166,75,.06);border-color:var(--gold-border)}
    .lb-rank{font-family:var(--font-data);font-size:10px;color:var(--text-faint);width:24px;text-align:center;flex-shrink:0}
    .lb-rank--gold{color:var(--gold)}
    .lb-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--border-subtle);flex-shrink:0}
    .lb-avatar--placeholder{width:36px;height:36px;border-radius:50%;border:2px solid var(--border-subtle);display:flex;align-items:center;justify-content:center;background:var(--bg-inset);flex-shrink:0}
    .lb-avatar--placeholder img{width:22px;height:22px;object-fit:contain}
    .lb-info{flex:1;min-width:0}
    .lb-name{font-family:'Press Start 2P',cursive;font-size:9px;font-weight:600;color:var(--text-bright);letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-meta{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);display:flex;align-items:center;gap:6px;margin-top:2px}
    .lb-house-img{width:16px;height:16px;object-fit:contain}
    .lb-tag-badge{font-family:var(--font-data);font-size:7px;color:var(--gold);background:var(--gold-dim);border:1px solid var(--gold-border);padding:2px 6px;border-radius:3px;margin-left:4px}
    .lb-points{text-align:right;flex-shrink:0}
    .lb-points__val{font-family:var(--font-data);font-size:12px;color:var(--text-bright)}
    .lb-points__label{font-family:var(--font-data);font-size:7px;color:var(--text-faint)}
    .lb-house-icon-lg{width:32px;height:32px;object-fit:contain;flex-shrink:0}
    .lb-members{font-family:var(--font-data);font-size:8px;color:var(--text-faint)}
    .lb-tag{font-family:var(--font-title);font-size:15px;font-weight:700;color:var(--text-bright);letter-spacing:.5px}
    .lb-empty{text-align:center;padding:30px 16px;color:var(--text-faint);font-family:var(--font-body);font-style:italic;font-size:15px}
    .lb-community-icon{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold-border);display:flex;align-items:center;justify-content:center;background:var(--gold-dim);flex-shrink:0;font-family:var(--font-data);font-size:8px;color:var(--gold)}

    /* ═══ MARKETS TAB ═══ */
    .mk-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
    .mk-title{font-family:var(--font-title);font-weight:700;font-size:20px;color:var(--text-bright);letter-spacing:2px}
    .mk-stats{font-family:var(--font-data);font-size:8px;color:var(--text-faint);letter-spacing:1px}
    .mk-sub{font-family:var(--font-body);font-style:italic;font-size:13px;color:var(--text-muted);margin-bottom:14px}
    .mk-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;padding:16px;margin-bottom:12px}
    .mk-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .mk-card-title{font-family:var(--font-data);font-size:9px;color:var(--text-muted);letter-spacing:2px}
    .mk-toggles{display:flex;gap:2px}
    .mk-toggle{background:transparent;border:1px solid var(--border-subtle);color:var(--text-faint);font-family:var(--font-data);font-size:8px;padding:4px 10px;border-radius:4px;cursor:pointer;letter-spacing:0.5px}
    .mk-toggle.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border)}
    .mk-chart-wrap{position:relative;width:100%;height:220px}
    .mk-chart-wrap canvas{width:100%;height:100%}
    .mk-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .mk-legend-item{display:flex;align-items:center;gap:4px;font-family:var(--font-data);font-size:8px;color:var(--text-muted);padding:3px 8px;background:var(--bg-inset);border-radius:4px;border:1px solid var(--border-subtle);cursor:pointer}
    .mk-legend-item.disabled{opacity:0.3}
    .mk-legend-dot{width:8px;height:8px;border-radius:50%}

    /* Rankings table */
    .mk-table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 14px}
    .mk-table-title{font-family:var(--font-data);font-size:9px;color:var(--text-muted);letter-spacing:2px}
    .mk-sort{font-family:var(--font-data);font-size:7px;color:var(--text-faint);letter-spacing:0.5px}
    .mk-row{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;margin-bottom:4px}
    .mk-row-rank{font-family:var(--font-data);font-size:14px;font-weight:700;width:24px;text-align:center;flex-shrink:0}
    .mk-row-rank--1{color:var(--gold)}.mk-row-rank--2{color:#c0c0c0}.mk-row-rank--3{color:#cd7f32}
    .mk-row-icon{width:32px;height:32px;border-radius:50%;border:2px solid var(--gold-border);display:flex;align-items:center;justify-content:center;background:var(--gold-dim);flex-shrink:0}
    .mk-row-icon__text{font-family:var(--font-data);font-size:7px;color:var(--gold)}
    .mk-row-info{flex:1;min-width:0}
    .mk-row-tag{font-family:var(--font-data);font-size:12px;font-weight:700;color:var(--text-bright);letter-spacing:0.5px}
    .mk-row-members{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);margin-top:1px}
    .mk-row-power{font-family:var(--font-data);font-size:14px;font-weight:700;color:var(--text-bright);min-width:50px;text-align:right}
    .mk-row-changes{display:flex;gap:6px;align-items:center;min-width:100px;justify-content:flex-end}
    .mk-pct{font-family:var(--font-data);font-size:9px;padding:2px 6px;border-radius:3px}
    .mk-pct--up{color:#44cc44;background:rgba(68,204,68,0.1)}
    .mk-pct--down{color:#cc4444;background:rgba(204,68,68,0.1)}
    .mk-pct--flat{color:var(--text-faint);background:rgba(255,255,255,0.03)}
    .mk-spark{width:60px;height:24px;flex-shrink:0}
    .mk-active{font-family:var(--font-data);font-size:8px;color:#44cc44;display:flex;align-items:center;gap:3px;min-width:50px;justify-content:flex-end}
    .mk-active-dot{width:5px;height:5px;border-radius:50%;background:#44cc44}

    @media(max-width:600px){
      .mk-row-changes{display:none}
      .mk-row-power{font-size:12px}
      .mk-spark{display:none}
    }
    @media(max-width:480px){.lb-hero__title{font-size:20px}.lb-tab{font-size:10px;padding:8px 4px}.podium{gap:6px}.podium-slot--1 .podium-avatar{width:56px;height:56px}.podium-slot--2 .podium-avatar{width:48px;height:48px}.podium-avatar{width:44px;height:44px}.podium-bar{width:60px}.podium-slot--1 .podium-bar{width:70px}.podium-name{font-size:9px;max-width:70px}.lb-row{padding:10px 12px;gap:8px}.lb-name{font-size:13px}}
  </style>
</head>
<body>
  <nav class="top-nav"><div class="top-nav-content"><a href="/" class="nav-logo">Nine Lives Network</a><ul class="nav-links"><li><a href="/dashboard.html">Dashboard</a></li><li><a href="/map.html">World</a></li><li><a href="/leaderboards.html" class="active">Leaderboards</a></li><li><a href="/arena.html">Arena</a></li><li><a href="/how-to-play.html">Help</a></li><li id="navLogout" style="display:none;"><a href="#" class="logout-btn" onclick="doLogout()">Logout</a></li></ul><button class="hamburger" id="hamburger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button></div></nav>
  <div class="mobile-menu" id="mobileMenu"><a href="/dashboard.html">Dashboard</a><a href="/map.html">World</a><a href="/leaderboards.html" class="active">Leaderboards</a><a href="/arena.html">Arena</a><a href="/how-to-play.html">Help</a><a href="#" class="logout-btn" id="mobileLogout" style="display:none;" onclick="doLogout()">🚪 Logout</a></div>

  <div class="main-container">
    <div class="lb-hero fade-up"><h1 class="lb-hero__title">Leaderboards</h1><p class="lb-hero__sub">Who stands tallest in Avaloris?</p></div>
    <div class="lb-season fade-up"><span class="badge--season">Season 0</span></div>
    <div class="lb-tabs fade-up fade-up-1"><button class="lb-tab active" onclick="switchTab('players')">Players</button><button class="lb-tab" onclick="switchTab('houses')">Houses</button><button class="lb-tab" onclick="switchTab('communities')">Communities</button><button class="lb-tab" onclick="switchTab('markets')">Markets</button></div>
    <div class="loading" id="loadingState"><div class="spinner"></div></div>
    <div class="lb-content active" id="tab-players"></div>
    <div class="lb-content" id="tab-houses"></div>
    <div class="lb-content" id="tab-communities"></div>
    <div class="lb-content" id="tab-markets"></div>
  </div>

  <script>
    var HOUSES={1:{name:'Smoulders',color:'#E03C31',img:'Housesmoulders.png'},2:{name:'Darktide',color:'#00B4D8',img:'Housedarktide.png'},3:{name:'Stonebark',color:'#5CB338',img:'Housestonebark.png'},4:{name:'Ashenvale',color:'#90E0EF',img:'HouseAshenvale.png'},5:{name:'Stormrage',color:'#FFC800',img:'Housestormrage.png'},6:{name:'Nighthollow',color:'#7B2D8E',img:'Housenighthollow.png'},7:{name:'Dawnbringer',color:'#FF8C00',img:'HouseDwnbringer.png'},8:{name:'Manastorm',color:'#5B8FE0',img:'Housemanastorm.png'},9:{name:'Plaguemire',color:'#E84393',img:'Houseplaguemire.png'}};
    // Bright community colors for chart
    var COMMUNITY_COLORS=['#D4A64B','#00D4FF','#FF6B6B','#44cc44','#CC44DD','#FF8C00','#5B8FE0','#E84393','#90E0EF','#FFC800'];
    var myPlayerId=localStorage.getItem('player_id');
    var historyData=[];var communityData=[];var marketsLoaded=false;var disabledTags={};
    function toggleMobileMenu(){document.getElementById('hamburger').classList.toggle('active');document.getElementById('mobileMenu').classList.toggle('active')}
    function doLogout(){localStorage.removeItem('player_id');window.location.href='/'}
    if(localStorage.getItem('player_id')){var nl=document.getElementById('navLogout');var ml=document.getElementById('mobileLogout');if(nl)nl.style.display='';if(ml)ml.style.display='';}
    function switchTab(t){var c=document.querySelectorAll('.lb-content');for(var i=0;i<c.length;i++)c[i].classList.remove('active');var b=document.querySelectorAll('.lb-tab');for(var i=0;i<b.length;i++)b[i].classList.remove('active');var el=document.getElementById('tab-'+t);if(el)el.classList.add('active');event.target.classList.add('active');if(t==='markets'&&!marketsLoaded)loadMarkets()}
    function hImg(f,s){return '<img src="/assets/images/houses/'+f+'" style="width:'+s+'px;height:'+s+'px;object-fit:contain;" onerror="this.style.display=\'none\'">'}

    function renderPlayers(players){
      var c=document.getElementById('tab-players');
      if(!players||players.length===0){c.innerHTML='<div class="lb-empty">No players yet. Be the first!</div>';return}
      var html='';
      if(players.length>=3){
        var ml=['1ST','2ND','3RD'];
        html+='<div class="podium fade-up fade-up-1">';
        for(var i=0;i<3;i++){var p=players[i];var h=HOUSES[p.school_id]||{name:'?',color:'#888',img:''};
          var av=p.profile_image?'<img src="'+p.profile_image+'" alt="" class="podium-avatar">':'<div class="podium-avatar podium-avatar--placeholder">'+hImg(h.img,28)+'</div>';
          html+='<a href="https://x.com/'+p.twitter_handle+'" target="_blank" class="podium-slot podium-slot--'+(i+1)+'">'
            +'<span class="podium-medal">'+ml[i]+'</span>'+av
            +'<span class="podium-name">'+p.twitter_handle+'</span>'
            +hImg(h.img,18)
            +'<span class="podium-pts">'+p.seasonal_points+' pts</span>'
            +'<div class="podium-bar"></div></a>'}
        html+='</div>'}
      html+='<div class="lb-list">';
      for(var i=0;i<players.length;i++){var p=players[i];var h=HOUSES[p.school_id]||{name:'Unknown',color:'#888',img:''};
        var isYou=myPlayerId&&(String(p.id)===String(myPlayerId));
        var rc=i<3?'lb-rank--gold':'';var rowC=isYou?'lb-row lb-row--you':'lb-row';
        var av=p.profile_image?'<img src="'+p.profile_image+'" alt="" class="lb-avatar">':'<div class="lb-avatar--placeholder">'+hImg(h.img,22)+'</div>';
        var tag=p.community_tag?'<span class="lb-tag-badge">'+p.community_tag+'</span>':'';
        html+='<a href="https://x.com/'+p.twitter_handle+'" target="_blank" class="'+rowC+' fade-up">'
          +'<span class="lb-rank '+rc+'">'+(i+1)+'</span>'+av
          +'<div class="lb-info"><div class="lb-name">@'+p.twitter_handle+(isYou?' (you)':'')+'</div>'
          +'<div class="lb-meta">'+hImg(h.img,16)+' '+h.name+' '+tag+'</div></div>'
          +'<div class="lb-points"><div class="lb-points__val">'+p.seasonal_points+'</div><div class="lb-points__label">PTS</div></div></a>'}
      html+='</div>';c.innerHTML=html}

    function renderHouses(schools){
      var c=document.getElementById('tab-houses');
      if(!schools||schools.length===0){c.innerHTML='<div class="lb-empty">No house data yet.</div>';return}
      var mx=schools[0].total_points||1;var html='<div class="lb-list" style="margin-top:8px;">';
      for(var i=0;i<schools.length;i++){var s=schools[i];var h=HOUSES[s.school_id]||{name:'Unknown',color:'#888',img:''};
        var rc=i<3?'lb-rank--gold':'';var pct=Math.max(5,(s.total_points/mx)*100);
        html+='<div class="lb-row fade-up"><span class="lb-rank '+rc+'">'+(i+1)+'</span>'
          +'<img src="/assets/images/houses/'+h.img+'" class="lb-house-icon-lg" onerror="this.style.display=\'none\'">'
          +'<div class="lb-info"><div class="lb-name">'+h.name+'</div>'
          +'<div style="display:flex;align-items:center;gap:8px;margin-top:4px;">'
          +'<div style="flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,0.04);overflow:hidden;">'
          +'<div style="height:100%;width:'+pct+'%;border-radius:4px;background:linear-gradient(90deg,'+h.color+','+h.color+'88);"></div></div>'
          +'<span class="lb-members">'+(s.member_count||0)+' wizards</span></div></div>'
          +'<div class="lb-points"><div class="lb-points__val">'+(s.total_points||0)+'</div><div class="lb-points__label">PTS</div></div></div>'}
      var shown={};for(var i=0;i<schools.length;i++)shown[schools[i].school_id]=true;
      for(var id=1;id<=9;id++){if(!shown[id]){var h=HOUSES[id];
        html+='<div class="lb-row fade-up" style="opacity:0.5;"><span class="lb-rank">-</span>'
          +'<img src="/assets/images/houses/'+h.img+'" class="lb-house-icon-lg" onerror="this.style.display=\'none\'">'
          +'<div class="lb-info"><div class="lb-name">'+h.name+'</div><div class="lb-meta">No wizards yet</div></div>'
          +'<div class="lb-points"><div class="lb-points__val">0</div><div class="lb-points__label">PTS</div></div></div>'}}
      html+='</div>';c.innerHTML=html}

    function renderCommunities(communities){
      var c=document.getElementById('tab-communities');
      if(!communities||communities.length===0){c.innerHTML='<div class="lb-empty">No communities yet. Add a community tag in your profile!</div>';return}
      var html='<div class="lb-list" style="margin-top:8px;">';
      for(var i=0;i<communities.length;i++){var cm=communities[i];var rc=i<3?'lb-rank--gold':'';
        var initials=cm.community_tag.replace('$','').substring(0,3);
        html+='<div class="lb-row fade-up"><span class="lb-rank '+rc+'">'+(i+1)+'</span>'
          +'<div class="lb-community-icon">'+initials+'</div>'
          +'<div class="lb-info"><div class="lb-tag">'+cm.community_tag+'</div>'
          +'<div class="lb-meta">'+(cm.member_count||0)+' members</div></div>'
          +'<div class="lb-points"><div class="lb-points__val">'+(cm.total_points||0)+'</div><div class="lb-points__label">PTS</div></div></div>'}
      html+='</div>';c.innerHTML=html}

    // ═══════════════════════════════════
    // MARKETS TAB
    // ═══════════════════════════════════
    var mkChartDays=30;
    async function loadMarkets(){
      try{
        var res=await Promise.all([
          fetch('/api/leaderboards/history?days='+mkChartDays).then(function(r){return r.json()}),
          fetch('/api/leaderboards/communities').then(function(r){return r.json()}),
          fetch('/api/leaderboards/today').then(function(r){return r.json()})
        ]);
        historyData=res[0]||[];
        communityData=res[1]||[];
        var todayData=res[2]||{};
        marketsLoaded=true;
        renderMarketsTab(todayData);
      }catch(e){console.error('Markets load error:',e);document.getElementById('tab-markets').innerHTML='<div class="lb-empty">Error loading markets data.</div>'}
    }

    function renderMarketsTab(todayData){
      var el=document.getElementById('tab-markets');
      var totalMembers=0;communityData.forEach(function(c){totalMembers+=c.member_count||0});
      var html='<div class="mk-header"><div class="mk-title">Community Markets</div><div class="mk-stats">'+communityData.length+' communities · '+totalMembers+' warriors</div></div>'
        +'<div class="mk-sub">Track which communities are dominating Avaloris</div>'
        +'<div class="mk-card"><div class="mk-card-header"><div class="mk-card-title">POWER CHART</div><div class="mk-toggles">'
        +'<button class="mk-toggle'+(mkChartDays===7?' active':'')+'" onclick="setChartDays(7)">7D</button>'
        +'<button class="mk-toggle'+(mkChartDays===14?' active':'')+'" onclick="setChartDays(14)">14D</button>'
        +'<button class="mk-toggle'+(mkChartDays===30?' active':'')+'" onclick="setChartDays(30)">30D</button>'
        +'</div></div><div class="mk-chart-wrap"><canvas id="mkChart"></canvas></div><div class="mk-legend" id="mkLegend"></div></div>'
        +'<div class="mk-table-header"><div class="mk-table-title">COMMUNITY RANKINGS</div><div class="mk-sort">by total power</div></div>'
        +'<div id="mkRankings"></div>';
      el.innerHTML=html;
      drawCommunityChart();
      renderCommunityRankings(todayData);
    }

    function setChartDays(d){mkChartDays=d;marketsLoaded=false;loadMarkets()}

    function drawCommunityChart(){
      var canvas=document.getElementById('mkChart');if(!canvas)return;
      var ctx=canvas.getContext('2d');
      var wrap=canvas.parentElement;
      canvas.width=wrap.offsetWidth*2;canvas.height=440;
      var W=canvas.width;var H=canvas.height;
      var pad={top:20,right:80,bottom:40,left:50};

      // Get all community tags from history
      var allTags={};
      historyData.forEach(function(d){if(d.communities){Object.keys(d.communities).forEach(function(t){allTags[t]=true})}});
      var tags=Object.keys(allTags);

      // Build cumulative data
      var cumulative={};tags.forEach(function(t){cumulative[t]=[]});
      var running={};tags.forEach(function(t){running[t]=0});
      historyData.forEach(function(d){
        tags.forEach(function(t){
          running[t]+=(d.communities&&d.communities[t])||0;
          cumulative[t].push(running[t]);
        });
      });

      // Sort tags by final value
      tags.sort(function(a,b){return(running[b]||0)-(running[a]||0)});

      if(historyData.length<2||tags.length===0){
        ctx.fillStyle='#606070';ctx.font='24px Crimson Text';ctx.textAlign='center';
        ctx.fillText('More data needed for chart',W/2,H/2);return;
      }

      // Assign colors
      var tagColors={};tags.forEach(function(t,i){tagColors[t]=COMMUNITY_COLORS[i%COMMUNITY_COLORS.length]});

      // Find max
      var maxVal=0;tags.forEach(function(t){var last=cumulative[t][cumulative[t].length-1]||0;if(last>maxVal)maxVal=last});
      maxVal=Math.max(maxVal,10);
      var plotW=W-pad.left-pad.right;var plotH=H-pad.top-pad.bottom;

      // Grid
      ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
      for(var i=0;i<=4;i++){
        var y=pad.top+(plotH/4)*i;
        ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
        ctx.fillStyle='#606070';ctx.font='18px JetBrains Mono';ctx.textAlign='right';
        ctx.fillText(Math.round(maxVal-(maxVal/4)*i),pad.left-8,y+6);
      }

      // Date labels
      ctx.fillStyle='#606070';ctx.font='18px JetBrains Mono';ctx.textAlign='center';
      var step=Math.max(1,Math.floor(historyData.length/6));
      historyData.forEach(function(d,i){
        if(i%step===0||i===historyData.length-1){
          var x=pad.left+(plotW/(historyData.length-1))*i;
          ctx.fillText(d.date.slice(5),x,H-10);
        }
      });

      // Area fills + lines
      tags.forEach(function(t){
        if(disabledTags[t])return;
        var pts=cumulative[t];var color=tagColors[t];

        // Area fill
        ctx.fillStyle=color+'18';
        ctx.beginPath();
        pts.forEach(function(v,i){
          var x=pad.left+(plotW/(pts.length-1))*i;
          var y=pad.top+plotH-(v/maxVal)*plotH;
          if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        });
        ctx.lineTo(pad.left+(plotW/(pts.length-1))*(pts.length-1),pad.top+plotH);
        ctx.lineTo(pad.left,pad.top+plotH);ctx.closePath();ctx.fill();

        // Line
        ctx.strokeStyle=color;ctx.lineWidth=3;ctx.lineJoin='round';
        ctx.beginPath();
        pts.forEach(function(v,i){
          var x=pad.left+(plotW/(pts.length-1))*i;
          var y=pad.top+plotH-(v/maxVal)*plotH;
          if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        });
        ctx.stroke();

        // End dot
        var lastV=pts[pts.length-1];
        var lastX=pad.left+plotW;
        var lastY=pad.top+plotH-(lastV/maxVal)*plotH;
        ctx.fillStyle=color;ctx.beginPath();ctx.arc(lastX,lastY,6,0,Math.PI*2);ctx.fill();

        // End label
        ctx.fillStyle=color;ctx.font='bold 18px "Press Start 2P"';ctx.textAlign='left';
        ctx.fillText(t,lastX+12,lastY+5);
      });

      // Legend
      var legendEl=document.getElementById('mkLegend');var lh='';
      tags.forEach(function(t){
        var cls=disabledTags[t]?'mk-legend-item disabled':'mk-legend-item';
        lh+='<div class="'+cls+'" onclick="toggleTag(\''+t+'\')">'
          +'<div class="mk-legend-dot" style="background:'+tagColors[t]+';"></div> '+t+'</div>';
      });
      legendEl.innerHTML=lh;
    }

    function toggleTag(t){disabledTags[t]=!disabledTags[t];drawCommunityChart()}

    function renderCommunityRankings(todayData){
      var el=document.getElementById('mkRankings');if(!el)return;
      if(!communityData||communityData.length===0){el.innerHTML='<div class="lb-empty">No communities yet</div>';return}

      // Build 24h and 7d change data from history
      var todayComms=todayData.communities||[];
      var todayMap={};todayComms.forEach(function(c){todayMap[c.community_tag.toUpperCase()]=c.today_points||0});

      // Calculate 7d totals from history
      var last7=historyData.slice(-7);var last7totals={};
      last7.forEach(function(d){if(d.communities){Object.keys(d.communities).forEach(function(t){
        if(!last7totals[t])last7totals[t]=0;last7totals[t]+=d.communities[t]||0;
      })}});
      // Previous 7d
      var prev7=historyData.slice(-14,-7);var prev7totals={};
      prev7.forEach(function(d){if(d.communities){Object.keys(d.communities).forEach(function(t){
        if(!prev7totals[t])prev7totals[t]=0;prev7totals[t]+=d.communities[t]||0;
      })}});

      var html='';
      communityData.forEach(function(cm,i){
        var tag=cm.community_tag.toUpperCase();
        var initials=cm.community_tag.replace('$','').substring(0,3);
        var rc=i<3?'mk-row-rank--'+(i+1):'';
        var total=cm.total_points||0;

        // 24h change
        var today24=todayMap[tag]||0;
        var pct24=total>0?((today24/total)*100).toFixed(1):0;
        var pct24class=today24>0?'mk-pct--up':'mk-pct--flat';
        var pct24text=today24>0?'▲ '+pct24+'%':'—';

        // 7d change
        var cur7=last7totals[tag]||0;var prv7=prev7totals[tag]||0;
        var pct7=prv7>0?((cur7-prv7)/prv7*100).toFixed(1):cur7>0?100:0;
        var pct7class=pct7>0?'mk-pct--up':pct7<0?'mk-pct--down':'mk-pct--flat';
        var pct7text=pct7>0?'▲ '+pct7+'%':pct7<0?'▼ '+Math.abs(pct7)+'%':'—';

        // Sparkline (last 7 days)
        var sparkData=[];last7.forEach(function(d){sparkData.push((d.communities&&d.communities[tag])||0)});
        var sparkSvg=buildSparkline(sparkData,i);

        // Active today
        var activeToday=0;todayComms.forEach(function(c){if(c.community_tag.toUpperCase()===tag)activeToday=c.member_count||0});

        html+='<div class="mk-row">'
          +'<div class="mk-row-rank '+rc+'">'+(i+1)+'</div>'
          +'<div class="mk-row-icon"><div class="mk-row-icon__text">'+initials+'</div></div>'
          +'<div class="mk-row-info"><div class="mk-row-tag">'+cm.community_tag+'</div><div class="mk-row-members">'+(cm.member_count||0)+' members</div></div>'
          +'<div class="mk-row-power">'+total.toLocaleString()+'</div>'
          +'<div class="mk-row-changes"><span class="mk-pct '+pct24class+'">'+pct24text+'</span><span class="mk-pct '+pct7class+'">'+pct7text+'</span></div>'
          +sparkSvg
          +'<div class="mk-active"><div class="mk-active-dot"></div> '+activeToday+' today</div>'
          +'</div>';
      });
      el.innerHTML=html;
    }

    function buildSparkline(data,idx){
      if(!data||data.length<2)return '<div class="mk-spark"></div>';
      var mx=Math.max.apply(null,data)||1;
      var w=60;var h=24;var pts=[];
      data.forEach(function(v,i){
        var x=(i/(data.length-1))*w;
        var y=h-(v/mx)*h;
        pts.push(x.toFixed(1)+','+y.toFixed(1));
      });
      var last=data[data.length-1];var first=data[0];
      var color=last>=first?'#44cc44':'#cc4444';
      return '<svg class="mk-spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'
        +'<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    async function loadLeaderboards(){
      try{var r=await Promise.all([fetch('/api/leaderboards/players').then(function(r){return r.json()}),fetch('/api/leaderboards/schools').then(function(r){return r.json()}),fetch('/api/leaderboards/communities').then(function(r){return r.json()})]);
        renderPlayers(r[0]||[]);renderHouses(r[1]||[]);renderCommunities(r[2]||[]);
        var l=document.getElementById('loadingState');if(l)l.style.display='none';
      }catch(e){console.error('Leaderboards error:',e);var l=document.getElementById('loadingState');if(l)l.style.display='none';
        document.getElementById('tab-players').innerHTML='<div class="lb-empty">Error loading leaderboards.</div>'}}
    loadLeaderboards();
  </script>
