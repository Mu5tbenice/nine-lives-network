<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leaderboards | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    /* Tokens come from /css/variables-v2.css (Warm Night). Page-specific styles only below. */
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(212,166,75,0.06) 0%,transparent 50%),linear-gradient(180deg,#1a1528 0%,#120e1e 30%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body)}
    a{color:var(--gold);text-decoration:none}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}

    .main{max-width:500px;margin:0 auto;padding:14px 14px 80px}

    /* Header */
    .page-header{text-align:center;padding:10px 0 4px}
    .page-title{font-family:var(--font-title);font-size:22px;font-weight:800;color:var(--gold);letter-spacing:3px}
    .page-sub{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);margin-top:4px}

    /* Season progress */
    .season-bar{margin:10px 0 14px;padding:0 4px}
    .season-bar__track{height:4px;border-radius:2px;background:rgba(255,255,255,0.04);overflow:hidden}
    .season-bar__fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--sunset));transition:width 0.8s}
    .season-bar__labels{display:flex;justify-content:space-between;margin-top:4px;font-family:var(--font-mono);font-size:8px;color:var(--text-faint)}

    /* Section label */
    .section-label{display:flex;align-items:center;gap:8px;margin:18px 0 10px}
    .section-label__icon{font-size:14px}
    .section-label__text{font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
    .section-label__line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

    /* Tabs */
    .tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
    .tab{font-family:var(--font-mono);font-size:8px;font-weight:400;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all 0.15s}
    .tab.active{font-weight:700}
    .tab[data-color="gold"].active{color:var(--gold);border-color:rgba(212,166,75,0.25);background:var(--gold-dim)}
    .tab[data-color="sunset"].active{color:var(--sunset);border-color:rgba(232,133,90,0.25);background:rgba(232,133,90,0.1)}
    .tab[data-color="red"].active{color:var(--red);border-color:rgba(232,90,106,0.25);background:rgba(232,90,106,0.1)}
    .tab[data-color="cyan"].active{color:var(--cyan);border-color:rgba(106,200,216,0.25);background:rgba(106,200,216,0.1)}

    /* Podium */
    .podium{display:flex;gap:6px;margin-bottom:16px;align-items:flex-end}
    .podium__card{flex:1;text-align:center;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);animation:fadeSlideIn 0.4s ease both}
    .podium__card.first{padding:16px 8px 12px;border-color:rgba(212,166,75,0.25);background:linear-gradient(180deg,rgba(212,166,75,0.06),var(--bg-card))}
    .podium__card.second,.podium__card.third{padding:12px 8px 10px}
    .podium__medal{margin-bottom:4px}
    .podium__house{font-size:22px;margin-bottom:4px}
    .podium__card.first .podium__house{font-size:28px}
    .podium__name{font-family:var(--font-mono);font-size:10px;color:var(--text-bright);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .podium__pts{font-family:var(--font-data);font-size:9px;color:var(--gold);margin-top:4px}
    .podium__card.first .podium__pts{font-size:11px}
    .podium__label{font-family:var(--font-mono);font-size:8px;color:var(--text-faint);margin-top:2px}

    /* Player row */
    .lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:4px;transition:all 0.15s}
    .lb-row.top3{border-color:rgba(212,166,75,0.2)}
    .lb-row.me{border-color:rgba(106,200,216,0.3);background:rgba(106,200,216,0.04)}
    .lb-row:hover{background:rgba(30,22,42,0.9)}

    .rank{font-family:var(--font-data);font-size:10px;min-width:30px;text-align:center;color:var(--text-muted)}
    .rank-medal{font-size:18px;min-width:30px;text-align:center}

    /* Rank-delta arrows — visible movement vs yesterday's leaderboard.
       Positive (climbed) = green, negative (fell) = red, zero = muted dash.
       Tucked under the rank/medal so the position number stays the
       primary read; delta is ambient context. */
    .rank-cell{display:flex;flex-direction:column;align-items:center;min-width:30px;gap:1px}
    .rank-delta{font-family:var(--font-data);font-size:6px;letter-spacing:0.5px;line-height:1}
    .rank-delta--up{color:var(--green)}
    .rank-delta--down{color:var(--red)}
    .rank-delta--steady{color:var(--text-faint)}

    /* Streak fire — appears next to handle when streak >= 3.
       Inline with the name row so it reads as a status badge, not a separate UI. */
    .streak-fire{font-family:var(--font-data);font-size:8px;color:#FF8C00;letter-spacing:0.5px;display:inline-flex;align-items:center;gap:2px;text-shadow:0 0 6px rgba(255,140,0,0.4)}

    /* Gap-to-next — appears on YOU pin only. "23 pts behind @leader_handle"
       or "🏆 #1!" when at the top. Sub-line of the YOU pin. */
    .gap-to-next{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);font-style:italic;margin-top:1px}
    .gap-to-next strong{color:var(--cyan);font-style:normal;font-weight:600}

    .lb-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .lb-info{flex:1;min-width:0}
    .lb-name-row{display:flex;align-items:center;gap:6px}
    .lb-name{font-family:var(--font-mono);font-size:11px;color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-guild{font-family:var(--font-mono);font-size:8px;color:var(--text-faint);background:rgba(255,255,255,0.04);padding:1px 5px;border-radius:3px}
    .lb-house{font-family:var(--font-mono);font-size:8px;margin-top:2px}
    .lb-lvl{font-family:var(--font-data);font-size:7px;color:var(--gold);background:rgba(212,166,75,0.12);padding:1px 5px;border-radius:3px;border:1px solid rgba(212,166,75,0.2)}
    .lb-score{text-align:right;min-width:55px}
    .lb-score__val{font-family:var(--font-data);font-size:9px;color:var(--gold)}
    .lb-score__label{font-family:var(--font-mono);font-size:8px;color:var(--text-faint)}

    /* Sparkline canvas */
    .sparkline{display:block}

    /* House card */
    .house-card{padding:14px 16px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);border-left:3px solid;margin-bottom:6px}
    .house-card.top3{border-color:rgba(212,166,75,0.2)}
    .house-card__inner{display:flex;align-items:center;gap:12px}
    .house-card__icon{font-size:28px}
    .house-card__body{flex:1}
    .house-card__name{font-family:var(--font-title);font-size:15px;font-weight:700}
    .house-card__role{font-family:var(--font-mono);font-size:8px;color:var(--text-faint);margin-left:8px}
    .house-card__bar{height:8px;border-radius:4px;background:rgba(255,255,255,0.04);overflow:hidden;margin-top:6px}
    .house-card__fill{height:100%;border-radius:4px;transition:width 0.8s ease}
    .house-card__meta{display:flex;gap:12px;margin-top:6px;font-family:var(--font-mono);font-size:9px;color:var(--text-muted)}
    .house-card__score{text-align:right}
    .house-card__pts{font-family:var(--font-data);font-size:10px;color:var(--gold)}

    /* Chart container */
    .chart-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;margin-bottom:14px}
    .chart-legend{display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap}
    .chart-legend__item{display:flex;align-items:center;gap:4px}
    .chart-legend__dot{width:8px;height:3px;border-radius:1px}
    .chart-legend__name{font-family:var(--font-mono);font-size:8px;color:var(--text-faint)}

    /* Clash card */
    .clash-card{padding:14px 16px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:8px}
    .clash-card.live{border-color:rgba(106,200,216,0.3);background:rgba(106,200,216,0.04)}
    .clash-live-badge{display:flex;align-items:center;gap:6px;margin-bottom:10px}
    .clash-live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    .clash-live-text{font-family:var(--font-mono);font-size:9px;color:var(--green);font-weight:700;letter-spacing:1px}
    .clash-inner{display:flex;align-items:center;gap:8px}
    .clash-guild{flex:1;text-align:center}
    .clash-guild__name{font-family:var(--font-title);font-size:12px;font-weight:700}
    .clash-guild__name.dim{opacity:0.5}
    .clash-guild__score{font-family:var(--font-data);font-size:14px;margin-top:6px}
    .clash-guild__score.live{font-size:16px;color:var(--cyan)}
    .clash-guild__score.won{color:var(--green);text-shadow:0 0 8px rgba(106,205,138,0.3)}
    .clash-vs{font-family:var(--font-title);font-size:11px;color:var(--text-faint);width:40px;text-align:center;border-radius:8px;padding:4px 0}
    .clash-vs.live{background:rgba(106,200,216,0.1)}
    .clash-week{text-align:center;margin-top:8px;font-family:var(--font-mono);font-size:8px;color:var(--text-faint)}
    .clash-crown{font-size:10px;margin-top:4px}

    /* Standings table */
    .standings{border-radius:10px;overflow:hidden;border:1px solid var(--border);margin-bottom:16px}
    .standings__head{display:grid;grid-template-columns:1fr 36px 36px 50px;padding:8px 12px;background:var(--gold-dim);font-family:var(--font-mono);font-size:8px;color:var(--gold);font-weight:700;letter-spacing:1px}
    .standings__row{display:grid;grid-template-columns:1fr 36px 36px 50px;align-items:center;padding:10px 12px;border-top:1px solid var(--border)}
    .standings__row:nth-child(even){background:var(--bg-card)}
    .standings__guild{display:flex;align-items:center;gap:8px}
    .standings__dot{width:8px;height:8px;border-radius:50%}
    .standings__name{font-family:var(--font-mono);font-size:10px;color:var(--text-bright)}
    .standings__w{font-family:var(--font-data);font-size:9px;color:var(--green);text-align:center}
    .standings__l{font-family:var(--font-data);font-size:9px;color:var(--red);text-align:center}
    .standings__pts{font-family:var(--font-data);font-size:9px;color:var(--gold);text-align:right}

    /* Prize card */
    .prize-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:4px}
    .prize-icon{font-size:18px}
    .prize-text{flex:1;font-family:var(--font-mono);font-size:10px;color:var(--text-bright)}
    .prize-place{font-family:var(--font-data);font-size:8px;color:var(--gold)}

    /* Clash prizes */
    .clash-prizes{padding:14px 16px;border-radius:12px;background:linear-gradient(135deg,rgba(106,200,216,0.05),var(--bg-card));border:1px solid rgba(106,200,216,0.15);margin-bottom:8px}
    .clash-prizes__title{font-family:var(--font-title);font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:8px}
    .clash-prizes__item{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .clash-prizes__item-icon{font-size:14px}
    .clash-prizes__item-text{font-family:var(--font-mono);font-size:9px;color:var(--text-body)}

    /* Week label */
    .week-label{font-family:var(--font-mono);font-size:9px;color:var(--gold);margin:12px 0 6px;padding:4px 8px;background:var(--gold-dim);border-radius:4px;display:inline-block}

    /* Info box */
    .info-box{padding:10px 12px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:12px;font-family:var(--font-mono);font-size:9px;color:var(--text-muted);text-align:center}

    /* Empty state */
    .empty{text-align:center;padding:40px 20px;color:var(--text-faint);font-style:italic;font-family:var(--font-body)}

    /* Loading */
    .loading{text-align:center;padding:60px 20px}
    .loading .spinner{margin:0 auto 12px}
    /* .spinner + .spinner--lg / @keyframes spin live in components-v2.css */

    /* Admin bar */
    .admin-bar{background:rgba(232,90,106,0.08);border:1px solid rgba(232,90,106,0.2);border-radius:10px;padding:12px;margin-bottom:16px}
    .admin-bar__title{font-family:var(--font-title);font-size:11px;color:var(--red);font-weight:700;margin-bottom:8px;letter-spacing:1px}
    .admin-bar button{font-family:var(--font-mono);font-size:8px;padding:6px 12px;border-radius:6px;border:1px solid rgba(232,90,106,0.3);background:rgba(232,90,106,0.1);color:var(--red);cursor:pointer;margin:2px}
    .admin-bar button:hover{background:rgba(232,90,106,0.2)}

    /* Animations */
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

    /* Sub-tabs */
    .sub-tabs{display:flex;gap:4px;margin-bottom:12px}
    .sub-tab{font-family:var(--font-mono);font-size:8px;padding:6px 12px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:all 0.15s}
    .sub-tab.active{border-color:rgba(106,200,216,0.3);background:rgba(106,200,216,0.1);color:var(--cyan)}

    /* Modal */
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:#1a1528;border:1px solid var(--border-glow);border-radius:16px;padding:24px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto}
    .modal__title{font-family:var(--font-title);font-size:16px;color:var(--gold);margin-bottom:16px}
    .modal label{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);display:block;margin-bottom:4px;margin-top:10px}
    .modal input,.modal select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-deep);color:var(--text-bright);font-family:var(--font-mono);font-size:10px}
    .modal__actions{display:flex;gap:8px;margin-top:16px}
    .modal__btn{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font-title);font-size:12px;font-weight:700}
    .modal__btn.primary{background:linear-gradient(135deg,var(--gold),var(--sunset));color:#000}
    .modal__btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text-muted)}
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>
<body>
<script src="/js/nav.js"></script>

<div class="main" id="content">
  <div class="loading"><div class="spinner spinner--lg"></div></div>
</div>

<!-- Admin Clash Modal (hidden by default) -->
<div id="clashModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal__title">⚔️ Create Guild Clash</div>
    <label>Week Number</label>
    <input type="number" id="clashWeek" min="1" max="99" value="1">
    <label>Guild A Name</label>
    <input type="text" id="clashGuildA" placeholder="e.g. Bonk Legion">
    <label>Guild A Color</label>
    <input type="color" id="clashColorA" value="#FFD700">
    <label>Guild B Name</label>
    <input type="text" id="clashGuildB" placeholder="e.g. Shadow Paws">
    <label>Guild B Color</label>
    <input type="color" id="clashColorB" value="#00BFFF">
    <label>Status</label>
    <select id="clashStatus">
      <option value="upcoming">Upcoming</option>
      <option value="live">Live</option>
      <option value="complete">Complete</option>
    </select>
    <label>Score A (if complete/live)</label>
    <input type="number" id="clashScoreA" min="0" value="0">
    <label>Score B (if complete/live)</label>
    <input type="number" id="clashScoreB" min="0" value="0">
    <div class="modal__actions">
      <button class="modal__btn secondary" onclick="closeClashModal()">Cancel</button>
      <button class="modal__btn primary" onclick="saveClash()">Create Clash</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// HOUSES DATA
// ═══════════════════════════════════════
var HOUSES = {
  1:{name:'Smoulders',color:'#E03C31',icon:'🔥',role:'Glass Cannon'},
  2:{name:'Darktide',color:'#00B4D8',icon:'🌊',role:'Thief'},
  3:{name:'Stonebark',color:'#5CB338',icon:'🌿',role:'Wall'},
  4:{name:'Ashenvale',color:'#B0C4DE',icon:'💨',role:'Rogue'},
  5:{name:'Stormrage',color:'#FFC800',icon:'⚡',role:'Glass Cannon'},
  6:{name:'Nighthollow',color:'#7B2D8E',icon:'🌙',role:'Disruptor'},
  7:{name:'Dawnbringer',color:'#FF8C00',icon:'☀️',role:'Healer'},
  8:{name:'Manastorm',color:'#5B8FE0',icon:'🔮',role:'Controller'},
  9:{name:'Plaguemire',color:'#E84393',icon:'☠️',role:'DOT'}
};

var SEASON_PRIZES = [
  {place:'#1',prize:'Design a permanent spell card',icon:'✨'},
  {place:'#1-3',prize:'Named in Season 2 storyline',icon:'📖'},
  {place:'#1-5',prize:'Champion card frame + First Nine badge',icon:'👑'},
  {place:'#1-10',prize:'Council membership + Nines priority',icon:'🏛️'},
  {place:'🏠',prize:'Winning house gets exclusive seasonal spell',icon:'⚔️'}
];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
var playerId = null;
var currentTab = 'season';
var clashView = 'standings';
var isAdmin = false;
var data = { players:[], houses:[], duels:[], clashes:{ matches:[], standings:[] } };

function getPlayerId() {
  var p = new URLSearchParams(window.location.search);
  var f = p.get('player_id');
  if (f) { localStorage.setItem('player_id', f); return f; }
  return localStorage.getItem('player_id');
}

function checkAdmin() {
  var p = new URLSearchParams(window.location.search);
  return !!p.get('admin_key');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

// ═══════════════════════════════════════
// SPARKLINE
// ═══════════════════════════════════════
function drawSparkline(canvasId, dataPoints, color) {
  var canvas = document.getElementById(canvasId);
  if (!canvas || !dataPoints || !dataPoints.length) return;
  var ctx = canvas.getContext('2d');
  var w = 70, h = 22;
  var dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  var min = Math.min.apply(null, dataPoints);
  var max = Math.max.apply(null, dataPoints);
  var range = max - min || 1;
  var step = w / (dataPoints.length - 1);

  // Fill
  var grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '40');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.moveTo(0, h);
  dataPoints.forEach(function(v, i) {
    var x = i * step;
    var y = h - ((v - min) / range) * (h - 4) - 2;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  dataPoints.forEach(function(v, i) {
    var x = i * step;
    var y = h - ((v - min) / range) * (h - 4) - 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Dot
  var lastX = (dataPoints.length - 1) * step;
  var lastY = h - ((dataPoints[dataPoints.length - 1] - min) / range) * (h - 4) - 2;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 2, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

// ═══════════════════════════════════════
// HOUSE PROGRESSION CHART
// ═══════════════════════════════════════
function drawHouseChart(canvasId, houseData) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var w = 440, h = 140;
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  var pad = { l: 5, r: 5, t: 10, b: 20 };
  var cw = w - pad.l - pad.r;
  var ch = h - pad.t - pad.b;

  // If we have real data, use it. Otherwise generate mock
  var houseIds = Object.keys(houseData);
  if (houseIds.length === 0) {
    // Generate mock progression for top 5 houses
    var topHouses = data.houses.slice(0, 5);
    topHouses.forEach(function(hd) {
      houseData[hd.school_id] = [];
      var sum = 0;
      for (var d = 0; d < 14; d++) {
        sum += Math.round(50 + Math.random() * 150 + (hd.total_points / 50));
        houseData[hd.school_id].push(sum);
      }
    });
    houseIds = Object.keys(houseData);
  }

  if (houseIds.length === 0) return;

  var maxVal = 0;
  houseIds.forEach(function(hid) {
    var mx = Math.max.apply(null, houseData[hid]);
    if (mx > maxVal) maxVal = mx;
  });

  houseIds.forEach(function(hid) {
    var house = HOUSES[hid];
    if (!house) return;
    var pts = houseData[hid];
    var step = cw / (pts.length - 1);

    ctx.beginPath();
    pts.forEach(function(v, i) {
      var x = pad.l + i * step;
      var y = pad.t + ch - (v / maxVal) * ch;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = house.color + 'aa';
    ctx.lineWidth = 2;
    ctx.stroke();

    // End label
    var lastY = pad.t + ch - (pts[pts.length - 1] / maxVal) * ch;
    ctx.fillStyle = house.color;
    ctx.font = 'bold 9px JetBrains Mono, monospace';
    ctx.fillText(house.icon, pad.l + (pts.length - 1) * step + 4, lastY + 3);
  });

  // X labels
  ctx.fillStyle = '#6B5E50';
  ctx.font = '8px JetBrains Mono, monospace';
  var days = houseData[houseIds[0]] ? houseData[houseIds[0]].length : 14;
  var step = cw / (days - 1);
  for (var d = 0; d < days; d += 2) {
    ctx.fillText('D' + (d + 1), pad.l + d * step - 5, h - 4);
  }
}

// ═══════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════
async function loadAll() {
  playerId = getPlayerId();
  isAdmin = checkAdmin();

  // Per-endpoint failure tracking. Each .catch bumps the counter so we can
  // tell the difference between "no data yet" (200 with empty array) and
  // "network died" (all four endpoints threw). Empty-board copy stays for
  // partial failures; error state surfaces only when everything dies.
  var _loadFailures = 0;
  function catchAndFlag(fallback) {
    return function() { _loadFailures++; return fallback; };
  }

  try {
    var [pR, hR, dR, cR] = await Promise.all([
      fetch('/api/leaderboards/players').then(function(r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); }).catch(catchAndFlag([])),
      fetch('/api/leaderboards/schools').then(function(r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); }).catch(catchAndFlag([])),
      fetch('/api/leaderboards/duels').then(function(r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); }).catch(catchAndFlag([])),
      fetch('/api/leaderboards/clashes').then(function(r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); }).catch(catchAndFlag({ matches:[], standings:[] }))
    ]);

    if (_loadFailures === 4) {
      // Total network failure — surface a visible error state instead of
      // letting the page render four "no data yet" tabs that lie about
      // the underlying problem.
      var content = document.getElementById('content') || document.body;
      content.innerHTML =
        '<div style="text-align:center;padding:80px 20px;font-family:var(--font-body);">'
        + '<div style="font-size:48px;opacity:0.4;margin-bottom:14px;">&#9888;</div>'
        + '<h2 style="font-family:var(--font-title);font-size:20px;color:var(--text-bright);margin-bottom:8px;">leaderboards timed out</h2>'
        + '<p style="font-family:var(--font-mono);font-size:13px;color:var(--text-muted);font-style:italic;margin-bottom:18px;">"the void is being weird. try again."<br>— nerm</p>'
        + '<button onclick="window.location.reload()" style="font-family:var(--font-data);font-size:9px;padding:10px 22px;border-radius:8px;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border);cursor:pointer;letter-spacing:1.5px;">TRY AGAIN</button>'
        + '</div>';
      return;
    }

    data.players = Array.isArray(pR) ? pR : pR.players || [];
    data.houses = Array.isArray(hR) ? hR : hR.schools || hR.houses || [];
    data.duels = Array.isArray(dR) ? dR : dR.players || [];
    data.clashes = cR && cR.matches ? cR : { matches: [], standings: [] };

    // V5: Fetch levels for all players and merge
    try {
      var playerIds = data.players.map(function(p){ return p.id; });
      var levelPromises = playerIds.slice(0,50).map(function(id){
        return fetch('/api/levels/'+id).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
      });
      var levels = await Promise.all(levelPromises);
      var levelMap = {};
      levels.forEach(function(l){ if(l && l.player_id) levelMap[l.player_id]=l; });
      data.players.forEach(function(p){ if(levelMap[p.id]) p._level=levelMap[p.id].level; });
      data.duels.forEach(function(p){ if(levelMap[p.id]) p._level=levelMap[p.id].level; });
    } catch(e){ /* levels optional */ }
  } catch (e) {
    console.error('Failed to load leaderboard data:', e);
  }

  render();
}

// ═══════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════
function medal(rank) {
  if (rank === 1) return '<span class="rank-medal" style="filter:drop-shadow(0 0 4px rgba(255,215,0,0.5))">🥇</span>';
  if (rank === 2) return '<span class="rank-medal">🥈</span>';
  if (rank === 3) return '<span class="rank-medal">🥉</span>';
  return '<span class="rank">#' + rank + '</span>';
}

// Rank-delta arrow — paired with medal() inside .rank-cell. p.rank_change
// comes from the server: positive = climbed since yesterday, negative = fell,
// zero = steady. New players (no prev rank) come in as huge climbers, which
// is intentional — they should feel like they're entering the chart.
function rankDelta(p) {
  if (p == null || typeof p.rank_change !== 'number') return '';
  var c = p.rank_change;
  if (c > 0) return '<span class="rank-delta rank-delta--up">▲' + c + '</span>';
  if (c < 0) return '<span class="rank-delta rank-delta--down">▼' + Math.abs(c) + '</span>';
  return '<span class="rank-delta rank-delta--steady">—</span>';
}

// Streak fire — appears in the name row when streak >= 3. Day count makes the
// visible momentum tangible (a 7-day streak reads as a real commitment).
function streakBadge(p) {
  if (!p || !p.streak || p.streak < 3) return '';
  return '<span class="streak-fire">🔥 ' + p.streak + '</span>';
}

// Find current player in a ranked list. Returns {player, rank} or null.
// Used by mePin() to surface a sticky "YOU" row regardless of scroll depth.
function findMe(list) {
  if (!playerId || !list || !list.length) return null;
  for (var i = 0; i < list.length; i++) {
    if (list[i] && list[i].id == playerId) {
      return { player: list[i], rank: i + 1 };
    }
  }
  return null;
}

// Sticky "YOU" pin — appears above rankings when player exists in the
// list. Stays visible as the user scrolls so they always know where they
// stand. Tappable like any row to land on /p/<own-handle>. Per
// docs/ux-plan-mobile.md polish recommendation.
function mePin(found, opts) {
  if (!found) return '';
  opts = opts || {};
  var p = found.player;
  var rank = found.rank;
  var h = HOUSES[p.school_id] || { name:'?', color:'#888', icon:'🐱' };
  var handle = p.twitter_handle ? String(p.twitter_handle).toLowerCase() : null;
  var hrefAttr = handle ? ' href="/p/' + encodeURIComponent(handle) + '"' : '';
  var scoreVal, scoreLabel;
  if (opts.showDuels) {
    scoreVal = (p.duel_wins||0) + 'W';
    scoreLabel = (p.duel_losses||0) + 'L';
  } else {
    scoreVal = (p.seasonal_points||0).toLocaleString();
    scoreLabel = 'pts';
  }

  // Gap-to-next-rank — a concrete number the player is chasing. At #1 we
  // flip the framing to celebrate and call out the gap to #2 (defending the
  // crown). For Duels tab we don't have a points gap to compute, so skip.
  var gapHtml = '';
  if (!opts.showDuels && opts.fullList && opts.fullList.length) {
    if (rank === 1) {
      var second = opts.fullList[1];
      if (second) {
        var lead = (p.seasonal_points||0) - (second.seasonal_points||0);
        gapHtml = '<div class="gap-to-next">🏆 #1 — leading by <strong>' + lead.toLocaleString() + '</strong> pts</div>';
      } else {
        gapHtml = '<div class="gap-to-next">🏆 #1!</div>';
      }
    } else {
      var ahead = opts.fullList[rank - 2];
      if (ahead) {
        var diff = (ahead.seasonal_points||0) - (p.seasonal_points||0);
        gapHtml = '<div class="gap-to-next"><strong>' + diff.toLocaleString() + '</strong> pts behind @' + esc(ahead.twitter_handle || '???') + '</div>';
      }
    }
  }

  return '<a' + hrefAttr + ' class="lb-me-pin" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px;position:sticky;top:calc(var(--nav-height,76px) + 8px);z-index:50;padding:10px 12px;border-radius:10px;background:linear-gradient(180deg,rgba(106,200,216,0.18),rgba(106,200,216,0.06));border:1px solid rgba(106,200,216,0.45);box-shadow:0 4px 16px rgba(0,0,0,0.35),0 0 16px rgba(106,200,216,0.15);backdrop-filter:blur(8px);margin-bottom:10px;">'
    + '<div class="rank-cell" style="min-width:36px;">'
    + '<span style="font-family:var(--font-data);font-size:6px;color:var(--cyan);letter-spacing:1.5px;">YOU</span>'
    + '<span style="font-family:var(--font-data);font-size:11px;color:var(--text-bright);">#' + rank + '</span>'
    + rankDelta(p)
    + '</div>'
    + '<div class="lb-avatar" style="background:' + h.color + '20;border:2px solid ' + h.color + '40">' + h.icon + '</div>'
    + '<div class="lb-info" style="flex:1;min-width:0;">'
    + '<div class="lb-name-row"><span class="lb-name">@' + esc(p.twitter_handle || '???') + '</span>'
    + streakBadge(p)
    + (p._level ? '<span class="lb-lvl">Lv.' + p._level + '</span>' : '')
    + (p.guild_tag ? '<span class="lb-guild">' + esc(p.guild_tag) + '</span>' : '')
    + '</div>'
    + '<div class="lb-house" style="color:' + h.color + ';font-size:10px;">' + h.icon + ' ' + h.name + '</div>'
    + gapHtml
    + '</div>'
    + '<div class="lb-score" style="text-align:right;flex-shrink:0;">'
    + '<div class="lb-score__val" style="font-size:13px;color:var(--cyan);">' + scoreVal + '</div>'
    + '<div class="lb-score__label" style="font-size:7px;">' + scoreLabel + '</div>'
    + '</div>'
    + '</a>';
}

function playerRow(p, rank, opts) {
  opts = opts || {};
  var h = HOUSES[p.school_id] || { name:'?', color:'#888', icon:'🐱' };
  var isMe = playerId && (p.id == playerId);
  var delay = (rank - 1) * 0.03;
  var sparkId = 'spark_' + (opts.prefix || '') + p.id;

  var scoreHtml = '';
  if (opts.showDuels) {
    var wr = Math.round(((p.duel_wins||0) / ((p.duel_wins||0) + (p.duel_losses||0) || 1)) * 100);
    scoreHtml = '<div class="lb-score"><div class="lb-score__val" style="color:var(--green)">' + (p.duel_wins||0) + 'W</div><div style="font-family:var(--font-mono);font-size:8px;color:var(--red)">' + (p.duel_losses||0) + 'L <span style="color:var(--text-faint)">(' + wr + '%)</span></div></div>';
  } else {
    scoreHtml = '<div class="lb-score"><div class="lb-score__val">' + (p.seasonal_points||0).toLocaleString() + '</div><div class="lb-score__label">pts</div></div>';
  }

  // Wrap row in <a> so taps go to /p/<handle>. Falls back to <div> if no
  // handle (defensive — shouldn't happen given the data fetch). Inline
  // text-decoration override keeps the link styled like a row, not a link.
  const handle = p.twitter_handle ? String(p.twitter_handle).toLowerCase() : null;
  const tag = handle ? 'a' : 'div';
  const hrefAttr = handle ? ' href="/p/' + encodeURIComponent(handle) + '" style="text-decoration:none;color:inherit;display:block;"' : '';
  return '<' + tag + hrefAttr + ' class="lb-row' + (rank <= 3 ? ' top3' : '') + (isMe ? ' me' : '') + '" style="animation-delay:' + delay + 's;animation:fadeSlideIn 0.3s ease ' + delay + 's both;display:flex;align-items:center;gap:10px;">'
    + '<div class="rank-cell">' + medal(rank) + rankDelta(p) + '</div>'
    + '<div class="lb-avatar" style="background:' + h.color + '20;border:2px solid ' + h.color + '40">' + h.icon + '</div>'
    + '<div class="lb-info">'
    + '<div class="lb-name-row">'
    + (isMe ? '<span style="color:var(--cyan);font-size:10px">★</span> ' : '')
    + '<span class="lb-name">@' + esc(p.twitter_handle || '???') + '</span>'
    + streakBadge(p)
    + (p._level ? '<span class="lb-lvl">Lv.' + p._level + '</span>' : '')
    + (p.guild_tag ? '<span class="lb-guild">' + esc(p.guild_tag) + '</span>' : '')
    + '</div>'
    + '<div class="lb-house" style="color:' + h.color + '">' + h.icon + ' ' + h.name + '</div>'
    + '</div>'
    + '<canvas id="' + sparkId + '" class="sparkline" style="width:70px;height:22px"></canvas>'
    + scoreHtml
    + '</' + tag + '>';
}

          html += '<div class="standings__guild">' + medal(i + 1) + '<div class="standings__dot" style="background:' + (g.color||'#888') + '"></div>';
          html += '<span class="standings__name">' + esc(g.name) + '</span></div>';
          html += '<span class="standings__w">' + (g.w||0) + '</span>';
          html += '<span class="standings__l">' + (g.l||0) + '</span>';
          html += '<span class="standings__pts">' + (g.pts||0) + '</span>';
          html += '</div>';
        });
        html += '</div>';
      }

      // This week's matches
      var currentWeek = 0;
      matches.forEach(function(m) { if (m.week > currentWeek) currentWeek = m.week; });
      var thisWeek = matches.filter(function(m) { return m.week === currentWeek; });

      if (thisWeek.length > 0) {
        html += sectionLabel('⚡', 'THIS WEEK');
        thisWeek.forEach(function(c, i) { html += clashCard(c, i); });
      }

      if (standings.length === 0 && thisWeek.length === 0) {
        html += '<div class="empty">No guild clashes yet. ' + (isAdmin ? 'Use admin controls to create matchups!' : 'Coming soon!') + '</div>';
      }
    }

    if (clashView === 'matches') {
      if (matches.length > 0) {
        html += sectionLabel('📜', 'ALL MATCH RESULTS');
        // Group by week, newest first
        var weeks = {};
        matches.forEach(function(m) {
          if (!weeks[m.week]) weeks[m.week] = [];
          weeks[m.week].push(m);
        });
        var weekNums = Object.keys(weeks).sort(function(a,b){return b-a;});
        weekNums.forEach(function(w) {
          html += '<div class="week-label">WEEK ' + w + '</div>';
          weeks[w].forEach(function(c, i) { html += clashCard(c, i); });
        });
      } else {
        html += '<div class="empty">No matches played yet.</div>';
      }
    }

    // Clash Prizes
    html += sectionLabel('🎁', 'CLASH PRIZES');
    html += '<div class="clash-prizes">';
    html += '<div class="clash-prizes__title">Season Clash Champion</div>';
    var clashPrizes = [
      {icon:'👑', text:'"Warlord" title for your guild'},
      {icon:'⚔️', text:'Choose one featured clash matchup next season'},
      {icon:'📣', text:'Victory spotlight thread from @9LVNetwork'},
      {icon:'🔥', text:'Undefeated streak (3+ wins) = "Unbeatable" badge'}
    ];
    clashPrizes.forEach(function(cp) {
      html += '<div class="clash-prizes__item"><span class="clash-prizes__item-icon">' + cp.icon + '</span>';
      html += '<span class="clash-prizes__item-text">' + cp.text + '</span></div>';
    });
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;

  // Draw sparklines after DOM update
  requestAnimationFrame(function() {
    // Player sparklines (generate from seasonal_points as mock progression)
    var allPlayers = currentTab === 'duels' ? data.duels : data.players;
    var prefix = currentTab === 'duels' ? 'duel_' : 'season_';
    allPlayers.forEach(function(p) {
      var canvas = document.getElementById('spark_' + prefix + p.id);
      if (canvas) {
        var h = HOUSES[p.school_id] || { color: '#888' };
        // Generate a simple progression curve from the points
        var pts = p.seasonal_points || 0;
        var fakeHistory = [];
        for (var d = 0; d < 14; d++) {
          fakeHistory.push(Math.round(pts * (d + 1) / 14 * (0.8 + Math.random() * 0.4)));
        }
        fakeHistory[fakeHistory.length - 1] = pts; // ensure end matches
        drawSparkline('spark_' + prefix + p.id, fakeHistory, h.color);
      }
    });

    // House progression chart
    if (currentTab === 'houses') {
      drawHouseChart('houseChart', {});
    }
  });
}

function sectionLabel(icon, text) {
  return '<div class="section-label"><span class="section-label__icon">' + icon + '</span><span class="section-label__text">' + text + '</span><span class="section-label__line"></span></div>';
}

function clashCard(c, i) {
  var isLive = c.status === 'live';
  var isComplete = c.status === 'complete';
  var aWon = isComplete && (c.score_a||0) > (c.score_b||0);
  var bWon = isComplete && (c.score_b||0) > (c.score_a||0);
  var delay = i * 0.05;

  var h = '<div class="clash-card' + (isLive ? ' live' : '') + '" style="animation:fadeSlideIn 0.3s ease ' + delay + 's both">';

  if (isLive) {
    h += '<div class="clash-live-badge"><div class="clash-live-dot"></div><span class="clash-live-text">LIVE NOW</span></div>';
  }

  h += '<div class="clash-inner">';
  // Guild A
  h += '<div class="clash-guild">';
  h += '<div class="clash-guild__name' + (bWon ? ' dim' : '') + '" style="color:' + (aWon ? (c.color_a||'#fff') : '') + '">' + esc(c.guild_a) + '</div>';
  h += '<div class="clash-guild__score' + (isLive ? ' live' : '') + (aWon ? ' won' : '') + '">' + (c.score_a||0).toLocaleString() + '</div>';
  if (aWon) h += '<div class="clash-crown">👑</div>';
  h += '</div>';
  // VS
  h += '<div class="clash-vs' + (isLive ? ' live' : '') + '">' + (isLive ? '⚔️' : c.status === 'upcoming' ? 'TBD' : 'VS') + '</div>';
  // Guild B
  h += '<div class="clash-guild">';
  h += '<div class="clash-guild__name' + (aWon ? ' dim' : '') + '" style="color:' + (bWon ? (c.color_b||'#fff') : '') + '">' + esc(c.guild_b) + '</div>';
  h += '<div class="clash-guild__score' + (isLive ? ' live' : '') + (bWon ? ' won' : '') + '">' + (c.score_b||0).toLocaleString() + '</div>';
  if (bWon) h += '<div class="clash-crown">👑</div>';
  h += '</div>';
  h += '</div>';

  h += '<div class="clash-week">WEEK ' + c.week + '</div>';

  // Admin: edit buttons
  if (isAdmin) {
    h += '<div style="text-align:center;margin-top:8px;border-top:1px solid var(--border);padding-top:8px">';
    h += '<button onclick="editClash(' + c.id + ')" style="font-family:var(--font-mono);font-size:8px;padding:4px 10px;border-radius:4px;border:1px solid rgba(212,166,75,0.2);background:rgba(212,166,75,0.08);color:var(--gold);cursor:pointer;margin:0 2px">✏️ Edit</button>';
    h += '<button onclick="deleteClash(' + c.id + ')" style="font-family:var(--font-mono);font-size:8px;padding:4px 10px;border-radius:4px;border:1px solid rgba(232,90,106,0.2);background:rgba(232,90,106,0.08);color:var(--red);cursor:pointer;margin:0 2px">🗑️ Delete</button>';
    h += '</div>';
  }

  h += '</div>';
  return h;
}

// ═══════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════
function switchTab(t) { currentTab = t; render(); }
function switchClashView(v) { clashView = v; render(); }

// ═══════════════════════════════════════
// ADMIN: CLASH MANAGEMENT
// ═══════════════════════════════════════
var editingClashId = null;

function openClashModal() {
  editingClashId = null;
  document.getElementById('clashWeek').value = 1;
  document.getElementById('clashGuildA').value = '';
  document.getElementById('clashGuildB').value = '';
  document.getElementById('clashColorA').value = '#FFD700';
  document.getElementById('clashColorB').value = '#00BFFF';
  document.getElementById('clashStatus').value = 'upcoming';
  document.getElementById('clashScoreA').value = 0;
  document.getElementById('clashScoreB').value = 0;
  document.getElementById('clashModal').style.display = 'flex';
}

function closeClashModal() {
  document.getElementById('clashModal').style.display = 'none';
  editingClashId = null;
}

function editClash(id) {
  var match = (data.clashes.matches || []).find(function(m) { return m.id === id; });
  if (!match) return;
  editingClashId = id;
  document.getElementById('clashWeek').value = match.week;
  document.getElementById('clashGuildA').value = match.guild_a;
  document.getElementById('clashGuildB').value = match.guild_b;
  document.getElementById('clashColorA').value = match.color_a || '#FFD700';
  document.getElementById('clashColorB').value = match.color_b || '#00BFFF';
  document.getElementById('clashStatus').value = match.status;
  document.getElementById('clashScoreA').value = match.score_a || 0;
  document.getElementById('clashScoreB').value = match.score_b || 0;
  document.getElementById('clashModal').style.display = 'flex';
}

async function saveClash() {
  var adminKey = new URLSearchParams(window.location.search).get('admin_key');
  var payload = {
    week: parseInt(document.getElementById('clashWeek').value),
    guild_a: document.getElementById('clashGuildA').value.trim(),
    guild_b: document.getElementById('clashGuildB').value.trim(),
    color_a: document.getElementById('clashColorA').value,
    color_b: document.getElementById('clashColorB').value,
    status: document.getElementById('clashStatus').value,
    score_a: parseInt(document.getElementById('clashScoreA').value) || 0,
    score_b: parseInt(document.getElementById('clashScoreB').value) || 0
  };

  if (!payload.guild_a || !payload.guild_b) {
    alert('Please enter both guild names');
    return;
  }

  try {
    var url = editingClashId
      ? '/api/admin/clashes/' + editingClashId + '?admin_key=' + adminKey
      : '/api/admin/clashes?admin_key=' + adminKey;
    var method = editingClashId ? 'PUT' : 'POST';

    var r = await fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (r.ok) {
      closeClashModal();
      await refreshClashes();
    } else {
      var err = await r.json();
      alert('Error: ' + (err.error || 'Failed to save'));
    }
  } catch (e) {
    alert('Error saving clash: ' + e.message);
  }
}

async function deleteClash(id) {
  if (!confirm('Delete this clash matchup?')) return;
  var adminKey = new URLSearchParams(window.location.search).get('admin_key');
  try {
    await fetch('/api/admin/clashes/' + id + '?admin_key=' + adminKey, { method: 'DELETE' });
    await refreshClashes();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function refreshClashes() {
  try {
    var r = await fetch('/api/leaderboards/clashes');
    if (r.ok) {
      data.clashes = await r.json();
    }
  } catch (e) {}
  render();
}

// ═══════════════════════════════════════

// ═══════════════════════════════════════
loadAll();
</script>
