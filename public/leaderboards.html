<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leaderboards | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    :root{--bg-deep:#120e1e;--bg-warm:#1a1528;--bg-card:rgba(30,22,42,0.7);--border:rgba(212,166,75,0.12);--border-glow:rgba(212,166,75,0.3);--gold:#D4A64B;--gold-dim:rgba(212,166,75,0.15);--text-bright:#F5F0E8;--text-body:#D4C8B8;--text-muted:#9B8E7E;--text-faint:#6B5E50;--sunset:#e8855a;--green:#6acd8a;--red:#e85a6a;--cyan:#6ac8d8;--purple:#b088e8;--font-title:'Cinzel',serif;--font-body:'Crimson Text',Georgia,serif;--font-data:'Press Start 2P',monospace;--font-mono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(212,166,75,0.06) 0%,transparent 50%),linear-gradient(180deg,#1a1528 0%,#120e1e 30%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body)}
    a{color:var(--gold);text-decoration:none}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}
    .main{max-width:500px;margin:0 auto;padding:14px}
    .section-label{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
    .section-label__text{font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
    .section-label__line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

    .tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto}
    .tab{font-family:var(--font-mono);font-size:8px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all 0.15s}
    .tab.active{color:var(--gold);border-color:rgba(212,166,75,0.25);background:var(--gold-dim)}

    .lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:4px;transition:background 0.15s}
    .lb-row.top3{border-color:rgba(212,166,75,0.2)}
    .lb-row.me{border-color:var(--cyan);background:rgba(106,200,216,0.04)}
    .rank{font-family:var(--font-data);font-size:10px;min-width:30px;text-align:center}
    .lb-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--border)}
    .lb-name{flex:1;font-family:var(--font-mono);font-size:10px;color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-score{font-family:var(--font-data);font-size:9px;color:var(--gold)}

    .house-row{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:6px}
    .house-icon{font-size:24px}
    .house-bar{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,0.04);overflow:hidden}
    .house-fill{height:100%;border-radius:4px;transition:width 0.5s}
  </style>
</head>
<body>
<script src="/js/nav.js"></script>
  <div class="main" id="content"><div style="text-align:center;padding:60px 20px;"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div></div></div>

<script>
var HOUSES={1:{name:'Smoulders',color:'#E03C31',icon:'🔥'},2:{name:'Darktide',color:'#00B4D8',icon:'🌊'},3:{name:'Stonebark',color:'#5CB338',icon:'🌿'},4:{name:'Ashenvale',color:'#B0C4DE',icon:'💨'},5:{name:'Stormrage',color:'#FFC800',icon:'⚡'},6:{name:'Nighthollow',color:'#7B2D8E',icon:'🌙'},7:{name:'Dawnbringer',color:'#FF8C00',icon:'☀️'},8:{name:'Manastorm',color:'#5B8FE0',icon:'🔮'},9:{name:'Plaguemire',color:'#E84393',icon:'☠️'}};
var playerId=null,currentTab='season',data={};

function getPlayerId(){var p=new URLSearchParams(window.location.search);var f=p.get('player_id');if(f){localStorage.setItem('player_id',f);return f;}return localStorage.getItem('player_id');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

async function loadLeaderboards(){
  playerId=getPlayerId();
  try{
    var[sR,hR,dR]=await Promise.all([
      fetch('/api/leaderboards/players').then(function(r){return r.ok?r.json():[]}).catch(function(){return[];}),
      fetch('/api/leaderboards/schools').then(function(r){return r.ok?r.json():[]}).catch(function(){return[];}),
      fetch('/api/leaderboards/duels').then(function(r){return r.ok?r.json():[]}).catch(function(){return[];})
    ]);
    data.season=Array.isArray(sR)?sR:sR.players||sR.leaderboard||[];
    data.houses=Array.isArray(hR)?hR:hR.schools||hR.houses||[];
    data.duels=Array.isArray(dR)?dR:dR.players||dR.leaderboard||[];
  }catch(e){console.error(e);}
  render();
}

function render(){
  var html='';
  html+='<div class="section-label"><span style="font-size:14px;">🏆</span><span class="section-label__text">LEADERBOARDS</span><span class="section-label__line"></span></div>';

  // Tabs
  html+='<div class="tabs">';
  html+='<button class="tab '+(currentTab==='season'?'active':'')+'" onclick="switchTab(\'season\')">🏆 SEASON</button>';
  html+='<button class="tab '+(currentTab==='houses'?'active':'')+'" onclick="switchTab(\'houses\')">🏠 HOUSES</button>';
  html+='<button class="tab '+(currentTab==='duels'?'active':'')+'" onclick="switchTab(\'duels\')">⚔️ DUELS</button>';
  html+='</div>';

  if(currentTab==='houses'){
    var houses=data.houses||[];
    var maxPts=0;houses.forEach(function(h){if((h.total_points||h.points||0)>maxPts)maxPts=h.total_points||h.points||0;});
    if(houses.length>0){
      houses.sort(function(a,b){return(b.total_points||b.points||0)-(a.total_points||a.points||0);});
      houses.forEach(function(h,i){
        var house=HOUSES[h.school_id||h.id]||{name:'?',color:'#888',icon:'?'};
        var pts=h.total_points||h.points||0;
        var pct=maxPts?Math.round(pts/maxPts*100):0;
        html+='<div class="house-row">';
        html+='<span style="font-family:var(--font-data);font-size:10px;min-width:24px;">'+(i<3?['🥇','🥈','🥉'][i]:'#'+(i+1))+'</span>';
        html+='<span class="house-icon">'+house.icon+'</span>';
        html+='<div style="flex:1;"><div style="font-family:var(--font-title);font-size:12px;font-weight:700;color:'+house.color+';">'+house.name+'</div>';
        html+='<div class="house-bar"><div class="house-fill" style="width:'+pct+'%;background:'+house.color+';"></div></div></div>';
        html+='<span style="font-family:var(--font-data);font-size:9px;color:var(--gold);">'+pts.toLocaleString()+'</span>';
        html+='</div>';
      });
    }else{
      html+='<div style="text-align:center;padding:30px;color:var(--text-faint);font-style:italic;">No house data yet.</div>';
    }
  }else{
    var list=data[currentTab]||[];
    if(list.length>0){
      list.slice(0,25).forEach(function(p,i){
        var isMe=playerId&&(p.id==playerId||p.player_id==playerId);
        var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);
        var score=currentTab==='duels'?(p.duel_wins||p.wins||0):(p.seasonal_points||p.points||0);
        var label=currentTab==='duels'?'W':'pts';
        html+='<div class="lb-row '+(i<3?'top3':'')+(isMe?' me':'')+'">';
        html+='<span class="rank">'+medal+'</span>';
        if(p.profile_image)html+='<img class="lb-avatar" src="'+p.profile_image+'">';
        else html+='<div class="lb-avatar" style="background:var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:14px;">🐱</div>';
        html+='<span class="lb-name">'+(isMe?'<span style="color:var(--cyan);">★</span> ':'')+'@'+esc(p.twitter_handle||'???')+'</span>';
        html+='<span class="lb-score">'+score.toLocaleString()+' '+label+'</span>';
        html+='</div>';
      });
    }else{
      html+='<div style="text-align:center;padding:30px;color:var(--text-faint);font-style:italic;">No data yet. Be the first!</div>';
    }
  }

  document.getElementById('content').innerHTML=html;
}

function switchTab(t){currentTab=t;render();}
loadLeaderboards();
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
