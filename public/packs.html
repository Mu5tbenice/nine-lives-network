<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Open Packs | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    :root{--bg-deep:#120e1e;--bg-warm:#1a1528;--bg-card:rgba(30,22,42,0.7);--border:rgba(212,166,75,0.12);--border-glow:rgba(212,166,75,0.3);--gold:#D4A64B;--gold-dim:rgba(212,166,75,0.15);--text-bright:#F5F0E8;--text-body:#D4C8B8;--text-muted:#9B8E7E;--text-faint:#6B5E50;--sunset:#e8855a;--green:#6acd8a;--red:#e85a6a;--cyan:#6ac8d8;--purple:#b088e8;--font-title:'Cinzel',serif;--font-body:'Crimson Text',Georgia,serif;--font-data:'Press Start 2P',monospace;--font-mono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 30%,rgba(212,166,75,0.08) 0%,transparent 50%),linear-gradient(180deg,#1a1528 0%,#120e1e 30%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body)}
    a{color:var(--gold);text-decoration:none}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}
    .main{max-width:500px;margin:0 auto;padding:14px}
    .section-label{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
    .section-label__text{font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
    .section-label__line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

    .pack-card{border-radius:16px;background:var(--bg-card);border:1px solid var(--border-glow);padding:24px;text-align:center;margin-bottom:14px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
    .pack-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(212,166,75,0.15)}
    .pack-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(212,166,75,0.08) 0%,transparent 60%);pointer-events:none}

    .open-btn{width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-title);font-size:14px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,var(--gold),#c49030);color:#0a0810;box-shadow:0 4px 0 #8a6d2f,0 6px 16px rgba(212,166,75,0.25);transition:all 0.2s}
    .open-btn:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}

    @keyframes reveal{from{opacity:0;transform:scale(0.8) rotateY(90deg)}to{opacity:1;transform:scale(1) rotateY(0deg)}}
    .revealed-card{animation:reveal 0.5s ease both;border-radius:12px;background:var(--bg-card);border:1.5px solid var(--border);padding:14px;text-align:center}

    .odds-table{width:100%;border-collapse:collapse;margin-top:8px}
    .odds-table td{padding:6px 10px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:9px}
    .odds-table td:first-child{color:var(--text-body)}
    .odds-table td:last-child{text-align:right;color:var(--text-faint)}
  </style>
</head>
<body>
<script src="/js/nav.js"></script>
  <div class="main" id="content"><div style="text-align:center;padding:60px 20px;"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div></div></div>

<script>
var RARITY_COLORS={common:'#bbb',uncommon:'#6acd8a',rare:'#5588ff',epic:'#b088e8',legendary:'#ffd700'};
var playerId=null;
function getPlayerId(){var p=new URLSearchParams(window.location.search);var f=p.get('player_id');if(f){localStorage.setItem('player_id',f);return f;}return localStorage.getItem('player_id');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

async function loadPacks(){
  playerId=getPlayerId();
  if(!playerId){document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px"><a href="/register.html" style="font-family:var(--font-title);font-size:16px;">Register to play →</a></div>';return;}

  var player={};
  try{var pR=await fetch('/api/players/'+playerId);if(pR.ok)player=await pR.json();}catch(e){}

  var html='';
  html+='<div class="section-label"><span style="font-size:14px;">🎴</span><span class="section-label__text">OPEN PACKS</span><span class="section-label__line"></span></div>';

  // Daily pack
  html+='<div class="pack-card" id="dailyPack">';
  html+='<div style="font-size:56px;margin-bottom:12px;">🎴</div>';
  html+='<div style="font-family:var(--font-title);font-size:20px;font-weight:700;color:var(--text-bright);letter-spacing:2px;">Daily Pack</div>';
  html+='<div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin:8px 0;">3 random spell cards</div>';
  html+='<div style="font-family:var(--font-data);font-size:8px;color:var(--green);margin-bottom:12px;">FREE — 1 per day</div>';
  html+='<button class="open-btn" id="openDaily" onclick="openPack(\'daily\')">🎴 OPEN DAILY PACK</button>';
  html+='</div>';

  // Revealed cards area
  html+='<div id="revealArea"></div>';

  // Pack odds
  html+='<div class="section-label" style="margin-top:20px;"><span style="font-size:14px;">📊</span><span class="section-label__text">DROP RATES</span><span class="section-label__line"></span></div>';
  html+='<div style="border-radius:10px;background:var(--bg-card);border:1px solid var(--border);padding:4px 0;">';
  html+='<table class="odds-table">';
  html+='<tr><td><span style="color:#bbb;">★</span> Common</td><td>50%</td></tr>';
  html+='<tr><td><span style="color:#6acd8a;">★★</span> Uncommon</td><td>30%</td></tr>';
  html+='<tr><td><span style="color:#5588ff;">★★★</span> Rare</td><td>14%</td></tr>';
  html+='<tr><td><span style="color:#b088e8;">★★★★</span> Epic</td><td>5%</td></tr>';
  html+='<tr><td><span style="color:#ffd700;">★★★★★</span> Legendary</td><td>1%</td></tr>';
  html+='</table></div>';

  document.getElementById('content').innerHTML=html;
}

async function openPack(type){
  var btn=document.getElementById('openDaily');
  btn.disabled=true;btn.textContent='OPENING...';

  try{
    var r=await fetch('/api/packs/open',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:playerId,pack_type:type})});
    if(r.ok){
      var res=await r.json();
      var cards=res.cards||res||[];
      revealCards(cards);
      btn.textContent='✅ OPENED!';
    }else{
      var err=await r.json().catch(function(){return{error:'Failed'};});
      btn.textContent='❌ '+(err.error||'Failed');
      setTimeout(function(){btn.textContent='🎴 OPEN DAILY PACK';btn.disabled=false;},2000);
    }
  }catch(e){
    btn.textContent='❌ Network error';
    setTimeout(function(){btn.textContent='🎴 OPEN DAILY PACK';btn.disabled=false;},2000);
  }
}

function revealCards(cards){
  var area=document.getElementById('revealArea');
  var h='<div class="section-label"><span style="font-size:14px;">✨</span><span class="section-label__text">YOU GOT</span><span class="section-label__line"></span></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;">';
  cards.forEach(function(c,i){
    var rc=RARITY_COLORS[(c.rarity||'common').toLowerCase()]||'#bbb';
    h+='<div class="revealed-card" style="animation-delay:'+(i*0.2)+'s;border-color:'+rc+'40;">';
    if(c.image_url)h+='<img src="'+c.image_url+'" style="width:100%;height:70px;object-fit:cover;border-radius:6px;margin-bottom:6px;">';
    else h+='<div style="font-size:32px;margin-bottom:6px;">🃏</div>';
    h+='<div style="font-family:var(--font-title);font-size:11px;font-weight:700;color:var(--text-bright);line-height:1.2;">'+esc(c.name)+'</div>';
    h+='<div style="font-family:var(--font-data);font-size:6px;color:'+rc+';margin:4px 0;">'+(c.rarity||'common').toUpperCase()+'</div>';
    h+='<div style="display:flex;justify-content:center;gap:6px;">';
    h+='<span style="font-family:var(--font-data);font-size:7px;color:var(--red);">⚔️'+(c.base_atk||c.atk||'?')+'</span>';
    h+='<span style="font-family:var(--font-data);font-size:7px;color:var(--green);">💚'+(c.base_hp||c.hp||'?')+'</span>';
    h+='</div></div>';
  });
  h+='</div>';
  h+='<a href="/builder.html">Your Nine</a> <a href="/packs.html">Packs</a></li><li><a href="/collection.html" style="display:block;text-align:center;font-family:var(--font-title);font-size:13px;color:var(--gold);margin-bottom:14px;">View Spellbook →</a>';
  area.innerHTML=h;
}

loadPacks();
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
