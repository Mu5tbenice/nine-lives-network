<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting… | Nine Lives Network</title>
  <meta http-equiv="refresh" content="0; url=/nethara-live.html">
</head>
<body>
<!-- §9.91+ / §9.98: redirect-only. zone-battle.html was a manual-trigger
     combat artifact superseded by /nethara-live.html in PR #242. Dormant
     legacy render stripped in PR #?. -->
<script>
  (function() {
    try {
      var params = new URLSearchParams(window.location.search);
      var zoneId = params.get('zone_id') || params.get('id');
      var dest = '/nethara-live.html' + (zoneId ? '?zone_id=' + encodeURIComponent(zoneId) : '');
      window.location.replace(dest);
    } catch (e) {
      window.location.replace('/nethara-live.html');
    }
  })();
</script>
<noscript><p>Redirecting to <a href="/nethara-live.html">/nethara-live.html</a>…</p></noscript>
</body>
</html>
