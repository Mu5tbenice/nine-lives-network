<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone Battle — Nine Lives Network</title>
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0612;color:#D4C8B8;font-family:'Crimson Text',serif;min-height:100vh;overflow-x:hidden}
    .wrap{max-width:560px;margin:0 auto;min-height:100vh}
    /* Your Nine panel */
    .yn{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;gap:12px;align-items:center}
    .yn-sprite{position:relative;flex-shrink:0}
    .yn-sprite canvas{image-rendering:pixelated;border-radius:6px}
    .yn-sprite-glow{position:absolute;inset:-4px;border-radius:10px;animation:playerGlow 2s ease-in-out infinite;pointer-events:none}
    .yn-info{flex:1;min-width:0}
    .yn-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#D4A64B;display:flex;align-items:center;gap:6px}
    .yn-house{font-family:'JetBrains Mono',monospace;font-size:8px;margin-top:2px}
    .yn-guild{font-family:'JetBrains Mono',monospace;font-size:7px;color:#554E68;margin-top:1px}
    .yn-hpwrap{margin-top:6px}
    .yn-hpbar{height:8px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
    .yn-hpfill{height:100%;border-radius:3px;transition:width .5s}
    .yn-hptext{font-family:'JetBrains Mono',monospace;font-size:8px;color:#554E68;margin-top:2px;display:flex;justify-content:space-between}
    .yn-stats{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
    .yn-stat{font-family:'JetBrains Mono',monospace;font-size:7px;padding:2px 6px;border-radius:3px;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
    .yn-spell{margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 8px;
      border-radius:4px;display:inline-flex;align-items:center;gap:4px}
    /* Spell tooltip */
    .spell-tip{position:fixed;z-index:500;min-width:160px;max-width:220px;padding:10px 12px;
      background:rgba(14,10,24,.97);border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.8);
      backdrop-filter:blur(12px);pointer-events:none;display:none}
    .spell-tip.on{display:block}
    .spell-tip-name{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:#F0ECF8;margin-bottom:4px}
    .spell-tip-type{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;text-transform:uppercase;
      padding:1px 6px;border-radius:3px;display:inline-block;margin-bottom:6px}
    .spell-tip-stats{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
    .spell-tip-stat{font-family:'JetBrains Mono',monospace;font-size:7px;padding:2px 5px;border-radius:3px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .spell-tip-fx{font-family:'JetBrains Mono',monospace;font-size:7px;padding:2px 5px;border-radius:3px}
    .spell-tip-house{font-family:'JetBrains Mono',monospace;font-size:7px;color:#554E68;margin-top:3px}
    /* Header */
    .bh{padding:14px 16px 8px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:flex-start}
    .bh-back{background:none;border:none;color:#847C98;font-size:18px;cursor:pointer;padding:2px 8px 2px 0;font-family:'Cinzel',serif}
    .bh-back:hover{color:#F0ECF8}
    .bh-title{font-family:'Cinzel',serif;font-size:17px;font-weight:800;color:#D4A64B;letter-spacing:2px}
    .bh-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:#554E68;margin-top:2px}
    .bh-live{font-family:'Press Start 2P',monospace;font-size:6px;color:#e85a6a;background:rgba(232,90,106,.08);
      padding:3px 8px;border-radius:4px;border:1px solid rgba(232,90,106,.15);display:none}
    .bh-live.on{display:block;animation:livePulse 1.5s infinite}
    /* Guild bar */
    .gb{padding:6px 16px;display:flex;gap:5px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.06);position:relative}
    .gb-item{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:6px;cursor:pointer;
      flex-shrink:0;transition:all .2s;position:relative;user-select:none}
    .gb-dot{width:5px;height:5px;border-radius:50%}
    .gb-short{font-family:'Press Start 2P',monospace;font-size:5.5px}
    .gb-count{font-family:'JetBrains Mono',monospace;font-size:7px}
    .gb-hp{font-family:'JetBrains Mono',monospace;font-size:6px;color:#554E68}
    .gb-arrow{font-size:8px;color:#554E68;transition:transform .2s}
    .gb-arrow.open{transform:rotate(180deg)}
    /* Roster dropdown */
    .roster{position:absolute;top:100%;left:0;margin-top:4px;z-index:200;min-width:200px;
      background:rgba(14,10,24,.97);border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,.7);
      padding:6px 0;backdrop-filter:blur(8px);display:none}
    .roster.open{display:block}
    .roster-hdr{padding:4px 12px 6px;font-family:'Press Start 2P',monospace;font-size:5px;letter-spacing:1px;margin-bottom:4px}
    .roster-nine{display:flex;align-items:center;gap:6px;padding:5px 12px;cursor:pointer;
      border-left:2px solid transparent;transition:all .15s}
    .roster-nine:hover,.roster-nine.sel{background:rgba(255,255,255,.08)}
    .roster-nine.sel{border-left-color:currentColor}
    .roster-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .roster-name{font-family:'JetBrains Mono',monospace;font-size:9px;color:#F0ECF8}
    .roster-name.dead{color:#554E68;text-decoration:line-through}
    .roster-spell{font-family:'JetBrains Mono',monospace;font-size:6px;margin-top:1px;opacity:.7}
    .roster-house{font-family:'JetBrains Mono',monospace;font-size:7px;color:#554E68;margin-left:auto}
    .roster-hp{font-family:'JetBrains Mono',monospace;font-size:7px;margin-left:4px}
    /* Nerm */
    .nerm{margin:6px 12px;display:flex;align-items:flex-start;gap:8px;padding:7px 12px;
      background:rgba(25,18,36,.92);border:1px solid rgba(212,166,75,.12);border-radius:10px;
      box-shadow:0 4px 20px rgba(0,0,0,.5);animation:nermIn .25s ease;display:none}
    .nerm.on{display:flex}
    .nerm-face{font-size:18px;flex-shrink:0;animation:nermBounce .4s ease}
    .nerm-label{font-family:'Press Start 2P',monospace;font-size:5px;color:#D4A64B;margin-bottom:2px;letter-spacing:1px}
    .nerm-text{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:#D4C8B8;line-height:1.5;font-style:italic}
    /* Arena */
    .arena{margin:6px auto;position:relative;width:540px;max-width:100%;height:360px;
      background:linear-gradient(180deg,#06030c,#0a0614 25%,#0e081a 55%,#080412);
      border-radius:10px;overflow:hidden;border:1px solid rgba(212,166,75,.08);
      box-shadow:inset 0 0 60px rgba(0,0,0,.5)}
    .arena-ground{position:absolute;bottom:0;left:0;right:0;height:25px;background:linear-gradient(180deg,transparent,rgba(15,8,24,.5))}
    /* Nine container */
    .nine{position:absolute;display:flex;flex-direction:column;align-items:center;gap:0;transition:opacity .25s}
    .nine canvas{image-rendering:pixelated}
    .nine-hp{height:3px;background:#0a0612;border:1px solid #1a1628;border-radius:1px}
    .nine-hpfill{height:100%;border-radius:1px;transition:width .35s}
    .nine-name{font-family:'Press Start 2P',monospace;font-size:3px;margin-top:1px;white-space:nowrap}
    .nine-glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none}
    /* Spell projectile */
    .spell{position:absolute;z-index:50;pointer-events:none}
    .spell-glow{position:absolute;border-radius:50%}
    .spell-core{border-radius:50%}
    .spell-dot{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;opacity:.9}
    /* Sparkle */
    .sparkle{position:absolute;pointer-events:none;z-index:55}
    /* Damage number */
    .dmg{position:absolute;z-index:70;pointer-events:none;font-family:'Press Start 2P',monospace}
    .dmg-damage{font-size:8px;color:#e85a6a;animation:dmgFloat 1.5s ease-out forwards}
    .dmg-crit{font-size:10px;color:#FFE844;animation:dmgFloat 1.5s ease-out forwards}
    .dmg-ko{font-size:12px;color:#ff4444;animation:koFloat 1.8s ease-out forwards}
    .dmg-super{font-size:6px;color:#FFE844;animation:superFloat 1.2s ease-out forwards}
    .dmg-resist{font-size:6px;color:#777;animation:superFloat 1.2s ease-out forwards}
    /* Kill feed */
    .kf{padding:6px 12px}
    .kf-hdr{font-family:'Press Start 2P',monospace;font-size:5px;color:#554E68;letter-spacing:1px;margin-bottom:4px}
    .kf-list{max-height:180px;overflow:hidden}
    .kf-item{display:flex;align-items:center;gap:4px;padding:3px 8px;margin-bottom:2px;
      background:rgba(232,90,106,.03);border-radius:4px;flex-wrap:wrap;
      animation:kfFadeIn .5s ease;transition:opacity .5s}
    @keyframes kfFadeIn{from{opacity:0;transform:translateY(-8px);max-height:0}to{opacity:1;transform:translateY(0);max-height:40px}}
    .kf-name{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700}
    .kf-action{font-family:'Press Start 2P',monospace;font-size:4.5px;color:#e85a6a}
    .kf-with{font-family:'Press Start 2P',monospace;font-size:4.5px;color:#554E68}
    .kf-spell{font-family:'JetBrains Mono',monospace;font-size:7.5px;padding:1px 5px;border-radius:3px}
    /* Begin button */
    .begin-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:100}
    .begin-btn{font-family:'Cinzel',serif;font-size:15px;font-weight:800;color:#D4A64B;
      background:linear-gradient(180deg,rgba(212,166,75,.1),rgba(212,166,75,.03));
      border:2px solid rgba(212,166,75,.2);border-radius:12px;padding:12px 32px;cursor:pointer;
      letter-spacing:3px;text-shadow:0 0 18px rgba(212,166,75,.35);animation:formPulse 2s ease-in-out infinite;
      backdrop-filter:blur(4px)}
    .begin-btn:hover{border-color:rgba(212,166,75,.4)}
    /* Zone info */
    .zinfo{padding:10px 16px 50px;border-top:1px solid rgba(255,255,255,.05);margin-top:4px}
    .zinfo-title{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:#D4A64B;margin-bottom:8px}
    .tri{flex:1;min-width:100px;padding:6px 8px;border-radius:6px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
    .tri-label{font-family:'JetBrains Mono',monospace;font-size:7px;color:#847C98;margin-bottom:3px}
    .tri-flow{font-family:'Press Start 2P',monospace;font-size:6px;color:#D4C8B8}
    /* Animations */
    @keyframes livePulse{0%,100%{opacity:.6}50%{opacity:1}}
    @keyframes nermIn{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes nermBounce{0%{transform:scale(1)}30%{transform:scale(1.15) rotate(-5deg)}100%{transform:scale(1)}}
    @keyframes spriteIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
    @keyframes spriteHurt{0%{transform:translate(0)}20%{transform:translate(-4px,-2px)}40%{transform:translate(3px,1px)}100%{transform:translate(0)}}
    @keyframes spriteCast{0%{transform:scale(1)}30%{transform:scale(1.15) translateY(-4px)}100%{transform:scale(1)}}
    @keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1)}12%{opacity:1;transform:translateY(-8px) scale(1.7)}100%{opacity:0;transform:translateY(-65px) scale(.4)}}
    @keyframes koFloat{0%{opacity:1;transform:translateY(0) scale(2.2)}20%{opacity:1;transform:translateY(-15px) scale(1.4)}100%{opacity:0;transform:translateY(-75px) scale(.3)}}
    @keyframes superFloat{0%{opacity:1;transform:translateY(0) scale(.7)}20%{opacity:1;transform:translateY(-6px) scale(1.1)}100%{opacity:0;transform:translateY(-40px) scale(.5)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
    @keyframes formPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,166,75,.25)}50%{box-shadow:0 0 28px 8px rgba(212,166,75,.1)}}
    @keyframes playerGlow{0%,100%{box-shadow:0 0 8px 2px rgba(212,166,75,.35)}50%{box-shadow:0 0 18px 5px rgba(212,166,75,.65)}}
    @keyframes hlGlow{0%,100%{box-shadow:0 0 10px 3px rgba(255,255,255,.25)}50%{box-shadow:0 0 20px 5px rgba(255,255,255,.5)}}
    @keyframes glow{0%,100%{opacity:.3}50%{opacity:.7}}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
</head>

<!-- §9.91+: zone-battle.html was a manual-trigger combat artifact (admin/dev).
     Superseded by /nethara-live.html which auto-runs the round loop via
     Socket.io. Redirect shim carries ?zone_id forward; legacy render
     stays below as JS-disabled fallback. -->
<script>
  (function() {
    try {
      var params = new URLSearchParams(window.location.search);
      var zoneId = params.get('zone_id');
      var dest = '/nethara-live.html' + (zoneId ? '?zone_id=' + encodeURIComponent(zoneId) : '');
      window.location.replace(dest);
    } catch (e) { /* fall through to legacy render */ }
  })();
</script>

// GENERATE MOCK BATTLE DATA
// ═══════════════════════════════════════
function generateBattle(zoneData){
  var gc=3+Math.floor(Math.random()*2);
  var used={};var gids=[];
  while(gids.length<gc){var g=1+Math.floor(Math.random()*5);if(!used[g]){used[g]=1;gids.push(g);}}
  var nines=[];var ni=0;var pi=Math.floor(Math.random()*20);
  gids.forEach(function(gid){
    var cnt=5+Math.floor(Math.random()*3);
    for(var i=0;i<cnt;i++){
      var house=HKEYS[Math.floor(Math.random()*HKEYS.length)];
      var ch=Math.random()>.15?HKEYS[Math.floor(Math.random()*HKEYS.length)]:'universal';
      var vfx=VFX[ch]||VFX.universal;
      var cfg=null;
      try{cfg=NineSprite.randomConfig(house,ni*777+42+gid*333);}catch(e){}
      if(!cfg)cfg={fur:{color:'#3a3a4a',style:'solid'},hat:{color:'#D4A64B',style:'pointed'},eyes:{color:HOUSE[house].c,style:'default'},robe:{color:'#1a3a5a',style:'basic'},weapon:{color:vfx.colors[0],style:'staff'},accessory:{color:'#D4A64B',style:'none'},expression:{color:'#2a2a3a',style:'neutral'}};
      else cfg.weapon.color=vfx.colors[0];
      nines.push({id:ni,name:NAMES[ni%NAMES.length],house:house,guild:gid,cardHouse:ch,cfg:cfg,
        spellName:pick(vfx.cards),wc:vfx.colors[0],spd:HOUSE[house].spd||5,
        hp:100,maxHp:100,alive:true,isPlayer:ni===pi});
      ni++;
    }
  });
  return{nines:nines,gids:gids};
}

var B=null; // battle state

function initBattle(zoneData){
  var data=generateBattle(zoneData);
  B={
    phase:'formation',nines:data.nines,gids:data.gids,
    pos:{},wp:{},spells:[],sparkles:[],dmgs:[],killFeed:[],
    hovGuild:null,openGuild:null,hlId:null,
    nerm:null,nermTimeout:null,
    raf:null,frame:0,spellCount:0,spellId:0,sparkleId:0,dmgId:0,kfThrottle:false
  };
  // Init positions
  var gg={};B.nines.forEach(function(n){if(!gg[n.guild])gg[n.guild]=[];gg[n.guild].push(n.id);});
  var lw=AW/(B.gids.length+.5);
  B.gids.forEach(function(gid,gi){
    var cx=lw*(gi+.75);var members=gg[gid]||[];
    var cols=Math.min(3,members.length);
    members.forEach(function(id,mi){
      var row=Math.floor(mi/cols);var col=mi%cols;
      var x=Math.max(MG,Math.min(AW-MG,cx+(col-(cols-1)/2)*46));
      var y=Math.max(MG+10,Math.min(AH-MG,AH/2-Math.ceil(members.length/cols)*22+row*44+(col%2)*10));
      B.pos[id]={x:x,y:y};B.wp[id]={x:x,y:y};
    });
  });
  renderPage(zoneData);
  startRoaming();
  startRenderLoop();
}

function showSpellTip(spellName,rect){
  var tip=document.getElementById('spell-tip');if(!tip)return;
  var sd=SPELL_DATA[spellName];if(!sd){tip.className='spell-tip';return;}
  var hm=HOUSE[sd.house]||{c:'#D4A64B',i:'✨'};
  var tc=TYPE_COLORS[sd.type]||'#D4A64B';
  document.getElementById('st-name').textContent=spellName;
  var typeEl=document.getElementById('st-type');
  typeEl.textContent=sd.tier+' '+sd.type;typeEl.style.color=tc;typeEl.style.background=tc+'15';typeEl.style.borderColor=tc+'30';
  var statsHtml='';
  if(sd.atk)statsHtml+='<span class="spell-tip-stat" style="color:#e85a6a;border-color:#e85a6a25">ATK '+sd.atk+'</span>';
  if(sd.hp)statsHtml+='<span class="spell-tip-stat" style="color:#6acd8a;border-color:#6acd8a25">HP '+sd.hp+'</span>';
  if(sd.spd)statsHtml+='<span class="spell-tip-stat" style="color:#6ac8d8;border-color:#6ac8d825">SPD '+sd.spd+'</span>';
  if(sd.def)statsHtml+='<span class="spell-tip-stat" style="color:#b088e8;border-color:#b088e825">DEF '+sd.def+'</span>';
  if(sd.luck)statsHtml+='<span class="spell-tip-stat" style="color:#D4A64B;border-color:#D4A64B25">LUCK '+sd.luck+'</span>';
  document.getElementById('st-stats').innerHTML=statsHtml;
  var fxHtml='';sd.fx.forEach(function(f){fxHtml+='<span class="spell-tip-fx" style="color:'+hm.c+';background:'+hm.c+'12;border:1px solid '+hm.c+'20;margin-right:3px">'+f+'</span>';});
  document.getElementById('st-fx').innerHTML=fxHtml;
  document.getElementById('st-house').textContent=hm.i+' '+(sd.house==='universal'?'Universal':sd.house.charAt(0).toUpperCase()+sd.house.slice(1));
  tip.style.left=Math.min(rect.right+8,window.innerWidth-230)+'px';
  tip.style.top=Math.max(8,rect.top-20)+'px';
  tip.className='spell-tip on';
  tip.style.borderColor=hm.c+'30';
}
function hideSpellTip(){var tip=document.getElementById('spell-tip');if(tip)tip.className='spell-tip';}

// ═══════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════
function bindEvents(){
  // Begin combat
  var btn=document.getElementById('begin-btn');
  if(btn)btn.onclick=function(){startCombat();};

  // Guild bar
  document.querySelectorAll('.gb-item').forEach(function(el){
    var gid=parseInt(el.dataset.gid);
    el.onmouseenter=function(){B.hovGuild=gid;updateDimming();};
    el.onmouseleave=function(){B.hovGuild=null;updateDimming();};
    el.onclick=function(e){
      e.stopPropagation();
      if(B.openGuild===gid){B.openGuild=null;}else{B.openGuild=gid;}
      B.hlId=null;
      updateRosters();updateHighlight();
    };
  });
  // Roster clicks + tooltip
  document.querySelectorAll('.roster-nine').forEach(function(el){
    el.onclick=function(e){
      e.stopPropagation();
      var nid=parseInt(el.dataset.rnid);
      if(B.hlId===nid)B.hlId=null;else B.hlId=nid;
      updateHighlight();updateRosters();
    };
    el.onmouseenter=function(){
      var spell=el.dataset.spell;if(spell)showSpellTip(spell,el.getBoundingClientRect());
    };
    el.onmouseleave=function(){hideSpellTip();};
  });
  // Click arena to deselect
  var arena=document.getElementById('arena');
  if(arena)arena.onclick=function(){B.openGuild=null;B.hlId=null;updateRosters();updateHighlight();};
}

function updateDimming(){
  B.nines.forEach(function(n){
    var el=document.getElementById('nine-'+n.id);
    if(!el)return;
    var dim=B.hovGuild!==null&&n.guild!==B.hovGuild;
    el.style.opacity=dim?'.15':'1';
  });
}
function updateRosters(){
  B.gids.forEach(function(gid){
    var r=document.getElementById('roster-'+gid);
    var a=document.getElementById('ga-'+gid);
    if(r)r.className='roster'+(B.openGuild===gid?' open':'');
    if(a)a.className='gb-arrow'+(B.openGuild===gid?' open':'');
  });
}
function updateHighlight(){
  B.nines.forEach(function(n){
    var hl=document.getElementById('hl-'+n.id);
    if(hl)hl.style.display=(B.hlId===n.id&&n.alive)?'block':'none';
    var el=document.getElementById('nine-'+n.id);
    if(el)el.style.zIndex=(B.hlId===n.id)?'30':(n.alive?'10':'1');
    if(el)el.style.filter=(B.hlId===n.id)?'brightness(1.3)':'none';
  });
  // Roster selection
  document.querySelectorAll('.roster-nine').forEach(function(el){
    var nid=parseInt(el.dataset.rnid);
    el.className='roster-nine'+(B.hlId===nid?' sel':'');
  });
}
function updateGuildStats(){
  B.gids.forEach(function(gid){
    var members=B.nines.filter(function(n){return n.guild===gid});
    var alive=members.filter(function(n){return n.alive}).length;
    var total=members.length;
    var hp=members.reduce(function(s,n){return s+(n.alive?n.hp:0)},0);
    var el=document.getElementById('gc-'+gid);
    if(el){el.textContent=alive+'/'+total;el.style.color=alive>0?'#6acd8a':'#e85a6a';}
    var hpEl=document.getElementById('ghp-'+gid);
    if(hpEl&&B.phase==='combat')hpEl.textContent=hp+'hp';
  });
  // Update roster HP
  B.nines.forEach(function(n){
    var el=document.getElementById('rhp-'+n.id);
    if(el){el.textContent=n.hp;el.style.color=n.alive?'#6acd8a':'#e85a6a';}
    var nel=document.getElementById('rn-'+n.id);
    if(nel)nel.className='roster-name'+(n.alive?'':' dead');
  });
}
function updateNineVisual(n){
  var hpf=document.getElementById('hpf-'+n.id);
  if(hpf){
    var p=Math.max(0,n.hp/n.maxHp);
    hpf.style.width=(p*100)+'%';
    hpf.style.background=p>.5?'#6acd8a':p>.25?'#D4A64B':'#e85a6a';
  }
  var hpEl=document.getElementById('hp-'+n.id);
  if(hpEl)hpEl.style.display=n.alive?'block':'none';
  var cv=document.getElementById('cv-'+n.id);
  if(cv){
    cv.style.filter=n.alive?'none':'grayscale(.8) brightness(.25)';
    cv.style.opacity=n.alive?'1':'.2';
    cv.style.animation=n.alive?'spriteIdle 2s ease-in-out infinite':'none';
  }
  var nm=document.getElementById('nm-'+n.id);
  if(nm){
    var g=GUILDS[n.guild]||{color:'#888'};
    nm.style.color=n.alive?(n.isPlayer?'#D4A64B':g.color):(g.color+'22');
  }
  // Update Your Nine panel if this is the player
  if(n.isPlayer){
    var ynHpf=document.getElementById('yn-hpfill');
    var ynHpt=document.getElementById('yn-hptext');
    var ynSt=document.getElementById('yn-status');
    if(ynHpf){
      var pp=Math.max(0,n.hp/n.maxHp);
      ynHpf.style.width=(pp*100)+'%';
      ynHpf.style.background=pp>.5?'#6acd8a':pp>.25?'#D4A64B':'#e85a6a';
    }
    if(ynHpt)ynHpt.textContent=n.hp+' / '+n.maxHp+' HP';
    if(ynSt){ynSt.textContent=n.alive?'ALIVE':'KO\'D';ynSt.style.color=n.alive?'#6acd8a':'#e85a6a';}
    var yncv=document.getElementById('yn-cv');
    if(yncv){yncv.style.filter=n.alive?'none':'grayscale(.8) brightness(.25)';yncv.style.opacity=n.alive?'1':'.35';}
  }
}

// ═══════════════════════════════════════
// NERM
// ═══════════════════════════════════════
function showNerm(text,dur){
  dur=dur||4000;
  var box=document.getElementById('nerm-box');
  var txt=document.getElementById('nerm-text');
  if(!box||!txt)return;
  txt.textContent=text;
  box.className='nerm on';
  if(B.nermTimeout)clearTimeout(B.nermTimeout);
  B.nermTimeout=setTimeout(function(){box.className='nerm';},dur);
}

// ═══════════════════════════════════════
// ROAMING
// ═══════════════════════════════════════
function startRoaming(){
  setInterval(function(){
    if(!B)return;
    B.nines.forEach(function(n){
      var c=B.pos[n.id];var t=B.wp[n.id];if(!c||!t)return;
      var spd=B.phase==='combat'?.8:.5;
      c.x+=(t.x-c.x)*.03*spd;
      c.y+=(t.y-c.y)*.03*spd;
      var chance=B.phase==='combat'?.015:.007;
      if(Math.random()<chance){
        var members=B.nines.filter(function(m){return m.guild===n.guild});
        var ax=members.reduce(function(s,m){return s+(B.pos[m.id]?B.pos[m.id].x:0)},0)/members.length;
        var ay=members.reduce(function(s,m){return s+(B.pos[m.id]?B.pos[m.id].y:0)},0)/members.length;
        var rad=B.phase==='combat'?95:60;var a=Math.random()*Math.PI*2;var r=Math.random()*rad;
        B.wp[n.id]={x:Math.max(MG,Math.min(AW-MG,ax+Math.cos(a)*r)),y:Math.max(MG+10,Math.min(AH-MG,ay+Math.sin(a)*r))};
      }
      // Update DOM position
      var el=document.getElementById('nine-'+n.id);
      if(el){el.style.left=(c.x-SPX/2)+'px';el.style.top=(c.y-SPX/2)+'px';}
    });
  },33);
}

// ═══════════════════════════════════════
// SPELL SYSTEM
// ═══════════════════════════════════════
function fireSpell(fromId,toId,cardHouse){
  var vfx=VFX[cardHouse]||VFX.universal;
  var fp=B.pos[fromId]||{x:0,y:0};var tp=B.pos[toId]||{x:0,y:0};
  // Flip caster to face target
  var cv=document.getElementById('cv-'+fromId);
  if(cv){
    var fromN=B.nines.find(function(n){return n.id===fromId});
    if(fromN&&fromN.cfg){
      try{NineSprite.draw(cv.getContext('2d'),fromN.cfg,tp.x<fp.x);}catch(e){}
    }
    cv.style.animation='spriteCast .35s ease';
    setTimeout(function(){if(cv)cv.style.animation='spriteIdle 2s ease-in-out infinite';},350);
  }
  var color=pick(vfx.colors);var speed=vfx.speed[0]+Math.random()*(vfx.speed[1]-vfx.speed[0]);
  var spell={id:B.spellId++,fid:fromId,tid:toId,color:color,speed:speed,
    x:fp.x,y:fp.y,wobble:(Math.random()-.5)*1.8,age:0,
    ch:cardHouse,trail:vfx.trail,colors:vfx.colors,imp:vfx.impact,
    spellName:pick(vfx.cards)};
  B.spells.push(spell);
  // Create DOM element
  var arena=document.getElementById('arena');
  if(arena){
    var el=document.createElement('div');
    el.className='spell';el.id='sp-'+spell.id;
    el.innerHTML='<div class="spell-glow" style="left:-16px;top:-16px;width:40px;height:40px;background:radial-gradient('+color+'66,'+color+'22 40%,transparent 70%)"></div>'+
      '<div class="spell-core" style="width:8px;height:8px;background:'+color+';box-shadow:0 0 8px '+color+'dd,0 0 16px '+color+'55,0 0 24px '+color+'22"></div>'+
      '<div class="spell-dot" style="left:2px;top:2px"></div>';
    el.style.left=(spell.x-4)+'px';el.style.top=(spell.y-4)+'px';
    arena.appendChild(el);
  }
  return spell;
}
function spawnSparkles(x,y,colors,count){
  var arena=document.getElementById('arena');if(!arena)return;
  for(var i=0;i<count;i++){
    var s={id:B.sparkleId++,x:x+(Math.random()-.5)*8,y:y+(Math.random()-.5)*8,
      vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.8-.3,
      color:colors[Math.floor(Math.random()*colors.length)],
      sz:1+Math.floor(Math.random()*2),life:1,decay:.016+Math.random()*.012};
    B.sparkles.push(s);
    var el=document.createElement('div');el.className='sparkle';el.id='sk-'+s.id;
    el.style.cssText='left:'+s.x+'px;top:'+s.y+'px;width:'+s.sz+'px;height:'+s.sz+'px;background:'+s.color+';border-radius:'+(s.sz>1?'50%':'0')+';box-shadow:0 0 '+s.sz*3+'px '+s.color+'aa';
    arena.appendChild(el);
  }
}
function spawnFirework(x,y,colors,count){
  var arena=document.getElementById('arena');if(!arena)return;
  for(var i=0;i<count;i++){
    var a=(Math.PI*2/count)*i+Math.random()*.4;var spd=1.8+Math.random()*3.5;
    var s={id:B.sparkleId++,x:x,y:y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1.2,
      color:colors[Math.floor(Math.random()*colors.length)],sz:1+Math.floor(Math.random()*3),life:1,decay:.01+Math.random()*.013};
    B.sparkles.push(s);
    var el=document.createElement('div');el.className='sparkle';el.id='sk-'+s.id;
    el.style.cssText='left:'+s.x+'px;top:'+s.y+'px;width:'+s.sz+'px;height:'+s.sz+'px;background:'+s.color+';border-radius:'+(s.sz>1?'50%':'0');
    arena.appendChild(el);
  }
  // White ring
  for(var j=0;j<8;j++){
    var a2=(Math.PI*2/8)*j;
    var s2={id:B.sparkleId++,x:x,y:y,vx:Math.cos(a2),vy:Math.sin(a2)-.6,color:'#FFF',sz:1,life:.7,decay:.022};
    B.sparkles.push(s2);
    var el2=document.createElement('div');el2.className='sparkle';el2.id='sk-'+s2.id;
    el2.style.cssText='left:'+s2.x+'px;top:'+s2.y+'px;width:1px;height:1px;background:#FFF;border-radius:50%';
    arena.appendChild(el2);
  }
}
function spawnDmg(x,y,value,type){
  var arena=document.getElementById('arena');if(!arena)return;
  var id=B.dmgId++;
  var prefix=type==='damage'?'-':type==='crit'?'-':'';
  var el=document.createElement('div');el.className='dmg dmg-'+type;el.id='dm-'+id;
  el.style.left=(x+(Math.random()-.5)*16)+'px';el.style.top=y+'px';
  el.style.textShadow='0 0 10px currentColor,0 2px 8px rgba(0,0,0,.95)';
  el.textContent=prefix+value;
  arena.appendChild(el);
  setTimeout(function(){var e=document.getElementById('dm-'+id);if(e)e.remove();},2000);
}
function addKill(killer,victim,killerGuild,victimGuild,spell,cardHouse){
  var kg=GUILDS[killerGuild]||{color:'#fff'};var vg=GUILDS[victimGuild]||{color:'#999'};var hm=HOUSE[cardHouse]||{c:'#D4A64B',i:'✨'};
  B.killFeed.unshift({k:killer,v:victim,kg:kg,vg:vg,spell:spell,hc:hm.c,hi:hm.i,t:Date.now()});
  if(B.killFeed.length>6)B.killFeed=B.killFeed.slice(0,6);
  // Throttle: only update DOM at most once per 800ms
  if(B.kfThrottle)return;
  B.kfThrottle=true;
  setTimeout(function(){B.kfThrottle=false;renderKillFeed();},800);
  renderKillFeed();
}
function renderKillFeed(){
  var kfEl=document.getElementById('killfeed');if(kfEl)kfEl.style.display='block';
  var list=document.getElementById('kf-list');if(!list)return;
  list.innerHTML=B.killFeed.map(function(k,i){
    return'<div class="kf-item" style="opacity:'+(1-i*.15)+'">'+
      '<span class="kf-name" style="color:'+k.kg.color+'">@'+k.k+'</span>'+
      '<span class="kf-action">pwnd</span>'+
      '<span class="kf-name" style="color:'+k.vg.color+';font-weight:400">@'+k.v+'</span>'+
      '<span class="kf-with">with</span>'+
      '<span class="kf-spell" style="color:'+k.hc+';background:'+k.hc+'12;border:1px solid '+k.hc+'20">'+k.hi+' '+k.spell+'</span></div>';
  }).join('');
}

// ═══════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════
function startRenderLoop(){
  function loop(){
    if(!B)return;
    B.frame++;
    // Update spells
    var alive=[];
    B.spells.forEach(function(s){
      var tp=B.pos[s.tid]||{x:AW/2,y:AH/2};
      var dx=tp.x-s.x;var dy=tp.y-s.y;var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<10){
        // IMPACT
        spawnFirework(tp.x,tp.y,s.colors,s.imp);
        var tgt=B.nines.find(function(n){return n.id===s.tid});
        var atk=B.nines.find(function(n){return n.id===s.fid});
        if(tgt&&tgt.alive){
          var dmg=6+Math.floor(Math.random()*12);var cr=Math.random()<.1;if(cr)dmg*=2;
          var mu='n';
          if(atk&&MATCHUPS[atk.house]){
            if(MATCHUPS[atk.house].s===tgt.house){mu='s';dmg=Math.floor(dmg*1.3);}
            else if(MATCHUPS[atk.house].w===tgt.house){mu='r';dmg=Math.floor(dmg*.8);}
          }
          spawnDmg(tp.x,tp.y-20,dmg,cr?'crit':'damage');
          if(mu==='s')spawnDmg(tp.x+8,tp.y-32,'SUPER','super');
          if(mu==='r')spawnDmg(tp.x+8,tp.y-32,'RESIST','resist');
          if(cr&&Math.random()<.35)showNerm(pick(NERM_LINES.crit),3000);
          if(mu==='s'&&Math.random()<.25)showNerm(pick(NERM_LINES.superEff),3000);
          tgt.hp=Math.max(0,tgt.hp-dmg);
          if(atk)tgt.lastHitBy=atk.id;
          if(tgt.hp<=0){
            tgt.alive=false;
            spawnFirework(tp.x,tp.y,['#FF4444','#FF8844','#FFCC33','#FFF'],22);
            spawnDmg(tp.x,tp.y-40,'💀 KO!','ko');
            if(atk){
              var killMsg='@'+atk.name+' DELETED @'+tgt.name+' with '+s.spellName+'. Vile.';
              showNerm(killMsg,4200);
              addKill(atk.name,tgt.name,atk.guild,tgt.guild,s.spellName,s.ch);
            }
          }
          // Hurt animation
          var tcv=document.getElementById('cv-'+s.tid);
          if(tcv){tcv.style.animation='spriteHurt .25s ease';setTimeout(function(){if(tcv&&tgt.alive)tcv.style.animation='spriteIdle 2s ease-in-out infinite';},280);}
          updateNineVisual(tgt);
          updateGuildStats();
        }
        var spEl=document.getElementById('sp-'+s.id);if(spEl)spEl.remove();
        return;
      }
      // Move
      s.x+=(dx/dist)*s.speed;s.y+=(dy/dist)*s.speed+Math.sin(s.age*.25)*s.wobble;s.age++;
      if(s.age%2===0)spawnSparkles(s.x,s.y,s.colors,s.trail);
      var spEl=document.getElementById('sp-'+s.id);
      if(spEl){spEl.style.left=(s.x-4)+'px';spEl.style.top=(s.y-4)+'px';}
      alive.push(s);
    });
    B.spells=alive;

    // Update sparkles
    var aliveS=[];
    B.sparkles.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life-=p.decay;
      if(p.life<=0){var el=document.getElementById('sk-'+p.id);if(el)el.remove();return;}
      var el=document.getElementById('sk-'+p.id);
      if(el){el.style.left=p.x+'px';el.style.top=p.y+'px';el.style.opacity=p.life;
        el.style.boxShadow=p.life>.4?'0 0 '+p.sz*3+'px '+p.color+'aa':'none';}
      aliveS.push(p);
    });
    B.sparkles=aliveS;

    // Fire spells in combat
    if(B.phase==='combat'){
      if(B.frame%14===0){
        var al=B.nines.filter(function(n){return n.alive});
        if(al.length>=2){
          var sorted=al.slice().sort(function(a,b){return(b.spd||5)-(a.spd||5)});
          var caster=sorted[Math.floor(Math.random()*Math.min(5,sorted.length))];
          var en=al.filter(function(n){return n.guild!==caster.guild});
          if(en.length){
            // Random weighted targeting: 50% random, 25% retaliatory, 25% lowest HP
            var tgt;var roll=Math.random();
            if(roll<.5){tgt=en[Math.floor(Math.random()*en.length)];}
            else if(roll<.75&&caster.lastHitBy!=null){var ret=en.find(function(n){return n.id===caster.lastHitBy});tgt=ret||en[Math.floor(Math.random()*en.length)];}
            else{tgt=en.reduce(function(a,b){return a.hp<b.hp?a:b});}
            fireSpell(caster.id,tgt.id,caster.cardHouse);
            B.spellCount++;
            if(B.spellCount%7===0&&Math.random()<.3)showNerm(pick(NERM_LINES.cast),2500);
          }
        }
      }
      // Burst
      if(B.frame%85===42){
        if(Math.random()<.3)showNerm(pick(NERM_LINES.chaos),3200);
        for(var i=0;i<5;i++){(function(delay){setTimeout(function(){
          if(!B||B.phase!=='combat')return;
          var al=B.nines.filter(function(n){return n.alive});if(al.length<2)return;
          var a=al[Math.floor(Math.random()*al.length)];
          var en=al.filter(function(n){return n.guild!==a.guild});if(!en.length)return;
          var t;var roll=Math.random();
          if(roll<.6){t=en[Math.floor(Math.random()*en.length)];}
          else{t=en.reduce(function(a,b){return a.hp<b.hp?a:b});}
          fireSpell(a.id,t.id,a.cardHouse);
        },delay);})(i*90);}
      }
      // Quiet
      if(B.frame%260===200&&B.spellCount<4)showNerm(pick(NERM_LINES.quiet),3000);
      // Regen
      if(B.frame%170===0){B.nines.forEach(function(n){if(n.alive)n.hp=Math.min(n.maxHp,n.hp+8);updateNineVisual(n);});updateGuildStats();}
      // Respawn
      if(B.frame%240===120){
        var hadDead=B.nines.some(function(n){return!n.alive});
        B.nines.forEach(function(n){if(!n.alive){n.alive=true;n.hp=Math.floor(n.maxHp*.5);updateNineVisual(n);}});
        if(hadDead){showNerm(pick(NERM_LINES.respawn),2800);updateGuildStats();}
      }
    }
    B.raf=requestAnimationFrame(loop);
  }
  B.raf=requestAnimationFrame(loop);
}

function startCombat(){
  B.phase='combat';
  var bw=document.getElementById('begin-wrap');if(bw)bw.style.display='none';
  var lb=document.getElementById('live-badge');if(lb)lb.className='bh-live on';
  showNerm(pick(NERM_LINES.intro),4000);
  updateGuildStats();
}
