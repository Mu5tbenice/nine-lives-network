<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/components-v2.css">

  <style>
    .dash-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;position:relative}
    .dash-header__left{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
    .dash-header__avatar-wrap{position:relative;width:52px;height:52px}
    .dash-header__avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
    .dash-header__avatar--placeholder{width:52px;height:52px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--bg-card)}
    .dash-header__house-bg{position:absolute;top:-10px;right:-20px;width:80px;height:80px;opacity:0.12;pointer-events:none;z-index:0}
    .dash-header__house-name{font-family:var(--font-title);font-weight:700;font-size:16px;letter-spacing:1px}
    .dash-header__meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap}
    .dash-header__handle{font-family:var(--font-data);font-size:10px;color:var(--text-body);letter-spacing:0.5px}
    .dash-header__tag{font-family:var(--font-data);font-size:8px;padding:2px 10px;border-radius:10px;letter-spacing:1px;font-weight:600}
    .story-card{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--gold-border);min-height:220px;animation:glowPulse 4s ease-in-out infinite}
    .story-card__bg{position:absolute;inset:0}
    .story-card__bg img{width:100%;height:100%;object-fit:cover;filter:brightness(0.3) saturate(1.4)}
    .story-card__overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,8,18,0.4) 0%,rgba(10,8,18,0.88) 100%)}
    .story-card__content{position:relative;z-index:1;padding:16px 14px}
    .story-card__top{display:flex;justify-content:space-between;margin-bottom:12px}
    .story-card__body{text-align:center;padding:8px 0 4px}
    .story-card__zone{font-family:var(--font-title);font-weight:700;font-size:20px;color:var(--text-bright);letter-spacing:2px;margin:8px 0;text-shadow:0 2px 20px rgba(0,0,0,0.6)}
    .story-card__desc{font-family:var(--font-body);font-size:14px;font-style:italic;color:var(--text-body);line-height:1.6;max-width:480px;margin:0 auto 16px}
    .story-card__cta-text{font-family:var(--font-title);font-size:13px;font-weight:600;color:var(--gold);letter-spacing:1px;margin-bottom:12px}
    .no-story{padding:30px 20px;text-align:center;border:1px solid var(--border-subtle);border-radius:14px;background:var(--bg-card)}
    .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .stats-row .data-value{font-family:var(--font-data);font-size:16px;color:var(--text-bright)}
    .stats-row .data-sub{font-family:var(--font-data);font-size:7px;color:var(--text-faint)}
    .streak-bar{display:flex;align-items:center;gap:14px}
    .streak-bar__icon{font-size:28px;filter:drop-shadow(0 0 8px rgba(255,150,0,0.5))}
    .streak-bar__info{flex:1}
    .streak-bar__count{font-family:var(--font-data);font-size:12px;color:var(--text-bright)}
    .streak-bar__count span{font-size:7px;color:var(--text-muted)}
    .streak-bar__sub{font-size:13px;color:var(--text-muted);margin-top:2px}
    /* Spell section Ã¢â‚¬â€ mini playing cards */
    .spell-section{margin-top:16px}
    .spell-section__title{font-family:var(--font-title);font-size:14px;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px;letter-spacing:1px}
    .spell-grid{display:flex;gap:10px;overflow-x:auto;padding:4px 0;scroll-snap-type:x mandatory}
    .spell-grid::-webkit-scrollbar{height:3px}
    .spell-grid::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}
    .spell-grid .spell-card{width:140px;min-height:200px;cursor:default;flex-shrink:0;scroll-snap-align:start;opacity:1;transform:none}
    .spell-grid .spell-card:hover{transform:translateY(-4px) scale(1.02)}
    .spell-grid .sc-art{height:60px}
    .spell-grid .sc-art img{width:35px;height:35px}
    .spell-grid .sc-name{font-size:10px}
    .spell-grid .sc-type{font-size:7px;padding:2px 5px}
    .spell-grid .sc-effect__base{font-size:5px;line-height:1.6}
    .spell-grid .pill{font-size:5px;padding:1px 5px}
    .spell-grid .sc-flavor{display:none}
    .spell-grid .sc-bottom{display:none}
    .pill .tip{display:none;position:fixed;font-family:var(--font-body);font-size:12px;font-weight:400;text-transform:none;letter-spacing:0;white-space:normal;width:max-content;max-width:220px;border-radius:6px;padding:8px 12px;line-height:1.4;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,0.7);pointer-events:none}
    .zone-card{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--border-subtle);transition:transform 0.2s,box-shadow 0.2s;cursor:pointer;text-decoration:none;display:block}
    .zone-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
    .zone-card__image{height:120px;background-size:cover;background-position:center;position:relative}
    .zone-card__image::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(10,8,18,0.95) 0%,rgba(10,8,18,0.1) 60%)}
    .zone-card__image-badges{position:absolute;top:8px;right:8px;display:flex;gap:4px;z-index:2}
    .zone-card__image-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;z-index:2}
    .zone-card__name{font-family:var(--font-title);font-size:13px;font-weight:600;color:var(--text-bright);letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,0.8)}
    .zone-card__status{font-family:var(--font-data);font-size:7px;color:var(--text-muted);margin-top:2px}
    .zone-card__no-image{height:120px;background:var(--bg-inset);display:flex;align-items:center;justify-content:center;position:relative}
    .zone-card__no-image::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(10,8,18,0.95) 0%,rgba(10,8,18,0.3) 60%)}
    .zones-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .quick-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .quick-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;text-decoration:none;color:var(--text-muted);transition:all 0.2s;min-width:70px}
    .quick-btn:hover{border-color:var(--gold-border);color:var(--gold);transform:translateY(-2px)}
    .quick-btn__icon{font-size:20px}
    .quick-btn__label{font-family:var(--font-data);font-size:7px;letter-spacing:1px}
    .chart-wrap{position:relative;height:200px;margin:12px 0 8px}
    .standings-legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:8px}
    .legend-item{display:flex;align-items:center;gap:5px}
    .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .legend-name{font-family:var(--font-data);font-size:7px;letter-spacing:0.5px}
    .dash-error{text-align:center;padding:40px 20px;font-family:var(--font-body);color:var(--text-muted);font-style:italic}
    .dash-error a{color:var(--gold)}
    @media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr}.zones-grid{grid-template-columns:1fr}.quick-actions{justify-content:space-between}.quick-btn{flex:1;min-width:0}}
  </style>
</head>

  <div class="dash-error" id="errorState" style="display:none;"><p style="font-size:48px;margin-bottom:16px;"></p><p style="font-size:18px;color:var(--text-bright);margin-bottom:8px;">No player found</p><p>You need to <a href="/register.html">register</a> first.</p></div>
<script>
var HOUSES={1:{name:'Smoulders',color:'#E03C31',slug:'smoulders',img:'/assets/images/houses/House-smoulders.png'},2:{name:'Darktide',color:'#00B4D8',slug:'darktide',img:'/assets/images/houses/House-darktide.png'},3:{name:'Stonebark',color:'#5CB338',slug:'stonebark',img:'/assets/images/houses/House-stonebark.png'},4:{name:'Ashenvale',color:'#90E0EF',slug:'ashenvale',img:'/assets/images/houses/House-Ashenvale.png'},5:{name:'Stormrage',color:'#FFC800',slug:'stormrage',img:'/assets/images/houses/House-stormrage.png'},6:{name:'Nighthollow',color:'#7B2D8E',slug:'nighthollow',img:'/assets/images/houses/House-nighthollow.png'},7:{name:'Dawnbringer',color:'#FF8C00',slug:'dawnbringer',img:'/assets/images/houses/House-dawnbringer.png'},8:{name:'Manastorm',color:'#5B8FE0',slug:'manastorm',img:'/assets/images/houses/House-manastorm.png'},9:{name:'Plaguemire',color:'#E84393',slug:'plaguemire',img:'/assets/images/houses/House-plaguemire.png'}};
var ZONE_IMAGES={1:'/assets/images/environments/ashen-approach.jpg',2:'/assets/images/environments/the-drowning-spiral.png',3:'/assets/images/environments/crimson-overlook.jpg',4:'/assets/images/environments/the-floating-citadel.png',5:'/assets/images/environments/violet-storm.png',6:'/assets/images/environments/the-lone-spire.png',7:'/assets/images/environments/azure-expanse.png',8:'/assets/images/environments/shattered-stream.png',9:'/assets/images/environments/the-quiet-woods.png',10:'/assets/images/environments/the-twin-spires.png',11:'/assets/images/environments/the-veiled-cascade.png',12:'/assets/images/environments/the-sunken-archives.png',13:'/assets/images/environments/the-whispering-woods.png',14:'/assets/images/environments/the-fallen-wyrm.jpg',15:'/assets/images/environments/the-grassy-knoll.png',16:'/assets/images/environments/the-gathering-grove.png',17:'/assets/images/environments/the-breach.png',18:'/assets/images/environments/the-great-divide.png',19:'/assets/images/environments/the-chambers-keep.png',20:'/assets/images/environments/the-eastern-exchange.png',21:'/assets/images/environments/the-memorial-arch.png',22:'/assets/images/environments/lunar-sanctum.png',23:'/assets/images/environments/the-divide.png',24:'/assets/images/environments/the-silent-valley.png',25:'/assets/images/environments/the-torn-veil.png'};
var STORY_IMAGES=['https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800&q=80','https://images.unsplash.com/photo-1534447677768-be436bb09401?w=800&q=80','https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80','https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=80','https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800&q=80','https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=80','https://images.unsplash.com/photo-1507400492013-162706c8c05e?w=800&q=80'];

// Slug lookup for spell cards
var SLUG_MAP={};Object.keys(HOUSES).forEach(function(id){SLUG_MAP[HOUSES[id].slug]={name:HOUSES[id].name,color:HOUSES[id].color,img:HOUSES[id].img};});
SLUG_MAP.universal={name:'Universal',color:'#D4A64B',img:null};
var PC={'BURN':'orange','SCALD':'orange','SPREAD':'red','STRIP':'red','ERUPTION':'red','DRAIN':'purple','PULL':'blue','REFLECT':'cyan','CLOAK':'dark','STEALTH':'dark','SWAP':'pink','WEAKEN':'orange','ANCHOR':'brown','HEAL':'green','THORNS':'green','CONVERT':'cyan','PERSIST':'gold','SWIFT':'white','HASTE':'cyan','FREE':'cyan','DODGE':'ice','REACH':'white','SWEEP':'gray','CRIT':'yellow','FIZZLE':'yellow','CHAIN':'blue','AMPLIFY':'purple','NIGHT':'dark','HEX':'purple','SILENCE':'gray','STEAL':'red','FREEZE':'ice','PIERCE':'white','ABSORB':'blue','RANDOMIZE':'pink','NEGATE':'white','REFUND':'cyan','INFECT':'toxic','WITHER':'brown','CORRODE':'toxic','PLAGUE':'toxic','TOXIC':'toxic','LOCKOUT':'red','UNDERDOG':'gold','AURA':'gold','GIFT':'white','JUSTICE':'gold','SAFE':'gold','RESTORE':'cyan','RESET':'cyan','INSPIRE':'gold','REVEAL':'white','DOT':'green','BONUS':'gold','BLESS':'gold','WARD':'gold','PURGE':'orange','PUSH':'ice','SHUFFLE':'blue','CURSE':'purple','VANISH':'dark','SIPHON':'purple','POISON':'toxic','IMMUNE':'cyan','SURGE':'yellow'};
function pillCol(tag){var k=tag.replace(/[^A-Z]/g,'').toUpperCase();for(var p in PC){if(k.indexOf(p)!==-1)return PC[p];}return'gray';}

function buildDashCard(s){
  return buildSpellCard(s, { delay: 0, rarity: s.rarity || null, mini: true });
}

function getTagColor(tag){if(!tag)return null;var colors={'$BONK':'#F0A030','$WIF':'#8B5CF6','$POPCAT':'#FF6B6B','$DEGEN':'#00D4FF','$NPC':'#44cc44','$MYRO':'#FF8C00','$MOG':'#E84393','$PEPE':'#5CB338','$FLOKI':'#FFC800','$SHIB':'#FF4500'};var u=tag.toUpperCase();if(colors[u])return colors[u];var h=0;for(var i=0;i<u.length;i++)h=u.charCodeAt(i)+((h<<5)-h);return'hsl('+Math.abs(h)%360+',60%,55%)';}
function getPlayerId(){var p=new URLSearchParams(window.location.search);var f=p.get('player_id');if(f){localStorage.setItem('player_id',f);return f;}return localStorage.getItem('player_id');}
function toggleMobileMenu(){document.getElementById('hamburger').classList.toggle('active');document.getElementById('mobileMenu').classList.toggle('active');}
function doLogout(){localStorage.removeItem('player_id');window.location.href='/';}
if(localStorage.getItem('player_id')){var nl=document.getElementById('navLogout'),ml=document.getElementById('mobileLogout');if(nl)nl.style.display='';if(ml)ml.style.display='';}
function timeAgo(d){var diff=Date.now()-new Date(d).getTime(),m=Math.floor(diff/60000);if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function getZoneImg(z){return(z.image_url?(z.image_url.startsWith('/')?z.image_url:'/assets/images/zones/'+z.image_url):'')||ZONE_IMAGES[z.id]||'';}

async function loadDashboard(){
  var pid=getPlayerId();if(!pid){document.getElementById('dashContent').style.display='none';document.getElementById('errorState').style.display='block';return;}
  try{
    var[pR,cR,zR,sR]=await Promise.all([fetch('/api/players/'+pid),fetch('/api/players/'+pid+'/casts'),fetch('/api/zones'),fetch('/api/leaderboards/schools')]);
    var player=await pR.json(),casts=await cR.json(),zones=await zR.json(),schools=await sR.json();
    if(!player||player.error){document.getElementById('dashContent').style.display='none';document.getElementById('errorState').style.display='block';return;}
    var house=HOUSES[player.school_id]||HOUSES[1];
    render(player,casts||[],zones||[],schools||[]);
  }catch(err){console.error(err);document.getElementById('dashContent').style.display='none';document.getElementById('errorState').style.display='block';}
}

async function render(player,casts,zones,schools){
  var house=HOUSES[player.school_id]||HOUSES[1];
  var obj=Array.isArray(zones)?zones.find(function(z){return z.is_current_objective;}):null;
  var mana=(player.mana!=null)?player.mana:5,maxM=5;
  var lives=(player.lives!=null)?player.lives:3,maxL=5;
  var pts=player.seasonal_points||0,streak=player.streak||0;
  var now=new Date(),doy=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
  var storyImg=STORY_IMAGES[doy%STORY_IMAGES.length];
  var rc=Array.isArray(casts)?casts.slice(0,5):[];
  var sl=Array.isArray(schools)?schools:[];

  var mH='';for(var i=0;i<maxM;i++)mH+='<div class="mana-orb '+(i<mana?'mana-orb--filled':'')+'"></div>';
  var lH='';for(var i=0;i<maxL;i++)lH+='<span class="life-heart '+(i>=lives?'life-heart--empty':'')+'">&#10084;</span>';
  var sH='';for(var i=0;i<7;i++)sH+='<div class="streak-dot '+(i<streak?'streak-dot--filled':'')+'"></div>';

  var avH=player.profile_image?'<img src="'+player.profile_image+'" alt="" class="dash-header__avatar">':'<div class="dash-header__avatar--placeholder"><img src="'+house.img+'" style="width:32px;height:32px;object-fit:contain;"></div>';
  var tc=getTagColor(player.community_tag);
  var tagH=player.community_tag?'<span class="dash-header__tag" style="background:'+tc+'18;color:'+tc+';border:1px solid '+tc+'40;">'+esc(player.community_tag)+'</span>':'';

  // Story card
  var scH='';
  if(obj){
    var oImg=getZoneImg(obj)||storyImg;
    var tL=obj.objective_tweet_id?'https://twitter.com/9LVNetwork/status/'+obj.objective_tweet_id:'https://twitter.com/9LVNetwork';
    scH='<div class="story-card fade-up fade-up-1"><div class="story-card__bg"><img src="'+oImg+'" alt=""><div class="story-card__overlay"></div></div><div class="story-card__content"><div class="story-card__top"><span class="label">Today\'s Story</span><span class="badge badge--live">LIVE</span></div><div class="story-card__body"><span class="label">Daily Narrative</span><h2 class="story-card__zone">'+esc(obj.narrative_title||obj.name||'Unknown')+'</h2><p class="story-card__desc">'+esc(obj.description||'A new chapter unfolds in Avaloris.')+'</p><div class="story-card__cta-text">Show up. Represent. Become part of the story.</div><a href="'+tL+'" target="_blank" class="btn-gold">Join the Story</a></div></div></div>';
  }else{
    scH='<div class="no-story fade-up fade-up-1"><span class="label">Today\'s Story</span><p style="font-family:var(--font-title);font-size:16px;color:var(--text-body);font-style:italic;margin-top:12px;">No active story right now. Check back at 8 AM UTC.</p></div>';
  }

  // Pack hand + collection (replaces old spell rotation)
  var handCards=[];
  try{var hR2=await fetch('/api/packs/hand/'+pid);var hd2=await hR2.json();if(hd2&&hd2.success&&hd2.hand&&hd2.hand.cards)handCards=hd2.hand.cards;}catch(e){}
  var spH='<div class="spell-section fade-up fade-up-2"><div class="spell-section__title">Today\'s Hand</div>';
  if(handCards.length>0){
    spH+='<div class="spell-grid">';
    handCards.forEach(function(card){spH+=buildDashCard(card);});
    spH+='</div>';
  }else{
    spH+='<div style="text-align:center;padding:20px;border:1px dashed rgba(212,166,75,0.15);border-radius:10px;">';
    spH+='<p style="font-family:var(--font-body);color:var(--text-faint);font-style:italic;margin-bottom:10px;">No pack opened today.</p>';
    spH+='<a href="/packs.html" class="btn-gold" style="text-decoration:none;font-size:12px;padding:8px 20px;">Open Daily Pack</a>';
    spH+='</div>';
  }
  spH+='<div style="display:flex;gap:8px;justify-content:center;margin-top:12px;">';
  spH+='<a href="/packs.html" style="font-family:var(--font-title);font-size:11px;color:var(--gold);text-decoration:none;letter-spacing:1px;opacity:0.7;">Packs</a>';
  spH+='<span style="color:var(--text-faint);">|</span>';
  spH+='<a href="/spellbook.html" style="font-family:var(--font-title);font-size:11px;color:var(--gold);text-decoration:none;letter-spacing:1px;opacity:0.7;">Spellbook</a>';
  spH+='</div></div>';

  // Active zones with images
  var az=(Array.isArray(zones)?zones:[]).filter(function(z){return z.is_active!==false&&z.zone_type!=='home';}).slice(0,4);
  var zH='';
  az.forEach(function(z){
    var img=getZoneImg(z),isO=z.is_current_objective;
    var bd='';
    if(isO)bd+='<span class="badge badge--objective" style="font-size:7px;">OBJECTIVE</span>';
    if(z.bonus_effect)bd+='<span class="badge badge--rift" style="font-size:7px;">RIFT</span>';
    var ctrl=z.controlling_school_id&&HOUSES[z.controlling_school_id]?HOUSES[z.controlling_school_id]:null;
    if(ctrl)bd+='<span class="badge" style="font-size:7px;background:'+ctrl.color+'20;color:'+ctrl.color+';border:1px solid '+ctrl.color+'40;">'+ctrl.name+'</span>';
    zH+='<a href="/map.html" class="zone-card">';
    if(img){zH+='<div class="zone-card__image" style="background-image:url(\''+img+'\');"><div class="zone-card__image-badges">'+bd+'</div><div class="zone-card__image-overlay"><div class="zone-card__name">'+esc(z.name)+'</div><div class="zone-card__status">'+(isO?'Today\'s Objective':z.zone_type||'Neutral')+'</div></div></div>';}
    else{zH+='<div class="zone-card__no-image"><div class="zone-card__image-badges">'+bd+'</div><div class="zone-card__image-overlay" style="z-index:2;"><div class="zone-card__name">'+esc(z.name)+'</div></div></div>';}
    zH+='</a>';
  });

  // Activity
  var aH='';
  if(rc.length>0){rc.forEach(function(c){aH+='<div class="activity-item"><div class="activity-dot" style="background:'+house.color+'"></div><div class="activity-info"><div class="activity-zone">'+esc(c.spell_name||c.zone_name||'Spell Cast')+'</div><div class="activity-meta">'+(c.created_at?timeAgo(c.created_at):'')+'</div></div><span class="activity-points">+'+(c.points_earned||0)+'</span></div>';});}
  else{aH='<p style="text-align:center;color:var(--text-faint);font-style:italic;padding:16px 0;">No activity yet. Join today\'s story!</p>';}

  // ASSEMBLE
  var c=document.getElementById('dashContent');
  c.innerHTML=''
    +'<div class="dash-header fade-up"><div class="dash-header__left"><div class="dash-header__avatar-wrap">'+avH+'</div><img src="'+house.img+'" class="dash-header__house-bg" onerror="this.style.display=\'none\'"><div><div class="dash-header__house-name" style="color:'+house.color+';">'+house.name+'</div><div class="dash-header__meta"><span class="dash-header__handle">@'+esc(player.twitter_handle||'Unknown')+'</span>'+tagH+'</div></div></div><span class="badge--season">S0</span></div>'
    +scH
    +'<div class="stats-row fade-up fade-up-2"><div class="stat-card"><span class="label">Mana</span><div class="mana-row">'+mH+'</div></div><div class="stat-card"><span class="label">Lives</span><div class="lives-row">'+lH+'</div></div><div class="stat-card"><span class="label">Points</span><div class="data-value">'+pts+'</div><div class="data-sub">Season 0</div></div></div>'
    +'<div class="card fade-up fade-up-3"><div class="streak-bar"><span class="streak-bar__icon">'+(streak>=7?'&#128142;':streak>=1?'&#128293;':'&#127761;')+'</span><div class="streak-bar__info"><div class="streak-bar__count">'+streak+' <span>DAY STREAK</span></div><div class="streak-bar__sub">'+(streak<7?(7-streak)+' more for Week Warrior &#128142;':'Week Warrior achieved! &#128142;')+'</div></div><div class="streak-dots">'+sH+'</div></div></div>'
    +spH
    +'<div class="card fade-up fade-up-3"><div class="card-header"><span class="label">Active Zones</span></div><div class="zones-grid">'+zH+'</div></div>'
    +'<div class="quick-actions fade-up fade-up-3"><a href="/map.html" class="quick-btn"><span class="quick-btn__icon"></span><span class="quick-btn__label">World</span></a><a href="/leaderboards.html" class="quick-btn"><span class="quick-btn__icon"></span><span class="quick-btn__label">Leaderboards</span></a><a href="/campfire.html" class="quick-btn"><span class="quick-btn__icon"></span><span class="quick-btn__label">Campfire</span></a></div>'
    +'<div class="card fade-up fade-up-4"><div class="card-header"><span class="label"> House Standings</span></div><div class="chart-wrap"><canvas id="standingsChart"></canvas></div><div class="standings-legend" id="standingsLegend"></div></div>'
    +'<div class="card fade-up fade-up-4"><div class="card-header"><span class="label">Recent Activity</span></div>'+aH+'</div>';

  var loader=document.getElementById('loadingState');if(loader)loader.style.display='none';
  c.style.display='flex';
  renderChart(sl,player.school_id);
}

function renderChart(schools,myId){
  var cv=document.getElementById('standingsChart');if(!cv||!schools||!schools.length)return;
  var labels=[],colors=[],pts=[],lgEl=document.getElementById('standingsLegend'),lgH='';
  schools.forEach(function(s){var h=HOUSES[s.school_id]||{name:'?',color:'#888'};labels.push(h.name);colors.push(h.color);pts.push(s.total_points||0);
    lgH+='<div class="legend-item"><div class="legend-dot" style="background:'+h.color+';"></div><span class="legend-name" style="color:'+h.color+';">'+h.name+(s.school_id===myId?' *':'')+'</span></div>';
  });
  if(lgEl)lgEl.innerHTML=lgH;
  new Chart(cv,{type:'bar',data:{labels:labels,datasets:[{data:pts,backgroundColor:colors.map(function(c){return c+'40';}),borderColor:colors,borderWidth:2,borderRadius:6,barPercentage:0.7}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a2e',borderColor:'#D4A64B44',borderWidth:1,titleFont:{family:'Cinzel',size:12},bodyFont:{family:'JetBrains Mono',size:10},callbacks:{label:function(ctx){return ctx.raw+' pts';}}}},scales:{x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#606070',font:{family:'JetBrains Mono',size:8}}},y:{grid:{display:false},ticks:{color:function(ctx){return colors[ctx.index]||'#aaa';},font:{family:'Cinzel',size:10,weight:600}}}}}});
}

function showChooseHouse(){var o=document.getElementById('chooseHouseOverlay');if(o)o.style.display='flex';}
function hideChooseHouse(){var o=document.getElementById('chooseHouseOverlay');if(o)o.style.display='none';}
async function selectHouse(hid){var pid=localStorage.getItem('player_id');if(!pid)return;if(!confirm('This choice is PERMANENT. Are you sure?'))return;try{var r=await fetch('/api/players/'+pid,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({school_id:hid})});if(r.ok){hideChooseHouse();location.reload();}}catch(e){alert('Failed');}}
loadDashboard();

// Smart pill tooltips
document.addEventListener('mouseenter',function(e){
  var pill=e.target.closest('.pill');if(!pill)return;
  var tip=pill.querySelector('.tip');if(!tip)return;
  var style=getComputedStyle(pill);
  tip.style.background='rgba(10,8,18,0.97)';
  tip.style.borderColor=style.borderColor||'rgba(212,166,75,0.3)';
  tip.style.color=style.color||'#D4A64B';
  tip.style.display='block';
  var r=pill.getBoundingClientRect();var tw=tip.offsetWidth;var th=tip.offsetHeight;
  var left=r.left+r.width/2-tw/2;var top=r.top-th-10;
  if(left<8)left=8;if(left+tw>window.innerWidth-8)left=window.innerWidth-tw-8;
  if(top<8){top=r.bottom+10;}
  tip.style.left=left+'px';tip.style.top=top+'px';
},true);
document.addEventListener('mouseleave',function(e){
  var pill=e.target.closest('.pill');if(!pill)return;
  var tip=pill.querySelector('.tip');if(tip)tip.style.display='none';
},true);
</script>
<div id="chooseHouseOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:1000;justify-content:center;align-items:center;padding:20px;">
  <div style="background:#141020;border:1px solid rgba(212,166,75,0.2);border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;padding:32px;">
    <h2 style="font-family:Cinzel,serif;color:#D4A64B;text-align:center;margin-bottom:8px;font-size:22px;">Choose Your House</h2>
    <p style="font-family:Crimson Text,serif;color:#ff8844;text-align:center;margin-bottom:24px;font-size:14px;">Warning: This choice is permanent!</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;" id="houseGrid"></div>
  </div>
</div>
<script>var hg=document.getElementById('houseGrid');if(hg){var hh='';Object.keys(HOUSES).forEach(function(id){var h=HOUSES[id];hh+='<div onclick="selectHouse('+id+')" style="cursor:pointer;text-align:center;padding:16px 8px;background:'+h.color+'10;border:1px solid '+h.color+'30;border-radius:12px;transition:all 0.2s;" onmouseover="this.style.transform=\'translateY(-3px)\'" onmouseout="this.style.transform=\'\'"><img src="'+h.img+'" style="width:48px;height:48px;object-fit:contain;margin-bottom:8px;" onerror="this.style.display=\'none\'"><br><span style="font-family:Cinzel,serif;font-size:11px;color:'+h.color+';">'+h.name+'</span></div>';});hg.innerHTML=hh;}</script>
