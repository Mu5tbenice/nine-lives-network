<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dashboard | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&family=MedievalSharp&family=Cormorant+SC:wght@400;600;700&family=Fondamento&family=Almendra&family=Pirata+One&family=Grenze+Gotisch:wght@400;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English+SC&family=Griffy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(232,133,90,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139,180,224,0.06) 0%, transparent 40%),
        radial-gradient(ellipse at 20% 80%, rgba(176,136,232,0.04) 0%, transparent 40%),
        linear-gradient(180deg, #1a1528 0%, #120e1e 30%, #0e0a18 100%);
      font-family: var(--font-body);
      color: var(--text-body);
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(212,166,75,0.15); border-radius: 2px; }
    a { color: var(--gold); text-decoration: none; }

    /* ═══ LAYOUT ═══ */
    .main-container { max-width: 500px; margin: 0 auto; padding: 80px 14px 40px !important; }

    /* ═══ ANIMATIONS ═══ */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 20px rgba(212,166,75,0.08); } 50% { box-shadow: 0 0 30px rgba(212,166,75,0.15); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes manaShimmer { 0%,100% { box-shadow: 0 0 10px rgba(106,200,216,0.4); } 50% { box-shadow: 0 0 16px rgba(106,200,216,0.6); } }
    @keyframes subtleFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.1s; }
    .fade-up-3 { animation-delay: 0.15s; }
    .fade-up-4 { animation-delay: 0.2s; }

    /* ═══ SECTION LABEL ═══ */
    .section-label {
      display: flex; align-items: center; gap: 8px;
      margin: 20px 0 10px;
    }
    .section-label__text {
      font-family: var(--font-title); font-size: 12px; font-weight: 700;
      color: var(--gold); letter-spacing: 2px;
    }
    .section-label__line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ═══ GUILD TAG ═══ */
    .guild-tag-row {
      display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap;
    }
    .guild-tag-input {
      font-family: var(--font-data); font-size: 10px; letter-spacing: 1px;
      padding: 5px 10px; border-radius: 8px;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      color: var(--text-bright); outline: none; width: 120px;
      transition: border-color 0.2s;
    }
    .guild-tag-input:focus { border-color: var(--gold); }
    .guild-tag-input::placeholder { color: var(--text-faint); font-size: 9px; }
    .guild-tag-save {
      font-family: var(--font-data); font-size: 8px; letter-spacing: 0.5px;
      padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer;
      background: var(--gold-dim); color: var(--gold); border: 1px solid var(--border-glow);
      transition: all 0.2s;
    }
    .guild-tag-save:hover { background: rgba(212,166,75,0.25); }
    .guild-tag-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .lone-wolf-badge {
      font-family: var(--font-data); font-size: 9px; padding: 4px 12px;
      border-radius: 8px; background: rgba(106,200,216,0.1);
      color: var(--cyan); border: 1px solid rgba(106,200,216,0.25);
      letter-spacing: 1px;
    }
    .guild-badge {
      font-family: var(--font-data); font-size: 9px; padding: 4px 12px;
      border-radius: 8px; letter-spacing: 1px;
    }
    .guild-tag-msg {
      font-family: var(--font-data); font-size: 9px; letter-spacing: 0.5px;
      padding: 2px 0;
    }

    /* ═══ LOADING / ERROR ═══ */
    .loading-state { text-align: center; padding: 60px 20px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { text-align: center; padding: 60px 20px; }
    .error-state p { margin-bottom: 8px; }
  </style>
</head>
<body>
<script src="/js/nav.js"></script>

  <!-- LOADING -->
  <div class="main-container" id="loadingState">
    <div class="loading-state"><div class="spinner"></div><span style="font-family:var(--font-mono);font-size:8px;color:var(--text-faint);letter-spacing:1px;">LOADING...</span></div>
  </div>

  <!-- ERROR -->
  <div class="main-container" id="errorState" style="display:none;">
    <div class="error-state">
      <p style="font-size:48px;">🐱</p>
      <p style="font-family:var(--font-title);font-size:18px;color:var(--text-bright);">No player found</p>
      <p style="font-size:14px;color:var(--text-muted);">You need to <a href="/register.html">register</a> first.</p>
    </div>
  </div>

  <!-- DASHBOARD CONTENT -->
  <div class="main-container" id="dashContent" style="display:none;"></div>

<script src="/js/card-particles.js"></script>
<script src="/js/card-v4.js"></script>
<script>
/* ═══ DATA ═══ */
var HOUSES={1:{name:'Smoulders',color:'#E03C31',slug:'smoulders',icon:'🔥',img:'/assets/images/houses/House-smoulders.png',atk:6,hp:12,spd:5,font:"'MedievalSharp',cursive",role:'Glass Cannon'},2:{name:'Darktide',color:'#00B4D8',slug:'darktide',icon:'🌊',img:'/assets/images/houses/House-darktide.png',atk:4,hp:16,spd:4,font:"'Cormorant SC',serif",role:'Thief'},3:{name:'Stonebark',color:'#5CB338',slug:'stonebark',icon:'🌿',img:'/assets/images/houses/Houe-stonebark.png',atk:2,hp:24,spd:2,font:"'IM Fell English SC',serif",role:'Wall'},4:{name:'Ashenvale',color:'#B0C4DE',slug:'ashenvale',icon:'💨',img:'/assets/images/houses/House-Ashenvale.png',atk:3,hp:14,spd:8,font:"'Fondamento',cursive",role:'Rogue'},5:{name:'Stormrage',color:'#FFC800',slug:'stormrage',icon:'⚡',img:'/assets/images/houses/House-stormrage.png',atk:7,hp:10,spd:6,font:"'Pirata One',cursive",role:'Glass Cannon'},6:{name:'Nighthollow',color:'#7B2D8E',slug:'nighthollow',icon:'🌙',img:'/assets/images/houses/House-nighthollow.png',atk:4,hp:13,spd:7,font:"'Grenze Gotisch',cursive",role:'Disruptor'},7:{name:'Dawnbringer',color:'#FF8C00',slug:'dawnbringer',icon:'☀️',img:'/assets/images/houses/House-dawnbringer.png',atk:3,hp:18,spd:3,font:"'Cinzel Decorative',cursive",role:'Healer'},8:{name:'Manastorm',color:'#5B8FE0',slug:'manastorm',icon:'🔮',img:'/assets/images/houses/House-manastorm.png',atk:5,hp:14,spd:5,font:"'Almendra',serif",role:'Controller'},9:{name:'Plaguemire',color:'#E84393',slug:'plaguemire',icon:'☠️',img:'/assets/images/houses/House-plaguemire.png',atk:3,hp:15,spd:4,font:"'Griffy',cursive",role:'DOT Specialist'}};

var STAT_COLORS={atk:'#e85a6a',hp:'#6acd8a',spd:'#6ac8d8',def:'#b088e8',luck:'#D4A64B'};

var REGION_BONUSES={
  smoulders:{text:'+2 ATK',color:'#e85a6a'},
  darktide:{text:'Steal 1 HP/cyc',color:'#6ac8d8'},
  stonebark:{text:'+4 HP',color:'#6acd8a'},
  ashenvale:{text:'+2 SPD',color:'#6ac8d8'},
  stormrage:{text:'15% CRIT',color:'#FFC800'},
  nighthollow:{text:'20% SILENCE',color:'#b088e8'},
  dawnbringer:{text:'+2 HP heal/cyc',color:'#6acd8a'},
  manastorm:{text:'+25% effects',color:'#5B8FE0'},
  plaguemire:{text:'1 POISON/cyc',color:'#E84393'}
};

var ZONE_IMAGES={1:'/assets/images/zones/ashen-approach.jpg',2:'/assets/images/zones/the-drowning-spiral.png',3:'/assets/images/zones/crimson-overlook.jpg',4:'/assets/images/zones/the-floating-citadel.png',5:'/assets/images/zones/violet-storm.png',6:'/assets/images/zones/the-lone-spire.png',7:'/assets/images/zones/azure-expanse.png',8:'/assets/images/zones/shattered-stream.png',9:'/assets/images/zones/the-quiet-woods.png',10:'/assets/images/zones/the-twin-spires.png',11:'/assets/images/zones/the-veiled-cascade.png',12:'/assets/images/zones/the-sunken-archives.png',13:'/assets/images/zones/the-whispering-woods.png',14:'/assets/images/zones/the-fallen-wyrm.jpg',15:'/assets/images/zones/the-grassy-knoll.png',16:'/assets/images/zones/the-gathering-grove.png',17:'/assets/images/zones/the-breach.png',18:'/assets/images/zones/the-great-divide.png',19:'/assets/images/zones/the-chambers-keep.png',20:'/assets/images/zones/the-eastern-exchange.png',21:'/assets/images/zones/the-memorial-arch.png',22:'/assets/images/zones/lunar-sanctum.png',23:'/assets/images/zones/the-divide.png',24:'/assets/images/zones/the-silent-valley.png',25:'/assets/images/zones/the-torn-veil.png'};

function getTagColor(tag){if(!tag)return null;var colors={'$BONK':'#F0A030','$WIF':'#8B5CF6','$POPCAT':'#FF6B6B','$DEGEN':'#00D4FF','$NPC':'#44cc44','$MYRO':'#FF8C00','$MOG':'#E84393','$PEPE':'#5CB338','$FLOKI':'#FFC800','$SHIB':'#FF4500','$9LV':'#D4A64B'};var u=tag.toUpperCase();if(colors[u])return colors[u];var h=0;for(var i=0;i<u.length;i++)h=u.charCodeAt(i)+((h<<5)-h);return'hsl('+Math.abs(h)%360+',60%,55%)';}

/* ═══ AUTH ═══ */
function getPlayerId(){var p=new URLSearchParams(window.location.search);var f=p.get('player_id');if(f){localStorage.setItem('player_id',f);return f;}return localStorage.getItem('player_id');}
function doLogout(){localStorage.removeItem('player_id');window.location.href='/';}
if(localStorage.getItem('player_id')){var ml=document.getElementById('mobileLogout');if(ml)ml.style.display='';}
function timeAgo(d){var diff=Date.now()-new Date(d).getTime(),m=Math.floor(diff/60000);if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function getZoneImg(z){return(z.image_url?(z.image_url.startsWith('/')?z.image_url:'/assets/images/zones/'+z.image_url):'')||ZONE_IMAGES[z.id]||'';}

/* ═══ GUILD TAG SAVE ═══ */
async function saveGuildTag(){
  var pid=getPlayerId();if(!pid)return;
  var input=document.getElementById('guildTagInput');
  var btn=document.getElementById('guildTagSave');
  var msg=document.getElementById('guildTagMsg');
  var tag=(input.value||'').trim();
  if(!tag){msg.textContent='Enter a tag or leave blank for Lone Wolf';msg.style.color='var(--red)';return;}
  btn.disabled=true;btn.textContent='SAVING...';
  try{
    var r=await fetch('/api/players/update-guild',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(pid),guild_tag:tag})});
    var d=await r.json();
    if(r.ok&&d.success){
      msg.textContent='Guild tag saved!';msg.style.color='var(--green)';
      btn.textContent='SAVED ✓';
      var badge=document.getElementById('guildBadgeDisplay');
      if(badge){var tc=getTagColor(tag);badge.innerHTML='<span class="guild-badge" style="background:'+tc+'12;color:'+tc+';border:1px solid '+tc+'30;">🏰 '+esc(tag)+'</span>';}
      setTimeout(function(){btn.textContent='SAVE';btn.disabled=false;msg.textContent='';},2000);
    }else{msg.textContent=d.error||'Failed to save';msg.style.color='var(--red)';btn.textContent='SAVE';btn.disabled=false;}
  }catch(e){msg.textContent='Network error';msg.style.color='var(--red)';btn.textContent='SAVE';btn.disabled=false;}
}

async function clearGuildTag(){
  var pid=getPlayerId();if(!pid)return;
  var msg=document.getElementById('guildTagMsg');
  try{
    var r=await fetch('/api/players/update-guild',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(pid),guild_tag:null})});
    var d=await r.json();
    if(r.ok&&d.success){
      document.getElementById('guildTagInput').value='';
      var badge=document.getElementById('guildBadgeDisplay');
      if(badge)badge.innerHTML='<span class="lone-wolf-badge">🐺 LONE WOLF</span>';
      msg.textContent='Gone solo! 1.5x ATK in zones.';msg.style.color='var(--cyan)';
      setTimeout(function(){msg.textContent='';},3000);
    }
  }catch(e){msg.textContent='Error';msg.style.color='var(--red)';}
}

/* ═══ LOAD ═══ */
async function loadDashboard(){
  var pid=getPlayerId();
  if(!pid){document.getElementById('loadingState').style.display='none';document.getElementById('errorState').style.display='block';return;}
  try{
    var[pR,cR,zR,sR]=await Promise.all([
      fetch('/api/players/'+pid),
      fetch('/api/players/'+pid+'/casts'),
      fetch('/api/zones'),
      fetch('/api/leaderboards/schools')
    ]);
    var player=pR.ok?await pR.json():null;
    var casts=cR.ok?await cR.json():[];
    var zones=zR.ok?await zR.json():[];
    var schools=sR.ok?await sR.json():[];
    if(!player||player.error){document.getElementById('loadingState').style.display='none';document.getElementById('errorState').style.display='block';return;}

    var quests=[];
    // Quests endpoint not built yet — skip silently

    render(player,casts||[],zones||[],schools||[],quests);
  }catch(err){
    console.error('Dashboard load error:',err);
    document.getElementById('loadingState').style.display='none';
    document.getElementById('errorState').style.display='block';
  }
}

/* ═══ HELPER: Build stat pill ═══ */
function statPill(label,val,colorKey){
  var c=STAT_COLORS[colorKey]||'#D4A64B';
  return '<div style="text-align:center;flex:1;">'
    +'<div style="font-family:var(--font-data);font-size:14px;font-weight:700;color:'+c+';text-shadow:0 0 12px '+c+'40;">'+val+'</div>'
    +'<div style="font-family:var(--font-data);font-size:7px;color:'+c+'80;margin-top:3px;letter-spacing:1px;">'+label+'</div>'
    +'</div>';
}

/* ═══ HELPER: Section label ═══ */
function sectionLabel(icon,text,fadeClass){
  return '<div class="section-label '+(fadeClass||'')+'">'
    +'<span style="font-size:14px;">'+icon+'</span>'
    +'<span class="section-label__text">'+text+'</span>'
    +'<div class="section-label__line"></div>'
    +'</div>';
}

/* ═══ RENDER ═══ */
async function render(player,casts,zones,schools,quests){
  // Save player data to localStorage for Nine preview + other pages
  try{localStorage.setItem('9lv_player',JSON.stringify(player));}catch(e){}

  var house=HOUSES[player.school_id]||HOUSES[1];
  var pid=getPlayerId();
  var mana=5,maxM=10;
  try{var mr=await fetch("/api/mana/"+pid);if(mr.ok){var md=await mr.json();mana=md.mana||0;maxM=md.maxMana||10;}}catch(e){}
  var pts=player.seasonal_points||0;
  var streak=player.streak||0;
  var rc=Array.isArray(casts)?casts.slice(0,5):[];

  // Nine stats = house base + equipment bonuses from localStorage
  var eqBonuses={atk:0,hp:0,spd:0,def:0,luck:0};
  try{
    var eqStr=localStorage.getItem('9lv_equipment');
    if(eqStr){var eqData=JSON.parse(eqStr);eqBonuses=eqData.bonuses||eqBonuses;}
  }catch(e){}
  var nAtk=(house.atk||0)+eqBonuses.atk;
  var nHp=(house.hp||0)+eqBonuses.hp;
  var nSpd=(house.spd||0)+eqBonuses.spd;
  var nDef=eqBonuses.def;
  var nLuck=eqBonuses.luck;

  // Guild tag
  var guildTag=player.guild_tag||player.community_tag||'';
  var tc=getTagColor(guildTag);
  var guildBadgeH=guildTag
    ?'<span class="guild-badge" style="background:'+tc+'12;color:'+tc+';border:1px solid '+tc+'30;">🏰 '+esc(guildTag)+'</span>'
    :'<span class="lone-wolf-badge">🐺 LONE WOLF</span>';

  var guildEditorH='<div class="guild-tag-row">'
    +'<span id="guildBadgeDisplay">'+guildBadgeH+'</span>'
    +'<input type="text" id="guildTagInput" class="guild-tag-input" placeholder="$GUILD TAG" value="'+esc(guildTag)+'" maxlength="16">'
    +'<button id="guildTagSave" class="guild-tag-save" onclick="saveGuildTag()">SAVE</button>'
    +(guildTag?'<button class="guild-tag-save" onclick="clearGuildTag()" style="background:rgba(106,200,216,0.1);color:var(--cyan);border-color:rgba(106,200,216,0.2);">GO SOLO 🐺</button>':'')
    +'</div>'
    +'<div id="guildTagMsg" class="guild-tag-msg" style="margin-top:3px;">'
    +(!guildTag?'<span style="color:var(--cyan);font-size:10px;">🐺 Lone Wolves get 1.5x ATK in zone battles</span>':'')
    +'</div>';

  // Mana orbs — premium look
  var mH='';
  for(var i=0;i<maxM;i++){
    var filled=i<mana;
    mH+='<div style="width:18px;height:18px;border-radius:50%;position:relative;'
      +(filled
        ?'background:radial-gradient(circle at 35% 35%,#a0ecff,#6ac8d8 40%,#2a7a8a 100%);border:1.5px solid rgba(106,200,216,0.6);box-shadow:0 0 10px rgba(106,200,216,0.4),inset 0 -2px 4px rgba(0,0,0,0.3),inset 0 2px 4px rgba(255,255,255,0.2);'
        :'background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.06),rgba(255,255,255,0.02));border:1.5px solid rgba(255,255,255,0.08);'
      )+'"></div>';
  }

  // Streak dots
  var sH='';
  for(var i=0;i<7;i++){
    sH+='<div style="width:6px;height:6px;border-radius:50%;'
      +(i<streak
        ?'background:linear-gradient(135deg,#e8855a,var(--gold));border:1px solid rgba(232,133,90,0.4);'
        :'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);'
      )+'"></div>';
  }

  // ── CHRONICLE — dynamic from API ──
  var chronicleH='<div id="chronicleContainer" class="fade-up fade-up-1"></div>';

  // ── QUESTS ──
  var qH='';
  if(quests&&quests.length>0){
    quests.forEach(function(q){
      var pct=q.target?Math.min(100,(q.progress/q.target)*100):0;
      var done=q.completed||q.progress>=q.target;
      qH+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:'+(done?'rgba(106,205,138,0.05)':'rgba(255,255,255,0.03)')+';border:1px solid '+(done?'rgba(106,205,138,0.12)':'rgba(255,255,255,0.06)')+';margin-bottom:4px;">'
        +'<span style="font-size:14px;">'+(done?'✅':'📋')+'</span>'
        +'<div style="flex:1;"><div style="font-family:var(--font-body);font-size:13px;font-weight:600;color:'+(done?'var(--green)':'var(--text-bright)')+';text-decoration:'+(done?'line-through':'none')+';opacity:'+(done?'0.6':'1')+';">'+esc(q.quest_desc||q.quest_name||'Quest')+'</div>'
        +'<div style="font-family:var(--font-data);font-size:5px;color:var(--text-faint);margin-top:2px;">'+(q.progress||0)+'/'+(q.target||1)+'</div></div>'
        +'<div style="width:50px;height:4px;border-radius:2px;background:rgba(255,255,255,0.04);overflow:hidden;"><div style="width:'+pct+'%;height:100%;border-radius:2px;background:'+(done?'var(--green)':'var(--gold)')+';"></div></div>'
        +'<span style="font-family:var(--font-data);font-size:6px;color:var(--gold);">+'+(q.reward_mana?q.reward_mana+'💧':'')+(q.reward_points?q.reward_points+'pts':'')+'</span>'
        +'</div>';
    });
  }else{
    qH='<div style="text-align:center;padding:12px;color:var(--text-faint);font-style:italic;font-size:12px;">No quests today</div>';
  }

  // ── ACTIVE ZONES ──
  var az=(Array.isArray(zones)?zones:[]).filter(function(z){return z.is_active!==false&&z.zone_type!=='home';}).slice(0,4);
  var zH='';

// ── DASHBOARD NINE PREVIEW (tall character) ──
async function loadNinePreview(playerData){
  var pid=getPlayerId();if(!pid)return;
  var canvas=document.getElementById("dashNineCanvas");
  if(!canvas)return;
  var ctx=canvas.getContext("2d");
  var cw=canvas.width,ch=canvas.height;

  // Read equipment from localStorage (saved by builder)
  var eqData=null;
  try{var eqStr=localStorage.getItem('9lv_equipment');if(eqStr)eqData=JSON.parse(eqStr);}catch(e){}

  var SLOT_PATHS={fur:"/assets/nine/fur/",expression:"/assets/nine/expression/",headwear:"/assets/nine/headwear/",outfit:"/assets/nine/outfit/",weapon:"/assets/nine/weapon/",familiar:"/assets/nine/familiar/"};
  var LAYER_ORDER=["fur","outfit","weapon","headwear","expression","familiar"];

  var layers=[];
  if(eqData&&eqData.slots){
    LAYER_ORDER.forEach(function(slot){
      var file=eqData.slots[slot];
      if(file){layers.push((SLOT_PATHS[slot]||"")+file);}
    });
  }

  if(layers.length>0){
    var loaded=0,imgs=[];
    layers.forEach(function(src,i){
      var img=new Image();
      img.onload=function(){imgs[i]=img;loaded++;if(loaded===layers.length){
        ctx.clearRect(0,0,cw,ch);
        imgs.forEach(function(im){
          if(!im)return;
          // Draw preserving aspect ratio, centered, filling canvas
          var iw=im.naturalWidth,ih=im.naturalHeight;
          var scale=Math.max(cw/iw,ch/ih);
          var dw=iw*scale,dh=ih*scale;
          ctx.drawImage(im,(cw-dw)/2,(ch-dh)/2,dw,dh);
        });
      }};
      img.onerror=function(){loaded++;if(loaded===layers.length){
        ctx.clearRect(0,0,cw,ch);
        imgs.forEach(function(im){
          if(!im)return;
          var iw=im.naturalWidth,ih=im.naturalHeight;
          var scale=Math.max(cw/iw,ch/ih);
          var dw=iw*scale,dh=ih*scale;
          ctx.drawImage(im,(cw-dw)/2,(ch-dh)/2,dw,dh);
        });
      }};
      img.src=src;
    });
  } else {
    // No equipment saved — show house crest as fallback
    // Use playerData from API if available, fall back to localStorage
    var houseId=null;
    if(playerData&&playerData.school_id){
      houseId=playerData.school_id;
    } else {
      try{var pStr=localStorage.getItem("9lv_player");if(pStr){var pObj=JSON.parse(pStr);houseId=pObj.school_id;}}catch(e){}
    }
    var h=HOUSES[houseId]||HOUSES[1];
    if(h&&h.img){
      var crestImg=new Image();
      crestImg.onload=function(){
        ctx.clearRect(0,0,cw,ch);
        var s=Math.min(cw/crestImg.width,ch/crestImg.height)*0.55;
        var w=crestImg.width*s;var ht=crestImg.height*s;
        ctx.globalAlpha=0.7;
        ctx.drawImage(crestImg,(cw-w)/2,(ch-ht)/2,w,ht);
        ctx.globalAlpha=1;
      };
      crestImg.src=h.img;
    }
  }
}

  h+='<div><div style="font-family:var(--font-title);font-size:16px;font-weight:700;color:var(--gold);letter-spacing:2px;">CHANGE HOUSE</div>';
  h+='<div style="font-family:var(--font-data);font-size:5px;color:var(--text-faint);margin-top:4px;">ONCE PER WEEK · POINTS RESET TO 0</div></div>';
  h+='<button onclick="closeHouseModal()" style="background:none;border:none;color:var(--text-faint);font-size:18px;cursor:pointer;padding:4px 8px;">✕</button>';
  h+='</div>';

  // Warning
  h+='<div style="padding:12px 14px;">';
  h+='<div style="padding:10px 14px;border-radius:10px;margin-bottom:14px;background:rgba(232,90,106,0.06);border:1px solid rgba(232,90,106,0.15);display:flex;align-items:flex-start;gap:8px;">';
  h+='<span style="font-size:14px;flex-shrink:0;margin-top:1px;">⚠️</span>';
  h+='<div style="font-family:var(--font-mono);font-size:10px;color:var(--red);line-height:1.6;">Changing house <strong>resets season points to 0</strong> and starts a <strong>7-day cooldown</strong>. Cards and equipment are kept.</div>';
  h+='</div>';

  // Current house
  var cur=HOUSES[curId]||HOUSES[1];
  h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:'+cur.color+'08;border:1px solid '+cur.color+'20;margin-bottom:12px;">';
  h+='<img src="'+cur.img+'" alt="" style="width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 0 4px '+cur.color+'50);" onerror="this.textContent=\''+cur.icon+'\'">';
  h+='<span style="font-family:'+cur.font+';font-size:14px;color:'+cur.color+';text-transform:uppercase;">'+cur.name+'</span>';
  h+='<span style="font-family:var(--font-data);font-size:5px;color:var(--text-faint);margin-left:auto;">CURRENT</span>';
  h+='</div>';

  // House list
  allH.forEach(function(id){
    if(parseInt(id)===curId)return;
    var hd=HOUSES[id];
    h+='<div onclick="selectNewHouse('+id+')" id="houseOpt'+id+'" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;background:rgba(255,255,255,0.02);border:1.5px solid rgba(255,255,255,0.05);transition:all 0.15s;margin-bottom:4px;" onmouseenter="this.style.borderColor=\''+hd.color+'40\'" onmouseleave="if(!this.classList.contains(\'sel\'))this.style.borderColor=\'rgba(255,255,255,0.05)\'">';
    h+='<img src="'+hd.img+'" alt="" style="width:36px;height:36px;object-fit:contain;filter:drop-shadow(0 0 4px '+hd.color+'40);flex-shrink:0;" onerror="this.outerHTML=\'<div style=font-size:18px>'+hd.icon+'</div>\'">';
    h+='<div style="flex:1;"><div style="display:flex;align-items:baseline;gap:6px;">';
    h+='<span style="font-family:'+hd.font+';font-size:16px;font-weight:700;color:var(--text-bright);text-transform:uppercase;">'+hd.name+'</span>';
    h+='<span style="font-family:var(--font-data);font-size:4px;color:'+hd.color+';opacity:0.6;">'+hd.role.toUpperCase()+'</span>';
    h+='</div><div style="display:flex;gap:8px;margin-top:4px;">';

    h+='<span style="font-family:var(--font-data);font-size:6px;color:#6acd8a;">HP '+hd.hp+'</span>';
    h+='<span style="font-family:var(--font-data);font-size:6px;color:#6ac8d8;">SPD '+hd.spd+'</span>';

  document.body.insertAdjacentHTML('beforeend',h);
  window._selectedNewHouse=null;

function closeHouseModal(){
  var m=document.getElementById('houseModal');
  if(m)m.remove();
  window._selectedNewHouse=null;
}

function selectNewHouse(id){
  window._selectedNewHouse=id;
  var hd=HOUSES[id];
  // Reset all selections
  Object.keys(HOUSES).forEach(function(k){
    var el=document.getElementById('houseOpt'+k);
    var ch=document.getElementById('houseCheck'+k);
    if(el){el.style.borderColor='rgba(255,255,255,0.05)';el.style.background='rgba(255,255,255,0.02)';el.classList.remove('sel');}
    if(ch)ch.style.display='none';
  });
  // Highlight selected
  var el=document.getElementById('houseOpt'+id);
  var ch=document.getElementById('houseCheck'+id);
  if(el){el.style.borderColor=hd.color+'50';el.style.background=hd.color+'12';el.classList.add('sel');}
  if(ch)ch.style.display='block';
  // Enable button
  var btn=document.getElementById('houseConfirmBtn');
  if(btn){
    btn.disabled=false;btn.style.cursor='pointer';btn.style.opacity='1';
    btn.style.background='linear-gradient(135deg,#e85a6a,#c44455)';
    btn.style.color='#fff';btn.style.boxShadow='0 4px 16px rgba(232,90,106,0.3)';
    btn.textContent='⚠️ SWITCH TO '+hd.name.toUpperCase()+' (RESETS POINTS)';
    btn.style.fontFamily=hd.font;
  }
}

async function confirmHouseChange(){
  var newId=window._selectedNewHouse;if(!newId)return;
  var pid=getPlayerId();if(!pid)return;
  var btn=document.getElementById('houseConfirmBtn');
  if(btn){btn.disabled=true;btn.textContent='SWITCHING...';}
  try{
    var r=await fetch('/api/players/change-house',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({player_id:parseInt(pid),new_school_id:parseInt(newId)})
    });
    var d=await r.json();
    if(r.ok&&d.success){
      closeHouseModal();
      // Reload dashboard to show new house
      window.location.reload();
    }else{
      alert(d.error||'Failed to change house. You may be on cooldown.');
      if(btn){btn.disabled=false;btn.textContent='TRY AGAIN';}
    }
  }catch(e){
    alert('Network error — try again.');
    if(btn){btn.disabled=false;btn.textContent='TRY AGAIN';}
  }
}
