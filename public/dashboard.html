<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Nine Lives Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#08060e;--surface:#0c0a14;--card:#0e0c16;--border:rgba(212,166,75,0.08);--gold:#d4a64b;--gold-dim:rgba(212,166,75,0.08);--text:#e0ddd8;--muted:rgba(255,255,255,0.4);--faint:rgba(255,255,255,0.12);--red:#ff4444;--green:#44cc66;--blue:#4488ff}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

    .header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(8,6,14,0.95)}
    .header-title{font-family:'Cinzel',serif;font-size:16px;font-weight:900;letter-spacing:2px;color:var(--gold)}
    .nav{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
    .nav a{font-size:9px;padding:4px 8px;border-radius:6px;color:var(--muted);text-decoration:none;font-family:'Fira Code',monospace;border:1px solid var(--border);transition:all 0.15s}
    .nav a:hover{color:var(--gold);border-color:rgba(212,166,75,0.2)}

    .container{max-width:600px;margin:0 auto;padding:16px}
    .section-label{font-family:'Cinzel',serif;font-size:12px;font-weight:900;color:var(--gold);letter-spacing:2px;margin:16px 0 8px}

    /* Nine Identity Card */
    .nine-card{background:linear-gradient(135deg,var(--gold-dim),rgba(212,166,75,0.02));border:1px solid rgba(212,166,75,0.15);border-radius:14px;padding:16px;display:flex;gap:14px;align-items:center;margin-bottom:16px}
    .nine-avatar{width:56px;height:56px;border-radius:12px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:32px;border:2px solid rgba(212,166,75,0.2)}
    .nine-info{flex:1}
    .nine-name{font-family:'Cinzel',serif;font-size:16px;font-weight:900;color:#fff}
    .nine-handle{font-size:10px;color:var(--muted);font-family:'Fira Code',monospace}
    .nine-stats-row{display:flex;gap:8px;margin-top:6px}
    .nine-stat{padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;font-family:'Fira Code',monospace}
    .stat-atk{background:rgba(255,68,68,0.08);color:var(--red);border:1px solid rgba(255,68,68,0.15)}
    .stat-hp{background:rgba(68,204,102,0.08);color:var(--green);border:1px solid rgba(68,204,102,0.15)}
    .stat-spd{background:rgba(68,136,255,0.08);color:var(--blue);border:1px solid rgba(68,136,255,0.15)}
    .house-badge{padding:3px 8px;border-radius:6px;font-size:8px;font-weight:800;letter-spacing:1px;font-family:'Fira Code',monospace}
    .guild-tag{font-size:9px;color:var(--muted);font-family:'Fira Code',monospace;margin-top:4px}

    /* Mana + Regen */
    .mana-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .mana-orbs{display:flex;gap:4px}
    .mana-orb{width:14px;height:14px;border-radius:50%;transition:all 0.3s}
    .mana-orb.full{background:#00ccff;box-shadow:0 0 8px rgba(0,204,255,0.4);border:1px solid rgba(0,204,255,0.5)}
    .mana-orb.empty{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08)}
    .mana-label{font-size:11px;font-weight:700;color:#00ccff;font-family:'Fira Code',monospace}
    .mana-regen{font-size:9px;color:var(--muted);font-family:'Fira Code',monospace;margin-left:auto}

    /* Quick Actions */
    .actions-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
    .action-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border-radius:10px;background:var(--card);border:1px solid var(--border);cursor:pointer;text-decoration:none;transition:all 0.15s;text-align:center}
    .action-btn:hover{border-color:rgba(212,166,75,0.2);transform:translateY(-1px)}
    .action-icon{font-size:22px}
    .action-label{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:0.5px;font-family:'Fira Code',monospace}

    /* Active Deployments */
    .deploy-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px}
    .deploy-zone{font-size:11px;font-weight:700;flex:1}
    .deploy-card{font-size:9px;color:var(--muted);font-family:'Fira Code',monospace}
    .deploy-hp{width:50px;height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden}
    .deploy-hp-fill{height:100%;border-radius:3px;background:var(--green)}

    /* Quests */
    .quest-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px}
    .quest-icon{font-size:16px}
    .quest-info{flex:1}
    .quest-name{font-size:10px;font-weight:700}
    .quest-progress{font-size:8px;color:var(--muted);font-family:'Fira Code',monospace}
    .quest-bar{width:60px;height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden}
    .quest-bar-fill{height:100%;border-radius:2px;background:var(--gold)}
    .quest-reward{font-size:8px;color:var(--gold);font-family:'Fira Code',monospace}

    /* Activity Feed */
    .activity-entry{padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;font-size:10px;display:flex;align-items:center;gap:8px}
    .activity-icon{font-size:14px;flex-shrink:0}
    .activity-text{flex:1;color:rgba(255,255,255,0.6)}
    .activity-time{font-size:8px;color:var(--muted);font-family:'Fira Code',monospace;flex-shrink:0}
    .activity-pts{font-size:9px;color:var(--gold);font-weight:700;font-family:'Fira Code',monospace}

    /* Season Points */
    .points-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;justify-content:space-around;margin-bottom:16px}
    .points-item{text-align:center}
    .points-val{font-size:20px;font-weight:900;font-family:'Fira Code',monospace}
    .points-label{font-size:8px;color:var(--muted);letter-spacing:1px;font-family:'Fira Code',monospace;margin-top:2px}

    @media(max-width:500px){.actions-grid{grid-template-columns:repeat(2,1fr)}.nav{display:none}}
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px">🐱</span>
    <span class="header-title">DASHBOARD</span>
    <div class="nav">
      <a href="/nethara-live.html">Nethara Live</a>
      <a href="/duels.html">Duels</a>
      <a href="/gauntlet.html">Gauntlet</a>
      <a href="/boss.html">Boss</a>
      <a href="/leaderboards.html">Ranks</a>
      <a href="/builder.html">Builder</a>
    </div>
  </div>
  <div class="container" id="content">
    <div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>
  </div>

<script>
let playerId = null;
let playerData = {};
let nineData = {};
let manaData = {};
let deployments = [];
let quests = [];
let activity = [];

const HOUSE_COLORS = {smoulders:'#ff4422',darktide:'#3388dd',stonebark:'#55aa44',ashenvale:'#88bbdd',nighthollow:'#8855cc',dawnbringer:'#ffcc33',plaguemire:'#77bb33',stormrage:'#ffaa00',manastorm:'#44cccc'};

  document.addEventListener('DOMContentLoaded', async () => {
  // Check URL params first (from auth redirect), then localStorage
  const params = new URLSearchParams(window.location.search);
  if (params.get('player_id')) {
    playerId = parseInt(params.get('player_id'));
    localStorage.setItem('9lv_session', JSON.stringify({ player_id: playerId }));
  } else {
    try { const s=JSON.parse(localStorage.getItem('9lv_session')||'{}'); if(s.player_id) playerId=s.player_id; } catch(e){}
  }
  if (!playerId) { document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px"><a href="/register.html" style="color:var(--gold);font-family:Cinzel,serif;font-size:16px">Register to play →</a></div>'; return; }
  await loadAll();
  render();
});

async function loadAll() {
  const fetches = [
    fetch(`/api/players/${playerId}`).then(r=>r.json()).catch(()=>({})),
    fetch(`/api/players/${playerId}/nine`).then(r=>r.json()).catch(()=>({})),
    fetch(`/api/mana/${playerId}`).then(r=>r.json()).catch(()=>({current_mana:0,max_mana:7})),
    fetch(`/api/zones/player/${playerId}/deployments`).then(r=>r.json()).catch(()=>[]),
    fetch(`/api/events/quests/${playerId}`).then(r=>r.json()).catch(()=>[]),
  ];
  const [p, n, m, d, q] = await Promise.all(fetches);
  playerData = p.player || p || {};
  nineData = n.nine || n || {};
  manaData = m || {};
  deployments = d.deployments || d || [];
  quests = q.quests || q || [];
}

function render() {
  const houseColor = HOUSE_COLORS[(nineData.house||playerData.school_name||'').toLowerCase()] || '#888';
  const mana = manaData.current_mana || 0;
  const maxMana = manaData.max_mana || 7;

  document.getElementById('content').innerHTML = `
    <!-- Nine Identity -->
    <div class="nine-card">
      <div class="nine-avatar">🐱</div>
      <div class="nine-info">
        <div class="nine-name">${nineData.nine_name || playerData.twitter_handle || 'Your Nine'}</div>
        <div class="nine-handle">@${playerData.twitter_handle || '???'}</div>
        <div class="nine-stats-row">
          <span class="nine-stat stat-atk">⚔️ ${nineData.base_atk || '?'} ATK</span>
          <span class="nine-stat stat-hp">💚 ${nineData.base_hp || '?'} HP</span>
          <span class="nine-stat stat-spd">💨 ${nineData.base_spd || '?'} SPD</span>
          <span class="house-badge" style="background:${houseColor}15;color:${houseColor};border:1px solid ${houseColor}25">${nineData.house || playerData.school_name || '?'}</span>
        </div>
        ${playerData.guild_tag ? `<div class="guild-tag">🏰 ${playerData.guild_tag}</div>` : ''}
      </div>
    </div>

    <!-- Mana -->
    <div class="mana-card">
      <div class="mana-label">💧 ${mana}/${maxMana}</div>
      <div class="mana-orbs">${Array.from({length:maxMana},(_,i)=>`<div class="mana-orb ${i<mana?'full':'empty'}"></div>`).join('')}</div>
      <div class="mana-regen" id="regen-timer">+1 in --:--</div>
    </div>

    <!-- Season Points -->
    <div class="points-card">
      <div class="points-item"><div class="points-val" style="color:var(--gold)">${(playerData.season_points||0).toLocaleString()}</div><div class="points-label">SEASON PTS</div></div>
      <div class="points-item"><div class="points-val">${playerData.duels_won||0}</div><div class="points-label">DUELS WON</div></div>
      <div class="points-item"><div class="points-val">${playerData.best_gauntlet||0}</div><div class="points-label">BEST FLOOR</div></div>
      <div class="points-item"><div class="points-val">${deployments.length}</div><div class="points-label">DEPLOYED</div></div>
    </div>

    <!-- Quick Actions -->
    <div class="actions-grid">
      <a class="action-btn" href="/nethara-live.html"><span class="action-icon">🔥</span><span class="action-label">NETHARA LIVE</span></a>
      <a class="action-btn" href="/packs.html"><span class="action-icon">🎴</span><span class="action-label">OPEN PACK</span></a>
      <a class="action-btn" href="/duels.html"><span class="action-icon">⚔️</span><span class="action-label">QUICK DUEL</span></a>
      <a class="action-btn" href="/gauntlet.html"><span class="action-icon">🏰</span><span class="action-label">GAUNTLET</span></a>
    </div>

    <!-- Daily Quests -->
    <div class="section-label">📋 DAILY QUESTS</div>
    ${quests.length > 0 ? quests.map(q => {
      const pct = q.target ? Math.min(100, (q.progress/q.target)*100) : 0;
      return `<div class="quest-row">
        <span class="quest-icon">${q.completed?'✅':'📋'}</span>
        <div class="quest-info">
          <div class="quest-name">${q.quest_name||q.quest_desc||'Quest'}</div>
          <div class="quest-progress">${q.progress||0}/${q.target||1}</div>
        </div>
        <div class="quest-bar"><div class="quest-bar-fill" style="width:${pct}%"></div></div>
        <div class="quest-reward">+${q.reward_mana||0}💧 +${q.reward_points||0}pts</div>
      </div>`;
    }).join('') : '<div style="color:var(--muted);font-size:10px;padding:8px">No quests today</div>'}

    <!-- Active Deployments -->
    <div class="section-label">📍 ACTIVE DEPLOYMENTS</div>
    ${deployments.length > 0 ? deployments.map(d => `
      <div class="deploy-row">
        <span>📍</span>
        <div class="deploy-zone">${d.zone_name||'Zone'}</div>
        <div class="deploy-card">${d.card_name||'No card'}</div>
        <div class="deploy-hp"><div class="deploy-hp-fill" style="width:${d.max_hp?(d.current_hp/d.max_hp*100):100}%"></div></div>
      </div>
    `).join('') : '<div style="color:var(--muted);font-size:10px;padding:8px">No active deployments. Head to Nethara Live!</div>'}
  `;

  // Mana regen timer
  setInterval(() => {
    const now = new Date();
    const minsLeft = 59 - now.getMinutes();
    const secsLeft = 59 - now.getSeconds();
    const el = document.getElementById('regen-timer');
    if (el) el.textContent = `+1 in ${minsLeft}:${secsLeft.toString().padStart(2,'0')}`;
  }, 1000);
}
</script>
</body>
</html>
