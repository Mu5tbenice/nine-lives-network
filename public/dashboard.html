<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dashboard | Nine Lives Network</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">

  <style>
    /* ═══ HEADER ═══ */
    .dash-header {
      display: flex; align-items: center; justify-content: space-between; padding: 10px 0;
    }
    .dash-header__left { display: flex; align-items: center; gap: 14px; }
    .dash-header__crest {
      width: 58px; height: 58px; border-radius: 50%; object-fit: contain;
      border: 2px solid var(--gold-border); background: rgba(0,0,0,0.4); padding: 6px;
    }
    .dash-header__house {
      font-family: var(--font-title); font-weight: 700; font-size: 18px;
      color: var(--text-bright); letter-spacing: 1px;
    }
    .dash-header__element {
      font-family: var(--font-body); font-size: 14px; font-style: italic; margin-top: 1px;
    }
    .dash-header__meta {
      font-family: var(--font-data); font-size: 8px; color: var(--text-faint); margin-top: 3px;
    }

    /* ═══ STORY CARD (hero card with background image) ═══ */
    .story-card {
      position: relative; border-radius: 14px; overflow: hidden;
      border: 1px solid var(--gold-border); min-height: 200px;
      animation: glowPulse 4s ease-in-out infinite;
    }
    .story-card__bg { position: absolute; inset: 0; }
    .story-card__bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.35) saturate(1.3); }
    .story-card__overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,8,18,0.3) 0%, rgba(10,8,18,0.9) 100%); }
    .story-card__content { position: relative; z-index: 1; padding: 18px 16px; display: flex; flex-direction: column; justify-content: flex-end; min-height: 200px; }
    .story-card__top { display: flex; justify-content: space-between; align-items: center; margin-bottom: auto; }
    .story-card__zone {
      font-family: var(--font-title); font-size: 22px; font-weight: 700;
      color: #fff; letter-spacing: 1.5px; margin: 8px 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }
    .story-card__desc {
      font-family: var(--font-body); font-size: 15px; color: rgba(255,255,255,0.8);
      font-style: italic; line-height: 1.6; margin-bottom: 14px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }
    .story-card__footer { display: flex; align-items: center; gap: 14px; }
    .story-card__timer { font-family: var(--font-data); font-size: 8px; color: var(--text-faint); }

    .no-story {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: 14px; padding: 30px 20px; text-align: center;
    }

    /* ═══ STATS (3-col grid like reference) ═══ */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .data-value { font-family: var(--font-data); font-size: 22px; color: var(--gold); margin-top: 6px; }
    .data-sub { font-family: var(--font-data); font-size: 7px; color: var(--text-faint); margin-top: 2px; }

    /* ═══ ZONE CARDS (matching map.html quality) ═══ */
    .dash-zones { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .zone-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px;
      cursor: pointer; transition: all 0.25s ease; overflow: hidden; position: relative;
    }
    .zone-card:hover { border-color: var(--border-medium); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .zone-card--objective { border-color: var(--gold-border); box-shadow: 0 0 20px var(--gold-glow), inset 0 0 30px rgba(212,166,75,0.03); }
    .zone-card--rift { border-color: rgba(255,68,68,0.2); box-shadow: 0 0 12px rgba(255,68,68,0.06); }

    .zone-card__image {
      position: relative; height: 110px; overflow: hidden;
      background-color: var(--bg-inset); background-size: cover; background-position: center;
    }
    .zone-card__image::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(10,8,18,0.1) 0%, rgba(10,8,18,0.65) 60%, rgba(10,8,18,0.95) 100%);
    }
    .zone-card__image-badges {
      position: absolute; top: 6px; right: 6px; z-index: 2; display: flex; gap: 4px;
    }
    .zone-card__image-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 2; padding: 8px 12px 6px;
    }
    .zone-card__name {
      font-family: var(--font-title); font-size: 15px; font-weight: 700;
      color: #fff; letter-spacing: 0.5px; text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }
    .zone-card__status {
      font-family: var(--font-body); font-size: 12px; color: rgba(255,255,255,0.6);
      font-style: italic; text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .zone-card__no-image {
      height: 60px; display: flex; flex-direction: column; justify-content: center; padding: 10px 12px;
      background: linear-gradient(135deg, rgba(212,166,75,0.05), rgba(0,0,0,0.2));
    }
    .zone-card__no-image .zone-card__name { color: var(--text-bright); text-shadow: none; font-size: 13px; }
    .zone-card__no-image .zone-card__status { color: var(--text-faint); text-shadow: none; }

    .zone-card__body { padding: 8px 12px 12px; }
    .zone-badge {
      font-family: var(--font-data); font-size: 6px; padding: 3px 7px;
      border-radius: 3px; letter-spacing: 0.5px; backdrop-filter: blur(4px);
    }
    .zone-badge--objective { background: rgba(212,166,75,0.25); color: var(--gold); border: 1px solid var(--gold-border); }
    .zone-badge--rift { background: rgba(255,68,68,0.2); color: #ff7777; border: 1px solid rgba(255,68,68,0.25); }
    .zone-badge--controlled {
      padding: 3px 6px; display: flex; align-items: center; gap: 3px;
      background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.1);
    }
    .zone-badge--controlled img { width: 10px; height: 10px; object-fit: contain; }

    .zone-card__control { margin-top: 6px; }
    .zone-card__control-label { font-family: var(--font-data); font-size: 6px; color: var(--text-faint); letter-spacing: 1px; }
    .zone-card__control-row { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
    .zone-card__leader {
      font-family: var(--font-data); font-size: 7px; margin-top: 5px;
      display: flex; align-items: center; gap: 4px;
    }

    /* ═══ TODAY'S SPELLS ═══ */
    .spell-rot { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
    .spell-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; background: var(--bg-inset); border-radius: 8px;
      border: 1px solid var(--border-subtle); transition: all 0.2s; cursor: default;
    }
    .spell-item:hover { border-color: var(--gold-border); background: var(--bg-card-hover); }
    .spell-item__name { font-family: var(--font-title); font-size: 12px; font-weight: 600; color: var(--text-bright); letter-spacing: 0.3px; }
    .spell-item__type { font-family: var(--font-data); font-size: 5px; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .spell-item__cost { font-family: var(--font-data); font-size: 8px; color: var(--cyan); }
    .spell-item__desc { font-family: var(--font-body); font-size: 11px; color: var(--text-faint); margin-top: 2px; max-width: 130px; text-align: right; }

    /* ═══ COMMUNITY (simple tag) ═══ */
    .community-input-row { display: flex; gap: 8px; }
    .community-input {
      flex: 1; font-family: var(--font-data); font-size: 9px; padding: 8px 12px;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border-subtle);
      border-radius: 6px; color: var(--text-bright); outline: none;
    }
    .community-input:focus { border-color: var(--gold-border); }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stats-row .stat-card:last-child { grid-column: 1 / -1; }
      .dash-zones { grid-template-columns: 1fr; }
      .spell-rot { grid-template-columns: 1fr; }
      .quick-actions { grid-template-columns: 1fr 1fr; }
      .dash-header__crest { width: 48px; height: 48px; }
      .dash-header__house { font-size: 15px; }
    }
  </style>
</head>
<body>

  <nav class="top-nav">

      <ul class="nav-links">

  <div class="mobile-menu" id="mobileMenu">
    <a href="/dashboard.html" class="active">Dashboard</a>
    <a href="/map.html">World</a>
    <a href="/leaderboards.html">Leaderboards</a>
    <a href="/arena.html">Arena</a>
    <a href="/spellbook.html">Spellbook</a>
    <a href="/profile.html">Profile</a>
    <a href="/how-to-play.html">Help</a>
    <a href="#" class="logout-btn" onclick="doLogout()" id="mobileLogout" style="display:none;">Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main-container" id="dashContent" style="display:none;">
    <div class="loading" id="loadingState"><div class="spinner"></div></div>
  </div>

  <!-- ERROR -->
  <div class="dash-error" id="errorState" style="display:none; text-align:center; padding:80px 20px; font-family:var(--font-body); color:var(--text-muted);">
    <p style="font-size:48px; margin-bottom:16px;">🧙</p>
    <p style="font-family:var(--font-title); font-size:18px; color:var(--text-bright); margin-bottom:8px;">No player found</p>
    <p>You need to <a href="/register.html" style="color:var(--gold);">register</a> first.</p>
  </div>

  <!-- CHOOSE HOUSE OVERLAY -->
  <div id="chooseHouseOverlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; padding:20px;">
    <div style="background:#141020; border:1px solid rgba(212,166,75,0.2); border-radius:16px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; padding:32px;">
      <h2 style="font-family:Cinzel,serif; color:#D4A64B; text-align:center; margin-bottom:8px; font-size:22px;">Choose Your House</h2>
      <p style="font-family:Crimson Text,serif; color:#ff8844; text-align:center; margin-bottom:24px; font-size:14px;">Warning: This choice is permanent!</p>
      <div id="houseGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;"></div>
    </div>
  </div>

  <script>
    // ═══ DATA ═══
    var HOUSES = {
      1:{name:'Smoulders',color:'#E03C31',element:'Ember Covenant',img:'/assets/images/houses/Housesmoulders.png',crest:'/assets/images/houses/compressed/House-smoulders.png'},
      2:{name:'Darktide',color:'#00B4D8',element:'Tidal Conclave',img:'/assets/images/houses/Housedarktide.png',crest:'/assets/images/houses/compressed/House-darktide.png'},
      3:{name:'Stonebark',color:'#5CB338',element:'Stone Covenant',img:'/assets/images/houses/Housestonebark.png',crest:'/assets/images/houses/compressed/House-stonebark.png'},
      4:{name:'Ashenvale',color:'#90E0EF',element:'Zephyr Circle',img:'/assets/images/houses/HouseAshenvale.png',crest:'/assets/images/houses/compressed/House-Ashenvale.png'},
      5:{name:'Stormrage',color:'#FFC800',element:'Storm Assembly',img:'/assets/images/houses/Housestormrage.png',crest:'/assets/images/houses/compressed/House-stormrage.png'},
      6:{name:'Nighthollow',color:'#7B2D8E',element:'Umbral Syndicate',img:'/assets/images/houses/Housenighthollow.png',crest:'/assets/images/houses/compressed/House-nighthollow.png'},
      7:{name:'Dawnbringer',color:'#FF8C00',element:'Radiant Order',img:'/assets/images/houses/HouseDwnbringer.png',crest:'/assets/images/houses/compressed/House-dawnbringer.png'},
      8:{name:'Manastorm',color:'#5B8FE0',element:'Arcane Spire',img:'/assets/images/houses/Housemanastorm.png',crest:'/assets/images/houses/compressed/House-manastorm.png'},
      9:{name:'Plaguemire',color:'#E84393',element:'WildCat Path',img:'/assets/images/houses/Houseplaguemire.png',crest:'/assets/images/houses/compressed/House-plaguemire.png'}
    };

    var ALL_SPELLS = [
      {n:'Mana Siphon',c:1,y:'attack',d:'Steals 2 from leading house'},
      {n:'Fortify',c:1,y:'defend',d:'+2 defense, locks zone 1hr'},
      {n:'Rally Cry',c:1,y:'support',d:'Housemates here get +2'},
      {n:'Scout',c:1,y:'utility',d:'Reveals exact % for all houses'},
      {n:'Kindle',c:1,y:'attack',d:'+3 bonus, burns 2hrs',h:'smoulders'},
      {n:'Flame Wall',c:1,y:'defend',d:'+2 defense, scalds attacker',h:'smoulders'},
      {n:'Undertow',c:1,y:'attack',d:'Steals 3 from 2nd place',h:'darktide'},
      {n:'Fog Bank',c:1,y:'utility',d:'Hides your % for 2hrs',h:'darktide'},
      {n:'Root',c:1,y:'defend',d:"+4 defense, can't drop below 10",h:'stonebark'},
      {n:'Gust',c:1,y:'attack',d:'5min cooldown instead of 10',h:'ashenvale'},
      {n:'Spark',c:1,y:'attack',d:'25% chance double damage',h:'stormrage'},
      {n:'Arc',c:1,y:'attack',d:'+3 if housemate cast recently',h:'stormrage'},
      {n:'Shadow Bolt',c:1,y:'attack',d:'+5 during night hours',h:'nighthollow'},
      {n:'Radiance',c:1,y:'support',d:'All Dawnbringer here +2',h:'dawnbringer'},
      {n:'Arcane Missile',c:1,y:'attack',d:'Ignores 3 defense',h:'manastorm'},
      {n:'Flux',c:1,y:'utility',d:'+5 to +20 random influence',h:'manastorm'},
      {n:'Toxic Bolt',c:1,y:'attack',d:'+2 every 15min for 1hr',h:'plaguemire'},
      {n:'Scorch',c:2,y:'attack',d:'+8 bonus, strip 5 defense',h:'smoulders'},
      {n:'Riptide',c:2,y:'attack',d:'+5, swap with lowest',h:'darktide'},
      {n:'Chain Lightning',c:2,y:'attack',d:'+5, spreads to zone',h:'stormrage'},
      {n:'Hex',c:2,y:'debuff',d:'Blocks T2+ spells 1hr',h:'nighthollow'},
      {n:'Counterspell',c:2,y:'reaction',d:'Cancel last spell, refund',h:'manastorm'},
    ];

    var STORY_IMAGES = [
      'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800&q=80',
      'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=800&q=80',
      'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80',
      'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=80',
    ];

    var TYPE_COLORS = {attack:'#ff6b6b',defend:'#4dd9db',support:'#ffd700',utility:'#b366f0',debuff:'#99dd66',reaction:'#ffcc33',control:'#7799ff'};

    // ═══ NAV ═══
    function toggleMobileMenu(){document.getElementById('hamburger').classList.toggle('active');document.getElementById('mobileMenu').classList.toggle('active');}
    function doLogout(){localStorage.removeItem('player_id');window.location.href='/';}
    if(localStorage.getItem('player_id')){var nl=document.getElementById('navLogout');var ml=document.getElementById('mobileLogout');if(nl)nl.style.display='';if(ml)ml.style.display='';}

    // ═══ UTILS ═══
    function getPlayerId(){var p=new URLSearchParams(window.location.search).get('player_id');if(p){localStorage.setItem('player_id',p);return p;}return localStorage.getItem('player_id');}
    function timeAgo(d){var diff=Date.now()-new Date(d).getTime();var m=Math.floor(diff/60000);if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}

    // ═══ DAILY SPELL ROTATION ═══
    function getDailySpells(){
      var today=new Date();
      var seed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
      function rng(s){return((s*1103515245+12345)&0x7fffffff);}
      var pool=ALL_SPELLS.slice();
      var picked=[];var s=seed;
      while(picked.length<4 && pool.length>0){
        s=rng(s); var idx=(s>>>0)%pool.length;
        picked.push(pool.splice(idx,1)[0]);
      }
      return [{n:'Basic Attack',c:1,y:'attack',d:'+10 influence'},{n:'Basic Defend',c:1,y:'defend',d:'+10 defense'}].concat(picked);
    }

    // ═══ LOAD ═══
    async function loadDashboard(){
      var pid=getPlayerId();
      if(!pid){document.getElementById('errorState').style.display='block';return;}
      try{
        var [playerRes,castsRes,zonesRes,schoolsRes]=await Promise.all([
          fetch('/api/players/'+pid), fetch('/api/players/'+pid+'/casts'),
          fetch('/api/zones'), fetch('/api/leaderboards/schools')
        ]);
        var player=await playerRes.json();
        var casts=await castsRes.json();
        var zones=await zonesRes.json();
        var schools=await schoolsRes.json();
        if(!player||player.error){document.getElementById('errorState').style.display='block';return;}
        renderDashboard(player,casts||[],zones||[],schools||[]);
      }catch(e){console.error('Dashboard error:',e);document.getElementById('errorState').style.display='block';}
    }

    // ═══ RENDER ═══
    function renderDashboard(player,casts,zones,schools){
      var house=HOUSES[player.school_id]||HOUSES[1];
      var objective=Array.isArray(zones)?zones.find(function(z){return z.is_current_objective;}):null;
      var activeZones=Array.isArray(zones)?zones.filter(function(z){return z.is_active;}).slice(0,4):[];
      var streak=player.streak||0, mana=player.mana!=null?player.mana:5, maxMana=5;
      var lives=player.lives!=null?player.lives:3, maxLives=5;
      var points=player.seasonal_points||0;
      var communityTag=player.community_tag||'';

      var now=new Date();
      var dayOfYear=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
      var storyImg=STORY_IMAGES[dayOfYear%STORY_IMAGES.length];

      // Mana orbs
      var manaHTML='';
      for(var i=0;i<maxMana;i++) manaHTML+='<div class="mana-orb '+(i<mana?'mana-orb--filled':'')+'"></div>';

      // Lives
      var livesHTML='';
      for(var i=0;i<maxLives;i++) livesHTML+='<span class="life-heart '+(i>=lives?'life-heart--empty':'')+'">❤️</span>';

      // Streak dots
      var streakHTML='';
      for(var i=0;i<7;i++) streakHTML+='<div class="streak-dot '+(i<streak?'streak-dot--filled':'')+'"></div>';

      // ═══ STORY CARD ═══
      var storyCardHTML='';
      if(objective){
        var tweetLink=objective.objective_tweet_id?'https://twitter.com/9LVNetwork/status/'+objective.objective_tweet_id:'https://twitter.com/9LVNetwork';
        storyCardHTML=''
          +'<div class="story-card fade-up fade-up-1">'
          +'<div class="story-card__bg"><img src="'+storyImg+'" alt=""><div class="story-card__overlay"></div></div>'
          +'<div class="story-card__content">'
          +'<div class="story-card__top"><span class="label">Today\'s Story</span><span class="badge badge--live">● LIVE</span></div>'
          +'<h2 class="story-card__zone">'+(objective.narrative_title||objective.name||'Unknown')+'</h2>'
          +'<p class="story-card__desc">'+(objective.description||'A new chapter unfolds in the world of Avaloris.')+'</p>'
          +'<div class="story-card__footer"><a href="'+tweetLink+'" target="_blank" class="btn-gold">Cast on 𝕏 ↗</a></div>'
          +'</div></div>';
      } else {
        storyCardHTML='<div class="no-story fade-up fade-up-1"><span class="label">Today\'s Story</span><p style="font-size:32px;margin:12px 0;">🌑</p><p style="font-family:var(--font-title);font-size:16px;color:var(--text-body);font-style:italic;">No active story. Check back at 8 AM UTC.</p></div>';
      }

      // ═══ ZONE CARDS (map.html quality) ═══
      var zonesHTML='';
      activeZones.forEach(function(z){
        var leader=z.controlling_school_id?HOUSES[z.controlling_school_id]:null;
        var control=z.control_percentage||0;
        var barColor=leader?leader.color:'var(--text-faint)';
        var isObj=z.is_current_objective;
        var cardClass='zone-card'+(isObj?' zone-card--objective':'')+(z.zone_type==='rift'?' zone-card--rift':'');

        // Image section (matching map.html pattern)
        var imageHTML='';
        if(z.image_url){
          imageHTML=''
            +'<div class="zone-card__image" style="background-image:url(\''+z.image_url+'\');">'
            +'<div class="zone-card__image-badges">'
            +(isObj?'<span class="zone-badge zone-badge--objective">OBJECTIVE</span>':'')
            +(z.zone_type==='rift'?'<span class="zone-badge zone-badge--rift">RIFT</span>':'')
            +(leader?'<span class="zone-badge zone-badge--controlled"><img src="'+leader.img+'" onerror="this.style.display=\'none\'">'+leader.name+'</span>':'')
            +'</div>'
            +'<div class="zone-card__image-overlay">'
            +'<div class="zone-card__name">'+z.name+'</div>'
            +'<div class="zone-card__status">'+(z.status||'Active')+'</div>'
            +'</div></div>';
        } else {
          imageHTML=''
            +'<div class="zone-card__no-image">'
            +'<div class="zone-card__name">'+z.name+'</div>'
            +'<div class="zone-card__status">'+(z.status||'Active')+'</div>'
            +'</div>';
        }

        zonesHTML+='<a href="/map.html" class="'+cardClass+'" style="text-decoration:none;">'
          +imageHTML
          +'<div class="zone-card__body">'
          +'<div class="zone-card__control"><div class="zone-card__control-label">CONTROL</div>'
          +'<div class="zone-card__control-row">'
          +'<div class="bar-track" style="flex:1;"><div class="bar-fill" style="width:'+control+'%;background:'+barColor+';"></div></div>'
          +'<span style="font-family:var(--font-data);font-size:9px;color:'+barColor+';font-weight:bold;">'+control+'%</span>'
          +'</div>'
          +(leader?'<div class="zone-card__leader"><span style="color:'+leader.color+'">⚡ '+leader.name+' leads</span></div>':'')
          +'</div></div></a>';
      });
      if(activeZones.length===0){
        zonesHTML='<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--text-faint);font-style:italic;">No active zones</div>';
      }

      // ═══ SPELLS ═══
      var dailySpells=getDailySpells();
      var spellsHTML='';
      dailySpells.forEach(function(sp){
        var tc=TYPE_COLORS[sp.y]||'var(--text-faint)';
        spellsHTML+='<div class="spell-item">'
          +'<div><div class="spell-item__name">'+sp.n+'</div>'
          +'<div class="spell-item__type" style="color:'+tc+'">'+sp.y+'</div></div>'
          +'<div style="text-align:right"><div class="spell-item__cost">'+sp.c+' MP</div>'
          +'<div class="spell-item__desc">'+sp.d+'</div></div>'
          +'</div>';
      });

      // ═══ COMMUNITY ═══
      var communityHTML='';
      if(communityTag){
        communityHTML='<div style="text-align:center;padding:12px;">'
          +'<div style="font-family:var(--font-data);font-size:14px;color:var(--gold);">'+communityTag+'</div>'
          +'<button onclick="showCommunityEdit()" style="font-family:var(--font-data);font-size:7px;color:var(--text-muted);background:none;border:1px solid var(--border-subtle);padding:4px 12px;border-radius:4px;margin-top:8px;cursor:pointer;">Change</button>'
          +'</div>';
      } else {
        communityHTML='<div style="padding:12px;">'
          +'<p style="font-family:var(--font-body);font-size:13px;color:var(--text-muted);margin-bottom:8px;">Set your community tag (e.g. $BONK)</p>'
          +'<div class="community-input-row">'
          +'<input type="text" id="communityTagInput" placeholder="$BONK" class="community-input">'
          +'<button onclick="saveCommunityTag()" class="btn-pill">Save</button>'
          +'</div>'
          +'<div id="communityResult" style="margin-top:8px;font-family:var(--font-data);font-size:8px;"></div>'
          +'</div>';
      }

      // ═══ STANDINGS ═══
      var schoolsList=Array.isArray(schools)?schools:[];
      var standingsHTML='';
      if(schoolsList.length>0){
        var maxPts=schoolsList[0].total_points||1;
        schoolsList.forEach(function(school,i){
          var h=HOUSES[school.school_id]||{name:'Unknown',color:'#888',img:''};
          var isMe=school.school_id===player.school_id;
          var pct=Math.max(5,(school.total_points/maxPts)*100);
          standingsHTML+='<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:4px;'+(isMe?'background:rgba(212,166,75,0.06);border:1px solid var(--gold-border);':'border:1px solid transparent;')+'">'
            +'<span style="font-family:var(--font-data);font-size:9px;color:'+(i<3?'var(--gold)':'var(--text-faint)')+';width:18px;text-align:center;">'+(i+1)+'</span>'
            +'<img src="'+(h.img||'')+'" style="width:20px;height:20px;object-fit:contain;" onerror="this.style.display=\'none\'">'
            +'<span style="font-family:var(--font-title);font-size:12px;font-weight:600;color:var(--text-bright);width:85px;letter-spacing:0.5px;">'+h.name+'</span>'
            +'<div style="flex:1;height:7px;border-radius:4px;background:rgba(255,255,255,0.04);overflow:hidden;"><div style="height:100%;width:'+pct+'%;border-radius:4px;background:linear-gradient(90deg,'+h.color+','+h.color+'88);"></div></div>'
            +'<span style="font-family:var(--font-data);font-size:7px;color:var(--text-faint);width:50px;text-align:right;">'+(school.total_points||0)+' pts</span>'
            +'</div>';
        });
      }

      // ═══ ACTIVITY ═══
      var recentCasts=Array.isArray(casts)?casts.slice(0,5):[];
      var activityHTML='';
      if(recentCasts.length>0){
        recentCasts.forEach(function(cast){
          activityHTML+='<div class="activity-item"><div class="activity-dot" style="background:'+house.color+'"></div><div class="activity-info"><div class="activity-zone">'+(cast.spell_name||cast.zone_name||'Spell Cast')+'</div><div class="activity-meta">'+(cast.created_at?timeAgo(cast.created_at):'')+'</div></div><span class="activity-points">+'+(cast.points_earned||0)+'</span></div>';
        });
      } else {
        activityHTML='<p style="text-align:center;color:var(--text-faint);font-style:italic;padding:16px 0;">No activity yet. Join today\'s story!</p>';
      }

      // ═══ ASSEMBLE ═══
      var c=document.getElementById('dashContent');
      c.innerHTML=''
        // 1. HEADER
        +'<div class="dash-header fade-up">'
        +'<div class="dash-header__left">'
        +'<img src="'+house.crest+'" alt="" class="dash-header__crest" onerror="this.src=\''+house.img+'\'">'
        +'<div>'
        +'<div class="dash-header__house">House '+house.name+'</div>'
        +'<div class="dash-header__element" style="color:'+house.color+'">⚡ '+house.element+'</div>'
        +'<div class="dash-header__meta">@'+(player.twitter_handle||'Unknown')+(communityTag?' · '+communityTag:'')+'</div>'
        +'</div></div>'
        +'<span class="badge--season">S0</span>'
        +'</div>'

        // 2. STORY
        +storyCardHTML

        // 3. STATS
        +'<div class="stats-row fade-up fade-up-2">'
        +'<div class="stat-card"><span class="label">Mana</span><div class="mana-row">'+manaHTML+'</div></div>'
        +'<div class="stat-card"><span class="label">Lives</span><div class="lives-row">'+livesHTML+'</div></div>'
        +'<div class="stat-card"><span class="label">Points</span><div class="data-value">'+points+'</div><div class="data-sub">Season 0</div></div>'
        +'</div>'

        // 4. ACTIVE ZONES
        +'<div class="fade-up fade-up-2">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'
        +'<span class="label">Active Zones</span>'
        +'<span style="font-family:var(--font-data);font-size:8px;color:var(--text-faint);">'+activeZones.length+' LIVE</span>'
        +'</div>'
        +'<div class="dash-zones">'+zonesHTML+'</div>'
        +'</div>'

        // 5. SPELLS
        +'<div class="card fade-up fade-up-3">'
        +'<div class="card-header"><span class="label">⚡ Today\'s Rotation</span><a href="/spellbook.html" style="font-family:var(--font-data);font-size:7px;color:var(--gold);text-decoration:none;letter-spacing:1px;">FULL SPELLBOOK →</a></div>'
        +'<div class="spell-rot">'+spellsHTML+'</div>'
        +'</div>'

        // 6. QUICK ACTIONS (matches reference: World Map, Leaderboards, @9LVNetwork)
        +'<div class="quick-actions fade-up fade-up-3">'
        +'<a href="/map.html" class="quick-btn"><span class="quick-btn__icon">🗺️</span><span class="quick-btn__label">World Map</span></a>'
        +'<a href="/leaderboards.html" class="quick-btn"><span class="quick-btn__icon">🏆</span><span class="quick-btn__label">Leaderboards</span></a>'
        +'<a href="https://twitter.com/9LVNetwork" target="_blank" class="quick-btn"><span class="quick-btn__icon">𝕏</span><span class="quick-btn__label">@9LVNetwork</span></a>'
        +'</div>'

        // 7. COMMUNITY
        +'<div class="card fade-up fade-up-4">'
        +'<div class="card-header"><span class="label">🪙 Your Community</span></div>'
        +communityHTML
        +'</div>'

        // 8. STANDINGS
        +'<div class="card fade-up fade-up-4">'
        +'<div class="card-header"><span class="label">🏰 House Standings</span></div>'
        +standingsHTML
        +'</div>'

        // 9. ACTIVITY
        +'<div class="card fade-up fade-up-4">'
        +'<div class="card-header"><span class="label">Recent Activity</span></div>'
        +activityHTML
        +'</div>';

      var loader=document.getElementById('loadingState');if(loader)loader.style.display='none';
      c.style.display='flex';
    }

    // ═══ COMMUNITY SAVE ═══
    function showCommunityEdit(){location.reload();}
    async function saveCommunityTag(){
      var input=document.getElementById('communityTagInput');
      var tag=input.value.trim();
      var result=document.getElementById('communityResult');
      if(!tag){result.innerHTML='<span style="color:var(--red);">Enter a tag</span>';return;}
      if(!tag.startsWith('$'))tag='$'+tag;
      tag=tag.toUpperCase();
      var pid=getPlayerId();if(!pid)return;
      try{
        var res=await fetch('/api/players/'+pid,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({community_tag:tag})});
        if(res.ok){result.innerHTML='<span style="color:var(--green);">Saved! '+tag+'</span>';setTimeout(function(){location.reload();},1000);}
        else{result.innerHTML='<span style="color:var(--red);">Failed to save</span>';}
      }catch(e){result.innerHTML='<span style="color:var(--red);">Error</span>';}
    }

    // ═══ HOUSE SELECTION ═══
    function buildHouseGrid(){
      var grid=document.getElementById('houseGrid');if(!grid)return;
      var html='';
      for(var id=1;id<=9;id++){
        var h=HOUSES[id];
        var r=parseInt(h.color.slice(1,3),16),g=parseInt(h.color.slice(3,5),16),b=parseInt(h.color.slice(5,7),16);
        html+='<div onclick="selectHouse('+id+')" style="cursor:pointer;text-align:center;padding:16px 8px;background:rgba('+r+','+g+','+b+',0.08);border:1px solid rgba('+r+','+g+','+b+',0.2);border-radius:12px;transition:all 0.2s;" onmouseover="this.style.transform=\'translateY(-3px)\'" onmouseout="this.style.transform=\'\'">'
          +'<img src="'+h.img+'" style="width:48px;height:48px;object-fit:contain;margin-bottom:8px;"><br>'
          +'<span style="font-family:Cinzel,serif;font-size:11px;color:'+h.color+';">'+h.name+'</span></div>';
      }
      grid.innerHTML=html;
    }
    buildHouseGrid();
    function showChooseHouse(){var o=document.getElementById('chooseHouseOverlay');if(o)o.style.display='flex';}
    function hideChooseHouse(){var o=document.getElementById('chooseHouseOverlay');if(o)o.style.display='none';}
    async function selectHouse(houseId){
      var pid=localStorage.getItem('player_id');if(!pid)return;
      if(!confirm('This choice is PERMANENT. Are you sure?'))return;
      try{var r=await fetch('/api/players/'+pid,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({school_id:houseId})});if(r.ok){hideChooseHouse();location.reload();}}catch(e){alert('Failed');}
    }

    // ═══ START ═══
    loadDashboard();
  </script>
</body>
</html>
