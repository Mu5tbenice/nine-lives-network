<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dashboard | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    /* ═══ WARM NIGHT DESIGN SYSTEM ═══ */
    :root {
      --bg-deep: #120e1e;
      --bg-warm: #1a1528;
      --bg-card: rgba(30, 22, 42, 0.7);
      --bg-card-solid: #1e1630;
      --bg-glass: rgba(255, 240, 220, 0.04);

      --border: rgba(212, 166, 75, 0.12);
      --border-warm: rgba(255, 180, 100, 0.1);
      --border-glow: rgba(212, 166, 75, 0.3);

      --gold: #D4A64B;
      --gold-soft: #e8c675;
      --gold-dim: rgba(212, 166, 75, 0.15);

      --text-bright: #F5F0E8;
      --text-body: #D4C8B8;
      --text-muted: #9B8E7E;
      --text-faint: #6B5E50;

      --sunset: #e8855a;
      --sunset-glow: rgba(232, 133, 90, 0.15);
      --sky: #8BB4E0;
      --green: #6acd8a;
      --red: #e85a6a;
      --cyan: #6ac8d8;
      --purple: #b088e8;

      --font-title: 'Cinzel', serif;
      --font-body: 'Crimson Text', Georgia, serif;
      --font-data: 'Press Start 2P', monospace;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(232,133,90,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139,180,224,0.06) 0%, transparent 40%),
        radial-gradient(ellipse at 20% 80%, rgba(176,136,232,0.04) 0%, transparent 40%),
        linear-gradient(180deg, #1a1528 0%, #120e1e 30%, #0e0a18 100%);
      font-family: var(--font-body);
      color: var(--text-body);
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(212,166,75,0.15); border-radius: 2px; }
    a { color: var(--gold); text-decoration: none; }

    /* ═══ LAYOUT ═══ */
    .main-container { max-width: 500px; margin: 0 auto; padding: 0 14px 40px; }

    /* ═══ ANIMATIONS ═══ */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 20px rgba(212,166,75,0.08); } 50% { box-shadow: 0 0 30px rgba(212,166,75,0.15); } }
    @keyframes crystalGlow { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .fade-up-1 { animation-delay: 0.05s; }
    .fade-up-2 { animation-delay: 0.1s; }
    .fade-up-3 { animation-delay: 0.15s; }
    .fade-up-4 { animation-delay: 0.2s; }

    /* ═══ SECTION LABEL ═══ */
    .section-label {
      display: flex; align-items: center; gap: 8px;
      margin: 16px 0 8px;
    }
    .section-label__text {
      font-family: var(--font-title); font-size: 12px; font-weight: 700;
      color: var(--gold); letter-spacing: 2px;
    }
    .section-label__line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ═══ CARDS ═══ */
    .card {
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    /* ═══ GUILD TAG ═══ */
    .guild-tag-row {
      display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap;
    }
    .guild-tag-input {
      font-family: var(--font-data); font-size: 8px; letter-spacing: 1px;
      padding: 5px 10px; border-radius: 8px;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      color: var(--text-bright); outline: none; width: 120px;
      transition: border-color 0.2s;
    }
    .guild-tag-input:focus { border-color: var(--gold); }
    .guild-tag-input::placeholder { color: var(--text-faint); font-size: 7px; }
    .guild-tag-save {
      font-family: var(--font-data); font-size: 6px; letter-spacing: 0.5px;
      padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer;
      background: var(--gold-dim); color: var(--gold); border: 1px solid var(--border-glow);
      transition: all 0.2s;
    }
    .guild-tag-save:hover { background: rgba(212,166,75,0.25); }
    .guild-tag-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .lone-wolf-badge {
      font-family: var(--font-data); font-size: 7px; padding: 3px 10px;
      border-radius: 8px; background: rgba(106,200,216,0.1);
      color: var(--cyan); border: 1px solid rgba(106,200,216,0.25);
      letter-spacing: 1px;
    }
    .guild-badge {
      font-family: var(--font-data); font-size: 7px; padding: 3px 10px;
      border-radius: 8px; letter-spacing: 1px;
    }
    .guild-tag-msg {
      font-family: var(--font-data); font-size: 6px; letter-spacing: 0.5px;
      padding: 2px 0;
    }

    /* ═══ LOADING / ERROR ═══ */
    .loading-state { text-align: center; padding: 60px 20px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { text-align: center; padding: 60px 20px; }
    .error-state p { margin-bottom: 8px; }
  </style>
</head>
<body>
<script src="/js/nav.js"></script>

  <!-- LOADING -->
  <div class="main-container" id="loadingState">
    <div class="loading-state"><div class="spinner"></div><span style="font-family:var(--font-mono);font-size:8px;color:var(--text-faint);letter-spacing:1px;">LOADING...</span></div>
  </div>

  <!-- ERROR -->
  <div class="main-container" id="errorState" style="display:none;">
    <div class="error-state">
      <p style="font-size:48px;">🐱</p>
      <p style="font-family:var(--font-title);font-size:18px;color:var(--text-bright);">No player found</p>
      <p style="font-size:14px;color:var(--text-muted);">You need to <a href="/register.html">register</a> first.</p>
    </div>
  </div>

  <!-- DASHBOARD CONTENT -->
  <div class="main-container" id="dashContent" style="display:none;"></div>

<script src="/js/card-particles.js"></script>
<script src="/js/card-v4.js"></script>
<script>
/* ═══ DATA ═══ */
var HOUSES={1:{name:'Smoulders',color:'#E03C31',slug:'smoulders',icon:'🔥',img:'/assets/images/houses/Housesmoulders.png'},2:{name:'Darktide',color:'#00B4D8',slug:'darktide',icon:'🌊',img:'/assets/images/houses/Housedarktide.png'},3:{name:'Stonebark',color:'#5CB338',slug:'stonebark',icon:'🌿',img:'/assets/images/houses/Housestonebark.png'},4:{name:'Ashenvale',color:'#B0C4DE',slug:'ashenvale',icon:'💨',img:'/assets/images/houses/HouseAshenvale.png'},5:{name:'Stormrage',color:'#FFC800',slug:'stormrage',icon:'⚡',img:'/assets/images/houses/Housestormrage.png'},6:{name:'Nighthollow',color:'#7B2D8E',slug:'nighthollow',icon:'🌙',img:'/assets/images/houses/Housenighthollow.png'},7:{name:'Dawnbringer',color:'#FF8C00',slug:'dawnbringer',icon:'☀️',img:'/assets/images/houses/HouseDwnbringer.png'},8:{name:'Manastorm',color:'#5B8FE0',slug:'manastorm',icon:'🔮',img:'/assets/images/houses/Housemanastorm.png'},9:{name:'Plaguemire',color:'#E84393',slug:'plaguemire',icon:'☠️',img:'/assets/images/houses/Houseplaguemire.png'}};

var ZONE_IMAGES={1:'/assets/images/zones/ashen-approach.jpg',2:'/assets/images/zones/the-drowning-spiral.png',3:'/assets/images/zones/crimson-overlook.jpg',4:'/assets/images/zones/the-floating-citadel.png',5:'/assets/images/zones/violet-storm.png',6:'/assets/images/zones/the-lone-spire.png',7:'/assets/images/zones/azure-expanse.png',8:'/assets/images/zones/shattered-stream.png',9:'/assets/images/zones/the-quiet-woods.png',10:'/assets/images/zones/the-twin-spires.png',11:'/assets/images/zones/the-veiled-cascade.png',12:'/assets/images/zones/the-sunken-archives.png',13:'/assets/images/zones/the-whispering-woods.png',14:'/assets/images/zones/the-fallen-wyrm.jpg',15:'/assets/images/zones/the-grassy-knoll.png',16:'/assets/images/zones/the-gathering-grove.png',17:'/assets/images/zones/the-breach.png',18:'/assets/images/zones/the-great-divide.png',19:'/assets/images/zones/the-chambers-keep.png',20:'/assets/images/zones/the-eastern-exchange.png',21:'/assets/images/zones/the-memorial-arch.png',22:'/assets/images/zones/lunar-sanctum.png',23:'/assets/images/zones/the-divide.png',24:'/assets/images/zones/the-silent-valley.png',25:'/assets/images/zones/the-torn-veil.png'};

var STORY_IMAGES=['https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800&q=80','https://images.unsplash.com/photo-1534447677768-be436bb09401?w=800&q=80','https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80'];

function getTagColor(tag){if(!tag)return null;var colors={'$BONK':'#F0A030','$WIF':'#8B5CF6','$POPCAT':'#FF6B6B','$DEGEN':'#00D4FF','$NPC':'#44cc44','$MYRO':'#FF8C00','$MOG':'#E84393','$PEPE':'#5CB338','$FLOKI':'#FFC800','$SHIB':'#FF4500','$9LV':'#D4A64B'};var u=tag.toUpperCase();if(colors[u])return colors[u];var h=0;for(var i=0;i<u.length;i++)h=u.charCodeAt(i)+((h<<5)-h);return'hsl('+Math.abs(h)%360+',60%,55%)';}

/* ═══ AUTH ═══ */
function getPlayerId(){var p=new URLSearchParams(window.location.search);var f=p.get('player_id');if(f){localStorage.setItem('player_id',f);return f;}return localStorage.getItem('player_id');}
function doLogout(){localStorage.removeItem('player_id');window.location.href='/';}
if(localStorage.getItem('player_id')){var ml=document.getElementById('mobileLogout');if(ml)ml.style.display='';}
function timeAgo(d){var diff=Date.now()-new Date(d).getTime(),m=Math.floor(diff/60000);if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function getZoneImg(z){return(z.image_url?(z.image_url.startsWith('/')?z.image_url:'/assets/images/zones/'+z.image_url):'')||ZONE_IMAGES[z.id]||'';}

/* ═══ GUILD TAG SAVE ═══ */
async function saveGuildTag(){
  var pid=getPlayerId();if(!pid)return;
  var input=document.getElementById('guildTagInput');
  var btn=document.getElementById('guildTagSave');
  var msg=document.getElementById('guildTagMsg');
  var tag=(input.value||'').trim();
  if(!tag){msg.textContent='Enter a tag or leave blank for Lone Wolf';msg.style.color='var(--red)';return;}
  btn.disabled=true;btn.textContent='SAVING...';
  try{
    var r=await fetch('/api/players/update-guild',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(pid),guild_tag:tag})});
    var d=await r.json();
    if(r.ok&&d.success){
      msg.textContent='Guild tag saved!';msg.style.color='var(--green)';
      btn.textContent='SAVED ✓';
      // Update the display badge
      var badge=document.getElementById('guildBadgeDisplay');
      if(badge){
        var tc=getTagColor(tag);
        badge.innerHTML='<span class="guild-badge" style="background:'+tc+'12;color:'+tc+';border:1px solid '+tc+'30;">🏰 '+esc(tag)+'</span>';
      }
      setTimeout(function(){btn.textContent='SAVE';btn.disabled=false;msg.textContent='';},2000);
    }else{
      msg.textContent=d.error||'Failed to save';msg.style.color='var(--red)';
      btn.textContent='SAVE';btn.disabled=false;
    }
  }catch(e){
    msg.textContent='Network error';msg.style.color='var(--red)';
    btn.textContent='SAVE';btn.disabled=false;
  }
}

async function clearGuildTag(){
  var pid=getPlayerId();if(!pid)return;
  var msg=document.getElementById('guildTagMsg');
  try{
    var r=await fetch('/api/players/update-guild',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:parseInt(pid),guild_tag:null})});
    var d=await r.json();
    if(r.ok&&d.success){
      document.getElementById('guildTagInput').value='';
      var badge=document.getElementById('guildBadgeDisplay');
      if(badge)badge.innerHTML='<span class="lone-wolf-badge">🐺 LONE WOLF</span>';
      msg.textContent='Gone solo! 1.5x ATK in zones.';msg.style.color='var(--cyan)';
      setTimeout(function(){msg.textContent='';},3000);
    }
  }catch(e){msg.textContent='Error';msg.style.color='var(--red)';}
}

/* ═══ LOAD ═══ */
async function loadDashboard(){
  var pid=getPlayerId();
  if(!pid){document.getElementById('loadingState').style.display='none';document.getElementById('errorState').style.display='block';return;}
  try{
    var[pR,cR,zR,sR]=await Promise.all([
      fetch('/api/players/'+pid),
      fetch('/api/players/'+pid+'/casts'),
      fetch('/api/zones'),
      fetch('/api/leaderboards/schools')
    ]);
    var player=pR.ok?await pR.json():null;
    var casts=cR.ok?await cR.json():[];
    var zones=zR.ok?await zR.json():[];
    var schools=sR.ok?await sR.json():[];
    if(!player||player.error){document.getElementById('loadingState').style.display='none';document.getElementById('errorState').style.display='block';return;}

    // Try loading Nine data + quests
    var nineData=null,quests=[];
    try{var nr=await fetch('/api/players/'+pid+'/nine');nineData=nr.ok?await nr.json():null;}catch(e){}
    try{var qr=await fetch('/api/quests/'+pid);if(qr.ok){var qd=await qr.json();quests=qd.quests||[];}}catch(e){}

    render(player,casts||[],zones||[],schools||[],nineData,quests);
  }catch(err){
    console.error('Dashboard load error:',err);
    document.getElementById('loadingState').style.display='none';
    document.getElementById('errorState').style.display='block';
  }
}

/* ═══ RENDER ═══ */
async function render(player,casts,zones,schools,nineData,quests){
  var house=HOUSES[player.school_id]||HOUSES[1];
  var obj=Array.isArray(zones)?zones.find(function(z){return z.is_current_objective;}):null;
  var pid=getPlayerId();
  var mana=5,maxM=10; try{var mr=await fetch("/api/mana/"+pid);if(mr.ok){var md=await mr.json();mana=md.mana||0;maxM=md.maxMana||10;}}catch(e){}
  var pts=player.seasonal_points||0,streak=player.streak||0;
  var rc=Array.isArray(casts)?casts.slice(0,5):[];
  var now=new Date(),doy=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
  var storyImg=STORY_IMAGES[doy%STORY_IMAGES.length];

  // Nine stats (fallback)
  var nine=nineData||{};
  var nAtk=nine.base_atk||'?',nHp=nine.base_hp||'?',nSpd=nine.base_spd||'?';

  // Mana orbs
  var mH='';for(var i=0;i<maxM;i++){
    mH+='<div style="width:11px;height:11px;border-radius:50%;'+(i<mana?'background:var(--cyan);border:1px solid #8DD4F0;box-shadow:0 0 6px rgba(106,200,216,0.4);':'background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);')+'"></div>';
  }

  // Streak dots
  var sH='';for(var i=0;i<7;i++){
    sH+='<div style="width:8px;height:8px;border-radius:50%;'+(i<streak?'background:linear-gradient(135deg,var(--sunset),var(--gold));border:1px solid rgba(232,133,90,0.5);box-shadow:0 0 6px rgba(232,133,90,0.3);':'background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);')+'"></div>';
  }

  // Avatar
  var avH=player.profile_image
    ?'<img src="'+player.profile_image+'" style="width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid '+house.color+';box-shadow:0 0 20px '+house.color+'25;">'
    :'<div style="width:48px;height:48px;border-radius:50%;border:2px solid '+house.color+';background:'+house.color+'18;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 20px '+house.color+'25;">'+house.icon+'</div>';

  // Guild tag — supports both old community_tag and new guild_tag field
  var guildTag=player.guild_tag||player.community_tag||'';
  var tc=getTagColor(guildTag);
  var guildBadgeH=guildTag
    ?'<span class="guild-badge" style="background:'+tc+'12;color:'+tc+';border:1px solid '+tc+'30;">🏰 '+esc(guildTag)+'</span>'
    :'<span class="lone-wolf-badge">🐺 LONE WOLF</span>';

  // Guild tag editor row
  var guildEditorH='<div class="guild-tag-row">'
    +'<span id="guildBadgeDisplay">'+guildBadgeH+'</span>'
    +'<input type="text" id="guildTagInput" class="guild-tag-input" placeholder="$GUILD TAG" value="'+esc(guildTag)+'" maxlength="16">'
    +'<button id="guildTagSave" class="guild-tag-save" onclick="saveGuildTag()">SAVE</button>'
    +(guildTag?'<button class="guild-tag-save" onclick="clearGuildTag()" style="background:rgba(106,200,216,0.1);color:var(--cyan);border-color:rgba(106,200,216,0.2);">GO SOLO 🐺</button>':'')
    +'</div>'
    +'<div id="guildTagMsg" class="guild-tag-msg" style="margin-top:3px;">'
    +(!guildTag?'<span style="color:var(--cyan);font-size:6px;">🐺 Lone Wolves get 1.5x ATK in zone battles</span>':'')
    +'</div>';

  // Story card
  var scH='';
  if(obj){
    var oImg=getZoneImg(obj)||storyImg;
    var tL=obj.objective_tweet_id?'https://twitter.com/9LVNetwork/status/'+obj.objective_tweet_id:'https://twitter.com/9LVNetwork';
    scH='<div class="fade-up fade-up-1" style="position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border-glow);margin-bottom:14px;animation:glowPulse 4s ease-in-out infinite;">'
      +'<div style="position:absolute;inset:0;"><img src="'+oImg+'" style="width:100%;height:100%;object-fit:cover;filter:brightness(0.25) saturate(1.3);"><div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(26,21,40,0.3) 0%,rgba(18,14,30,0.92) 100%);"></div></div>'
      +'<div style="position:relative;z-index:1;padding:16px 14px;">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span style="font-family:var(--font-data);font-size:7px;color:var(--text-muted);letter-spacing:1px;">TODAY\'S STORY</span><span style="font-family:var(--font-data);font-size:7px;color:var(--green);letter-spacing:1px;">● LIVE</span></div>'
      +'<div style="text-align:center;padding:8px 0;">'
      +'<div style="font-family:var(--font-data);font-size:7px;color:var(--text-muted);letter-spacing:2px;margin-bottom:8px;">DAILY NARRATIVE</div>'
      +'<div style="font-family:var(--font-title);font-size:22px;font-weight:700;color:var(--text-bright);letter-spacing:2px;text-shadow:0 2px 20px rgba(0,0,0,0.6);">'+esc(obj.narrative_title||obj.name)+'</div>'
      +'<div style="font-family:var(--font-body);font-size:14px;font-style:italic;color:var(--text-muted);margin-top:4px;">'+esc(obj.description||'')+'</div>'
      +'<div style="font-family:var(--font-title);font-size:12px;color:var(--gold);letter-spacing:1px;margin:16px 0 12px;">Show up. Represent. Become part of the story.</div>'
      +'<a href="'+tL+'" target="_blank" style="display:inline-block;font-family:var(--font-title);font-size:13px;font-weight:700;padding:10px 28px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#c49030);color:#0a0810;letter-spacing:1.5px;text-decoration:none;box-shadow:0 4px 0 #8a6d2f,0 6px 16px rgba(212,166,75,0.25);">𝕏 Join the Story</a>'
      +'</div></div></div>';
  }else{
    scH='<div class="card fade-up fade-up-1" style="text-align:center;padding:30px 20px;border:1px solid var(--border);"><span style="font-family:var(--font-data);font-size:7px;color:var(--text-muted);letter-spacing:1px;">TODAY\'S STORY</span><p style="font-family:var(--font-title);font-size:16px;color:var(--text-body);font-style:italic;margin-top:12px;">No active story right now. Check back at 8 AM UTC.</p></div>';
  }

  // Quests
  var qH='';
  if(quests&&quests.length>0){
    quests.forEach(function(q){

// ── DASHBOARD NINE MINI PREVIEW ──
async function loadNinePreview(){
  var pid=getPlayerId();if(!pid)return;
  try{
    var r=await fetch("/api/items/equipped/"+pid);
    if(!r.ok)return;
    var d=await r.json();
    var nine=d.nine,eq=d.equipped;
    var SLOT_PATHS={fur:"/assets/nine/fur/",expression:"/assets/nine/expression/",headwear:"/assets/nine/headwear/",outfit:"/assets/nine/outfit/",weapon:"/assets/nine/weapon/",familiar:"/assets/nine/familiar/"};
    var LAYER_ORDER=["fur","expression","headwear","outfit","weapon","familiar"];
    var items=d.items||[];
    function findI(slug){for(var i=0;i<items.length;i++){if(items[i].slug===slug)return items[i];}return null;}
    var canvas=document.getElementById("dashNineCanvas");
    if(!canvas)return;
    var ctx=canvas.getContext("2d");
    var layers=[];
    LAYER_ORDER.forEach(function(slot){
      var slug=eq[slot];if(!slug)return;
      var item=findI(slug);if(!item||!item.image_file)return;
      layers.push((SLOT_PATHS[slot]||"")+item.image_file);
    });
    if(layers.length>0){
      var loaded=0,imgs=[];
      layers.forEach(function(src,i){
        var img=new Image();img.onload=function(){imgs[i]=img;loaded++;if(loaded===layers.length){ctx.clearRect(0,0,200,200);imgs.forEach(function(im){if(im)ctx.drawImage(im,0,0,200,200);});}};
        img.onerror=function(){loaded++;if(loaded===layers.length){ctx.clearRect(0,0,200,200);imgs.forEach(function(im){if(im)ctx.drawImage(im,0,0,200,200);});}};
        img.src=src;
      });
    }
    var statsEl=document.getElementById("dashNineStats");
    if(statsEl&&nine){
      var h="";
      ["atk","hp","spd","def","luck"].forEach(function(s){
        var labels={atk:"ATK",hp:"HP",spd:"SPD",def:"DEF",luck:"LCK"};
        h+="<div style=\"text-align:center;\"><div style=\"font-family:var(--font-data);font-size:10px;color:"+STAT_COLORS[s]+";\">"+((nine.total&&nine.total[s])||0)+"</div><div style=\"font-family:var(--font-data);font-size:5px;color:var(--text-faint);\">"+labels[s]+"</div></div>";
      });
      statsEl.innerHTML=h;
    }
  }catch(e){console.error("Nine preview error:",e);}
}
