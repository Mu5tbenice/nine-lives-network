<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Dashboard | Nine Lives Network</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles (v2 design system) -->
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">

  <style>
    /* ══ Dashboard-specific styles ══ */

    /* Header row */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .dash-header__left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dash-header__avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
    }
    .dash-header__avatar--placeholder {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: var(--bg-card);
    }
    .dash-header__house {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 16px;
      color: var(--text-bright);
      letter-spacing: 1px;
    }
    .dash-header__element {
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
    }
    .dash-header__meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-faint);
    }

    /* Story card */
    .story-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--gold-border);
      min-height: 220px;
      animation: glowPulse 4s ease-in-out infinite;
    }
    .story-card__bg {
      position: absolute;
      inset: 0;
    }
    .story-card__bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.3) saturate(1.4);
    }
    .story-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,8,18,0.4) 0%, rgba(10,8,18,0.88) 100%);
    }
    .story-card__content {
      position: relative;
      z-index: 1;
      padding: 18px 22px;
    }
    .story-card__top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .story-card__body {
      text-align: center;
      padding: 8px 0 4px;
    }
    .story-card__zone {
      font-family: var(--font-title);
      font-weight: 700;
      font-size: 24px;
      color: var(--text-bright);
      letter-spacing: 2px;
      margin: 8px 0;
      text-shadow: 0 2px 20px rgba(0,0,0,0.6);
    }
    .story-card__desc {
      font-family: var(--font-body);
      font-size: 15px;
      font-style: italic;
      color: var(--text-body);
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto 16px;
    }
    .story-card__cta-text {
      font-family: var(--font-title);
      font-size: 13px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .stats-row .data-value {
      font-family: var(--font-data);
      font-size: 16px;
      color: var(--text-bright);
    }
    .stats-row .data-sub {
      font-family: var(--font-data);
      font-size: 7px;
      color: var(--text-faint);
    }

    /* Streak bar */
    .streak-bar {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .streak-bar__icon {
      font-size: 28px;
      filter: drop-shadow(0 0 8px rgba(255,150,0,0.5));
    }
    .streak-bar__info {
      flex: 1;
    }
    .streak-bar__count {
      font-family: var(--font-data);
      font-size: 12px;
      color: var(--text-bright);
    }
    .streak-bar__count span {
      font-size: 7px;
      color: var(--text-muted);
    }
    .streak-bar__sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* War room mini */
    .wr-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      background: var(--bg-inset);
      border-radius: 8px;
      margin-bottom: 5px;
    }
    .wr-rank {
      font-family: var(--font-data);
      font-size: 8px;
      width: 16px;
      text-align: center;
    }
    .wr-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .wr-tag {
      font-family: var(--font-title);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
      flex: 0 0 65px;
    }
    .wr-pts {
      text-align: right;
      min-width: 55px;
    }
    .wr-pts__val {
      font-family: var(--font-data);
      font-size: 8px;
      color: var(--text-bright);
    }

    /* Ticker strip */
    .ticker-strip {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      padding: 8px 0;
      border-top: 1px solid var(--border-subtle);
      overflow-x: auto;
    }
    .ticker-item {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .ticker-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Error/empty state */
    .dash-error {
      text-align: center;
      padding: 40px 20px;
      font-family: var(--font-body);
      color: var(--text-muted);
      font-style: italic;
    }
    .dash-error a {
      color: var(--gold);
    }

    /* No story fallback */
    .no-story {
      padding: 30px 20px;
      text-align: center;
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      background: var(--bg-card);
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════ -->
  <!-- NAVIGATION                           -->
  <!-- ══════════════════════════════════════ -->
  <nav class="top-nav">
    <div class="top-nav-content">
      <a href="/" class="nav-logo">Nine Lives Network</a>
      <ul class="nav-links">
        <li><a href="/dashboard.html" class="active">Dashboard</a></li>
        <li><a href="/map.html">World</a></li>
        <li><a href="/leaderboards.html">Leaderboards</a></li>
        <li><a href="/warroom.html">War Room</a></li>
        <li><a href="/arena.html">Arena</a></li>
        <li><a href="/how-to-play.html">Help</a></li>
      </ul>
      <button class="hamburger" id="hamburger" onclick="toggleMobileMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="/dashboard.html" class="active"><span class="menu-icon">📊</span> Dashboard</a>
    <a href="/map.html"><span class="menu-icon">🌍</span> World</a>
    <a href="/leaderboards.html"><span class="menu-icon">🏆</span> Leaderboards</a>
    <a href="/warroom.html"><span class="menu-icon">📈</span> War Room</a>
    <a href="/arena.html"><span class="menu-icon">⚔️</span> Arena</a>
    <a href="/how-to-play.html"><span class="menu-icon">❓</span> Help</a>
  </div>

  <!-- ══════════════════════════════════════ -->
  <!-- MAIN CONTENT                         -->
  <!-- ══════════════════════════════════════ -->
  <div class="main-container" id="dashContent" style="display:none;">

    <!-- Loading state (shown while fetching) -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
    </div>

  </div>

  <!-- Error state (shown if no player found) -->
  <div class="dash-error" id="errorState" style="display:none;">
    <p style="font-size:48px; margin-bottom:16px;">🧙</p>
    <p style="font-size:18px; color:var(--text-bright); margin-bottom:8px;">No player found</p>
    <p>You need to <a href="/register.html">register</a> first to access the dashboard.</p>
  </div>


  <!-- ══════════════════════════════════════ -->
  <!-- JAVASCRIPT                           -->
  <!-- ══════════════════════════════════════ -->
  <script>
    // ── House data (matches your database) ──
    const HOUSES = {
      1: { name: 'Smoulders',   emoji: '🔥', color: '#E03C31', element: 'Ember Covenant',  img: '/assets/images/houses/Housesmoulders.png' },
      2: { name: 'Darktide',    emoji: '🌊', color: '#00B4D8', element: 'Tidal Conclave',   img: '/assets/images/houses/Housedarktide.png' },
      3: { name: 'Stonebark',   emoji: '🌿', color: '#5CB338', element: 'Stone Covenant',   img: '/assets/images/houses/Housestonebark.png' },
      4: { name: 'Ashenvale',   emoji: '💨', color: '#90E0EF', element: 'Zephyr Circle',    img: '/assets/images/houses/HouseAshenvale.png' },
      5: { name: 'Stormrage',   emoji: '⚡', color: '#FFC800', element: 'Storm Assembly',   img: '/assets/images/houses/Housestormrage.png' },
      6: { name: 'Nighthollow', emoji: '🌙', color: '#7B2D8E', element: 'Umbral Syndicate', img: '/assets/images/houses/Housenighthollow.png' },
      7: { name: 'Dawnbringer', emoji: '☀️', color: '#FF8C00', element: 'Radiant Order',    img: '/assets/images/houses/HouseDwnbringer.png' },
      8: { name: 'Manastorm',   emoji: '🔮', color: '#5B8FE0', element: 'Arcane Spire',     img: '/assets/images/houses/Housemanastorm.png' },
      9: { name: 'Plaguemire',  emoji: '☠️', color: '#E84393', element: 'WildCat Path',     img: '/assets/images/houses/Houseplaguemire.png' },
    };

    // Story images — these rotate daily. Replace with your own zone art later.
    const STORY_IMAGES = [
      'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800&q=80',
      'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=800&q=80',
      'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80',
      'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=80',
      'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800&q=80',
      'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=80',
      'https://images.unsplash.com/photo-1507400492013-162706c8c05e?w=800&q=80',
    ];

    // ── Get player ID from URL or localStorage ──
    function getPlayerId() {
      const params = new URLSearchParams(window.location.search);
      const fromUrl = params.get('player_id');
      if (fromUrl) {
        localStorage.setItem('player_id', fromUrl);
        return fromUrl;
      }
      return localStorage.getItem('player_id');
    }

    // ── Mobile menu toggle ──
    function toggleMobileMenu() {
      document.getElementById('hamburger').classList.toggle('active');
      document.getElementById('mobileMenu').classList.toggle('active');
    }

    // ── Format time ago ──
    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      return days + 'd ago';
    }

    // ── Main load function ──
    async function loadDashboard() {
      const playerId = getPlayerId();
      if (!playerId) {
        document.getElementById('dashContent').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
        return;
      }

      try {
        // Fetch all data in parallel
        const [playerRes, castsRes, zonesRes, schoolsRes] = await Promise.all([
          fetch('/api/players/' + playerId),
          fetch('/api/players/' + playerId + '/casts'),
          fetch('/api/zones'),
          fetch('/api/leaderboards/schools'),
        ]);

        const player = await playerRes.json();
        const casts = await castsRes.json();
        const zones = await zonesRes.json();
        const schools = await schoolsRes.json();

        if (!player || player.error) {
          document.getElementById('dashContent').style.display = 'none';
          document.getElementById('errorState').style.display = 'block';
          return;
        }

        // Build the dashboard
        renderDashboard(player, casts || [], zones || [], schools || []);

      } catch (err) {
        console.error('Dashboard load error:', err);
        document.getElementById('dashContent').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
      }
    }

    // ── Render the entire dashboard ──
    function renderDashboard(player, casts, zones, schools) {
      const house = HOUSES[player.school_id] || HOUSES[1];
      const objective = Array.isArray(zones) ? zones.find(function(z) { return z.is_current_objective; }) : null;
      const streak = player.streak || 0;
      const mana = (player.mana != null) ? player.mana : 5;
      const maxMana = 5;
      const lives = (player.lives != null) ? player.lives : 3;
      const maxLives = 5;
      const points = player.seasonal_points || 0;

      // Day of year for rotating story images
      var now = new Date();
      var start = new Date(now.getFullYear(), 0, 0);
      var dayOfYear = Math.floor((now - start) / 86400000);
      var storyImg = STORY_IMAGES[dayOfYear % STORY_IMAGES.length];

      // Recent casts (up to 5)
      var recentCasts = Array.isArray(casts) ? casts.slice(0, 5) : [];

      // Schools for house standings
      var schoolsList = Array.isArray(schools) ? schools : [];

      // Build mana orbs HTML
      var manaHTML = '';
      for (var i = 0; i < maxMana; i++) {
        manaHTML += '<div class="mana-orb ' + (i < mana ? 'mana-orb--filled' : '') + '"></div>';
      }

      // Build lives HTML
      var livesHTML = '';
      for (var i = 0; i < maxLives; i++) {
        livesHTML += '<span class="life-heart ' + (i >= lives ? 'life-heart--empty' : '') + '">❤️</span>';
      }

      // Build streak dots HTML
      var streakHTML = '';
      for (var i = 0; i < 7; i++) {
        streakHTML += '<div class="streak-dot ' + (i < streak ? 'streak-dot--filled' : '') + '"></div>';
      }

      // Build story card HTML
      var storyCardHTML = '';
      if (objective) {
        var tweetLink = objective.objective_tweet_id
          ? 'https://twitter.com/9LVNetwork/status/' + objective.objective_tweet_id
          : 'https://twitter.com/9LVNetwork';
        storyCardHTML = ''
          + '<div class="story-card fade-up fade-up-1">'
          + '  <div class="story-card__bg">'
          + '    <img src="' + storyImg + '" alt="">'
          + '    <div class="story-card__overlay"></div>'
          + '  </div>'
          + '  <div class="story-card__content">'
          + '    <div class="story-card__top">'
          + '      <span class="label">Today\'s Story</span>'
          + '      <span class="badge badge--live">● LIVE</span>'
          + '    </div>'
          + '    <div class="story-card__body">'
          + '      <span class="label">Daily Narrative</span>'
          + '      <h2 class="story-card__zone">' + (objective.name || 'Unknown Zone') + '</h2>'
          + '      <p class="story-card__desc">' + (objective.description || 'A new chapter unfolds in the world of Avaloris.') + '</p>'
          + '      <div class="story-card__cta-text">Show up. Represent. Become part of the story.</div>'
          + '      <a href="' + tweetLink + '" target="_blank" class="btn-gold">𝕏 Join the Story</a>'
          + '    </div>'
          + '  </div>'
          + '</div>';
      } else {
        storyCardHTML = ''
          + '<div class="no-story fade-up fade-up-1">'
          + '  <span class="label">Today\'s Story</span>'
          + '  <p style="font-size:32px; margin:12px 0;">🌙</p>'
          + '  <p style="font-family:var(--font-title); font-size:16px; color:var(--text-body); font-style:italic;">No active story right now. Check back at 8 AM UTC.</p>'
          + '</div>';
      }

      // Build house standings HTML
      var standingsHTML = '';
      if (schoolsList.length > 0) {
        var maxPts = schoolsList[0].total_points || 1;
        for (var i = 0; i < schoolsList.length; i++) {
          var school = schoolsList[i];
          var h = HOUSES[school.school_id] || { name: 'Unknown', emoji: '?', color: '#888' };
          var isMyHouse = school.school_id === player.school_id;
          var pct = Math.max(5, (school.total_points / maxPts) * 100);
          var rowStyle = isMyHouse
            ? 'background:rgba(212,166,75,0.06); border:1px solid var(--gold-border);'
            : 'border:1px solid transparent;';
          var rankColor = i < 3 ? 'var(--gold)' : 'var(--text-faint)';

          standingsHTML += ''
            + '<div style="display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:6px; margin-bottom:4px; ' + rowStyle + '">'
            + '  <span style="font-family:var(--font-data); font-size:9px; color:' + rankColor + '; width:18px; text-align:center;">' + (i + 1) + '</span>'
            + '  <span style="font-size:16px;">' + h.emoji + '</span>'
            + '  <span style="font-family:var(--font-title); font-size:12px; font-weight:600; color:var(--text-bright); width:85px; letter-spacing:0.5px;">' + h.name + '</span>'
            + '  <div style="flex:1; height:7px; border-radius:4px; background:rgba(255,255,255,0.04); overflow:hidden;">'
            + '    <div style="height:100%; width:' + pct + '%; border-radius:4px; background:linear-gradient(90deg, ' + h.color + ', ' + h.color + '88);"></div>'
            + '  </div>'
            + '  <span style="font-family:var(--font-data); font-size:7px; color:var(--text-faint); width:50px; text-align:right;">' + (school.total_points || 0) + ' pts</span>'
            + '</div>';
        }
      } else {
        standingsHTML = '<p class="label" style="text-align:center; padding:16px 0;">No data yet</p>';
      }

      // Build recent activity HTML
      var activityHTML = '';
      if (recentCasts.length > 0) {
        for (var i = 0; i < recentCasts.length; i++) {
          var cast = recentCasts[i];
          activityHTML += ''
            + '<div class="activity-item">'
            + '  <div class="activity-dot" style="background:' + house.color + '"></div>'
            + '  <div class="activity-info">'
            + '    <div class="activity-zone">' + (cast.spell_name || cast.zone_name || 'Spell Cast') + '</div>'
            + '    <div class="activity-meta">' + (cast.created_at ? timeAgo(cast.created_at) : '') + '</div>'
            + '  </div>'
            + '  <span class="activity-points">+' + (cast.points_earned || 0) + '</span>'
            + '</div>';
        }
      } else {
        activityHTML = '<p style="text-align:center; color:var(--text-faint); font-style:italic; padding:16px 0;">No activity yet. Join today\'s story!</p>';
      }

      // Avatar HTML
      var avatarHTML = player.profile_image
        ? '<img src="' + player.profile_image + '" alt="" class="dash-header__avatar">'
        : '<div class="dash-header__avatar--placeholder">' + house.emoji + '</div>';

      // ── Put it all together ──
      var container = document.getElementById('dashContent');
      container.innerHTML = ''
        // HEADER
        + '<div class="dash-header fade-up">'
        + '  <div class="dash-header__left">'
        + '    ' + avatarHTML
        + '    <div>'
        + '      <div class="dash-header__house">House ' + house.name + '</div>'
        + '      <div class="dash-header__element" style="color:' + house.color + '">' + house.element + '</div>'
        + '      <div class="dash-header__meta">@' + (player.twitter_handle || 'Unknown') + (player.community_tag ? ' · ' + player.community_tag : '') + '</div>'
        + '    </div>'
        + '  </div>'
        + '  <span class="badge--season">S0</span>'
        + '</div>'

        // STORY
        + storyCardHTML

        // STATS ROW
        + '<div class="stats-row fade-up fade-up-2">'
        + '  <div class="stat-card"><span class="label">Mana</span><div class="mana-row">' + manaHTML + '</div></div>'
        + '  <div class="stat-card"><span class="label">Lives</span><div class="lives-row">' + livesHTML + '</div></div>'
        + '  <div class="stat-card"><span class="label">Points</span><div class="data-value">' + points + '</div><div class="data-sub">Season 0</div></div>'
        + '</div>'

        // STREAK
        + '<div class="card fade-up fade-up-3">'
        + '  <div class="streak-bar">'
        + '    <span class="streak-bar__icon">' + (streak >= 7 ? '💎' : streak >= 1 ? '🔥' : '🌑') + '</span>'
        + '    <div class="streak-bar__info">'
        + '      <div class="streak-bar__count">' + streak + ' <span>DAY STREAK</span></div>'
        + '      <div class="streak-bar__sub">' + (streak < 7 ? (7 - streak) + ' more for Week Warrior 💎' : 'Week Warrior achieved! 💎') + '</div>'
        + '    </div>'
        + '    <div class="streak-dots">' + streakHTML + '</div>'
        + '  </div>'
        + '</div>'

        // QUICK ACTIONS
        + '<div class="quick-actions fade-up fade-up-3">'
        + '  <a href="/map.html" class="quick-btn"><span class="quick-btn__icon">🌍</span><span class="quick-btn__label">World</span></a>'
        + '  <a href="/leaderboards.html" class="quick-btn"><span class="quick-btn__icon">🏆</span><span class="quick-btn__label">Leaderboards</span></a>'
        + '  <a href="/warroom.html" class="quick-btn"><span class="quick-btn__icon">📈</span><span class="quick-btn__label">War Room</span></a>'
        + '</div>'

        // HOUSE STANDINGS
        + '<div class="card fade-up fade-up-4">'
        + '  <div class="card-header"><span class="label">🏰 House Standings</span></div>'
        + standingsHTML
        + '</div>'

        // RECENT ACTIVITY
        + '<div class="card fade-up fade-up-4">'
        + '  <div class="card-header"><span class="label">Recent Activity</span></div>'
        + activityHTML
        + '</div>';

      // Show dashboard, hide loading
      document.getElementById('loadingState').style.display = 'none';
      container.style.display = 'flex';
    }

    // ── Start ──
    loadDashboard();
  </script>

</body>
</html>
