<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spell Admin | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <style>
    body { background: var(--bg-deep); color: var(--text-bright); }
    .admin-wrap { max-width: 960px; margin: 0 auto; padding: 20px 15px; }
    h1 { font-family: var(--font-title); color: var(--gold); font-size: 24px; letter-spacing: 3px; margin-bottom: 6px; }
    .sub { font-family: var(--font-body); color: var(--text-muted); font-style: italic; margin-bottom: 20px; }

    /* Auth */
    .auth-box { text-align: center; padding: 40px; }
    .auth-box input { background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-bright); padding: 10px 16px; border-radius: 6px; font-size: 14px; width: 250px; font-family: var(--font-body); }

    /* Stats bar */
    .stats-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .stat-chip { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 8px 14px; display: flex; align-items: center; gap: 6px; }
    .stat-chip__val { font-family: var(--font-data); font-size: 14px; color: var(--gold); letter-spacing: 1px; }
    .stat-chip__label { font-family: var(--font-data); font-size: 7px; color: var(--text-faint); letter-spacing: 1px; }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .search-input { background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-bright); padding: 9px 14px; border-radius: 6px; font-family: var(--font-body); font-size: 14px; width: 200px; }
    .search-input:focus { outline: none; border-color: var(--gold); }
    .filter-btn { padding: 7px 14px; border: 1px solid var(--border-subtle); border-radius: 6px; background: var(--bg-card); color: var(--text-muted); font-family: var(--font-title); font-size: 10px; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; }
    .filter-btn.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold-border); }
    .btn-create { margin-left: auto; background: linear-gradient(180deg, #44cc44, #339933); color: #fff; border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-family: var(--font-title); font-size: 12px; font-weight: 700; letter-spacing: 1px; }
    .btn-create:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(68,204,68,0.3); }

    /* Spell card */
    .spell-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 16px; margin-bottom: 10px; transition: border-color 0.3s; }
    .spell-card.changed { border-color: var(--gold-border); }
    .spell-card.saved { border-color: #44cc44; }
    .spell-card.disabled-spell { opacity: 0.5; }
    .spell-card.new-spell { border-color: #44cc44; border-style: dashed; }

    .spell-card__header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .spell-card__id { font-family: var(--font-data); font-size: 8px; color: var(--text-faint); letter-spacing: 1px; background: var(--bg-inset); padding: 3px 8px; border-radius: 4px; }
    .spell-card__tier { font-family: var(--font-data); font-size: 7px; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; }
    .spell-card__tier--0 { background: rgba(150,150,150,0.1); color: #aaa; border: 1px solid rgba(150,150,150,0.2); }
    .spell-card__tier--1 { background: rgba(100,180,255,0.1); color: #88bbff; border: 1px solid rgba(100,180,255,0.2); }
    .spell-card__tier--2 { background: rgba(200,100,255,0.1); color: #cc88ff; border: 1px solid rgba(200,100,255,0.2); }
    .spell-card__tier--3 { background: rgba(255,165,0,0.1); color: #ffaa00; border: 1px solid rgba(255,165,0,0.2); }
    .spell-card__house { font-family: var(--font-data); font-size: 7px; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; }
    .spell-card__status { font-family: var(--font-data); font-size: 7px; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; margin-left: auto; }
    .spell-card__status--active { background: rgba(68,204,68,0.1); color: #44cc44; }
    .spell-card__status--disabled { background: rgba(204,68,68,0.1); color: #cc4444; }

    /* Grid layout */
    .spell-card__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .spell-card__grid--full { grid-column: 1 / -1; }
    .field-group { display: flex; flex-direction: column; gap: 3px; }
    .field-label { font-family: var(--font-data); font-size: 7px; color: var(--text-faint); letter-spacing: 1px; }
    .spell-input { background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-bright); padding: 7px 10px; border-radius: 6px; font-family: var(--font-body); font-size: 13px; width: 100%; box-sizing: border-box; }
    .spell-input:focus { outline: none; border-color: var(--gold); }
    .spell-input--title { font-family: var(--font-title); font-weight: 600; font-size: 15px; }
    .spell-input--mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
    .spell-select { background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-bright); padding: 7px 10px; border-radius: 6px; font-family: var(--font-body); font-size: 13px; width: 100%; cursor: pointer; }
    .spell-select:focus { outline: none; border-color: var(--gold); }
    .spell-textarea { background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-bright); padding: 7px 10px; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; width: 100%; box-sizing: border-box; resize: vertical; min-height: 60px; }
    .spell-textarea:focus { outline: none; border-color: var(--gold); }

    /* Bonus effects editor */
    .bonus-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .bonus-row { display: flex; gap: 6px; align-items: center; }
    .bonus-row input { flex: 1; }
    .bonus-row .tag-input { max-width: 120px; }
    .btn-add-bonus { background: none; border: 1px dashed var(--border-subtle); color: var(--text-faint); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: var(--font-data); font-size: 7px; letter-spacing: 1px; margin-top: 4px; }
    .btn-add-bonus:hover { border-color: var(--gold); color: var(--gold); }
    .btn-remove-bonus { background: none; border: none; color: #cc4444; cursor: pointer; font-size: 16px; padding: 0 4px; }

    /* Actions */
    .spell-card__actions { display: flex; gap: 6px; margin-top: 12px; align-items: center; padding-top: 10px; border-top: 1px solid var(--border-subtle); }
    .btn-save { background: linear-gradient(180deg, #D4A64B, #b8903d); color: var(--bg-deep); border: none; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-family: var(--font-title); font-size: 11px; font-weight: 600; letter-spacing: 1px; }
    .btn-save:disabled { opacity: 0.3; cursor: default; }
    .btn-toggle { background: var(--bg-inset); border: 1px solid var(--border-subtle); color: var(--text-muted); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-family: var(--font-data); font-size: 8px; letter-spacing: 1px; }
    .btn-toggle:hover { border-color: var(--gold); color: var(--text-bright); }
    .btn-delete { background: none; border: 1px solid rgba(204,68,68,0.3); color: #cc4444; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-family: var(--font-data); font-size: 8px; letter-spacing: 1px; }
    .btn-delete:hover { background: rgba(204,68,68,0.1); border-color: #cc4444; }
    .status-msg { font-family: var(--font-data); font-size: 7px; color: #44cc44; margin-left: auto; letter-spacing: 0.5px; }

    /* Toast */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; font-family: var(--font-title); font-size: 13px; font-weight: 600; display: none; z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .toast--success { background: #1a3a1a; color: #44cc44; border: 1px solid #2a5a2a; }
    .toast--error { background: #3a1a1a; color: #cc4444; border: 1px solid #5a2a2a; }
    .toast.active { display: block; animation: fadeUp 0.3s ease; }

    /* Confirm dialog */
    .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center; }
    .confirm-overlay.active { display: flex; }
    .confirm-box { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; text-align: center; }
    .confirm-box__title { font-family: var(--font-title); font-size: 16px; color: var(--text-bright); margin-bottom: 8px; }
    .confirm-box__text { font-family: var(--font-body); font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .confirm-box__btns { display: flex; gap: 10px; justify-content: center; }
    .confirm-box__btn { padding: 9px 20px; border-radius: 6px; border: none; cursor: pointer; font-family: var(--font-title); font-size: 12px; font-weight: 600; letter-spacing: 1px; }
    .confirm-box__btn--cancel { background: var(--bg-inset); color: var(--text-muted); border: 1px solid var(--border-subtle); }
    .confirm-box__btn--danger { background: #cc3333; color: #fff; }

    @media (max-width: 600px) {
      .spell-card__grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; }
      .search-input { width: 100%; }
      .btn-create { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Auth -->
  <div class="admin-wrap" id="authScreen">
    <div class="auth-box">
      <h1>Spell Admin</h1>
      <p class="sub">Enter admin key to manage spells</p>
      <input type="password" id="adminKeyInput" placeholder="Admin key..." onkeydown="if(event.key==='Enter')authenticate()">
      <button class="btn-save" onclick="authenticate()" style="margin-left:8px;padding:10px 18px;">Enter</button>
    </div>
  </div>

  <!-- Admin panel -->
  <div class="admin-wrap" id="adminPanel" style="display:none;">
    <h1>Spell Manager</h1>
    <p class="sub">Create, edit, and manage all game spells</p>

    <div class="stats-bar" id="statsBar"></div>

    <div class="toolbar">
      <input class="search-input" id="searchInput" placeholder="Search spells..." oninput="renderSpells()">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-filter="universal" onclick="setFilter('universal',this)">Universal</button>
      <button class="filter-btn" data-filter="smoulders" onclick="setFilter('smoulders',this)">ðŸ”¥ Smoulders</button>
      <button class="filter-btn" data-filter="darktide" onclick="setFilter('darktide',this)">ðŸŒŠ Darktide</button>
      <button class="filter-btn" data-filter="stonebark" onclick="setFilter('stonebark',this)">ðŸŒ¿ Stonebark</button>
      <button class="filter-btn" data-filter="ashenvale" onclick="setFilter('ashenvale',this)">ðŸ’¨ Ashenvale</button>
      <button class="filter-btn" data-filter="stormrage" onclick="setFilter('stormrage',this)">âš¡ Stormrage</button>
      <button class="filter-btn" data-filter="nighthollow" onclick="setFilter('nighthollow',this)">ðŸŒ‘ Nighthollow</button>
      <button class="filter-btn" data-filter="dawnbringer" onclick="setFilter('dawnbringer',this)">â˜€ï¸ Dawnbringer</button>
      <button class="filter-btn" data-filter="manastorm" onclick="setFilter('manastorm',this)">ðŸ”® Manastorm</button>
      <button class="filter-btn" data-filter="plaguemire" onclick="setFilter('plaguemire',this)">â˜£ï¸ Plaguemire</button>
      <button class="btn-create" onclick="createNewSpell()">+ New Spell</button>
    </div>

    <div id="spellList"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Confirm dialog -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-box__title" id="confirmTitle">Delete Spell?</div>
      <div class="confirm-box__text" id="confirmText">This action cannot be undone.</div>
      <div class="confirm-box__btns">
        <button class="confirm-box__btn confirm-box__btn--cancel" onclick="hideConfirm()">Cancel</button>
        <button class="confirm-box__btn confirm-box__btn--danger" id="confirmBtn" onclick="">Delete</button>
      </div>
    </div>
  </div>

  <script>
    var ADMIN_KEY = '';
    var allSpells = [];
    var currentFilter = 'all';

    var HOUSES = ['universal','smoulders','darktide','stonebark','ashenvale','stormrage','nighthollow','dawnbringer','manastorm','plaguemire'];
    var TYPES = ['attack','defend','support','utility','debuff','reaction','control'];
    var HOUSE_COLORS = {
      universal:'#D4A64B', smoulders:'#E03C31', darktide:'#00B4D8', stonebark:'#5CB338',
      ashenvale:'#90E0EF', stormrage:'#FFC800', nighthollow:'#7B2D8E', dawnbringer:'#FF8C00',
      manastorm:'#5B8FE0', plaguemire:'#E84393'
    };

    // Auth
    function authenticate() {
      ADMIN_KEY = document.getElementById('adminKeyInput').value.trim();
      if (!ADMIN_KEY) return;
      loadSpells();
    }

    // API helpers
    async function apiFetch(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      options.headers['x-admin-key'] = ADMIN_KEY;
      options.headers['Content-Type'] = 'application/json';
      var res = await fetch(url, options);
      if (res.status === 401) { toast('Invalid admin key', 'error'); return null; }
      return res.json();
    }

    // Load all spells
    async function loadSpells() {
      var data = await apiFetch('/api/spells');
      if (!data) return;
      if (data.error) { toast(data.error, 'error'); return; }
      allSpells = data.spells || data;
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      renderStats();
      renderSpells();
    }

    function renderStats() {
      var total = allSpells.length;
      var active = allSpells.filter(function(s) { return s.is_active !== false; }).length;
      var houses = {};
      allSpells.forEach(function(s) { houses[s.house] = (houses[s.house] || 0) + 1; });
      var houseCount = Object.keys(houses).length;

      document.getElementById('statsBar').innerHTML =
        '<div class="stat-chip"><span class="stat-chip__val">' + total + '</span><span class="stat-chip__label">TOTAL</span></div>' +
        '<div class="stat-chip"><span class="stat-chip__val">' + active + '</span><span class="stat-chip__label">ACTIVE</span></div>' +
        '<div class="stat-chip"><span class="stat-chip__val">' + houseCount + '</span><span class="stat-chip__label">HOUSES</span></div>';
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderSpells();
    }

    function renderSpells() {
      var search = document.getElementById('searchInput').value.toLowerCase();
      var filtered = allSpells.filter(function(s) {
        if (currentFilter !== 'all' && s.house !== currentFilter) return false;
        if (search && s.name.toLowerCase().indexOf(search) === -1 && s.house.toLowerCase().indexOf(search) === -1) return false;
        return true;
      });

      // Sort: by house, then tier, then name
      filtered.sort(function(a, b) {
        var ha = HOUSES.indexOf(a.house), hb = HOUSES.indexOf(b.house);
        if (ha !== hb) return ha - hb;
        if (a.tier !== b.tier) return a.tier - b.tier;
        return a.name.localeCompare(b.name);
      });

      var html = '';
      filtered.forEach(function(s) {
        html += buildSpellCard(s);
      });
      document.getElementById('spellList').innerHTML = html || '<p style="text-align:center;color:var(--text-faint);padding:40px;">No spells found</p>';
    }

    function buildSpellCard(s) {
      var isNew = s._isNew;
      var isActive = s.is_active !== false;
      var houseColor = HOUSE_COLORS[s.house] || '#888';
      var bonuses = [];
      try { bonuses = typeof s.bonus_effects === 'string' ? JSON.parse(s.bonus_effects) : (s.bonus_effects || []); } catch(e) { bonuses = []; }

      var cardClass = 'spell-card' + (isNew ? ' new-spell' : '') + (!isActive ? ' disabled-spell' : '');

      var bonusHTML = '';
      bonuses.forEach(function(b, i) {
        bonusHTML += '<div class="bonus-row">' +
          '<input class="spell-input spell-input--mono tag-input" value="' + escAttr(b.tag || '') + '" placeholder="Tag" data-spell="' + s.id + '" data-bonus-idx="' + i + '" data-bonus-field="tag" onchange="markChanged(' + s.id + ')">' +
          '<input class="spell-input spell-input--mono" value="' + escAttr(b.desc || '') + '" placeholder="Description" data-spell="' + s.id + '" data-bonus-idx="' + i + '" data-bonus-field="desc" onchange="markChanged(' + s.id + ')">' +
          '<button class="btn-remove-bonus" onclick="removeBonus(' + s.id + ',' + i + ')">Ã—</button></div>';
      });

      return '<div class="' + cardClass + '" id="spell-' + s.id + '">' +
        '<div class="spell-card__header">' +
          '<span class="spell-card__id">#' + s.id + '</span>' +
          '<span class="spell-card__tier spell-card__tier--' + s.tier + '">T' + s.tier + '</span>' +
          '<span class="spell-card__house" style="background:' + houseColor + '18;color:' + houseColor + ';border:1px solid ' + houseColor + '40;">' + s.house.toUpperCase() + '</span>' +
          '<span class="spell-card__status spell-card__status--' + (isActive ? 'active' : 'disabled') + '">' + (isActive ? 'ACTIVE' : 'DISABLED') + '</span>' +
        '</div>' +
        '<div class="spell-card__grid">' +
          // Row 1: Name + Slug
          '<div class="field-group"><span class="field-label">NAME</span><input class="spell-input spell-input--title" value="' + escAttr(s.name) + '" data-spell="' + s.id + '" data-field="name" onchange="markChanged(' + s.id + ')"></div>' +
          '<div class="field-group"><span class="field-label">SLUG</span><input class="spell-input spell-input--mono" value="' + escAttr(s.slug) + '" data-spell="' + s.id + '" data-field="slug" onchange="markChanged(' + s.id + ')"></div>' +
          // Row 2: House + Type
          '<div class="field-group"><span class="field-label">HOUSE</span><select class="spell-select" data-spell="' + s.id + '" data-field="house" onchange="markChanged(' + s.id + ')">' + HOUSES.map(function(h) { return '<option value="' + h + '"' + (s.house === h ? ' selected' : '') + '>' + h + '</option>'; }).join('') + '</select></div>' +
          '<div class="field-group"><span class="field-label">TYPE</span><select class="spell-select" data-spell="' + s.id + '" data-field="spell_type" onchange="markChanged(' + s.id + ')">' + TYPES.map(function(t) { return '<option value="' + t + '"' + (s.spell_type === t ? ' selected' : '') + '>' + t + '</option>'; }).join('') + '</select></div>' +
          // Row 3: Tier + Mana Cost
          '<div class="field-group"><span class="field-label">TIER</span><select class="spell-select" data-spell="' + s.id + '" data-field="tier" onchange="markChanged(' + s.id + ')"><option value="0"' + (s.tier==0?' selected':'') + '>T0 â€” Basic</option><option value="1"' + (s.tier==1?' selected':'') + '>T1 â€” 1 MP</option><option value="2"' + (s.tier==2?' selected':'') + '>T2 â€” 2 MP</option><option value="3"' + (s.tier==3?' selected':'') + '>T3 â€” 3 MP</option></select></div>' +
          '<div class="field-group"><span class="field-label">MANA COST</span><input type="number" class="spell-input" value="' + s.mana_cost + '" min="0" max="5" data-spell="' + s.id + '" data-field="mana_cost" onchange="markChanged(' + s.id + ')"></div>' +
          // Row 4: Base Effect (full width)
          '<div class="field-group spell-card__grid--full"><span class="field-label">BASE EFFECT</span><input class="spell-input" value="' + escAttr(s.base_effect) + '" data-spell="' + s.id + '" data-field="base_effect" onchange="markChanged(' + s.id + ')"></div>' +
          // Row 5: Flavor + Motto
          '<div class="field-group"><span class="field-label">FLAVOR TEXT</span><input class="spell-input" value="' + escAttr(s.flavor_text || '') + '" data-spell="' + s.id + '" data-field="flavor_text" onchange="markChanged(' + s.id + ')"></div>' +
          '<div class="field-group"><span class="field-label">MOTTO (optional)</span><input class="spell-input" value="' + escAttr(s.motto || '') + '" data-spell="' + s.id + '" data-field="motto" onchange="markChanged(' + s.id + ')"></div>' +
          // Bonus effects
          '<div class="field-group spell-card__grid--full"><span class="field-label">BONUS EFFECTS</span><div class="bonus-list" id="bonuses-' + s.id + '">' + bonusHTML + '</div><button class="btn-add-bonus" onclick="addBonus(' + s.id + ')">+ ADD EFFECT</button></div>' +
        '</div>' +
        '<div class="spell-card__actions">' +
          '<button class="btn-save" id="save-' + s.id + '" onclick="saveSpell(' + s.id + ')" disabled>Save</button>' +
          '<button class="btn-toggle" onclick="toggleSpell(' + s.id + ')">' + (isActive ? 'Disable' : 'Enable') + '</button>' +
          (!s.is_always_available ? '<button class="btn-delete" onclick="confirmDelete(' + s.id + ',\'' + escAttr(s.name) + '\')">Delete</button>' : '') +
          '<span class="status-msg" id="status-' + s.id + '"></span>' +
        '</div>' +
      '</div>';
    }

    function escAttr(str) { return String(str || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

    function markChanged(id) {
      var card = document.getElementById('spell-' + id);
      if (card) card.classList.add('changed');
      var btn = document.getElementById('save-' + id);
      if (btn) btn.disabled = false;
    }

    // Collect form data for a spell
    function collectSpellData(id) {
      var data = {};
      document.querySelectorAll('[data-spell="' + id + '"][data-field]').forEach(function(el) {
        var field = el.dataset.field;
        var val = el.value;
        if (field === 'tier' || field === 'mana_cost') val = parseInt(val);
        data[field] = val;
      });
      // Collect bonus effects
      var bonuses = [];
      document.querySelectorAll('[data-spell="' + id + '"][data-bonus-idx]').forEach(function(el) {
        var idx = parseInt(el.dataset.bonusIdx);
        var field = el.dataset.bonusField;
        if (!bonuses[idx]) bonuses[idx] = {};
        bonuses[idx][field] = el.value;
      });
      // Filter out empty rows
      data.bonus_effects = bonuses.filter(function(b) { return b && (b.tag || b.desc); });
      return data;
    }

    // Save
    async function saveSpell(id) {
      var data = collectSpellData(id);
      var spell = allSpells.find(function(s) { return s.id === id; });
      var isNew = spell && spell._isNew;

      var url = isNew ? '/api/spells' : '/api/spells/' + id;
      var method = isNew ? 'POST' : 'PUT';

      var result = await apiFetch(url, { method: method, body: JSON.stringify(data) });
      if (!result) return;
      if (result.error) { toast(result.error, 'error'); return; }

      toast(isNew ? 'Spell created!' : 'Spell saved!', 'success');
      var card = document.getElementById('spell-' + id);
      if (card) { card.classList.remove('changed'); card.classList.add('saved'); setTimeout(function() { card.classList.remove('saved'); }, 2000); }
      var btn = document.getElementById('save-' + id);
      if (btn) btn.disabled = true;
      var msg = document.getElementById('status-' + id);
      if (msg) { msg.textContent = 'SAVED'; setTimeout(function() { msg.textContent = ''; }, 2000); }

      // Refresh
      loadSpells();
    }

    // Toggle active
    async function toggleSpell(id) {
      var spell = allSpells.find(function(s) { return s.id === id; });
      if (!spell) return;
      var newActive = spell.is_active === false ? true : false;
      var result = await apiFetch('/api/spells/' + id, { method: 'PUT', body: JSON.stringify({ is_active: newActive }) });
      if (!result || result.error) { toast(result ? result.error : 'Failed', 'error'); return; }
      toast(spell.name + (newActive ? ' enabled' : ' disabled'), 'success');
      loadSpells();
    }

    // Delete
    function confirmDelete(id, name) {
      document.getElementById('confirmTitle').textContent = 'Delete "' + name + '"?';
      document.getElementById('confirmText').textContent = 'This will permanently remove this spell.';
      document.getElementById('confirmBtn').onclick = function() { deleteSpell(id); };
      document.getElementById('confirmOverlay').classList.add('active');
    }
    function hideConfirm() { document.getElementById('confirmOverlay').classList.remove('active'); }

    async function deleteSpell(id) {
      hideConfirm();
      var result = await apiFetch('/api/spells/' + id, { method: 'DELETE' });
      if (!result || result.error) { toast(result ? result.error : 'Failed', 'error'); return; }
      toast('Spell deleted', 'success');
      loadSpells();
    }

    // Create new
    function createNewSpell() {
      var newId = 'new_' + Date.now();
      allSpells.unshift({
        id: newId, name: 'New Spell', slug: 'new-spell', house: 'universal', tier: 1,
        mana_cost: 1, spell_type: 'attack', base_effect: '+10 influence',
        bonus_effects: [], flavor_text: '', motto: null, is_active: true, is_always_available: false, _isNew: true
      });
      renderSpells();
      var el = document.getElementById('spell-' + newId);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }

    // Bonus effects CRUD
    function addBonus(id) {
      var spell = allSpells.find(function(s) { return s.id === id; });
      if (!spell) return;
      var bonuses = typeof spell.bonus_effects === 'string' ? JSON.parse(spell.bonus_effects) : (spell.bonus_effects || []);
      bonuses.push({ tag: '', desc: '' });
      spell.bonus_effects = bonuses;
      markChanged(id);
      renderSpells();
    }

    function removeBonus(id, idx) {
      var spell = allSpells.find(function(s) { return s.id === id; });
      if (!spell) return;
      var bonuses = typeof spell.bonus_effects === 'string' ? JSON.parse(spell.bonus_effects) : (spell.bonus_effects || []);
      bonuses.splice(idx, 1);
      spell.bonus_effects = bonuses;
      markChanged(id);
      renderSpells();
    }

    // Toast
    function toast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast toast--' + (type || 'success') + ' active';
      setTimeout(function() { t.classList.remove('active'); }, 3000);
    }
