<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- ═══ Per-player meta (server-injected) ═══ -->
  <title>{{handle}} — Level {{level}} {{house_name}} · 9LV</title>
  <meta name="description" content="{{lifetime_points}} lifetime points · {{streak}}-day streak · {{house_name}} on Nine Lives Network.">

  <meta property="og:type" content="profile">
  <meta property="og:title" content="{{handle}} — Level {{level}} {{house_name}}">
  <meta property="og:description" content="{{lifetime_points}} lifetime points · {{streak}}-day streak · 9LV.net">
  <meta property="og:image" content="{{og_image}}">
  <meta property="og:url" content="{{og_url}}">
  <meta property="og:site_name" content="Nine Lives Network">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@9LVNetwork">
  <meta name="twitter:title" content="{{handle}} — Level {{level}} {{house_name}}">
  <meta name="twitter:description" content="{{lifetime_points}} lifetime points · {{streak}}-day streak · 9LV.net">
  <meta name="twitter:image" content="{{og_image}}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <style>
    .pp-wrap { max-width: 560px; margin: 0 auto; padding: 14px; }
    .pp-hero {
      background: linear-gradient(180deg, var(--bg-card-solid), var(--bg-deep));
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 28px 18px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .pp-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, {{house_color}}28, transparent 65%);
      pointer-events: none;
    }
    .pp-hero > * { position: relative; }
    .pp-house-crest {
      width: 96px; height: 96px;
      object-fit: contain;
      margin: 0 auto 12px;
      filter: drop-shadow(0 4px 16px {{house_color}}55);
    }
    .pp-handle {
      font-family: var(--font-data);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .pp-house-name {
      font-family: var(--font-title);
      font-size: 22px;
      font-weight: 700;
      color: {{house_color}};
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .pp-level {
      font-family: var(--font-data);
      font-size: 8px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .pp-guild {
      display: inline-block;
      font-family: var(--font-data);
      font-size: 7px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      padding: 4px 10px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xs);
      margin-top: 4px;
    }
    .pp-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap-sm);
      margin-top: var(--gap-md);
    }
    .pp-stat {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 14px 10px;
      text-align: center;
    }
    .pp-stat__val {
      font-family: var(--font-data);
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 1px;
    }
    .pp-stat__label {
      font-family: var(--font-data);
      font-size: 6px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      margin-top: 6px;
      text-transform: uppercase;
    }
    .pp-share-row {
      display: flex;
      gap: var(--gap-sm);
      margin-top: var(--gap-md);
    }
    .pp-share-row > * { flex: 1; }
    .pp-self-ribbon {
      display: none;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      margin-bottom: 10px;
      font-family: var(--font-data);
      font-size: 7px;
      color: var(--gold);
      letter-spacing: 1.5px;
      text-align: center;
    }
    .pp-self-ribbon a { color: var(--gold); text-decoration: underline; }
    .pp-placeholder-note {
      margin-top: 24px;
      padding: 12px;
      background: var(--bg-inset);
      border: 1px dashed var(--border-subtle);
      border-radius: var(--radius-sm);
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-faint);
      font-style: italic;
    }
  </style>
</head>
<body>
<script src="/js/nav.js"></script>

<div class="pp-wrap">

  <!-- Self-only ribbon, JS-shown when localStorage.player_id matches viewed handle -->
  <div class="pp-self-ribbon" id="ppSelfRibbon">
    Viewing your own profile · <a href="/builder.html?skip_intro=1">edit your Nine</a>
  </div>

  <div class="pp-hero">
    <img class="pp-house-crest" src="{{house_image}}" alt="{{house_name}}" onerror="this.style.display='none'">
    <div class="pp-handle">@{{handle}}</div>
    <div class="pp-house-name">{{house_name}}</div>
    <div class="pp-level">LEVEL {{level}} · NINE</div>
    <div class="pp-guild">{{guild_display}}</div>
  </div>

  <div class="pp-stats">
    <div class="pp-stat">
      <div class="pp-stat__val">{{lifetime_points}}</div>
      <div class="pp-stat__label">Lifetime</div>
    </div>
    <div class="pp-stat">
      <div class="pp-stat__val">{{streak}}</div>
      <div class="pp-stat__label">Streak</div>
    </div>
    <div class="pp-stat">
      <div class="pp-stat__val">{{duel_elo}}</div>
      <div class="pp-stat__label">ELO</div>
    </div>
  </div>

  <div class="pp-share-row">
    <a class="btn-pill" href="https://twitter.com/intent/tweet?text={{share_text_encoded}}" target="_blank" rel="noopener" style="text-align:center;">SHARE ON X</a>
    <button class="btn-pill" onclick="copyProfileLink()" style="text-align:center;">COPY LINK</button>
  </div>

  <div class="pp-placeholder-note">
    Profile v1 placeholder. Character-sprite hero, badges, and audience flex sections land in PR 2.
  </div>

</div>

<script>
  // Self-detection — show edit ribbon when the viewer is the profile owner.
  (function() {
    var viewedId = "{{player_id}}";
    var ownId = localStorage.getItem('player_id');
    if (ownId && ownId === viewedId) {
      var ribbon = document.getElementById('ppSelfRibbon');
      if (ribbon) ribbon.style.display = 'block';
    }
  })();

  function copyProfileLink() {
    var url = "{{og_url}}";
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        var btn = event.target;
        var orig = btn.textContent;
        btn.textContent = 'COPIED';
        setTimeout(function() { btn.textContent = orig; }, 1400);
      });
    } else {
      // fallback — open prompt
      window.prompt('Copy this link', url);
    }
  }
</script>

</body>
</html>
