<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Gauntlet | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    :root {
      --bg-deep: #120e1e;
      --bg-warm: #1a1528;
      --bg-card: rgba(30,22,42,0.7);
      --border: rgba(212,166,75,0.12);
      --gold: #D4A64B;
      --text-bright: #F5F0E8;
      --text-body: #D4C8B8;
      --text-muted: #9B8E7E;
      --text-faint: #6B5E50;
      --green: #6acd8a;
      --red: #e85a6a;
      --cyan: #6ac8d8;
      --purple: #b088e8;
      --font-title: 'Cinzel', serif;
      --font-body: 'Crimson Text', Georgia, serif;
      --font-data: 'Press Start 2P', monospace;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, rgba(176,136,232,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 50%, rgba(232,133,90,0.06) 0%, transparent 40%),
                  linear-gradient(180deg, #1a1528 0%, #120e1e 30%, #0e0a18 100%);
      font-family: var(--font-body);
      color: var(--text-body);
    }
    a { color: var(--gold); text-decoration: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(212,166,75,0.15); border-radius: 2px; }

    .main { max-width: 520px; margin: 0 auto; padding: 14px 14px 100px; }

    /* ═══ SECTION LABELS ═══ */
    .section-label { display: flex; align-items: center; gap: 8px; margin: 20px 0 10px; }
    .section-label__text { font-family: var(--font-title); font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }
    .section-label__line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

    /* ═══ STAT GRID ═══ */
    .g-stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .g-stat-box { padding: 12px 8px; border-radius: 10px; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.04); text-align: center; }
    .g-stat-box__val { font-family: var(--font-data); font-size: 18px; line-height: 1; }
    .g-stat-box__label { font-family: var(--font-data); font-size: 6px; color: var(--text-faint); letter-spacing: 1px; margin-top: 6px; }

    /* ═══ HP BAR ═══ */
    .hp-bar-wrap { margin-bottom: 14px; }
    .hp-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .hp-bar-label__name { font-family: var(--font-data); font-size: 7px; color: var(--text-muted); letter-spacing: 1px; }
    .hp-bar-label__val { font-family: var(--font-data); font-size: 9px; color: var(--green); }
    .hp-bar-track { height: 10px; border-radius: 5px; background: rgba(255,255,255,0.05); overflow: hidden; border: 1px solid rgba(255,255,255,0.04); }
    .hp-bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #6acd8a, #44aa66); transition: width 0.6s ease; }
    .hp-bar-fill--low { background: linear-gradient(90deg, #e85a6a, #cc3344); }
    .hp-bar-fill--mid { background: linear-gradient(90deg, #D4A64B, #aa8833); }

    /* ═══ ENEMY ═══ */
    .enemy-display { text-align: center; padding: 20px 16px; margin-bottom: 14px; border-radius: 12px; background: rgba(232,90,106,0.04); border: 1px solid rgba(232,90,106,0.15); }
    .enemy-display__emoji { font-size: 48px; margin-bottom: 8px; filter: drop-shadow(0 0 12px rgba(232,90,106,0.3)); }
    .enemy-display__name { font-family: var(--font-title); font-size: 18px; font-weight: 700; color: var(--text-bright); }
    .enemy-display__floor { font-family: var(--font-data); font-size: 7px; color: var(--text-faint); letter-spacing: 1px; margin-top: 4px; }
    .enemy-stats { display: flex; justify-content: center; gap: 12px; margin-top: 10px; }
    .enemy-stat { font-family: var(--font-data); font-size: 8px; padding: 4px 10px; border-radius: 6px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.06); }
    .enemy-effects { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
    .enemy-eff-pill { font-family: var(--font-data); font-size: 6px; padding: 3px 8px; border-radius: 4px; background: rgba(232,90,106,0.1); border: 1px solid rgba(232,90,106,0.2); color: var(--red); }

    /* ═══ BUTTONS ═══ */
    .g-btn { display: block; width: 100%; padding: 16px 24px; border-radius: 10px; border: none; cursor: pointer; font-family: var(--font-title); font-size: 14px; font-weight: 700; letter-spacing: 1px; transition: all 0.2s; margin-bottom: 10px; }
    .g-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .g-btn--start { background: linear-gradient(135deg, var(--purple), #8050b0); color: #fff; box-shadow: 0 4px 0 #5a3080, 0 6px 16px rgba(176,136,232,0.25); }
    .g-btn--start:hover:not(:disabled) { transform: translateY(-2px); }
    .g-btn--fight { background: linear-gradient(135deg, #e85a6a, #cc3344); color: #fff; box-shadow: 0 4px 0 #992233, 0 6px 16px rgba(232,90,106,0.25); }
    .g-btn--fight:hover:not(:disabled) { transform: translateY(-2px); }
    .g-btn--gold { background: linear-gradient(135deg, var(--gold), #aa8833); color: #1a1528; box-shadow: 0 4px 0 #886622, 0 6px 16px rgba(212,166,75,0.25); }
    .g-btn--dim { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.06); }

    /* ═══ CARD PICKER ═══ */
    .card-picker-label { font-family: var(--font-data); font-size: 7px; color: var(--text-faint); letter-spacing: 1px; margin-bottom: 8px; text-align: center; }
    .card-picker { display: flex; gap: 10px; overflow-x: auto; padding: 8px 4px 14px; -webkit-overflow-scrolling: touch; }
    .card-picker::-webkit-scrollbar { height: 3px; }
    .card-picker::-webkit-scrollbar-thumb { background: rgba(212,166,75,0.15); border-radius: 2px; }
    .card-pick-slot { flex-shrink: 0; cursor: pointer; border-radius: 12px; border: 2px solid transparent; transition: border-color 0.2s, transform 0.2s; }
    .card-pick-slot:hover { transform: translateY(-4px); }
    .card-pick-slot.selected { border-color: var(--gold); box-shadow: 0 0 20px rgba(212,166,75,0.2); transform: translateY(-6px); }

    /* ═══ COMBAT LOG ═══ */
    .combat-log { border-radius: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.04); padding: 12px 14px; margin: 12px 0; max-height: 200px; overflow-y: auto; }
    .combat-log__title { font-family: var(--font-data); font-size: 7px; color: var(--text-faint); letter-spacing: 1px; margin-bottom: 8px; }
    .log-line { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.02); animation: logFade 0.3s ease; }
    .log-line:last-child { border-bottom: none; }
    .log-line--player { color: var(--cyan); }
    .log-line--enemy { color: var(--red); }
    .log-line--crit { color: var(--gold); font-weight: 700; }
    .log-line--heal { color: var(--green); }

    /* ═══ RESULT BANNER ═══ */
    .result-banner { text-align: center; padding: 24px 16px; border-radius: 12px; margin-bottom: 14px; }
    .result-banner--win { background: linear-gradient(135deg, rgba(106,205,138,0.08), rgba(212,166,75,0.08)); border: 1px solid rgba(106,205,138,0.2); }
    .result-banner--lose { background: linear-gradient(135deg, rgba(232,90,106,0.08), rgba(176,136,232,0.05)); border: 1px solid rgba(232,90,106,0.2); }
    .result-banner--victory { background: linear-gradient(135deg, rgba(212,166,75,0.12), rgba(176,136,232,0.08)); border: 1px solid rgba(212,166,75,0.3); box-shadow: 0 0 40px rgba(212,166,75,0.1); }
    .result-banner__icon { font-size: 40px; margin-bottom: 8px; }
    .result-banner__title { font-family: var(--font-title); font-size: 20px; font-weight: 800; letter-spacing: 2px; }
    .result-banner__sub { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .reward-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 10px; }
    .reward-pill { font-family: var(--font-data); font-size: 7px; padding: 6px 12px; border-radius: 6px; background: rgba(212,166,75,0.08); border: 1px solid rgba(212,166,75,0.2); color: var(--gold); }

    /* ═══ TOWER ═══ */
    .tower-floor { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 8px; margin-bottom: 4px; background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.03); transition: all 0.2s; }
    .tower-floor--current { background: rgba(212,166,75,0.05); border-color: var(--gold); box-shadow: 0 0 15px rgba(212,166,75,0.06); }
    .tower-floor--cleared { opacity: 0.4; }
    .tower-floor__num { font-family: var(--font-data); font-size: 14px; width: 32px; text-align: center; }
    .tower-floor__info { flex: 1; }
    .tower-floor__name { font-family: var(--font-title); font-size: 13px; font-weight: 700; color: var(--text-bright); }
    .tower-floor__stats { display: flex; gap: 8px; margin-top: 2px; }
    .tower-floor__stat { font-family: var(--font-data); font-size: 6px; color: var(--text-faint); }
    .tower-floor__badge { font-family: var(--font-data); font-size: 6px; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; }

    /* ═══ DONE PANEL ═══ */
    .done-panel { text-align: center; padding: 30px 16px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); margin-bottom: 14px; }
    .done-panel__icon { font-size: 36px; margin-bottom: 8px; }
    .done-panel__title { font-family: var(--font-title); font-size: 16px; font-weight: 700; color: var(--text-bright); }
    .done-panel__sub { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 6px; }

    /* ═══ ERROR ═══ */
    .g-error { padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; background: rgba(232,90,106,0.08); border: 1px solid rgba(232,90,106,0.2); font-family: var(--font-mono); font-size: 12px; color: var(--red); }

    /* ═══ RULES PANEL ═══ */
    .g-rules { border-radius: 10px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); padding: 16px; margin-top: 8px; }
    .g-rules__title { font-family: var(--font-data); font-size: 7px; color: var(--text-faint); letter-spacing: 1px; margin-bottom: 8px; }
    .g-rules__text { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); line-height: 1.7; }

    /* ═══ SPINNER ═══ */
    .g-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes logFade { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
<script src="/js/nav.js"></script>

<div class="main" id="app">
  <div style="text-align:center;padding:60px 20px;"><div class="g-spinner"></div></div>
</div>

<script src="/js/card-global.js"></script>
<script src="/js/card-particles.js"></script>
<script src="/js/card-v4.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// GAUNTLET FRONTEND — V2 REWRITE
// Properly connects to backend API endpoints
// ═══════════════════════════════════════════════════════

var STATE = {
  playerId: null,
  runId: null,
  runActive: false,
  runDone: false,
  currentFloor: 1,
  nineHp: 0,
  nineMaxHp: 0,
  nineAtk: 0,
  nineSpd: 0,
  bestFloor: 0,
  enemy: null,
  cards: [],
  selectedCardId: null,
  lastResult: null,
  fighting: false,
  error: null,
};

// ── Helpers ──
function getPlayerId() {
  var p = new URLSearchParams(window.location.search);
  var fromUrl = p.get('player_id');
  if (fromUrl) { localStorage.setItem('player_id', fromUrl); return fromUrl; }
  return localStorage.getItem('player_id');
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

async function apiFetch(url, opts) {
  try {
    var r = await fetch(url, opts);
    var data = await r.json();
    if (!r.ok) return { _error: data.error || 'Request failed' };
    return data;
  } catch (e) {
    return { _error: 'Network error' };
  }
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  STATE.playerId = getPlayerId();
  if (!STATE.playerId) { renderNotRegistered(); return; }

  // Load active run, history, and player cards in parallel
  var results = await Promise.all([
    apiFetch('/api/gauntlet/active/' + STATE.playerId),
    apiFetch('/api/gauntlet/history/' + STATE.playerId),
    apiFetch('/api/packs/collection/' + STATE.playerId),
  ]);

  var activeData = results[0];
  var historyData = results[1];
  var cardsData = results[2];

  // History / best floor
  if (historyData && !historyData._error) {
    STATE.bestFloor = historyData.best_floor || 0;
  }

  // Cards
  if (cardsData && !cardsData._error) {
    STATE.cards = Array.isArray(cardsData) ? cardsData : (cardsData.cards || []);
  }

  // Active run
  if (activeData && !activeData._error) {
    if (activeData.active && activeData.run) {
      var run = activeData.run;
      STATE.runId = run.id;
      STATE.runActive = true;
      STATE.runDone = false;
      STATE.currentFloor = run.current_floor || 1;
      STATE.nineHp = run.nine_hp;
      STATE.nineMaxHp = run.nine_max_hp;
      STATE.nineAtk = run.nine_atk || 0;
      STATE.nineSpd = run.nine_spd || 0;
      STATE.enemy = run.current_enemy || null;
    } else if (activeData.run && (activeData.run.status === 'defeated' || activeData.run.status === 'completed')) {
      STATE.runDone = true;
      STATE.runActive = false;
      STATE.currentFloor = activeData.run.highest_floor || activeData.run.current_floor || 1;
    }
  }

  render();
}

// ═══════════════════════════════════════════
// START RUN (costs 1 mana)
// ═══════════════════════════════════════════
async function startRun() {
  STATE.error = null;
  STATE.fighting = true;
  render();

  var data = await apiFetch('/api/gauntlet/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ player_id: parseInt(STATE.playerId) }),
  });

  STATE.fighting = false;

  if (data._error) { STATE.error = data._error; render(); return; }

  if (!data.success) {
    if (data.run_id) {
      // Already have active run — reload
      STATE.runId = data.run_id;
      await init();
      return;
    }
    STATE.error = data.error || 'Could not start run';
    render();
    return;
  }

  // Run started
  STATE.runId = data.run_id;
  STATE.runActive = true;
  STATE.runDone = false;
  STATE.currentFloor = data.floor || 1;
  STATE.nineHp = data.nine.hp;
  STATE.nineMaxHp = data.nine.maxHp;
  STATE.nineAtk = data.nine.atk;
  STATE.nineSpd = data.nine.spd;
  STATE.enemy = data.enemy;
  STATE.selectedCardId = null;
  STATE.lastResult = null;
  render();
}

// ═══════════════════════════════════════════
// FIGHT FLOOR (send selected card)
// ═══════════════════════════════════════════
async function fightFloor() {
  if (!STATE.selectedCardId || !STATE.runId) return;

  STATE.error = null;
  STATE.fighting = true;
  STATE.lastResult = null;
  render();

  var data = await apiFetch('/api/gauntlet/fight', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      run_id: STATE.runId,
      player_id: parseInt(STATE.playerId),
      card_id: parseInt(STATE.selectedCardId),
    }),
  });

  STATE.fighting = false;

  if (data._error) { STATE.error = data._error; render(); return; }
  if (!data.success) { STATE.error = data.error || 'Fight failed'; render(); return; }

  STATE.lastResult = data;

  if (data.result === 'defeated') {
    STATE.runActive = false;
    STATE.runDone = true;
    STATE.nineHp = 0;
  } else if (data.result === 'victory') {
    STATE.runActive = false;
    STATE.runDone = true;
  } else if (data.result === 'floor_cleared') {
    STATE.currentFloor = data.next_floor;
    STATE.nineHp = data.nine_hp;
    STATE.enemy = data.next_enemy;
    STATE.selectedCardId = null;
    if (data.floor > STATE.bestFloor) STATE.bestFloor = data.floor;
  }

  render();
}

function selectCard(cardId) {
  STATE.selectedCardId = (STATE.selectedCardId === cardId) ? null : cardId;
  render();
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  var h = '';

  // Page header
  h += '<div class="section-label">';
  h += '<span style="font-size:14px;">&#x1F3F0;</span>';
  h += '<span class="section-label__text">THE GAUNTLET</span>';
  h += '<span class="section-label__line"></span>';
  h += '</div>';
  h += '<p style="font-size:14px;color:var(--text-muted);margin-bottom:14px;">Climb the tower solo. Pick a card each floor. HP carries between floors. One run per day.</p>';

  if (STATE.error) {
    h += '<div class="g-error">' + esc(STATE.error) + '</div>';
  }

  // Result banner (shown after a fight)
  if (STATE.lastResult) {
    h += renderResult(STATE.lastResult);
  }

  // Active run — show battlefield
  if (STATE.runActive && !STATE.lastResult) {
    h += renderBattle();
  }
  // Done today (no result showing)
  else if (STATE.runDone && !STATE.lastResult) {
    h += renderDone();
  }
  // No run yet — start screen
  else if (!STATE.runActive && !STATE.runDone && !STATE.lastResult) {
    h += renderStart();
  }

  // After-result actions
  if (STATE.lastResult) {
    if (STATE.runActive) {
      h += '<button class="g-btn g-btn--gold" onclick="STATE.lastResult=null;render();">CONTINUE TO FLOOR ' + STATE.currentFloor + ' &#x2192;</button>';
    } else {
      h += '<button class="g-btn g-btn--dim" onclick="STATE.lastResult=null;render();">VIEW TOWER</button>';
    }
  }

  // Tower (always visible)
  h += renderTower();

  document.getElementById('app').innerHTML = h;

  // Re-init card visuals
  setTimeout(function() { if (typeof initCards === 'function') initCards(); }, 100);
}

// ── Start Screen ──
function renderStart() {
  var h = '';
  h += '<div class="g-stat-grid">';
  h += '<div class="g-stat-box"><div class="g-stat-box__val" style="color:var(--purple);">&#x2014;</div><div class="g-stat-box__label">FLOOR</div></div>';
  h += '<div class="g-stat-box"><div class="g-stat-box__val" style="color:var(--gold);">' + STATE.bestFloor + '</div><div class="g-stat-box__label">BEST EVER</div></div>';
  h += '<div class="g-stat-box"><div class="g-stat-box__val" style="color:var(--cyan);">1</div><div class="g-stat-box__label">MANA COST</div></div>';
  h += '</div>';

  h += '<button class="g-btn g-btn--start" onclick="startRun()"' + (STATE.fighting ? ' disabled' : '') + '>';
  h += STATE.fighting ? '&#x23F3; STARTING...' : '&#x2694;&#xFE0F; BEGIN GAUNTLET RUN (1 MANA)';
  h += '</button>';

  h += '<div class="g-rules">';
  h += '<div class="g-rules__title">HOW IT WORKS</div>';
  h += '<div class="g-rules__text">';
  h += '1. Pay 1 mana to enter<br>';
  h += '2. Pick a card for each floor<br>';
  h += '3. Your Nine fights an AI enemy<br>';
  h += '4. HP carries between floors (+10% heal per clear)<br>';
  h += '5. Cards are NOT consumed (no durability cost)<br>';
  h += '6. Floor 5: mana refund &#x2022; Floor 10: bonus pack &#x2022; Floor 15: grand prize';
  h += '</div></div>';
  return h;
}

// ── Active Battle ──
function renderBattle() {
  var h = '';
  var hpPct = STATE.nineMaxHp > 0 ? Math.round((STATE.nineHp / STATE.nineMaxHp) * 100) : 100;
  var barClass = hpPct <= 25 ? 'hp-bar-fill--low' : hpPct <= 50 ? 'hp-bar-fill--mid' : '';

  // Stats row
  h += '<div class="g-stat-grid">';
  h += '<div class="g-stat-box"><div class="g-stat-box__val" style="color:var(--purple);">' + STATE.currentFloor + '</div><div class="g-stat-box__label">FLOOR</div></div>';
  h += '<div class="g-stat-box"><div class="g-stat-box__val" style="color:var(--gold);">' + STATE.bestFloor + '</div><div class="g-stat-box__label">BEST EVER</div></div>';
  h += '<div class="g-stat-box"><div class="g-stat-box__val" style="color:var(--green);">' + STATE.nineHp + '</div><div class="g-stat-box__label">YOUR HP</div></div>';
  h += '</div>';

  // HP bar
  h += '<div class="hp-bar-wrap">';
  h += '<div class="hp-bar-label"><span class="hp-bar-label__name">YOUR NINE</span><span class="hp-bar-label__val">' + STATE.nineHp + ' / ' + STATE.nineMaxHp + '</span></div>';
  h += '<div class="hp-bar-track"><div class="hp-bar-fill ' + barClass + '" style="width:' + hpPct + '%;"></div></div>';
  h += '</div>';

  // Enemy
  if (STATE.enemy) {
    h += '<div class="enemy-display">';
    h += '<div class="enemy-display__emoji">' + (STATE.enemy.emoji || '&#x1F479;') + '</div>';
    h += '<div class="enemy-display__name">' + esc(STATE.enemy.name) + '</div>';
    h += '<div class="enemy-display__floor">FLOOR ' + STATE.currentFloor + ' CHALLENGER</div>';
    h += '<div class="enemy-stats">';
    h += '<span class="enemy-stat" style="color:var(--red);">&#x2694;&#xFE0F; ' + STATE.enemy.atk + ' ATK</span>';
    h += '<span class="enemy-stat" style="color:var(--green);">&#x1F49A; ' + STATE.enemy.hp + ' HP</span>';
    h += '<span class="enemy-stat" style="color:var(--cyan);">&#x1F4A8; ' + (STATE.enemy.spd || '?') + ' SPD</span>';
    h += '</div>';
    if (STATE.enemy.effects && STATE.enemy.effects.length > 0) {
      h += '<div class="enemy-effects">';
      STATE.enemy.effects.forEach(function(eff) { h += '<span class="enemy-eff-pill">' + esc(eff) + '</span>'; });
      h += '</div>';
    }
    h += '</div>';
  }

  // Card picker
  h += renderCardPicker();

  // Fight button
  var canFight = STATE.selectedCardId && !STATE.fighting;
  h += '<button class="g-btn g-btn--fight" onclick="fightFloor()"' + (canFight ? '' : ' disabled') + '>';
  if (STATE.fighting) h += '&#x23F3; FIGHTING...';
  else if (!STATE.selectedCardId) h += '&#x2191; SELECT A CARD TO FIGHT';
  else h += '&#x2694;&#xFE0F; FIGHT FLOOR ' + STATE.currentFloor;
  h += '</button>';

  return h;
}

// ── Card Picker ──
function renderCardPicker() {
  if (!STATE.cards || STATE.cards.length === 0) {
    return '<div style="text-align:center;padding:16px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);margin-bottom:12px;">' +
      '<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);">No cards found. Open your daily pack first!</div></div>';
  }

  var h = '<div class="card-picker-label">SELECT A CARD FOR THIS FLOOR</div>';
  h += '<div class="card-picker">';

  STATE.cards.forEach(function(c) {
    var cardId = c.id;
    var isSelected = STATE.selectedCardId === cardId;

    // Build card data object for the V4 renderer
    var d = {
      name: c.spell_name || (c.spell && c.spell.name) || c.name || 'Unknown',
      house: c.spell_house || (c.spell && c.spell.house) || c.house || 'universal',
      spell_type: c.spell_type || (c.spell && c.spell.spell_type) || c.type || 'attack',
      rarity: c.rarity || 'common',
      mana_cost: c.mana_cost || (c.spell && c.spell.mana_cost) || 1,
      base_atk: c.base_atk || (c.spell && c.spell.base_atk) || 0,
      base_hp: c.base_hp || (c.spell && c.spell.base_hp) || 0,
      base_spd: c.base_spd || (c.spell && c.spell.base_spd) || 0,
      base_def: c.base_def || (c.spell && c.spell.base_def) || 0,
      base_luck: c.base_luck || (c.spell && c.spell.base_luck) || 0,
      base_effect: c.base_effect || '',
      bonus_effects: c.bonus_effects || c.spell_effects || [],
      flavor_text: c.flavor_text || '',
      image_url: c.image_url || '',
      current_charges: c.current_charges || 0,
      max_charges: c.max_charges || 5,
      is_exhausted: c.is_exhausted || false,
    };

    // Parse bonus_effects if string
    if (typeof d.bonus_effects === 'string') {
      try { d.bonus_effects = JSON.parse(d.bonus_effects); } catch(e) { d.bonus_effects = []; }
    }
    // Convert string array to objects
    if (Array.isArray(d.bonus_effects) && d.bonus_effects.length > 0 && typeof d.bonus_effects[0] === 'string') {
      d.bonus_effects = d.bonus_effects.map(function(tag) { return { tag: tag, desc: '' }; });
    }

    h += '<div class="card-pick-slot' + (isSelected ? ' selected' : '') + '" onclick="selectCard(' + cardId + ')">';

    if (typeof buildCardV4 === 'function') {
      h += buildCardV4(d, { size: 'tiny', delay: 0 });
    } else {
      // Fallback
      h += '<div style="width:130px;padding:12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);">';
      h += '<div style="font-family:var(--font-title);font-size:11px;color:var(--gold);margin-bottom:4px;">' + esc(d.name) + '</div>';
      h += '<div style="font-family:var(--font-data);font-size:7px;color:var(--red);">ATK ' + d.base_atk + '</div>';
      h += '<div style="font-family:var(--font-data);font-size:7px;color:var(--green);">HP ' + d.base_hp + '</div>';
      h += '</div>';
    }

    h += '</div>';
  });

  h += '</div>';
  return h;
}

// ── Result Banner ──
function renderResult(r) {
  var h = '';
  var fr = r.floor_result || {};

  if (r.result === 'defeated') {
    h += '<div class="result-banner result-banner--lose">';
    h += '<div class="result-banner__icon">&#x1F480;</div>';
    h += '<div class="result-banner__title" style="color:var(--red);">DEFEATED</div>';
    h += '<div class="result-banner__sub">' + esc(r.message) + '</div>';
    h += '<div style="font-family:var(--font-data);font-size:9px;color:var(--text-muted);margin-top:8px;">Reached Floor ' + r.floor + '</div>';
    h += '</div>';
  } else if (r.result === 'victory') {
    h += '<div class="result-banner result-banner--victory">';
    h += '<div class="result-banner__icon">&#x1F451;</div>';
    h += '<div class="result-banner__title" style="color:var(--gold);">GAUNTLET COMPLETE</div>';
    h += '<div class="result-banner__sub">' + esc(r.message) + '</div>';
    h += '</div>';
  } else if (r.result === 'floor_cleared') {
    h += '<div class="result-banner result-banner--win">';
    h += '<div class="result-banner__icon">&#x2694;&#xFE0F;</div>';
    h += '<div class="result-banner__title" style="color:var(--green);">FLOOR ' + r.floor + ' CLEARED</div>';
    h += '<div class="result-banner__sub">' + esc(r.message) + '</div>';
    h += '</div>';
  }

  // Rewards
  if (r.rewards && r.rewards.messages && r.rewards.messages.length > 0) {
    h += '<div class="reward-list">';
    r.rewards.messages.forEach(function(msg) { h += '<span class="reward-pill">' + esc(msg) + '</span>'; });
    h += '</div>';
  }

  // Combat log
  if (fr.log && fr.log.length > 0) {
    h += '<div class="combat-log">';
    h += '<div class="combat-log__title">COMBAT LOG</div>';
    fr.log.forEach(function(line) {
      var cls = 'log-line';
      var low = (line || '').toLowerCase();
      if (low.indexOf('you hit') >= 0 || low.indexOf('your ') >= 0) cls += ' log-line--player';
      else if (low.indexOf('hits for') >= 0 || low.indexOf("'s ") >= 0) cls += ' log-line--enemy';
      if (low.indexOf('crit') >= 0) cls += ' log-line--crit';
      if (low.indexOf('heal') >= 0) cls += ' log-line--heal';
      h += '<div class="' + cls + '">' + esc(line) + '</div>';
    });
    h += '</div>';
  }

  return h;
}

// ── Done Today ──
function renderDone() {
  var h = '<div class="done-panel">';
  h += '<div class="done-panel__icon">&#x1F319;</div>';
  h += '<div class="done-panel__title">Gauntlet Complete for Today</div>';
  h += '<div class="done-panel__sub">Come back after midnight UTC for a new run.</div>';
  h += '<div style="font-family:var(--font-data);font-size:14px;color:var(--gold);margin-top:12px;">Best: Floor ' + STATE.bestFloor + '</div>';
  h += '</div>';
  return h;
}

// ── Tower ──
function renderTower() {
  var TOWER = [
    { f:1, n:'Stray Kitten',e:'&#x1F431;',a:3,h:8 },
    { f:2, n:'Alley Scratcher',e:'&#x1F63C;',a:5,h:11 },
    { f:3, n:'Shadow Pouncer',e:'&#x1F311;',a:6,h:14 },
    { f:4, n:'Feral Howler',e:'&#x1F43A;',a:8,h:17 },
    { f:5, n:'Ember Imp',e:'&#x1F525;',a:9,h:20 },
    { f:6, n:'Voidling',e:'&#x1F47B;',a:11,h:23 },
    { f:7, n:'Thornbeast',e:'&#x1F33F;',a:12,h:26 },
    { f:8, n:'Hex Wraith',e:'&#x1F480;',a:14,h:29 },
    { f:9, n:'Plague Crawler',e:'&#x1F41B;',a:15,h:32 },
    { f:10, n:'Storm Elemental',e:'&#x26A1;',a:17,h:35 },
    { f:11, n:'Bone Colossus',e:'&#x1F9B4;',a:18,h:38 },
    { f:12, n:'Nether Drake',e:'&#x1F409;',a:20,h:41 },
    { f:13, n:'Abyssal Lurker',e:'&#x1F573;&#xFE0F;',a:21,h:44 },
    { f:14, n:'Doom Herald',e:'&#x2620;&#xFE0F;',a:23,h:47 },
    { f:15, n:'The Veilbreaker',e:'&#x1F451;',a:24,h:50 },
  ];

  var out = '<div class="section-label" style="margin-top:20px;"><span style="font-size:14px;">&#x1F5FC;</span><span class="section-label__text">TOWER</span><span class="section-label__line"></span></div>';

  for (var i = TOWER.length - 1; i >= 0; i--) {
    var t = TOWER[i];
    var isCurrent = STATE.runActive && t.f === STATE.currentFloor;
    var isCleared = STATE.runActive ? t.f < STATE.currentFloor : false;
    var cls = 'tower-floor';
    if (isCurrent) cls += ' tower-floor--current';
    if (isCleared) cls += ' tower-floor--cleared';

    out += '<div class="' + cls + '">';
    out += '<div class="tower-floor__num" style="color:' + (isCleared ? 'var(--green)' : isCurrent ? 'var(--gold)' : 'var(--text-faint)') + ';">' + (isCleared ? '&#x2705;' : t.f) + '</div>';
    out += '<div class="tower-floor__info">';
    out += '<div class="tower-floor__name">' + t.e + ' ' + t.n + '</div>';
    out += '<div class="tower-floor__stats">';
    out += '<span class="tower-floor__stat" style="color:var(--red);">ATK ' + t.a + '</span>';
    out += '<span class="tower-floor__stat" style="color:var(--green);">HP ' + t.h + '</span>';
    out += '</div></div>';

    if (isCurrent) {
      out += '<span class="tower-floor__badge" style="background:rgba(212,166,75,0.1);border:1px solid rgba(212,166,75,0.2);color:var(--gold);">NEXT &#x2192;</span>';
    } else if (t.f === 5 || t.f === 10 || t.f === 15) {
      var lbl = t.f === 5 ? '&#x1F4A7; MANA' : t.f === 10 ? '&#x1F381; PACK' : '&#x1F451; BOSS';
      out += '<span class="tower-floor__badge" style="background:rgba(176,136,232,0.08);border:1px solid rgba(176,136,232,0.15);color:var(--purple);">' + lbl + '</span>';
    }

    out += '</div>';
  }

  return out;
}

// ── Not Registered ──
function renderNotRegistered() {
  document.getElementById('app').innerHTML =
    '<div style="text-align:center;padding:60px 20px;">' +
    '<div style="font-size:36px;margin-bottom:12px;">&#x1F3F0;</div>' +
    '<div style="font-family:var(--font-title);font-size:18px;color:var(--gold);margin-bottom:8px;">THE GAUNTLET</div>' +
    '<div style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);margin-bottom:20px;">Register to challenge the tower.</div>' +
    '<a href="/register.html" style="font-family:var(--font-title);font-size:14px;color:var(--gold);padding:12px 24px;border:1px solid var(--gold);border-radius:8px;">Register &#x2192;</a>' +
    '</div>';
}

// ═══ GO ═══
init();
</script>
