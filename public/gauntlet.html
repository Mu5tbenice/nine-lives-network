<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Gauntlet — Nine Lives Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#08060e;--surface:#0c0a14;--card:#0e0c16;--border:rgba(212,166,75,0.08);--gold:#d4a64b;--gold-dim:rgba(212,166,75,0.08);--text:#e0ddd8;--muted:rgba(255,255,255,0.4);--red:#ff4444;--green:#44cc66;--blue:#4488ff;--purple:#aa55ff}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
    .header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(8,6,14,0.95)}
    .header-title{font-family:'Cinzel',serif;font-size:16px;font-weight:900;letter-spacing:2px;color:var(--gold)}
    .container{max-width:500px;margin:0 auto;padding:16px}
    .section-label{font-family:'Cinzel',serif;font-size:12px;font-weight:900;color:var(--gold);letter-spacing:2px;margin-bottom:8px}

    /* Floor Progress */
    .floor-track{display:flex;align-items:center;gap:4px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow-x:auto}
    .floor-node{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-family:'Fira Code',monospace;flex-shrink:0;transition:all 0.2s}
    .floor-node.cleared{background:rgba(68,204,102,0.15);border:2px solid var(--green);color:var(--green)}
    .floor-node.current{background:rgba(212,166,75,0.15);border:2px solid var(--gold);color:var(--gold);box-shadow:0 0 12px rgba(212,166,75,0.3);transform:scale(1.15)}
    .floor-node.locked{background:rgba(255,255,255,0.03);border:2px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.15)}
    .floor-conn{width:12px;height:2px;background:rgba(255,255,255,0.06);flex-shrink:0}
    .floor-conn.cleared{background:var(--green)}

    /* Current Floor Card */
    .floor-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center}
    .floor-number{font-family:'Cinzel',serif;font-size:12px;color:var(--muted);letter-spacing:2px}
    .floor-enemy-name{font-family:'Cinzel',serif;font-size:20px;font-weight:900;color:#fff;margin:6px 0}
    .floor-enemy-icon{font-size:48px;margin:8px 0}
    .enemy-stats{display:flex;justify-content:center;gap:16px;margin:10px 0}
    .enemy-stat{text-align:center}
    .enemy-stat-val{font-size:18px;font-weight:900;font-family:'Fira Code',monospace}
    .enemy-stat-label{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'Fira Code',monospace}
    .enemy-effects{display:flex;gap:4px;justify-content:center;margin-top:8px;flex-wrap:wrap}
    .enemy-effect{font-size:8px;padding:2px 6px;border-radius:4px;background:rgba(170,85,255,0.08);border:1px solid rgba(170,85,255,0.15);color:var(--purple);font-family:'Fira Code',monospace}

    /* Card Selection */
    .pick-label{font-size:11px;color:var(--muted);text-align:center;margin-bottom:8px}
    .card-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
    .pick-card{padding:12px 8px;border-radius:10px;background:var(--card);border:2px solid var(--border);cursor:pointer;text-align:center;transition:all 0.2s;position:relative}
    .pick-card:hover{border-color:rgba(212,166,75,0.2)}
    .pick-card.selected{border-color:var(--gold);background:var(--gold-dim)}
    .pick-card-emoji{font-size:20px}
    .pick-card-name{font-size:9px;font-weight:700;margin-top:4px}
    .pick-card-stats{font-size:8px;color:var(--muted);font-family:'Fira Code',monospace;margin-top:2px}

    .fight-btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--red),#cc2222);color:#fff;font-family:'Cinzel',serif;font-size:14px;font-weight:900;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 16px rgba(255,68,68,0.3)}
    .fight-btn:disabled{opacity:0.4;cursor:not-allowed}

    /* Result */
    .result-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;margin:16px 0}
    .result-icon{font-size:48px}
    .result-text{font-family:'Cinzel',serif;font-size:22px;font-weight:900;letter-spacing:3px;margin:8px 0}
    .result-detail{font-size:11px;color:var(--muted);font-family:'Fira Code',monospace}
    .result-actions{display:flex;gap:8px;margin-top:16px;justify-content:center}
    .result-btn{padding:10px 24px;border-radius:10px;border:none;font-family:'Cinzel',serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px}
    .result-btn.next{background:linear-gradient(135deg,var(--gold),#c49030);color:#0a0810}
    .result-btn.retreat{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,166,75,0.2)}

    /* Best Run */
    .best-run{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:16px}
    .best-run-label{font-size:9px;color:var(--muted);letter-spacing:1px;font-family:'Fira Code',monospace}
    .best-run-value{font-size:20px;font-weight:900;color:var(--gold);font-family:'Fira Code',monospace}
    .reset-timer{font-size:9px;color:var(--muted);font-family:'Fira Code',monospace;margin-left:auto}
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px">🏰</span>
    <span class="header-title">THE GAUNTLET</span>
    <div style="flex:1"></div>
    <a href="/nethara-live.html" style="font-size:10px;color:var(--muted);text-decoration:none;font-family:'Fira Code',monospace">← NETHARA LIVE</a>
  </div>
  <div class="container">
    <div class="best-run">
      <div><div class="best-run-label">BEST RUN</div><div class="best-run-value" id="best-floor">—</div></div>
      <div class="reset-timer" id="reset-timer">Resets daily at midnight UTC</div>
    </div>
    <div id="floor-track" class="floor-track"></div>
    <div id="game-area"></div>
  </div>

<script>
let playerId = null;
let currentFloor = 1;
let bestFloor = 0;
let runActive = false;
let selectedCard = null;
let playerCards = [];

const ENEMIES = [
  {name:'Shadow Rat',icon:'🐀',atk:3,hp:8,effects:[]},
  {name:'Cave Spider',icon:'🕷️',atk:5,hp:10,effects:[]},
  {name:'Mana Wraith',icon:'👻',atk:6,hp:12,effects:['SILENCE']},
  {name:'Stone Golem',icon:'🗿',atk:4,hp:20,effects:['ANCHOR']},
  {name:'Fire Elemental',icon:'🔥',atk:8,hp:14,effects:['BURN +3']},
  {name:'Void Stalker',icon:'👁️',atk:9,hp:16,effects:['HEX']},
  {name:'Storm Drake',icon:'🐉',atk:10,hp:18,effects:['CHAIN ×2']},
  {name:'Crystal Titan',icon:'💎',atk:7,hp:25,effects:['WARD','THORNS']},
  {name:'Nethara Shade',icon:'🌑',atk:12,hp:20,effects:['SILENCE','WEAKEN']},
  {name:'The Veilbreaker',icon:'💀',atk:15,hp:30,effects:['BURN +5','ANCHOR','HEX']},
];

document.addEventListener('DOMContentLoaded', async () => {
  try { const s=JSON.parse(localStorage.getItem('9lv_session')||'{}'); if(s.player_id) playerId=s.player_id; } catch(e){}
  await loadState();
  renderAll();
});

async function loadState() {
  if (!playerId) return;
  try {
    const res = await fetch(`/api/gauntlet/status/${playerId}`).then(r=>r.json());
    if (res.current_floor) currentFloor = res.current_floor;
    if (res.best_floor) bestFloor = res.best_floor;
    runActive = res.run_active || false;
  } catch(e) { console.log('No gauntlet state, starting fresh'); }
  try {
    const res = await fetch(`/api/packs/collection/${playerId}`).then(r=>r.json());
    playerCards = (res.cards||res||[]).slice(0,9);
  } catch(e) {}
}

function renderAll() {
  document.getElementById('best-floor').textContent = bestFloor > 0 ? `Floor ${bestFloor}` : '—';
  renderFloorTrack();
  renderGameArea();
}

function renderFloorTrack() {
  const track = document.getElementById('floor-track');
  let html = '';
  for (let i=1; i<=10; i++) {
    if (i>1) html += `<div class="floor-conn ${i<=currentFloor?'cleared':''}"></div>`;
    const state = i<currentFloor ? 'cleared' : i===currentFloor ? 'current' : 'locked';
    html += `<div class="floor-node ${state}">${i}</div>`;
  }
  track.innerHTML = html;
}

function renderGameArea() {
  const area = document.getElementById('game-area');
  const enemy = ENEMIES[Math.min(currentFloor-1, ENEMIES.length-1)];
  const scaled = { name:enemy.name, icon:enemy.icon, atk:enemy.atk+Math.floor((currentFloor-1)*1.5), hp:enemy.hp+Math.floor((currentFloor-1)*3), effects:enemy.effects };

  area.innerHTML = `
    <div class="floor-card">
      <div class="floor-number">FLOOR ${currentFloor}</div>
      <div class="floor-enemy-icon">${scaled.icon}</div>
      <div class="floor-enemy-name">${scaled.name}</div>
      <div class="enemy-stats">
        <div class="enemy-stat"><div class="enemy-stat-val" style="color:var(--red)">${scaled.atk}</div><div class="enemy-stat-label">ATK</div></div>
        <div class="enemy-stat"><div class="enemy-stat-val" style="color:var(--green)">${scaled.hp}</div><div class="enemy-stat-label">HP</div></div>
      </div>
      ${scaled.effects.length ? `<div class="enemy-effects">${scaled.effects.map(e=>`<span class="enemy-effect">${e}</span>`).join('')}</div>` : ''}
    </div>
    <div class="section-label">CHOOSE YOUR CARD</div>
    <div class="pick-label">Pick 1 card to fight this floor</div>
    <div class="card-row">
      ${playerCards.map(c => `
        <div class="pick-card ${selectedCard===c.id?'selected':''}" onclick="selectGauntletCard(${c.id})">
          <div class="pick-card-emoji">🃏</div>
          <div class="pick-card-name">${c.spell_name||c.name||'Card'}</div>
          <div class="pick-card-stats">ATK ${c.base_atk||c.atk||'?'} · HP ${c.base_hp||c.hp||'?'}</div>
        </div>
      `).join('')}
    </div>
    <button class="fight-btn" id="fight-btn" ${selectedCard?'':'disabled'} onclick="fightFloor()">⚔️ FIGHT FLOOR ${currentFloor}</button>`;
}

function selectGauntletCard(id) {
  selectedCard = selectedCard===id ? null : id;
  renderGameArea();
}

async function fightFloor() {
  if (!selectedCard || !playerId) return;
  try {
    const res = await fetch('/api/gauntlet/fight', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ player_id:playerId, card_id:selectedCard, floor:currentFloor }),
    }).then(r=>r.json());

    const area = document.getElementById('game-area');
    if (res.won) {
      currentFloor++;
      if (currentFloor-1 > bestFloor) bestFloor = currentFloor-1;
      area.innerHTML = `
        <div class="result-card">
          <div class="result-icon">⚔️</div>
          <div class="result-text" style="color:var(--green)">VICTORY</div>
          <div class="result-detail">Floor ${currentFloor-1} cleared! You dealt ${res.damage_dealt||'?'} damage.</div>
          <div class="result-actions">
            <button class="result-btn next" onclick="selectedCard=null;renderAll()">NEXT FLOOR →</button>
            <button class="result-btn retreat" onclick="endRun()">RETREAT</button>
          </div>
        </div>`;
    } else {
      area.innerHTML = `
        <div class="result-card">
          <div class="result-icon">💀</div>
          <div class="result-text" style="color:var(--red)">DEFEATED</div>
          <div class="result-detail">Fell on floor ${currentFloor}. Best run: Floor ${bestFloor}.</div>
          <div class="result-actions">
            <button class="result-btn next" onclick="currentFloor=1;selectedCard=null;renderAll()">TRY AGAIN</button>
          </div>
        </div>`;
    }
    document.getElementById('best-floor').textContent = bestFloor > 0 ? `Floor ${bestFloor}` : '—';
    renderFloorTrack();
  } catch(e) { alert('Fight error: '+e.message); }
}

function endRun() { currentFloor=1; selectedCard=null; renderAll(); }
</script>
</body>
</html>
