<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Gauntlet | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    :root{--bg-deep:#120e1e;--bg-warm:#1a1528;--bg-card:rgba(30,22,42,0.7);--border:rgba(212,166,75,0.12);--border-glow:rgba(212,166,75,0.3);--gold:#D4A64B;--gold-dim:rgba(212,166,75,0.15);--text-bright:#F5F0E8;--text-body:#D4C8B8;--text-muted:#9B8E7E;--text-faint:#6B5E50;--sunset:#e8855a;--sky:#8BB4E0;--green:#6acd8a;--red:#e85a6a;--cyan:#6ac8d8;--purple:#b088e8;--font-title:'Cinzel',serif;--font-body:'Crimson Text',Georgia,serif;--font-data:'Press Start 2P',monospace;--font-mono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(176,136,232,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(232,133,90,0.06) 0%,transparent 40%),linear-gradient(180deg,#1a1528 0%,#120e1e 30%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body)}
    a{color:var(--gold);text-decoration:none}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}
    .main{max-width:500px;margin:0 auto;padding:14px}
    .section-label{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
    .section-label__text{font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
    .section-label__line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

    .floor-card{border-radius:12px;background:var(--bg-card);border:1px solid var(--border);padding:16px;margin-bottom:8px;position:relative;overflow:hidden}
    .floor-card.current{border-color:var(--gold);box-shadow:0 0 20px rgba(212,166,75,0.1)}
    .floor-card.cleared{opacity:0.5}
    .floor-number{font-family:var(--font-data);font-size:20px;color:var(--gold)}
    .floor-enemy{font-family:var(--font-title);font-size:14px;font-weight:700;color:var(--text-bright)}
    .floor-stats{display:flex;gap:8px;margin-top:6px}

    .start-btn{width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-title);font-size:14px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,var(--purple),#8050b0);color:#fff;box-shadow:0 4px 0 #5a3080,0 6px 16px rgba(176,136,232,0.25);margin-bottom:14px}
    .start-btn:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}
  </style>
  <link rel="stylesheet" href="/css/card-slot-v4.css">
</head>
<body>
<script src="/js/nav.js"></script>
  <div class="main" id="content">
    <div style="text-align:center;padding:60px 20px;"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div></div>
  </div>

<script src="/js/card-particles.js"></script>
<script src="/js/card-v4.js"></script>
<script>
var playerId=null;
function getPlayerId(){var p=new URLSearchParams(window.location.search);var f=p.get('player_id');if(f){localStorage.setItem('player_id',f);return f;}return localStorage.getItem('player_id');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

var FLOOR_ENEMIES=[
  {name:'Feral Shade',icon:'👤',atk:4,hp:8},{name:'Mana Wisp',icon:'✨',atk:6,hp:6},{name:'Stone Golem',icon:'🪨',atk:5,hp:14},
  {name:'Ember Wraith',icon:'🔥',atk:10,hp:8},{name:'Crystal Guardian',icon:'💎',atk:8,hp:12},{name:'Void Stalker',icon:'🌑',atk:12,hp:10},
  {name:'Storm Elemental',icon:'⚡',atk:14,hp:12},{name:'Ancient Treant',icon:'🌳',atk:10,hp:20},{name:'Shadow Dragon',icon:'🐉',atk:16,hp:16},
  {name:'The Nethara King',icon:'👑',atk:20,hp:24}
];

async function loadGauntlet(){
  playerId=getPlayerId();
  if(!playerId){document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px"><a href="/register.html" style="font-family:var(--font-title);font-size:16px;">Register to play →</a></div>';return;}

  var player={},gauntlet={};
  try{var pR=await fetch('/api/players/'+playerId);if(pR.ok)player=await pR.json();}catch(e){}
  try{var gR=await fetch('/api/gauntlet/active/'+playerId);if(gR.ok)gauntlet=await gR.json();}catch(e){}

  var currentFloor=gauntlet.current_floor||1;
  var bestFloor=gauntlet.best_floor||player.best_gauntlet||0;
  var html='';

  html+='<div class="section-label"><span style="font-size:14px;">🏰</span><span class="section-label__text">THE GAUNTLET</span><span class="section-label__line"></span></div>';
  html+='<p style="font-family:var(--font-body);font-size:14px;color:var(--text-muted);margin-bottom:14px;">Climb the tower solo. Each floor harder than the last. Resets daily.</p>';

  // Stats
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">';
  html+='<div style="padding:14px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);text-align:center;"><div style="font-family:var(--font-data);font-size:7px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px;">CURRENT FLOOR</div><div style="font-family:var(--font-data);font-size:22px;color:var(--purple);">'+currentFloor+'</div></div>';
  html+='<div style="padding:14px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);text-align:center;"><div style="font-family:var(--font-data);font-size:7px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px;">BEST EVER</div><div style="font-family:var(--font-data);font-size:22px;color:var(--gold);">'+bestFloor+'</div></div>';
  html+='</div>';

  // Start button
  html+='<button class="start-btn" id="startBtn" onclick="startFloor()">⚔️ CHALLENGE FLOOR '+currentFloor+'</button>';


  // Your Spells
  if(playerSpells.length>0){
    html+='<div class="section-label" style="margin-top:16px;"><span style="font-size:14px;">🃏</span><span class="section-label__text">YOUR SPELLS</span><span class="section-label__line"></span></div>';
    html+='<div style="display:flex;flex-wrap:wrap;gap:8px;padding:8px 0;justify-content:center;">';
    playerSpells.forEach(function(s,i){
      var card={
        id:s.id,name:s.spell_name||s.name,house:s.spell_house||s.house||'universal',
        rarity:s.rarity||'common',type:s.spell_type||s.type||'attack',
        base_atk:s.base_atk||0,base_hp:s.base_hp||0,base_spd:s.base_spd||0,
        effects:s.spell_effects||s.effects||[],
        current_charges:s.current_charges,max_charges:s.max_charges,
        is_exhausted:s.is_exhausted
      };
      html+=buildSpellCard(card,{size:'mini',delay:i*0.03});
    });
    html+='</div>';
  }

  // Floor tower
  html+='<div class="section-label"><span style="font-size:14px;">🗼</span><span class="section-label__text">TOWER</span><span class="section-label__line"></span></div>';

  for(var i=FLOOR_ENEMIES.length;i>=1;i--){
    var enemy=FLOOR_ENEMIES[i-1];
    var isCurrent=i===currentFloor;
    var isCleared=i<currentFloor;
    html+='<div class="floor-card '+(isCurrent?'current':'')+(isCleared?' cleared':'')+'">';
    html+='<div style="display:flex;align-items:center;gap:12px;">';
    html+='<div class="floor-number">'+(isCleared?'✅':i)+'</div>';
    html+='<div style="flex:1;"><div class="floor-enemy">'+enemy.icon+' '+enemy.name+'</div>';
    html+='<div class="floor-stats">';
    html+='<span style="font-family:var(--font-data);font-size:7px;color:var(--red);">⚔️'+enemy.atk+'</span>';
    html+='<span style="font-family:var(--font-data);font-size:7px;color:var(--green);">💚'+enemy.hp+'</span>';
    html+='</div></div>';
    if(isCurrent)html+='<span style="font-family:var(--font-data);font-size:6px;color:var(--gold);letter-spacing:1px;">NEXT →</span>';
    html+='</div></div>';
  }

  document.getElementById('content').innerHTML=html;
}

async function startFloor(){
  var btn=document.getElementById('startBtn');
  btn.disabled=true;btn.textContent='FIGHTING...';
  try{
    var r=await fetch('/api/gauntlet/fight',{method:'POST',headers:{'Content-Type':'application/json'}});
    if(r.ok){
      var res=await r.json();
      btn.textContent=res.won?'🏆 FLOOR CLEARED!':'💀 DEFEATED';
      setTimeout(function(){loadGauntlet();},2000);
    }else{
      var err=await r.json().catch(function(){return{error:'Failed'};});
      btn.textContent='❌ '+(err.error||'Failed');
      setTimeout(function(){loadGauntlet();},2000);
    }
  }catch(e){
    btn.textContent='❌ Network error';
    setTimeout(function(){loadGauntlet();},2000);
  }
}

loadGauntlet();
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script src="/js/card-slot-helper.js"></script>
<script>
/* ═══ V4 OVERRIDE — forces all card rendering through card-v4.js ═══ */
if(typeof buildCardV4==='function'){
  buildCard=function(s,d){return buildCardV4(s,{delay:d||0});};
  buildSpellCard=function(s,opts){return buildCardV4(s,opts);};
}
</script>

</body>
</html>
