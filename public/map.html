<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>World | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    .world-hero { text-align: center; padding: 14px 0 6px; }
    .world-hero__title { font-family: var(--font-title); font-weight: 700; font-size: 24px; color: var(--gold); letter-spacing: 3px; }
    .world-hero__sub { font-family: var(--font-body); font-size: 15px; font-style: italic; color: var(--text-muted); margin-top: 4px; }

    /* ═══ CRYSTAL TOWERS ═══ */
    .towers-wrap {
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 12px 4px 8px;
      position: relative;
      overflow: hidden;
    }
    .towers-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 90%, rgba(212,166,75,0.06) 0%, transparent 65%);
      pointer-events: none;
    }
    .towers-label {
      font-family: var(--font-data); font-size: 7px; color: var(--text-faint);
      letter-spacing: 2px; text-align: center; margin-bottom: 4px;
    }
    .towers-row {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 4px; height: 240px; padding: 0 2px; position: relative; z-index: 1;
    }
    .tower-col {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px; flex: 1; max-width: 52px; min-width: 28px;
    }
    /* The orb at top of tower */
    .tower-orb {
      width: 10px; height: 10px; border-radius: 50%;
      margin-bottom: -5px; z-index: 2; position: relative;
      animation: towerOrbPulse 3s ease-in-out infinite;
    }
    .tower-col--you .tower-orb {
      width: 12px; height: 12px;
      animation: towerOrbPulse 2s ease-in-out infinite;
    }
    @keyframes towerOrbPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }
    /* The crystal body */
    .tower-body {
      width: 20px; border-radius: 3px 3px 2px 2px;
      position: relative; overflow: hidden;
      transition: height 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .tower-col--you .tower-body { width: 26px; }
    .tower-shimmer {
      position: absolute; top: 0; left: 35%; width: 2px; height: 100%;
      animation: towerShimmer 2.5s ease-in-out infinite;
    }
    @keyframes towerShimmer { 0%,100% { opacity: 0.2; } 50% { opacity: 0.7; } }
    /* Base glow */
    .tower-base {
      width: 28px; height: 3px; border-radius: 50%;
    }
    .tower-col--you .tower-base { width: 34px; }
    /* Crest image */
    .tower-crest {
      width: 22px; height: 22px; object-fit: contain;
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.5));
    }
    .tower-col--you .tower-crest { width: 26px; height: 26px; }
    /* Rank */
    .tower-rank {
      font-family: var(--font-data); font-size: 7px; letter-spacing: 0.5px;
    }
    /* Name */
    .tower-name {
      font-family: var(--font-title); font-size: 7px; color: #999;
      text-align: center; line-height: 1; max-width: 52px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tower-col--you .tower-name { font-weight: 700; }
    /* Power */
    .tower-pts {
      font-family: var(--font-data); font-size: 7px; color: #777;
    }
    .tower-col--you .tower-pts { font-weight: 700; }
    /* Ground line */
    .towers-ground {
      height: 1px; margin: 0 16px;
      background: linear-gradient(90deg, transparent, rgba(212,166,75,0.2), transparent);
    }
    /* Your house badge */
    .towers-you-badge {
      display: flex; align-items: center; gap: 6px; justify-content: center;
      margin-top: 8px; padding: 5px 12px;
      background: rgba(255,200,0,0.04); border: 1px solid rgba(255,200,0,0.12);
      border-radius: 6px; width: fit-content; margin-left: auto; margin-right: auto;
    }
    .towers-you-dot {
      width: 6px; height: 6px; border-radius: 50%;
      animation: towerOrbPulse 2s ease-in-out infinite;
    }
    .towers-you-text {
      font-family: var(--font-data); font-size: 7px; letter-spacing: 1px;
    }
    @media (max-width: 380px) {
      .towers-row { gap: 2px; height: 200px; }
      .tower-body { width: 16px; }
      .tower-col--you .tower-body { width: 20px; }
      .tower-crest { width: 18px; height: 18px; }
      .tower-col--you .tower-crest { width: 22px; height: 22px; }
      .tower-name { font-size: 6px; max-width: 38px; }
      .tower-pts { font-size: 6px; }
    }

    /* Player bar */
    .player-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: 10px;
    }
    .player-bar__left { display: flex; align-items: center; gap: 10px; }
    .player-bar__avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-subtle); }
    .player-bar__name { font-family: var(--font-title); font-size: 13px; font-weight: 600; color: var(--text-bright); }
    .player-bar__house { display: flex; align-items: center; gap: 4px; }
    .player-bar__house-img { width: 16px; height: 16px; object-fit: contain; }
    .player-bar__house-name { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
    .player-bar__mana { display: flex; align-items: center; gap: 4px; }
    .player-bar__mana-label { font-family: var(--font-data); font-size: 8px; color: var(--text-muted); letter-spacing: 1px; }

    /* Sort/filter bar */
    .sort-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .sort-btn {
      padding: 7px 14px; border: 1px solid var(--border-subtle); border-radius: 6px;
      background: var(--bg-card); color: var(--text-muted);
      font-family: var(--font-title); font-size: 10px; font-weight: 600;
      letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s;
    }
    .sort-btn.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold-border); }
    .zone-count { font-family: var(--font-data); font-size: 8px; color: var(--text-faint); margin-left: auto; }

    /* Zone card */
    .zone-grid { display: flex; flex-direction: column; gap: 12px; }
    .zone-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px;
      cursor: pointer; transition: all 0.25s ease; overflow: hidden;
      position: relative;
    }
    .zone-card:hover { border-color: var(--border-medium); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .zone-card--objective { border-color: var(--gold-border); box-shadow: 0 0 20px var(--gold-glow), inset 0 0 30px rgba(212,166,75,0.03); }
    .zone-card--objective:hover { box-shadow: 0 0 25px var(--gold-glow), 0 8px 24px rgba(0,0,0,0.3); }
    .zone-card--bonus { border-color: rgba(0, 255, 136, 0.2); box-shadow: 0 0 12px rgba(0,255,136,0.06); }
    .zone-card--bonus:hover { box-shadow: 0 0 18px rgba(0,255,136,0.1), 0 8px 24px rgba(0,0,0,0.3); }

    .zone-card__image {
      position: relative; height: 120px; overflow: hidden;
      background-color: var(--bg-inset); background-size: cover; background-position: center;
    }
    .zone-card__image::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(10,8,18,0.1) 0%, rgba(10,8,18,0.65) 60%, rgba(10,8,18,0.95) 100%);
    }
    .zone-card__image-badges {
      position: absolute; top: 8px; right: 8px; z-index: 2;
      display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end;
    }
    .zone-card__image-overlay {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
      padding: 10px 14px 8px;
    }
    .zone-card__name {
      font-family: var(--font-title); font-size: 16px; font-weight: 700;
      color: #fff; letter-spacing: 0.5px; text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }
    .zone-card__desc {
      font-family: var(--font-body); font-size: 12px; color: rgba(255,255,255,0.65);
      margin-top: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.6);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .zone-card__no-image {
      height: 0; padding: 14px 14px 0;
    }
    .zone-card__no-image .zone-card__name { color: var(--text-bright); text-shadow: none; }
    .zone-card__no-image .zone-card__desc { color: var(--text-faint); text-shadow: none; }

    .zone-card__body { padding: 10px 14px 14px; }
    .zone-card__badges { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; }
    .zone-badge {
      font-family: var(--font-data); font-size: 7px; padding: 3px 8px;
      border-radius: 4px; letter-spacing: 0.5px; backdrop-filter: blur(4px);
    }
    .zone-badge--objective { background: rgba(212,166,75,0.25); color: var(--gold); border: 1px solid var(--gold-border); }
    .zone-badge--bonus { background: rgba(0,255,136,0.12); color: #00ff88; border: 1px solid rgba(0,255,136,0.25); }
    .zone-badge--controlled {
      padding: 3px 6px; display: flex; align-items: center; gap: 4px;
      background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.1);
    }
    .zone-badge--controlled img { width: 12px; height: 12px; object-fit: contain; }
    .zone-badge--contesting {
      display: flex; align-items: center; gap: 3px;
      background: rgba(255,85,85,0.12); color: #ff7777; border: 1px solid rgba(255,85,85,0.2);
    }

    .zone-card__influence { margin-bottom: 10px; }
    .influence-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.04); overflow: hidden; display: flex; }
    .influence-segment { height: 100%; transition: width 0.6s ease; }
    .influence-labels { display: flex; justify-content: space-between; margin-top: 4px; }
    .influence-label { display: flex; align-items: center; gap: 3px; font-family: var(--font-data); font-size: 7px; color: var(--text-faint); }
    .influence-label img { width: 10px; height: 10px; object-fit: contain; }

    .zone-card__footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .zone-card__activity {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);
      display: flex; align-items: center; gap: 4px;
    }
    .zone-card__activity-dot {
      width: 5px; height: 5px; border-radius: 50%; background: #44cc44;
      animation: activityPulse 2s ease-in-out infinite;
    }
    .zone-card__activity-dot--idle { background: #555; animation: none; }
    @keyframes activityPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .zone-card__actions { display: flex; gap: 6px; }
    .zone-action-btn {
      padding: 7px 14px; border-radius: 6px; border: none;
      font-family: var(--font-data); font-size: 8px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.15s; color: #fff;
    }
    .zone-action-btn:hover { transform: translateY(-1px); }
    .zone-action-btn:active { transform: translateY(0); }
    .zone-action-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .zone-action-btn--attack { background: linear-gradient(135deg, #cc3333, #aa2222); box-shadow: 0 2px 8px rgba(204,51,51,0.25); }
    .zone-action-btn--attack:hover { box-shadow: 0 4px 12px rgba(204,51,51,0.4); }
    .zone-action-btn--defend { background: linear-gradient(135deg, #3366cc, #2244aa); box-shadow: 0 2px 8px rgba(51,102,204,0.25); }
    .zone-action-btn--defend:hover { box-shadow: 0 4px 12px rgba(51,102,204,0.4); }
    .zone-action-btn--done { background: var(--bg-inset); color: var(--text-faint); border: 1px solid var(--border-subtle); box-shadow: none; }

    /* Zone detail modal */
    .zone-modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      z-index: 100; justify-content: center; align-items: flex-end; padding: 0;
    }
    .zone-modal-overlay.active { display: flex; }
    .zone-modal {
      max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto;
      background: var(--bg-card); border-radius: 16px 16px 0 0;
      border: 1px solid var(--border-subtle); border-bottom: none;
      animation: slideUpModal 0.3s ease;
    }
    @keyframes slideUpModal { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .zone-modal__header {
      padding: 20px 20px 14px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .zone-modal__title { font-family: var(--font-title); font-size: 18px; font-weight: 700; color: var(--text-bright); letter-spacing: 1px; }
    .zone-modal__desc { font-family: var(--font-body); font-size: 13px; color: var(--text-faint); margin-top: 2px; }
    .zone-modal__close { background: none; border: none; color: var(--text-faint); font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
    .zone-modal__body { padding: 16px 20px 24px; }
    .zone-modal__influence { margin-bottom: 16px; }
    .zone-modal__influence-title { font-family: var(--font-data); font-size: 8px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 8px; }
    .modal-influence-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
    .modal-influence-row img { width: 18px; height: 18px; object-fit: contain; }
    .modal-influence-name { font-family: var(--font-title); font-size: 12px; font-weight: 600; color: var(--text-bright); min-width: 90px; }
    .modal-influence-bar { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.04); overflow: hidden; }
    .modal-influence-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .modal-influence-pct { font-family: var(--font-data); font-size: 9px; color: var(--text-muted); min-width: 32px; text-align: right; }
    .zone-modal__actions-title { font-family: var(--font-data); font-size: 8px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 8px; }
    .modal-action-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--bg-inset); border-radius: 8px; margin-bottom: 4px;
    }
    .modal-action-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--border-subtle); }
    .modal-action-info { flex: 1; }
    .modal-action-name { font-family: var(--font-title); font-size: 12px; font-weight: 600; color: var(--text-bright); }
    .modal-action-type { font-family: var(--font-data); font-size: 7px; letter-spacing: 1px; }
    .modal-action-type--attack { color: #ff5555; }
    .modal-action-type--defend { color: #5588ff; }
    .modal-action-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
    .modal-empty { font-family: var(--font-body); font-size: 14px; font-style: italic; color: var(--text-faint); text-align: center; padding: 20px 0; }

    /* Toast */
    .toast {
      display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 8px; font-family: var(--font-title);
      font-size: 13px; font-weight: 600; z-index: 200; letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast--success { background: #1a3a1a; color: #44cc44; border: 1px solid #2a5a2a; }
    .toast--error { background: #3a1a1a; color: #cc4444; border: 1px solid #5a2a2a; }
    .toast.active { display: block; animation: fadeUp 0.3s ease; }

    @media (max-width: 480px) {
      .world-hero__title { font-size: 20px; }
      .zone-card__image { height: 100px; }
      .zone-card__name { font-size: 14px; }
      .zone-card__body { padding: 8px 12px 12px; }
      .sort-btn { font-size: 9px; padding: 6px 10px; }
      .zone-modal { max-height: 85vh; }
    }
  
      .zone-spell-bar { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; justify-content:center; }
      .zone-spell-btn { padding:4px 10px; border-radius:6px; border:1px solid rgba(212,166,75,0.3); background:rgba(212,166,75,0.08); color:var(--gold); font-family:'Cinzel',serif; font-size:10px; cursor:pointer; transition:all 0.2s; }
      .zone-spell-btn:hover { background:rgba(212,166,75,0.2); transform:translateY(-1px); }
      .zone-activity { margin-top:8px; padding:8px; border-radius:6px; background:rgba(0,0,0,0.2); }
      .zone-activity-item { font-size:11px; color:var(--text-dim); padding:2px 0; }
      .zone-activity-item .handle { color:var(--gold); font-family:'Press Start 2P',monospace; font-size:8px; }
    
    
      /* Enhanced zone cards */
      .zone-card { 
        background: var(--bg-card, rgba(20,16,32,0.95)); 
        border: 1px solid rgba(212,166,75,0.15); 
        border-radius: 16px; 
        padding: 0; 
        margin-bottom: 20px; 
        overflow: hidden;
        transition: all 0.3s;
        cursor: pointer;
      }
      .zone-card:hover { border-color: rgba(212,166,75,0.4); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
      .zone-card.expanded { }
      .zone-card-header { position: relative; min-height: 80px; padding: 20px 24px; }
      .zone-card-header img.zone-bg { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.25; }
      .zone-card-body { padding: 0 24px 20px; }
      .zone-card-title { font-family:'Cinzel',serif; font-size: 1.2rem; color: var(--gold, #D4A64B); position: relative; }
      .zone-card-desc { font-family:'Crimson Text',serif; color: var(--text-dim, #8a8677); font-size: 0.9rem; margin-top: 4px; position: relative; }
      .zone-card-house { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:20px; font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.05em; text-transform:uppercase; position:absolute; top:16px; right:16px; }
      .zone-card-house img { width:18px; height:18px; object-fit:contain; }
      .zone-bar { height:4px; border-radius:2px; margin:12px 0 8px; background:rgba(255,255,255,0.05); overflow:hidden; }
      .zone-bar-fill { height:100%; border-radius:2px; transition:width 0.5s; }
      .zone-card-footer { display:flex; justify-content:space-between; align-items:center; }
      .zone-card-stats { font-size:0.75rem; color:var(--text-dim, #8a8677); }
      .zone-cast-btn { padding:8px 20px; border-radius:8px; border:1px solid rgba(212,166,75,0.3); background:rgba(212,166,75,0.1); color:var(--gold, #D4A64B); font-family:'Cinzel',serif; font-size:0.7rem; cursor:pointer; text-transform:uppercase; letter-spacing:0.05em; transition:all 0.2s; }
      .zone-cast-btn:hover { background:rgba(212,166,75,0.25); transform:translateY(-1px); }

      /* Expanded spell panel */
      .zone-spells { display:none; padding:16px 24px 20px; border-top:1px solid rgba(212,166,75,0.1); }
      .zone-card.expanded .zone-spells { display:block; }
      .zone-spells-title { font-family:'Cinzel',serif; font-size:0.8rem; color:var(--gold, #D4A64B); margin-bottom:12px; }
      .zone-spells-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:8px; }
      .zone-spell-card { padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); cursor:pointer; text-align:center; transition:all 0.2s; }
      .zone-spell-card:hover { border-color:rgba(212,166,75,0.3); background:rgba(212,166,75,0.06); }
      .zone-spell-card .spell-name { font-family:'Cinzel',serif; font-size:0.7rem; color:var(--text-body, #ccc); }
      .zone-spell-card .spell-cost { font-size:0.65rem; color:var(--gold, #D4A64B); }

      /* Player hover popup */
      .player-popup { position:absolute; z-index:999; background:rgba(20,16,32,0.97); border:1px solid rgba(212,166,75,0.25); border-radius:12px; padding:14px 18px; min-width:180px; box-shadow:0 8px 32px rgba(0,0,0,0.5); pointer-events:none; display:none; }
      .player-popup.show { display:block; }
      .player-popup-name { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--gold, #D4A64B); }
      .player-popup-house { display:flex; align-items:center; gap:6px; margin-top:6px; font-family:'Cinzel',serif; font-size:0.75rem; color:var(--text-dim, #8a8677); }
      .player-popup-house img { width:16px; height:16px; }
      .player-popup-stats { margin-top:8px; font-size:0.7rem; color:var(--text-dim, #8a8677); }
    
    </style>
</head>

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      var diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
      if (diff < 60) return Math.floor(diff) + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function renderTowers(schoolData) {
      if (!schoolData || schoolData.length === 0) return;

      // Sort by total points descending
      var sorted = schoolData.slice().sort(function(a, b) { return (b.total_points || 0) - (a.total_points || 0); });
      var maxPts = sorted[0].total_points || 1;
      var mySchoolId = player ? player.school_id : null;
      var rankColors = ['#FFD700', '#C0C0C0', '#CD7F32'];

      var row = document.getElementById('towersRow');
      var html = '';

      sorted.forEach(function(s, i) {
        var h = HOUSES[s.school_id];
        if (!h) return;
        var isYou = s.school_id === mySchoolId;
        var heightPct = (s.total_points || 0) / maxPts;
        var towerH = Math.max(20, 30 + heightPct * 160);
        var colClass = 'tower-col' + (isYou ? ' tower-col--you' : '');
        var rc = i < 3 ? rankColors[i] : '#555';

        html += '<div class="' + colClass + '" style="animation-delay:' + (i * 0.06) + 's;">'
          // Orb
          + '<div class="tower-orb" style="background:' + h.glow + ';box-shadow:0 0 ' + (isYou ? 16 : 8) + 'px ' + h.glow + ',0 0 ' + (isYou ? 30 : 14) + 'px ' + h.color + '50;animation-delay:' + (i * 0.3) + 's;"></div>'
          // Tower body
          + '<div class="tower-body" style="height:' + towerH + 'px;background:linear-gradient(180deg,' + h.glow + '35 0%,' + h.color + ' 30%,' + h.color + '90 70%,' + h.color + '35 100%);border:1px solid ' + h.glow + '50;box-shadow:' + (isYou ? '0 0 18px ' + h.color + '50,inset 0 0 12px ' + h.glow + '25' : '0 0 6px ' + h.color + '25,inset 0 0 6px ' + h.glow + '12') + ';">'
          + '<div class="tower-shimmer" style="background:linear-gradient(180deg,transparent,' + h.glow + '40,transparent);"></div>'
          + '</div>'
          // Base
          + '<div class="tower-base" style="background:linear-gradient(90deg,transparent,' + h.color + '50,transparent);"></div>'
          // Crest
          + '<img src="/assets/images/houses/' + h.img + '" class="tower-crest" onerror="this.style.display=\'none\'">'
          // Rank
          + '<div class="tower-rank" style="color:' + rc + ';">#' + (i + 1) + '</div>'
          // Name
          + '<div class="tower-name" style="color:' + (isYou ? h.glow : '#999') + ';">' + h.name + '</div>'
          // Points
          + '<div class="tower-pts" style="color:' + (isYou ? h.glow : '#777') + ';">' + (s.total_points || 0) + '</div>'
          + '</div>';
      });

      // Fill empty houses (no points yet)
      var shown = {};
      sorted.forEach(function(s) { shown[s.school_id] = true; });
      var rank = sorted.length;
      for (var id = 1; id <= 9; id++) {
        if (!shown[id]) {
          var h = HOUSES[id];
          var isYou = id === mySchoolId;
          rank++;
          html += '<div class="tower-col' + (isYou ? ' tower-col--you' : '') + '">'
            + '<div class="tower-orb" style="background:' + h.glow + '60;box-shadow:0 0 4px ' + h.glow + '40;"></div>'
            + '<div class="tower-body" style="height:20px;background:' + h.color + '40;border:1px solid ' + h.color + '30;opacity:0.4;"></div>'
            + '<div class="tower-base" style="background:linear-gradient(90deg,transparent,' + h.color + '30,transparent);"></div>'
            + '<img src="/assets/images/houses/' + h.img + '" class="tower-crest" style="opacity:0.4;" onerror="this.style.display=\'none\'">'
            + '<div class="tower-rank" style="color:#444;">-</div>'
            + '<div class="tower-name" style="color:#555;">' + h.name + '</div>'
            + '<div class="tower-pts" style="color:#444;">0</div>'
            + '</div>';
        }
      }

      row.innerHTML = html;
      document.getElementById('towersWrap').style.display = 'block';

      // Your house badge
      if (mySchoolId) {
        var myHouse = HOUSES[mySchoolId];
        var badge = document.getElementById('towersYouBadge');
        badge.innerHTML = '<div class="towers-you-dot" style="background:' + myHouse.color + ';box-shadow:0 0 6px ' + myHouse.glow + ';"></div>'
          + '<span class="towers-you-text" style="color:' + myHouse.glow + ';">YOUR HOUSE: ' + myHouse.name.toUpperCase() + '</span>';
        badge.style.display = 'flex';
      }
    }

    function getZoneActivity(zoneId) { return actionsToday[zoneId] ? actionsToday[zoneId].length : 0; }

    function getTopHouse(zoneId) {
      var inf = influence[zoneId];
      if (!inf) return null;
      var topId = null; var topPct = 0;
      Object.keys(inf).forEach(function(sid) { if (inf[sid] > topPct) { topPct = inf[sid]; topId = parseInt(sid); } });
      return topId ? { id: topId, pct: topPct } : null;
    }

    function renderInfluenceBar(zoneId) {
      var inf = influence[zoneId];
      if (!inf || Object.keys(inf).length === 0) {
        return '<div class="influence-bar"><div style="width:100%;background:rgba(255,255,255,0.04);"></div></div>';
      }
      var segments = ''; var labels = ''; var entries = [];
      Object.keys(inf).forEach(function(sid) { entries.push({ id: parseInt(sid), pct: inf[sid] }); });
      entries.sort(function(a, b) { return b.pct - a.pct; });
      entries.forEach(function(e) {
        var h = HOUSES[e.id] || { color: '#888', img: '' };
        segments += '<div class="influence-segment" style="width:' + e.pct + '%;background:' + h.color + ';"></div>';
      });
      entries.slice(0, 3).forEach(function(e) {
        var h = HOUSES[e.id] || { name: '?', img: '' };
        labels += '<div class="influence-label">' + hImg(h.img, 10) + ' ' + e.pct + '%</div>';
      });
      return '<div class="influence-bar">' + segments + '</div><div class="influence-labels">' + labels + '</div>';
    }

    function sortZones(type) {
      currentSort = type;
      var btns = document.querySelectorAll('.sort-btn');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
      event.target.classList.add('active');
      renderZoneGrid();
    }

    function getSortedZones() {
      var sorted = zones.slice();
      if (currentSort === 'activity') {
        sorted.sort(function(a, b) {
          var diff = getZoneActivity(b.id) - getZoneActivity(a.id);
          if (diff !== 0) return diff;
          if (b.is_current_objective) return 1;
          if (a.is_current_objective) return -1;
          return 0;
        });
      } else if (currentSort === 'objective') {
        sorted.sort(function(a, b) {
          if (a.is_current_objective && !b.is_current_objective) return -1;
          if (!a.is_current_objective && b.is_current_objective) return 1;
          return 0;
        });
      } else if (currentSort === 'bonus') {
        sorted.sort(function(a, b) {
          var aB = a.bonus_effect ? 1 : 0; var bB = b.bonus_effect ? 1 : 0;
          if (bB !== aB) return bB - aB;
          return getZoneActivity(b.id) - getZoneActivity(a.id);
        });
      } else if (currentSort === 'controlled') {
        sorted.sort(function(a, b) {
          var aC = a.controlling_school_id ? 1 : 0;
          var bC = b.controlling_school_id ? 1 : 0;
          if (bC !== aC) return bC - aC;
          return getZoneActivity(b.id) - getZoneActivity(a.id);
        });
      } else if (currentSort === 'alpha') {
        sorted.sort(function(a, b) { return a.name.localeCompare(b.name); });
      }
      return sorted;
    }

    function renderZoneGrid() {
      var sorted = getSortedZones();
      var grid = document.getElementById('zoneGrid');
      var html = '';
      sorted.forEach(function(z) {
        var isObjective = z.is_current_objective;
        var isBonus = z.bonus_effect && z.bonus_effect.includes('+50%');
        var activity = getZoneActivity(z.id);
        var topHouse = getTopHouse(z.id);
        var acted = playerActedZones[z.id];

        var cardClass = 'zone-card fade-up';
        if (isObjective) cardClass += ' zone-card--objective';
        else if (isBonus) cardClass += ' zone-card--bonus';

        var zoneImg = (z.image_url ? (z.image_url.startsWith('/') ? z.image_url : '/assets/images/zones/' + z.image_url) : '') || ZONE_IMAGES[z.id] || '';

        var badges = '';
        if (isObjective) badges += '<span class="zone-badge zone-badge--objective">OBJECTIVE</span>';
        if (isBonus) badges += '<span class="zone-badge zone-badge--bonus">BONUS +50%</span>';
        if (z.controlling_school_id && HOUSES[z.controlling_school_id]) {
          var ctrl = HOUSES[z.controlling_school_id];
          badges += '<span class="zone-badge zone-badge--controlled">' + hImg(ctrl.img, 12) + '<span style="font-size:7px;color:' + ctrl.color + ';">' + ctrl.name.toUpperCase() + '</span></span>';
        }
        if (topHouse && topHouse.pct >= 40 && (!z.controlling_school_id || topHouse.id !== z.controlling_school_id)) {
          var th = HOUSES[topHouse.id] || { img: '' };
          badges += '<span class="zone-badge zone-badge--contesting">' + hImg(th.img, 10) + ' CONTESTING</span>';
        }

        var btnsHTML = '';
        if (!player) {
          btnsHTML = '<a href="/register.html" class="zone-action-btn zone-action-btn--attack" style="text-decoration:none;font-size:8px;">JOIN TO PLAY</a>';
        } else if (acted) {
          btnsHTML = '<span class="zone-action-btn zone-action-btn--done">ACTED</span>';
        } else if (player.mana < 1) {
          btnsHTML = '<span class="zone-action-btn zone-action-btn--done">NO MANA</span>';
        } else {
          btnsHTML = '<button class="zone-action-btn zone-action-btn--attack" onclick="event.stopPropagation();doAction(' + z.id + ',\'attack\')">ATTACK</button>'
            + '<button class="zone-action-btn zone-action-btn--defend" onclick="event.stopPropagation();doAction(' + z.id + ',\'defend\')">DEFEND</button>';
        }

        var activityDotClass = activity > 0 ? 'zone-card__activity-dot' : 'zone-card__activity-dot zone-card__activity-dot--idle';

        if (zoneImg) {
          html += '<div class="' + cardClass + '" onclick="openZoneModal(' + z.id + ')">'
            + '<div class="zone-card__image" style="background-image:url(\'' + zoneImg + '\');">'
            + '<div class="zone-card__image-badges">' + badges + '</div>'
            + '<div class="zone-card__image-overlay">'
            + '<div class="zone-card__name">' + z.name + '</div>'
            + '<div class="zone-card__desc">' + z.description + '</div>'
            + '</div></div>'
            + '<div class="zone-card__body">'
            + '<div class="zone-card__influence">' + renderInfluenceBar(z.id) + '</div>'
            + '<div class="zone-card__footer">'
            + '<span class="zone-card__activity"><span class="' + activityDotClass + '"></span>' + activity + ' action' + (activity !== 1 ? 's' : '') + ' today</span>'
            + '<div class="zone-card__actions">' + btnsHTML + '</div></div></div></div>';
        } else {
          html += '<div class="' + cardClass + '" onclick="openZoneModal(' + z.id + ')">'
            + '<div class="zone-card__no-image">'
            + '<div class="zone-card__name">' + z.name + '</div>'
            + '<div class="zone-card__desc">' + z.description + '</div>'
            + '</div>'
            + '<div class="zone-card__body">'
            + (badges ? '<div class="zone-card__badges" style="margin-bottom:8px;">' + badges + '</div>' : '')
            + '<div class="zone-card__influence">' + renderInfluenceBar(z.id) + '</div>'
            + '<div class="zone-card__footer">'
            + '<span class="zone-card__activity"><span class="' + activityDotClass + '"></span>' + activity + ' action' + (activity !== 1 ? 's' : '') + ' today</span>'
            + '<div class="zone-card__actions">' + btnsHTML + '</div></div></div></div>';
        }
      });
      grid.innerHTML = html;
      var controlledCount = zones.filter(function(z) { return z.controlling_school_id; }).length;
      document.getElementById('zoneCount').textContent = sorted.length + ' zones' + (controlledCount > 0 ? ' · ' + controlledCount + ' controlled' : '');
    }

    async function doAction(zoneId, actionType) {
      if (!player || player.mana < 1) return;
      if (playerActedZones[zoneId]) return;
      try {
        var res = await fetch('/api/territory/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ player_id: player.id, zone_id: zoneId, action_type: actionType })
        });
        var data = await res.json();
        if (res.ok && data.success) {
          player.mana = data.mana_remaining;
          playerActedZones[zoneId] = true;
          var pts = data.points_earned;
          var msg = (actionType === 'attack' ? 'Attack' : 'Defend') + ' +' + pts + ' pts';
          if (data.multiplier > 1) msg += ' (x' + data.multiplier + ' bonus)';
          showToast(msg, 'success');
          if (!influence[zoneId]) influence[zoneId] = {};
          if (!influence[zoneId][player.school_id]) influence[zoneId][player.school_id] = 0;
          influence[zoneId][player.school_id] += (actionType === 'attack' ? 20 : 10);
          var total = 0;
          Object.values(influence[zoneId]).forEach(function(v) { total += v; });
          Object.keys(influence[zoneId]).forEach(function(sid) {
            influence[zoneId][sid] = Math.round((influence[zoneId][sid] / total) * 100);
          });
          if (!actionsToday[zoneId]) actionsToday[zoneId] = [];
          actionsToday[zoneId].unshift({
            player: { id: player.id, twitter_handle: player.twitter_handle, profile_image: player.profile_image, school_id: player.school_id },
            action_type: actionType, created_at: new Date().toISOString()
          });
          renderPlayerBar();
          renderZoneGrid();
        } else { showToast(data.error || 'Action failed', 'error'); }
      } catch (e) { console.error(e); showToast('Connection error', 'error'); }
    }

    function openZoneModal(zoneId) {
      var zone = zones.find(function(z) { return z.id === zoneId; });
      if (!zone) return;
      var zoneImg = (zone.image_url ? (zone.image_url.startsWith('/') ? zone.image_url : '/assets/images/zones/' + zone.image_url) : '') || ZONE_IMAGES[zone.id] || '';
      var modalHeader = document.querySelector('.zone-modal__header');
      if (zoneImg) {
        modalHeader.style.backgroundImage = 'linear-gradient(180deg, rgba(10,8,18,0.2) 0%, rgba(10,8,18,0.8) 60%, var(--bg-card) 100%), url(' + zoneImg + ')';
        modalHeader.style.backgroundSize = 'cover, cover';
        modalHeader.style.backgroundPosition = 'center, center';
        modalHeader.style.paddingTop = '50px';
      } else {
        modalHeader.style.backgroundImage = '';
        modalHeader.style.paddingTop = '20px';
      }
      document.getElementById('modalTitle').textContent = zone.name;
      document.getElementById('modalDesc').textContent = zone.description + (zone.bonus_effect ? ' — ' + zone.bonus_effect : '');
      var body = '';

      // Controller banner
      if (zone.controlling_school_id && HOUSES[zone.controlling_school_id]) {
        var ctrl = HOUSES[zone.controlling_school_id];
        body += '<div class="modal-controller" style="background:' + ctrl.color + '12;border:1px solid ' + ctrl.color + '30;">'
          + hImg(ctrl.img, 22)
          + '<div><div class="modal-controller__label">CONTROLLED BY</div>'
          + '<div class="modal-controller__name" style="color:' + ctrl.color + ';">' + ctrl.name + '</div></div></div>';
      }

      // Today's influence
      body += '<div class="zone-modal__influence"><div class="zone-modal__influence-title">TODAY\'S INFLUENCE</div>';
      var inf = influence[zoneId];
      if (inf && Object.keys(inf).length > 0) {
        var entries = [];
        Object.keys(inf).forEach(function(sid) { entries.push({ id: parseInt(sid), pct: inf[sid] }); });
        entries.sort(function(a, b) { return b.pct - a.pct; });
        entries.forEach(function(e) {
          var h = HOUSES[e.id] || { name: '?', color: '#888', img: '' };
          body += '<div class="modal-influence-row">' + hImg(h.img, 18)
            + '<span class="modal-influence-name">' + h.name + '</span>'
            + '<div class="modal-influence-bar"><div class="modal-influence-fill" style="width:' + e.pct + '%;background:' + h.color + ';"></div></div>'
            + '<span class="modal-influence-pct">' + e.pct + '%</span></div>';
        });
      } else { body += '<div class="modal-empty">No activity yet — be the first!</div>'; }
      body += '</div>';

      var actions = actionsToday[zoneId] || [];
      body += '<div class="zone-modal__actions-title">TODAY\'S ACTIONS (' + actions.length + ')</div>';
      if (actions.length > 0) {
        actions.forEach(function(a) {
          var p = a.player || {};
          var h = HOUSES[p.school_id] || { img: '' };
          var typeClass = a.action_type === 'attack' ? 'modal-action-type--attack' : 'modal-action-type--defend';
          var typeLabel = a.action_type === 'attack' ? 'ATTACK' : 'DEFEND';
          body += '<div class="modal-action-row">'
            + (p.profile_image ? '<img src="' + p.profile_image + '" class="modal-action-avatar">' : '<div class="modal-action-avatar" style="background:var(--bg-inset);display:flex;align-items:center;justify-content:center;">' + hImg(h.img, 16) + '</div>')
            + '<div class="modal-action-info"><div class="modal-action-name">@' + (p.twitter_handle || 'unknown') + '</div>'
            + '<span class="modal-action-type ' + typeClass + '">' + typeLabel + '</span></div>'
            + '<span class="modal-action-time">' + timeAgo(a.created_at) + '</span></div>';
        });
      } else { body += '<div class="modal-empty">No actions yet today</div>'; }
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('zoneModalOverlay').classList.add('active');
    }

    function closeModal() { document.getElementById('zoneModalOverlay').classList.remove('active'); }
    document.getElementById('zoneModalOverlay').addEventListener('click', function(e) { if (e.target.id === 'zoneModalOverlay') closeModal(); });

    async function loadWorld() {
      try {
        var playerId = getPlayerId();
        var fetches = [
          fetch('/api/zones').then(function(r) { return r.json(); }),
          fetch('/api/territory/actions/today').then(function(r) { return r.json(); }),
          fetch('/api/territory/influence').then(function(r) { return r.json(); }),
          fetch('/api/leaderboards/schools').then(function(r) { return r.json(); })
        ];
        if (playerId) {
          fetches.push(fetch('/api/players/' + playerId).then(function(r) { return r.json(); }));
        }
        var results = await Promise.all(fetches);
        zones = results[0] || [];
        actionsToday = results[1] || {};
        influence = results[2] || {};
        var schoolData = results[3] || [];
        player = results[4] || null;
        if (player) {
          Object.keys(actionsToday).forEach(function(zoneId) {
            actionsToday[zoneId].forEach(function(a) {
              var p = a.player || {};
              if (p.id === player.id) playerActedZones[zoneId] = true;
            });
          });
          renderPlayerBar();
        }
        renderTowers(schoolData);
        var loader = document.getElementById('loadingState');
        if (loader) loader.style.display = 'none';
        renderZoneGrid();
      } catch (e) {
        console.error('World load error:', e);
        var loader = document.getElementById('loadingState');
        if (loader) loader.style.display = 'none';
        document.getElementById('zoneGrid').innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-faint);font-style:italic;">Error loading world data</div>';
      }
    }

    loadWorld();
  
      // Cast spell on zone from card
      function castSpellOnZone(zoneName, spell) {
        var pid = localStorage.getItem('player_id');
        if (!pid) { alert('Log in first!'); return; }
        if (confirm('Cast ' + spell + ' on ' + zoneName + '?')) {
          fetch('/api/territory/cast', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ player_id: pid, zone_name: zoneName, spell: spell })
          }).then(function(r) { return r.json(); }).then(function(d) {
            alert(d.message || 'Spell cast!');
          }).catch(function() { alert('Cast failed - try on Twitter!'); });
        }
      }
    </script>
