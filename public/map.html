<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>World | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    html{overflow-x:hidden}body{margin:0;padding:0;width:100%;min-width:0;overflow-x:hidden}
    .main-container{overflow-x:hidden}
    .towers-row{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .player-header{overflow:hidden}
    .sort-bar{overflow-x:auto}
    .main-container{max-width:800px!important;margin:0 auto!important;padding-left:16px!important;padding-right:16px!important;width:100%!important;box-sizing:border-box!important}
    /* === HERO === */
    .world-hero{text-align:center;padding:14px 0 6px}
    .world-hero__title{font-family:var(--font-title);font-weight:700;font-size:24px;color:var(--gold);letter-spacing:3px}
    .world-hero__sub{font-family:var(--font-body);font-size:15px;font-style:italic;color:var(--text-muted);margin-top:4px}

    /* === PLAYER HEADER === */
    .player-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px}
    .player-header__left{display:flex;align-items:center;gap:12px}
    .player-header__avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
    .player-header__name{font-family:var(--font-data);font-size:10px;color:var(--text-body);letter-spacing:0.5px}
    .player-header__house{font-family:var(--font-title);font-size:13px;font-weight:600;letter-spacing:1px}
    .player-header__tag{font-family:var(--font-data);font-size:8px;padding:3px 10px;border-radius:10px;letter-spacing:0.5px;background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
    .player-header__mana{display:flex;align-items:center;gap:6px}
    .player-header__mana-label{font-family:var(--font-data);font-size:7px;color:var(--text-muted);letter-spacing:1px}

    /* === CRYSTAL TOWERS === */
    .towers-wrap{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.05);border-radius:14px;padding:12px 4px 8px;position:relative;overflow:hidden}
    .towers-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 90%,rgba(212,166,75,0.06) 0%,transparent 65%);pointer-events:none}
    .towers-label{font-family:var(--font-data);font-size:7px;color:var(--text-faint);letter-spacing:2px;text-align:center;margin-bottom:4px}
    .towers-row{display:flex;align-items:flex-end;justify-content:center;gap:4px;height:240px;padding:0 2px;position:relative;z-index:1}
    .tower-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;max-width:52px;min-width:28px}
    .tower-orb{width:10px;height:10px;border-radius:50%;margin-bottom:-5px;z-index:2;position:relative;animation:towerOrbPulse 3s ease-in-out infinite}
    .tower-col--you .tower-orb{width:12px;height:12px;animation:towerOrbPulse 2s ease-in-out infinite}
    @keyframes towerOrbPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.3)}}
    .tower-body{width:20px;border-radius:3px 3px 2px 2px;position:relative;overflow:hidden;transition:height 1.2s cubic-bezier(0.22,1,0.36,1)}
    .tower-col--you .tower-body{width:26px}
    .tower-shimmer{position:absolute;top:0;left:35%;width:2px;height:100%;animation:towerShimmer 2.5s ease-in-out infinite}
    @keyframes towerShimmer{0%,100%{opacity:0.2}50%{opacity:0.7}}
    .tower-base{width:28px;height:3px;border-radius:50%}
    .tower-col--you .tower-base{width:34px}
    .tower-crest{width:22px;height:22px;object-fit:contain;filter:drop-shadow(0 0 3px rgba(0,0,0,0.5))}
    .tower-col--you .tower-crest{width:26px;height:26px}
    .tower-rank{font-family:var(--font-data);font-size:7px;letter-spacing:0.5px}
    .tower-name{font-family:var(--font-title);font-size:7px;color:#999;text-align:center;line-height:1;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tower-col--you .tower-name{font-weight:700}
    .tower-pts{font-family:var(--font-data);font-size:7px;color:#777}
    .tower-col--you .tower-pts{font-weight:700}
    .towers-ground{height:1px;margin:0 16px;background:linear-gradient(90deg,transparent,rgba(212,166,75,0.2),transparent)}
    .towers-you-badge{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:8px;padding:5px 12px;background:rgba(255,200,0,0.04);border:1px solid rgba(255,200,0,0.12);border-radius:6px;width:fit-content;margin-left:auto;margin-right:auto}
    .towers-you-dot{width:6px;height:6px;border-radius:50%;animation:towerOrbPulse 2s ease-in-out infinite}
    .towers-you-text{font-family:var(--font-data);font-size:7px;letter-spacing:1px}

    /* === COMMUNITY CLASH === */
    .clash-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;padding:14px;position:relative;overflow:hidden}
    .clash-label{font-family:var(--font-data);font-size:7px;color:var(--text-faint);letter-spacing:2px;text-align:center;margin-bottom:10px}
    .clash-vs{display:flex;align-items:center;justify-content:center;gap:12px}
    .clash-side{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
    .clash-icon{width:40px;height:40px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:var(--font-data);font-size:9px}
    .clash-tag{font-family:var(--font-data);font-size:9px;letter-spacing:0.5px}
    .clash-pts{font-family:var(--font-data);font-size:12px;font-weight:700}
    .clash-divider{font-family:var(--font-title);font-size:18px;color:var(--text-faint);font-weight:700}
    .clash-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-top:10px}
    .clash-bar__seg{height:100%;transition:width 0.6s}
    .clash-empty{font-family:var(--font-body);font-size:12px;color:var(--text-faint);text-align:center;font-style:italic;padding:6px 0}

    /* === SORT BAR === */
    .sort-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .sort-btn{padding:7px 14px;border:1px solid var(--border-subtle);border-radius:6px;background:var(--bg-card);color:var(--text-muted);font-family:var(--font-title);font-size:10px;font-weight:600;letter-spacing:0.5px;cursor:pointer;transition:all 0.2s}
    .sort-btn.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border)}
    .zone-count{font-family:var(--font-data);font-size:8px;color:var(--text-faint);margin-left:auto}

    /* === ZONE CARDS === */
    .zone-grid{display:flex;flex-direction:column;gap:12px}
    .zone-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;cursor:pointer;transition:all 0.25s ease;overflow:hidden;position:relative}
    .zone-card:hover{border-color:var(--border-medium);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
    .zone-card--objective{border-color:var(--gold-border);box-shadow:0 0 20px var(--gold-glow),inset 0 0 30px rgba(212,166,75,0.03)}
    .zone-card--bonus{border-color:rgba(0,255,136,0.2);box-shadow:0 0 12px rgba(0,255,136,0.06)}
    .zone-card__image{position:relative;height:120px;overflow:hidden;background-color:var(--bg-inset);background-size:cover;background-position:center}
    .zone-card__image::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,8,18,0.1) 0%,rgba(10,8,18,0.65) 60%,rgba(10,8,18,0.95) 100%)}
    .zone-card__image-badges{position:absolute;top:8px;right:8px;z-index:2;display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
    .zone-card__image-overlay{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:10px 14px 12px}
    .zone-card__name{font-family:var(--font-title);font-size:16px;font-weight:700;color:#fff;letter-spacing:0.5px;text-shadow:0 2px 8px rgba(0,0,0,0.7)}
    .zone-card__desc{font-family:var(--font-body);font-size:12px;color:rgba(255,255,255,0.65);margin-top:2px;text-shadow:0 1px 4px rgba(0,0,0,0.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
    .zone-card__no-image{height:0;padding:14px 14px 0}
    .zone-card__no-image .zone-card__name{color:var(--text-bright);text-shadow:none}
    .zone-card__no-image .zone-card__desc{color:var(--text-faint);text-shadow:none}
    .zone-card__body{padding:12px 14px 14px}
    .zone-pills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
    .zone-pill{font-family:var(--font-data);font-size:6px;padding:3px 8px;border-radius:4px;letter-spacing:0.5px;cursor:help;position:relative;transition:all 0.15s}
    .zone-pill:hover{transform:translateY(-1px)}
    .zone-pill--objective{background:rgba(212,166,75,0.2);color:var(--gold);border:1px solid var(--gold-border)}
    .zone-pill--bonus{background:rgba(0,255,136,0.1);color:#00ff88;border:1px solid rgba(0,255,136,0.2)}
    .zone-pill--controlled{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:4px}
    .zone-pill--controlled img{width:12px;height:12px;object-fit:contain}
    .zone-pill--contesting{background:rgba(255,85,85,0.1);color:#ff7777;border:1px solid rgba(255,85,85,0.2);display:flex;align-items:center;gap:3px}
    .zone-pill--contesting img{width:10px;height:10px}
    .zone-pill--effect{border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text-muted)}
    .zone-pill__tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--gold-border);border-radius:6px;padding:6px 10px;font-family:var(--font-body);font-size:11px;color:var(--text-body);white-space:nowrap;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
    .zone-pill:hover .zone-pill__tip{display:block}
    .zone-pill__tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#1a1a2e}
    .zone-card__influence{margin-bottom:8px}
    .influence-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.04);overflow:hidden;display:flex}
    .influence-segment{height:100%;transition:width 0.6s ease}
    .influence-labels{display:flex;justify-content:space-between;margin-top:4px}
    .influence-label{display:flex;align-items:center;gap:3px;font-family:var(--font-data);font-size:7px;color:var(--text-faint)}
    .influence-label img{width:10px;height:10px;object-fit:contain}
    .timeline{display:flex;align-items:center;gap:0;margin:8px 0;overflow-x:auto;padding:4px 0}
    .timeline::-webkit-scrollbar{height:0}
    .tl-node{display:flex;flex-direction:column;align-items:center;flex-shrink:0;position:relative;cursor:pointer}
    .tl-node__dot{width:24px;height:24px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg-inset);transition:transform 0.15s}
    .tl-node:hover .tl-node__dot{transform:scale(1.15)}
    .tl-node__avatar{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .tl-node__score{font-family:var(--font-data);font-size:5px;color:var(--text-faint);letter-spacing:0.5px;background:var(--bg-inset);padding:1px 4px;border-radius:3px}
    .tl-node__label{font-family:var(--font-data);font-size:5px;letter-spacing:0.5px;margin-top:2px}
    .tl-node__handle{font-family:var(--font-data);font-size:4px;color:var(--text-faint);margin-top:1px;max-width:44px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tl-line{width:12px;height:2px;flex-shrink:0;margin:0 -1px;margin-top:-10px}
    .tl-empty{font-family:var(--font-body);font-size:11px;color:var(--text-faint);font-style:italic;padding:4px 0}
    .tl-tip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:rgba(16,12,28,0.97);border:1px solid var(--gold-border);border-radius:8px;padding:8px 10px;min-width:140px;z-index:60;box-shadow:0 4px 16px rgba(0,0,0,0.6)}
    .tl-node:hover .tl-tip{display:block}
    .tl-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:rgba(16,12,28,0.97)}
    .tl-tip__header{font-family:var(--font-data);font-size:6px;color:var(--text-muted);letter-spacing:1px;margin-bottom:4px}
    .tl-tip__row{display:flex;align-items:center;gap:4px;padding:2px 0}
    .tl-tip__row img{width:10px;height:10px;object-fit:contain}
    .tl-tip__name{font-family:var(--font-data);font-size:5px;flex:1}
    .tl-tip__bar{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden}
    .tl-tip__fill{height:100%;border-radius:2px}
    .tl-tip__pct{font-family:var(--font-data);font-size:6px;min-width:22px;text-align:right}
    .zone-card__footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .zone-card__activity{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);display:flex;align-items:center;gap:4px}
    .zone-card__activity-dot{width:5px;height:5px;border-radius:50%;background:#44cc44;animation:activityPulse 2s ease-in-out infinite}
    .zone-card__activity-dot--idle{background:#555;animation:none}
    @keyframes activityPulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .zone-card__actions{display:flex;gap:6px}
    .zone-action-btn{padding:7px 14px;border-radius:6px;border:none;font-family:var(--font-data);font-size:8px;letter-spacing:1px;cursor:pointer;transition:all 0.15s;color:#fff}
    .zone-action-btn:hover{transform:translateY(-1px)}
    .zone-action-btn--attack{background:linear-gradient(135deg,#cc3333,#aa2222);box-shadow:0 2px 8px rgba(204,51,51,0.25)}
    .zone-action-btn--cast{background:linear-gradient(135deg,#D4A64B,#b8860b);box-shadow:0 2px 8px rgba(212,166,75,0.25);color:#0a0810;font-weight:700}
    .zone-action-btn--defend{background:linear-gradient(135deg,#3366cc,#2244aa);box-shadow:0 2px 8px rgba(51,102,204,0.25)}
    .zone-action-btn--done{background:var(--bg-inset);color:var(--text-faint);border:1px solid var(--border-subtle);box-shadow:none}

    /* === PLAYER POPUP (zone card timeline) === */
    .player-popup{position:fixed;z-index:9999;background:rgba(16,12,28,0.97);border:1px solid rgba(212,166,75,0.3);border-radius:10px;padding:14px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,0.6);display:none;cursor:pointer;transition:opacity 0.15s}
    .player-popup.visible{display:block}
    .player-popup__row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .player-popup__avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
    .player-popup__name{font-family:var(--font-data);font-size:9px;color:var(--text-bright);letter-spacing:0.5px}
    .player-popup__house{font-family:var(--font-title);font-size:11px;display:flex;align-items:center;gap:4px;margin-top:2px}
    .player-popup__house img{width:14px;height:14px}
    .player-popup__stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding-top:8px;border-top:1px solid var(--border-subtle)}
    .player-popup__stat{text-align:center}
    .player-popup__stat-val{font-family:var(--font-data);font-size:8px;color:var(--text-bright)}
    .player-popup__stat-label{font-family:var(--font-data);font-size:5px;color:var(--text-faint);letter-spacing:0.5px;margin-top:2px}

    /* ================================================================
       ZONE MODAL V3
       ================================================================ */
    .zm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;
      align-items:center;justify-content:center;padding:12px 8px;backdrop-filter:blur(4px)}
    .zm-overlay.active{display:flex}
    .zm{width:100%;max-width:520px;border-radius:16px;overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:zmIn 0.3s ease-out;
      display:flex;flex-direction:column;max-height:92vh;position:relative}
    @keyframes zmIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .zm-header{position:relative;height:200px;overflow:hidden;flex-shrink:0;
      background:linear-gradient(135deg,#1a2a3a 0%,#0a1520 40%,var(--bg-mid,#0d0a14) 100%)}
    .zm-header__media{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.4}
    .zm-header__gradient{position:absolute;inset:0;
      background:linear-gradient(180deg,rgba(10,8,18,0) 30%,rgba(10,8,18,0.7) 65%,#0d0a14 100%)}
    .zm-header__particles{position:absolute;inset:0;overflow:hidden}
    .zm-header__dot{position:absolute;width:2px;height:2px;border-radius:50%;animation:dotPulse 3s ease-in-out infinite}
    @keyframes dotPulse{0%,100%{opacity:0.6}50%{opacity:0.15}}
    .zm-header__info{position:absolute;bottom:0;left:0;right:0;padding:0 20px 16px;z-index:2}
    .zm-header__name{font-family:var(--font-title);font-size:22px;font-weight:700;color:#fff;letter-spacing:1.5px;text-shadow:0 2px 12px rgba(0,0,0,0.8)}
    .zm-header__desc{font-family:var(--font-body);font-size:14px;color:rgba(255,255,255,0.55);margin-top:4px;text-shadow:0 1px 6px rgba(0,0,0,0.6)}
    .zm-close{position:absolute;top:12px;left:14px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);font-size:14px;z-index:3;transition:background 0.2s}
    .zm-close:hover{background:rgba(0,0,0,0.8)}
    .zm-body{background:#0d0a14;border-left:1px solid var(--border-subtle);border-right:1px solid var(--border-subtle);overflow-y:auto;flex:1;position:relative;padding-bottom:80px}
    .zm-ticker{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border-subtle)}
    .zm-ticker__left{display:flex;align-items:center;gap:10px}
    .zm-ticker__icon{width:36px;height:36px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:var(--font-data);font-size:8px;font-weight:700;flex-shrink:0}
    .zm-ticker__label{font-family:var(--font-data);font-size:7px;color:var(--text-faint);letter-spacing:1px}
    .zm-ticker__name{font-family:var(--font-title);font-size:16px;font-weight:700;margin-top:1px}
    .zm-ticker__right{text-align:right}
    .zm-ticker__val{font-family:var(--font-mono);font-size:22px;font-weight:700;line-height:1}
    .zm-ticker__delta{font-family:var(--font-data);font-size:7px;margin-top:3px}
    .zm-ticker__delta span{color:var(--text-faint);margin-left:4px}
    .zm-section{padding:14px 16px}
    .zm-section--compact{padding:10px 16px}
    .zm-section-title{font-family:var(--font-data);font-size:8px;color:var(--text-muted);letter-spacing:1.5px}
    .zm-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .zm-live-dot{width:6px;height:6px;border-radius:50%;background:#44cc88;animation:livePulse 2s ease infinite;margin-right:6px}
    @keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .zm-range{display:flex;gap:3px}
    .zm-range-btn{font-family:var(--font-data);font-size:7px;padding:4px 8px;border-radius:4px;border:none;cursor:pointer;background:rgba(255,255,255,0.03);color:var(--text-faint);outline:1px solid var(--border-subtle);transition:all 0.2s}
    .zm-range-btn.active{background:var(--gold-dim);color:var(--gold);outline-color:var(--gold-border)}
    .zm-divider{height:1px;background:var(--border-subtle);margin:0 16px}
    .zm-chart-wrap{height:155px;position:relative}
    .zm-chart-date{position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);font-family:var(--font-data);font-size:7px;color:var(--gold);background:rgba(10,8,18,0.9);padding:2px 8px;border-radius:3px;border:1px solid var(--gold-border);opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:5}
    .zm-chart-date.visible{opacity:1}
    /* Race bars */
    .zm-race{margin-top:10px}
    .race-row{display:flex;align-items:center;gap:6px;padding:5px 0;transition:all 0.4s ease}
    .race-row+.race-row{border-top:1px solid rgba(255,255,255,0.03)}
    .race-row--highlight{background:rgba(255,255,255,0.02);border-radius:6px;margin:0 -4px;padding:5px 4px}
    .race-rank{font-family:var(--font-data);font-size:8px;width:18px;flex-shrink:0;text-align:center}
    .race-icon{width:24px;height:24px;border-radius:50%;border:2px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-data);font-size:5px}
    .race-info{flex:1;min-width:0}
    .race-tag{font-family:var(--font-data);font-size:7px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:6px}
    .race-members{font-size:5px;color:var(--text-faint);font-weight:400}
    .race-track{height:16px;border-radius:3px;background:rgba(255,255,255,0.025);overflow:hidden;position:relative}
    .race-fill{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;position:relative;transition:width 0.6s cubic-bezier(0.22,1,0.36,1)}
    .race-fill__val{font-family:var(--font-data);font-size:6px;color:#0a0812;font-weight:700}
    .race-fill__glow{position:absolute;right:0;top:0;bottom:0;width:16px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25));border-radius:0 3px 3px 0}
    .race-delta{font-family:var(--font-data);font-size:6px;width:44px;flex-shrink:0;text-align:right}
    /* House bar */
    .zm-house-bar{height:8px;border-radius:4px;overflow:hidden;display:flex;background:rgba(255,255,255,0.03)}
    .zm-house-seg{height:100%;transition:width 0.6s ease}
    .zm-house-labels{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;justify-content:center}
    .zm-house-label{display:flex;align-items:center;gap:3px;font-family:var(--font-data);font-size:5px;color:var(--text-faint)}
    .zm-house-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .zm-house-adv{display:flex;align-items:center;gap:6px;margin-top:8px;padding:6px 10px;border-radius:6px;font-family:var(--font-data);font-size:7px;letter-spacing:0.5px}
    /* Effects */
    .zm-effects-scroll{display:flex;gap:6px;overflow-x:auto;padding:2px 0 6px}
    .zm-effect{flex-shrink:0;min-width:140px;max-width:170px;border-radius:8px;padding:8px 10px;position:relative;overflow:hidden;animation:slideIn 0.3s ease-out both}
    @keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
    .zm-effect__bar{position:absolute;top:0;left:0;right:0;height:2px}
    .zm-effect__head{display:flex;align-items:center;gap:5px;margin-bottom:4px}
    .zm-effect__icon{font-size:13px}
    .zm-effect__name{font-family:var(--font-data);font-size:7px;font-weight:700}
    .zm-effect__cycles{font-family:var(--font-data);font-size:6px;color:var(--text-faint);margin-left:auto;background:rgba(0,0,0,0.25);padding:2px 5px;border-radius:3px}
    .zm-effect__desc{font-family:var(--font-body);font-size:11px;color:var(--text-muted);line-height:1.3}
    .zm-effect__source{font-family:var(--font-data);font-size:5px;margin-top:4px;opacity:0.6}
    /* Battle timeline */
    .zm-timeline{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:4px 0 8px}
    .zm-timeline::-webkit-scrollbar{height:0}
    .zm-tl-event{display:flex;align-items:flex-start;gap:0}
    .zm-tl-profile{display:flex;flex-direction:column;align-items:center;flex-shrink:0;gap:2px;cursor:pointer;position:relative}
    .zm-tl-profile:hover .zm-tl-avatar{transform:scale(1.12);box-shadow:0 0 12px var(--gold-glow)}
    .zm-tl-avatar{width:34px;height:34px;border-radius:50%;border:2px solid;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px;transition:transform 0.2s,box-shadow 0.2s}
    .zm-tl-avatar img{width:100%;height:100%;object-fit:cover}
    .zm-tl-handle{font-family:var(--font-data);font-size:5px;max-width:46px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
    .zm-tl-comm{font-family:var(--font-data);font-size:5px;opacity:0.7}
    .zm-tl-pts{font-family:var(--font-data);font-size:6px;color:var(--text-bright);padding:1px 5px;border-radius:3px}
    .zm-tl-time{font-family:var(--font-data);font-size:5px;color:var(--text-faint)}
    .zm-tl-conn{width:10px;height:2px;flex-shrink:0;margin-top:16px;border-radius:1px}
    .zm-tl-card{width:62px;min-height:82px;flex-shrink:0;border-radius:6px;padding:4px;position:relative;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
    .zm-tl-card:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.5)}
    .zm-tl-card__rarity{position:absolute;top:2px;right:3px;font-family:var(--font-data);font-size:5px;padding:1px 3px;border-radius:2px}
    .zm-tl-card__name{font-family:var(--font-title);font-size:6px;font-weight:700;line-height:1.2;margin-bottom:3px;padding-right:14px}
    .zm-tl-card__art{height:26px;border-radius:4px;margin-bottom:3px;display:flex;align-items:center;justify-content:center;font-size:12px}
    .zm-tl-card__meta{display:flex;justify-content:space-between;align-items:center}
    .zm-tl-card__type{font-family:var(--font-title);font-size:5px;font-weight:700;text-transform:uppercase}
    .zm-tl-card__cost{font-family:var(--font-data);font-size:5px;color:var(--cyan)}
    /* Player popup (modal) */
    .zm-popup{position:fixed;z-index:2000;width:200px;background:rgba(10,8,18,0.97);border:1px solid var(--gold-border);border-radius:10px;padding:10px;box-shadow:0 12px 32px rgba(0,0,0,0.7);pointer-events:none;opacity:0;transform:translateY(6px);transition:opacity 0.2s,transform 0.2s}
    .zm-popup.visible{opacity:1;transform:translateY(0);pointer-events:auto}
    .zm-popup__row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .zm-popup__avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
    .zm-popup__avatar img{width:100%;height:100%;object-fit:cover}
    .zm-popup__name{font-family:var(--font-data);font-size:8px;color:var(--text-bright)}
    .zm-popup__house{font-family:var(--font-title);font-size:11px;font-weight:600;margin-top:2px;display:flex;align-items:center;gap:4px}
    .zm-popup__tag{font-family:var(--font-data);font-size:7px;padding:2px 6px;border-radius:8px;margin-top:3px;display:inline-block}
    .zm-popup__stats{display:grid;grid-template-columns:1fr 1fr;gap:4px}
    .zm-popup__stat{text-align:center;padding:4px;background:rgba(255,255,255,0.03);border-radius:4px}
    .zm-popup__stat-val{font-family:var(--font-data);font-size:9px;color:var(--text-bright)}
    .zm-popup__stat-label{font-family:var(--font-data);font-size:5px;color:var(--text-faint);margin-top:2px}
    .zm-popup__link{display:block;text-align:center;margin-top:6px;font-family:var(--font-data);font-size:6px;color:var(--gold);letter-spacing:1px;text-decoration:none;padding:4px 0;border-top:1px solid var(--border-subtle)}
    /* Card tooltip */
    .zm-card-tip{position:fixed;z-index:2000;width:170px;background:rgba(10,8,18,0.97);border-radius:10px;padding:10px;box-shadow:0 12px 32px rgba(0,0,0,0.7);pointer-events:none;opacity:0;transform:translateY(6px);transition:opacity 0.2s,transform 0.2s}
    .zm-card-tip.visible{opacity:1;transform:translateY(0)}
    .zm-card-tip__top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
    .zm-card-tip__name{font-family:var(--font-title);font-size:13px;font-weight:700;flex:1}
    .zm-card-tip__cost{font-family:var(--font-data);font-size:8px;color:var(--cyan);flex-shrink:0;background:rgba(0,0,0,0.4);border:1px solid rgba(0,212,255,0.2);border-radius:4px;padding:2px 5px}
    .zm-card-tip__rarity{display:inline-block;font-family:var(--font-data);font-size:7px;padding:2px 6px;border-radius:4px;margin-bottom:6px}
    .zm-card-tip__art{height:50px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:6px}
    .zm-card-tip__type{display:inline-block;font-family:var(--font-title);font-size:8px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-bottom:4px}
    .zm-card-tip__effect{font-family:var(--font-data);font-size:7px;line-height:1.7;padding:5px 6px;border-radius:4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);margin-bottom:4px}
    .zm-card-tip__flavor{font-family:var(--font-body);font-size:11px;font-style:italic;color:var(--text-faint);line-height:1.3}
    .zm-card-tip__house{font-family:var(--font-data);font-size:5px;text-align:center;letter-spacing:2px;margin-top:4px;opacity:0.35}
    /* Floating cast bar */
    .zm-castbar{position:absolute;bottom:0;left:0;right:0;z-index:25;background:#0d0a14;border-top:1px solid rgba(212,166,75,0.2)}
    .zm-castbar__collapsed{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background 0.2s}
    .zm-castbar__collapsed:hover{background:rgba(255,255,255,0.02)}
    .zm-castbar__card-preview{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
    .zm-castbar__card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .zm-castbar__card-name{font-family:var(--font-title);font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .zm-castbar__card-rarity{font-family:var(--font-data);font-size:6px;padding:2px 5px;border-radius:3px;flex-shrink:0}
    .zm-castbar__card-cost{font-family:var(--font-data);font-size:7px;color:var(--cyan);flex-shrink:0}
    .zm-castbar__mana{display:flex;align-items:center;gap:3px;flex-shrink:0}
    .zm-castbar__btn{font-family:var(--font-title);font-size:11px;font-weight:700;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;background:linear-gradient(135deg,#D4A64B,#b8860b);color:#0a0810;letter-spacing:1px;box-shadow:0 3px 0 #8a6d2f,0 0 12px rgba(212,166,75,0.3),0 0 24px rgba(212,166,75,0.15);transition:transform 0.1s,box-shadow 0.2s;flex-shrink:0;animation:castGlow 2.5s ease-in-out infinite}
    @keyframes castGlow{0%,100%{box-shadow:0 3px 0 #8a6d2f,0 0 12px rgba(212,166,75,0.3),0 0 24px rgba(212,166,75,0.15)}50%{box-shadow:0 3px 0 #8a6d2f,0 0 18px rgba(212,166,75,0.45),0 0 32px rgba(212,166,75,0.25)}}
    .zm-castbar__btn:active{transform:translateY(2px);box-shadow:0 1px 0 #8a6d2f;animation:none}
    .zm-castbar__expand{font-size:12px;color:var(--text-faint);transition:transform 0.3s;flex-shrink:0;margin-left:4px}
    .zm-castbar__expand.open{transform:rotate(180deg)}
    .zm-castbar__drawer{max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.22,1,0.36,1);background:#0d0a14}
    .zm-castbar__drawer.open{max-height:420px}
    .zm-castbar__drawer-inner{padding:8px 16px 16px}
    .zm-cast__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .zm-cast__title{font-family:var(--font-title);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
    .zm-mana{display:flex;align-items:center;gap:4px}
    .zm-mana__label{font-family:var(--font-data);font-size:7px;color:var(--text-faint);letter-spacing:1px}
    .zm-mana__orb{width:11px;height:11px;border-radius:50%}
    .zm-mana__orb--filled{background:linear-gradient(180deg,#00D4FF,#0088aa);border:1px solid rgba(0,212,255,0.4);box-shadow:0 0 4px rgba(0,212,255,0.25)}
    .zm-mana__orb--empty{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06)}
    .zm-sorts{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
    .zm-sort-btn{font-family:var(--font-title);font-size:9px;font-weight:600;padding:5px 10px;border-radius:5px;cursor:pointer;border:none;transition:all 0.2s;background:rgba(255,255,255,0.03);color:var(--text-faint);outline:1px solid var(--border-subtle)}
    .zm-sort-btn.active{background:var(--gold-dim);color:var(--gold);outline-color:var(--gold-border)}
    .zm-sort-count{margin-left:auto;font-family:var(--font-data);font-size:7px;color:var(--text-faint)}
    .zm-carousel-wrap{position:relative;height:240px;overflow:hidden;display:flex;align-items:center;justify-content:center;touch-action:pan-y;padding:0 36px}
    .zm-carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(0,0,0,0.7);border:1px solid var(--border-subtle);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all 0.2s}
    .zm-carousel-arrow--l{left:4px}
    .zm-carousel-arrow--r{right:4px}
    .zm-carousel-cards{display:flex;align-items:center;gap:10px;transition:transform 0.4s cubic-bezier(0.22,1,0.36,1);will-change:transform;margin:0 auto}
    .zm-cc{width:130px;min-height:185px;flex-shrink:0;border-radius:12px;position:relative;overflow:hidden;cursor:pointer;
      transition:transform 0.4s cubic-bezier(0.22,1,0.36,1),opacity 0.35s ease,filter 0.35s ease,box-shadow 0.35s ease;
      transform:scale(0.82);opacity:0.45;filter:brightness(0.6)}
    .zm-cc--active{transform:scale(1);opacity:1;filter:brightness(1);z-index:10}
    .zm-cc--adj{transform:scale(0.88);opacity:0.6;filter:brightness(0.7)}
    .zm-cc--far{opacity:0;pointer-events:none}
    .zm-cc__glow{position:absolute;top:0;left:0;right:0;height:2px}
    .zm-cc__rarity{position:absolute;top:6px;right:6px;font-family:var(--font-data);font-size:7px;padding:2px 6px;border-radius:4px;z-index:2}
    .zm-cc__body{padding:10px 10px 8px;position:relative;z-index:1;display:flex;flex-direction:column;height:100%}
    .zm-cc__top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
    .zm-cc__name{font-family:var(--font-title);font-weight:700;font-size:11px;line-height:1.2;flex:1;padding-right:6px;color:var(--text-bright)}
    .zm-cc__cost{font-family:var(--font-data);font-size:8px;color:var(--cyan);background:rgba(0,0,0,0.5);border:1px solid rgba(91,192,255,0.3);border-radius:4px;padding:2px 5px;flex-shrink:0;white-space:nowrap}
    .zm-cc__art{border-radius:6px;margin-bottom:6px;height:56px;display:flex;align-items:center;justify-content:center;position:relative;border:1px solid rgba(255,255,255,0.03)}
    .zm-cc__art-tier{position:absolute;bottom:3px;right:5px;font-family:var(--font-data);font-size:5px;color:var(--text-muted);opacity:0.5}
    .zm-cc__type{display:inline-block;font-family:var(--font-title);font-size:8px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-bottom:4px}
    .zm-cc__effect{font-family:var(--font-data);font-size:6px;line-height:1.6;padding:4px 6px;border-radius:4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);color:var(--text-body)}
    .zm-cc__flavor{font-family:var(--font-body);font-size:9px;font-style:italic;color:rgba(255,255,255,0.2);line-height:1.3;margin-top:auto;padding-top:3px}
    .zm-cc__house{margin-top:5px;text-align:center;font-family:var(--font-data);font-size:4px;letter-spacing:2px;opacity:0.3}
    .zm-nohand{text-align:center;padding:30px 16px;font-family:var(--font-body);color:var(--text-muted)}
    .zm-nohand__title{font-family:var(--font-title);font-size:14px;color:var(--gold);margin-bottom:6px}
    .zm-nohand__link{display:inline-block;margin-top:10px;font-family:var(--font-title);font-size:12px;color:var(--gold);text-decoration:underline;opacity:0.8}
    .zm-dots{display:flex;justify-content:center;gap:4px;margin-top:6px}
    .zm-dot{height:5px;border-radius:3px;cursor:pointer;transition:width 0.3s ease,background 0.3s ease}
    .zm-bottom{height:4px;background:linear-gradient(90deg,transparent,rgba(212,166,75,0.3),transparent);border-radius:0 0 4px 4px}
    .zm-empty{font-family:var(--font-body);font-size:14px;font-style:italic;color:var(--text-faint);text-align:center;padding:16px 0}

    /* Toast */
    .toast{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-family:var(--font-title);font-size:13px;font-weight:600;z-index:200;letter-spacing:0.5px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
    .toast--success{background:#1a3a1a;color:#44cc44;border:1px solid #2a5a2a}
    .toast--error{background:#3a1a1a;color:#cc4444;border:1px solid #5a2a2a}
    .toast.active{display:block;animation:fadeUp 0.3s ease}
    @keyframes fadeUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

    

    @media(max-width:480px){
      .world-hero__title{font-size:20px}
      .zone-card__image{height:100px}
      .zone-card__name{font-size:14px}
      .zone-card__body{padding:8px 12px 12px}
      .sort-btn{font-size:9px;padding:6px 10px}
      .towers-row{gap:2px;height:200px}
      .tower-body{width:16px}
      .tower-col--you .tower-body{width:20px}
      .tower-crest{width:18px;height:18px}
      .tower-col--you .tower-crest{width:22px;height:22px}
      .tower-name{font-size:6px;max-width:38px}
      .zm{max-height:95vh}
      .zm-header{height:160px}
    }
  </style>
</head>
<body>
  <script src="/js/nav.js"></script>

  <div class="main-container">
    <div class="world-hero fade-up"><h1 class="world-hero__title">World of Nethara</h1><p class="world-hero__sub">Attack and defend territories. Control the realm.</p></div>
    <div class="player-header fade-up fade-up-1" id="playerHeader" style="display:none;"></div>
    <div class="clash-card fade-up fade-up-1" id="clashCard" style="display:none;"><div class="clash-label">COMMUNITY CLASH</div><div id="clashContent"></div></div>
    <div class="towers-wrap fade-up fade-up-1" id="towersWrap" style="display:none;"><div class="towers-label">HOUSE POWER</div><div class="towers-row" id="towersRow"></div><div class="towers-ground"></div><div class="towers-you-badge" id="towersYouBadge" style="display:none;"></div></div>
    <div class="sort-bar fade-up fade-up-2"><button class="sort-btn active" onclick="sortZones('activity')">Most Active</button><button class="sort-btn" onclick="sortZones('objective')">Objective</button><button class="sort-btn" onclick="sortZones('bonus')">Bonus</button><button class="sort-btn" onclick="sortZones('alpha')">A-Z</button><span class="zone-count" id="zoneCount"></span></div>
    <div class="loading" id="loadingState"><div class="spinner"></div></div>
    <div class="zone-grid" id="zoneGrid"></div>
  </div>

  <!-- V3 ZONE MODAL -->
  <div class="zm-overlay" id="zmOverlay">
    <div class="zm" id="zmModal">
      <div class="zm-header" id="zmHeader">
        <div class="zm-header__media" id="zmHeaderMedia"></div>
        <div class="zm-header__gradient"></div>
        <div class="zm-header__particles" id="zmHeaderParticles"></div>
        <div class="zm-header__info">
          <div class="zm-header__name" id="zmName"></div>
          <div class="zm-header__desc" id="zmDesc"></div>
        </div>
        <div class="zm-close" onclick="closeModal()">&#10005;</div>
      </div>
      <div class="zm-body" id="zmBody">
        <div class="zm-ticker" id="zmTicker"></div>
        <div class="zm-section">
          <div class="zm-section-header">
            <div style="display:flex;align-items:center;"><div class="zm-live-dot"></div><span class="zm-section-title">COMMUNITY POWER</span></div>
            <div class="zm-range"><button class="zm-range-btn" data-range="7d">7d</button><button class="zm-range-btn active" data-range="14d">14d</button><button class="zm-range-btn" data-range="30d">30d</button></div>
          </div>
          <div class="zm-chart-wrap"><canvas id="zmChart"></canvas><div class="zm-chart-date" id="zmChartDate"></div></div>
          <div class="zm-race" id="zmRace"></div>
        </div>
        <div class="zm-section--compact">
          <div class="zm-section-header" style="margin-bottom:6px;"><span class="zm-section-title">HOUSE PRESENCE</span><span class="zm-section-title" style="color:var(--text-faint)">ADVANTAGE: +15%</span></div>
          <div id="zmHouseBar"></div>
        </div>
        <div class="zm-divider"></div>
        <div class="zm-section--compact">
          <div class="zm-section-header" style="margin-bottom:8px;"><span class="zm-section-title">ACTIVE EFFECTS</span><span class="zm-section-title" style="color:var(--text-faint)" id="zmEffectCount"></span></div>

<script>
/* ================================================================
   DATA & CONFIG
   ================================================================ */
var HOUSES={1:{name:'Smoulders',color:'#E03C31',glow:'#ff6b5b',slug:'smoulders',img:'Housesmoulders.png'},2:{name:'Darktide',color:'#00B4D8',glow:'#4de8ff',slug:'darktide',img:'Housedarktide.png'},3:{name:'Stonebark',color:'#5CB338',glow:'#8aef5a',slug:'stonebark',img:'Housestonebark.png'},4:{name:'Ashenvale',color:'#B0C4DE',glow:'#b8f0ff',slug:'ashenvale',img:'HouseAshenvale.png'},5:{name:'Stormrage',color:'#FFC800',glow:'#ffe566',slug:'stormrage',img:'Housestormrage.png'},6:{name:'Nighthollow',color:'#7B2D8E',glow:'#c066dd',slug:'nighthollow',img:'Housenighthollow.png'},7:{name:'Dawnbringer',color:'#FF8C00',glow:'#ffb84d',slug:'dawnbringer',img:'HouseDwnbringer.png'},8:{name:'Manastorm',color:'#5B8FE0',glow:'#8bb8ff',slug:'manastorm',img:'Housemanastorm.png'},9:{name:'Plaguemire',color:'#E84393',glow:'#ff7ab8',slug:'plaguemire',img:'Houseplaguemire.png'}};
var ZONE_IMAGES={};
var zones=[],actionsToday={},influence={},player=null,playerActedZones={},currentSort='activity',guildClashes=[],guildData={};
var SLUG_MAP={};Object.keys(HOUSES).forEach(function(id){SLUG_MAP[HOUSES[id].slug]={name:HOUSES[id].name,color:HOUSES[id].color,img:'/assets/images/houses/'+HOUSES[id].img};});
SLUG_MAP.universal={name:'Universal',color:'#D4A64B',img:null};
var RARITY_MAP={common:{color:'#bbb',border:'rgba(180,180,180,0.3)',bg:'rgba(180,180,180,0.06)',label:'C',mult:'\u00D71.0'},uncommon:{color:'#66dd66',border:'rgba(80,200,80,0.35)',bg:'rgba(80,200,80,0.08)',label:'U',mult:'\u00D71.25'},rare:{color:'#55bbff',border:'rgba(0,150,255,0.35)',bg:'rgba(0,150,255,0.08)',label:'R',mult:'\u00D71.5'},epic:{color:'#bb88ff',border:'rgba(160,80,240,0.4)',bg:'rgba(160,80,240,0.1)',label:'E',mult:'\u00D72.0'},legendary:{color:'#ffd700',border:'rgba(255,200,0,0.4)',bg:'rgba(255,200,0,0.12)',label:'L',mult:'\u00D73.0'}};
var EFFECT_ICONS={BURN:'\u{1F525}',WARD:'\u{1F6E1}',POISON:'\u2620',ANCHOR:'\u2693',SURGE:'\u26A1',HEAL:'\u{1F49A}',FREEZE:'\u2744',HEX:'\u{1F441}',CHAIN:'\u{1F517}',SILENCE:'\u{1F910}',LEECH:'\u{1F9DB}',DRAIN:'\u{1F30A}',THORNS:'\u{1F335}',HASTE:'\u{1F4A8}',CRIT:'\u{1F4A5}',DODGE:'\u{1F4A8}',BLESS:'\u2728',AMPLIFY:'\u{1F50A}',SIPHON:'\u{1F300}',CORRODE:'\u{1F9EA}',INFECT:'\u{1F9A0}'};

/* ================================================================
   HELPERS (shared across page and modal)
   ================================================================ */
function hImg(fn,sz){return'<img src="/assets/images/houses/'+fn+'" style="width:'+sz+'px;height:'+sz+'px;object-fit:contain;" onerror="this.style.display=\'none\'">';}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast toast--'+type+' active';setTimeout(function(){t.classList.remove('active');},3000);}
function timeAgo(d){if(!d)return'';var s=(Date.now()-new Date(d).getTime())/1000;if(s<60)return Math.floor(s)+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function getPlayerId(){var p=new URLSearchParams(window.location.search);return p.get('player_id')||localStorage.getItem('player_id');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

/* ================================================================
   COMMUNITY CLASH (page-level)
   ================================================================ */
function renderClashes(){
  if(!guildClashes||!guildClashes.length){document.getElementById('clashCard').style.display='none';return;}
  var html='';
  guildClashes.forEach(function(clash){
    var a=clash.team_a||{};var b=clash.team_b||{};
    var apts=a.points||0;var bpts=b.points||0;var total=apts+bpts||1;
    var apct=Math.round(apts/total*100);var bpct=100-apct;
    var aColor=a.color||'#D4A64B';var bColor=b.color||'#00D4FF';
    html+='<div class="clash-vs"><div class="clash-side"><div class="clash-icon" style="border-color:'+aColor+';color:'+aColor+';">'+(a.tag||'?').replace('$','').substring(0,3)+'</div><div class="clash-tag" style="color:'+aColor+';">'+esc(a.tag||'?')+'</div><div class="clash-pts" style="color:'+aColor+';">'+apts+'</div></div><div class="clash-divider">VS</div><div class="clash-side"><div class="clash-icon" style="border-color:'+bColor+';color:'+bColor+';">'+(b.tag||'?').replace('$','').substring(0,3)+'</div><div class="clash-tag" style="color:'+bColor+';">'+esc(b.tag||'?')+'</div><div class="clash-pts" style="color:'+bColor+';">'+bpts+'</div></div></div><div class="clash-bar"><div class="clash-bar__seg" style="width:'+apct+'%;background:'+aColor+';"></div><div class="clash-bar__seg" style="width:'+bpct+'%;background:'+bColor+';"></div></div>';
  });
  document.getElementById('clashContent').innerHTML=html;
  document.getElementById('clashCard').style.display='block';
}

function buildInfluenceSnapshot(running){
  var total=0;Object.values(running).forEach(function(v){total+=v;});
  if(total===0)return'';
  var entries=[];Object.keys(running).forEach(function(sid){entries.push({id:parseInt(sid),pct:Math.round(running[sid]/total*100)});});
  entries.sort(function(a,b){return b.pct-a.pct;});
  var html='<div class="tl-tip__header">INFLUENCE AT THIS POINT</div>';
  entries.forEach(function(e){
    var h=HOUSES[e.id]||{name:'?',color:'#888',img:''};
    html+='<div class="tl-tip__row">'+hImg(h.img,10)+'<span class="tl-tip__name" style="color:'+h.color+';">'+h.name+'</span><div class="tl-tip__bar"><div class="tl-tip__fill" style="width:'+e.pct+'%;background:'+h.color+';"></div></div><span class="tl-tip__pct" style="color:'+h.color+';">'+e.pct+'%</span></div>';
  });
  return html;
}

/* ================================================================
   PLAYER HEADER + TOWERS (page-level)
   ================================================================ */
function renderPlayerHeader(){
  if(!player)return;
  var h=HOUSES[player.school_id]||{name:'?',color:'#888',img:''};
  var mH='';var mana=player.mana!=null?player.mana:7;
  for(var i=0;i<7;i++)mH+='<div class="mana-orb'+(i<mana?' mana-orb--filled':'')+'" style="width:14px;height:14px;"></div>';
  var tagH=player.guild_tag?'<span class="player-header__tag">'+esc(player.guild_tag)+'</span>':'';
  var el=document.getElementById('playerHeader');
  el.innerHTML='<div class="player-header__left">'+(player.profile_image?'<img src="'+player.profile_image+'" class="player-header__avatar">':'')+'<div><div class="player-header__name">@'+esc(player.twitter_handle||'Unknown')+'</div><div style="display:flex;align-items:center;gap:6px;margin-top:2px;"><span class="player-header__house" style="color:'+h.color+';">'+hImg(h.img,14)+' '+h.name+'</span>'+tagH+'</div></div></div><div class="player-header__mana"><span class="player-header__mana-label">MANA</span><div class="mana-row" style="gap:3px;">'+mH+'</div></div>';
  el.style.display='flex';
}
function renderTowers(schoolData){
  if(!schoolData||schoolData.length===0)return;
  var sorted=schoolData.slice().sort(function(a,b){return(b.total_points||0)-(a.total_points||0);});
  var maxPts=sorted[0].total_points||1;var mySchoolId=player?player.school_id:null;var rankColors=['#FFD700','#C0C0C0','#CD7F32'];
  var row=document.getElementById('towersRow');var html='';
  sorted.forEach(function(s,i){
    var h=HOUSES[s.school_id];if(!h)return;
    var isYou=s.school_id===mySchoolId;var heightPct=(s.total_points||0)/maxPts;var tH=Math.max(20,30+heightPct*160);
    var cls='tower-col'+(isYou?' tower-col--you':'');var rc=i<3?rankColors[i]:'#555';
    html+='<div class="'+cls+'" style="animation-delay:'+(i*0.06)+'s;"><div class="tower-orb" style="background:'+h.glow+';box-shadow:0 0 '+(isYou?16:8)+'px '+h.glow+',0 0 '+(isYou?30:14)+'px '+h.color+'50;animation-delay:'+(i*0.3)+'s;"></div><div class="tower-body" style="height:'+tH+'px;background:linear-gradient(180deg,'+h.glow+'35 0%,'+h.color+' 30%,'+h.color+'90 70%,'+h.color+'35 100%);border:1px solid '+h.glow+'50;box-shadow:'+(isYou?'0 0 18px '+h.color+'50,inset 0 0 12px '+h.glow+'25':'0 0 6px '+h.color+'25,inset 0 0 6px '+h.glow+'12')+';"><div class="tower-shimmer" style="background:linear-gradient(180deg,transparent,'+h.glow+'40,transparent);"></div></div><div class="tower-base" style="background:linear-gradient(90deg,transparent,'+h.color+'50,transparent);"></div><img src="/assets/images/houses/'+h.img+'" class="tower-crest" onerror="this.style.display=\'none\'"><div class="tower-rank" style="color:'+rc+';">#'+(i+1)+'</div><div class="tower-name" style="color:'+(isYou?h.glow:'#999')+';">'+h.name+'</div><div class="tower-pts" style="color:'+(isYou?h.glow:'#777')+';">'+(s.total_points||0)+'</div></div>';
  });
  var shown={};sorted.forEach(function(s){shown[s.school_id]=true;});
  var rank=sorted.length;
  for(var id=1;id<=9;id++){if(!shown[id]){var h=HOUSES[id];var isYou=id===mySchoolId;rank++;
    html+='<div class="tower-col'+(isYou?' tower-col--you':'')+'"><div class="tower-orb" style="background:'+h.glow+'60;box-shadow:0 0 4px '+h.glow+'40;"></div><div class="tower-body" style="height:20px;background:'+h.color+'40;border:1px solid '+h.color+'30;opacity:0.4;"></div><div class="tower-base" style="background:linear-gradient(90deg,transparent,'+h.color+'30,transparent);"></div><img src="/assets/images/houses/'+h.img+'" class="tower-crest" style="opacity:0.4;" onerror="this.style.display=\'none\'"><div class="tower-rank" style="color:#444;">-</div><div class="tower-name" style="color:#555;">'+h.name+'</div><div class="tower-pts" style="color:#444;">0</div></div>';
  }}
  row.innerHTML=html;document.getElementById('towersWrap').style.display='block';
  if(mySchoolId){var my=HOUSES[mySchoolId];var badge=document.getElementById('towersYouBadge');badge.innerHTML='<div class="towers-you-dot" style="background:'+my.color+';box-shadow:0 0 6px '+my.glow+';"></div><span class="towers-you-text" style="color:'+my.glow+';">YOUR HOUSE: '+my.name.toUpperCase()+'</span>';badge.style.display='flex';}
}

/* ================================================================
   ZONE CARD HELPERS (page-level)
   ================================================================ */
function getZoneActivity(zid){return actionsToday[zid]?actionsToday[zid].length:0;}
function getTopHouse(zid){var inf=influence[zid];if(!inf)return null;var topId=null,topPct=0;Object.keys(inf).forEach(function(sid){if(inf[sid]>topPct){topPct=inf[sid];topId=parseInt(sid);}});return topId?{id:topId,pct:topPct}:null;}
function renderInfluenceBar(zid){
  var inf=influence[zid];if(!inf||Object.keys(inf).length===0)return'<div class="influence-bar"><div style="width:100%;background:rgba(255,255,255,0.04);"></div></div>';
  var segs='',labels='',entries=[];
  Object.keys(inf).forEach(function(sid){entries.push({id:parseInt(sid),pct:inf[sid]});});
  entries.sort(function(a,b){return b.pct-a.pct;});
  entries.forEach(function(e){var h=HOUSES[e.id]||{color:'#888'};segs+='<div class="influence-segment" style="width:'+e.pct+'%;background:'+h.color+';"></div>';});
  entries.slice(0,3).forEach(function(e){var h=HOUSES[e.id]||{name:'?',img:''};labels+='<div class="influence-label">'+hImg(h.img,10)+' '+e.pct+'%</div>';});
  return'<div class="influence-bar">'+segs+'</div><div class="influence-labels">'+labels+'</div>';
}
function buildPills(z){
  var html='';
  if(z.is_current_objective)html+='<span class="zone-pill zone-pill--objective" title="Double points for actions here today">\u269A\uFE0F OBJECTIVE<span class="zone-pill__tip">2x points for all actions today</span></span>';
  if(z.bonus_effect)html+='<span class="zone-pill zone-pill--bonus" title="'+esc(z.bonus_effect)+'">BONUS +50%<span class="zone-pill__tip">'+esc(z.bonus_effect)+'</span></span>';
  if(z.controlling_school_id&&HOUSES[z.controlling_school_id]){var c=HOUSES[z.controlling_school_id];html+='<span class="zone-pill zone-pill--controlled" style="color:'+c.color+';" title="Controlled by '+c.name+'">'+hImg(c.img,12)+c.name.toUpperCase()+'<span class="zone-pill__tip">Controlled by '+c.name+' \u2014 defenders get +25% bonus</span></span>';}
  var top=getTopHouse(z.id);if(top&&top.pct>=40&&(!z.controlling_school_id||top.id!==z.controlling_school_id)){var th=HOUSES[top.id];html+='<span class="zone-pill zone-pill--contesting" title="'+th.name+' contesting at '+top.pct+'%">'+hImg(th.img,10)+'CONTESTING<span class="zone-pill__tip">'+th.name+' at '+top.pct+'% influence</span></span>';}
  return html?'<div class="zone-pills">'+html+'</div>':'';
}
function buildTimeline(zid){
  var acts=actionsToday[zid]||[];if(!acts.length)return'<div class="tl-empty">No activity yet</div>';
  var html='<div class="timeline">';var reversed=acts.slice().reverse();var running={};
  reversed.forEach(function(a,i){
    var p=a.player||{};var h=HOUSES[p.school_id]||{color:'#888',img:''};
    var type=a.action_type||'attack';var typeCol=type==='attack'?'#ff5555':'#5588ff';var typeLabel=type==='attack'?'ATK':'DEF';
    if(!running[p.school_id])running[p.school_id]=0;running[p.school_id]+=1;
    var total=0;Object.values(running).forEach(function(v){total+=v;});var myPct=total>0?Math.round(running[p.school_id]/total*100):0;
    var snapHtml=buildInfluenceSnapshot(Object.assign({},running));
    if(i>0)html+='<div class="tl-line" style="background:linear-gradient(90deg,'+h.color+'40,'+h.color+');"></div>';
    html+='<div class="tl-node"><div class="tl-tip">'+snapHtml+'</div><div class="tl-node__dot" style="border-color:'+typeCol+';">'+(p.profile_image?'<img class="tl-node__avatar" src="'+p.profile_image+'">':hImg(h.img,16))+'</div><div class="tl-node__label" style="color:'+typeCol+';">'+typeLabel+'</div><div class="tl-node__handle">@'+esc((p.twitter_handle||'?').substring(0,8))+'</div><div class="tl-node__score">'+myPct+'%</div></div>';
  });
  html+='</div>';return html;
}

/* Page player popup */
var popupTimeout=null;
function showPlayerPopup(e,p){
  clearTimeout(popupTimeout);var popup=document.getElementById('playerPopup');var h=HOUSES[p.school_id]||{name:'?',color:'#888',img:''};
  var profileLink=p.id?'/profile.html?player_id='+p.id:'#';
  popup.innerHTML='<div class="player-popup__row">'+(p.profile_image?'<img src="'+p.profile_image+'" class="player-popup__avatar">':'<div class="player-popup__avatar" style="display:flex;align-items:center;justify-content:center;background:var(--bg-inset);">'+hImg(h.img,20)+'</div>')+'<div><div class="player-popup__name">@'+esc(p.twitter_handle||'unknown')+'</div><div class="player-popup__house" style="color:'+h.color+';">'+hImg(h.img,14)+h.name+'</div></div></div><div class="player-popup__stats"><div class="player-popup__stat"><div class="player-popup__stat-val">'+(p.seasonal_points||'\u2014')+'</div><div class="player-popup__stat-label">POINTS</div></div><div class="player-popup__stat"><div class="player-popup__stat-val">'+(p.streak||'\u2014')+'</div><div class="player-popup__stat-label">STREAK</div></div><div class="player-popup__stat"><div class="player-popup__stat-val">'+(p.mana!=null?p.mana:'\u2014')+'</div><div class="player-popup__stat-label">MANA</div></div><div class="player-popup__stat"><div class="player-popup__stat-val">'+(p.lives!=null?p.lives:'\u2014')+'</div><div class="player-popup__stat-label">LIVES</div></div></div><a href="'+profileLink+'" style="display:block;text-align:center;margin-top:8px;font-family:var(--font-data);font-size:6px;color:var(--gold);letter-spacing:1px;text-decoration:none;padding:4px 0;border-top:1px solid var(--border-subtle);">VIEW PROFILE \u2192</a>';
  popup.style.left=Math.min(e.clientX+10,window.innerWidth-220)+'px';popup.style.top=Math.max(e.clientY-140,10)+'px';popup.classList.add('visible');
}
function hidePlayerPopup(){popupTimeout=setTimeout(function(){document.getElementById('playerPopup').classList.remove('visible');},200);}
document.getElementById('playerPopup').addEventListener('mouseenter',function(){clearTimeout(popupTimeout);});
document.getElementById('playerPopup').addEventListener('mouseleave',function(){hidePlayerPopup();});

/* ================================================================
   SORTING + ZONE GRID (page-level)
   ================================================================ */
function sortZones(type){currentSort=type;var btns=document.querySelectorAll('.sort-btn');for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');event.target.classList.add('active');renderZoneGrid();}
function getSortedZones(){
  var s=zones.slice();
  if(currentSort==='activity')s.sort(function(a,b){var d=getZoneActivity(b.id)-getZoneActivity(a.id);if(d!==0)return d;if(b.is_current_objective)return 1;if(a.is_current_objective)return-1;return 0;});
  else if(currentSort==='objective')s.sort(function(a,b){return(b.is_current_objective?1:0)-(a.is_current_objective?1:0);});
  else if(currentSort==='bonus')s.sort(function(a,b){return(b.bonus_effect?1:0)-(a.bonus_effect?1:0)||getZoneActivity(b.id)-getZoneActivity(a.id);});
  else if(currentSort==='alpha')s.sort(function(a,b){return a.name.localeCompare(b.name);});
  return s;
}
function renderZoneGrid(){
  var sorted=getSortedZones();var grid=document.getElementById('zoneGrid');var html='';
  sorted.forEach(function(z){
    var isObj=z.is_current_objective,isBonus=z.bonus_effect&&z.bonus_effect.includes('+50%');
    var activity=getZoneActivity(z.id),acted=playerActedZones[z.id];
    var cls='zone-card fade-up';if(isObj)cls+=' zone-card--objective';else if(isBonus)cls+=' zone-card--bonus';
    var zImg=(z.image_url?(z.image_url.startsWith('/')?z.image_url:'/assets/images/zones/'+z.image_url):'')||ZONE_IMAGES[z.id]||'';
    var badges='';if(isObj)badges+='<span class="zone-pill zone-pill--objective" style="font-size:7px;">OBJECTIVE</span>';
    if(isBonus)badges+='<span class="zone-pill zone-pill--bonus" style="font-size:7px;">BONUS</span>';
    var btnsHTML='';
    if(!player)btnsHTML='<a href="/register.html" class="zone-action-btn zone-action-btn--attack" style="text-decoration:none;font-size:8px;">JOIN</a>';
    else if(acted)btnsHTML='<span class="zone-action-btn zone-action-btn--done">ACTED</span>';
    else if(player.mana<1)btnsHTML='<span class="zone-action-btn zone-action-btn--done">NO MANA</span>';
    else btnsHTML='<button class="zone-action-btn zone-action-btn--cast" onclick="event.stopPropagation();openZoneModal('+z.id+')">CAST</button>';
    var dotCls=activity>0?'zone-card__activity-dot':'zone-card__activity-dot zone-card__activity-dot--idle';

            var effectText='';
            if(effects){
              try{var parsed=typeof effects==='string'?JSON.parse(effects):effects;if(Array.isArray(parsed)){effectText=parsed.map(function(e){return(typeof e==='string')?e:(e.tag||e.key||e.description||'');}).join(', ');}else if(typeof parsed==='object'){effectText=parsed.description||parsed.tag||JSON.stringify(parsed);}else{effectText=String(parsed);}}catch(e){effectText=String(effects);}
            }

          });

          console.log('[9LV] No spells in collection yet');
        }
      }
    }catch(e){console.error('[9LV] Collection fetch failed:',e);}
  }
  // Basics only if no collection cards
  if(zmCards.length===0){
    zmCards.push({name:'Basic Attack',house:'universal',houseColor:'#D4A64B',houseName:'Universal',type:'attack',cost:1,rarity:'common',tier:0,effect:'+10 influence',flavor:'Strike first.',isHand:false});

  }
  console.log('[9LV] Carousel: '+zmCards.length+' cards total');

  renderZmMana();
  renderZmSorts();
  renderZmCarousel();

/* Chart - uses house influence data to generate mock guild chart */
function renderZmChart(zoneId){
  var ctx=document.getElementById('zmChart').getContext('2d');
  if(zmChart){zmChart.destroy();zmChart=null;}
  var inf=influence[zoneId]||{};
  var entries=[];Object.keys(inf).forEach(function(sid){var h=HOUSES[parseInt(sid)];if(h)entries.push({id:parseInt(sid),pct:inf[sid],house:h});});
  entries.sort(function(a,b){return b.pct-a.pct;});
  if(entries.length===0){entries=[{id:0,pct:100,house:{name:'No data',color:'#555'}}];}

  // Generate synthetic chart data from current values
  var labels=['6d ago','5d ago','4d ago','3d ago','2d ago','Yesterday','Today'];
  var datasets=entries.slice(0,5).map(function(e){
    var base=e.pct;var pts=[];
    for(var i=0;i<7;i++){pts.push(Math.max(5,base+Math.round((Math.random()-0.5)*base*0.4)));}
    pts[6]=e.pct; // Ensure today matches actual
    return{label:e.house.name,data:pts,borderColor:e.house.color,backgroundColor:e.house.color+'18',borderWidth:2,fill:true,tension:0.35,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:'#0a0812',pointHoverBorderColor:e.house.color,pointHoverBorderWidth:2};
  });

  zmChart=new Chart(ctx,{
    type:'line',data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      onHover:function(e,elements){
        var dateEl=document.getElementById('zmChartDate');
        if(elements.length>0){dateEl.textContent=labels[elements[0].index];dateEl.classList.add('visible');}
        else{dateEl.classList.remove('visible');}
      },
      plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(10,8,18,0.95)',borderColor:'rgba(212,166,75,0.35)',borderWidth:1,padding:10,cornerRadius:8,titleFont:{family:'Press Start 2P',size:7},titleColor:'#847C98',bodyFont:{family:'JetBrains Mono',size:11},bodyColor:'#F0ECF8',callbacks:{labelColor:function(ctx){return{borderColor:ctx.dataset.borderColor,backgroundColor:ctx.dataset.borderColor};}}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{family:'Press Start 2P',size:6},color:'#554E68',maxRotation:0},border:{display:false}},
        y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{family:'Press Start 2P',size:6},color:'#554E68'},border:{display:false}}
      }
    }
  });
}

/* Sort chips */
var ZM_SORTS=[{key:'hand',label:'Hand First'},{key:'rarity',label:'Rarity'},{key:'cost',label:'Cost'},{key:'type',label:'Type'}];
function renderZmSorts(){
  var html='';ZM_SORTS.forEach(function(s){html+='<button class="zm-sort-btn'+(zmSort===s.key?' active':'')+'" onclick="zmSetSort(\''+s.key+'\')">'+s.label+'</button>';});
  html+='<span class="zm-sort-count">'+zmCards.length+'</span>';
  document.getElementById('zmSorts').innerHTML=html;
}
function zmSetSort(key){zmSort=key;zmCarouselIdx=0;renderZmSorts();renderZmCarousel();}
function getZmSorted(){
  var s=zmCards.slice();var ro={legendary:0,epic:1,rare:2,uncommon:3,common:4};
  if(zmSort==='hand')s.sort(function(a,b){return(b.isHand?1:0)-(a.isHand?1:0);});
  else if(zmSort==='rarity')s.sort(function(a,b){return(ro[a.rarity]||5)-(ro[b.rarity]||5);});
  else if(zmSort==='cost')s.sort(function(a,b){return b.cost-a.cost;});
  else if(zmSort==='type')s.sort(function(a,b){return a.type.localeCompare(b.type);});
  return s;
}

/* Carousel â€” track-based with CSS transitions */
var ZM_CARD_W=130,ZM_GAP=10,ZM_STEP=ZM_CARD_W+ZM_GAP;

function renderZmCarousel(){
  var sorted=getZmSorted();
  zmCarouselIdx=Math.min(zmCarouselIdx,Math.max(0,sorted.length-1));
  var track=document.getElementById('zmCarouselCards');
  var wrap=document.getElementById('zmCarouselWrap');
  var typeColors={attack:'#ff5555',defend:'#5588ff',support:'#ffd700'};

  // No collection cards — show message
  var collCards=sorted.filter(function(c){return c.isHand;});
  if(collCards.length===0&&sorted.length<=2){
    track.innerHTML='<div class="zm-nohand"><div class="zm-nohand__title">No Spells Collected</div><p>Open packs to build your spell collection.</p><a href="/packs.html" class="zm-nohand__link">Open Packs &#8594;</a></div>';
    track.style.transform='none';
    document.getElementById('zmDots').innerHTML='';
    return;
  }

  var html='';
  sorted.forEach(function(card,i){
    var r=RARITY_MAP[card.rarity]||RARITY_MAP.common;
    var tc=typeColors[card.type]||'#888';
    html+='<div class="zm-cc" data-idx="'+i+'" style="background:linear-gradient(180deg,'+card.houseColor+'12,#0c0a14 35%,#0a0810);border:1.5px solid '+(card.isHand?card.houseColor+'50':'rgba(255,255,255,0.07)')+';box-shadow:0 2px 8px rgba(0,0,0,0.3)">'
      +(card.isHand?'<div class="zm-cc__glow" style="background:linear-gradient(90deg,transparent,'+card.houseColor+'60,transparent);"></div>':'')
      +'<div class="zm-cc__rarity" style="background:'+r.bg+';border:1px solid '+r.border+';color:'+r.color+';">'+r.label+' '+r.mult+'</div>'
      +'<div class="zm-cc__body"><div class="zm-cc__top"><div class="zm-cc__name" style="color:'+card.houseColor+';">'+card.name+'</div><div class="zm-cc__cost">'+card.cost+'MP</div></div>'
      +'<div class="zm-cc__art" style="background:radial-gradient(ellipse at 50% 40%,'+card.houseColor+'15,transparent 65%),linear-gradient(180deg,rgba(10,8,6,0.5),rgba(14,12,10,0.7));"><span style="font-size:22px;color:'+card.houseColor+'80;">&#10022;</span><div class="zm-cc__art-tier" style="color:'+card.houseColor+';">'+(card.tier===0?'BASIC':'TIER '+card.tier)+'</div></div>'
      +'<div class="zm-cc__type" style="background:'+tc+'15;color:'+tc+';border:1px solid '+tc+'25;">'+card.type+'</div>'
      +'<div class="zm-cc__effect" style="color:'+card.houseColor+';">'+card.effect+'</div>'
      +(card.flavor?'<div class="zm-cc__flavor">"'+card.flavor+'"</div>':'')
      +'<div class="zm-cc__house" style="color:'+card.houseColor+';">'+card.houseName.toUpperCase()+'</div></div></div>';
  });
  track.innerHTML=html;
  // Click handler on each card
  track.querySelectorAll('.zm-cc').forEach(function(el){
    el.addEventListener('click',function(){zmSlide(parseInt(el.dataset.idx));});
  });
  // Build dots
  var dotsHTML='';sorted.forEach(function(card,i){
    dotsHTML+='<div class="zm-dot" data-idx="'+i+'" style="width:'+(i===zmCarouselIdx?16:5)+'px;background:'+(i===zmCarouselIdx?card.houseColor:'rgba(255,255,255,0.08)')+';"></div>';
  });
  var dotsEl=document.getElementById('zmDots');
  dotsEl.innerHTML=dotsHTML;
  dotsEl.querySelectorAll('.zm-dot').forEach(function(d){
    d.addEventListener('click',function(){zmSlide(parseInt(d.dataset.idx));});
  });
  zmSlide(zmCarouselIdx,true);
}

function zmSlide(idx,instant){
  var sorted=getZmSorted();
  idx=Math.max(0,Math.min(idx,sorted.length-1));
  zmCarouselIdx=idx;
  var track=document.getElementById('zmCarouselCards');
  var wrap=document.getElementById('zmCarouselWrap');
  var wrapW=wrap.offsetWidth||460;
  var center=wrapW/2-ZM_CARD_W/2;
  var offset=center-(idx*ZM_STEP);
  if(instant)track.style.transition='none';
  track.style.transform='translateX('+offset+'px)';
  if(instant)requestAnimationFrame(function(){track.style.transition='';});

  // Update card classes
  var cards=track.querySelectorAll('.zm-cc');
  cards.forEach(function(el,i){
    var dist=Math.abs(i-idx);
    el.classList.remove('zm-cc--active','zm-cc--adj','zm-cc--far');
    if(i===idx){
      el.classList.add('zm-cc--active');
      el.style.borderColor=sorted[i].houseColor+'60';
      el.style.boxShadow='0 8px 28px rgba(0,0,0,0.5),0 0 16px '+sorted[i].houseColor+'20';
    }else if(dist===1){
      el.classList.add('zm-cc--adj');
      el.style.boxShadow='0 2px 8px rgba(0,0,0,0.3)';
    }else if(dist>2){
      el.classList.add('zm-cc--far');
    }else{
      el.style.boxShadow='0 2px 8px rgba(0,0,0,0.3)';
    }
  });
  // Update dots
  var dots=document.querySelectorAll('.zm-dot');
  dots.forEach(function(d,i){
    d.style.width=(i===idx?16:5)+'px';
    d.style.background=i===idx?sorted[i].houseColor:'rgba(255,255,255,0.08)';
  });
  // Arrows
  document.getElementById('zmArrowL').style.color=idx===0?'#333':'var(--gold)';
  document.getElementById('zmArrowR').style.color=idx>=sorted.length-1?'#333':'var(--gold)';
  updateZmBarPreview();
}

document.getElementById('zmArrowL').onclick=function(){zmSlide(zmCarouselIdx-1);};
document.getElementById('zmArrowR').onclick=function(){zmSlide(zmCarouselIdx+1);};
// Touch swipe
var zmTouchX=0;
document.getElementById('zmCarouselWrap').addEventListener('touchstart',function(e){zmTouchX=e.touches[0].clientX;});
document.getElementById('zmCarouselWrap').addEventListener('touchend',function(e){
  var d=zmTouchX-e.changedTouches[0].clientX;
  if(d>40)zmSlide(zmCarouselIdx+1);
  else if(d<-40)zmSlide(zmCarouselIdx-1);
});
// Range toggle
document.querySelectorAll('.zm-range-btn').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.zm-range-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');});});

/* Cast spell from modal */
function castSpellOnZone(zoneId,card){
  var pid=localStorage.getItem('player_id');if(!pid){alert('Log in first!');return;}
  var castName=card.name||'spell';
  if(confirm('Cast '+castName+'?')){
    var body={player_id:pid,zone_id:zoneId};
    if(card.cardId){body.card_id=card.cardId;}
    else{body.action_type=card.type||'attack';}
    fetch('/api/territory/action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();}).then(function(d){
      if(d.success){showToast(d.message||'Spell cast!','success');closeModal();loadWorld();}
      else{showToast(d.error||d.message||'Cast failed','error');}
    }).catch(function(){showToast('Cast failed','error');});
  }
}
function doModalCast(){
  var sorted=getZmSorted();var card=sorted[zmCarouselIdx];
  if(!card||!zmZoneId)return;
  castSpellOnZone(zmZoneId,card);
}

/* ================================================================
   LOAD WORLD (data fetching)
   ================================================================ */
async function loadWorld(){
  try{
    var playerId=getPlayerId();
    var fetches=[
      fetch('/api/zones').then(function(r){return r.json();}),
      fetch('/api/territory/actions/today').then(function(r){return r.json();}),
      fetch('/api/territory/influence').then(function(r){return r.json();}),
      fetch('/api/leaderboards/schools').then(function(r){return r.json();}),
      fetch('/api/territory/guild-influence').then(function(r){return r.ok?r.json():{};}).catch(function(){return{};}),
      fetch('/api/territory/communities').then(function(r){return r.ok?r.json():[];}).catch(function(){return[];})
    ];
    if(playerId)fetches.push(fetch('/api/players/'+playerId).then(function(r){return r.json();}));
    var results=await Promise.all(fetches);
    zones=results[0]||[];actionsToday=results[1]||{};influence=results[2]||{};
    var schoolData=results[3]||[];guildInfluence=results[4]||{};var commList=results[5]||[];player=results[6]||null;
    if(Array.isArray(commList))commList.forEach(function(c){guildData[c.tag]={name:c.name||c.tag,color:c.color||'#888',image_url:c.image_url};});
    if(player){
      Object.keys(actionsToday).forEach(function(zid){actionsToday[zid].forEach(function(a){var p=a.player||{};if(p.id===player.id)playerActedZones[zid]=true;});});
      renderPlayerHeader();
    }
    renderTowers(schoolData);
    try{var cr=await fetch('/api/admin/clashes');if(cr.ok){var cd=await cr.json();guildClashes=cd||[];renderClashes();}}catch(e){guildClashes=[];}
    var loader=document.getElementById('loadingState');if(loader)loader.style.display='none';
    renderZoneGrid();
  }catch(e){
    console.error('World load error:',e);
    var loader=document.getElementById('loadingState');if(loader)loader.style.display='none';
    document.getElementById('zoneGrid').innerHTML='<div style="text-align:center;padding:30px;color:var(--text-faint);font-style:italic;">Error loading world data</div>';
  }
}
loadWorld();
</script>
