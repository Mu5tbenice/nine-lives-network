<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>World | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    .world-hero { text-align: center; padding: 14px 0 6px; }
    .world-hero__title { font-family: var(--font-title); font-weight: 700; font-size: 24px; color: var(--gold); letter-spacing: 3px; }
    .world-hero__sub { font-family: var(--font-body); font-size: 15px; font-style: italic; color: var(--text-muted); margin-top: 4px; }

    /* Player bar */
    .player-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: 10px;
    }
    .player-bar__left { display: flex; align-items: center; gap: 10px; }
    .player-bar__avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-subtle); }
    .player-bar__name { font-family: var(--font-title); font-size: 13px; font-weight: 600; color: var(--text-bright); }
    .player-bar__house { display: flex; align-items: center; gap: 4px; }
    .player-bar__house-img { width: 16px; height: 16px; object-fit: contain; }
    .player-bar__house-name { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
    .player-bar__mana { display: flex; align-items: center; gap: 4px; }
    .player-bar__mana-label { font-family: var(--font-data); font-size: 8px; color: var(--text-muted); letter-spacing: 1px; }

    /* Sort/filter bar */
    .sort-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .sort-btn {
      padding: 7px 14px; border: 1px solid var(--border-subtle); border-radius: 6px;
      background: var(--bg-card); color: var(--text-muted);
      font-family: var(--font-title); font-size: 10px; font-weight: 600;
      letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s;
    }
    .sort-btn.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold-border); }
    .zone-count { font-family: var(--font-data); font-size: 8px; color: var(--text-faint); margin-left: auto; }

    /* Zone card */
    .zone-grid { display: flex; flex-direction: column; gap: 8px; }

    .zone-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px;
      padding: 16px; cursor: pointer; transition: all 0.2s;
    }
    .zone-card:hover { border-color: var(--border-medium); background: var(--bg-card-hover); }
    .zone-card--objective { border-color: var(--gold-border); box-shadow: 0 0 15px var(--gold-glow); }
    .zone-card--bonus { border-color: rgba(0, 212, 255, 0.2); }

    .zone-card__top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .zone-card__info { flex: 1; }
    .zone-card__name { font-family: var(--font-title); font-size: 15px; font-weight: 700; color: var(--text-bright); letter-spacing: 0.5px; }
    .zone-card__desc { font-family: var(--font-body); font-size: 13px; color: var(--text-faint); margin-top: 2px; }
    .zone-card__badges { display: flex; gap: 4px; flex-shrink: 0; margin-left: 8px; }
    .zone-badge {
      font-family: var(--font-data); font-size: 7px; padding: 3px 8px;
      border-radius: 4px; letter-spacing: 0.5px;
    }
    .zone-badge--objective { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-border); }
    .zone-badge--bonus { background: rgba(0, 212, 255, 0.08); color: var(--cyan); border: 1px solid rgba(0, 212, 255, 0.2); }
    .zone-badge--controlled { padding: 3px 6px; display: flex; align-items: center; gap: 4px; background: var(--bg-inset); border: 1px solid var(--border-subtle); }
    .zone-badge--controlled img { width: 12px; height: 12px; object-fit: contain; }

    /* Influence bar */
    .zone-card__influence { margin-bottom: 10px; }
    .influence-bar {
      height: 8px; border-radius: 4px; background: rgba(255,255,255,0.04);
      overflow: hidden; display: flex;
    }
    .influence-segment {
      height: 100%; transition: width 0.6s ease;
    }
    .influence-labels {
      display: flex; justify-content: space-between; margin-top: 4px;
    }
    .influence-label {
      display: flex; align-items: center; gap: 3px;
      font-family: var(--font-data); font-size: 7px; color: var(--text-faint);
    }
    .influence-label img { width: 10px; height: 10px; object-fit: contain; }

    /* Zone footer: actions count + buttons */
    .zone-card__footer { display: flex; align-items: center; justify-content: space-between; }
    .zone-card__activity {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);
    }
    .zone-card__actions { display: flex; gap: 6px; }
    .zone-action-btn {
      padding: 8px 16px; border-radius: 6px; border: none;
      font-family: var(--font-data); font-size: 8px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.15s; color: #fff;
    }
    .zone-action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .zone-action-btn--attack { background: linear-gradient(135deg, #cc3333, #aa2222); }
    .zone-action-btn--defend { background: linear-gradient(135deg, #3366cc, #2244aa); }
    .zone-action-btn--done { background: var(--bg-inset); color: var(--text-faint); border: 1px solid var(--border-subtle); }

    /* Zone detail modal */
    .zone-modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      z-index: 100; justify-content: center; align-items: flex-end; padding: 0;
    }
    .zone-modal-overlay.active { display: flex; }
    .zone-modal {
      max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto;
      background: var(--bg-card); border-radius: 16px 16px 0 0;
      border: 1px solid var(--border-subtle); border-bottom: none;
      animation: slideUpModal 0.3s ease;
    }
    @keyframes slideUpModal {
      from { transform: translateY(100%); } to { transform: translateY(0); }
    }
    .zone-modal__header {
      padding: 20px 20px 14px; border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .zone-modal__title { font-family: var(--font-title); font-size: 18px; font-weight: 700; color: var(--text-bright); letter-spacing: 1px; }
    .zone-modal__desc { font-family: var(--font-body); font-size: 13px; color: var(--text-faint); margin-top: 2px; }
    .zone-modal__close {
      background: none; border: none; color: var(--text-faint); font-size: 20px;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .zone-modal__body { padding: 16px 20px 24px; }

    .zone-modal__influence { margin-bottom: 16px; }
    .zone-modal__influence-title {
      font-family: var(--font-data); font-size: 8px; color: var(--text-muted);
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .modal-influence-row {
      display: flex; align-items: center; gap: 8px; padding: 6px 0;
    }
    .modal-influence-row img { width: 18px; height: 18px; object-fit: contain; }
    .modal-influence-name { font-family: var(--font-title); font-size: 12px; font-weight: 600; color: var(--text-bright); min-width: 90px; }
    .modal-influence-bar { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.04); overflow: hidden; }
    .modal-influence-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .modal-influence-pct { font-family: var(--font-data); font-size: 9px; color: var(--text-muted); min-width: 32px; text-align: right; }

    .zone-modal__actions-title {
      font-family: var(--font-data); font-size: 8px; color: var(--text-muted);
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .modal-action-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--bg-inset); border-radius: 8px; margin-bottom: 4px;
    }
    .modal-action-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--border-subtle); }
    .modal-action-info { flex: 1; }
    .modal-action-name { font-family: var(--font-title); font-size: 12px; font-weight: 600; color: var(--text-bright); }
    .modal-action-type { font-family: var(--font-data); font-size: 7px; letter-spacing: 1px; }
    .modal-action-type--attack { color: #ff5555; }
    .modal-action-type--defend { color: #5588ff; }
    .modal-action-time { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
    .modal-empty { font-family: var(--font-body); font-size: 14px; font-style: italic; color: var(--text-faint); text-align: center; padding: 20px 0; }

    /* Toast */
    .toast {
      display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 8px; font-family: var(--font-title);
      font-size: 13px; font-weight: 600; z-index: 200; letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast--success { background: #1a3a1a; color: #44cc44; border: 1px solid #2a5a2a; }
    .toast--error { background: #3a1a1a; color: #cc4444; border: 1px solid #5a2a2a; }
    .toast.active { display: block; animation: fadeUp 0.3s ease; }

    @media (max-width: 480px) {
      .world-hero__title { font-size: 20px; }
      .zone-card { padding: 14px; }
      .zone-card__name { font-size: 14px; }
      .sort-btn { font-size: 9px; padding: 6px 10px; }
      .zone-modal { max-height: 85vh; }
    }
  </style>
</head>
<body>

  <nav class="top-nav"><div class="top-nav-content"><a href="/" class="nav-logo">Nine Lives Network</a><ul class="nav-links"><li><a href="/dashboard.html">Dashboard</a></li><li><a href="/map.html" class="active">World</a></li><li><a href="/leaderboards.html">Leaderboards</a></li><li><a href="/arena.html">Arena</a></li><li><a href="/how-to-play.html">Help</a></li></ul><button class="hamburger" id="hamburger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button></div></nav>
  <div class="mobile-menu" id="mobileMenu"><a href="/dashboard.html">Dashboard</a><a href="/map.html" class="active">World</a><a href="/leaderboards.html">Leaderboards</a><a href="/warroom.html">War Room</a><a href="/arena.html">Arena</a><a href="/how-to-play.html">Help</a></div>

  <div class="main-container">

    <div class="world-hero fade-up">
      <h1 class="world-hero__title">World of Avaloris</h1>
      <p class="world-hero__sub">Attack and defend territories. Control the realm.</p>
    </div>

    <!-- Player bar -->
    <div class="player-bar fade-up fade-up-1" id="playerBar" style="display:none;"></div>

    <!-- Sort -->
    <div class="sort-bar fade-up fade-up-2">
      <button class="sort-btn active" onclick="sortZones('activity')">Most Active</button>
      <button class="sort-btn" onclick="sortZones('objective')">Objective</button>
      <button class="sort-btn" onclick="sortZones('bonus')">Bonus</button>
      <button class="sort-btn" onclick="sortZones('alpha')">A-Z</button>
      <span class="zone-count" id="zoneCount"></span>
    </div>

    <!-- Loading -->
    <div class="loading" id="loadingState"><div class="spinner"></div></div>

    <!-- Zone grid -->
    <div class="zone-grid" id="zoneGrid"></div>

  </div>

  <!-- Zone detail modal -->
  <div class="zone-modal-overlay" id="zoneModalOverlay">
    <div class="zone-modal" id="zoneModal">
      <div class="zone-modal__header">
        <div>
          <div class="zone-modal__title" id="modalTitle"></div>
          <div class="zone-modal__desc" id="modalDesc"></div>
        </div>
        <button class="zone-modal__close" onclick="closeModal()">&#10005;</button>
      </div>
      <div class="zone-modal__body" id="modalBody"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    var HOUSES = {
      1: { name: 'Smoulders', color: '#E03C31', img: 'Housesmoulders.png' },
      2: { name: 'Darktide', color: '#00B4D8', img: 'Housedarktide.png' },
      3: { name: 'Stonebark', color: '#5CB338', img: 'Housestonebark.png' },
      4: { name: 'Ashenvale', color: '#90E0EF', img: 'HouseAshenvale.png' },
      5: { name: 'Stormrage', color: '#FFC800', img: 'Housestormrage.png' },
      6: { name: 'Nighthollow', color: '#7B2D8E', img: 'Housenighthollow.png' },
      7: { name: 'Dawnbringer', color: '#FF8C00', img: 'HouseDwnbringer.png' },
      8: { name: 'Manastorm', color: '#5B8FE0', img: 'Housemanastorm.png' },
      9: { name: 'Plaguemire', color: '#E84393', img: 'Houseplaguemire.png' }
    };

    var zones = [];
    var actionsToday = {};
    var influence = {};
    var player = null;
    var playerActedZones = {};
    var currentSort = 'activity';

    function toggleMobileMenu() {
      document.getElementById('hamburger').classList.toggle('active');
      document.getElementById('mobileMenu').classList.toggle('active');
    }

    function hImg(filename, size) {
      return '<img src="/assets/images/houses/' + filename + '" style="width:' + size + 'px;height:' + size + 'px;object-fit:contain;" onerror="this.style.display=\'none\'">';
    }

    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast toast--' + type + ' active';
      setTimeout(function() { t.classList.remove('active'); }, 3000);
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      var diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
      if (diff < 60) return Math.floor(diff) + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    // ═══ GET PLAYER ═══
    function getPlayerId() {
      var params = new URLSearchParams(window.location.search);
      return params.get('player_id') || localStorage.getItem('player_id');
    }

    // ═══ RENDER PLAYER BAR ═══
    function renderPlayerBar() {
      if (!player) return;
      var h = HOUSES[player.school_id] || { name: '?', color: '#888', img: '' };
      var bar = document.getElementById('playerBar');

      var manaHTML = '';
      var mana = player.mana != null ? player.mana : 5;
      for (var i = 0; i < 5; i++) {
        manaHTML += '<div class="mana-orb' + (i < mana ? ' mana-orb--filled' : '') + '" style="width:14px;height:14px;"></div>';
      }

      bar.innerHTML = '<div class="player-bar__left">'
        + (player.profile_image ? '<img src="' + player.profile_image + '" class="player-bar__avatar">' : '')
        + '<div>'
        + '<div class="player-bar__name">@' + player.twitter_handle + '</div>'
        + '<div class="player-bar__house">' + hImg(h.img, 14) + '<span class="player-bar__house-name">' + h.name + '</span></div>'
        + '</div></div>'
        + '<div class="player-bar__mana">'
        + '<span class="player-bar__mana-label">MANA</span>'
        + '<div class="mana-row" style="gap:3px;">' + manaHTML + '</div>'
        + '</div>';
      bar.style.display = 'flex';
    }

    // ═══ GET ZONE ACTIVITY COUNT ═══
    function getZoneActivity(zoneId) {
      return actionsToday[zoneId] ? actionsToday[zoneId].length : 0;
    }

    // ═══ GET TOP HOUSE FOR ZONE ═══
    function getTopHouse(zoneId) {
      var inf = influence[zoneId];
      if (!inf) return null;
      var topId = null; var topPct = 0;
      Object.keys(inf).forEach(function(sid) {
        if (inf[sid] > topPct) { topPct = inf[sid]; topId = parseInt(sid); }
      });
      return topId ? { id: topId, pct: topPct } : null;
    }

    // ═══ RENDER INFLUENCE BAR ═══
    function renderInfluenceBar(zoneId) {
      var inf = influence[zoneId];
      if (!inf || Object.keys(inf).length === 0) {
        return '<div class="influence-bar"><div style="width:100%;background:rgba(255,255,255,0.04);"></div></div>';
      }

      var segments = '';
      var labels = '';
      var entries = [];
      Object.keys(inf).forEach(function(sid) { entries.push({ id: parseInt(sid), pct: inf[sid] }); });
      entries.sort(function(a, b) { return b.pct - a.pct; });

      entries.forEach(function(e) {
        var h = HOUSES[e.id] || { color: '#888', img: '' };
        segments += '<div class="influence-segment" style="width:' + e.pct + '%;background:' + h.color + ';"></div>';
      });

      // Show top 3 labels
      var topEntries = entries.slice(0, 3);
      topEntries.forEach(function(e) {
        var h = HOUSES[e.id] || { name: '?', img: '' };
        labels += '<div class="influence-label">' + hImg(h.img, 10) + ' ' + e.pct + '%</div>';
      });

      return '<div class="influence-bar">' + segments + '</div>'
        + '<div class="influence-labels">' + labels + '</div>';
    }

    // ═══ SORT ZONES ═══
    function sortZones(type) {
      currentSort = type;
      var btns = document.querySelectorAll('.sort-btn');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
      event.target.classList.add('active');
      renderZoneGrid();
    }

    function getSortedZones() {
      var sorted = zones.slice();
      if (currentSort === 'activity') {
        sorted.sort(function(a, b) {
          var diff = getZoneActivity(b.id) - getZoneActivity(a.id);
          if (diff !== 0) return diff;
          if (b.is_current_objective) return 1;
          if (a.is_current_objective) return -1;
          return 0;
        });
      } else if (currentSort === 'objective') {
        sorted.sort(function(a, b) {
          if (a.is_current_objective && !b.is_current_objective) return -1;
          if (!a.is_current_objective && b.is_current_objective) return 1;
          var aBonus = a.bonus_effect && a.bonus_effect.includes('+50%') ? 1 : 0;
          var bBonus = b.bonus_effect && b.bonus_effect.includes('+50%') ? 1 : 0;
          return bBonus - aBonus;
        });
      } else if (currentSort === 'bonus') {
        sorted.sort(function(a, b) {
          var aBonus = a.bonus_effect ? 1 : 0;
          var bBonus = b.bonus_effect ? 1 : 0;
          if (bBonus !== aBonus) return bBonus - aBonus;
          return getZoneActivity(b.id) - getZoneActivity(a.id);
        });
      } else if (currentSort === 'alpha') {
        sorted.sort(function(a, b) { return a.name.localeCompare(b.name); });
      }
      return sorted;
    }

    // ═══ RENDER ZONE GRID ═══
    function renderZoneGrid() {
      var sorted = getSortedZones();
      var grid = document.getElementById('zoneGrid');
      var html = '';

      sorted.forEach(function(z) {
        var isObjective = z.is_current_objective;
        var isBonus = z.bonus_effect && z.bonus_effect.includes('+50%');
        var activity = getZoneActivity(z.id);
        var topHouse = getTopHouse(z.id);
        var acted = playerActedZones[z.id];
        var cardClass = 'zone-card fade-up';
        if (isObjective) cardClass += ' zone-card--objective';
        else if (isBonus) cardClass += ' zone-card--bonus';

        // Badges
        var badges = '';
        if (isObjective) badges += '<span class="zone-badge zone-badge--objective">OBJECTIVE</span>';
        if (isBonus) badges += '<span class="zone-badge zone-badge--bonus">BONUS</span>';
        if (topHouse && topHouse.pct >= 50) {
          var th = HOUSES[topHouse.id] || { img: '', name: '?' };
          badges += '<span class="zone-badge zone-badge--controlled">' + hImg(th.img, 12) + '</span>';
        }

        // Action buttons
        var btnsHTML = '';
        if (!player) {
          btnsHTML = '<a href="/register.html" class="zone-action-btn zone-action-btn--attack" style="text-decoration:none;font-size:8px;">JOIN TO PLAY</a>';
        } else if (acted) {
          btnsHTML = '<span class="zone-action-btn zone-action-btn--done">ACTED</span>';
        } else if (player.mana < 1) {
          btnsHTML = '<span class="zone-action-btn zone-action-btn--done">NO MANA</span>';
        } else {
          btnsHTML = '<button class="zone-action-btn zone-action-btn--attack" onclick="event.stopPropagation();doAction(' + z.id + ',\'attack\')">ATTACK</button>'
            + '<button class="zone-action-btn zone-action-btn--defend" onclick="event.stopPropagation();doAction(' + z.id + ',\'defend\')">DEFEND</button>';
        }

        html += '<div class="' + cardClass + '" onclick="openZoneModal(' + z.id + ')">'
          + '<div class="zone-card__top">'
          + '  <div class="zone-card__info">'
          + '    <div class="zone-card__name">' + z.name + '</div>'
          + '    <div class="zone-card__desc">' + z.description + '</div>'
          + '  </div>'
          + '  <div class="zone-card__badges">' + badges + '</div>'
          + '</div>'
          + '<div class="zone-card__influence">' + renderInfluenceBar(z.id) + '</div>'
          + '<div class="zone-card__footer">'
          + '  <span class="zone-card__activity">' + activity + ' action' + (activity !== 1 ? 's' : '') + ' today</span>'
          + '  <div class="zone-card__actions">' + btnsHTML + '</div>'
          + '</div>'
          + '</div>';
      });

      grid.innerHTML = html;
      document.getElementById('zoneCount').textContent = sorted.length + ' zones';
    }

    // ═══ ATTACK / DEFEND ═══
    async function doAction(zoneId, actionType) {
      if (!player || player.mana < 1) return;
      if (playerActedZones[zoneId]) return;

      try {
        var res = await fetch('/api/territory/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ player_id: player.id, zone_id: zoneId, action_type: actionType })
        });

        var data = await res.json();

        if (res.ok && data.success) {
          player.mana = data.mana_remaining;
          playerActedZones[zoneId] = true;
          var pts = data.points_earned;
          var msg = (actionType === 'attack' ? 'Attack' : 'Defend') + ' +' + pts + ' pts';
          if (data.multiplier > 1) msg += ' (x' + data.multiplier + ' bonus)';
          showToast(msg, 'success');

          // Update influence locally
          if (!influence[zoneId]) influence[zoneId] = {};
          if (!influence[zoneId][player.school_id]) influence[zoneId][player.school_id] = 0;
          influence[zoneId][player.school_id] += (actionType === 'attack' ? 20 : 10);

          // Recalculate percentages for this zone
          var total = 0;
          Object.values(influence[zoneId]).forEach(function(v) { total += v; });
          Object.keys(influence[zoneId]).forEach(function(sid) {
            influence[zoneId][sid] = Math.round((influence[zoneId][sid] / total) * 100);
          });

          // Add to local actions
          if (!actionsToday[zoneId]) actionsToday[zoneId] = [];
          actionsToday[zoneId].unshift({
            player: { id: player.id, twitter_handle: player.twitter_handle, profile_image: player.profile_image, school_id: player.school_id },
            action_type: actionType,
            created_at: new Date().toISOString()
          });

          renderPlayerBar();
          renderZoneGrid();
        } else {
          showToast(data.error || 'Action failed', 'error');
        }
      } catch (e) {
        console.error(e);
        showToast('Connection error', 'error');
      }
    }

    // ═══ ZONE MODAL ═══
    function openZoneModal(zoneId) {
      var zone = zones.find(function(z) { return z.id === zoneId; });
      if (!zone) return;

      document.getElementById('modalTitle').textContent = zone.name;
      document.getElementById('modalDesc').textContent = zone.description + (zone.bonus_effect ? ' — ' + zone.bonus_effect : '');

      var body = '';

      // Influence breakdown
      var inf = influence[zoneId];
      body += '<div class="zone-modal__influence">';
      body += '<div class="zone-modal__influence-title">HOUSE INFLUENCE</div>';

      if (inf && Object.keys(inf).length > 0) {
        var entries = [];
        Object.keys(inf).forEach(function(sid) { entries.push({ id: parseInt(sid), pct: inf[sid] }); });
        entries.sort(function(a, b) { return b.pct - a.pct; });
        entries.forEach(function(e) {
          var h = HOUSES[e.id] || { name: '?', color: '#888', img: '' };
          body += '<div class="modal-influence-row">'
            + hImg(h.img, 18)
            + '<span class="modal-influence-name">' + h.name + '</span>'
            + '<div class="modal-influence-bar"><div class="modal-influence-fill" style="width:' + e.pct + '%;background:' + h.color + ';"></div></div>'
            + '<span class="modal-influence-pct">' + e.pct + '%</span>'
            + '</div>';
        });
      } else {
        body += '<div class="modal-empty">No activity yet — be the first!</div>';
      }
      body += '</div>';

      // Today's actions
      var actions = actionsToday[zoneId] || [];
      body += '<div class="zone-modal__actions-title">TODAY\'S ACTIONS (' + actions.length + ')</div>';

      if (actions.length > 0) {
        actions.forEach(function(a) {
          var p = a.player || {};
          var h = HOUSES[p.school_id] || { img: '' };
          var typeClass = a.action_type === 'attack' ? 'modal-action-type--attack' : 'modal-action-type--defend';
          var typeLabel = a.action_type === 'attack' ? 'ATTACK' : 'DEFEND';
          body += '<div class="modal-action-row">'
            + (p.profile_image ? '<img src="' + p.profile_image + '" class="modal-action-avatar">' : '<div class="modal-action-avatar" style="background:var(--bg-inset);display:flex;align-items:center;justify-content:center;">' + hImg(h.img, 16) + '</div>')
            + '<div class="modal-action-info">'
            + '  <div class="modal-action-name">@' + (p.twitter_handle || 'unknown') + '</div>'
            + '  <span class="modal-action-type ' + typeClass + '">' + typeLabel + '</span>'
            + '</div>'
            + '<span class="modal-action-time">' + timeAgo(a.created_at) + '</span>'
            + '</div>';
        });
      } else {
        body += '<div class="modal-empty">No actions yet today</div>';
      }

      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('zoneModalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('zoneModalOverlay').classList.remove('active');
    }

    document.getElementById('zoneModalOverlay').addEventListener('click', function(e) {
      if (e.target.id === 'zoneModalOverlay') closeModal();
    });

    // ═══ LOAD DATA ═══
    async function loadWorld() {
      try {
        var playerId = getPlayerId();
        var fetches = [
          fetch('/api/zones').then(function(r) { return r.json(); }),
          fetch('/api/territory/actions/today').then(function(r) { return r.json(); }),
          fetch('/api/territory/influence').then(function(r) { return r.json(); })
        ];

        if (playerId) {
          fetches.push(fetch('/api/players/' + playerId).then(function(r) { return r.json(); }));
        }

        var results = await Promise.all(fetches);
        zones = results[0] || [];
        actionsToday = results[1] || {};
        influence = results[2] || {};
        player = results[3] || null;

        // Track which zones player already acted on
        if (player) {
          Object.keys(actionsToday).forEach(function(zoneId) {
            var zoneActions = actionsToday[zoneId];
            zoneActions.forEach(function(a) {
              var p = a.player || {};
              if (p.id === player.id) playerActedZones[zoneId] = true;
            });
          });
          renderPlayerBar();
        }

        var loader = document.getElementById('loadingState');
        if (loader) loader.style.display = 'none';

        renderZoneGrid();

      } catch (e) {
        console.error('World load error:', e);
        var loader = document.getElementById('loadingState');
        if (loader) loader.style.display = 'none';
        document.getElementById('zoneGrid').innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-faint);font-style:italic;">Error loading world data</div>';
      }
    }

    loadWorld();
  </script>
</body>
</html>
