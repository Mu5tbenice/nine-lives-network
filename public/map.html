<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Territory Map | Nine Lives Network</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a14;
      color: #fff;
      min-height: 100vh;
    }

    /* ===== TOP NAV BAR ===== */
    .top-nav {
      background: rgba(10, 22, 40, 0.95);
      border-bottom: 2px solid rgba(255, 215, 0, 0.3);
      padding: 0 15px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .top-nav-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto;
      height: 56px;
    }

    .nav-logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: #FFD700;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: #a0a0b0;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #FFD700;
      background: rgba(255, 215, 0, 0.1);
    }

    .nav-links a.logout-btn {
      color: #ff6b6b;
    }

    .nav-links a.logout-btn:hover {
      background: rgba(255, 107, 107, 0.1);
    }

    /* ===== MAIN CONTAINER ===== */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 72px 16px 40px;
    }

    /* ===== PLAYER INFO BAR ===== */
    .player-bar {
      background: #12121f;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .school-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .school-badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .school-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: #a0a0b0;
    }

    .mana-display {
      display: flex;
      gap: 4px;
    }

    .mana-orb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00D4FF;
      box-shadow: 0 0 8px #00D4FF;
    }

    .mana-orb.empty {
      background: #0a0a14;
      box-shadow: none;
      border: 1px solid #2a2a4a;
    }

    /* ===== SECTION HEADERS ===== */
    .section-header {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: #FFD700;
      margin: 24px 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #FFD700, transparent);
    }

    /* ===== TERRITORY CARDS ===== */
    .territory-card {
      background: #12121f;
      border: 2px solid #2a2a4a;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .territory-card.objective {
      border-color: #FFD700;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
      animation: pulse-gold 2s infinite;
    }

    .territory-card.contested {
      border-color: #ff4444;
      box-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
      animation: pulse-red 1.5s infinite;
    }

    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
      50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 68, 68, 0.3); }
      50% { box-shadow: 0 0 30px rgba(255, 68, 68, 0.5); }
    }

    .card-image-placeholder {
      width: 100%;
      height: 100px;
      background: linear-gradient(135deg, #12121f 0%, #1a1a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .card-content {
      padding: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .zone-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: #fff;
      margin-bottom: 4px;
    }

    .zone-type {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.3rem;
      color: #606070;
    }

    .zone-status {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.3rem;
      padding: 4px 8px;
      border-radius: 4px;
      background: #0a0a14;
    }

    .zone-status.objective {
      background: rgba(255, 215, 0, 0.2);
      color: #FFD700;
    }

    .zone-status.contested {
      background: rgba(255, 68, 68, 0.2);
      color: #ff4444;
    }

    /* ===== COUNTDOWN ===== */
    .countdown {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      color: #FFD700;
      margin: 8px 0;
    }

    /* ===== CONTROL BAR ===== */
    .control-info {
      margin: 12px 0;
    }

    .control-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.3rem;
      color: #606070;
      margin-bottom: 6px;
    }

    .control-bar-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-bar {
      flex: 1;
      height: 8px;
      background: #0a0a14;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
    }

    .control-bar-attack {
      background: linear-gradient(90deg, #ff4444, #ff6666);
      height: 100%;
      transition: width 0.3s ease;
    }

    .control-bar-defend {
      background: linear-gradient(90deg, #6666ff, #00D4FF);
      height: 100%;
      transition: width 0.3s ease;
    }

    .control-power {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      color: #606070;
      min-width: 40px;
    }

    .control-power:last-child {
      text-align: right;
    }

    /* ===== ACTION BUTTONS ===== */
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-attack {
      background: linear-gradient(180deg, #cc3333 0%, #991111 100%);
      color: white;
      border: 2px solid #ff4444;
    }

    .btn-attack:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 68, 68, 0.4);
    }

    .btn-defend {
      background: linear-gradient(180deg, #3333cc 0%, #111199 100%);
      color: white;
      border: 2px solid #4444ff;
    }

    .btn-defend:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(68, 68, 255, 0.4);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-cost {
      display: block;
      font-size: 0.3rem;
      margin-top: 4px;
      opacity: 0.8;
    }

    /* ===== ACTIVITY FEED ===== */
    .activity-card {
      background: #12121f;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 16px;
    }

    .activity-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .activity-item:last-child {
      border-bottom: none;
    }

    .activity-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .activity-content {
      flex: 1;
      min-width: 0;
    }

    .activity-text {
      font-size: 0.8rem;
      color: #a0a0b0;
      line-height: 1.4;
    }

    .activity-text a {
      color: #00D4FF;
      text-decoration: none;
    }

    .activity-text .zone-link {
      color: #FFD700;
      cursor: pointer;
    }

    .activity-action {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.3rem;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .activity-action.attack {
      background: rgba(255, 68, 68, 0.2);
      color: #ff6666;
    }

    .activity-action.defend {
      background: rgba(68, 68, 255, 0.2);
      color: #6666ff;
    }

    .activity-time {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.25rem;
      color: #606070;
      margin-top: 4px;
    }

    .no-activity {
      text-align: center;
      color: #606070;
      padding: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
    }

    /* ===== LOADING STATE ===== */
    .loading {
      text-align: center;
      padding: 40px;
      color: #606070;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #2a2a4a;
      border-top-color: #00D4FF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #12121f;
      border: 2px solid #FFD700;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      z-index: 1000;
      transition: transform 0.3s ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      border-color: #00ff88;
    }

    .toast.error {
      border-color: #ff4444;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 380px) {
      .nav-logo {
        font-size: 0.4rem;
      }

      .nav-links a {
        font-size: 0.3rem;
        padding: 6px 8px;
      }

      .zone-name {
        font-size: 0.4rem;
      }

      .btn {
        font-size: 0.35rem;
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="top-nav-content">
      <a href="/" class="nav-logo">Nine Lives Network</a>
      <ul class="nav-links">
        <li><a href="/dashboard.html">Dashboard</a></li>
        <li><a href="/map.html" class="active">Map</a></li>
        <li><a href="/leaderboards.html">Leaderboards</a></li>
        <li><a href="/how-to-play.html">Help</a></li>
        <li><a href="#" class="logout-btn" id="logoutBtn">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <!-- Player Info Bar -->
    <div class="player-bar" id="playerBar">
      <div class="school-info">
        <div class="school-badge" id="schoolBadge">✨</div>
        <div class="school-name" id="schoolName">Loading...</div>
      </div>
      <div class="mana-display" id="manaDisplay"></div>
    </div>

    <!-- Loading State -->
    <div class="loading" id="loadingState">
      <div class="loading-spinner"></div>
      Loading territories...
    </div>

    <!-- Content (hidden until loaded) -->
    <div id="mainContent" style="display: none;">
      <!-- Today's Objective -->
      <div class="section-header">⚔️ TODAY'S OBJECTIVE</div>
      <div id="objectiveSection"></div>

      <!-- Live Activity -->
      <div class="section-header">📡 LIVE ACTIVITY</div>
      <div class="activity-card">
        <div class="activity-list" id="activityList">
          <div class="no-activity">No activity yet today...</div>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // School data
    const schools = {
      1: { name: 'Ember Covenant', emoji: '🔥', color: '#FF4500' },
      2: { name: 'Tidal Conclave', emoji: '🌊', color: '#00BFFF' },
      3: { name: 'Stone Covenant', emoji: '🪨', color: '#8B4513' },
      4: { name: 'Zephyr Circle', emoji: '💨', color: '#98FB98' },
      5: { name: 'Storm Assembly', emoji: '⚡', color: '#FFD700' },
      6: { name: 'Umbral Syndicate', emoji: '🌑', color: '#9932CC' },
      7: { name: 'Radiant Order', emoji: '✨', color: '#FFFACD' },
      8: { name: 'Arcane Spire', emoji: '🔮', color: '#00FFFF' },
      9: { name: 'WildCat Path', emoji: '🐱', color: '#FF1493' }
    };

    // State
    let player = null;
    let zones = [];
    let objective = null;
    let allActions = [];
    let countdownInterval = null;

    // Get player ID
    function getPlayerId() {
      return localStorage.getItem('player_id');
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('player_id');
      window.location.href = '/';
    });

    // Show toast
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Update mana display
    function updateManaDisplay(mana) {
      const container = document.getElementById('manaDisplay');
      container.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const orb = document.createElement('div');
        orb.className = `mana-orb ${i < mana ? '' : 'empty'}`;
        container.appendChild(orb);
      }
    }

    // Format countdown
    function formatCountdown() {
      const now = new Date();
      const end = new Date();
      end.setUTCHours(23, 0, 0, 0);
      if (now >= end) end.setDate(end.getDate() + 1);

      const diff = end - now;
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);

      return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    // Time ago
    function getTimeAgo(ts) {
      const diff = Date.now() - new Date(ts).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      return `${Math.floor(mins / 60)}h ago`;
    }

    // Create objective card
    function createObjectiveCard(zone) {
      const attackPower = zone.attack_power || 0;
      const defendPower = zone.defend_power || 0;
      const totalPower = attackPower + defendPower || 1;
      const attackWidth = (attackPower / totalPower) * 100;
      const defendWidth = (defendPower / totalPower) * 100;

      const canAct = player && player.mana > 0;

      return `
        <div class="territory-card objective">
          <div class="card-image-placeholder">⚔️</div>
          <div class="card-content">
            <div class="card-header">
              <div>
                <div class="zone-name">${zone.name}</div>
                <div class="zone-type">Neutral Territory</div>
              </div>
              <span class="zone-status objective">⚔️ OBJECTIVE</span>
            </div>

            <div class="countdown" id="countdown">⏰ Ends in ${formatCountdown()}</div>

            <div class="control-info">
              <div class="control-label">TODAY'S BATTLE</div>
              <div class="control-bar-container">
                <span class="control-power">⚔️ ${attackPower}</span>
                <div class="control-bar">
                  <div class="control-bar-attack" style="width: ${attackWidth}%"></div>
                  <div class="control-bar-defend" style="width: ${defendWidth}%"></div>
                </div>
                <span class="control-power">🛡️ ${defendPower}</span>
              </div>
            </div>

            <div class="card-actions">
              <button class="btn btn-attack" ${!canAct ? 'disabled' : ''} onclick="performAction(${zone.id}, 'attack')">
                ⚔️ ATTACK
                <span class="btn-cost">1 MANA</span>
              </button>
              <button class="btn btn-defend" ${!canAct ? 'disabled' : ''} onclick="performAction(${zone.id}, 'defend')">
                🛡️ DEFEND
                <span class="btn-cost">1 MANA</span>
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // Render activity feed
    function renderActivityFeed() {
      const container = document.getElementById('activityList');

      if (allActions.length === 0) {
        container.innerHTML = '<div class="no-activity">No activity yet today...</div>';
        return;
      }

      container.innerHTML = allActions.slice(0, 20).map(action => {
        const school = schools[action.school_id] || {};
        const playerName = action.player?.twitter_handle || 'Unknown';
        const zoneName = action.zone_name || 'Unknown Zone';

        return `
          <div class="activity-item">
            <div class="activity-avatar" style="background: ${school.color || '#444'}">
              ${school.emoji || '🐱'}
            </div>
            <div class="activity-content">
              <div class="activity-text">
                <a href="https://twitter.com/${playerName}" target="_blank">@${playerName}</a>
                <span class="activity-action ${action.action_type}">${action.action_type === 'attack' ? '⚔️ ATK' : '🛡️ DEF'}</span>
                <span class="zone-link">${zoneName}</span>
              </div>
              <div class="activity-time">${getTimeAgo(action.created_at)}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Perform action
    async function performAction(zoneId, actionType) {
      if (!player || player.mana <= 0) {
        showToast('Not enough mana!', 'error');
        return;
      }

      try {
        const response = await fetch('/api/territory/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            player_id: player.id,
            zone_id: zoneId,
            action_type: actionType
          })
        });

        const result = await response.json();

        if (result.success) {
          showToast(`${actionType === 'attack' ? '⚔️ Attack' : '🛡️ Defend'} successful! +${result.points} points`, 'success');
          player.mana = result.mana_remaining;
          updateManaDisplay(player.mana);
          loadData();
        } else {
          showToast(result.error || 'Action failed', 'error');
        }
      } catch (error) {
        showToast('Network error', 'error');
        console.error(error);
      }
    }

    // Load all data
    async function loadData() {
      try {
        const playerId = getPlayerId();

        // Load player data
        if (playerId) {
          const playerRes = await fetch(`/api/players/${playerId}`);
          if (playerRes.ok) {
            player = await playerRes.json();
            const school = schools[player.school_id];
            document.getElementById('schoolBadge').textContent = school.emoji;
            document.getElementById('schoolBadge').style.background = school.color;
            document.getElementById('schoolName').textContent = school.name;
            updateManaDisplay(player.mana);
          }
        } else {
          document.getElementById('schoolName').innerHTML = '<a href="/register.html" style="color:#00D4FF;text-decoration:none;">Login to play</a>';
        }

        // Load zones
        const zonesRes = await fetch('/api/zones');
        zones = await zonesRes.json();

        // Find objective
        objective = zones.find(z => z.is_current_objective);

        // Render objective
        document.getElementById('objectiveSection').innerHTML = objective
          ? createObjectiveCard(objective)
          : '<div class="no-activity">No objective set today</div>';

        // Load activity
        try {
          const actionsRes = await fetch('/api/territory/actions/today');
          if (actionsRes.ok) {
            const todayActions = await actionsRes.json();
            allActions = [];
            Object.values(todayActions).forEach(za => {
              if (Array.isArray(za)) allActions.push(...za);
            });
            allActions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            renderActivityFeed();
          }
        } catch (e) {
          console.log('Activity API not ready');
        }

        // Show content
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        // Start countdown
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
          const el = document.getElementById('countdown');
          if (el) el.textContent = `⏰ Ends in ${formatCountdown()}`;
        }, 1000);

      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('loadingState').innerHTML = `
          <div style="color: #ff4444">Error loading data</div>
          <div style="margin-top: 10px;">
            <a href="/register.html" style="color: #00D4FF;">Register</a> or 
            <a href="/" style="color: #00D4FF;">return home</a>
          </div>
        `;
      }
    }

    // Initialize
    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
