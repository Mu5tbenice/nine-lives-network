<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Boss Raid | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <style>
    :root{--bg-deep:#120e1e;--bg-warm:#1a1528;--bg-card:rgba(30,22,42,0.7);--border:rgba(212,166,75,0.12);--border-glow:rgba(212,166,75,0.3);--gold:#D4A64B;--gold-dim:rgba(212,166,75,0.15);--text-bright:#F5F0E8;--text-body:#D4C8B8;--text-muted:#9B8E7E;--text-faint:#6B5E50;--sunset:#e8855a;--sky:#8BB4E0;--green:#6acd8a;--red:#e85a6a;--cyan:#6ac8d8;--purple:#b088e8;--font-title:'Cinzel',serif;--font-body:'Crimson Text',Georgia,serif;--font-data:'Press Start 2P',monospace;--font-mono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(232,90,106,0.08) 0%,transparent 50%),radial-gradient(ellipse at 20% 60%,rgba(176,136,232,0.06) 0%,transparent 40%),linear-gradient(180deg,#1a1528 0%,#120e1e 30%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body)}
    a{color:var(--gold);text-decoration:none}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}
    .main{max-width:500px;margin:0 auto;padding:14px}
    .section-label{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
    .section-label__text{font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
    .section-label__line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
    .boss-card{border-radius:16px;background:var(--bg-card);border:1px solid var(--red);padding:20px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
    .boss-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(232,90,106,0.08) 0%,transparent 60%);pointer-events:none}
    .hp-bar-bg{width:100%;height:16px;border-radius:8px;background:rgba(255,255,255,0.06);overflow:hidden;margin:12px 0}
    .hp-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--red),#c03040);transition:width 1s}
    .dmg-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:4px}
    .attack-btn{width:100%;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-title);font-size:14px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,var(--sunset),#c06030);color:#fff;box-shadow:0 4px 0 #8a4020,0 6px 16px rgba(232,133,90,0.25)}
    .attack-btn:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}
  </style>
  <link rel="stylesheet" href="/css/card-slot-v4.css">
</head>
<body>
<script src="/js/nav.js"></script>
  <div class="main" id="content"><div style="text-align:center;padding:60px 20px;"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div></div></div>
<script src="/js/card-particles.js"></script>
<script src="/js/card-v4.js"></script>
<script>
var playerId=null;
function getPlayerId(){var p=new URLSearchParams(window.location.search);var f=p.get('player_id');if(f){localStorage.setItem('player_id',f);return f;}return localStorage.getItem('player_id');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

async function loadBoss(){
  playerId=getPlayerId();
  if(!playerId){document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px"><a href="/register.html" style="font-family:var(--font-title);font-size:16px;">Register to play →</a></div>';return;}

  var boss=null,leaderboard=[];
  try{var bR=await fetch('/api/boss/status');if(bR.ok)boss=await bR.json();}catch(e){}
  try{var lR=await fetch('/api/boss/contributions/'+playerId+'');if(lR.ok){var ld=await lR.json();leaderboard=ld.leaderboard||ld||[];}}catch(e){}
  var playerSpells=[];
  try{var cR2=await fetch('/api/packs/collection/'+playerId);if(cR2.ok){var cd2=await cR2.json();playerSpells=(cd2.cards||cd2||[]).slice(0,6);}}catch(e){}

  var html='';
  html+='<div class="section-label"><span style="font-size:14px;">🐉</span><span class="section-label__text">WEEKLY BOSS RAID</span><span class="section-label__line"></span></div>';
  html+='<p style="font-family:var(--font-body);font-size:14px;color:var(--text-muted);margin-bottom:14px;">All guilds unite against the weekly boss. Deal damage with your cards. Top damage dealers earn bonus rewards.</p>';

  if(boss&&boss.name){
    var hpPct=boss.max_hp?Math.max(0,Math.round((boss.current_hp/boss.max_hp)*100)):100;
    html+='<div class="boss-card">';
    html+='<div style="font-size:64px;margin-bottom:8px;animation:pulse 3s ease-in-out infinite;">🐉</div>';
    html+='<div style="font-family:var(--font-title);font-size:22px;font-weight:900;color:var(--text-bright);letter-spacing:2px;">'+esc(boss.name)+'</div>';
    if(boss.title)html+='<div style="font-family:var(--font-mono);font-size:9px;color:var(--red);margin-top:4px;">'+esc(boss.title)+'</div>';
    html+='<div class="hp-bar-bg"><div class="hp-bar-fill" style="width:'+hpPct+'%;"></div></div>';
    html+='<div style="font-family:var(--font-data);font-size:9px;color:var(--red);">💀 '+(boss.current_hp||0).toLocaleString()+' / '+(boss.max_hp||0).toLocaleString()+' HP</div>';
    html+='<div style="display:flex;justify-content:center;gap:16px;margin-top:12px;">';
    html+='<div><div style="font-family:var(--font-data);font-size:10px;color:var(--sunset);">⚔️ '+(boss.atk||'?')+'</div><div style="font-family:var(--font-mono);font-size:7px;color:var(--text-faint);">ATK</div></div>';
    html+='<div><div style="font-family:var(--font-data);font-size:10px;color:var(--purple);">🛡️ '+(boss.def||'?')+'</div><div style="font-family:var(--font-mono);font-size:7px;color:var(--text-faint);">DEF</div></div>';
    html+='</div></div>';
    html+='<button class="attack-btn" id="atkBtn" onclick="attackBoss()">🔥 ATTACK BOSS — 2 MANA</button>';
  }else{
    html+='<div class="boss-card">';
    html+='<div style="font-size:48px;margin-bottom:12px;opacity:0.3;">🐉</div>';
    html+='<div style="font-family:var(--font-title);font-size:18px;color:var(--text-muted);">No Active Boss</div>';
    html+='<p style="font-size:13px;color:var(--text-faint);margin-top:8px;">The next boss spawns Monday at 00:30 UTC.</p>';
    html+='</div>';
  }

  // Damage leaderboard
  if(leaderboard.length>0){
    html+='<div class="section-label" style="margin-top:16px;"><span style="font-size:14px;">🏆</span><span class="section-label__text">TOP DAMAGE</span><span class="section-label__line"></span></div>';
    leaderboard.slice(0,10).forEach(function(d,i){
      var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);
      html+='<div class="dmg-row">';
      html+='<span style="font-family:var(--font-data);font-size:8px;min-width:28px;">'+medal+'</span>';
      html+='<span style="flex:1;font-family:var(--font-mono);font-size:10px;color:var(--text-bright);">@'+esc(d.twitter_handle||'???')+'</span>';
      html+='<span style="font-family:var(--font-data);font-size:8px;color:var(--sunset);">'+(d.total_damage||0).toLocaleString()+' DMG</span>';
      html+='</div>';
    });
  }

  
  // Your Spells
  if(playerSpells.length>0){
    html+='<div class="section-label" style="margin-top:16px;"><span style="font-size:14px;">🃏</span><span class="section-label__text">YOUR SPELLS</span><span class="section-label__line"></span></div>';
    html+='<div style="display:flex;flex-wrap:wrap;gap:8px;padding:8px 0;justify-content:center;">';
    playerSpells.forEach(function(s,i){
      var card={
        id:s.id,name:s.spell_name||s.name,house:s.spell_house||s.house||'universal',
        rarity:s.rarity||'common',type:s.spell_type||s.type||'attack',
        base_atk:s.base_atk||0,base_hp:s.base_hp||0,base_spd:s.base_spd||0,
        effects:s.spell_effects||s.effects||[],
        current_charges:s.current_charges,max_charges:s.max_charges,
        is_exhausted:s.is_exhausted
      };
      html+=buildSpellCard(card,{size:'mini',delay:i*0.03});
    });
    html+='</div>';
  }

  document.getElementById('content').innerHTML=html;
}

async function attackBoss(){
  var btn=document.getElementById('atkBtn');
  btn.disabled=true;btn.textContent='ATTACKING...';
  try{
    var r=await fetch('/api/boss/attack',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({player_id:playerId})});
    if(r.ok){
      var res=await r.json();
      btn.textContent='💥 '+(res.damage||0)+' DAMAGE!';
      setTimeout(function(){loadBoss();},2000);
    }else{
      var err=await r.json().catch(function(){return{error:'Failed'};});
      btn.textContent='❌ '+(err.error||'Failed');
      setTimeout(function(){loadBoss();},2000);
    }
  }catch(e){
    btn.textContent='❌ Network error';
    setTimeout(function(){loadBoss();},2000);
  }
}

loadBoss();
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script src="/js/card-slot-helper.js"></script>
<script>
/* ═══ V4 OVERRIDE — forces all card rendering through card-v4.js ═══ */
if(typeof buildCardV4==='function'){
  buildCard=function(s,d){return buildCardV4(s,{delay:d||0});};
  buildSpellCard=function(s,opts){return buildCardV4(s,opts);};
}
</script>

</body>
</html>
