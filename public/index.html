<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Nine Lives Network | Cast Spells. Control Territory. Rule Avaloris.</title>
  <link rel="stylesheet" href="/css/styles.css">

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    /* ===== CSS RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      overflow-x: hidden;
      width: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    body {
      background: linear-gradient(180deg, #0a1628 0%, #1a2a4a 50%, #0a1628 100%);
      font-family: 'Press Start 2P', monospace;
    }

    /* ===== FULL SCREEN 3D CANVAS ===== */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* ===== BOTTOM FADE ===== */
    .bottom-fade {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(10, 22, 40, 0.6) 15%,
        rgba(10, 22, 40, 0.95) 35%,
        rgba(10, 22, 40, 1) 50%,
        rgba(10, 22, 40, 1) 100%
      );
      z-index: 2;
      pointer-events: none;
    }

    /* ===== PARTICLES ===== */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent-gold, #FFD700);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.6; }
      50% { transform: translateY(-30px) translateX(10px); opacity: 0.3; }
    }

    /* ===== UI OVERLAY ===== */
    .landing-container {
      position: relative;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 15px;
      z-index: 10;
      pointer-events: none;
    }

    .landing-container a,
    .landing-container button {
      pointer-events: auto;
    }

    /* ===== TITLE - MOBILE FIRST ===== */
    .game-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.1rem;
      background: linear-gradient(180deg, #00ffff 0%, #ffcc00 50%, #ff6600 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .game-tagline {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      color: #a0a0b0;
      text-align: center;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    /* ===== SEASON BADGE ===== */
    .season-badge {
      background: linear-gradient(135deg, #9932CC, #6B238E);
      padding: 6px 14px;
      border-radius: 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      color: white;
      margin-bottom: 15px;
      box-shadow: 0 0 15px rgba(153, 50, 204, 0.5);
    }

    /* ===== HOW TO PLAY BUTTON ===== */
    .how-to-play-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      min-height: 48px; /* Touch target */
      background: rgba(10, 22, 40, 0.8);
      border: 2px solid var(--accent-gold, #FFD700);
      color: var(--accent-gold, #FFD700);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
      border-radius: 4px;
    }

    .how-to-play-btn:hover,
    .how-to-play-btn:active {
      background: rgba(255, 215, 0, 0.2);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    /* ===== MODEL SPACER ===== */
    .model-spacer {
      flex: 1;
      min-height: 180px;
    }

    /* ===== PLAY NOW BUTTON ===== */
    .play-now-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      min-height: 56px; /* Large touch target */
      background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
      border: none;
      color: #000;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 5px 0 #996600, 0 0 25px rgba(255, 215, 0, 0.4);
      margin-bottom: 20px;
      border-radius: 4px;
    }

    .play-now-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #996600, 0 0 15px rgba(255, 215, 0, 0.4);
    }

    /* ===== MOBILE NAV BUTTONS ===== */
    .mobile-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
      width: 100%;
      max-width: 360px;
    }

    .mobile-nav-btn {
      flex: 1;
      min-width: 100px;
      padding: 12px 8px;
      min-height: 48px;
      background: rgba(10, 22, 40, 0.9);
      border: 2px solid var(--accent-gold, #FFD700);
      color: var(--accent-gold, #FFD700);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      text-decoration: none;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .mobile-nav-btn:active {
      background: rgba(255, 215, 0, 0.2);
    }

    .mobile-nav-btn .icon {
      font-size: 1rem;
    }

    /* ===== FOOTER ===== */
    .footer-links {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      padding-top: 15px;
      position: relative;
      z-index: 20;
    }

    .footer-links a {
      color: #606070;
      font-size: 0.35rem;
      text-decoration: none;
      padding: 8px;
      pointer-events: auto;
    }

    .footer-links a:active {
      color: var(--accent-gold, #FFD700);
    }

    /* =============================================
       TABLET & DESKTOP STYLES (min-width: 768px)
       ============================================= */
    @media (min-width: 768px) {
      .landing-container {
        padding: 30px 20px;
      }

      .game-title {
        font-size: 2rem;
        margin-bottom: 15px;
        letter-spacing: 2px;
      }

      .game-tagline {
        font-size: 0.7rem;
        margin-bottom: 20px;
      }

      .season-badge {
        font-size: 0.5rem;
        padding: 8px 20px;
        margin-bottom: 25px;
      }

      .how-to-play-btn {
        font-size: 0.55rem;
        padding: 14px 28px;
        margin-bottom: 20px;
      }

      .model-spacer {
        min-height: 250px;
      }

      .play-now-btn {
        font-size: 0.8rem;
        padding: 18px 50px;
        margin-bottom: 25px;
      }

      /* Desktop: horizontal nav row */
      .mobile-nav {
        max-width: 600px;
        gap: 15px;
      }

      .mobile-nav-btn {
        flex-direction: row;
        font-size: 0.45rem;
        padding: 14px 24px;
        gap: 8px;
      }

      .footer-links a {
        font-size: 0.45rem;
      }
    }

    /* =============================================
       LARGE DESKTOP (min-width: 1024px)
       ============================================= */
    @media (min-width: 1024px) {
      .game-title {
        font-size: 2.5rem;
      }

      .game-tagline {
        font-size: 0.8rem;
      }

      .model-spacer {
        min-height: 280px;
      }

      .mobile-nav-btn {
        font-size: 0.5rem;
        padding: 14px 30px;
      }

      .play-now-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 0 #996600, 0 0 40px rgba(255, 215, 0, 0.6);
      }

      .mobile-nav-btn:hover {
        background: rgba(255, 215, 0, 0.15);
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
      }

      .how-to-play-btn:hover {
        background: rgba(255, 215, 0, 0.2);
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
      }
    }

    /* =============================================
       SMALL MOBILE (max-width: 380px)
       ============================================= */
    @media (max-width: 380px) {
      .game-title {
        font-size: 0.9rem;
      }

      .game-tagline {
        font-size: 0.35rem;
      }

      .model-spacer {
        min-height: 150px;
      }

      .play-now-btn {
        font-size: 0.55rem;
        padding: 14px 30px;
      }

      .mobile-nav-btn {
        font-size: 0.3rem;
      }

      .bottom-fade {
        height: 50%;
      }
    }

    /* =============================================
       LANDSCAPE MOBILE
       ============================================= */
    @media (max-height: 500px) and (orientation: landscape) {
      .landing-container {
        padding: 10px 15px;
      }

      .game-title {
        font-size: 1rem;
        margin-bottom: 5px;
      }

      .game-tagline {
        display: none;
      }

      .season-badge {
        margin-bottom: 10px;
      }

      .how-to-play-btn {
        margin-bottom: 10px;
        padding: 10px 20px;
        min-height: 40px;
      }

      .model-spacer {
        min-height: 80px;
      }

      .play-now-btn {
        padding: 12px 30px;
        min-height: 44px;
        margin-bottom: 10px;
      }

      .mobile-nav {
        margin-bottom: 10px;
      }

      .bottom-fade {
        height: 45%;
      }
    }
  </style>
</head>
<body>
  <!-- Full Screen 3D Canvas -->
  <div id="canvas-container"></div>

  <!-- Bottom Fade -->
  <div class="bottom-fade"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- UI Overlay -->
  <div class="landing-container">
    <h1 class="game-title">NINE LIVES NETWORK</h1>
    <p class="game-tagline">Cast spells. Control territory. Rule Avaloris.</p>

    <div class="season-badge">Season 0 - Beta</div>

    <a href="/how-to-play.html" class="how-to-play-btn">
      <span>❓</span> How To Play
    </a>

    <div class="model-spacer"></div>

    <a href="/register.html" class="play-now-btn" id="ctaButton">▶ Play Now</a>

    <!-- Unified nav for mobile & desktop -->
    <div class="mobile-nav">
      <a href="/map.html" class="mobile-nav-btn">
        <span class="icon">🗺️</span>
        <span>Map</span>
      </a>
      <a href="/leaderboards.html" class="mobile-nav-btn">
        <span class="icon">🏆</span>
        <span>Ranks</span>
      </a>
      <a href="/dashboard.html" class="mobile-nav-btn">
        <span class="icon">📊</span>
        <span>Dashboard</span>
      </a>
    </div>

    <div class="footer-links">
      <a href="/terms.html">Terms</a>
      <a href="/privacy.html">Privacy</a>
      <a href="https://twitter.com/9LVNetwork" target="_blank">Twitter</a>
    </div>
  </div>

  <script>
    // ===== DEVICE DETECTION =====
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const isSmallScreen = window.innerWidth < 768;
    const isLandscape = window.innerWidth > window.innerHeight;

    // ===== PARTICLES (fewer on mobile for performance) =====
    function createParticles() {
      const container = document.getElementById('particles');
      const colors = ['#FFD700', '#00FFFF', '#FF6600', '#9932CC'];
      const count = isMobile ? 15 : 30;

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (6 + Math.random() * 4) + 's';
        container.appendChild(particle);
      }
    }

    // ===== THREE.JS - RESPONSIVE 3D MODEL =====
    let scene, camera, renderer, wizardCat;
    let mouseX = 0, mouseY = 0;
    let windowHalfX = window.innerWidth / 2;
    let windowHalfY = window.innerHeight / 2;

    function getCameraSettings() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const isLandscape = width > height;

      if (width < 480) {
        // Small mobile
        return { z: 6, modelY: -1.8, fade: 50 };
      } else if (width < 768) {
        // Mobile
        return { z: 6.5, modelY: -1.9, fade: 52 };
      } else if (width < 1024) {
        // Tablet
        return { z: 7, modelY: -2, fade: 55 };
      } else {
        // Desktop
        return { z: 7, modelY: -2, fade: 55 };
      }
    }

    function init3D() {
      const container = document.getElementById('canvas-container');
      const settings = getCameraSettings();

      scene = new THREE.Scene();

      // Responsive camera
      camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 2, settings.z);
      camera.lookAt(0, 1, 0);

      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 2 : 3));
      renderer.setClearColor(0x000000, 0);
      renderer.outputEncoding = THREE.sRGBEncoding;
      container.appendChild(renderer.domElement);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
      mainLight.position.set(5, 5, 7);
      scene.add(mainLight);

      const purpleLight = new THREE.PointLight(0x8A2BE2, 0.6, 20);
      purpleLight.position.set(-4, 4, 5);
      scene.add(purpleLight);

      const goldLight = new THREE.PointLight(0xFFD700, 0.5, 20);
      goldLight.position.set(4, 4, 5);
      scene.add(goldLight);

      const cyanLight = new THREE.PointLight(0x00D4FF, 0.4, 15);
      cyanLight.position.set(0, 5, -4);
      scene.add(cyanLight);

      // Load Model
      const loader = new THREE.GLTFLoader();
      loader.load(
        '/assets/models/wizard-cat.glb',
        (gltf) => {
          wizardCat = gltf.scene;
          wizardCat.scale.set(1, 1, 1);
          wizardCat.position.set(0, settings.modelY, 0);

          wizardCat.traverse((child) => {
            if (child.name === 'Backdrop' || child.name === 'Plane' || child.name === 'Plane.002') {
              child.visible = false;
            }
          });

          scene.add(wizardCat);
        },
        undefined,
        (error) => console.log('Model load error:', error)
      );

      // Mouse/touch tracking
      if (isMobile) {
        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 0) {
            mouseX = (e.touches[0].clientX - windowHalfX) / windowHalfX;
            mouseY = (e.touches[0].clientY - windowHalfY) / windowHalfY;
          }
        }, { passive: true });

        // Also track device orientation for tilt effect
        if (window.DeviceOrientationEvent) {
          window.addEventListener('deviceorientation', (e) => {
            if (e.gamma !== null && e.beta !== null) {
              mouseX = Math.max(-1, Math.min(1, e.gamma / 30));
              mouseY = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
            }
          });
        }
      } else {
        document.addEventListener('mousemove', (e) => {
          mouseX = (e.clientX - windowHalfX) / windowHalfX;
          mouseY = (e.clientY - windowHalfY) / windowHalfY;
        });
      }

      // Resize handler
      window.addEventListener('resize', () => {
        const newSettings = getCameraSettings();
        windowHalfX = window.innerWidth / 2;
        windowHalfY = window.innerHeight / 2;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.position.z = newSettings.z;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);

        if (wizardCat) {
          wizardCat.position.y = newSettings.modelY;
        }

        // Update fade
        document.querySelector('.bottom-fade').style.height = newSettings.fade + '%';
      });

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);

      if (wizardCat) {
        const settings = getCameraSettings();
        const targetRotationY = mouseX * 0.8;
        const targetRotationX = mouseY * 0.3;

        wizardCat.rotation.y += (targetRotationY - wizardCat.rotation.y) * 0.08;
        wizardCat.rotation.x += (targetRotationX - wizardCat.rotation.x) * 0.08;
        wizardCat.position.y = settings.modelY + Math.sin(Date.now() * 0.001) * 0.02;
      }

      renderer.render(scene, camera);
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      init3D();

      // Check login
      const playerId = localStorage.getItem('player_id');
      if (playerId) {
        const ctaButton = document.getElementById('ctaButton');
        ctaButton.href = '/dashboard.html';
        ctaButton.textContent = '📊 Dashboard';
      }
    });
  </script>
</body>
</html>
