<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nine Lives Network | Enter the Realm</title>
  <meta name="description" content="A social-competitive game where wizard cats compete for territory control in the fantasy world of Avaloris.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css">

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    /* Main Container */
    .splash-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Magical Background */
    .magic-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 80%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 70%),
        var(--bg-dark);
      z-index: -2;
    }

    /* Three.js Canvas Container */
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #canvas-container canvas {
      display: block;
    }

    /* Mystical Glow Behind Cat */
    .cat-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(138, 43, 226, 0.4) 0%, rgba(255, 215, 0, 0.2) 30%, transparent 60%);
      animation: pulseGlow 3s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(40px);
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -60%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -60%) scale(1.15); }
    }

    /* Floating Particles */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent-gold);
      border-radius: 50%;
      animation: particleFloat 8s ease-in-out infinite;
      opacity: 0.6;
    }

    @keyframes particleFloat {
      0%, 100% { 
        transform: translateY(0) translateX(0); 
        opacity: 0.6;
      }
      25% { 
        transform: translateY(-100px) translateX(20px); 
        opacity: 1;
      }
      50% { 
        transform: translateY(-200px) translateX(-10px); 
        opacity: 0.8;
      }
      75% { 
        transform: translateY(-100px) translateX(-20px); 
        opacity: 0.4;
      }
    }

    /* UI Overlay */
    .ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    /* Title at top */
    .title-container {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: auto;
    }

    .splash-title {
      font-family: var(--font-main);
      font-size: 1.75rem;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 0.5rem;
    }

    .splash-subtitle {
      font-family: var(--font-body);
      font-size: 1.25rem;
      color: var(--text-secondary);
    }

    /* Orbital Menu Buttons */
    .menu-buttons {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      pointer-events: none;
    }

    .menu-btn {
      position: absolute;
      pointer-events: auto;
      font-family: var(--font-main);
      font-size: 0.625rem;
      padding: 1rem 1.5rem;
      background: rgba(10, 10, 15, 0.8);
      border: 2px solid var(--accent-gold);
      color: var(--accent-gold);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .menu-btn:hover {
      background: var(--accent-gold);
      color: var(--bg-dark);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
      transform: scale(1.1);
    }

    .menu-btn:active {
      transform: scale(1.05);
    }

    /* Button Positions - Arranged around the cat */
    .btn-play {
      top: 50%;
      right: -20px;
      transform: translateY(-50%);
    }

    .btn-play:hover {
      transform: translateY(-50%) scale(1.1);
    }

    .btn-map {
      top: 50%;
      left: -20px;
      transform: translateY(-50%);
    }

    .btn-map:hover {
      transform: translateY(-50%) scale(1.1);
    }

    .btn-leaderboard {
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
    }

    .btn-leaderboard:hover {
      transform: translateX(-50%) scale(1.1);
    }

    .btn-howto {
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
    }

    .btn-howto:hover {
      transform: translateX(-50%) scale(1.1);
    }

    /* Primary CTA - Bigger and glowing */
    .btn-play {
      font-size: 0.75rem;
      padding: 1.25rem 2rem;
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
      50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
    }

    /* Bottom Info */
    .bottom-info {
      position: absolute;
      bottom: 3%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: auto;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .social-links a {
      color: var(--text-secondary);
      font-size: 1.25rem;
      transition: color 0.2s ease;
    }

    .social-links a:hover {
      color: var(--accent-gold);
    }

    .copyright {
      font-family: var(--font-body);
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* Season Badge */
    .season-badge {
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-main);
      font-size: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--accent-purple);
      color: var(--text-primary);
      border-radius: 4px;
      pointer-events: auto;
    }

    /* Loading Screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      font-family: var(--font-main);
      font-size: 0.75rem;
      color: var(--accent-gold);
      margin-top: 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--bg-light);
      border-top-color: var(--accent-gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .splash-title {
        font-size: 1rem;
      }

      .splash-subtitle {
        font-size: 1rem;
      }

      .menu-buttons {
        width: 320px;
        height: 400px;
      }

      .menu-btn {
        font-size: 0.5rem;
        padding: 0.75rem 1rem;
      }

      .btn-play {
        font-size: 0.625rem;
        padding: 1rem 1.5rem;
        right: -10px;
      }

      .btn-map {
        left: -10px;
      }

      .cat-glow {
        width: 280px;
        height: 280px;
      }

      .title-container {
        top: 3%;
      }

      .season-badge {
        top: 12%;
      }
    }

    @media (max-width: 480px) {
      .splash-title {
        font-size: 0.75rem;
        letter-spacing: 2px;
      }

      .menu-buttons {
        width: 280px;
        height: 350px;
      }

      .menu-btn {
        font-size: 0.4rem;
        padding: 0.6rem 0.8rem;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Summoning wizard cat...</div>
  </div>

  <!-- Magic Background -->
  <div class="magic-bg"></div>

  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>

  <!-- Mystical Glow -->
  <div class="cat-glow"></div>

  <!-- Three.js Canvas -->
  <div id="canvas-container"></div>

  <!-- UI Overlay -->
  <div class="ui-overlay">
    <!-- Title -->
    <div class="title-container">
      <h1 class="splash-title">Nine Lives Network</h1>
      <p class="splash-subtitle">Cast spells. Control territory. Rule Avaloris.</p>
    </div>

    <!-- Season Badge -->
    <div class="season-badge">Season 0 - Beta</div>

    <!-- Orbital Menu Buttons -->
    <div class="menu-buttons">
      <a href="/register.html" class="menu-btn btn-play" id="ctaButton">Enter Realm</a>
      <a href="/map.html" class="menu-btn btn-map">Map</a>
      <a href="/leaderboards.html" class="menu-btn btn-leaderboard">Leaderboards</a>
      <a href="/how-to-play.html" class="menu-btn btn-howto">How to Play</a>
    </div>

    <!-- Bottom Info -->
    <div class="bottom-info">
      <div class="social-links">
        <a href="https://twitter.com/9LVNetwork" target="_blank" title="@9LVNetwork">𝕏</a>
        <a href="https://twitter.com/9LV_Nerm" target="_blank" title="@9LV_Nerm">🐱</a>
      </div>
      <p class="copyright">© 2025 Nine Lives Network</p>
    </div>
  </div>

  <script>
    // =============================================
    // Three.js Wizard Cat Head - Mario 64 Style
    // =============================================

    let scene, camera, renderer, wizardCat, mixer;
    let mouseX = 0, mouseY = 0;
    let targetRotationX = 0, targetRotationY = 0;
    let windowHalfX = window.innerWidth / 2;
    let windowHalfY = window.innerHeight / 2;

    // Initialize
    init();
    animate();

    function init() {
      const container = document.getElementById('canvas-container');

      // Scene
      scene = new THREE.Scene();

      // Camera - positioned to frame head and upper body
      camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 4.2, 6); // Adjusted to frame head
      camera.lookAt(0, 4, 0); // Look at head height

      // Renderer
      renderer = new THREE.WebGLRenderer({ 
        antialias: true, 
        alpha: true 
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);
      renderer.outputEncoding = THREE.sRGBEncoding;
      container.appendChild(renderer.domElement);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
      mainLight.position.set(5, 10, 7);
      scene.add(mainLight);

      // Purple accent light from below left
      const purpleLight = new THREE.PointLight(0x8A2BE2, 0.5, 20);
      purpleLight.position.set(-3, 2, 3);
      scene.add(purpleLight);

      // Gold accent light from right
      const goldLight = new THREE.PointLight(0xFFD700, 0.4, 20);
      goldLight.position.set(3, 5, 2);
      scene.add(goldLight);

      // Cyan rim light from behind
      const cyanLight = new THREE.PointLight(0x00D4FF, 0.3, 15);
      cyanLight.position.set(0, 4, -4);
      scene.add(cyanLight);

      // Load wizard cat model
      const loader = new THREE.GLTFLoader();
      loader.load(
        '/assets/models/wizard-cat.glb',
        function(gltf) {
          wizardCat = gltf.scene;

          // Scale and position the model
          wizardCat.scale.set(1, 1, 1);
          wizardCat.position.set(0, 0, 0);

          // Find and hide the backdrop if it exists
          wizardCat.traverse((child) => {
            if (child.name === 'Backdrop' || child.name === 'Plane' || child.name === 'Plane.002') {
              child.visible = false;
            }
          });

          scene.add(wizardCat);

          // Hide loading screen
          setTimeout(() => {
            document.getElementById('loadingScreen').classList.add('hidden');
          }, 500);
        },
        function(progress) {
          // Loading progress
          const percent = (progress.loaded / progress.total * 100).toFixed(0);
          console.log('Loading: ' + percent + '%');
        },
        function(error) {
          console.error('Error loading model:', error);
          // Hide loading screen even on error
          document.getElementById('loadingScreen').classList.add('hidden');
        }
      );

      // Event listeners
      document.addEventListener('mousemove', onMouseMove, false);
      document.addEventListener('touchmove', onTouchMove, { passive: false });
      window.addEventListener('resize', onWindowResize, false);

      // Create particles
      createParticles();
    }

    function onMouseMove(event) {
      mouseX = (event.clientX - windowHalfX) / windowHalfX;
      mouseY = (event.clientY - windowHalfY) / windowHalfY;
    }

    function onTouchMove(event) {
      if (event.touches.length === 1) {
        event.preventDefault();
        mouseX = (event.touches[0].clientX - windowHalfX) / windowHalfX;
        mouseY = (event.touches[0].clientY - windowHalfY) / windowHalfY;
      }
    }

    function onWindowResize() {
      windowHalfX = window.innerWidth / 2;
      windowHalfY = window.innerHeight / 2;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      if (wizardCat) {
        // Smooth rotation following mouse (Mario 64 style)
        targetRotationY = mouseX * 0.5; // Left-right rotation
        targetRotationX = mouseY * 0.3; // Up-down rotation (subtle)

        // Smooth interpolation
        wizardCat.rotation.y += (targetRotationY - wizardCat.rotation.y) * 0.05;
        wizardCat.rotation.x += (targetRotationX - wizardCat.rotation.x) * 0.05;

        // Subtle floating animation
        wizardCat.position.y = Math.sin(Date.now() * 0.001) * 0.1;
      }

      renderer.render(scene, camera);
    }

    // Create floating particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 30;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (6 + Math.random() * 4) + 's';

        // Random colors
        const colors = ['#FFD700', '#8A2BE2', '#00D4FF', '#FF6B35'];
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];

        particlesContainer.appendChild(particle);
      }
    }

    // Check if user is logged in
    document.addEventListener('DOMContentLoaded', () => {
      const playerId = localStorage.getItem('player_id');
      if (playerId) {
        const ctaButton = document.getElementById('ctaButton');
        ctaButton.href = '/dashboard.html';
        ctaButton.textContent = 'Dashboard';
      }
    });
  </script>
</body>
</html>
