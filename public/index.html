<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nine Lives Network | Cast Spells. Control Territory. Rule Avaloris.</title>
  <link rel="stylesheet" href="/css/styles.css">

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      overflow-x: hidden;
      width: 100%;
      min-height: 100vh;
    }

    body {
      background: linear-gradient(180deg, #0a1628 0%, #1a2a4a 50%, #0a1628 100%);
      font-family: 'Press Start 2P', monospace;
    }

    /* ===== FULL SCREEN 3D CANVAS (Behind everything) ===== */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* ===== BOTTOM FADE - Hides body/arms ===== */
    .bottom-fade {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(10, 22, 40, 0.6) 15%,
        rgba(10, 22, 40, 0.95) 35%,
        rgba(10, 22, 40, 1) 50%,
        rgba(10, 22, 40, 1) 100%
      );
      z-index: 2;
      pointer-events: none;
    }

    /* ===== PARTICLES ===== */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent-gold);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.6; }
      50% { transform: translateY(-30px) translateX(10px); opacity: 0.3; }
    }

    /* ===== UI OVERLAY (Above everything) ===== */
    .landing-container {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 30px 20px;
      z-index: 10;
      pointer-events: none;
    }

    /* Make interactive elements clickable */
    .landing-container a,
    .landing-container button {
      pointer-events: auto;
    }

    /* ===== TITLE ===== */
    .game-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.2rem, 5vw, 2.5rem);
      background: linear-gradient(180deg, #00ffff 0%, #ffcc00 50%, #ff6600 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 15px;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
      letter-spacing: 2px;
    }

    .game-tagline {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.5rem, 2vw, 0.8rem);
      color: #a0a0b0;
      text-align: center;
      margin-bottom: 20px;
    }

    /* ===== SEASON BADGE ===== */
    .season-badge {
      background: linear-gradient(135deg, #9932CC, #6B238E);
      padding: 8px 20px;
      border-radius: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: white;
      margin-bottom: 25px;
      box-shadow: 0 0 15px rgba(153, 50, 204, 0.5);
    }

    /* ===== HOW TO PLAY - TOP BUTTON ===== */
    .how-to-play-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(10, 22, 40, 0.8);
      border: 2px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .how-to-play-btn:hover {
      background: rgba(255, 215, 0, 0.2);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    /* ===== SPACER FOR 3D MODEL ===== */
    .model-spacer {
      flex: 1;
      min-height: 250px;
    }

    /* ===== PLAY NOW - PRIMARY CTA ===== */
    .play-now-btn {
      display: inline-block;
      padding: 18px 50px;
      background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
      border: none;
      color: #000;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 0 #996600, 0 0 30px rgba(255, 215, 0, 0.4);
      margin-bottom: 25px;
      position: relative;
      z-index: 20;
    }

    .play-now-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #996600, 0 0 50px rgba(255, 215, 0, 0.6);
    }

    .play-now-btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #996600, 0 0 20px rgba(255, 215, 0, 0.4);
    }

    /* ===== SECONDARY BUTTONS ===== */
    .secondary-buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 20;
    }

    .secondary-btn {
      display: inline-block;
      padding: 14px 30px;
      background: rgba(10, 22, 40, 0.9);
      border: 2px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 150px;
      text-align: center;
    }

    .secondary-btn:hover {
      background: rgba(255, 215, 0, 0.2);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    /* ===== MOBILE DROPDOWN MENU ===== */
    .mobile-menu {
      display: none;
      position: relative;
      margin-bottom: 20px;
      z-index: 20;
    }

    .mobile-menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 24px;
      background: rgba(20, 30, 50, 0.9);
      border: 2px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      text-transform: uppercase;
      cursor: pointer;
      min-width: 200px;
    }

    .mobile-menu-btn::after {
      content: '▼';
      font-size: 0.4rem;
      transition: transform 0.3s ease;
    }

    .mobile-menu.open .mobile-menu-btn::after {
      transform: rotate(180deg);
    }

    .mobile-menu-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(10, 20, 40, 0.98);
      border: 2px solid var(--accent-gold);
      border-top: none;
      display: none;
      flex-direction: column;
      z-index: 100;
    }

    .mobile-menu.open .mobile-menu-dropdown {
      display: flex;
    }

    .mobile-menu-dropdown a {
      padding: 14px 20px;
      color: var(--text-secondary);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
      transition: all 0.2s ease;
    }

    .mobile-menu-dropdown a:last-child {
      border-bottom: none;
    }

    .mobile-menu-dropdown a:hover {
      background: rgba(255, 215, 0, 0.1);
      color: var(--accent-gold);
    }

    /* ===== FOOTER LINKS ===== */
    .footer-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      padding-top: 20px;
      position: relative;
      z-index: 20;
    }

    .footer-links a {
      color: var(--text-muted);
      font-size: 0.5rem;
      text-decoration: none;
      transition: color 0.2s ease;
      pointer-events: auto;
    }

    .footer-links a:hover {
      color: var(--accent-gold);
    }

    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 768px) {
      .landing-container {
        padding: 20px 15px;
      }

      .game-title {
        font-size: 1.2rem;
        margin-bottom: 10px;
      }

      .game-tagline {
        font-size: 0.45rem;
        margin-bottom: 15px;
      }

      .season-badge {
        font-size: 0.4rem;
        padding: 6px 15px;
        margin-bottom: 15px;
      }

      .how-to-play-btn {
        font-size: 0.5rem;
        padding: 10px 20px;
        margin-bottom: 15px;
      }

      .model-spacer {
        min-height: 200px;
      }

      .play-now-btn {
        font-size: 0.65rem;
        padding: 14px 35px;
        margin-bottom: 20px;
      }

      .secondary-buttons {
        display: none;
      }

      .mobile-menu {
        display: block;
      }

      .footer-links a {
        font-size: 0.4rem;
      }

      .bottom-fade {
        height: 50%;
      }
    }

    @media (max-width: 400px) {
      .game-title {
        font-size: 1rem;
      }

      .play-now-btn {
        padding: 12px 25px;
        font-size: 0.55rem;
      }

      .model-spacer {
        min-height: 150px;
      }
    }
  </style>
</head>
<body>
  <!-- Full Screen 3D Canvas (Behind everything) -->
  <div id="canvas-container"></div>

  <!-- Bottom Fade - Hides body/arms -->
  <div class="bottom-fade"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- UI Overlay -->
  <div class="landing-container">
    <!-- Title -->
    <h1 class="game-title">NINE LIVES NETWORK</h1>
    <p class="game-tagline">Cast spells. Control territory. Rule Avaloris.</p>

    <!-- Season Badge -->
    <div class="season-badge">Season 0 - Beta</div>

    <!-- How To Play - TOP -->
    <a href="/how-to-play.html" class="how-to-play-btn">
      <span>❓</span> How To Play
    </a>

    <!-- Spacer for 3D Model -->
    <div class="model-spacer"></div>

    <!-- Play Now - PRIMARY CTA -->
    <a href="/register.html" class="play-now-btn" id="ctaButton">▶ Play Now</a>

    <!-- Secondary Buttons (Desktop) -->
    <div class="secondary-buttons">
      <a href="/map.html" class="secondary-btn">🗺️ Map</a>
      <a href="/leaderboards.html" class="secondary-btn">🏆 Leaderboards</a>
      <a href="/dashboard.html" class="secondary-btn">📊 Dashboard</a>
    </div>

    <!-- Mobile Dropdown Menu -->
    <div class="mobile-menu" id="mobileMenu">
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
        Navigate
      </button>
      <div class="mobile-menu-dropdown">
        <a href="/dashboard.html">📊 Dashboard</a>
        <a href="/map.html">🗺️ Map</a>
        <a href="/leaderboards.html">🏆 Leaderboards</a>
      </div>
    </div>

    <!-- Footer Links -->
    <div class="footer-links">
      <a href="/terms.html">Terms of Service</a>
      <a href="/privacy.html">Privacy Policy</a>
      <a href="https://twitter.com/9LVNetwork" target="_blank">Twitter</a>
    </div>
  </div>

  <script>
    // ===== PARTICLES =====
    function createParticles() {
      const container = document.getElementById('particles');
      const colors = ['#FFD700', '#00FFFF', '#FF6600', '#9932CC'];

      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (6 + Math.random() * 4) + 's';
        container.appendChild(particle);
      }
    }

    // ===== MOBILE MENU =====
    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      menu.classList.toggle('open');
    }

    document.addEventListener('click', (e) => {
      const menu = document.getElementById('mobileMenu');
      if (!menu.contains(e.target)) {
        menu.classList.remove('open');
      }
    });

    // ===== THREE.JS 3D MODEL - FULL SCREEN =====
    let scene, camera, renderer, wizardCat;
    let mouseX = 0, mouseY = 0;
    let windowHalfX = window.innerWidth / 2;
    let windowHalfY = window.innerHeight / 2;

    function init3D() {
      const container = document.getElementById('canvas-container');

      // Scene
      scene = new THREE.Scene();

      // Camera - EVEN CLOSER (z: 10 -> 7)
      camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 2, 7);
      camera.lookAt(0, 1, 0);

      // Renderer - Full screen
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);
      renderer.outputEncoding = THREE.sRGBEncoding;
      container.appendChild(renderer.domElement);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
      mainLight.position.set(5, 5, 7);
      scene.add(mainLight);

      const purpleLight = new THREE.PointLight(0x8A2BE2, 0.6, 20);
      purpleLight.position.set(-4, 4, 5);
      scene.add(purpleLight);

      const goldLight = new THREE.PointLight(0xFFD700, 0.5, 20);
      goldLight.position.set(4, 4, 5);
      scene.add(goldLight);

      const cyanLight = new THREE.PointLight(0x00D4FF, 0.4, 15);
      cyanLight.position.set(0, 5, -4);
      scene.add(cyanLight);

      // Load Model
      const loader = new THREE.GLTFLoader();
      loader.load(
        '/assets/models/wizard-cat.glb',
        (gltf) => {
          wizardCat = gltf.scene;

          // Position adjusted for closer zoom
          wizardCat.scale.set(1, 1, 1);
          wizardCat.position.set(0, -2, 0);

          // Hide backdrop
          wizardCat.traverse((child) => {
            if (child.name === 'Backdrop' || child.name === 'Plane' || child.name === 'Plane.002') {
              child.visible = false;
            }
          });

          scene.add(wizardCat);
        },
        undefined,
        (error) => {
          console.log('Model load error:', error);
        }
      );

      // Mouse tracking
      document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX - windowHalfX) / windowHalfX;
        mouseY = (e.clientY - windowHalfY) / windowHalfY;
      });

      document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
          mouseX = (e.touches[0].clientX - windowHalfX) / windowHalfX;
          mouseY = (e.touches[0].clientY - windowHalfY) / windowHalfY;
        }
      });

      window.addEventListener('resize', () => {
        windowHalfX = window.innerWidth / 2;
        windowHalfY = window.innerHeight / 2;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);

      if (wizardCat) {
        // Mario 64 style head tracking
        const targetRotationY = mouseX * 0.8;
        const targetRotationX = mouseY * 0.3;

        wizardCat.rotation.y += (targetRotationY - wizardCat.rotation.y) * 0.08;
        wizardCat.rotation.x += (targetRotationX - wizardCat.rotation.x) * 0.08;

        // Subtle float
        wizardCat.position.y = -2 + Math.sin(Date.now() * 0.001) * 0.02;
      }

      renderer.render(scene, camera);
    }

    // ===== CHECK LOGIN =====
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      init3D();

      const playerId = localStorage.getItem('player_id');
      if (playerId) {
        const ctaButton = document.getElementById('ctaButton');
        ctaButton.href = '/dashboard.html';
        ctaButton.textContent = '📊 Dashboard';
      }
    });
  </script>
</body>
</html>
