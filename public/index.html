<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nine Lives Network | Cast Spells. Control Territory. Rule Avaloris.</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #0a1628 0%, #1a2a4a 50%, #0a1628 100%);
      min-height: 100vh;
      overflow-x: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    /* ===== PARTICLES ===== */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent-gold);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.6; }
      50% { transform: translateY(-30px) translateX(10px); opacity: 0.3; }
    }

    /* ===== MAIN CONTAINER ===== */
    .landing-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 30px 20px;
      position: relative;
      z-index: 1;
    }

    /* ===== TITLE ===== */
    .game-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.2rem, 5vw, 2.5rem);
      background: linear-gradient(180deg, #00ffff 0%, #ffcc00 50%, #ff6600 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 15px;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
      letter-spacing: 2px;
    }

    .game-tagline {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.5rem, 2vw, 0.8rem);
      color: #a0a0b0;
      text-align: center;
      margin-bottom: 20px;
    }

    /* ===== SEASON BADGE ===== */
    .season-badge {
      background: linear-gradient(135deg, #9932CC, #6B238E);
      padding: 8px 20px;
      border-radius: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      color: white;
      margin-bottom: 25px;
      box-shadow: 0 0 15px rgba(153, 50, 204, 0.5);
    }

    /* ===== HOW TO PLAY - TOP BUTTON ===== */
    .how-to-play-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: transparent;
      border: 2px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .how-to-play-btn:hover {
      background: rgba(255, 215, 0, 0.1);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    /* ===== 3D MODEL CONTAINER ===== */
    .model-container {
      width: 100%;
      max-width: 500px;
      height: 300px;
      position: relative;
      margin-bottom: 20px;
    }

    #wizard-cat-canvas {
      width: 100%;
      height: 100%;
    }

    /* ===== PLAY NOW - PRIMARY CTA ===== */
    .play-now-btn {
      display: inline-block;
      padding: 18px 50px;
      background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
      border: none;
      color: #000;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 0 #996600, 0 0 30px rgba(255, 215, 0, 0.4);
      margin-bottom: 25px;
    }

    .play-now-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #996600, 0 0 50px rgba(255, 215, 0, 0.6);
    }

    .play-now-btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #996600, 0 0 20px rgba(255, 215, 0, 0.4);
    }

    /* ===== SECONDARY BUTTONS (Map, Leaderboards) ===== */
    .secondary-buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .secondary-btn {
      display: inline-block;
      padding: 14px 30px;
      background: transparent;
      border: 2px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 150px;
      text-align: center;
    }

    .secondary-btn:hover {
      background: rgba(255, 215, 0, 0.1);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    /* ===== MOBILE DROPDOWN MENU ===== */
    .mobile-menu {
      display: none;
      position: relative;
      margin-bottom: 20px;
    }

    .mobile-menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 24px;
      background: rgba(20, 30, 50, 0.9);
      border: 2px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      text-transform: uppercase;
      cursor: pointer;
      min-width: 200px;
    }

    .mobile-menu-btn::after {
      content: '▼';
      font-size: 0.4rem;
      transition: transform 0.3s ease;
    }

    .mobile-menu.open .mobile-menu-btn::after {
      transform: rotate(180deg);
    }

    .mobile-menu-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(10, 20, 40, 0.98);
      border: 2px solid var(--accent-gold);
      border-top: none;
      display: none;
      flex-direction: column;
      z-index: 100;
    }

    .mobile-menu.open .mobile-menu-dropdown {
      display: flex;
    }

    .mobile-menu-dropdown a {
      padding: 14px 20px;
      color: var(--text-secondary);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 215, 0, 0.2);
      transition: all 0.2s ease;
    }

    .mobile-menu-dropdown a:last-child {
      border-bottom: none;
    }

    .mobile-menu-dropdown a:hover {
      background: rgba(255, 215, 0, 0.1);
      color: var(--accent-gold);
    }

    /* ===== FOOTER LINKS ===== */
    .footer-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: auto;
      padding-top: 30px;
    }

    .footer-links a {
      color: var(--text-muted);
      font-size: 0.5rem;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-links a:hover {
      color: var(--accent-gold);
    }

    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 768px) {
      .landing-container {
        padding: 20px 15px;
      }

      .game-title {
        font-size: 1.2rem;
        margin-bottom: 10px;
      }

      .game-tagline {
        font-size: 0.45rem;
        margin-bottom: 15px;
      }

      .season-badge {
        font-size: 0.4rem;
        padding: 6px 15px;
        margin-bottom: 15px;
      }

      .how-to-play-btn {
        font-size: 0.5rem;
        padding: 10px 20px;
        margin-bottom: 15px;
      }

      .model-container {
        height: 220px;
        margin-bottom: 15px;
      }

      .play-now-btn {
        font-size: 0.65rem;
        padding: 14px 35px;
        margin-bottom: 20px;
      }

      /* Hide desktop secondary buttons on mobile */
      .secondary-buttons {
        display: none;
      }

      /* Show mobile dropdown on mobile */
      .mobile-menu {
        display: block;
      }

      .footer-links {
        padding-top: 20px;
      }

      .footer-links a {
        font-size: 0.4rem;
      }
    }

    /* Very small screens */
    @media (max-width: 400px) {
      .game-title {
        font-size: 1rem;
      }

      .play-now-btn {
        padding: 12px 25px;
        font-size: 0.55rem;
      }

      .model-container {
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <!-- Particles Background -->
  <div class="particles" id="particles"></div>

  <div class="landing-container">
    <!-- Title -->
    <h1 class="game-title">NINE LIVES NETWORK</h1>
    <p class="game-tagline">Cast spells. Control territory. Rule Avaloris.</p>

    <!-- Season Badge -->
    <div class="season-badge">Season 0 - Beta</div>

    <!-- How To Play - TOP (most important for new users) -->
    <a href="/how-to-play.html" class="how-to-play-btn">
      <span>❓</span> How To Play
    </a>

    <!-- 3D Wizard Cat Model -->
    <div class="model-container">
      <canvas id="wizard-cat-canvas"></canvas>
    </div>

    <!-- Play Now - PRIMARY CTA (Yellow, stands out) -->
    <a href="/register.html" class="play-now-btn">▶ Play Now</a>

    <!-- Secondary Buttons (Desktop) -->
    <div class="secondary-buttons">
      <a href="/map.html" class="secondary-btn">🗺️ Map</a>
      <a href="/leaderboards.html" class="secondary-btn">🏆 Leaderboards</a>
      <a href="/dashboard.html" class="secondary-btn">📊 Dashboard</a>
    </div>

    <!-- Mobile Dropdown Menu -->
    <div class="mobile-menu" id="mobileMenu">
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
        Navigate
      </button>
      <div class="mobile-menu-dropdown">
        <a href="/dashboard.html">📊 Dashboard</a>
        <a href="/map.html">🗺️ Map</a>
        <a href="/leaderboards.html">🏆 Leaderboards</a>
      </div>
    </div>

    <!-- Footer Links -->
    <div class="footer-links">
      <a href="/terms.html">Terms of Service</a>
      <a href="/privacy.html">Privacy Policy</a>
      <a href="https://twitter.com/9LVNetwork" target="_blank">Twitter</a>
    </div>
  </div>

  <!-- Three.js for 3D Model -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    // ===== PARTICLES =====
    function createParticles() {
      const container = document.getElementById('particles');
      const colors = ['#FFD700', '#00FFFF', '#FF6600', '#9932CC'];

      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (6 + Math.random() * 4) + 's';
        container.appendChild(particle);
      }
    }

    // ===== MOBILE MENU =====
    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      menu.classList.toggle('open');
    }

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('mobileMenu');
      if (!menu.contains(e.target)) {
        menu.classList.remove('open');
      }
    });

    // ===== THREE.JS 3D MODEL =====
    let scene, camera, renderer, model;
    let mouseX = 0, mouseY = 0;

    function init3D() {
      const canvas = document.getElementById('wizard-cat-canvas');
      const container = canvas.parentElement;

      // Scene
      scene = new THREE.Scene();

      // Camera
      camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(0, 0.5, 3);

      // Renderer
      renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const frontLight = new THREE.DirectionalLight(0xffffff, 0.8);
      frontLight.position.set(0, 2, 3);
      scene.add(frontLight);

      const backLight = new THREE.DirectionalLight(0x00ffff, 0.3);
      backLight.position.set(0, 1, -3);
      scene.add(backLight);

      // Load Model
      const loader = new THREE.GLTFLoader();
      loader.load(
        '/assets/models/wizard-cat.glb',
        (gltf) => {
          model = gltf.scene;
          model.scale.set(1.8, 1.8, 1.8);
          model.position.set(0, -0.5, 0);
          scene.add(model);
        },
        undefined,
        (error) => {
          console.log('Model load error:', error);
          // Fallback: show placeholder
          const geometry = new THREE.SphereGeometry(0.8, 32, 32);
          const material = new THREE.MeshStandardMaterial({ color: 0x44aa44 });
          model = new THREE.Mesh(geometry, material);
          scene.add(model);
        }
      );

      // Mouse tracking
      document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = (e.clientY / window.innerHeight) * 2 - 1;
      });

      // Touch tracking for mobile
      document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
          mouseX = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
          mouseY = (e.touches[0].clientY / window.innerHeight) * 2 - 1;
        }
      });

      // Resize handler
      window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      });

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);

      if (model) {
        // Smooth rotation following mouse (Mario 64 style)
        const targetRotationY = mouseX * 0.5;
        const targetRotationX = mouseY * 0.3;

        model.rotation.y += (targetRotationY - model.rotation.y) * 0.05;
        model.rotation.x += (targetRotationX - model.rotation.x) * 0.05;

        // Subtle idle animation
        model.position.y = -0.5 + Math.sin(Date.now() * 0.001) * 0.03;
      }

      renderer.render(scene, camera);
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      init3D();
    });
  </script>
</body>
</html>
