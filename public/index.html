<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nine Lives Network | Cast Spells. Control Territory. Rule Avaloris.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      overflow-x: hidden;
      width: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    body {
      background: linear-gradient(180deg, #080810 0%, #0e1020 50%, #080810 100%);
      font-family: 'Cinzel', serif;
    }

    /* ═══ 3D Canvas ═══ */
    #canvas-container {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    /* ═══ Bottom fade ═══ */
    .bottom-fade {
      position: fixed; bottom: 0; left: 0;
      width: 100%; height: 50%;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(8, 8, 16, 0.5) 20%,
        rgba(8, 8, 16, 0.9) 50%,
        rgba(8, 8, 16, 1) 70%,
        rgba(8, 8, 16, 1) 100%
      );
      z-index: 2; pointer-events: none;
    }

    /* ═══ Particles ═══ */
    .particles {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; overflow: hidden; z-index: 3;
    }
    .particle {
      position: absolute; width: 3px; height: 3px;
      border-radius: 50%; opacity: 0.5;
      animation: float 8s infinite ease-in-out;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.5; }
      50% { transform: translateY(-25px) translateX(8px); opacity: 0.2; }
    }

    /* ═══ UI Overlay ═══ */
    .landing-container {
      position: relative; height: 100vh; height: -webkit-fill-available;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 15px; z-index: 10; pointer-events: none;
    }
    .landing-container a, .landing-container button { pointer-events: auto; }

    .model-spacer { flex: 1; }

    /* ═══ Title ═══ */
    .game-title {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: #D4A64B;
      text-align: center;
      letter-spacing: 5px;
      text-shadow: 0 0 30px rgba(212, 166, 75, 0.3);
    }

    .game-tagline {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 14px;
      color: #7a7668;
      text-align: center;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* ═══ Season badge ═══ */
    .season-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(212, 166, 75, 0.08);
      border: 1px solid rgba(212, 166, 75, 0.2);
      padding: 6px 14px; border-radius: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; color: #D4A64B;
      letter-spacing: 1px; margin-top: 12px;
    }
    .season-badge__dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #44cc44; animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ═══ How to play link ═══ */
    .how-link {
      font-family: 'Cinzel', serif;
      font-size: 12px; font-weight: 600;
      color: #7a7668; text-decoration: none;
      letter-spacing: 2px; margin-top: 14px;
      padding: 8px 16px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.3s;
    }
    .how-link:hover { color: #D4A64B; border-color: rgba(212,166,75,0.2); }

    /* ═══ Bottom section ═══ */
    .bottom-section {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      z-index: 20; pointer-events: auto;
    }

    /* ═══ Play button ═══ */
    .play-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 16px 44px; min-height: 52px;
      background: linear-gradient(180deg, #D4A64B 0%, #b8903d 100%);
      border: none; color: #080810;
      font-family: 'Cinzel', serif;
      font-weight: 700; font-size: 15px;
      text-decoration: none; text-transform: uppercase;
      letter-spacing: 3px; cursor: pointer;
      border-radius: 8px;
      box-shadow: 0 4px 0 #8a6d2f, 0 0 30px rgba(212, 166, 75, 0.3);
      transition: all 0.15s;
      margin-bottom: 16px;
    }
    .play-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #8a6d2f;
    }

    /* ═══ Footer ═══ */
    .footer-links {
      display: flex; gap: 16px; justify-content: center;
    }
    .footer-links a {
      color: #4a4840; font-family: 'Crimson Text', serif;
      font-size: 12px; text-decoration: none; padding: 6px;
      transition: color 0.3s; pointer-events: auto;
    }
    .footer-links a:hover { color: #7a7668; }

    /* ═══ Tablet ═══ */
    @media (min-width: 768px) {
      .game-title { font-size: 2.2rem; letter-spacing: 8px; }
      .game-tagline { font-size: 16px; }
      .season-badge { font-size: 8px; padding: 7px 18px; }
      .how-link { font-size: 13px; }
      .play-btn { font-size: 17px; padding: 18px 52px; }
      .footer-links a { font-size: 13px; }
      .bottom-fade { height: 40%; }
    }

    /* ═══ Desktop ═══ */
    @media (min-width: 1024px) {
      .game-title { font-size: 2.8rem; }
      .play-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 7px 0 #8a6d2f, 0 0 40px rgba(212, 166, 75, 0.5);
      }
      .how-link:hover { background: rgba(212,166,75,0.06); }
    }

    /* ═══ Small mobile ═══ */
    @media (max-width: 380px) {
      .game-title { font-size: 1.1rem; letter-spacing: 3px; }
    }
  </style>
</head>
<body>

  <!-- 3D Canvas -->
  <div id="canvas-container"></div>

  <!-- Bottom Fade -->
  <div class="bottom-fade"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- UI -->
  <div class="landing-container">
    <h1 class="game-title">Nine Lives Network</h1>
    <p class="game-tagline">Cast spells. Control territory. Rule Avaloris.</p>

    <div class="model-spacer"></div>

    <div class="bottom-section">
      <div class="season-badge">
        <div class="season-badge__dot"></div>
        SEASON 0 LIVE
      </div>
      <a href="/how-to-play.html" class="how-link">How To Play</a>
      <a href="/register.html" class="play-btn" id="ctaButton">Enter the Realm</a>

      <div class="footer-links">
        <a href="/terms.html">Terms</a>
        <a href="/privacy.html">Privacy</a>
        <a href="https://twitter.com/9LVNetwork" target="_blank">@9LVNetwork</a>
      </div>
    </div>
  </div>

  <script>
    // ═══ PARTICLES ═══
    function createParticles() {
      var container = document.getElementById('particles');
      var colors = ['#D4A64B', '#b8903d', '#8a6d2f', '#4a4840'];
      var isMobile = window.innerWidth < 768;
      var count = isMobile ? 12 : 25;

      for (var i = 0; i < count; i++) {
        var particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (6 + Math.random() * 4) + 's';
        container.appendChild(particle);
      }
    }

    // ═══ THREE.JS (unchanged) ═══
    var scene, camera, renderer, wizardCat;
    var mouseX = 0, mouseY = 0;
    var windowHalfX = window.innerWidth / 2;
    var windowHalfY = window.innerHeight / 2;

    var MODEL_SETTINGS = {
      cameraZ: 7,
      cameraY: 2.5,
      lookAtY: 0.5,
      modelY: -3.2,
      modelScale: 1
    };

    function init3D() {
      var container = document.getElementById('canvas-container');

      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, MODEL_SETTINGS.cameraY, MODEL_SETTINGS.cameraZ);
      camera.lookAt(0, MODEL_SETTINGS.lookAtY, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);
      renderer.outputEncoding = THREE.sRGBEncoding;
      container.appendChild(renderer.domElement);

      var ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      var mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
      mainLight.position.set(5, 5, 7);
      scene.add(mainLight);

      var purpleLight = new THREE.PointLight(0x8A2BE2, 0.6, 20);
      purpleLight.position.set(-4, 4, 5);
      scene.add(purpleLight);

      var goldLight = new THREE.PointLight(0xD4A64B, 0.5, 20);
      goldLight.position.set(4, 4, 5);
      scene.add(goldLight);

      var cyanLight = new THREE.PointLight(0x00D4FF, 0.3, 15);
      cyanLight.position.set(0, 5, -4);
      scene.add(cyanLight);

      var loader = new THREE.GLTFLoader();
      loader.load(
        '/assets/models/wizard-cat.glb',
        function(gltf) {
          wizardCat = gltf.scene;
          wizardCat.scale.set(MODEL_SETTINGS.modelScale, MODEL_SETTINGS.modelScale, MODEL_SETTINGS.modelScale);
          wizardCat.position.set(0, MODEL_SETTINGS.modelY, 0);

          wizardCat.traverse(function(child) {
            if (child.name === 'Backdrop' || child.name === 'Plane' || child.name === 'Plane.002') {
              child.visible = false;
            }
          });

          scene.add(wizardCat);
        },
        undefined,
        function(error) { console.log('Model load error:', error); }
      );

      document.addEventListener('mousemove', function(e) {
        mouseX = (e.clientX - windowHalfX) / windowHalfX;
        mouseY = (e.clientY - windowHalfY) / windowHalfY;
      });

      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 0) {
          mouseX = (e.touches[0].clientX - windowHalfX) / windowHalfX;
          mouseY = (e.touches[0].clientY - windowHalfY) / windowHalfY;
        }
      }, { passive: true });

      window.addEventListener('resize', function() {
        windowHalfX = window.innerWidth / 2;
        windowHalfY = window.innerHeight / 2;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);

      if (wizardCat) {
        var targetRotationY = mouseX * 0.5;
        var targetRotationX = mouseY * 0.2;

        wizardCat.rotation.y += (targetRotationY - wizardCat.rotation.y) * 0.08;
        wizardCat.rotation.x += (targetRotationX - wizardCat.rotation.x) * 0.08;

        wizardCat.position.y = MODEL_SETTINGS.modelY + Math.sin(Date.now() * 0.001) * 0.05;
      }

      renderer.render(scene, camera);
    }

    document.addEventListener('DOMContentLoaded', function() {
      createParticles();
      init3D();

      var playerId = localStorage.getItem('player_id');
      if (playerId) {
        var ctaButton = document.getElementById('ctaButton');
        ctaButton.href = '/dashboard.html';
        ctaButton.textContent = 'Dashboard';
      }
    });
  </script>
</body>
</html>
