<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nine Lives Network | Cast Spells. Control Territory. Rule Avaloris.</title>
  <link rel="stylesheet" href="/css/styles.css">

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      overflow-x: hidden;
      width: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    body {
      background: linear-gradient(180deg, #0a1628 0%, #1a2a4a 50%, #0a1628 100%);
      font-family: 'Press Start 2P', monospace;
    }

    /* ===== 3D CANVAS - FIXED POSITION ===== */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* ===== BOTTOM FADE - hides body/arms ===== */
    .bottom-fade {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(10, 22, 40, 0.5) 20%,
        rgba(10, 22, 40, 0.9) 50%,
        rgba(10, 22, 40, 1) 70%,
        rgba(10, 22, 40, 1) 100%
      );
      z-index: 2;
      pointer-events: none;
    }

    /* ===== PARTICLES ===== */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent-gold, #FFD700);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.6; }
      50% { transform: translateY(-30px) translateX(10px); opacity: 0.3; }
    }

    /* ===== UI OVERLAY ===== */
    .landing-container {
      position: relative;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 15px;
      z-index: 10;
      pointer-events: none;
    }

    .landing-container a,
    .landing-container button {
      pointer-events: auto;
    }

    /* ===== TITLE ===== */
    .game-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.1rem;
      background: linear-gradient(180deg, #00ffff 0%, #ffcc00 50%, #ff6600 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .game-tagline {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      color: #a0a0b0;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    /* ===== SEASON BADGE ===== */
    .season-badge {
      background: linear-gradient(135deg, #9932CC, #6B238E);
      padding: 6px 14px;
      border-radius: 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      color: white;
      margin-bottom: 12px;
      box-shadow: 0 0 15px rgba(153, 50, 204, 0.5);
    }

    /* ===== HOW TO PLAY BUTTON ===== */
    .how-to-play-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      min-height: 44px;
      background: rgba(10, 22, 40, 0.8);
      border: 2px solid var(--accent-gold, #FFD700);
      color: var(--accent-gold, #FFD700);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 4px;
    }

    /* ===== SPACER - PUSHES BUTTONS DOWN ===== */
    .model-spacer {
      flex: 1;
    }

    /* ===== PLAY NOW BUTTON ===== */
    .play-now-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      min-height: 56px;
      background: linear-gradient(180deg, #FFD700 0%, #FFA500 100%);
      border: none;
      color: #000;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 5px 0 #996600, 0 0 25px rgba(255, 215, 0, 0.4);
      margin-bottom: 15px;
      border-radius: 4px;
      position: relative;
      z-index: 20;
    }

    .play-now-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #996600;
    }

    /* ===== NAV BUTTONS ===== */
    .nav-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 15px;
      width: 100%;
      max-width: 360px;
      position: relative;
      z-index: 20;
    }

    .nav-btn {
      flex: 1;
      min-width: 90px;
      padding: 12px 8px;
      min-height: 48px;
      background: rgba(10, 22, 40, 0.9);
      border: 2px solid var(--accent-gold, #FFD700);
      color: var(--accent-gold, #FFD700);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.3rem;
      text-decoration: none;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .nav-btn .icon {
      font-size: 1.1rem;
    }

    /* ===== FOOTER ===== */
    .footer-links {
      display: flex;
      gap: 15px;
      justify-content: center;
      position: relative;
      z-index: 20;
    }

    .footer-links a {
      color: #606070;
      font-size: 0.35rem;
      text-decoration: none;
      padding: 8px;
      pointer-events: auto;
    }

    /* ===== TABLET (768px+) ===== */
    @media (min-width: 768px) {
      .game-title {
        font-size: 2rem;
      }

      .game-tagline {
        font-size: 0.6rem;
      }

      .season-badge {
        font-size: 0.45rem;
        padding: 8px 18px;
      }

      .how-to-play-btn {
        font-size: 0.5rem;
        padding: 14px 28px;
      }

      .play-now-btn {
        font-size: 0.8rem;
        padding: 18px 50px;
      }

      .nav-buttons {
        max-width: 500px;
        gap: 15px;
      }

      .nav-btn {
        font-size: 0.4rem;
        flex-direction: row;
        gap: 8px;
        padding: 14px 20px;
      }

      .footer-links a {
        font-size: 0.45rem;
      }

      .bottom-fade {
        height: 40%;
      }
    }

    /* ===== DESKTOP (1024px+) ===== */
    @media (min-width: 1024px) {
      .game-title {
        font-size: 2.5rem;
      }

      .play-now-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 0 #996600, 0 0 40px rgba(255, 215, 0, 0.6);
      }

      .nav-btn:hover {
        background: rgba(255, 215, 0, 0.15);
      }

      .how-to-play-btn:hover {
        background: rgba(255, 215, 0, 0.2);
      }
    }

    /* ===== SMALL MOBILE (380px and below) ===== */
    @media (max-width: 380px) {
      .game-title {
        font-size: 0.9rem;
      }

      .nav-btn {
        font-size: 0.25rem;
        min-width: 80px;
      }
    }
  </style>
</head>
<body>
  <!-- 3D Canvas -->
  <div id="canvas-container"></div>

  <!-- Bottom Fade -->
  <div class="bottom-fade"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- UI -->
  <div class="landing-container">
    <h1 class="game-title">NINE LIVES NETWORK</h1>
    <p class="game-tagline">Cast spells. Control territory. Rule Avaloris.</p>

    <div class="season-badge">Season 0 - Beta</div>

    <a href="/how-to-play.html" class="how-to-play-btn">
      ❓ How To Play
    </a>

    <div class="model-spacer"></div>

    <a href="/register.html" class="play-now-btn" id="ctaButton">▶ PLAY NOW</a>

    <div class="model-spacer"></div>

    <div class="footer-links">
      <a href="/terms.html">Terms</a>
      <a href="/privacy.html">Privacy</a>
      <a href="https://twitter.com/9LVNetwork" target="_blank">Twitter</a>
    </div>
  </div>

  <script>
    // ===== PARTICLES =====
    function createParticles() {
      const container = document.getElementById('particles');
      const colors = ['#FFD700', '#00FFFF', '#FF6600', '#9932CC'];
      const isMobile = window.innerWidth < 768;
      const count = isMobile ? 15 : 30;

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (6 + Math.random() * 4) + 's';
        container.appendChild(particle);
      }
    }

    // ===== THREE.JS =====
    let scene, camera, renderer, wizardCat;
    let mouseX = 0, mouseY = 0;
    let windowHalfX = window.innerWidth / 2;
    let windowHalfY = window.innerHeight / 2;

    // ========================================
    // 🔒 MODEL SETTINGS - FROM WORKING VERSION
    // Camera close, model positioned to show face in center
    // ========================================
    const MODEL_SETTINGS = {
      cameraZ: 7,         // Close to model (zoomed in)
      cameraY: 1.5,       // Camera height
      lookAtY: 0.5,       // Look slightly below center
      modelY: -2.2,       // Model position - face visible in middle
      modelScale: 1       // Model scale
    };
    // ========================================

    function init3D() {
      const container = document.getElementById('canvas-container');

      scene = new THREE.Scene();

      // Camera
      camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, MODEL_SETTINGS.cameraY, MODEL_SETTINGS.cameraZ);
      camera.lookAt(0, MODEL_SETTINGS.lookAtY, 0);

      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);
      renderer.outputEncoding = THREE.sRGBEncoding;
      container.appendChild(renderer.domElement);

      // Lighting
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
      mainLight.position.set(5, 5, 7);
      scene.add(mainLight);

      const purpleLight = new THREE.PointLight(0x8A2BE2, 0.6, 20);
      purpleLight.position.set(-4, 4, 5);
      scene.add(purpleLight);

      const goldLight = new THREE.PointLight(0xFFD700, 0.5, 20);
      goldLight.position.set(4, 4, 5);
      scene.add(goldLight);

      const cyanLight = new THREE.PointLight(0x00D4FF, 0.4, 15);
      cyanLight.position.set(0, 5, -4);
      scene.add(cyanLight);

      // Load Model
      const loader = new THREE.GLTFLoader();
      loader.load(
        '/assets/models/wizard-cat.glb',
        (gltf) => {
          wizardCat = gltf.scene;

          wizardCat.scale.set(MODEL_SETTINGS.modelScale, MODEL_SETTINGS.modelScale, MODEL_SETTINGS.modelScale);
          wizardCat.position.set(0, MODEL_SETTINGS.modelY, 0);

          // Hide backdrop planes
          wizardCat.traverse((child) => {
            if (child.name === 'Backdrop' || child.name === 'Plane' || child.name === 'Plane.002') {
              child.visible = false;
            }
          });

          scene.add(wizardCat);
          console.log('🐱 Model loaded:', MODEL_SETTINGS);
        },
        undefined,
        (error) => console.log('Model load error:', error)
      );

      // Mouse tracking
      document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX - windowHalfX) / windowHalfX;
        mouseY = (e.clientY - windowHalfY) / windowHalfY;
      });

      // Touch tracking
      document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
          mouseX = (e.touches[0].clientX - windowHalfX) / windowHalfX;
          mouseY = (e.touches[0].clientY - windowHalfY) / windowHalfY;
        }
      }, { passive: true });

      // Resize
      window.addEventListener('resize', () => {
        windowHalfX = window.innerWidth / 2;
        windowHalfY = window.innerHeight / 2;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);

      if (wizardCat) {
        // Head tracking (Mario 64 style)
        const targetRotationY = mouseX * 0.5;
        const targetRotationX = mouseY * 0.2;

        wizardCat.rotation.y += (targetRotationY - wizardCat.rotation.y) * 0.08;
        wizardCat.rotation.x += (targetRotationX - wizardCat.rotation.x) * 0.08;

        // Subtle float animation
        wizardCat.position.y = MODEL_SETTINGS.modelY + Math.sin(Date.now() * 0.001) * 0.05;
      }

      renderer.render(scene, camera);
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      init3D();

      // Check if logged in
      const playerId = localStorage.getItem('player_id');
      if (playerId) {
        const ctaButton = document.getElementById('ctaButton');
        ctaButton.href = '/dashboard.html';
        ctaButton.textContent = '📊 DASHBOARD';
      }
    });
  </script>
</body>
</html>
