<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Register | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg-deep:#120e1e;--bg-warm:#1a1528;--bg-card:rgba(30,22,42,0.7);--border:rgba(212,166,75,0.12);--border-glow:rgba(212,166,75,0.3);--gold:#D4A64B;--gold-dim:rgba(212,166,75,0.15);--text-bright:#F5F0E8;--text-body:#D4C8B8;--text-muted:#9B8E7E;--text-faint:#6B5E50;--sunset:#e8855a;--green:#6acd8a;--red:#e85a6a;--cyan:#6ac8d8;--purple:#b088e8;--font-title:'Cinzel',serif;--font-body:'Crimson Text',Georgia,serif;--font-data:'Press Start 2P',monospace;--font-mono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 20%,rgba(212,166,75,0.1) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(176,136,232,0.06) 0%,transparent 40%),linear-gradient(180deg,#1a1528 0%,#120e1e 50%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    a{color:var(--gold);text-decoration:none}

    .register-card{max-width:420px;width:100%;border-radius:20px;background:var(--bg-card);border:1px solid var(--border-glow);padding:32px 24px;text-align:center;position:relative;overflow:hidden}
    .register-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 20%,rgba(212,166,75,0.06) 0%,transparent 60%);pointer-events:none}

    .house-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
    .house-btn{padding:12px 6px;border-radius:10px;background:rgba(255,255,255,0.02);border:1.5px solid var(--border);cursor:pointer;transition:all 0.2s;text-align:center}
    .house-btn:hover{transform:translateY(-2px)}
    .house-btn.selected{border-width:2px;transform:translateY(-2px)}

    .twitter-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-title);font-size:14px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,var(--gold),#c49030);color:#0a0810;box-shadow:0 4px 0 #8a6d2f,0 6px 16px rgba(212,166,75,0.25);transition:all 0.2s}
    .twitter-btn:disabled{opacity:0.3;cursor:not-allowed;box-shadow:none}

    .guild-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text-bright);font-family:var(--font-mono);font-size:11px;outline:none;margin:8px 0;transition:border-color 0.15s}
    .guild-input:focus{border-color:rgba(212,166,75,0.3)}
    .guild-input::placeholder{color:var(--text-faint)}
  </style>
</head>
<body>
  <div class="register-card">
    <div style="font-size:56px;margin-bottom:12px;">🐱</div>
    <div style="font-family:var(--font-title);font-size:24px;font-weight:900;color:var(--text-bright);letter-spacing:3px;">JOIN NETHARA</div>
    <p style="font-size:14px;color:var(--text-muted);margin:8px 0 20px;">Connect your 𝕏 account, choose your house, and become a Nine.</p>

    <!-- Step 1: House select -->
    <div id="step1">
      <div style="font-family:var(--font-data);font-size:8px;color:var(--gold);letter-spacing:1px;margin-bottom:8px;">STEP 1 — CHOOSE YOUR HOUSE</div>
      <div class="house-grid" id="houseGrid"></div>

      <div style="font-family:var(--font-data);font-size:8px;color:var(--gold);letter-spacing:1px;margin:16px 0 4px;">GUILD TAG (OPTIONAL)</div>
      <input class="guild-input" id="guildInput" type="text" placeholder="e.g. $9LV, $BONK, $WIF" maxlength="20">
      <div style="font-size:11px;color:var(--text-faint);margin-bottom:16px;">Your community token ticker</div>

      <button class="twitter-btn" id="connectBtn" onclick="startAuth()" disabled>
        𝕏 Connect Twitter & Join
      </button>
      <p style="font-size:11px;color:var(--text-faint);margin-top:12px;">Already playing? <a href="/dashboard.html">Go to Dashboard →</a></p>
    </div>
  </div>

<script>
var HOUSES={1:{name:'Smoulders',color:'#E03C31',icon:'🔥',desc:'Fire & fury'},2:{name:'Darktide',color:'#00B4D8',icon:'🌊',desc:'Deep waters'},3:{name:'Stonebark',color:'#5CB338',icon:'🌿',desc:'Living earth'},4:{name:'Ashenvale',color:'#90E0EF',icon:'💨',desc:'Swift winds'},5:{name:'Stormrage',color:'#FFC800',icon:'⚡',desc:'Raw lightning'},6:{name:'Nighthollow',color:'#7B2D8E',icon:'🌙',desc:'Shadow magic'},7:{name:'Dawnbringer',color:'#FF8C00',icon:'☀️',desc:'Holy light'},8:{name:'Manastorm',color:'#5B8FE0',icon:'🔮',desc:'Pure arcane'},9:{name:'Plaguemire',color:'#E84393',icon:'☠️',desc:'Toxic power'}};

var selectedHouse=null;

function renderHouses(){
  var g=document.getElementById('houseGrid');
  var h='';
  Object.keys(HOUSES).forEach(function(id){
    var house=HOUSES[id];
    h+='<div class="house-btn" id="hb'+id+'" onclick="selectHouse('+id+')" style="border-color:'+house.color+'20;">';
    h+='<div style="font-size:24px;margin-bottom:4px;">'+house.icon+'</div>';
    h+='<div style="font-family:var(--font-title);font-size:10px;font-weight:700;color:'+house.color+';letter-spacing:0.5px;">'+house.name+'</div>';
    h+='<div style="font-family:var(--font-mono);font-size:7px;color:var(--text-faint);margin-top:2px;">'+house.desc+'</div>';
    h+='</div>';
  });
  g.innerHTML=h;
}

function selectHouse(id){
  selectedHouse=id;
  var house=HOUSES[id];
  Object.keys(HOUSES).forEach(function(hid){
    var el=document.getElementById('hb'+hid);
    if(parseInt(hid)===id){
      el.classList.add('selected');
      el.style.borderColor=HOUSES[hid].color;
      el.style.background=HOUSES[hid].color+'10';
      el.style.boxShadow='0 4px 16px '+HOUSES[hid].color+'20';
    }else{
      el.classList.remove('selected');
      el.style.borderColor=HOUSES[hid].color+'20';
      el.style.background='rgba(255,255,255,0.02)';
      el.style.boxShadow='none';
    }
  });
  document.getElementById('connectBtn').disabled=false;
}

function startAuth(){
  if(!selectedHouse)return;
  var guild=document.getElementById('guildInput').value.trim();
  // Store selections for after OAuth
  localStorage.setItem('9lv_register',JSON.stringify({school_id:selectedHouse,guild_tag:guild}));
  // Redirect to Twitter OAuth
  window.location.href='/auth/twitter?school_id='+selectedHouse+(guild?'&guild_tag='+encodeURIComponent(guild):'');
}

renderHouses();
</script>
</body>
</html>
