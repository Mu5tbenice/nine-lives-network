<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprite Lab — Nine Lives Network</title>
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-primary, #0e0a18); color: var(--text-body, #CCC5DB); font-family: 'Crimson Text', serif; min-height: 100vh; }

    .lab-header { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .lab-header h1 { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 800; color: #D4A64B; letter-spacing: 2px; }
    .lab-header p { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #554E68; margin-top: 2px; }

    /* Tabs */
    .lab-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 12px; }
    .lab-tab { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 10px 14px; cursor: pointer;
      border: none; background: none; color: #554E68; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .lab-tab.active { color: #D4A64B; border-bottom-color: #D4A64B; font-weight: 700; }
    .lab-tab:hover { color: #847C98; }

    /* Panels */
    .lab-panel { display: none; padding: 12px; }
    .lab-panel.active { display: block; }

    /* Preview area */
    .preview-row { display: flex; justify-content: center; gap: 24px; padding: 20px; background: #130e1f;
      border-radius: 10px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); }
    .preview-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .preview-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #554E68; }

    /* Slot tabs */
    .slot-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
    .slot-tab { font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 5px 10px; border-radius: 6px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #847C98;
      cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; }
    .slot-tab.active { background: rgba(212,166,75,0.08); border-color: rgba(212,166,75,0.3); color: #D4A64B; }
    .slot-tab:hover { border-color: rgba(255,255,255,0.15); }

    /* Editor panel */
    .editor-panel { background: #130e1f; border-radius: 10px; padding: 14px; border: 1px solid rgba(255,255,255,0.06); }
    .editor-title { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; color: #F0ECF8; margin-bottom: 10px; }
    .editor-section { margin-bottom: 12px; }
    .editor-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #554E68; letter-spacing: 1px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }

    /* Color grid */
    .color-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .color-swatch { width: 22px; height: 22px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
    .color-swatch.active { border-color: #D4A64B; box-shadow: 0 0 8px rgba(212,166,75,0.4); }
    .color-swatch:hover { transform: scale(1.1); }

    /* Style pills */
    .style-pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .style-pill { font-family: 'JetBrains Mono', monospace; font-size: 8px; padding: 4px 10px; border-radius: 4px;
      background: #1a1528; border: 1px solid rgba(255,255,255,0.08); color: #847C98;
      cursor: pointer; text-transform: capitalize; transition: all 0.15s; }
    .style-pill.active { background: rgba(212,166,75,0.08); border-color: rgba(212,166,75,0.3); color: #D4A64B; }

    /* VFX preset buttons */
    .vfx-presets { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
    .vfx-preset { font-family: 'JetBrains Mono', monospace; font-size: 8px; padding: 4px 8px; border-radius: 4px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.15s; }
    .vfx-preset.active { font-weight: 700; }

    /* Slider row */
    .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .slider-label { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #847C98; width: 70px; flex-shrink: 0; }
    .slider-row input[type="range"] { flex: 1; accent-color: #D4A64B; height: 4px; }
    .slider-value { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #CCC5DB; width: 32px; text-align: right; }

    /* Test range */
    .test-range { position: relative; width: 100%; height: 130px; background: #08050f; border-radius: 8px;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.06); margin-bottom: 12px; }

    /* Battle arena */
    .battle-arena { position: relative; width: 100%; height: 200px; background: linear-gradient(180deg, #08050f, #0e0816 50%, #140d1e);
      border-radius: 10px; overflow: hidden; border: 1px solid rgba(212,166,75,0.1); margin-bottom: 12px; }

    /* Export */
    .export-code { font-family: 'JetBrains Mono', monospace; font-size: 8px; background: #1a1528;
      padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
      overflow: auto; max-height: 200px; white-space: pre-wrap; line-height: 1.6; }
    .export-sprite { color: #6acd8a; }
    .export-vfx { color: #6ac8d8; }
    .export-sql { color: #b088e8; }

    .btn-gold { width: 100%; margin-top: 12px; padding: 12px; border-radius: 8px; font-family: 'Cinzel', serif;
      font-size: 13px; font-weight: 700; background: rgba(212,166,75,0.1); border: 1px solid rgba(212,166,75,0.25);
      color: #D4A64B; cursor: pointer; transition: all 0.2s; }
    .btn-gold:hover { background: rgba(212,166,75,0.15); border-color: rgba(212,166,75,0.4); }

    .btn-row { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
    .btn-fire { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700; padding: 10px 24px;
      border-radius: 8px; cursor: pointer; transition: all 0.2s; }

    /* Sprite idle animation */
    @keyframes spriteIdle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    .sprite-idle { animation: spriteIdle 1.5s ease-in-out infinite; }

    /* Color input */
    input[type="color"] { border: none; background: none; cursor: pointer; width: 24px; height: 24px; padding: 0; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="lab-header">
    <h1>SPRITE LAB</h1>
    <p>Design Nines · Edit spell VFX · Test on battlefield · Export configs</p>
  </div>

  <div class="lab-tabs">
    <button class="lab-tab active" data-tab="sprite">🐱 Sprite Builder</button>
    <button class="lab-tab" data-tab="vfx">✨ Spell VFX</button>
    <button class="lab-tab" data-tab="battle">⚔️ Test Battle</button>
    <button class="lab-tab" data-tab="export">💾 Export</button>
  </div>

  <!-- ═══ SPRITE BUILDER ═══ -->
  <div id="panel-sprite" class="lab-panel active">
    <div class="preview-row">
      <div class="preview-item">
        <div id="preview-main" class="sprite-idle"></div>
        <div class="preview-label">Main (5×)</div>
      </div>
      <div class="preview-item">
        <div id="preview-small" class="sprite-idle"></div>
        <div class="preview-label">Battlefield (3×)</div>
      </div>
      <div class="preview-item">
        <div id="preview-flip" class="sprite-idle"></div>
        <div class="preview-label">Flipped (5×)</div>
      </div>
    </div>

    <div class="slot-tabs" id="slot-tabs"></div>
    <div class="editor-panel" id="slot-editor"></div>
  </div>

  <!-- ═══ SPELL VFX ═══ -->
  <div id="panel-vfx" class="lab-panel">
    <div class="test-range" id="vfx-range"></div>
    <div class="editor-label">PRESETS</div>
    <div class="vfx-presets" id="vfx-presets"></div>
    <div class="editor-panel" id="vfx-editor"></div>
  </div>

  <!-- ═══ TEST BATTLE ═══ -->
  <div id="panel-battle" class="lab-panel">
    <div class="battle-arena" id="battle-arena"></div>
    <div class="btn-row">
      <button class="btn-fire" id="btn-fire-a" style="background:rgba(212,166,75,0.1);border:1px solid rgba(212,166,75,0.25);color:#D4A64B;">⚡ Fire from A →</button>
      <button class="btn-fire" id="btn-fire-b" style="background:rgba(232,90,106,0.1);border:1px solid rgba(232,90,106,0.25);color:#e85a6a;">← Fire from B ⚡</button>
    </div>
    <p style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#554E68;text-align:center;margin-top:8px;">
      Auto-combat active · HP regens every 5s · Sprite A = your build from Sprite Builder
    </p>
  </div>

  <!-- ═══ EXPORT ═══ -->
  <div id="panel-export" class="lab-panel">
    <div class="preview-row">
      <div class="preview-item">
        <div id="export-preview" class="sprite-idle"></div>
        <div class="preview-label">Your Nine</div>
      </div>
    </div>

    <div class="editor-label" style="margin-top:12px">SPRITE CONFIG</div>
    <pre class="export-code export-sprite" id="export-sprite-json"></pre>

    <div class="editor-label" style="margin-top:16px">VFX CONFIG</div>
    <pre class="export-code export-vfx" id="export-vfx-json"></pre>

    <div class="editor-label" style="margin-top:16px">DB MIGRATION</div>
    <pre class="export-code export-sql" id="export-sql"></pre>

    <button class="btn-gold" id="btn-copy">📋 COPY FULL CONFIG TO CLIPBOARD</button>
  </div>

  <!-- Scripts -->
  <script src="/js/sprite-renderer.js"></script>
  <script src="/js/spell-vfx.js"></script>
  <script>
    // Try loading nav
    try { 
      const navScript = document.createElement('script');
      navScript.src = '/js/nav.js';
      document.body.appendChild(navScript);
    } catch(e) {}
  </script>
  <script>
  (function() {
    'use strict';

    // ═══ SLOT DEFINITIONS ═══
    var SLOTS = {
      fur:        { label:'Fur',        icon:'🐱', styles:['solid','tabby','spotted','tuxedo'] },
      hat:        { label:'Hat',        icon:'🎩', styles:['pointed','wide','crown','hood','none'] },
      eyes:       { label:'Eyes',       icon:'👁️', styles:['default','angry','sleepy','glowing','slit'] },
      robe:       { label:'Robe',       icon:'👘', styles:['basic','long','armored','cape','tattered'] },
      weapon:     { label:'Weapon',     icon:'⚔️', styles:['staff','sword','wand','book','dagger','none'] },
      accessory:  { label:'Accessory',  icon:'📿', styles:['none','scarf','amulet','shoulder_pad','belt_pouch'] },
      background: { label:'Background', icon:'🌟', styles:['none','glow','aura','ring'] },
      expression: { label:'Expression', icon:'😼', styles:['neutral','grin','frown','fangs','smirk','shocked'] },
    };
    var SLOT_KEYS = Object.keys(SLOTS);
    var BG_COLORS = ['transparent','#1a0a2a','#0a1a2a','#2a1a0a','#0a2a1a','#2a0a2a','#1a1a1a','#0a0a2a','#150815','#0a150a'];
    var EXPR_COLORS = ['#2a2a3a','#FF4444','#FFFFFF','#D4A64B','#44FF44','#FF88CC','#AAAAAA','#884422'];

    // ═══ STATE ═══
    var spriteConfig = NineSprite.defaultConfig('stormrage');
    var activeSlot = 'fur';
    var vfxPreset = 'smoulders';
    var vfxConfig = JSON.parse(JSON.stringify(SpellVFX.TYPES.smoulders));

    // Second sprite for battle test
    var spriteB = NineSprite.randomConfig('nighthollow', 42);

    // ═══ RENDERING ═══
    function refreshPreviews() {
      ['preview-main','export-preview'].forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.innerHTML = '';
        el.appendChild(NineSprite.createCanvas(spriteConfig, 5, false));
      });
      var small = document.getElementById('preview-small');
      if (small) { small.innerHTML = ''; small.appendChild(NineSprite.createCanvas(spriteConfig, 3, false)); }
      var flip = document.getElementById('preview-flip');
      if (flip) { flip.innerHTML = ''; flip.appendChild(NineSprite.createCanvas(spriteConfig, 5, true)); }
    }

    // ═══ SLOT TABS ═══
    function renderSlotTabs() {
      var container = document.getElementById('slot-tabs');
      container.innerHTML = '';
      SLOT_KEYS.forEach(function(key) {
        var btn = document.createElement('button');
        btn.className = 'slot-tab' + (key === activeSlot ? ' active' : '');
        btn.innerHTML = '<span style="font-size:12px">' + SLOTS[key].icon + '</span> ' + SLOTS[key].label;
        btn.onclick = function() { activeSlot = key; renderSlotTabs(); renderSlotEditor(); };
        container.appendChild(btn);
      });
    }

    // ═══ SLOT EDITOR ═══
    function renderSlotEditor() {
      var slot = SLOTS[activeSlot];
      var cfg = spriteConfig[activeSlot] || {};
      var colors = activeSlot === 'background' ? BG_COLORS
                 : activeSlot === 'expression' ? EXPR_COLORS
                 : NineSprite.PALETTES[activeSlot] || NineSprite.PALETTES.hat;
      var container = document.getElementById('slot-editor');

      var html = '<div class="editor-title"><span style="font-size:16px">' + slot.icon + '</span> ' + slot.label + '</div>';

      // Style pills
      html += '<div class="editor-section"><div class="editor-label">STYLE</div><div class="style-pills">';
      slot.styles.forEach(function(s) {
        html += '<button class="style-pill' + (s === cfg.style ? ' active' : '') + '" data-style="' + s + '">' + s + '</button>';
      });
      html += '</div></div>';

      // Color grid
      html += '<div class="editor-section"><div class="editor-label">COLOR <input type="color" id="custom-color" value="' + (cfg.color || '#3a3a4a') + '"></div>';
      html += '<div class="color-grid">';
      colors.forEach(function(c) {
        var bg = c === 'transparent' ? 'repeating-conic-gradient(#333 0% 25%, #555 0% 50%) 50% / 6px 6px' : c;
        html += '<div class="color-swatch' + (c === cfg.color ? ' active' : '') + '" data-color="' + c + '" style="background:' + bg + '"></div>';
      });
      html += '</div></div>';

      container.innerHTML = html;

      // Event listeners
      container.querySelectorAll('.style-pill').forEach(function(btn) {
        btn.onclick = function() {
          spriteConfig[activeSlot].style = btn.dataset.style;
          renderSlotEditor();
          refreshPreviews();
        };
      });
      container.querySelectorAll('.color-swatch').forEach(function(sw) {
        sw.onclick = function() {
          spriteConfig[activeSlot].color = sw.dataset.color;
          renderSlotEditor();
          refreshPreviews();
        };
      });
      var customColor = document.getElementById('custom-color');
      if (customColor) {
        customColor.oninput = function() {
          spriteConfig[activeSlot].color = customColor.value;
          refreshPreviews();
        };
      }
    }

    // ═══ VFX EDITOR ═══
    var vfxEngine = null;
    var vfxAnimFrame = null;

    function renderVfxPresets() {
      var container = document.getElementById('vfx-presets');
      var houseColors = NineSprite.HOUSE_COLORS;
      var html = '';
      Object.keys(SpellVFX.TYPES).forEach(function(key) {
        var t = SpellVFX.TYPES[key];
        var c = houseColors[key] || '#D4A64B';
        html += '<button class="vfx-preset' + (key === vfxPreset ? ' active' : '') + '" data-key="' + key + '" ' +
          'style="color:' + c + ';' + (key === vfxPreset ? 'background:' + c + '22;border-color:' + c + '55;' : '') + '">' +
          t.name + '</button>';
      });
      container.innerHTML = html;
      container.querySelectorAll('.vfx-preset').forEach(function(btn) {
        btn.onclick = function() {
          vfxPreset = btn.dataset.key;
          vfxConfig = JSON.parse(JSON.stringify(SpellVFX.TYPES[vfxPreset]));
          renderVfxPresets();
          renderVfxEditor();
        };
      });
    }

    function renderVfxEditor() {
      var container = document.getElementById('vfx-editor');
      var shapes = ['ball','wave','shard','slash','bolt','orb','star','spiral','cloud'];

      var html = '<div class="editor-section"><div class="editor-label">SHAPE</div><div class="style-pills">';
      shapes.forEach(function(s) {
        html += '<button class="style-pill' + (s === vfxConfig.shape ? ' active' : '') + '" data-shape="' + s + '">' + s + '</button>';
      });
      html += '</div></div>';

      // Color pickers
      html += '<div class="editor-section"><div class="editor-label">COLORS (4 slots)</div><div style="display:flex;gap:8px">';
      vfxConfig.colors.forEach(function(c, i) {
        html += '<div style="display:flex;align-items:center;gap:4px">' +
          '<input type="color" class="vfx-color" data-idx="' + i + '" value="' + c + '">' +
          '<div style="width:20px;height:20px;background:' + c + ';border-radius:3px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 0 6px ' + c + '66"></div></div>';
      });
      html += '</div></div>';

      // Sliders
      html += '<div class="editor-section">';
      html += makeSlider('Min Speed', 'speed-min', vfxConfig.speed[0], 0.5, 8, 0.1);
      html += makeSlider('Max Speed', 'speed-max', vfxConfig.speed[1], 1, 10, 0.1);
      html += makeSlider('Trail', 'trail', vfxConfig.trail, 0, 8, 1);
      html += makeSlider('Impact', 'impact', vfxConfig.impact, 4, 24, 1);
      html += '</div>';

      container.innerHTML = html;

      // Events
      container.querySelectorAll('.style-pill').forEach(function(btn) {
        btn.onclick = function() { vfxConfig.shape = btn.dataset.shape; renderVfxEditor(); };
      });
      container.querySelectorAll('.vfx-color').forEach(function(inp) {
        inp.oninput = function() { vfxConfig.colors[parseInt(inp.dataset.idx)] = inp.value; };
      });
      bindSlider('speed-min', function(v) { vfxConfig.speed[0] = v; if (vfxConfig.speed[1] < v + 0.5) vfxConfig.speed[1] = v + 0.5; });
      bindSlider('speed-max', function(v) { vfxConfig.speed[1] = v; if (vfxConfig.speed[0] > v - 0.5) vfxConfig.speed[0] = v - 0.5; });
      bindSlider('trail', function(v) { vfxConfig.trail = Math.round(v); });
      bindSlider('impact', function(v) { vfxConfig.impact = Math.round(v); });
    }

    function makeSlider(label, id, value, min, max, step) {
      return '<div class="slider-row"><span class="slider-label">' + label + '</span>' +
        '<input type="range" id="slider-' + id + '" min="' + min + '" max="' + max + '" step="' + step + '" value="' + value + '">' +
        '<span class="slider-value" id="val-' + id + '">' + (typeof value === 'number' ? value.toFixed(1) : value) + '</span></div>';
    }

    function bindSlider(id, onChange) {
      var slider = document.getElementById('slider-' + id);
      var display = document.getElementById('val-' + id);
      if (slider) {
        slider.oninput = function() {
          var v = parseFloat(slider.value);
          display.textContent = v.toFixed(1);
          onChange(v);
        };
      }
    }

    // VFX test range animation
    function startVfxRange() {
      var container = document.getElementById('vfx-range');
      if (!container) return;
      vfxEngine = new SpellVFX.Engine();

      // Place sprites
      var sprA = NineSprite.createCanvas(spriteConfig, 2.5, false);
      sprA.style.position = 'absolute'; sprA.style.left = '20px'; sprA.style.top = '25px';
      sprA.className = 'sprite-idle';
      container.appendChild(sprA);

      var sprBEl = NineSprite.createCanvas(spriteB, 2.5, true);
      sprBEl.style.position = 'absolute'; sprBEl.style.right = '20px'; sprBEl.style.top = '25px';
      sprBEl.className = 'sprite-idle';
      container.appendChild(sprBEl);

      function autoFire() {
        vfxEngine.fire(70, 60, container.clientWidth - 70, 60, vfxPreset, function() {
          vfxEngine.spawnDmg(container.clientWidth - 70, 45, 5 + Math.floor(Math.random() * 12), Math.random() < 0.15 ? 'crit' : 'damage');
        });
      }

      var fireInterval = setInterval(autoFire, 1200);
      autoFire();

      function tick() {
        vfxEngine.update();
        vfxEngine.render(container);
        vfxAnimFrame = requestAnimationFrame(tick);
      }
      vfxAnimFrame = requestAnimationFrame(tick);
    }

    // ═══ BATTLE TEST ═══
    var battleEngine = null;
    var battleFrame = null;
    var battleHpA = 100, battleHpB = 100;

    function startBattle() {
      var arena = document.getElementById('battle-arena');
      if (!arena) return;
      battleEngine = new SpellVFX.Engine();

      // Place sprites
      var sA = NineSprite.createCanvas(spriteConfig, 3, false);
      sA.style.position = 'absolute'; sA.style.left = '40px'; sA.style.top = '50px';
      sA.className = 'sprite-idle'; sA.id = 'battle-sprite-a';
      arena.appendChild(sA);

      var sB = NineSprite.createCanvas(spriteB, 3, true);
      sB.style.position = 'absolute'; sB.style.right = '40px'; sB.style.top = '50px';
      sB.className = 'sprite-idle'; sB.id = 'battle-sprite-b';
      arena.appendChild(sB);

      // HP bars
      var hpHtml = '<div id="hp-a" style="position:absolute;left:32px;top:130px;width:52px;height:4px;background:#1a1528;border:1px solid #2a2538;border-radius:1px">' +
        '<div id="hp-a-fill" style="width:100%;height:100%;background:#6acd8a;border-radius:1px;transition:width 0.3s"></div></div>' +
        '<div id="hp-b" style="position:absolute;right:32px;top:130px;width:52px;height:4px;background:#1a1528;border:1px solid #2a2538;border-radius:1px">' +
        '<div id="hp-b-fill" style="width:100%;height:100%;background:#6acd8a;border-radius:1px;transition:width 0.3s"></div></div>' +
        '<div style="position:absolute;left:42px;top:138px;font-family:\'Press Start 2P\',monospace;font-size:5px;color:#D4A64B">YOUR NINE</div>' +
        '<div style="position:absolute;right:42px;top:138px;font-family:\'Press Start 2P\',monospace;font-size:5px;color:#e85a6a">ENEMY</div>' +
        '<div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:\'Cinzel\',serif;font-size:16px;font-weight:800;color:rgba(212,166,75,0.2)">VS</div>';
      arena.insertAdjacentHTML('beforeend', hpHtml);

      function fireA() {
        battleEngine.fire(85, 75, arena.clientWidth - 85, 75, vfxPreset, function() {
          var dmg = 8 + Math.floor(Math.random() * 15);
          var crit = Math.random() < 0.12;
          battleHpB = Math.max(0, battleHpB - (crit ? dmg * 2 : dmg));
          battleEngine.spawnDmg(arena.clientWidth - 85, 55, crit ? dmg * 2 : dmg, crit ? 'crit' : 'damage');
          updateHP();
        });
      }
      function fireB() {
        battleEngine.fire(arena.clientWidth - 85, 75, 85, 75, vfxPreset, function() {
          var dmg = 8 + Math.floor(Math.random() * 15);
          battleHpA = Math.max(0, battleHpA - dmg);
          battleEngine.spawnDmg(85, 55, dmg, 'damage');
          updateHP();
        });
      }

      function updateHP() {
        var fa = document.getElementById('hp-a-fill');
        var fb = document.getElementById('hp-b-fill');
        if (fa) { fa.style.width = battleHpA + '%'; fa.style.background = battleHpA > 50 ? '#6acd8a' : battleHpA > 25 ? '#D4A64B' : '#e85a6a'; }
        if (fb) { fb.style.width = battleHpB + '%'; fb.style.background = battleHpB > 50 ? '#6acd8a' : battleHpB > 25 ? '#D4A64B' : '#e85a6a'; }
      }

      // Auto combat
      setInterval(function() { if (Math.random() < 0.6) fireA(); else fireB(); }, 900);
      // Regen
      setInterval(function() { battleHpA = Math.min(100, battleHpA + 15); battleHpB = Math.min(100, battleHpB + 15); updateHP(); }, 5000);

      // Manual buttons
      document.getElementById('btn-fire-a').onclick = fireA;
      document.getElementById('btn-fire-b').onclick = fireB;

      function tick() {
        battleEngine.update();
        battleEngine.render(arena);
        battleFrame = requestAnimationFrame(tick);
      }
      battleFrame = requestAnimationFrame(tick);
    }

    // ═══ EXPORT ═══
    function refreshExport() {
      var spriteEl = document.getElementById('export-sprite-json');
      var vfxEl = document.getElementById('export-vfx-json');
      var sqlEl = document.getElementById('export-sql');
      if (spriteEl) spriteEl.textContent = JSON.stringify(spriteConfig, null, 2);
      if (vfxEl) vfxEl.textContent = JSON.stringify(vfxConfig, null, 2);
      if (sqlEl) {
        sqlEl.textContent =
          '-- Add to players table\n' +
          'ALTER TABLE players\n  ADD COLUMN sprite_config JSONB DEFAULT \'{}\';\n\n' +
          '-- Add to spells table\n' +
          'ALTER TABLE spells\n  ADD COLUMN vfx_config JSONB DEFAULT NULL;\n\n' +
          '-- Save this Nine\'s config\n' +
          'UPDATE players\nSET sprite_config = \'' + JSON.stringify(spriteConfig) + '\'::jsonb\nWHERE id = \'<player_id>\';\n\n' +
          '-- Save custom spell VFX\n' +
          'UPDATE spells\nSET vfx_config = \'' + JSON.stringify(vfxConfig) + '\'::jsonb\nWHERE id = \'<spell_id>\';';
      }
    }

    // ═══ TAB SWITCHING ═══
    document.querySelectorAll('.lab-tab').forEach(function(tab) {
      tab.onclick = function() {
        document.querySelectorAll('.lab-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.lab-panel').forEach(function(p) { p.classList.remove('active'); });
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');

        if (tab.dataset.tab === 'vfx') { renderVfxPresets(); renderVfxEditor(); setTimeout(startVfxRange, 100); }
        if (tab.dataset.tab === 'battle') { setTimeout(startBattle, 100); }
        if (tab.dataset.tab === 'export') { refreshPreviews(); refreshExport(); }
      };
    });

    // Copy button
    document.getElementById('btn-copy').onclick = function() {
      var data = { sprite_config: spriteConfig, vfx_config: vfxConfig };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(JSON.stringify(data, null, 2));
        this.textContent = '✅ COPIED!';
        var btn = this;
        setTimeout(function() { btn.textContent = '📋 COPY FULL CONFIG TO CLIPBOARD'; }, 2000);
      }
    };

    // ═══ INIT ═══
    renderSlotTabs();
    renderSlotEditor();
    refreshPreviews();

  })();
  </script>
</body>
</html>
