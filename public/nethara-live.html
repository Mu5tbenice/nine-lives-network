<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nethara Live | Nine Lives Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/card-v4-patch.css">
  <style>
    :root{--bg-deep:#120e1e;--bg-warm:#1a1528;--bg-card:rgba(30,22,42,0.7);--bg-card-solid:#1e1630;--border:rgba(212,166,75,0.12);--border-glow:rgba(212,166,75,0.3);--gold:#D4A64B;--gold-dim:rgba(212,166,75,0.15);--text-bright:#F5F0E8;--text-body:#D4C8B8;--text-muted:#9B8E7E;--text-faint:#6B5E50;--sunset:#e8855a;--sky:#8BB4E0;--green:#6acd8a;--red:#e85a6a;--cyan:#6ac8d8;--purple:#b088e8;--font-title:'Cinzel',serif;--font-body:'Crimson Text',Georgia,serif;--font-data:'Press Start 2P',monospace;--font-mono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:radial-gradient(ellipse at 50% 0%,rgba(232,133,90,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(139,180,224,0.06) 0%,transparent 40%),linear-gradient(180deg,#1a1528 0%,#120e1e 30%,#0e0a18 100%);font-family:var(--font-body);color:var(--text-body);-webkit-font-smoothing:antialiased}
    a{color:var(--gold);text-decoration:none}
    ::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:rgba(212,166,75,0.15);border-radius:2px}

    .top-nav{position:sticky;top:0;z-index:100;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(18,14,30,0.85);backdrop-filter:blur(12px)}
    .nav-logo{font-family:var(--font-title);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px;text-decoration:none}
    .nav-links{display:flex;gap:4px;list-style:none}
    .nav-links a{font-family:var(--font-mono);font-size:8px;padding:4px 8px;border-radius:6px;color:var(--text-muted);text-decoration:none;border:1px solid transparent;transition:all 0.15s;letter-spacing:0.5px}
    .nav-links a:hover,.nav-links a.active{color:var(--gold);border-color:rgba(212,166,75,0.15);background:var(--gold-dim)}
    .hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px}
    .hamburger span{display:block;width:18px;height:2px;background:var(--text-muted);margin:3px 0;border-radius:1px}
    .mobile-menu{display:none;position:fixed;top:44px;left:0;right:0;z-index:99;background:rgba(18,14,30,0.95);backdrop-filter:blur(12px);padding:12px 16px;border-bottom:1px solid var(--border);flex-direction:column;gap:8px}
    .mobile-menu.active{display:flex}
    .mobile-menu a{font-family:var(--font-mono);font-size:9px;padding:8px 12px;border-radius:8px;color:var(--text-muted);text-decoration:none;border:1px solid var(--border)}
    @media(max-width:700px){.nav-links{display:none}.hamburger{display:block}}
    @media(min-width:701px){.mobile-menu{display:none!important}}

    .main{max-width:600px;margin:0 auto;padding:14px}
    .section-label{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
    .section-label__text{font-family:var(--font-title);font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px}
    .section-label__line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp 0.4s ease both}

    .zone-card{border-radius:12px;background:var(--bg-card);border:1px solid var(--border);overflow:hidden;margin-bottom:10px;transition:transform 0.15s,border-color 0.15s;cursor:pointer}
    .zone-card:hover{transform:translateY(-1px);border-color:rgba(212,166,75,0.25)}
    .zone-header{position:relative;height:100px;background-size:cover;background-position:center}
    .zone-header-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(18,14,30,0.95) 0%,rgba(18,14,30,0.2) 60%)}
    .zone-header-content{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;z-index:2}
    .zone-body{padding:12px 14px}
    .guild-bar{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .guild-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .guild-name{font-family:var(--font-mono);font-size:9px;color:var(--text-body);width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .guild-track{flex:1;height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
    .guild-fill{height:100%;border-radius:3px;transition:width 0.5s}
    .guild-pct{font-family:var(--font-data);font-size:7px;width:35px;text-align:right;font-weight:700}

    .badge{font-family:var(--font-data);font-size:6px;padding:3px 8px;border-radius:4px;letter-spacing:0.5px;font-weight:700}

    .deploy-panel{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(18,14,30,0.95);backdrop-filter:blur(12px);border-top:1px solid var(--border-glow);padding:14px 16px;transform:translateY(100%);transition:transform 0.3s}
    .deploy-panel.open{transform:translateY(0)}
    .hand-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
    .hand-card{min-width:100px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,0.03);border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;transition:all 0.15s}
    .hand-card.selected{transform:translateY(-4px);border-color:var(--gold)}
    .hand-card:hover{border-color:rgba(212,166,75,0.25)}
    .deploy-btn{width:100%;margin-top:10px;padding:14px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font-title);font-size:14px;font-weight:700;letter-spacing:1px;color:#fff;transition:all 0.2s}
    .deploy-btn:disabled{opacity:0.3;cursor:not-allowed}

    .combat-timer{font-family:var(--font-data);font-size:8px;color:var(--sunset);letter-spacing:1px;text-align:center;padding:10px;background:rgba(232,133,90,0.06);border:1px solid rgba(232,133,90,0.12);border-radius:10px;margin-bottom:14px}
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="/" class="nav-logo">Nine Lives Network</a>
    <ul class="nav-links">
      <li><a href="/dashboard.html">Dashboard</a></li>
      <li><a href="/nethara-live.html" class="active">Nethara Live</a></li>
      <li><a href="/duels.html">Duels</a></li>
      <li><a href="/gauntlet.html">Gauntlet</a></li>
      <li><a href="/boss.html">Boss</a></li>
      <li><a href="/leaderboards.html">Ranks</a></li>
      <li><a href="/builder.html">Your Nine</a> <a href="/packs.html">Packs</a></li><li><a href="/collection.html">Spellbook</a></li>
    </ul>
    <button class="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('active')"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="/dashboard.html">Dashboard</a><a href="/nethara-live.html" class="active">Nethara Live</a><a href="/duels.html">Duels</a><a href="/gauntlet.html">Gauntlet</a><a href="/boss.html">Boss</a><a href="/leaderboards.html">Ranks</a><a href="/builder.html">Your Nine</a> <a href="/packs.html">Packs</a></li><li><a href="/collection.html">Spellbook</a>
  </div>

  <div class="main" id="content">
    <div style="text-align:center;padding:60px 20px;"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div><span style="font-family:var(--font-data);font-size:8px;color:var(--text-faint);letter-spacing:1px;">LOADING NETHARA...</span></div>
  </div>

  <!-- Deploy panel (hidden by default) -->
  <div class="deploy-panel" id="deployPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-family:var(--font-title);font-size:13px;font-weight:700;color:var(--gold);">DEPLOY TO <span id="deployZoneName">—</span></span>
      <span style="font-family:var(--font-data);font-size:7px;color:var(--text-faint);cursor:pointer;" onclick="closeDeployPanel()">✕ CLOSE</span>
    </div>
    <div class="hand-scroll" id="handCards"></div>
    <button class="deploy-btn" id="deployBtn" disabled style="background:linear-gradient(135deg,var(--gold),#c49030);color:#0a0810;">⚔️ DEPLOY — 1 MANA</button>
  </div>

<script>
var HOUSES={1:{name:'Smoulders',color:'#E03C31',icon:'🔥'},2:{name:'Darktide',color:'#00B4D8',icon:'🌊'},3:{name:'Stonebark',color:'#5CB338',icon:'🌿'},4:{name:'Ashenvale',color:'#90E0EF',icon:'💨'},5:{name:'Stormrage',color:'#FFC800',icon:'⚡'},6:{name:'Nighthollow',color:'#7B2D8E',icon:'🌙'},7:{name:'Dawnbringer',color:'#FF8C00',icon:'☀️'},8:{name:'Manastorm',color:'#5B8FE0',icon:'🔮'},9:{name:'Plaguemire',color:'#E84393',icon:'☠️'}};

var ZONE_IMAGES={};

var playerId=null,selectedZone=null,selectedCard=null,playerCards=[];

function getPlayerId(){var p=new URLSearchParams(window.location.search);var f=p.get('player_id');if(f){localStorage.setItem('player_id',f);return f;}return localStorage.getItem('player_id');}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function getZoneImg(z){if(z.image_url){if(z.image_url.startsWith('http')||z.image_url.startsWith('/'))return z.image_url;return'/assets/images/zones/'+z.image_url;}if(z.environment_image){return'/assets/images/zones/'+z.environment_image;}return'';}

async function loadNethara(){
  playerId=getPlayerId();
  if(!playerId){document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px"><a href="/register.html" style="font-family:var(--font-title);font-size:16px;">Register to play →</a></div>';return;}

  try{
    var[zR,pR]=await Promise.all([
      fetch('/api/zones'),
      fetch('/api/players/'+playerId)
    ]);
    var zones=zR.ok?await zR.json():[];
    var player=pR.ok?await pR.json():{};
    if(!Array.isArray(zones))zones=zones.zones||[];

    // Try loading player cards
    try{var cR=await fetch('/api/packs/collection/'+playerId);if(cR.ok){var cd=await cR.json();playerCards=(cd.cards||cd||[]).map(function(c){return{id:c.id,name:c.spell_name||c.name,spell_type:c.spell_type||'attack',rarity:c.rarity||'common',atk:(c.spell&&c.spell.base_atk)||c.base_atk||0,hp:(c.spell&&c.spell.base_hp)||c.base_hp||0,charges:c.current_charges||0};});}}catch(e){}

    render(zones,player);
  }catch(err){
    console.error('Load error:',err);
    document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px;color:var(--text-muted);">Failed to load zones. Please refresh.</div>';
  }
}

function render(zones,player){
  var activeZones=zones.filter(function(z){return z.is_active!==false;});
  var obj=activeZones.find(function(z){return z.is_current_objective;});

  // Combat timer (next 15-min cycle)
  var now=new Date(),mins=now.getMinutes(),nextCycle=15-mins%15,secs=60-now.getSeconds();
  if(secs===60){secs=0;}else{nextCycle--;}

  var html='';

  // Combat cycle timer
  html+='<div class="combat-timer fade-up">⚔️ NEXT COMBAT CYCLE IN '+nextCycle+'m '+secs+'s</div>';

  // Page title
  html+='<div class="section-label fade-up"><span style="font-size:14px;">🔥</span><span class="section-label__text">NETHARA LIVE</span><span class="section-label__line"></span></div>';

  // Objective zone first
  if(obj){
    html+=renderZoneCard(obj,true);
  }

  // All other active zones
  activeZones.forEach(function(z){
    if(obj&&z.id===obj.id)return;
    html+=renderZoneCard(z,false);
  });

  if(activeZones.length===0){
    html+='<div style="text-align:center;padding:40px;color:var(--text-faint);font-style:italic;">No active zones right now.</div>';
  }

  document.getElementById('content').innerHTML=html;

  // Update timer every second
  setInterval(function(){
    var n=new Date(),m=n.getMinutes(),nc=15-m%15,sc=60-n.getSeconds();
    if(sc===60){sc=0;}else{nc--;}
    var el=document.querySelector('.combat-timer');
    if(el)el.innerHTML='⚔️ NEXT COMBAT CYCLE IN '+nc+'m '+sc+'s';
  },1000);
}

function renderZoneCard(z,isObj){
  var img=getZoneImg(z);
  var ctrl=z.controlling_school_id&&HOUSES[z.controlling_school_id]?HOUSES[z.controlling_school_id]:null;
  var h='';

  h+='<div class="zone-card fade-up" onclick="goZone('+z.id+')">';

  // Objective banner
  if(isObj){
    h+='<div style="background:linear-gradient(90deg,rgba(212,166,75,0.15),transparent);padding:6px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);">';
    h+='<span style="font-size:12px;">⭐</span><span style="font-family:var(--font-data);font-size:7px;color:var(--gold);letter-spacing:1px;">DAILY OBJECTIVE — x1.5 POINTS</span></div>';
  }

  // Zone image header
  if(img){
    h+='<div class="zone-header" style="background-image:url(\''+img+'\');">';
    h+='<div class="zone-header-overlay"></div>';
    h+='<div class="zone-header-content">';
    h+='<div style="font-family:var(--font-title);font-size:15px;font-weight:700;color:var(--text-bright);letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,0.8);">'+esc(z.name)+'</div>';
    if(z.zone_type)h+='<div style="font-family:var(--font-mono);font-size:8px;color:var(--text-muted);margin-top:2px;">'+esc(z.zone_type)+'</div>';
    h+='</div></div>';
  }else{
    h+='<div style="padding:14px;border-bottom:1px solid var(--border);">';
    h+='<div style="font-family:var(--font-title);font-size:15px;font-weight:700;color:var(--text-bright);letter-spacing:1px;">'+esc(z.name)+'</div>';
    if(z.zone_type)h+='<div style="font-family:var(--font-mono);font-size:8px;color:var(--text-muted);margin-top:2px;">'+esc(z.zone_type)+'</div>';
    h+='</div>';
  }

  h+='<div class="zone-body">';

  // Controller badge
  if(ctrl){
    h+='<div style="margin-bottom:8px;"><span class="badge" style="background:'+ctrl.color+'15;color:'+ctrl.color+';border:1px solid '+ctrl.color+'30;">'+ctrl.icon+' '+ctrl.name+' CONTROLS</span></div>';
  }

  // Guild control bars (from zone influence data)
  if(z.guild_influence&&z.guild_influence.length>0){
    z.guild_influence.slice(0,3).forEach(function(g){
      var col=g.color||'#888';
      h+='<div class="guild-bar">';
      h+='<div class="guild-dot" style="background:'+col+';"></div>';
      h+='<div class="guild-name">'+esc(g.guild_tag||g.name||'?')+'</div>';
      h+='<div class="guild-track"><div class="guild-fill" style="width:'+Math.min(100,g.percent||0)+'%;background:linear-gradient(90deg,'+col+'90,'+col+'40);"></div></div>';
      h+='<div class="guild-pct" style="color:'+col+';">'+(g.percent||0)+'%</div>';
      h+='</div>';
    });
  }

  // Zone stats row
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">';
  h+='<div style="display:flex;gap:4px;">';
  if(z.bonus_effect){
    h+='<span class="badge" style="background:rgba(176,136,232,0.1);color:var(--purple);border:1px solid rgba(176,136,232,0.2);">'+esc(z.bonus_effect)+'</span>';
  }
  h+='</div>';
  h+='<span style="font-family:var(--font-data);font-size:6px;color:var(--text-faint);">TAP TO DEPLOY</span>';
  h+='</div>';

  h+='</div></div>';
  return h;
}

function goZone(id){window.location.href="/zone-detail.html?id="+id;}
function openDeploy(zoneId,zoneName){
  selectedZone=zoneId;
  selectedCard=null;
  document.getElementById('deployZoneName').textContent=zoneName;
  document.getElementById('deployBtn').disabled=true;

  // Render hand cards
  var hH='';
  if(playerCards.length>0){
    playerCards.forEach(function(c,i){
      var rCol={common:'#bbb',uncommon:'#6acd8a',rare:'#5588ff',epic:'#b088e8',legendary:'#ffd700'};
      hH+='<div class="hand-card" id="hc'+i+'" onclick="selectCard('+i+')">';
      hH+='<div style="font-family:var(--font-data);font-size:6px;color:'+(rCol[c.rarity]||'#bbb')+';margin-bottom:3px;">'+(c.spell_type||'ATTACK').toUpperCase()+'</div>';
      hH+='<div style="font-family:var(--font-title);font-size:11px;font-weight:700;color:var(--text-bright);line-height:1.2;margin-bottom:4px;">'+esc(c.name)+'</div>';
      hH+='<div style="display:flex;justify-content:space-between;">';
      hH+='<span style="font-family:var(--font-data);font-size:7px;color:var(--red);">⚔️'+(c.atk||'?')+'</span>';
      hH+='<span style="font-family:var(--font-data);font-size:7px;color:var(--green);">💚'+(c.hp||'?')+'</span>';
      hH+='</div></div>';
    });
  }else{
    hH='<div style="padding:16px;text-align:center;color:var(--text-faint);font-style:italic;font-size:12px;width:100%;">No cards available. Open a pack first!</div>';
  }
  document.getElementById('handCards').innerHTML=hH;

  document.getElementById('deployPanel').classList.add('open');
}

function closeDeployPanel(){
  document.getElementById('deployPanel').classList.remove('open');
  selectedZone=null;selectedCard=null;
}

function selectCard(idx){
  selectedCard=idx;
  document.querySelectorAll('.hand-card').forEach(function(el,i){
    el.classList.toggle('selected',i===idx);
  });
  document.getElementById('deployBtn').disabled=false;
}

document.getElementById('deployBtn').addEventListener('click',async function(){
  if(!selectedZone||selectedCard===null||!playerCards[selectedCard])return;
  var btn=this;btn.disabled=true;btn.textContent='DEPLOYING...';
  try{
    var r=await fetch('/api/zones/deploy',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({player_id:playerId,zone_id:selectedZone,card_id:playerCards[selectedCard].id})
    });
    if(r.ok){
      btn.textContent='✅ DEPLOYED!';
      setTimeout(function(){closeDeployPanel();loadNethara();},1500);
    }else{
      var err=await r.json().catch(function(){return{error:'Failed'};});
      btn.textContent='❌ '+(err.error||'Failed');
      setTimeout(function(){btn.textContent='⚔️ DEPLOY — 1 MANA';btn.disabled=false;},2000);
    }
  }catch(e){
    btn.textContent='❌ Network error';
    setTimeout(function(){btn.textContent='⚔️ DEPLOY — 1 MANA';btn.disabled=false;},2000);
  }
});

loadNethara();
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script src="/js/card-particles.js"></script>
<script src="/js/card-builder-v4.js"></script>
<script src="/js/card-globals.js"></script>
</body>
</html>
