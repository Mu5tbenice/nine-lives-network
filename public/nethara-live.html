    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    @keyframes charIdle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    @keyframes charShake { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-8px) rotate(-3deg)} 30%{transform:translateX(6px) rotate(2deg)} 50%{transform:translateX(-4px)} }
    @keyframes charPulse { 0%{transform:scale(1)} 30%{transform:scale(1.12)} 100%{transform:scale(1)} }
    @keyframes dmgFloat { 0%{opacity:1;transform:translateY(0) scale(1)} 20%{opacity:1;transform:translateY(-15px) scale(1.3)} 100%{opacity:0;transform:translateY(-60px) scale(0.8)} }
    @keyframes flashOut { 0%{opacity:0.15} 100%{opacity:0} }
    @keyframes phaseIn { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.7)} 40%{opacity:1;transform:translate(-50%,-50%) scale(1.05)} 100%{transform:translate(-50%,-50%) scale(1)} }
    @keyframes nermIn { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes nermBounce { 0%{transform:scale(1)} 30%{transform:scale(1.2) rotate(-5deg)} 100%{transform:scale(1)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes particleDrift { 0%{transform:translateY(0)} 50%{transform:translateY(-3px)} 100%{transform:translateY(0)} }
    @keyframes liveDot { 0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0.5)} 50%{box-shadow:0 0 0 5px rgba(0,255,136,0)} }

splay:"flex",justifyContent:"space-between"}}><span style={{fontFamily:V.mono,fontSize:7,color:rc,fontWeight:700,textTransform:"capitalize"}}>{card.rarity}</span><span style={{fontFamily:V.data,fontSize:7,color:C.cyan}}>{card.cost}MP</span></div></div></div>);}

function getZonePriority(z,pg){
  var my=z.guilds.find(function(g){return g.g===pg});
  var myPct=my?my.pct:0;var topPct=z.guilds[0]?z.guilds[0].pct:0;
  var leading=my&&myPct>=topPct;var needsHelp=my&&!leading&&z.status==="contested";
  if(needsHelp)return{score:100+z.nines,tag:"REINFORCE",tagC:C.red,tagIcon:"\u{1F6E1}\uFE0F",full:true};
  if(z.event&&z.status==="contested")return{score:90+z.nines,tag:z.event.type.toUpperCase(),tagC:C.purple,tagIcon:z.event.icon,full:true};
  if(z.objective)return{score:80+z.nines,tag:"OBJECTIVE",tagC:C.gold,tagIcon:"\u2B50",full:true};
  if(z.event)return{score:75+z.nines,tag:z.event.type.toUpperCase(),tagC:C.purple,tagIcon:z.event.icon,full:true};
  if(z.status==="contested"&&my&&leading)return{score:65+z.nines,tag:"HOLD",tagC:C.green,tagIcon:"\u2694\uFE0F",full:true};
  if(z.status==="contested")return{score:50+z.nines,tag:"CONTESTED",tagC:C.red,tagIcon:"\u2694\uFE0F",full:false};
  return{score:z.nines,tag:null,tagC:null,tagIcon:null,full:false};
}

        {isHome&&<span style={{fontFamily:V.data,fontSize:7,color:C.green,background:"rgba(0,0,0,0.65)",padding:"3px 8px",borderRadius:4,border:"1px solid "+C.green+"30"}}>{"\u{1F3E0}"}</span>}
      </div>
      {zone.event&&<div style={{position:"absolute",top:8,right:8,fontFamily:V.data,fontSize:7,color:C.purple,background:"rgba(0,0,0,0.65)",padding:"3px 8px",borderRadius:4}}>{zone.event.icon} {zone.event.time}</div>}

          <div style={{fontFamily:V.mono,fontSize:8,color:h.c,opacity:0.8}}>{h.n} \u00B7 {h.bonus}</div>

          <span style={{fontFamily:V.data,fontSize:full?8:7,color:isMe?(gd.pct>=zone.guilds[0].pct?C.green:C.red):C.faint}}>{gd.pct}%</span>
          {isMe&&gd.cnt>0&&<span style={{fontFamily:V.mono,fontSize:7,color:C.muted}}>({gd.cnt})</span>}
        </div>)})}
        {zone.guilds.length>(full?4:3)&&<span style={{fontFamily:V.mono,fontSize:8,color:C.faint}}>+{zone.guilds.length-(full?4:3)}</span>}

      </div>}

  </div>);

const SORTS=[
  {k:"help",l:"\u{1F6E1}\uFE0F Guild Needs Help"},
  {k:"active",l:"\u{1F525} Most Active"},
  {k:"contested",l:"\u2694\uFE0F Contested"},
  {k:"events",l:"\u26A1 Events"},
  {k:"mine",l:"\u{1F4CD} My Zones"},
  {k:"bonus",l:"\u2B50 Bonuses"},
];

function ZoneGrid({zones,player,onSelect}){
  var [sort,setSort]=useState("help");
  var sorted=useMemo(function(){
    var mapped=zones.map(function(z){return{zone:z,pri:getZonePriority(z,player.guild)}});
    if(sort==="help")mapped.sort(function(a,b){return b.pri.score-a.pri.score});
    else if(sort==="active")mapped.sort(function(a,b){return b.zone.nines-a.zone.nines});
    else if(sort==="contested")mapped=mapped.filter(function(m){return m.zone.status==="contested"}).sort(function(a,b){return b.zone.nines-a.zone.nines});
    else if(sort==="events")mapped=mapped.filter(function(m){return m.zone.event}).sort(function(a,b){return b.zone.nines-a.zone.nines});
    else if(sort==="mine")mapped=mapped.filter(function(m){return player.deployedZones.indexOf(m.zone.id)>=0});
    else if(sort==="bonus"){mapped.sort(function(a,b){return(b.zone.objective?50:0)-(a.zone.objective?50:0)})}
    return mapped;
  },[zones,sort,player.guild,player.deployedZones]);

  return(<div>
    {/* Sort bar */}
    <div style={{padding:"14px 16px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
        {SORTS.map(function(s){return(<button key={s.k} onClick={function(){setSort(s.k)}} style={{fontFamily:V.mono,fontSize:11,fontWeight:sort===s.k?600:400,padding:"9px 16px",borderRadius:8,border:"1px solid "+(sort===s.k?C.gold+"40":"rgba(255,255,255,0.07)"),cursor:"pointer",background:sort===s.k?"rgba(212,166,75,0.15)":"rgba(30,22,42,0.7)",color:sort===s.k?C.gold:C.muted,whiteSpace:"nowrap",flexShrink:0,transition:"all 0.2s"}}>{s.l}</button>)})}
      </div>
    </div>
    {/* Live status */}
    <div style={{padding:"8px 16px",display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
      <div style={{width:8,height:8,borderRadius:"50%",background:C.live,animation:"liveDot 2s infinite"}}/>
      <span style={{fontFamily:V.mono,fontSize:10,color:C.live}}>{zones.filter(function(z){return z.status==="contested"||z.event}).length} active battles</span>
      <span style={{fontFamily:V.mono,fontSize:9,color:C.faint,marginLeft:"auto"}}>{zones.length} zones</span>
    </div>
    {/* Grid */}
    <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      {sorted.map(function(m){return<ZoneTile key={m.zone.id} zone={m.zone} pri={m.pri} pg={player.guild} ph={player.house} isDeployed={player.deployedZones.indexOf(m.zone.id)>=0} onClick={function(){onSelect(m.zone)}}/>})}
      {sorted.length===0&&<div style={{gridColumn:"1 / -1",textAlign:"center",padding:40,fontFamily:V.mono,fontSize:11,color:C.faint}}>No zones match this filter.</div>}
    </div>
  </div>);
}

s.length>0&&<div style={{padding:"10px 22px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}><div style={{fontFamily:V.mono,fontSize:9,color:C.red,letterSpacing:1,marginBottom:6}}>KNOCKED OUT</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{kos.map(function(k,i){return<span key={i} style={{fontFamily:V.mono,fontSize:8,padding:"3px 8px",background:C.red+"12",color:C.red,borderRadius:4}}>{"\u{1F480}"} @{k.name}</span>})}</div></div>}<div style={{padding:"14px 22px"}}><div style={{fontFamily:V.mono,fontSize:9,color:C.gold,letterSpacing:1,marginBottom:8}}>YOUR POINTS</div>{pts.breakdown.map(function(b,i){return<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"3px 0"}}><span style={{fontFamily:V.mono,fontSize:10,color:C.body}}>{b.reason}</span><span style={{fontFamily:V.data,fontSize:9,color:C.green}}>+{b.pts}</span></div>})}<div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 0",marginTop:6,borderTop:"1px solid "+C.gold+"20"}}><span style={{fontFamily:V.title,fontSize:14,fontWeight:700,color:C.gold}}>TOTAL</span><span style={{fontFamily:V.data,fontSize:14,color:C.gold}}>+{pts.total}</span></div></div><button onClick={onClose} style={{width:"100%",padding:12,border:"none",cursor:"pointer",fontFamily:V.mono,fontSize:11,color:C.faint,background:"rgba(255,255,255,0.03)",borderTop:"1px solid rgba(255,255,255,0.07)"}}>Dismiss</button></div></div>);}

function App(){
  var [view,setView]=useState("zones"),[selZone,setSelZone]=useState(null);
  var [player,setPlayer]=useState({name:"Your Nine",house:"stormrage",guild:0,mana:5,maxMana:10,points:1130,deployedZones:[]});
  var [cards,setCards]=useState(CARDS.map(function(c){return Object.assign({},c,{deployedTo:null})}));
  var [toast,setToast]=useState(null);
  function showToast(m){setToast(m);setTimeout(function(){setToast(null)},2500)}
  function handleDeploy(zid,cid){var card=cards.find(function(c){return c.id===cid});if(player.mana<card.cost)return showToast("Need "+card.cost+" mana!");setPlayer(function(p){return Object.assign({},p,{mana:p.mana-card.cost,deployedZones:p.deployedZones.concat([zid])})});setCards(function(cs){return cs.map(function(c){return c.id===cid?Object.assign({},c,{deployedTo:zid}):c})});showToast("\u2694\uFE0F "+card.name+" deployed!")}
  function handleWithdraw(zid){setPlayer(function(p){return Object.assign({},p,{deployedZones:p.deployedZones.filter(function(z){return z!==zid})})});setCards(function(cs){return cs.map(function(c){return c.deployedTo===zid?Object.assign({},c,{deployedTo:null}):c})});showToast("\u2190 Withdrawn.")}
  if(view==="battle"&&selZone){return<BattleView zone={selZone} player={player} cards={cards} onBack={function(){setView("zones");setSelZone(null)}} onDeploy={handleDeploy} onWithdraw={handleWithdraw}/>}
  return(<div style={{minHeight:"100vh",background:C.bg,color:C.body}}>
    <PlayerHeader player={player}/>
    <ZoneGrid zones={ZONES} player={player} onSelect={function(z){setSelZone(z);setView("battle")}}/>
    {toast&&<div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:C.card,border:"1px solid "+C.gold+"40",borderRadius:12,padding:"10px 20px",zIndex:2000,fontFamily:V.mono,fontSize:11,color:C.gold,boxShadow:"0 8px 32px rgba(0,0,0,0.6)",animation:"slideUp 0.3s ease",maxWidth:"90%",textAlign:"center"}}>{toast}</div>}
  </div>);
}
