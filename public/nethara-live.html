<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nethara Live — Nine Lives Network</title>
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/nav-v2.css">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Press+Start+2P&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
  <script src="/js/card-global.js" defer></script>
  <script src="/js/card-particles.js" defer></script>
  <script>
    // Load card-v4.js safely — its MutationObserver can crash if expected elements don't exist
    (function() {
      var s = document.createElement('script');
      s.src = '/js/card-v4.js';
      s.defer = true;
      s.onerror = function() { console.warn('card-v4.js failed to load'); };
      // Wrap in try-catch by intercepting errors from this script
      window.addEventListener('error', function cardV4Guard(e) {
        if (e.filename && e.filename.indexOf('card-v4') !== -1) {
          console.warn('card-v4.js error caught:', e.message);
          e.preventDefault();
          return true;
        }
      });
      document.head.appendChild(s);
    })();
  </script>
  <style>
    :root {
      --bg: #1a1528;
      --bg-deep: #0e0a18;
      --bg-card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-subtle: rgba(255,255,255,0.06);
      --gold: #D4A64B;
      --gold-dim: rgba(212,166,75,0.1);
      --bright: #F0ECF8;
      --body: #CCC5DB;
      --muted: #847C98;
      --faint: #554E68;
      --green: #44cc88;
      --red: #ff4466;
      --blue: #5599ff;
      --cyan: #00D4FF;
      --font-title: 'Cinzel', serif;
      --font-data: 'Press Start 2P', monospace;
      --font-body: 'Crimson Text', serif;
      --radius-sm: 6px;
      --radius-md: 10px;
      --text-body: #CCC5DB;
      --text-muted: #847C98;
      --nav-height: 52px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--body);
      font-family: 'Crimson Text', serif;
      min-height: 100vh;
      overflow-x: hidden;
      padding-top: var(--nav-height);
    }

    /* ====== ZONE LIST VIEW ====== */
    #zone-list-view { max-width: 900px; margin: 0 auto; padding: 0 12px; }

    .nl-header {
      padding: 16px 16px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nl-title { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
    .nl-subtitle { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--faint); margin-top: 4px; }
    .nl-active-badge { display: flex; align-items: center; gap: 6px; }
    .nl-active-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    .nl-active-text { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--green); }

    /* Player bar */
    .nl-player-bar {
      padding: 0 16px 12px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .nl-stat-pill {
      display: flex; align-items: center; gap: 4px;
      font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--faint);
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 20px;
    }
    .nl-stat-pill .val { color: var(--cyan); }

    /* Tabs */
    .nl-tabs {
      display: flex; padding: 0 16px;
      border-bottom: 1px solid var(--border); margin-bottom: 14px;
    }
    .nl-tab {
      font-family: 'Press Start 2P', monospace; font-size: 9px;
      padding: 10px 12px; cursor: pointer; border: none; background: none;
      color: var(--faint); border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .nl-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .nl-tab:hover { color: var(--body); }

    /* Zone cards */
    .nl-zones {
      padding: 0 16px 80px;
      display: grid; grid-template-columns: 1fr; gap: 12px;
    }
    @media (min-width: 640px) {
      .nl-zones { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 900px) {
      .nl-zones { grid-template-columns: 1fr 1fr 1fr; }
    }

    .zone-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      display: flex; flex-direction: column;
    }
    .zone-card:hover { transform: translateY(-2px); border-color: rgba(212,166,75,0.3); box-shadow: 0 6px 24px rgba(0,0,0,0.35); }

    /* Biome banner image at top of each zone card */
    .zone-card-img-wrap {
      height: 120px; position: relative; overflow: hidden;
      background-color: rgba(255,255,255,0.02); flex-shrink: 0;
    }
    .zone-card-img-wrap > img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.3s;
    }
    .zone-card:hover .zone-card-img-wrap > img { transform: scale(1.04); }
    .zone-card-img-wrap::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(0deg, var(--bg-card) 0%, rgba(26,21,40,0.5) 35%, transparent 100%);
      pointer-events: none;
    }
    /* House crest removed — zones are guild-controlled */
    .zone-card-house-crest { display: none; }

    .zone-card-deployed-badge {
      position: absolute; top: 8px; left: 8px; z-index: 2;
      font-family: 'Press Start 2P', monospace; font-size: 7px;
      color: var(--gold); background: rgba(10,8,18,0.85);
      padding: 4px 10px; border-radius: 6px;
      backdrop-filter: blur(4px); border: 1px solid rgba(212,166,75,0.4);
      letter-spacing: 0.5px;
    }
    .zone-card-fighter-count {
      position: absolute; top: 8px; right: 8px; z-index: 2;
      font-family: 'Press Start 2P', monospace; font-size: 7px;
      color: var(--green); background: rgba(10,8,18,0.85);
      padding: 4px 10px; border-radius: 6px;
      backdrop-filter: blur(4px); border: 1px solid rgba(68,204,136,0.25);
    }
    /* Zone name overlaid on biome image — gold title */
    .zone-card-overlay-name {
      position: absolute; bottom: 8px; left: 12px; z-index: 2;
      font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700;
      color: var(--gold); text-shadow: 0 2px 8px rgba(0,0,0,0.95), 0 0 20px rgba(0,0,0,0.7);
      line-height: 1.2; max-width: 80%;
    }
    /* Region label removed from card — shown in detail panel only */
    .zone-card-overlay-region { display: none; }

    /* Leading guild pill on card body */
    .zone-guild-leader-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      font-family: 'Press Start 2P', monospace; font-size: 7px;
      font-weight: 700; border: 1px solid; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    /* Pulsing active indicator in detail panel */
    @keyframes activePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
    .nines-fighting-badge {
      animation: activePulse 2s ease-in-out infinite;
    }

    .zone-event-banner {
      padding: 6px 14px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      font-family: 'Press Start 2P', monospace; font-size: 9px;
    }
    .zone-objective-banner {
      background: linear-gradient(90deg, rgba(212,166,75,0.15), transparent);
      padding: 6px 14px; display: flex; align-items: center; gap: 6px;
      border-bottom: 1px solid var(--border);
      font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--gold);
    }

    .zone-card-body { padding: 10px 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .zone-name { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; color: var(--bright); margin-bottom: 2px; }
    .zone-region { font-family: 'Press Start 2P', monospace; font-size: 8px; opacity: 0.7; }
    .zone-badge {
      font-family: 'Press Start 2P', monospace; font-size: 7px;
      padding: 3px 8px; border-radius: 4px; font-weight: 700;
    }
    .zone-badge.contested { color: var(--red); background: rgba(255,68,102,0.1); border: 1px solid rgba(255,68,102,0.15); }
    .zone-badge.held { color: var(--green); background: rgba(68,204,136,0.1); border: 1px solid rgba(68,204,136,0.15); }

    /* Guild bars */
    .guild-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .guild-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .guild-name { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--body); width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .guild-track { flex: 1; height: 6px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; }
    .guild-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .guild-pct { font-family: 'Press Start 2P', monospace; font-size: 8px; width: 32px; text-align: right; font-weight: 700; }

    /* Effect pills */
    .effect-pills { display: flex; gap: 4px; flex-wrap: wrap; }
    .effect-pill {
      font-family: 'Press Start 2P', monospace; font-size: 7px; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
    }
    .zone-casters { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--faint); }

    /* ====== ARENA VIEW ====== */
    #arena-view { display: none; position: fixed; top: var(--nav-height); left: 0; width: 100vw; height: calc(100vh - var(--nav-height)); z-index: 50; background: var(--bg); }
    #arena-canvas canvas { display: block; }
    #arena-canvas {
      width: 100%; height: 100%; position: relative;
      background-size: cover; background-position: center center;
      background-repeat: no-repeat; background-color: var(--bg);
      transition: background-image 0.8s ease;
    }
    #arena-canvas::before {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at center, rgba(26,21,40,0.15) 0%, rgba(26,21,40,0.5) 50%, rgba(14,10,24,0.92) 100%);
      pointer-events: none;
    }
    #arena-canvas canvas { position: relative; z-index: 1; }

    /* ── Top bar — slim, one row ── */
    .arena-top-bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      padding: 8px 14px; display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(180deg, rgba(14,10,24,0.92) 0%, rgba(14,10,24,0.5) 80%, transparent 100%);
      pointer-events: auto;
    }
    .arena-zone-name { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; color: var(--bright); }
    .arena-back-btn {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px; cursor: pointer;
      font-size: 16px; color: var(--muted); line-height: 1;
      transition: color 0.2s, background 0.2s;
    }
    .arena-back-btn:hover { color: var(--bright); background: rgba(255,255,255,0.1); }

    /* LIVE pill */
    .arena-live-pill {
      font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--green);
      background: rgba(0,255,136,0.1); padding: 4px 10px; border-radius: 20px;
      border: 1px solid rgba(0,255,136,0.25); letter-spacing: 1px;
      animation: livePulse 2s infinite;
    }
    @keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* Compact timer */
    .arena-timer-compact {
      display: flex; align-items: center; gap: 5px;
      font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--cyan);
    }
    .timer-icon { font-size: 10px; opacity: 0.6; }
    .countdown-time { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--cyan); }
    .countdown-time.urgent { color: var(--red); animation: countdownPulse 1s infinite; }
    .countdown-time.fighting { color: var(--gold); }
    @keyframes countdownPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* ── Guild scoreboard ── */
    .arena-scoreboard { display: none; } /* replaced by sidebar */
    .arena-sb-title, .arena-sb-row, .arena-sb-guild, .arena-sb-wins { display: none; }

    /* ── Nerm ── */
    .nerm-bubble-container {
      position: absolute; bottom: 230px; left: 10px; z-index: 25;
      display: flex; align-items: flex-end; gap: 8px;
      pointer-events: none; opacity: 0;
      transition: opacity 0.35s ease;
      max-width: 300px;
    }
    .nerm-bubble-container.visible { opacity: 1; }
    .nerm-pfp {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--gold);
      box-shadow: 0 0 12px rgba(212,166,75,0.45), 0 0 4px rgba(212,166,75,0.2);
      background: #1a1528 url('/assets/images/Mustbenice_Base_model.png') center/cover no-repeat;
      overflow: hidden; align-self: flex-end;
    }
    .nerm-pfp-fallback { font-size: 24px; line-height: 44px; text-align: center; display: block; }
    .nerm-bubble {
      position: relative;
      background: rgba(14,10,24,0.95); border: 1px solid var(--gold);
      border-radius: 10px; padding: 9px 13px;
      box-shadow: 0 0 20px rgba(212,166,75,0.12); backdrop-filter: blur(10px);
      min-width: 160px; max-width: 230px;
    }
    .nerm-bubble::before {
      content: ''; position: absolute; left: -7px; bottom: 14px;
      border-top: 6px solid transparent; border-bottom: 6px solid transparent;
      border-right: 7px solid var(--gold);
    }
    .nerm-bubble::after {
      content: ''; position: absolute; left: -5px; bottom: 15px;
      border-top: 5px solid transparent; border-bottom: 5px solid transparent;
      border-right: 6px solid rgba(14,10,24,0.95);
    }
    .nerm-label { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--gold); margin-bottom: 5px; letter-spacing: 1px; }
    #nerm-text { font-family: 'Crimson Text', serif; font-size: 14px; color: var(--bright); font-style: italic; line-height: 1.45; min-height: 18px; }
    .nerm-cursor { display: inline-block; width: 2px; height: 13px; background: var(--gold); margin-left: 1px; vertical-align: middle; animation: nermBlink 0.7s step-end infinite; }
    @keyframes nermBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── Bottom tray — unified build + stats ── */
    /* ══════════════════════════════════════════════
       UNIFIED BOTTOM TRAY
       Column: YOUR NINE header → tab bar → content
    ══════════════════════════════════════════════ */
    .arena-bottom-tray {
      position: absolute; bottom: 0; left: 0; right: 270px; z-index: 25;
      display: flex; flex-direction: column;
      background: rgba(10,8,20,0.97);
      border-top: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(10px);
      max-height: 220px;
    }

    /* YOUR NINE — fixed header strip */
    .tray-nine-header {
      padding: 8px 14px 6px; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .tray-nine-top {
      display: flex; align-items: center; gap: 10px; margin-bottom: 5px;
    }

    /* Tab bar */
    #arena-tray-tabs {
      display: flex; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .tray-tab {
      flex: 1; background: none; border: none;
      border-right: 1px solid rgba(255,255,255,0.06);
      color: var(--faint); font-family: 'Press Start 2P', monospace; font-size: 6px;
      padding: 8px 4px; cursor: pointer; transition: color 0.2s, background 0.2s;
      letter-spacing: 0.5px;
    }
    .tray-tab:last-child { border-right: none; }
    .tray-tab.active { color: var(--gold); background: rgba(212,166,75,0.08); }
    .tray-tab:hover:not(.active) { color: var(--bright); }

    /* Content area */
    #arena-tray-body {
      flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0;
    }
    .tray-pane {
      display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden;
    }
    .tray-pane.active { display: flex; }

    /* BUILD pane */
    .build-pane-header {
      padding: 5px 12px 4px; flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Card slots — compact horizontal design ── */
    .arena-card-slot {
      flex: 1; min-width: 0; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 8px; position: relative;
      transition: border-color 0.2s; cursor: pointer;
    }
    .arena-card-slot:hover { border-color: rgba(212,166,75,0.3); }
    .arena-card-slot .slot-type {
      font-family: 'Press Start 2P', monospace; font-size: 5px; font-weight: 700;
      letter-spacing: 0.5px; margin-bottom: 2px;
    }
    .arena-card-slot .slot-name {
      font-family: 'Cinzel', serif; font-size: 10px; font-weight: 700; color: var(--bright);
      line-height: 1.2; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .arena-card-slot .slot-effects {
      display: flex; gap: 3px; flex-wrap: wrap;
    }
    .arena-card-slot .slot-effect-pill {
      font-family: 'Press Start 2P', monospace; font-size: 5px;
      padding: 1px 4px; border-radius: 3px; white-space: nowrap;
    }
    .arena-card-slot .slot-sharpness {
      margin-top: 3px; height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden;
    }
    .arena-card-slot .slot-sharpness-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }
    .arena-card-slot.empty {
      border-style: dashed; opacity: 0.3;
      display: flex; align-items: center; justify-content: center;
      min-height: 52px;
    }
    .arena-card-slot.empty .slot-empty-text {
      font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--faint);
    }
    .tray-section-label {
      font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--gold);
      letter-spacing: 1px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
    }
    .build-swap-btn {
      font-family: 'Press Start 2P', monospace; font-size: 5px; color: var(--faint);
      background: none; border: 1px solid var(--border); padding: 3px 8px;
      border-radius: 3px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s;
    }
    .build-swap-btn:hover { color: var(--gold); border-color: var(--gold); }
    .build-cards { display: flex; gap: 6px; padding: 4px 12px 8px; flex: 1; overflow-x: auto; }
    .your-nine-hp { display: flex; align-items: center; gap: 6px; }
    .your-nine-hp-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .your-nine-hp-fill { height: 100%; background: linear-gradient(90deg, var(--green), #66eebb); border-radius: 3px; transition: width 0.4s ease; }
    .your-nine-hp-text { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--green); white-space: nowrap; }
    .your-nine-stats { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .your-nine-stat { font-family: 'Press Start 2P', monospace; font-size: 7px; }
    .btn-withdraw {
      margin-top: 6px; font-family: 'Press Start 2P', monospace; font-size: 6px;
      padding: 5px 10px; background: rgba(255,68,102,0.08); border: 1px solid rgba(255,68,102,0.2);
      color: var(--red); border-radius: 6px; cursor: pointer; transition: background 0.2s;
      width: 100%;
    }
    .btn-withdraw:hover { background: rgba(255,68,102,0.15); }

    /* ── Deploy CTA ── */
    .arena-deploy-cta {
      position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%); z-index: 25;
      pointer-events: auto;
    }
    .btn-join-battle {
      font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700;
      padding: 14px 32px; border: none; border-radius: 10px; cursor: pointer;
      background: linear-gradient(135deg, var(--gold), #b8872e);
      color: #fff; letter-spacing: 2px;
      box-shadow: 0 4px 24px rgba(212,166,75,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-join-battle:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(212,166,75,0.4); }

    /* ── Live feed — above bottom tray ── */
    /* ── ARENA FEED PANEL — visible, readable, bottom of screen ── */
    .arena-feed { display: none; } /* key events go into sidebar Log tab */
    .feed-event {
      display: flex; gap: 8px; align-items: center;
      padding: 4px 8px; border-radius: 6px;
      font-family: 'Crimson Text', serif; font-size: 14px; color: var(--body);
      background: rgba(255,255,255,0.03);
      opacity: 0; animation: feedIn 0.25s forwards;
      transition: opacity 0.5s;
    }
    .feed-event.feed-type-attack { border-left: 2px solid var(--red); }
    .feed-event.feed-type-effect { border-left: 2px solid var(--gold); }
    .feed-event.feed-type-ko     { border-left: 2px solid #ff2222; background: rgba(255,34,34,0.08); }
    .feed-event.feed-type-heal   { border-left: 2px solid var(--green); }
    .feed-event.feed-type-system { border-left: 2px solid var(--faint); }
    .feed-event .feed-name { font-weight: 700; color: var(--bright); }
    .feed-event .feed-dmg  { color: var(--red); font-weight: 700; }
    .feed-event .feed-heal { color: var(--green); font-weight: 700; }
    .feed-event .feed-effect { color: var(--gold); }
    .feed-event .feed-crit { color: #ffd700; font-weight: 700; }
    .feed-event .feed-time { color: var(--faint); margin-left: auto; flex-shrink: 0; font-size: 11px; }

    /* HP status strip above feed */
    .arena-hp-strip {
      position: absolute; bottom: 0; left: 0; right: 270px; z-index: 14;
      padding: 4px 12px 6px; display: flex; gap: 8px; align-items: center;
      background: linear-gradient(180deg, transparent, rgba(10,8,18,0.7));
      pointer-events: none; flex-wrap: wrap;
    }
    .hp-strip-fighter {
      display: flex; align-items: center; gap: 6px; flex: 1; min-width: 140px;
    }
    .hp-strip-name {
      font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--bright);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px;
    }
    .hp-strip-bar {
      flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden;
    }
    .hp-strip-fill {
      height: 100%; border-radius: 4px; transition: width 0.4s;
    }
    .hp-strip-text {
      font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--muted);
      white-space: nowrap;
    }
    /* Active effects icons on fighters */
    .hp-strip-effects { display: flex; gap: 2px; }
    .hp-strip-effect-icon { font-size: 10px; }

    /* Round banner */
    .round-banner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 50; pointer-events: none; text-align: center;
      opacity: 0; animation: bannerPop 2s forwards;
    }
    .round-banner-text {
      font-family: 'Cinzel', serif; font-size: 32px; font-weight: 800; color: var(--gold);
      text-shadow: 0 0 40px rgba(212,166,75,0.5), 0 4px 8px rgba(0,0,0,0.8);
      letter-spacing: 6px;
    }
    .round-banner-sub {
      font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--bright);
      margin-top: 8px; opacity: 0.8;
    }

    /* Deploy modal */
    .deploy-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 2000; background: rgba(26,21,40,0.96);
      overflow-y: auto;
    }
    .deploy-modal.open { display: block; }
    .deploy-inner {
      max-width: 600px; margin: 20px auto; padding: 20px; position: relative;
    }
    .deploy-close-x {
      position: absolute; top: 8px; right: 12px; z-index: 5;
      background: none; border: none; color: var(--muted); font-size: 28px;
      cursor: pointer; padding: 4px 10px; line-height: 1;
      transition: color 0.2s;
    }
    .deploy-close-x:hover { color: var(--bright); }
    .deploy-title { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 16px; }
    .deploy-stats-preview {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; margin-bottom: 16px;
    }
    .deploy-stat-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .deploy-stat {
      font-family: 'Press Start 2P', monospace; font-size: 9px;
      display: flex; align-items: center; gap: 4px;
    }
    .deploy-cards-title { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--faint); letter-spacing: 1px; margin-bottom: 10px; }
    .deploy-card-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
      gap: 10px; margin-bottom: 16px; max-height: 55vh; overflow-y: auto;
      padding-right: 4px; justify-items: center;
    }
    .deploy-card-slot {
      cursor: pointer; transition: all 0.15s;
      position: relative; border-radius: 14px;
      border: 2px solid transparent;
      padding: 2px;
    }
    .deploy-card-slot:hover { transform: translateY(-4px); }
    .deploy-card-slot .spell-card { pointer-events: none; }
    .deploy-card-slot .spell-card:hover { transform: none; box-shadow: none; }
    .deploy-card-slot.selected { border-color: var(--gold); box-shadow: 0 0 24px rgba(212,166,75,0.35); }
    .deploy-card-slot.deployed-elsewhere { opacity: 0.25; pointer-events: none; }
    .selected-badge {
      display: none; position: absolute; top: -1px; left: -1px; right: -1px; z-index: 10;
      text-align: center; padding: 6px; font-family: 'Press Start 2P', monospace;
      font-size: 8px; color: var(--bg); background: var(--gold);
      letter-spacing: 1px; font-weight: 700;
      border-radius: 14px 14px 0 0;
    }
    .deploy-card-slot.selected .selected-badge { display: block; }
    .deploy-card-slot.deployed-elsewhere::after {
      content: 'DEPLOYED'; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--red);
      background: rgba(10,8,18,0.9); padding: 4px 10px; border-radius: 4px; z-index: 10;
    }
    .deploy-sharpness-bar {
      height: 4px; background: rgba(255,255,255,0.06);
      border-radius: 0 0 10px 10px; margin-top: -2px;
    }
    .deploy-sharpness-fill {
      height: 100%; border-radius: 0 0 10px 10px; transition: width 0.3s;
    }

    .btn-deploy {
      width: 100%; font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700;
      padding: 16px; border: none; border-radius: 10px; cursor: pointer;
      background: linear-gradient(135deg, var(--gold), #b8872e);
      color: #fff; letter-spacing: 2px;
      box-shadow: 0 4px 20px rgba(212,166,75,0.3);
      transition: all 0.15s;
    }
    .btn-deploy:hover { transform: translateY(-2px); }
    .btn-deploy:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .btn-cancel {
      width: 100%; margin-top: 8px; font-family: 'Press Start 2P', monospace; font-size: 9px;
      padding: 12px; border: 1px solid var(--border); border-radius: 10px;
      cursor: pointer; background: none; color: var(--muted);
    }

    /* Loading state */
    .loading-text { text-align: center; padding: 60px 20px; font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--faint); }

    /* Animations */
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes feedIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 0.8; transform: none; } }
    @keyframes bannerPop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      40% { transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    }

    /* ── Arena Chat ── */
    /* ═══════════════════════════════════════════
       RIGHT SIDEBAR — desktop only
    ═══════════════════════════════════════════ */
    #arena-sidebar {
      display: none;
      position: absolute; top: 54px; right: 10px; z-index: 25;
      width: 250px;
      flex-direction: column;
      background: rgba(10,8,20,0.92); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px; overflow: hidden; backdrop-filter: blur(12px);
      bottom: 10px; /* anchor to bottom so height fills naturally */
    }
    #sidebar-guilds { padding: 10px 10px 6px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .sidebar-section-label {
      font-family: 'Press Start 2P', monospace; font-size: 6px;
      color: var(--faint); letter-spacing: 1px; margin-bottom: 7px;
    }
    .sidebar-guild-row {
      display: flex; flex-direction: column; gap: 3px;
      padding: 6px 8px; border-radius: 8px; margin-bottom: 4px;
      background: rgba(255,255,255,0.03); cursor: default;
      transition: background 0.2s; border: 1px solid transparent;
    }
    .sidebar-guild-row:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); }
    .sidebar-guild-top { display: flex; align-items: center; gap: 7px; }
    .sidebar-guild-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sidebar-guild-name { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--bright); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sidebar-guild-hp { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--green); }
    .sidebar-guild-nines { font-family: 'Press Start 2P', monospace; font-size: 5px; color: var(--faint); }
    .sidebar-guild-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
    .sidebar-guild-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

    /* sidebar just shows guilds now — tabs moved to bottom tray */

    #arena-chat-log {
      flex: 1; overflow-y: auto; padding: 6px 12px;
      display: flex; flex-direction: column; gap: 3px;
    }
    #arena-chat-log::-webkit-scrollbar { width: 2px; }
    #arena-chat-log::-webkit-scrollbar-thumb { background: rgba(212,166,75,0.2); }
    .chat-msg { font-family: 'Crimson Text', serif; font-size: 13px; line-height: 1.4; word-break: break-word; }
    .chat-msg .chat-handle { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--gold); margin-right: 4px; }
    .chat-msg .chat-guild { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--faint); }
    .chat-input-row { display: flex; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    #arena-chat-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: 'Crimson Text', serif; font-size: 13px; color: var(--bright); padding: 7px 10px;
    }
    #arena-chat-input::placeholder { color: var(--faint); font-size: 12px; }
    #arena-chat-send {
      background: none; border: none; border-left: 1px solid rgba(255,255,255,0.06);
      color: var(--gold); cursor: pointer; padding: 7px 12px; font-size: 14px; transition: color 0.2s;
    }
    #arena-chat-send:hover { color: var(--bright); }
    #contribution-list { flex: 1; overflow-y: auto; padding: 6px 10px; display: flex; flex-direction: column; gap: 5px; }
    .contrib-row { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 6px; background: rgba(255,255,255,0.03); }
    .contrib-name { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--bright); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .contrib-stat { font-family: 'Press Start 2P', monospace; font-size: 6px; white-space: nowrap; }
    #battle-log-full { flex: 1; overflow-y: auto; padding: 6px 10px; display: flex; flex-direction: column; gap: 2px; }
    .log-entry { font-family: 'Crimson Text', serif; font-size: 12px; color: var(--muted); line-height: 1.4; padding-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .log-entry.log-ko { color: var(--red); }
    .log-entry.log-spell { color: var(--gold); }
    .log-entry.log-heal { color: var(--green); }

    /* ── Guild control pill ── */
    #guild-control-pill {
      font-family: 'Press Start 2P', monospace; font-size: 6px;
      padding: 3px 8px; border-radius: 10px; white-space: nowrap;
      border: 1px solid; letter-spacing: 0.5px; display: none;
    }

    /* ── Card cooldown bars ── */
    .slot-cooldown { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.06); border-radius: 0 0 8px 8px; overflow: hidden; }
    .slot-cooldown-fill { height: 100%; background: var(--gold); transition: width 0.4s linear; border-radius: 0 0 8px 8px; }
    .slot-casting-flash { animation: castFlash 0.4s ease-out; }
    @keyframes castFlash { 0% { background: rgba(212,166,75,0.4); } 100% { background: transparent; } }

    /* (old card-slot overrides removed — now in bottom tray section) */

    /* Card popup overlay */
    .arena-card-popup {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10,8,18,0.85); backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }
    .arena-card-popup .popup-inner {
      position: relative; display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .arena-card-popup .popup-close {
      font-family: 'Press Start 2P', monospace; font-size: 8px;
      color: var(--faint); background: none; border: 1px solid var(--border);
      padding: 6px 16px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
    }
    .arena-card-popup .popup-close:hover { color: var(--bright); border-color: var(--gold); }
    .arena-card-popup .popup-wave-label {
      font-family: 'Press Start 2P', monospace; font-size: 10px;
      color: var(--gold); letter-spacing: 2px;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ════════════════════════════════════════
       MOBILE ARENA LAYOUT — bottom tray design
       On small screens, panels dock to bottom
       instead of floating as tiny overlays
       ════════════════════════════════════════ */
    @media (max-width: 640px) {
      .arena-top-bar { padding: 6px 10px; }
      .arena-zone-name { font-size: 12px; }
      .arena-live-pill { font-size: 6px; padding: 3px 7px; }
      .arena-timer-compact { font-size: 7px; }
      .countdown-time { font-size: 7px; }
      .arena-scoreboard { display: none; }
      .nerm-bubble-container {
        bottom: 240px; left: 8px; right: auto; max-width: calc(100% - 16px);
      }
      .nerm-bubble { min-width: 0; max-width: 200px; font-size: 12px; padding: 7px 10px; }
      .nerm-pfp { width: 36px; height: 36px; }

      /* On mobile: tray is full width (no sidebar) */
      .arena-bottom-tray { right: 0; }
      #arena-sidebar { display: none !important; }
      .arena-feed { display: none; }
      .arena-hp-strip { display: none; }

      .arena-deploy-cta { bottom: 0; right: 0; left: 0; transform: none; text-align: center; padding: 12px; }
      .btn-join-battle { font-size: 13px; padding: 12px 28px; }

      .deploy-inner { padding: 14px 10px; margin: 10px auto; }
      .deploy-title { font-size: 16px; }
      .deploy-card-grid { grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 6px; max-height: 350px; }
      .btn-deploy { font-size: 14px; padding: 14px; }
      .arena-card-slot { min-width: 100px; }
      .tray-tab { font-size: 5px; padding: 8px 2px; }
    }

    @media (min-width: 1200px) {
      .arena-card-slot .slot-name { font-size: 11px; }
      .your-nine-stat { font-size: 8px; }
    }

    /* Nav overrides — Packs gold pill */
    .nav-packs-btn {
      border: 1px solid var(--gold) !important;
      border-radius: 4px !important;
      color: var(--gold) !important;
      padding: 4px 14px !important;
    }
    .nav-packs-btn:hover {
      background: var(--gold-dim) !important;
    }
  </style>
</head>
<body>

<!-- ====== SITE NAV BAR ====== -->
<script src="/js/nav.js"></script>

<!-- ====== ZONE LIST VIEW ====== -->
<div id="zone-list-view">
  <div class="nl-header">
    <div>
      <div class="nl-title">NETHARA</div>
      <div class="nl-subtitle" id="season-info">SEASON 1 · DAY --</div>
    </div>
    <div class="nl-active-badge">
      <div class="nl-active-dot"></div>
      <div class="nl-active-text" id="active-count">-- Active</div>
    </div>
  </div>

  <div class="nl-player-bar" id="player-bar">
    <div class="nl-stat-pill">LVL <span class="val" id="player-level">--</span></div>
    <div class="nl-stat-pill">🎫 <span class="val" id="player-tickets">--</span></div>
    <div class="nl-stat-pill">⚔️ <span class="val" id="player-zones">--</span> zones</div>
  </div>

  <div class="nl-tabs">
    <button class="nl-tab active" data-tab="hot">🔥 Hot Zones</button>
    <button class="nl-tab" data-tab="events">⚡ Events</button>
    <button class="nl-tab" data-tab="guild">👥 Guild</button>
  </div>

  <div class="nl-zones" id="zone-container">
    <div class="loading-text">Loading zones...</div>
  </div>
</div>

<!-- ====== ARENA VIEW ====== -->
<div id="arena-view">
  <div id="arena-canvas"></div>

  <!-- Top bar: Back | Zone name | LIVE pill + timer -->
  <div class="arena-top-bar">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="arena-back-btn interactive" id="btn-back">←</button>
      <div class="arena-zone-name" id="arena-zone-name">--</div>
      <div id="guild-control-pill"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="arena-timer-compact" id="arena-countdown">
        <span class="timer-icon">⏱</span>
        <span class="countdown-time" id="countdown-time">--:--</span>
      </div>
      <div class="arena-live-pill" id="arena-round-badge">LIVE</div>
    </div>
  </div>
  <!-- hidden elements for backwards compat -->
  <div id="arena-zone-region" style="display:none">--</div>
  <div id="arena-cycle-timer" style="display:none"></div>
  <div id="countdown-label" style="display:none"></div>
  <div id="countdown-sub" style="display:none"></div>

  <!-- ── RIGHT SIDEBAR: Guilds + Chat/Stats/Log ── desktop only -->
  <div id="arena-sidebar">

    <!-- Guild section: who's fighting, hover to highlight -->
    <div id="sidebar-guilds">
      <div class="sidebar-section-label">COMPETING GUILDS</div>
      <div id="sidebar-guild-rows"></div>
    </div>
  </div>

  <!-- ── HIDDEN: old scoreboard kept for JS compat ── -->
  <div id="arena-scoreboard" style="display:none;">
    <div id="scoreboard-rows"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       UNIFIED BOTTOM PANEL — YOUR NINE + tabbed content
       Tabs: BUILD | CHAT | STATS | LOG
       Same on desktop and mobile.
  ════════════════════════════════════════════════════ -->
  <div class="arena-bottom-tray" id="arena-bottom-tray" style="display:none;">

    <!-- YOUR NINE — always visible at top -->
    <div class="tray-nine-header" id="your-nine-panel">
      <div class="tray-nine-top">
        <span class="tray-section-label" style="margin-bottom:0; flex-shrink:0;">YOUR NINE</span>
        <div class="your-nine-hp">
          <div class="your-nine-hp-bar"><div class="your-nine-hp-fill" id="your-hp-fill" style="width:100%"></div></div>
          <div class="your-nine-hp-text" id="your-hp-text">--/--</div>
        </div>
        <button class="btn-withdraw" id="btn-withdraw" style="width:auto; padding:4px 10px; margin-top:0; flex-shrink:0;">WITHDRAW</button>
      </div>
      <div class="your-nine-stats" id="your-nine-stats"></div>
    </div>

    <!-- Tab bar: BUILD | CHAT | STATS | LOG -->
    <div id="arena-tray-tabs">
      <button class="tray-tab active" data-tab="build">🗡️ BUILD</button>
      <button class="tray-tab" data-tab="chat">💬 CHAT</button>
      <button class="tray-tab" data-tab="stats">📊 STATS</button>
      <button class="tray-tab" data-tab="log">📜 LOG</button>
    </div>

    <!-- Content pane — switches on tab click -->
    <div id="arena-tray-body">

      <!-- BUILD pane -->
      <div class="tray-pane active" id="tray-pane-build">
        <div class="build-pane-header">
          <button class="build-swap-btn" id="btn-swap-build">⇄ SWAP CARDS</button>
        </div>
        <div class="build-cards" id="arena-card-slots">
          <div class="arena-card-slot empty" id="card-slot-0"><span class="slot-empty-text">1</span></div>
          <div class="arena-card-slot empty" id="card-slot-1"><span class="slot-empty-text">2</span></div>
          <div class="arena-card-slot empty" id="card-slot-2"><span class="slot-empty-text">3</span></div>
        </div>
      </div>

      <!-- CHAT pane -->
      <div class="tray-pane" id="tray-pane-chat">
        <div id="arena-chat-log"></div>
        <div class="chat-input-row">
          <input id="arena-chat-input" type="text" maxlength="120" placeholder="Say something...">
          <button id="arena-chat-send">➤</button>
        </div>
      </div>

      <!-- STATS pane -->
      <div class="tray-pane" id="tray-pane-stats">
        <div id="contribution-list"></div>
      </div>

      <!-- LOG pane -->
      <div class="tray-pane" id="tray-pane-log">
        <div id="battle-log-full"></div>
      </div>

    </div>
  </div>

  <!-- Center-bottom: Deploy CTA (when NOT deployed) -->
  <div class="arena-deploy-cta" id="deploy-cta" style="display:none;">
    <button class="btn-join-battle" id="btn-join-battle">⚔️ JOIN BATTLE</button>
  </div>

  <div class="nerm-bubble-container" id="nerm-bubble-container">
    <div class="nerm-pfp"><span class="nerm-pfp-fallback">🐱</span></div>
    <div class="nerm-bubble" id="nerm-bubble">
      <div class="nerm-label">NERM</div>
      <div id="nerm-text"></div>
    </div>
  </div>

  <!-- HP status strip: all fighters, above feed -->
  <div class="arena-hp-strip" id="arena-hp-strip"></div>

  <!-- Bottom: Live feed -->
  <div class="arena-feed" id="arena-feed"></div>

  <!-- Round banner (animated overlay) -->
  <div class="round-banner" id="round-banner" style="display:none;">
    <div class="round-banner-text" id="round-banner-text">COMBAT LIVE</div>
    <div class="round-banner-sub" id="round-banner-sub">FIGHT!</div>
  </div>
</div>
<!-- arena-view ends above -->

<!-- ====== DEPLOY MODAL — must be OUTSIDE arena-view, above everything ====== -->
<div class="deploy-modal" id="deploy-modal">
  <div class="deploy-inner">
    <button class="deploy-close-x" id="btn-close-deploy">&times;</button>
    <div class="deploy-title">⚔️ Deploy to <span id="deploy-zone-name"></span></div>

    <div class="deploy-stats-preview">
      <div style="font-family:\'Press Start 2P\',monospace; font-size:7px; color:var(--faint); letter-spacing:1px; margin-bottom:8px;">CARD STATS BONUS</div>
      <div class="deploy-stat-row" id="deploy-stats-row">
        <div class="deploy-stat"><span style="color:#e85a6a">ATK</span> <span id="deploy-atk">--</span></div>
        <div class="deploy-stat"><span style="color:#6acd8a">HP</span> <span id="deploy-hp">--</span></div>
        <div class="deploy-stat"><span style="color:#6ac8d8">SPD</span> <span id="deploy-spd">--</span></div>
        <div class="deploy-stat"><span style="color:#b088e8">DEF</span> <span id="deploy-def">--</span></div>
        <div class="deploy-stat"><span style="color:#D4A64B">LUCK</span> <span id="deploy-luck">--</span></div>
      </div>
    </div>

    <div class="deploy-cards-title">SELECT 3 CARDS (<span id="deploy-selected-count">0</span>/3)</div>
    <div class="deploy-card-grid" id="deploy-card-grid">
      <div class="loading-text">Loading cards...</div>
    </div>

    <button class="btn-deploy" id="btn-confirm-deploy" disabled>SELECT 3 CARDS TO DEPLOY</button>
    <button class="btn-cancel" id="btn-cancel-deploy">CANCEL</button>
  </div>
</div>

<!-- ====== MAIN SCRIPT ====== -->
<script>
(function() {
  'use strict';

  // ── NAV HAMBURGER TOGGLE ──
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  if (hamburger && mobileMenu) {
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      mobileMenu.classList.toggle('active');
    });
    // Close menu on link click
    mobileMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        hamburger.classList.remove('active');
        mobileMenu.classList.remove('active');
      });
    });
  }

  // Logout handlers
  document.querySelectorAll('#nav-logout, #mobile-logout').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('playerId');
      localStorage.removeItem('token');
      window.location.href = '/';
    });
  });

  // ===== STATE =====
  const state = {
    playerId: null,
    playerHouse: null,
    playerLevel: 1,
    zones: [],
    deployedZoneIds: new Set(),
    currentTab: 'hot',
    currentZoneId: null,
    currentZone: null,
    socket: null,
    arenaApp: null, // PixiJS app
    nines: new Map(), // id → pixi sprite data
    selectedCards: [],
    playerCards: [],
    _deployNoCards: false,
    isDeployed: false,
    feedEvents: [],
    guildScores: {},
    guildRoundWins: {},
    guildKOs: {},
    roundWins: {},
    // Countdown timer
    cycleEndTime: null,       // timestamp when next snapshot fires
    countdownInterval: null,  // setInterval ref
    currentRound: 0,          // legacy compat
    totalRounds: 3,           // legacy compat
    currentCycle: 0,          // legacy compat
    isFighting: false,        // true when combat is active on zone
    snapshotCount: 0,         // how many snapshots scored this session
    // Equipped cards for this zone
    equippedCards: [],
  };

  // ===== HOUSE DATA =====
  const HOUSES = {
    smoulders:   { color: '#E03C31', name: 'Smoulders', icon: '🔥', crest: '/assets/images/houses/Housesmoulders.png', biome: '/assets/images/biomes/smoulders.png' },
    darktide:    { color: '#00B4D8', name: 'Darktide', icon: '🌊', crest: '/assets/images/houses/Housedarktide.png', biome: '/assets/images/biomes/darktide.png' },
    stonebark:   { color: '#5CB338', name: 'Stonebark', icon: '🌿', crest: '/assets/images/houses/Housestonebark.png', biome: '/assets/images/biomes/stonebark.png' },
    ashenvale:   { color: '#90E0EF', name: 'Ashenvale', icon: '💨', crest: '/assets/images/houses/HouseAshenvale.png', biome: '/assets/images/biomes/ashenvale.png' },
    stormrage:   { color: '#FFC800', name: 'Stormrage', icon: '⚡', crest: '/assets/images/houses/Housestormrage.png', biome: '/assets/images/biomes/stormrage.png' },
    nighthollow: { color: '#7B2D8E', name: 'Nighthollow', icon: '🌙', crest: '/assets/images/houses/Housenighthollow.png', biome: '/assets/images/biomes/nighthollow.png' },
    dawnbringer: { color: '#FF8C00', name: 'Dawnbringer', icon: '☀️', crest: '/assets/images/houses/HouseDwnbringer.png', biome: '/assets/images/biomes/dawnbringer.png' },
    manastorm:   { color: '#5B8FE0', name: 'Manastorm', icon: '🔮', crest: '/assets/images/houses/Housemanastorm.png', biome: '/assets/images/biomes/manastorm.png' },
    plaguemire:  { color: '#E84393', name: 'Plaguemire', icon: '☠️', crest: '/assets/images/houses/Houseplaguemire.png', biome: '/assets/images/biomes/plaguemire.png' },
  };

  const EFFECT_COLORS = {
    BURN: '#ffaa55', WARD: '#D4A64B', POISON: '#aaee55', ANCHOR: '#ccaa66',
    HEX: '#bb88ff', HEAL: '#66eebb', SILENCE: '#bb88ff', CHAIN: '#5599ff',
    EXECUTE: '#ffd700', BARRIER: '#5599ff', THORNS: '#ff6666', DODGE: '#90E0EF',
    FEAST: '#ff3366', LEECH_AURA: '#88ee44', PARASITE: '#bb88ff',
    RESURRECT: '#ffd700', GRAVITY: '#ccaa66', MIRROR: '#5599ff',
  };

  // Map school_id numbers to house keys (DB uses numbers, UI uses strings)
  const SCHOOL_TO_HOUSE = {
    1: 'smoulders', 2: 'darktide', 3: 'stonebark', 4: 'ashenvale',
    5: 'stormrage', 6: 'nighthollow', 7: 'dawnbringer', 8: 'manastorm', 9: 'plaguemire'
  };

  const TYPE_COLORS = {
    attack: '#ff5555', defend: '#55aaff', support: '#55ff99', manipulation: '#cc77ff', utility: '#ffcc55'
  };

  // ===== INIT =====
  async function init() {
    // Get player from localStorage (matches dashboard save keys)
    const stored = localStorage.getItem('9lv_player');
    const rawId = localStorage.getItem('player_id');
    if (stored) {
      try {
        const p = JSON.parse(stored);
        state.playerId = p.id || p.player_id;
        state.playerHouse = p.school_id;
        state.playerLevel = p.level || 1;
        console.log('🐱 Arena: logged in as player', state.playerId);
      } catch(e) {
        if (rawId) {
          state.playerId = parseInt(rawId);
          console.log('🐱 Arena: logged in via player_id fallback', state.playerId);
        }
      }
    } else if (rawId) {
      state.playerId = parseInt(rawId);
      console.log('🐱 Arena: logged in via player_id only', state.playerId);
    } else {
      console.log('🐱 Arena: not logged in — guest mode');
    }

    setupTabs();
    await loadZones();
    updatePlayerBar();
  }

  // ===== TABS =====
  function setupTabs() {
    document.querySelectorAll('.nl-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.nl-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        state.currentTab = tab.dataset.tab;
        renderZoneList();
      });
    });
  }

  // ===== LOAD ZONES =====
  async function loadZones() {
    try {
      // Load zones, counts, and player deployments in parallel
      const fetches = [
        fetch('/api/zones'),
        fetch('/api/zones/counts'),
      ];
      if (state.playerId) fetches.push(fetch(`/api/zones/my-deployments/${state.playerId}`));

      const [zonesRes, countsRes, myDepRes] = await Promise.all(fetches);
      if (!zonesRes.ok) throw new Error('Failed to load zones');
      const data = await zonesRes.json();
      const counts = countsRes.ok ? await countsRes.json() : {};

      // Store which zone IDs this player is currently deployed to
      if (myDepRes && myDepRes.ok) {
        const myDepData = await myDepRes.json();
        state.deployedZoneIds = new Set((myDepData.deployments || []).map(d => d.zone_id));
        updatePlayerBar();
      }

      // Merge nines count into each zone object
      state.zones = (data.zones || data || []).map(z => ({
        ...z,
        arena_nines: counts[z.id] || 0
      }));

      renderZoneList();
      updateActiveCount();
    } catch(e) {
      document.getElementById('zone-container').innerHTML = '<div class="loading-text">Failed to load zones. Retrying...</div>';
      setTimeout(loadZones, 3000);
    }
  }

  // ===== RENDER ZONE LIST =====
  function renderZoneList() {
    const container = document.getElementById('zone-container');
    let zones = [...state.zones];

    // Filter by tab
    if (state.currentTab === 'events') {
      zones = zones.filter(function(z) { return z.event || z.is_current_objective || z.daily_objective; });
    } else if (state.currentTab === 'hot') {
      zones.sort(function(a, b) {
        const aObj = a.daily_objective || a.is_current_objective;
        const bObj = b.daily_objective || b.is_current_objective;
        if (aObj && !bObj) return -1;
        if (bObj && !aObj) return 1;
        if (a.event && !b.event) return -1;
        if (b.event && !a.event) return 1;
        return (b.arena_nines || b.casters || 0) - (a.arena_nines || a.casters || 0);
      });
    }

    if (state.currentTab === 'regions') { state.currentTab = 'hot'; }
    if (state.currentTab === 'guild') {
      renderGuildTab(container);
      return;
    }

    if (zones.length === 0) {
      container.innerHTML = '<div class="loading-text">No zones to show.</div>';
      return;
    }

    container.innerHTML = zones.map(zone => buildZoneCard(zone)).join('');

    // Attach click handlers
    container.querySelectorAll('.zone-card').forEach(card => {
      card.addEventListener('click', () => {
        const zoneId = parseInt(card.dataset.zoneId);
        const zone = state.zones.find(z => z.id === zoneId);
        if (zone) openZoneDetail(zone);
      });
    });
  }


  // ── BIOME IMAGE MAPPING ──
  // Primary: house-specific biome art. Fallback: Hanwu-Boglands.png
  const BIOME_FALLBACK = '/assets/images/biomes/Hanwu-Boglands.png';
  const BIOME_FILE_MAP = {
    'scorched-plains.jpg': 'chaos-rift.png',
    'scorched-plains.png': 'chaos-rift.png',
  };
  const BIOME_LIST = [
    'Hanwu-Boglands.png','misty-falls.png','ancient-ruins.png',
    'twilight-grove.png','dragons-rest.jpg','skycastle.png',
    'chaos-rift.png','crystal-creek.png','abysal-edge.png'
  ];
  function getBiomeUrl(zone) {
    let f = zone.image_url || '';
    if (!f) return BIOME_LIST[((zone.id||1)-1) % BIOME_LIST.length].replace(/^/,'/assets/images/biomes/');
    f = BIOME_FILE_MAP[f] || f;
    if (f.startsWith('/')) return f;
    return '/assets/images/biomes/' + f;
  }
  const BIOME_IMAGES = {
    smoulders:   '/assets/images/biomes/smoulders.png',
    darktide:    '/assets/images/biomes/darktide.png',
    stonebark:   '/assets/images/biomes/stonebark.png',
    ashenvale:   '/assets/images/biomes/ashenvale.png',
    stormrage:   '/assets/images/biomes/stormrage.png',
    nighthollow: '/assets/images/biomes/nighthollow.png',
    dawnbringer: '/assets/images/biomes/dawnbringer.png',
    manastorm:   '/assets/images/biomes/manastorm.png',
    plaguemire:  '/assets/images/biomes/plaguemire.png',
  };

  const HOUSE_CREST_IMAGES = {
    smoulders:   '/assets/images/houses/Housesmoulders.png',
    darktide:    '/assets/images/houses/Housedarktide.png',
    stonebark:   '/assets/images/houses/Housestonebark.png',
    ashenvale:   '/assets/images/houses/HouseAshenvale.png',
    stormrage:   '/assets/images/houses/Housestormrage.png',
    nighthollow: '/assets/images/houses/Housenighthollow.png',
    dawnbringer: '/assets/images/houses/HouseDwnbringer.png',
    manastorm:   '/assets/images/houses/Housemanastorm.png',
    plaguemire:  '/assets/images/houses/Houseplaguemire.png',
  };

  function buildZoneCard(zone) {
    const biomeImg = getBiomeUrl(zone);
    const casters = zone.arena_nines || zone.casters || zone.deployment_count || 0;
    const effects = zone.active_effects || zone.effects || [];
    const isObjective = zone.daily_objective || zone.is_current_objective || false;
    const ctrlGuild = zone.controlling_guild || zone.controlling_guild_tag || null;

    // Image banner with fighter count (always shown) and gold zone name
    const fighterBadge = '<div class="zone-card-fighter-count">\u2694\uFE0F ' + casters + '</div>';
    const isDeployed = state.deployedZoneIds.has(zone.id);
    const deployedBadge = isDeployed ? '<div class="zone-card-deployed-badge">\u2694\uFE0F DEPLOYED</div>' : '';
    const imgBanner = '<div class="zone-card-img-wrap">'
      + '<img src="' + biomeImg + '" alt="' + zone.name + '" loading="lazy" onerror="this.style.display=\'none\'">'
      + fighterBadge
      + deployedBadge
      + '<div class="zone-card-overlay-name">' + zone.name + '</div>'
      + '</div>';

    // Objective banner
    let bannerHTML = isObjective
      ? '<div class="zone-objective-banner">\u2B50 DAILY OBJECTIVE \u2014 \u00D71.5 POINTS</div>'
      : '';

    // Card body: show controlling guild (snapshot winner) or "unclaimed"
    let bodyHTML = '';
    if (ctrlGuild) {
      bodyHTML = '<span class="zone-guild-leader-pill" style="color:var(--gold);background:rgba(212,166,75,0.12);border-color:rgba(212,166,75,0.35);">'        + '<span style="width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block;flex-shrink:0;"></span>'        + '\uD83C\uDFF0 ' + ctrlGuild        + '</span>';
    } else {
      bodyHTML = '<span style="font-family:\'Press Start 2P\',monospace;font-size:7px;color:var(--faint);">Unclaimed \u2014 deploy to capture!</span>';
    }

    // Effects pills (max 3)
    const effectsHTML = effects.slice(0, 3).map(function(e) {
      const eName = typeof e === 'string' ? e : (e.name || e);
      const eColor = EFFECT_COLORS[eName] || '#888';
      return '<span class="effect-pill" style="background:' + eColor + '15;color:' + eColor + ';border:1px solid ' + eColor + '30">' + eName + '</span>';
    }).join('');

    return '<div class="zone-card" data-zone-id="' + zone.id + '">'      + imgBanner      + bannerHTML      + '<div class="zone-card-body">'        + bodyHTML        + (effectsHTML ? '<div class="effect-pills" style="margin-top:4px;">' + effectsHTML + '</div>' : '')      + '</div>'    + '</div>';
  }

  function renderRegionsTab(container) {
    const regions = {};
    for (const z of state.zones) {
      const rName = z.region || z.region_name || z.description || 'Unknown';
      if (!regions[rName]) {
        const hKey = SCHOOL_TO_HOUSE[z.controlling_school_id] || SCHOOL_TO_HOUSE[z.school_id] || null;
        regions[rName] = { name: rName, house: hKey, zones: [] };
      }
      regions[rName].zones.push(z);
    }

    container.innerHTML = Object.values(regions).map(function(r) {
      const h = (r.house && HOUSES[r.house]) || { color: '#666', name: 'Unclaimed', icon: '⚔️' };
      return '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;border-left:3px solid ' + h.color + ';">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;">'
          + '<div>'
            + '<div style="font-family:\'Cinzel\',serif;font-size:14px;font-weight:700;color:var(--bright)">' + h.icon + ' ' + r.name + '</div>'
            + '<div style="font-family:\'Press Start 2P\',monospace;font-size:8px;color:var(--muted);margin-top:2px">' + r.zones.length + ' zones</div>'
          + '</div>'
          + '<div style="font-family:\'Press Start 2P\',monospace;font-size:8px;color:' + h.color + ';background:' + h.color + '15;padding:4px 10px;border-radius:6px">' + h.name + '</div>'
        + '</div>'
      + '</div>';
    }).join('');
  }

  function renderGuildTab(container) {
    container.innerHTML = '<div class="loading-text">Guild view coming soon</div>';
    // TODO: fetch guild data and render
  }

  function updateActiveCount() {
    const active = state.zones.filter(function(z) {
      return z.arena_active || z.contested || z.event || z.is_current_objective || z.controlling_school_id;
    }).length;
    document.getElementById('active-count').textContent = active + ' Active';
  }

  function updatePlayerBar() {
    document.getElementById('player-level').textContent = state.playerLevel || '--';
    document.getElementById('player-zones').textContent = state.deployedZoneIds.size;
  }

  // ===== ARENA VIEW =====
  // ── ZONE DETAIL EXPAND — shows preview before entering arena ──
  let _detailPanel = null;
  function openZoneDetail(zone) {
    if (_detailPanel) { _detailPanel.remove(); _detailPanel = null; }
    const hKey = zone.house || zone.region_house
      || SCHOOL_TO_HOUSE[zone.controlling_school_id]
      || SCHOOL_TO_HOUSE[zone.school_id] || null;
    const h = (hKey && HOUSES[hKey]) || { color: '#D4A64B', name: 'Unknown Region', icon: '\u2694\uFE0F' };
    const biomeImg = getBiomeUrl(zone);
    const guilds = zone.guilds || zone.guild_presence || [];
    const casters = zone.arena_nines || zone.casters || zone.deployment_count || 0;
    const effects = zone.active_effects || zone.effects || [];
    const description = zone.description || zone.lore || '';
    const isObjective = zone.daily_objective || zone.is_current_objective || false;

    const topGuild = guilds[0] || null;
    const topGuildColor = topGuild ? (topGuild.color || '#D4A64B') : '#D4A64B';
    const contested = guilds.length > 1 && topGuild && guilds[1] && (topGuild.pct || 0) - (guilds[1].pct || 0) < 15;

    const guildsHTML = guilds.length > 0
      ? guilds.slice(0, 4).map(function(g) {
          const gc = g.color || '#888', pct = g.pct || g.control || 0;
          const gName = g.name || g.guild_name || g.guild_tag || '???';
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <div style="width:8px;height:8px;border-radius:50%;background:${gc};flex-shrink:0;"></div>
            <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:${gc};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${gName}</div>
            <div style="width:100px;height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;"><div style="width:${pct}%;height:100%;background:${gc};border-radius:3px;"></div></div>
            <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:${gc};width:30px;text-align:right;font-weight:700;">${pct}%</div>
          </div>`;
        }).join('')
      : (zone.controlling_guild_tag
          ? `<div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);">\uD83C\uDFF0 Controlled by ${zone.controlling_guild_tag}</div>`
          : `<div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--faint);">No guild has claimed this zone yet.</div>`);

    const effectsHTML = effects.slice(0, 6).map(function(e) {
      const en = typeof e === 'string' ? e : (e.name || e);
      const ec = EFFECT_COLORS[en] || '#888';
      return `<span style="font-family:'Press Start 2P',monospace;font-size:6px;padding:4px 8px;border-radius:4px;background:${ec}15;color:${ec};border:1px solid ${ec}30;">${en}</span>`;
    }).join('');

    const panel = document.createElement('div');
    panel.id = 'zone-detail-panel';
    panel.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;';

    panel.innerHTML = `
      <div style="max-width:480px;width:100%;border-radius:16px;overflow:hidden;border:1px solid ${topGuildColor}30;background:linear-gradient(180deg,#1e1830 0%,#12101e 100%);max-height:90vh;overflow-y:auto;">

        <div style="height:200px;background-image:url('${biomeImg}');background-size:cover;background-position:center;position:relative;">
          <div style="position:absolute;inset:0;background:linear-gradient(0deg,rgba(14,10,24,1) 0%,rgba(14,10,24,0.15) 70%,transparent 100%);"></div>
          <button id="zone-detail-close" style="position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:16px;cursor:pointer;padding:5px 12px;line-height:1;z-index:2;">&#x2715;</button>
          ${isObjective ? `<div style="position:absolute;top:12px;left:12px;background:rgba(212,166,75,0.2);border:1px solid rgba(212,166,75,0.4);border-radius:6px;padding:4px 10px;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gold);z-index:2;">&#x2B50; DAILY OBJECTIVE &middot; &times;1.5 POINTS</div>` : ''}
          <div style="position:absolute;bottom:14px;left:16px;right:16px;z-index:2;">
            <div style="font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px;text-shadow:0 2px 12px rgba(0,0,0,0.95);">${zone.name}</div>
            ${zone.region || zone.region_name ? `<div style="font-family:'Press Start 2P',monospace;font-size:7px;color:${h.color};margin-top:4px;">${h.icon} ${zone.region || zone.region_name}</div>` : ''}
          </div>
        </div>

        <div style="padding:18px;">

          <div class="nines-fighting-badge" style="display:flex;align-items:center;justify-content:center;gap:12px;padding:14px;border-radius:12px;background:rgba(68,204,136,0.06);border:1px solid rgba(68,204,136,0.15);margin-bottom:16px;">
            <div style="width:10px;height:10px;border-radius:50%;background:#44cc88;box-shadow:0 0 10px #44cc88;"></div>
            <div style="text-align:center;">
              <div style="font-family:'Press Start 2P',monospace;font-size:18px;color:#44cc88;line-height:1;">${casters}</div>
              <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(68,204,136,0.6);margin-top:4px;letter-spacing:1px;">NINES FIGHTING</div>
            </div>
            ${contested ? `<div style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--red);padding:4px 8px;border-radius:4px;background:rgba(255,68,102,0.1);border:1px solid rgba(255,68,102,0.2);">CONTESTED</div>` : ''}
          </div>

  /** Fetch deployed Nines from REST API for immediate display */
  async function loadZoneNines(zoneId) {
    try {
      const res = await fetch(`/api/zones/${zoneId}/deployments`);
      const data = await res.json();
      const deployments = data.deployments || [];

      if (deployments.length === 0) {
        addFeedEvent('No Nines deployed on this zone yet.', 'system');
        return;
      }

      // Build guild scores
      if (data.guild_power) {
        state.guildScores = {};
        for (const [tag, info] of Object.entries(data.guild_power)) {
          state.guildScores[tag] = info.total_hp;
        }
        updateScoreboard();
      }

      addFeedEvent(`${deployments.length} Nines on this zone`, 'system');

      // Add sprites (skip if socket already added them)
      for (const d of deployments) {
        if (state.nines.has(d.player_id)) continue; // already loaded by socket
        const nine = d.nine || {};
        const player = d.player || {};
        const houseName = getHouseNameById(nine.house_id);

        addNineSprite({
          id: d.player_id,
          name: nine.name || player.twitter_handle || 'Unknown',
          house: houseName,
          guild_id: d.guild_tag,
          guild_name: d.guild_tag || 'Lone Wolf',
          current_hp: d.current_hp,
          max_hp: d.max_hp,
          position: getSpawnPosition(d.guild_tag, d.player_id),
          stats: { atk: nine.base_atk || 0, hp: nine.base_hp || 0, spd: nine.base_spd || 0, def: nine.base_def || 0, luck: nine.base_luck || 0 },
          is_mercenary: d.is_mercenary,
          equipped_images: nine.equipped_images || {},
        });
      }

      // If server didn't send guild_power, compute from loaded nines
      if (!data.guild_power) {
        setTimeout(recalcGuildScores, 500);
      }
    } catch(e) {
      console.error('Failed to load zone nines:', e);
    }
  }

  /** Map house_id to house key name */

  // ═══════ ARENA DIAMOND BOUNDARY ═══════
  const ARENA_HALF_W = 320;
  const ARENA_HALF_H = 180;

  function isInsideDiamond(x, y, cx, cy) {
    return (Math.abs(x - cx) / ARENA_HALF_W + Math.abs(y - cy) / ARENA_HALF_H) <= 1;
  }

  function clampToDiamond(x, y, cx, cy, shrink) {
    const s = shrink || 0.85;
    const dx = x - cx;
    const dy = y - cy;
    const dist = Math.abs(dx) / (ARENA_HALF_W * s) + Math.abs(dy) / (ARENA_HALF_H * s);
    if (dist <= 1) return { x, y };
    return { x: cx + dx / dist, y: cy + dy / dist };
  }

  /** Get spawn position — cluster by guild, clamped to arena diamond */
  function getSpawnPosition(guildTag, playerId) {
    if (!state._guildAngles) state._guildAngles = {};
    if (!state._guildCounts) state._guildCounts = {};
    const tag = guildTag || String(playerId);
    if (!state._guildAngles[tag]) {
      const idx = Object.keys(state._guildAngles).length;
      // Spread guilds left/right on the platform
      state._guildAngles[tag] = idx % 2 === 0 ? Math.PI * 1.15 : Math.PI * 1.85;
      state._guildCounts[tag] = 0;
    }
    state._guildCounts[tag]++;
    const sw = state.arenaApp ? state.arenaApp.screen.width : window.innerWidth;
    const sh = state.arenaApp ? state.arenaApp.screen.height : window.innerHeight;
    const cx = sw / 2;
    // Platform sits at cy + sh*0.18 — spawn sprites just above it
    const platformY = (sh / 2) + sh * 0.18;
    const pW = Math.min(sw * 0.72, 520);
    const angle = state._guildAngles[tag];
    const radius = pW * 0.32;
    const spread = Math.min(state._guildCounts[tag] * 22, 80);
    const x = cx + Math.cos(angle) * radius + (Math.random() - 0.5) * spread;
    const y = platformY - 40 + (Math.random() - 0.5) * 20;
    return { x, y };
  }

  /** Convert engine position (centered at 400,300) to screen position */
  function engineToScreen(pos) {
    if (!pos) return getSpawnPosition('unknown', Math.random());
    const cx = (state.arenaApp ? state.arenaApp.screen.width : window.innerWidth) / 2;
    const cy = (state.arenaApp ? state.arenaApp.screen.height : window.innerHeight) / 2;
    const scaleX = cx / 400;
    const scaleY = cy / 300;
    const raw = { x: pos.x * scaleX, y: pos.y * scaleY };
    const poly = getActiveCanvasPoly();
    if (poly) return clampToPolygon(raw.x, raw.y, poly);
    return clampToDiamond(raw.x, raw.y, cx, cy, 0.85);
  }
