            shakeSprite(target);
          }
          if (ev.new_hp != null) updateNineHP(toId, ev.new_hp, target?.maxHp);
        });

        addFeedEvent(`⚔️ ${ev.from_name||getNineName(fromId)} → ${ev.to_name||getNineName(toId)} -${ev.damage}${ev.crit ? ' CRIT!' : ''}`, 'attack');
        break;
      }

      case 'effect_tick': {
        const tId = resolveId(ev.target_id);
        const sprite = state.nines.get(tId);
        if (sprite && ev.damage) {
          showFloatingText(sprite.container.x, sprite.container.y, `-${ev.damage}`, getEffectColor(ev.effect), 10);
          spawnParticles(sprite.container.x, sprite.container.y, getEffectColor(ev.effect), 6, getEffectParticleType(ev.effect));
        }
        if (ev.new_hp != null) updateNineHP(tId, ev.new_hp, sprite?.maxHp);
        break;
      }

      case 'dodge': {
        const dId = resolveId(ev.nine_id || ev.target);
        const sprite = state.nines.get(dId);
        if (sprite) {
          showFloatingText(sprite.container.x, sprite.container.y, 'DODGE!', 0x90E0EF, 12);
          const origX = sprite.container.x;
          sprite.container.x += 15; sprite.container.alpha = 0.5;
          setTimeout(() => { sprite.container.x = origX; sprite.container.alpha = 1; }, 300);
        }
        break;
      }

      case 'ward_pop': {
        const wId = resolveId(ev.nine_id || ev.target);
        const sprite = state.nines.get(wId);
        if (sprite) {
          showFloatingText(sprite.container.x, sprite.container.y, 'BLOCKED!', 0xD4A64B, 12);
          spawnParticles(sprite.container.x, sprite.container.y, 0xD4A64B, 12, 'shield');
        }
        break;
      }

      case 'anchor_save': {
        const aId = resolveId(ev.nine_id || ev.target);
        const sprite = state.nines.get(aId);
        if (sprite) {
          showFloatingText(sprite.container.x, sprite.container.y - 20, '⚓ ANCHOR!', 0xffd700, 14);
          spawnParticles(sprite.container.x, sprite.container.y, 0xffd700, 15, 'shield');
        }
        addFeedEvent(`⚓ ${getNineName(aId)} saved by ANCHOR at 1 HP!`, 'effect');
        break;
      }

      case 'damage': {
        const tId = resolveId(ev.target_id || ev.target);
        updateNineHP(tId, ev.new_hp, state.nines.get(tId)?.maxHp);
        updateYourNinePanel(tId);
        break;
      }

      case 'heal': {
        const hId = resolveId(ev.nine_id || ev.target);
        const sprite = state.nines.get(hId);
        if (sprite) {
          showFloatingText(sprite.container.x, sprite.container.y, `+${ev.amount || ev.value}`, 0x44ffaa, 12);
          spawnParticles(sprite.container.x, sprite.container.y, 0x44ffaa, 10, 'heal');
        }
        updateNineHP(hId, ev.new_hp, state.nines.get(hId)?.maxHp);
        break;
      }

      case 'effect': {
        const eff = ev.effect_type || '';
        const nId = resolveId(ev.nine_id || ev.target_id || ev.from || ev.source);
        const tId = resolveId(ev.target_id || ev.to || ev.nine_id);
        const sprite = state.nines.get(nId) || state.nines.get(tId);
        const pCfg = getEffectParticles(eff);

        if (eff === 'BURN_APPLY') {
          if (sprite) { showFloatingText(sprite.container.x, sprite.container.y - 20, '🔥 BURN', 0xff8833, 9); spawnParticles(sprite.container.x, sprite.container.y, 0xff8833, 12, 'fire'); }
          addFeedEvent(`🔥 ${getNineName(tId)} is BURNING!`, 'effect');
        } else if (eff === 'POISON_APPLY') {
          if (sprite) { showFloatingText(sprite.container.x, sprite.container.y - 20, '☠️ POISON', 0x88ee44, 9); spawnParticles(sprite.container.x, sprite.container.y, 0x88ee44, 10, 'poison'); }
          addFeedEvent(`☠️ ${getNineName(tId)} is POISONED!`, 'effect');
        } else if (eff === 'CHAIN') {
          const from = state.nines.get(resolveId(ev.from)); const to = state.nines.get(resolveId(ev.to));
          if (from && to) { showFloatingText(to.container.x, to.container.y, `-${ev.damage} CHAIN`, 0x5599ff, 11); spawnParticles(to.container.x, to.container.y, 0x5599ff, 8, 'lightning'); }
          addFeedEvent(`⚡ CHAIN hits ${getNineName(resolveId(ev.to))} for ${ev.damage}`, 'effect');
        } else if (eff === 'DRAIN') {
          const from = state.nines.get(resolveId(ev.from)); const to = state.nines.get(resolveId(ev.to));
          if (from) { showFloatingText(from.container.x, from.container.y, `+${ev.amount} DRAIN`, 0xff3366, 10); }
          if (to) { spawnParticles(to.container.x, to.container.y, 0xff3366, 8, 'default'); }
        } else if (eff === 'WARD' || eff === 'BARRIER' || eff === 'ANCHOR' || eff === 'REFLECT') {
          if (sprite) { animateShieldPop(sprite); showFloatingText(sprite.container.x, sprite.container.y - 20, eff, 0xD4A64B, 10); spawnParticles(sprite.container.x, sprite.container.y, 0xD4A64B, 10, 'shield'); }
          addFeedEvent(`🛡️ ${getNineName(nId)} activates ${eff}!`, 'effect');
        } else if (eff === 'BARRIER_BREAK') {
          if (sprite) { showFloatingText(sprite.container.x, sprite.container.y - 20, 'BARRIER BROKEN!', 0xff4466, 11); screenFlash(0xff4466, 0.15); spawnParticles(sprite.container.x, sprite.container.y, 0x5599ff, 16, 'explosion'); }
        } else if (eff === 'THORNS') {
          const tgt = state.nines.get(resolveId(ev.target_id));
          if (tgt) { showFloatingText(tgt.container.x, tgt.container.y, `-${ev.amount} THORNS`, 0xff5555, 10); spawnParticles(tgt.container.x, tgt.container.y, 0xff5555, 6, 'fire'); }
        } else if (eff === 'STEALTH') {
          if (sprite) { sprite.container.alpha = 0.35; showFloatingText(sprite.container.x, sprite.container.y - 20, 'STEALTH', 0x90E0EF, 9); }
        } else if (eff === 'HASTE' || eff === 'SURGE' || eff === 'SWIFT') {
          if (sprite) { showFloatingText(sprite.container.x, sprite.container.y - 20, eff, 0xffd700, 10); spawnParticles(sprite.container.x, sprite.container.y, 0xffd700, 8, 'fire'); }
        } else if (eff === 'OVERCHARGE') {
          if (sprite) { showFloatingText(sprite.container.x, sprite.container.y - 20, '⚡ OVERCHARGE', 0xffc800, 10); spawnParticles(sprite.container.x, sprite.container.y, 0xffc800, 12, 'lightning'); screenFlash(0xffc800, 0.2); }
        } else if (eff === 'PHASE') {
          if (sprite) { sprite.container.alpha = 0.5; showFloatingText(sprite.container.x, sprite.container.y - 20, 'PHASE', 0xb088e8, 10); spawnParticles(sprite.container.x, sprite.container.y, 0xb088e8, 8, 'default'); }
        } else if (eff === 'CLEANSE') {
          if (sprite) { showFloatingText(sprite.container.x, sprite.container.y - 20, '✨ CLEANSE', 0x44ffcc, 10); spawnParticles(sprite.container.x, sprite.container.y, 0x44ffcc, 10, 'heal'); }
        } else if (eff === 'TAUNT') {
          if (sprite) { showFloatingText(sprite.container.x, sprite.container.y - 20, '😤 TAUNT', 0xff6644, 10); }
        } else if (eff === 'ANCHOR_SAVE') {
          if (sprite) { showFloatingText(sprite.container.x, sprite.container.y - 20, 'ANCHOR SAVES!', 0xD4A64B, 12); spawnParticles(sprite.container.x, sprite.container.y, 0xD4A64B, 14, 'shield'); screenFlash(0xD4A64B, 0.2); }
        } else if (eff === 'TETHER_SHARE') {
          const src = state.nines.get(resolveId(ev.source_id));
          if (src) { showFloatingText(src.container.x, src.container.y, `TETHER -${ev.amount}`, 0xb088e8, 9); }
        } else if (sprite) {
          // Generic fallback for any other effect
          showFloatingText(sprite.container.x, sprite.container.y - 20, eff, 0xD4A64B, 9);
          spawnParticles(sprite.container.x, sprite.container.y, pCfg.color, pCfg.count, pCfg.type);
        }
        break;
      }

      case 'dodge': {
        const tId = resolveId(ev.target);
        const sprite = state.nines.get(tId);
        if (sprite) {
          showFloatingText(sprite.container.x, sprite.container.y, 'DODGE!', 0x90E0EF, 14);
          spawnParticles(sprite.container.x, sprite.container.y, 0x90E0EF, 8, 'default');
        }
        addFeedEvent(`💨 ${ev.targetName || getNineName(tId)} dodged!`, 'effect');
        break;
      }

      // Catch-all for unknown V2 effect types
      default: {
        if (ev.type && ev.type.startsWith('effect_')) {
          const tId = resolveId(ev.target || ev.source);
          const sprite = state.nines.get(tId);
          const effectName = ev.type.replace('effect_', '').toUpperCase();
          if (sprite) {
            showFloatingText(sprite.container.x, sprite.container.y - 20, effectName, 0xD4A64B, 9);
            const pCfg = getEffectParticles(effectName);
            spawnParticles(sprite.container.x, sprite.container.y, pCfg.color, pCfg.count, pCfg.type);
          }
        }
        break;
      }
    }
  }

  // Process effect-only casts (no damage — buffs, debuffs, shields)
  function processEffectCast(ev, fromId, toId, attacker, target) {
    const effectName = ev.effect || ev.effect_type || '';
    const isSelf = (fromId === toId) || !toId;
    const sprite = target || state.nines.get(toId || fromId);

    if (!sprite) return;

    const x = sprite.container.x;
    const y = sprite.container.y;

    // Card-type determines animation style
    const cardType = (ev.card_type || '').toLowerCase();

    if (cardType === 'defend' || effectName === 'WARD' || effectName === 'ANCHOR' || effectName === 'BARRIER' || effectName === 'REFLECT') {
      // SHIELD animation — barrier materializes on self
      animateShieldPop(sprite);
      showFloatingText(x, y - 20, effectName, 0xD4A64B, 10);
      spawnParticles(x, y, 0xD4A64B, 10, 'shield');
    } else if (cardType === 'support' || effectName === 'HEAL' || effectName === 'BLESS' || effectName === 'INSPIRE' || effectName === 'AMPLIFY') {
      // HEAL/BUFF — sparkle stream
      if (ev.heal) showFloatingText(x, y, `+${ev.heal}`, 0x44ffaa, 12);
      else showFloatingText(x, y - 20, effectName, 0x44ffaa, 10);
      spawnParticles(x, y, 0x44ffaa, 10, 'heal');
      if (ev.new_hp != null) updateNineHP(toId || fromId, ev.new_hp, sprite.maxHp);
      // If from ally, shoot a beam
      if (attacker && attacker !== sprite && !isSelf) {
        animateHealBeam(fromId, toId);
      }
    } else if (cardType === 'manipulation' || effectName === 'SILENCE' || effectName === 'HEX' || effectName === 'WEAKEN' || effectName === 'SLOW' || effectName === 'DRAIN' || effectName === 'MARK' || effectName === 'FEAST') {
      // DEBUFF — purple hex bolt to target
      if (attacker && !isSelf) {
        animateProjectile(fromId, toId, 'nighthollow', () => {
          showFloatingText(x, y - 20, effectName, 0xbb88ff, 10);
          spawnParticles(x, y, 0xbb88ff, 8, 'default');
          shakeSprite(sprite);
        });
      } else {
        showFloatingText(x, y - 20, effectName, 0xbb88ff, 10);
        spawnParticles(x, y, 0xbb88ff, 8, 'default');
      }
      if (effectName === 'SILENCE') addFeedEvent(`🤫 ${getNineName(toId||fromId)} SILENCED!`, 'effect');
    } else if (cardType === 'utility' || effectName === 'HASTE' || effectName === 'STEALTH' || effectName === 'CLEANSE' || effectName === 'DODGE') {
      // UTILITY — aura burst on self
      animateAuraBurst(sprite, effectName);
      showFloatingText(x, y - 20, effectName, 0x90E0EF, 10);
    } else if (effectName === 'TAUNT') {
      showFloatingText(x, y - 20, 'TAUNT!', 0xff5555, 12);
      spawnParticles(x, y, 0xff5555, 8, 'fire');
    } else {
      // Generic effect
      showFloatingText(x, y - 20, effectName, 0xD4A64B, 9);
      spawnParticles(x, y, 0xD4A64B, 6, 'default');
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // V6 ANIMATION FUNCTIONS
  // ═══════════════════════════════════════════════════════════════

  /** Projectile bolt from attacker to target — house-colored energy ball */
  /** Maps effect name to a display emoji */
  function getEffectEmoji(effect) {
    const map = {
      BURN:'🔥', POISON:'☠️', CHAIN:'⚡', SILENCE:'🤫', HEAL:'💚', BLESS:'✨',
      WEAKEN:'💀', HEX:'🔮', CRIT:'⭐', DODGE:'💨', WARD:'🛡️', ANCHOR:'⚓',
      INSPIRE:'💫', DRAIN:'🩸', HASTE:'🌀', STEALTH:'🌑', CLEANSE:'💎',
      MARK:'🎯', TAUNT:'😤', PIERCE:'🏹', AMPLIFY:'📢', SURGE:'⚡',
      BARRIER:'🔷', SIPHON:'🌊', THORNS:'🌿', SLOW:'🐌', CORRODE:'🧪',
    };
    return map[effect] || '✨';
  }

  /**
   * Spell projectile — bigger, slower, more dramatic than auto-attack.
   * Orb grows during flight, leaves a trail, explodes on impact.
   */
  function animateSpellProjectile(fromId, toId, house, effects, onHit) {
    const attacker = state.nines.get(fromId);
    const target = toId ? state.nines.get(toId) : null;

    // If no target (self-cast: HEAL, WARD etc) just fire onHit immediately
    if (!target || !state.arenaApp) { if (onHit) onHit(); return; }

    const startX = attacker?.container.x || 0;
    const startY = (attacker?.container.y || 0) - 10;
    const endX = target.container.x;
    const endY = target.container.y - 5;

    // Pick orb color by primary effect
    const mainEffect = effects[0] || '';
    const effectColors = {
      BURN: 0xff6600, POISON: 0x44ff44, CHAIN: 0xffff00, SILENCE: 0xcc44ff,
      HEAL: 0x44ffaa, BLESS: 0xffeeaa, WEAKEN: 0xaa44ff, HEX: 0x8822cc,
      DRAIN: 0xff2244, WARD: 0xD4A64B, ANCHOR: 0x8888ff, INSPIRE: 0xffd700,
    };
    const color = effectColors[mainEffect] || getHouseColor(house);

    // ── Large glowing orb ──
    const orb = new PIXI.Graphics();
    orb.beginFill(color, 0.9);
    orb.drawCircle(0, 0, 10); // bigger than auto-attack
    orb.endFill();
    orb.beginFill(0xffffff, 0.5);
    orb.drawCircle(-3, -3, 4);
    orb.endFill();
    orb.x = startX;
    orb.y = startY;
    orb.zIndex = 100;
    state.arenaApp.stage.addChild(orb);

    // ── Trail particles ──
    const trail = [];
    const FLIGHT_FRAMES = 50; // slower than auto-attack (was 35)
    let frame = 0;

    const ticker = () => {
      frame++;
      const t = frame / FLIGHT_FRAMES;
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out

      orb.x = startX + (endX - startX) * ease;
      orb.y = startY + (endY - startY) * ease;
      orb.scale.set(1 + t * 0.5); // orb grows during flight

      // Leave trail particle every 3 frames
      if (frame % 3 === 0) {
        const tp = new PIXI.Graphics();
        tp.beginFill(color, 0.6);
        tp.drawCircle(0, 0, 5 - frame/12);
        tp.endFill();
        tp.x = orb.x;
        tp.y = orb.y;
        tp.zIndex = 99;
        state.arenaApp.stage.addChild(tp);
        trail.push({ gfx: tp, life: 0 });
      }

      // Fade trail
      for (const tp of trail) {
        tp.life++;
        tp.gfx.alpha = Math.max(0, 0.6 - tp.life * 0.08);
        tp.gfx.scale.set(Math.max(0.1, 1 - tp.life * 0.1));
      }

      if (frame >= FLIGHT_FRAMES) {
        state.arenaApp.ticker.remove(ticker);
        state.arenaApp.stage.removeChild(orb);
        for (const tp of trail) state.arenaApp.stage.removeChild(tp.gfx);
        if (onHit) onHit();
      }
    };

    state.arenaApp.ticker.add(ticker);
  }

  function animateProjectile(fromId, toId, house, onHit) {
    const attacker = state.nines.get(fromId);
    const target = state.nines.get(toId);
    if (!attacker || !target || !state.arenaApp) { if (onHit) onHit(); return; }

    const startX = attacker.container.x;
    const startY = attacker.container.y - 10;
    const endX = target.container.x;
    const endY = target.container.y - 5;
    const color = getHouseColor(house);

    // ── PHASE 1: CHARGE-UP (attacker glows + particles gather) ──
    attacker.isAnimating = true;
    if (attacker.spriteGroup) {
      attacker.spriteGroup.scale.set(1.15, 1.15);
      // Flash white briefly
      attacker.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xffffff; });
      setTimeout(() => {
        if (attacker.spriteGroup) {
          attacker.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xffffff; });
          attacker.spriteGroup.scale.set(1, 1);
        }
      }, 250);
    }

    // Gathering particles swirl toward attacker
    for (let i = 0; i < 8; i++) {
      const gp = new PIXI.Graphics();
      gp.beginFill(color, 0.7);
      gp.drawRect(-2, -2, 4, 4);
      gp.endFill();
      const angle = (i / 8) * Math.PI * 2;
      const dist = 30 + Math.random() * 20;
      gp.x = startX + Math.cos(angle) * dist;
      gp.y = startY + Math.sin(angle) * dist;
      gp.zIndex = 98;
      state.arenaApp.stage.addChild(gp);

      let gf = 0;
      const gTicker = () => {
        gf++;
        const t = gf / 15;
        gp.x = startX + Math.cos(angle) * dist * (1 - t);
        gp.y = startY + Math.sin(angle) * dist * (1 - t);
        gp.alpha = 1 - t * 0.5;
        gp.scale.set(1 - t * 0.6);
        if (gf >= 15) {
          state.arenaApp.ticker.remove(gTicker);
          state.arenaApp.stage.removeChild(gp);
        }
      };
      state.arenaApp.ticker.add(gTicker);
    }

    // Small casting flash
    spawnParticles(startX, startY, color, 6, 'fire');

    // Flip attacker to face target
    if (attacker.spriteGroup) {
      attacker.spriteGroup.scale.x = (endX < startX) ? -Math.abs(attacker.spriteGroup.scale.x) : Math.abs(attacker.spriteGroup.scale.x);
    }

    // ── PHASE 2: MISSILE FLIGHT (delayed 120ms for charge) ──
    setTimeout(() => {
      // Create elongated missile container
      const missile = new PIXI.Container();
      missile.zIndex = 100;
      missile.x = startX;
      missile.y = startY;

      // Outer glow (subtle)
      const glow = new PIXI.Graphics();
      glow.beginFill(color, 0.08);
      glow.drawEllipse(0, 0, 16, 5);
      glow.endFill();
      missile.addChild(glow);

      // Mid glow
      const midG = new PIXI.Graphics();
      midG.beginFill(color, 0.25);
      midG.drawEllipse(0, 0, 10, 3.5);
      midG.endFill();
      missile.addChild(midG);

      // Missile body (small elongated core)
      const body = new PIXI.Graphics();
      body.beginFill(color, 0.9);
      body.drawEllipse(0, 0, 7, 2.5);
      body.endFill();
      missile.addChild(body);

      // White hot nose
      const nose = new PIXI.Graphics();
      nose.beginFill(0xffffff, 1);
      nose.drawEllipse(3, 0, 3, 1.5);
      nose.endFill();
      missile.addChild(nose);

      // White core center
      const core = new PIXI.Graphics();
      core.beginFill(0xffffff, 0.85);
      core.drawEllipse(0, 0, 2.5, 1);
      core.endFill();
      missile.addChild(core);

      state.arenaApp.stage.addChild(missile);

      const trail = [];
      let frame = 0;
      let prevX = startX, prevY = startY;
      const totalFrames = 35; // 0.6s flight — snappy
      // NO ARC — straight line missile

      const ticker = () => {
        frame++;
        const t = frame / totalFrames;
        const ease = t < 0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

        const newX = startX + (endX - startX) * ease;
        const newY = startY + (endY - startY) * ease; // straight line — no arc

        // Rotate missile to face flight direction
        const dx = newX - prevX;
        const dy = newY - prevY;
        if (Math.abs(dx) > 0.01 || Math.abs(dy) > 0.01) {
          missile.rotation = Math.atan2(dy, dx);
        }

        prevX = missile.x;
        prevY = missile.y;
        missile.x = newX;
        missile.y = newY;

        // Pulse size — subtler
        const pulse = 0.9 + Math.sin(t * Math.PI) * 0.15;
        missile.scale.set(pulse);

        // ═══ LONG-LASTING FIREWORK TRAIL — lingers in the air ═══
        const trailCount = 2 + Math.floor(Math.random() * 2);
        for (let ti = 0; ti < trailCount; ti++) {
          const tp = new PIXI.Graphics();
          const ts = 1 + Math.random() * 2;
          tp.beginFill(color, 0.65);
          tp.drawRect(-ts/2, -ts/2, ts, ts);
          tp.endFill();
          if (Math.random() < 0.25) {
            tp.beginFill(0xffffff, 0.35);
            tp.drawRect(-0.5, -0.5, 1, 1);
            tp.endFill();
          }
          tp.x = missile.x + (Math.random()-0.5) * 6 - dx * ti * 0.3;
          tp.y = missile.y + (Math.random()-0.5) * 6 - dy * ti * 0.3;
          tp.zIndex = 99;
          state.arenaApp.stage.addChild(tp);
          trail.push({
            gfx: tp, life: 55 + Math.random() * 40, f: 0, // LONG life — 55-95 frames
            vx: -dx * 0.1 + (Math.random()-0.5) * 0.4,
            vy: -dy * 0.1 + 0.15 + Math.random() * 0.25, // gentle fall
            gravity: 0.015, // very light gravity — floats
          });
        }

        // White sparkle every 2 frames
        if (frame % 2 === 0) {
          const sp = new PIXI.Graphics();
          sp.beginFill(0xffffff, 0.8);
          sp.drawRect(-1, -1, 2, 2);
          sp.endFill();
          sp.x = missile.x;
          sp.y = missile.y;
          sp.zIndex = 99;
          state.arenaApp.stage.addChild(sp);
          trail.push({ gfx: sp, life: 16, f: 0, vx: (Math.random()-0.5)*0.4, vy: -0.4-Math.random()*0.3, gravity: 0 });
        }

        // Physics on trail debris (gravity + fade)
        for (const tp of trail) {
          tp.f++;
          if (tp.gravity) tp.vy += tp.gravity;
          tp.gfx.x += tp.vx;
          tp.gfx.y += tp.vy;
          tp.gfx.alpha = Math.max(0, 0.75 - tp.f / tp.life);
          tp.gfx.scale.set(Math.max(0.15, 1 - tp.f / tp.life * 0.45));
        }

        // Clean up dead trail particles during flight
        for (let ti = trail.length - 1; ti >= 0; ti--) {
          if (trail[ti].f >= trail[ti].life) {
            state.arenaApp.stage.removeChild(trail[ti].gfx);
            trail.splice(ti, 1);
          }
        }

        if (frame >= totalFrames) {
          state.arenaApp.ticker.remove(ticker);
          state.arenaApp.stage.removeChild(missile);
          for (const tp of trail) state.arenaApp.stage.removeChild(tp.gfx);

          // ── PHASE 3: FIREWORK IMPACT EXPLOSION ──
          spawnFireworkExplosion(endX, endY, color);
          shakeCamera();
          if (onHit) onHit();
        }
      };
      state.arenaApp.ticker.add(ticker);
    }, 120); // charge delay

    attacker.isAnimating = false;
  }

  /** SMALL BEAUTIFUL FIREWORK — delicate starburst with long sparkle trails */
  function spawnFireworkExplosion(x, y, color) {
    if (!state.arenaApp) return;

    // ═══ STARBURST — 18 outward rays with trailing sparkles ═══
    const rayCount = 18;
    for (let i = 0; i < rayCount; i++) {
      const p = new PIXI.Graphics();
      const size = 1.5 + Math.random() * 2;
      p.beginFill(color, 0.9);
      p.drawRect(-size/2, -size/2, size, size);
      p.endFill();
      p.beginFill(0xffffff, 0.6);
      p.drawRect(-0.5, -0.5, 1, 1);
      p.endFill();
      p.x = x; p.y = y; p.zIndex = 99;
      state.arenaApp.stage.addChild(p);

      const angle = (i / rayCount) * Math.PI * 2 + (Math.random()-0.5)*0.2;
      const speed = 1.8 + Math.random() * 1.5;
      let pf = 0;
      const life = 55 + Math.random() * 30;

      const pt = () => {
        pf++;
        p.x += Math.cos(angle) * speed * 0.97;
        p.y += Math.sin(angle) * speed * 0.97 + 0.025;
        p.alpha = Math.max(0, 1 - pf / life);
        p.scale.set(Math.max(0.2, 1 - pf / life * 0.3));

        // Long trailing sparkle
        if (pf % 3 === 0 && pf < life * 0.7) {
          const sp = new PIXI.Graphics();
          const ss = 0.8 + Math.random() * 1;
          sp.beginFill(color, 0.45);
          sp.drawRect(-ss/2, -ss/2, ss, ss);
          sp.endFill();
          sp.x = p.x; sp.y = p.y; sp.zIndex = 97;
          state.arenaApp.stage.addChild(sp);
          let sf = 0;
          const sLife = 40 + Math.random() * 25;
          const st = () => {
            sf++;
            sp.alpha = Math.max(0, 0.45 - sf / sLife * 0.45);
            sp.y += 0.08;
            sp.x += (Math.random()-0.5) * 0.1;
            if (sp.alpha <= 0) { state.arenaApp.ticker.remove(st); state.arenaApp.stage.removeChild(sp); }
          };
          state.arenaApp.ticker.add(st);
        }

        if (pf >= life) { state.arenaApp.ticker.remove(pt); state.arenaApp.stage.removeChild(p); }
      };
      state.arenaApp.ticker.add(pt);
    }

    // ═══ WHITE FLASH — 8 fast bright pixels ═══
    for (let i = 0; i < 8; i++) {
      const p = new PIXI.Graphics();
      p.beginFill(0xffffff, 0.85);
      p.drawRect(-1, -1, 2, 2);
      p.endFill();
      p.x = x; p.y = y; p.zIndex = 100;
      state.arenaApp.stage.addChild(p);
      const angle = (i / 8) * Math.PI * 2;
      const speed = 3 + Math.random() * 1.5;
      let pf = 0;
      const pt = () => {
        pf++;
        p.x += Math.cos(angle) * speed * 0.92;
        p.y += Math.sin(angle) * speed * 0.92;
        p.alpha = Math.max(0, 0.85 - pf * 0.07);
        if (p.alpha <= 0) { state.arenaApp.ticker.remove(pt); state.arenaApp.stage.removeChild(p); }
      };
      state.arenaApp.ticker.add(pt);
    }

    // ═══ DELICATE EXPANDING RING ═══
    const ring = new PIXI.Graphics();
    ring.lineStyle(1.5, color, 0.5);
    ring.drawCircle(0, 0, 3);
    ring.x = x; ring.y = y; ring.zIndex = 98;
    state.arenaApp.stage.addChild(ring);
    let rf = 0;
    const rTicker = () => {
      rf++;
      const radius = 3 + rf * 2.5;
      const alpha = Math.max(0, 0.5 - rf * 0.03);
      ring.clear();
      ring.lineStyle(Math.max(0.3, 1.5 - rf * 0.06), color, alpha);
      ring.drawCircle(0, 0, radius);
      if (alpha <= 0) { state.arenaApp.ticker.remove(rTicker); state.arenaApp.stage.removeChild(ring); }
    };
    state.arenaApp.ticker.add(rTicker);

    // Gentle screen flash
    screenFlash(typeof color === 'number' ? color : parseInt(color.replace('#',''), 16), 0.1);
  }

  /** Shield pop animation — golden rings expand around Nine */
  function animateShieldPop(sprite) {
    if (!sprite || !state.arenaApp) return;

    for (let i = 0; i < 3; i++) {

      ring.x = x; ring.y = y; ring.zIndex = 95;
      state.arenaApp.stage.addChild(ring);

      let frame = 0;
      const delay = i * 5;
      const ticker = () => {
        frame++;
        if (frame < delay) return;
        const f = frame - delay;
        const scale = 1 + f * 0.3;
        ring.scale.set(scale, scale);
        ring.alpha = Math.max(0, 0.7 - f * 0.04);
        if (ring.alpha <= 0) {
          state.arenaApp.ticker.remove(ticker);
          state.arenaApp.stage.removeChild(ring);
        }
      };
      state.arenaApp.ticker.add(ticker);
    }
  }

    const sx = from.container.x, sy = from.container.y - 10;

  // Nerm typewriter state
  let _nermTypeTimer = null;
  let _nermHideTimer = null;

  function showNermBubble(text) {
    const container = document.getElementById('nerm-bubble-container');
    const textEl = document.getElementById('nerm-text');
    if (!container || !textEl) return;

    // Cancel any in-progress typewriter or hide timer
    if (_nermTypeTimer) { clearInterval(_nermTypeTimer); _nermTypeTimer = null; }
    if (_nermHideTimer) { clearTimeout(_nermHideTimer); _nermHideTimer = null; }

    // Show container
    container.classList.add('visible');
    textEl.innerHTML = '';

    // Typewriter — add one character every 28ms
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'nerm-cursor';
    textEl.appendChild(cursor);

    _nermTypeTimer = setInterval(() => {
      if (i < text.length) {
        textEl.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
      } else {
        clearInterval(_nermTypeTimer);
        _nermTypeTimer = null;
        // Remove cursor 1s after typing finishes
        setTimeout(() => { if (cursor.parentNode) cursor.remove(); }, 1000);
      }
    }, 28);

    // Auto-hide after text duration (typing time + 4s reading time)
    const displayMs = text.length * 28 + 4000;
    _nermHideTimer = setTimeout(() => {
      container.classList.remove('visible');
      _nermHideTimer = null;
    }, displayMs);
  }

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  /**
   * Generate a Nerm comment based on combat context
   * @param {'round_end'|'cycle_end'|'combat'} event 
   * @param {object} data - snapshot/combat data from server
   */
  function nermRoundComment(event, data) {
    let comment = '';

    if (event === 'round_end' || event === 'combat') {
      // V2: Generic combat observation
      comment = pickRandom(NERM_COMMENTS.combat_active);

      // Check if player's Nine survived or got knocked out
      if (state.playerId && data && data.nines) {
        const playerNine = data.nines.find(n =>
          (n.player_id || n.id || n.nine_id) === state.playerId
        );
        if (playerNine) {
          const hp = playerNine.current_hp || playerNine.hp || 0;
          if (hp <= 0) {
            if (Math.random() < 0.5) {
              comment = pickRandom(NERM_COMMENTS.player_knocked);
            }
          } else if (Math.random() < 0.3) {
            comment = pickRandom(NERM_COMMENTS.player_survived);
          }
        }
      }
    }

    if (event === 'cycle_end') {
      // Check if it was a dominant or close result
      const scores = data.guild_scores || data.guild_power || state.guildScores || {};
      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      if (sorted.length >= 2) {
        const topScore = sorted[0][1] || 0;
        const secondScore = sorted[1][1] || 0;
        const total = sorted.reduce((s, e) => s + (e[1] || 0), 0) || 1;
        const topPct = (topScore / total) * 100;

        if (topPct > 60) {
          comment = pickRandom(NERM_COMMENTS.snapshot_dominant);
        } else if (topScore - secondScore <= topScore * 0.15) {
          comment = pickRandom(NERM_COMMENTS.snapshot_close);
        } else {
          comment = pickRandom(NERM_COMMENTS.snapshot_generic);
        }
      } else {
        comment = pickRandom(NERM_COMMENTS.snapshot_generic);
      }
    }

    if (comment) {
      // Slight delay so it appears after the banner
      setTimeout(() => showNermBubble(comment), 1200);

  function updateScoreboard() {

  // ═══════════════════════════════════════════
  // COUNTDOWN TIMER SYSTEM
  // ═══════════════════════════════════════════

  function startCountdown() {
    if (state.countdownInterval) clearInterval(state.countdownInterval);

    // Try to fetch actual timing from server
    fetchCycleTiming();

    state.countdownInterval = setInterval(updateCountdownDisplay, 250);
    updateCountdownDisplay();
  }

  /** Fetch next snapshot/cycle timestamp from server */
  async function fetchCycleTiming() {
    // Try V2 snapshot endpoint first
    try {
      const res = await fetch('/api/combat/next-snapshot');
      if (res.ok) {
        const data = await res.json();
        if (data.next_snapshot_at) {
          state.cycleEndTime = data.next_snapshot_at;
          console.log('⏱️ V2 snapshot timing:', new Date(state.cycleEndTime).toLocaleTimeString());
          return;
        }
      }
    } catch (e) { /* V2 endpoint may not exist yet */ }

    // Fall back to legacy cycle endpoint
    try {
      const res = await fetch('/api/combat/next-cycle');
      if (res.ok) {
        const data = await res.json();
        if (data.next_cycle_at) {
          state.cycleEndTime = data.next_cycle_at;
        } else if (data.cycle_interval_ms) {
          state.cycleEndTime = Date.now() + data.cycle_interval_ms;
        }
        if (data.cycle_number) state.currentCycle = data.cycle_number;
        console.log('⏱️ Legacy cycle timing:', new Date(state.cycleEndTime).toLocaleTimeString());
        return;
      }
    } catch (e) { /* endpoint may not exist yet */ }

    // No server timing available
    if (!state.cycleEndTime) {
      state.cycleEndTime = null;
    }
  }

  function stopCountdown() {
    if (state.countdownInterval) {
      clearInterval(state.countdownInterval);
      state.countdownInterval = null;
    }
  }

  function updateCountdownDisplay() {
    const labelEl = document.getElementById('countdown-label');
    const timeEl = document.getElementById('countdown-time');
    const subEl = document.getElementById('countdown-sub');
    if (!labelEl || !timeEl) return;

    if (state.isFighting) {
      labelEl.textContent = 'COMBAT ACTIVE';
      timeEl.textContent = 'LIVE';
      timeEl.className = 'countdown-time fighting';
      subEl.textContent = 'Continuous combat — all cards active';
      return;
    }

    // No timing data yet
    if (!state.cycleEndTime) {
      labelEl.textContent = 'NEXT SNAPSHOT';
      timeEl.textContent = 'WAITING';
      timeEl.className = 'countdown-time';
      subEl.textContent = 'Syncing with server...';
      return;
    }

    const now = Date.now();
    const remaining = Math.max(0, state.cycleEndTime - now);
    const totalSeconds = Math.ceil(remaining / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    const timeStr = minutes > 0 ? `${minutes}:${seconds.toString().padStart(2, '0')}` : `0:${seconds.toString().padStart(2, '0')}`;

    // Timer expired
    if (totalSeconds <= 0) {
      labelEl.textContent = '📸 SCORING';
      timeEl.textContent = 'NOW';
      timeEl.className = 'countdown-time fighting';
      subEl.textContent = 'Zone control scoring...';
      return;
    }

    // Under 60s = urgent
    if (totalSeconds <= 60) {
      labelEl.textContent = 'SNAPSHOT IN';
      timeEl.textContent = timeStr;
      timeEl.className = 'countdown-time urgent';
      subEl.textContent = 'Zone control scored soon!';
      return;
    }

    labelEl.textContent = 'NEXT SNAPSHOT';
    timeEl.textContent = timeStr;
    timeEl.className = 'countdown-time';
    subEl.textContent = 'Zone control scored every 15 min';

    // Auto-update cycle timer text in top bar
    const timerEl = document.getElementById('arena-cycle-timer');
    if (timerEl) {
      timerEl.textContent = `Snapshot in ${timeStr}`;
    }
  }

  function renderCardSlots(cards) {
    const slotsContainer = document.getElementById('arena-card-slots');
    if (!slotsContainer) return;

    state.equippedCards = cards || [];

    // Swap build button handler
    const swapBtn = document.getElementById('btn-swap-build');
    if (swapBtn) {
      swapBtn.onclick = () => {
        if (state.currentZoneId) openDeployModal(state.currentZoneId);
      };
    }

    for (let i = 0; i < 3; i++) {
      const slotEl = document.getElementById(`card-slot-${i}`);
      if (!slotEl) continue;
      const card = cards[i];

      if (!card) {
        slotEl.className = 'arena-card-slot empty';
        slotEl.innerHTML = `<span class="slot-empty-text">${i+1}</span>`;
        slotEl.onclick = null;
        continue;
      }

      const houseKey = card.house || SCHOOL_TO_HOUSE[card.school_id] || 'universal';
      const hColor = HOUSES[houseKey]?.color || '#888';
      const typeColor = TYPE_COLORS[card.spell_type || card.type || 'attack'] || '#888';
      const sharpness = card.sharpness ?? card.current_sharpness ?? 100;
      const sharpColor = sharpness > 60 ? 'var(--cyan)' : sharpness > 30 ? 'var(--gold)' : 'var(--red)';

      const effects = [];
      try {
        if (card.bonus_effects) {
          const effs = Array.isArray(card.bonus_effects) ? card.bonus_effects
            : (typeof card.bonus_effects === 'string' ? JSON.parse(card.bonus_effects) : []);
          effs.forEach(e => effects.push(typeof e === 'string' ? e : (e.tag || e.name || '')));
        }
      } catch(e) {}
      if (card.base_effect) effects.push(card.base_effect);

      // Effect pills HTML
      const effectPills = effects.filter(Boolean).slice(0, 3).map(e => {
        const tag = e.split(' ')[0].toUpperCase();
        const eColor = EFFECT_COLORS[tag] || '#D4A64B';
        return `<span class="slot-effect-pill" style="color:${eColor};background:${eColor}15;border:1px solid ${eColor}30">${e}</span>`;
      }).join('');

      slotEl.className = 'arena-card-slot';
      slotEl.style.borderColor = hColor + '40';
      slotEl.style.background = `linear-gradient(135deg, ${hColor}08, transparent)`;
      slotEl.style.cursor = 'pointer';
      slotEl.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
          <div class="slot-type" style="color:${typeColor}">${(card.spell_type || '???').toUpperCase()}</div>
          <span style="font-family:\'Press Start 2P\',monospace;font-size:5px;color:${hColor};opacity:0.6">${(houseKey).toUpperCase().slice(0,4)}</span>
        </div>
        <div class="slot-name">${card.name || '???'}</div>
        ${effectPills ? `<div class="slot-effects">${effectPills}</div>` : ''}
        <div class="slot-sharpness">
          <div class="slot-sharpness-fill" style="width:${sharpness}%;background:${sharpColor}"></div>
        </div>
      `;

      const cardRef = card;
      const waveRef = i;
      slotEl.onclick = () => showCardPopup(cardRef, waveRef);
    }

    // Inject cooldown bars after slots render
    injectCooldownBars();
    if (!state.cardCooldownIndex) state.cardCooldownIndex = 0;
  }

  /** Show a full-size V4 card in a popup overlay */
  function showCardPopup(card, waveIndex) {
    const existing = document.querySelector('.arena-card-popup');
    if (existing) existing.remove();

    if (!card.house && card.school_id) {
      const houseMap = {1:'smoulders',2:'darktide',3:'stonebark',4:'ashenvale',5:'stormrage',6:'nighthollow',7:'dawnbringer',8:'manastorm',9:'plaguemire'};
      card.house = houseMap[card.school_id] || 'universal';
    }

    const popup = document.createElement('div');
    popup.className = 'arena-card-popup';

    let cardHTML = '';
    if (typeof buildCardV4 === 'function') {
      cardHTML = buildCardV4(card, {});
    } else {
      // Fallback if V4 renderer not loaded
      const hColor = HOUSES[card.house]?.color || '#888';
      cardHTML = `<div style="width:240px;height:380px;background:linear-gradient(180deg,#12101a,#0c0a14);border:2px solid ${hColor}40;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px;">
        <div style="font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--bright);text-align:center;">${card.name || 'Unknown Card'}</div>
        <div style="font-family:\'Press Start 2P\',monospace;font-size:8px;color:${hColor}">${(card.spell_type || 'ATTACK').toUpperCase()}</div>
        <div style="display:flex;gap:12px;margin-top:8px;font-family:\'Press Start 2P\',monospace;font-size:8px;">
          ${card.base_atk ? `<span style="color:#e85a6a">ATK ${card.base_atk}</span>` : ''}
          ${card.base_hp ? `<span style="color:#6acd8a">HP ${card.base_hp}</span>` : ''}
          ${card.base_spd ? `<span style="color:#6ac8d8">SPD ${card.base_spd}</span>` : ''}
          ${card.base_def ? `<span style="color:#b088e8">DEF ${card.base_def}</span>` : ''}
        </div>
      </div>`;
    }

    popup.innerHTML = `
      <div class="popup-inner">
        <div class="popup-wave-label">CARD ${(waveIndex || 0) + 1}</div>
        ${cardHTML}
        <button class="popup-close">CLOSE</button>
      </div>
    `;

    document.body.appendChild(popup);
    try { if (typeof initCards === 'function') initCards(); } catch(e) {}

    popup.querySelector('.popup-close').addEventListener('click', () => popup.remove());
    popup.addEventListener('click', (e) => {
      if (e.target === popup) popup.remove();
    });
  }

  function hideCardSlots() {
    const slotsContainer = document.getElementById('arena-card-slots');
    if (slotsContainer) slotsContainer.style.display = 'none';
  }

  /** Fetch equipped cards for this deployment */
  async function loadEquippedCards(zoneId) {
    if (!state.playerId) return;
    try {
      const res = await fetch(`/api/zones/my-deployments/${state.playerId}`);
      const data = await res.json();
      const deployment = (data.deployments || []).find(d => d.zone_id == zoneId);
      if (deployment && deployment.cards) {
        renderCardSlots(deployment.cards);
      } else if (deployment && deployment.card_ids) {
        // Cards might be just IDs — fetch card details
        const cardRes = await fetch(`/api/spells/by-ids`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids: deployment.card_ids }),
        });
        const cardData = await cardRes.json();
        renderCardSlots(cardData.cards || []);
      }
    } catch (e) {
      console.warn('Could not load equipped cards:', e);
    }
  }

  // ===== DEPLOYMENT =====
  async function checkDeployment(zoneId) {
    if (!state.playerId) {
      document.getElementById('deploy-cta').style.display = 'block';
      document.getElementById('arena-bottom-tray').style.display = 'none';
      return;
    }

    try {
      const res = await fetch(`/api/zones/my-deployments/${state.playerId}`);
      const data = await res.json();
      const deployed = (data.deployments || []).find(d => d.zone_id == zoneId);

      if (deployed) {
        state.isDeployed = true;
        document.getElementById('deploy-cta').style.display = 'none';
        document.getElementById('arena-bottom-tray').style.display = 'flex';

        // Load equipped cards via the loadout endpoint (returns full card + spell data)
        let cards = [];
        try {
          const loadoutRes = await fetch(`/api/zones/${zoneId}/my-loadout/${state.playerId}`);
          if (loadoutRes.ok) {
            const loadoutData = await loadoutRes.json();
            cards = (loadoutData.loadout || []).map(slot => {
              const c = slot.card || {};
              const s = c.spell || {};
              return {
                id: c.id,
                name: s.name || '???',
                house: s.house || 'universal',
                spell_type: s.spell_type || 'attack',
                rarity: s.rarity || 'common',
                base_atk: s.base_atk || 0,
                base_hp: s.base_hp || 0,
                base_spd: s.base_spd || 0,
                base_def: s.base_def || 0,
                base_luck: s.base_luck || 0,
                bonus_effects: s.bonus_effects || [],
                image_url: s.image_url || '',
                sharpness: c.sharpness ?? 100,
                slot_number: slot.slot_number,
              };
            });
          }
        } catch(e) { console.warn('Loadout fetch failed:', e); }

        // Fallback: extract card_ids from card_slots if loadout endpoint failed
        if (cards.length === 0 && deployed.card_slots && deployed.card_slots.length > 0) {
          const slotIds = deployed.card_slots.map(s => s.card_id).filter(Boolean);
          if (slotIds.length > 0) {
            // Try fetching from player collection and matching
            try {
              const collRes = await fetch(`/api/packs/collection/${state.playerId}`);
              if (collRes.ok) {
                const collData = await collRes.json();
                const allCards = collData.cards || [];
                cards = slotIds.map(id => {
                  const c = allCards.find(card => card.id == id);
                  if (!c) return null;
                  const s = c.spell || {};
                  return {
                    id: c.id,
                    name: c.name || c.spell_name || s.name || '???',
                    house: c.house || c.spell_house || s.house || 'universal',
                    spell_type: c.spell_type || s.spell_type || 'attack',
                    rarity: c.rarity || s.rarity || 'common',
                    base_atk: c.base_atk ?? s.base_atk ?? 0,
                    base_hp: c.base_hp ?? s.base_hp ?? 0,
                    base_spd: c.base_spd ?? s.base_spd ?? 0,
                    base_def: c.base_def ?? s.base_def ?? 0,
                    base_luck: c.base_luck ?? s.base_luck ?? 0,
                    bonus_effects: c.bonus_effects || c.spell_effects || s.bonus_effects || [],
                    image_url: c.image_url || s.image_url || '',
                    sharpness: c.sharpness ?? 100,
                  };
                }).filter(Boolean);
              }
            } catch(e) { console.warn('Collection fallback failed:', e); }
          }
        }

        if (cards.length > 0) {
          state.equippedCards = cards;
          renderCardSlots(cards);
        } else if (state.equippedCards.length === 0) {
          // Only wipe the slots if we have nothing from a recent deploy — avoids
          // the race condition where the loadout API hasn't caught up yet but the
          // player just selected their cards in the deploy modal.
          renderCardSlots([]);
        }

        // Update Your Nine stats (retry if sprite not loaded yet)
        updateYourNineStats();
        if (!state.nines.has(state.playerId)) {
          setTimeout(updateYourNineStats, 1500);
          setTimeout(updateYourNineStats, 4000);
        }
      } else {
        state.isDeployed = false;
        document.getElementById('deploy-cta').style.display = 'block';
        document.getElementById('arena-bottom-tray').style.display = 'none';
      }
    } catch(e) {
      console.warn('checkDeployment error:', e);
      document.getElementById('deploy-cta').style.display = 'block';
      document.getElementById('arena-bottom-tray').style.display = 'none';
    }
  }

  /** Update Your Nine stats display from sprite + equipped cards */
  function updateYourNineStats() {
    const sprite = state.nines.get(state.playerId);
    if (!sprite) return;

    let cardAtk = 0, cardHp = 0, cardSpd = 0, cardDef = 0, cardLuck = 0;
    if (state.equippedCards && state.equippedCards.length > 0) {
      state.equippedCards.forEach(c => {
        if (!c) return;
        cardAtk  += c.base_atk  || 0;
        cardHp   += c.base_hp   || 0;
        cardSpd  += c.base_spd  || 0;
        cardDef  += c.base_def  || 0;
        cardLuck += c.base_luck || 0;
      });
    }
    const totalAtk  = (sprite.stats?.atk  || 0) + cardAtk;
    const totalHp   = (sprite.maxHp        || 0) + cardHp;
    const totalSpd  = (sprite.stats?.spd   || 0) + cardSpd;
    const totalDef  = (sprite.stats?.def   || 0) + cardDef;
    const totalLuck = (sprite.stats?.luck  || 0) + cardLuck;

    const statsEl = document.getElementById('your-nine-stats');
    if (statsEl) {
      statsEl.innerHTML = `
        <div class="your-nine-stat" style="color:#e85a6a">⚔ ATK ${totalAtk}</div>
        <div class="your-nine-stat" style="color:#6acd8a">♥ HP ${totalHp}</div>
        <div class="your-nine-stat" style="color:#6ac8d8">◈ SPD ${totalSpd}</div>
        <div class="your-nine-stat" style="color:#b088e8">⛊ DEF ${totalDef}</div>
        <div class="your-nine-stat" style="color:#D4A64B">★ LUCK ${totalLuck}</div>
      `;
    }
    const fill = document.getElementById('your-hp-fill');
    const text = document.getElementById('your-hp-text');
    if (fill) fill.style.width = `${(sprite.hp / sprite.maxHp) * 100}%`;
    if (text) text.textContent = `${sprite.hp}/${sprite.maxHp}`;
  }

  // ===== DEPLOY MODAL — CARD SELECTION =====

  /** Open modal, load player's card collection */
  async function openDeployModal() {
    if (!state.playerId) {
      alert('Please log in first');
      return;
    }

    // Set zone name
    document.getElementById('deploy-zone-name').textContent = state.currentZone?.name || 'Unknown Zone';

    // Reset selection
    state.selectedCards = [];
    state._deployNoCards = false;
    document.getElementById('deploy-selected-count').textContent = '0';
    document.getElementById('btn-confirm-deploy').disabled = true;
    document.getElementById('btn-confirm-deploy').textContent = 'SELECT 3 CARDS TO DEPLOY';

    // Reset stat preview
    document.getElementById('deploy-atk').textContent = '--';
    document.getElementById('deploy-hp').textContent = '--';
    document.getElementById('deploy-spd').textContent = '--';
    document.getElementById('deploy-def').textContent = '--';
    document.getElementById('deploy-luck').textContent = '--';

    // Show modal
    document.getElementById('deploy-modal').classList.add('open');

    // Load player's cards
    const grid = document.getElementById('deploy-card-grid');
    grid.innerHTML = '<div class="loading-text">Loading your cards...</div>';

    try {
      let cards = [];
      let deployedCardIds = [];

      // Get cards already deployed on OTHER zones
      try {
        const depRes = await fetch(`/api/zones/my-deployments/${state.playerId}`);
        if (depRes.ok) {
          const depData = await depRes.json();
          for (const dep of (depData.deployments || [])) {
            if (dep.zone_id != state.currentZoneId && dep.card_ids) {
              deployedCardIds.push(...dep.card_ids);
            }
          }
        }
      } catch(e) { /* non-critical */ }

      // Fetch player's card collection — prioritized endpoints
      const endpoints = [
        `/api/packs/collection/${state.playerId}`,
        `/api/spells/collection/${state.playerId}`,
        `/api/nines/${state.playerId}/cards`,
        `/api/players/${state.playerId}/cards`,
      ];

      for (const url of endpoints) {
        try {
          const res = await fetch(url);
          if (!res.ok) continue;
          const data = await res.json();
          // Normalize: APIs may return cards under different keys
          const maybeCards = data.cards || data.player_cards || data.collection || data.spells || (Array.isArray(data) ? data : null);
          if (Array.isArray(maybeCards) && maybeCards.length > 0) {
            cards = maybeCards;
            console.log('✅ Loaded', cards.length, 'cards from', url);
            break;
          }
        } catch(e) { continue; }
      }

      if (!Array.isArray(cards) || cards.length === 0) {
        // NO CARDS — show fallback deploy option
        state._deployNoCards = true;
        grid.innerHTML = `
          <div style="text-align:center; padding:20px 0;">
            <div style="font-size:24px; margin-bottom:12px;">📦</div>
            <div style="font-family:'Cinzel',serif; font-size:14px; color:var(--bright); margin-bottom:8px;">No Cards Found</div>
            <div style="font-family:monospace; font-size:10px; color:var(--muted); margin-bottom:4px; line-height:1.6;">
              Open daily packs to build your collection!<br>
              You can still deploy with your base house stats.
            </div>
          </div>`;
        document.getElementById('btn-confirm-deploy').disabled = false;
        document.getElementById('btn-confirm-deploy').textContent = '⚔️ DEPLOY WITH BASE STATS';
        return;
      }

      // Normalize card data — packs/collection nests stats under .spell
      cards = cards.map(c => {
        const s = c.spell || {};
        return {
          ...c,
          name: c.name || c.spell_name || s.name || '???',
          house: c.house || c.spell_house || s.house || 'universal',
          spell_type: c.spell_type || s.spell_type || 'attack',
          rarity: c.rarity || s.rarity || 'common',
          base_atk: c.base_atk ?? s.base_atk ?? 0,
          base_hp: c.base_hp ?? s.base_hp ?? 0,
          base_spd: c.base_spd ?? s.base_spd ?? 0,
          base_def: c.base_def ?? s.base_def ?? 0,
          base_luck: c.base_luck ?? s.base_luck ?? 0,
          bonus_effects: c.bonus_effects || c.spell_effects || s.bonus_effects || [],
          flavor_text: c.flavor_text || s.flavor_text || '',
          image_url: c.image_url || s.image_url || '',
          sharpness: c.sharpness ?? c.current_sharpness ?? 100,
          player_card_id: c.player_card_id || c.id,
        };
      });

      state.playerCards = cards;
      renderCardGrid(cards, deployedCardIds);

    } catch(e) {
      console.error('Card loading error:', e);
      // Error fallback — still let them deploy
      state._deployNoCards = true;
      grid.innerHTML = `
        <div style="text-align:center; padding:20px 0;">
          <div style="font-family:monospace; font-size:10px; color:var(--red); margin-bottom:8px;">Error loading cards</div>
          <div style="font-family:monospace; font-size:9px; color:var(--muted);">You can still deploy with base stats.</div>
        </div>`;
      document.getElementById('btn-confirm-deploy').disabled = false;
      document.getElementById('btn-confirm-deploy').textContent = '⚔️ DEPLOY WITH BASE STATS';
    }
  }

  /** Render card selection grid — uses buildCardV4 if available, otherwise rich fallback */
  function renderCardGrid(cards, deployedCardIds) {
    const grid = document.getElementById('deploy-card-grid');
    const useV4 = typeof buildCardV4 === 'function';

    // Sort: deployed-elsewhere last, then by rarity desc, then name
    const rarityOrder = { legendary: 5, epic: 4, rare: 3, uncommon: 2, common: 1 };
    const sorted = [...cards].map((c, i) => ({ ...c, _origIdx: i })).sort((a, b) => {
      const aDeployed = deployedCardIds.includes(a.player_card_id || a.id) ? 1 : 0;
      const bDeployed = deployedCardIds.includes(b.player_card_id || b.id) ? 1 : 0;
      if (aDeployed !== bDeployed) return aDeployed - bDeployed;
      const aR = rarityOrder[(a.rarity || 'common').toLowerCase()] || 1;
      const bR = rarityOrder[(b.rarity || 'common').toLowerCase()] || 1;
      if (aR !== bR) return bR - aR;
      return (a.name || '').localeCompare(b.name || '');
    });

    grid.innerHTML = sorted.map((card) => {
      const index = card._origIdx;
      const cardId = card.player_card_id || card.id;
      const isDeployedElsewhere = deployedCardIds.includes(cardId);
      const sharpness = card.sharpness ?? card.current_sharpness ?? 100;
      const sharpColor = sharpness > 60 ? 'var(--cyan)' : sharpness > 30 ? 'var(--gold)' : 'var(--red)';

      // Normalize house
      if (!card.house && card.school_id) {
        const houseMap = {1:'smoulders',2:'darktide',3:'stonebark',4:'ashenvale',5:'stormrage',6:'nighthollow',7:'dawnbringer',8:'manastorm',9:'plaguemire'};
        card.house = houseMap[card.school_id] || 'universal';
      }
      const houseKey = (card.house || 'universal').toLowerCase();
      const hColor = HOUSES[houseKey]?.color || '#888';

      let cardHTML = '';
      if (useV4) {
        cardHTML = buildCardV4(card, { size: 'tiny' });
      } else {
        // Rich fallback that looks good without V4 renderer
        const typeColor = TYPE_COLORS[(card.spell_type || 'attack').toLowerCase()] || '#888';
        const rarityColors = { common: '#999', uncommon: '#66dd66', rare: '#55bbff', epic: '#bb88ff', legendary: '#ffd700' };
        const rColor = rarityColors[(card.rarity || 'common').toLowerCase()] || '#999';
        const imgName = card.image_url || card.spell_image || '';
        const imgSrc = imgName ? '/assets/images/spells/' + imgName : '';
        const imgEl = imgSrc
          ? `<div style="width:100%;height:90px;background:url('${imgSrc}') center/cover;border-radius:8px 8px 0 0;opacity:0.85;"></div>`
          : `<div style="width:100%;height:60px;background:linear-gradient(135deg,${hColor}30,transparent);border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:24px;">${HOUSES[houseKey]?.icon || '⚔️'}</div>`;

        cardHTML = `<div style="width:160px;height:252px;background:linear-gradient(180deg,#12101a,#0c0a14);border:1.5px solid ${hColor}40;border-radius:12px;overflow:hidden;">
          ${imgEl}
          <div style="padding:8px 10px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
              <span style="font-family:\'Press Start 2P\',monospace;font-size:6px;color:${typeColor}">${(card.spell_type || 'ATTACK').toUpperCase()}</span>
              <span style="font-family:\'Press Start 2P\',monospace;font-size:5px;color:${rColor};border:1px solid ${rColor}30;padding:1px 4px;border-radius:3px">${(card.rarity || 'C')[0].toUpperCase()}</span>
            </div>
            <div style="font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--bright);margin-bottom:4px;">${card.name || '???'}</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;font-family:\'Press Start 2P\',monospace;font-size:5px;">
              ${card.base_atk ? `<span style="color:#e85a6a">ATK ${card.base_atk}</span>` : ''}
              ${card.base_hp ? `<span style="color:#6acd8a">HP ${card.base_hp}</span>` : ''}
              ${card.base_spd ? `<span style="color:#6ac8d8">SPD ${card.base_spd}</span>` : ''}
              ${card.base_def ? `<span style="color:#b088e8">DEF ${card.base_def}</span>` : ''}
              ${card.base_luck ? `<span style="color:#D4A64B">LCK ${card.base_luck}</span>` : ''}
            </div>
          </div>
        </div>`;
      }

      return '<div class="deploy-card-slot' + (isDeployedElsewhere ? ' deployed-elsewhere' : '') + '"'
        + ' data-index="' + index + '" data-card-id="' + cardId + '">'
        + '<div class="selected-badge">✓ SELECTED</div>'
        + cardHTML
        + '<div class="deploy-sharpness-bar"><div class="deploy-sharpness-fill" style="width:' + sharpness + '%;background:' + sharpColor + '"></div></div>'
        + '</div>';
    }).join('');

    // Initialize V4 card effects if available
    try { if (useV4 && typeof initCards === 'function') initCards(); } catch(e) { console.warn('initCards:', e); }

    // Attach click handlers
    grid.querySelectorAll('.deploy-card-slot:not(.deployed-elsewhere)').forEach(slot => {
      slot.addEventListener('click', () => toggleCardSelection(slot));
    });
  }

  /** Toggle a card's selection in the deploy modal */
  function toggleCardSelection(slot) {
    const index = parseInt(slot.dataset.index);
    const cardId = slot.dataset.cardId;

    if (slot.classList.contains('selected')) {
      // Deselect
      slot.classList.remove('selected');
      state.selectedCards = state.selectedCards.filter(c => c.index !== index);
    } else {
      // Can't select more than 3
      if (state.selectedCards.length >= 3) {
        // Flash the counter red briefly
        const counter = document.getElementById('deploy-selected-count');
        counter.style.color = 'var(--red)';
        setTimeout(() => { counter.style.color = ''; }, 500);
        return;
      }
      // Select
      slot.classList.add('selected');
      state.selectedCards.push({ index, cardId, card: state.playerCards[index] });
    }

    // Update counter
    document.getElementById('deploy-selected-count').textContent = state.selectedCards.length;

    // Update wave labels on selected cards
    document.querySelectorAll('#deploy-card-grid .deploy-card-slot.selected .selected-badge').forEach((badge, i) => {
      badge.textContent = '⚔️ CARD ' + (i + 1);
    });

    // Update button state
    const btn = document.getElementById('btn-confirm-deploy');
    if (state.selectedCards.length === 3) {
      btn.disabled = false;
      btn.textContent = '⚔️ DEPLOY TO BATTLE';
    } else {
      btn.disabled = true;
      btn.textContent = `SELECT ${3 - state.selectedCards.length} MORE CARD${state.selectedCards.length === 2 ? '' : 'S'}`;
    }

    // Update stats preview (house base + card bonuses)
    updateDeployStatsPreview();
  }

  /** Update the combined stats preview as cards are selected */
  function updateDeployStatsPreview() {
    // Start with base stats (would need house data — use placeholders if not available)
    let atk = 0, hp = 0, spd = 0, def = 0, luck = 0;

    for (const sel of state.selectedCards) {
      const c = sel.card;
      if (!c) continue;
      atk += c.base_atk || 0;
      hp += c.base_hp || 0;
      spd += c.base_spd || 0;
      def += c.base_def || 0;
      luck += c.base_luck || 0;
    }

    document.getElementById('deploy-atk').textContent = atk > 0 ? `+${atk}` : '--';
    document.getElementById('deploy-hp').textContent = hp > 0 ? `+${hp}` : '--';
    document.getElementById('deploy-spd').textContent = spd > 0 ? `+${spd}` : '--';
    document.getElementById('deploy-def').textContent = def > 0 ? `+${def}` : '--';
    document.getElementById('deploy-luck').textContent = luck > 0 ? `+${luck}` : '--';
  }

  function closeDeployModal() {
    document.getElementById('deploy-modal').classList.remove('open');
    state.selectedCards = [];
    state._deployNoCards = false;
  }

  /** Deploy to zone — sends selected card IDs */
  async function confirmDeploy() {
    if (!state.playerId) {
      alert('Please log in first');
      return;
    }

    // If we have cards available but haven't selected 3, block
    if (!state._deployNoCards && state.selectedCards.length < 3) {
      alert('Select 3 cards first');
      return;
    }

    const btn = document.getElementById('btn-confirm-deploy');
    btn.textContent = 'DEPLOYING...';
    btn.disabled = true;

    // Build deploy payload — include card_ids only if cards were selected
    const payload = {
      player_id: state.playerId,
      zone_id: state.currentZoneId,
    };
    if (state.selectedCards.length > 0) {
      payload.card_ids = state.selectedCards.map(c => c.cardId);
    }

    try {
      const res = await fetch('/api/zones/deploy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await res.json();
      if (data.success) {
        // Close modal
        closeDeployModal();

        state.isDeployed = true;
        document.getElementById('deploy-cta').style.display = 'none';
        document.getElementById('arena-bottom-tray').style.display = 'flex';
        addFeedEvent(data.message || 'You have entered the battle!', 'join');

        // Show equipped cards
        const equippedCards = state.selectedCards.map(c => c.card);
        renderCardSlots(equippedCards);

        // Update deployed zone tracking so the badge shows on zone list immediately
        state.deployedZoneIds.add(state.currentZoneId);
        updatePlayerBar();

        // Equip each selected card into its slot so combat engine can use card effects
        // The deploy endpoint only creates the deployment row — cards must be equipped separately
        if (state.selectedCards.length > 0) {
          const equipPromises = state.selectedCards.map((c, i) =>
            fetch('/api/zones/equip-card', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                player_id: state.playerId,
                zone_id: state.currentZoneId,
                card_id: c.cardId,
                slot_number: i + 1,
              }),
            }).then(r => r.json()).catch(() => null)
          );
          const equipResults = await Promise.all(equipPromises);
          const failed = equipResults.filter(r => !r || !r.success);
          if (failed.length > 0) {
            console.warn(`[deploy] ${failed.length} card(s) failed to equip — effects may not fire`);
          } else {
            console.log('[deploy] All cards equipped successfully — effects active');
          }
          // Signal server to force-reload this zone on next tick (picks up newly equipped cards)
          fetch(`/api/zones/${state.currentZoneId}/force-reload`, { method: 'POST' }).catch(() => null);
        }

        // Reload zone nines to include yourself
        state.nines.clear();
        if (state.arenaApp) {
          const toRemove = [];
          const keep = new Set(['ground', 'environment', 'fog', 'arena-platform']);
          state.arenaApp.stage.children.forEach(child => {
            if (!keep.has(child.name)) toRemove.push(child);
          });
          toRemove.forEach(c => state.arenaApp.stage.removeChild(c));
        }
        state._guildAngles = {};
        state._guildCounts = {};
        await loadZoneNines(state.currentZoneId);
        // Re-check deployment to load cards from API — but don't let it hide the panel we just showed
        try {
          await checkDeployment(state.currentZoneId);
        } catch(e) {
          console.warn('Post-deploy checkDeployment failed (non-critical):', e);
          // Panel is already visible from above, keep it that way
        }
      } else {
        alert(data.error || 'Deploy failed');
        btn.textContent = '⚔️ DEPLOY TO BATTLE';
        btn.disabled = false;
      }
    } catch(e) {
      alert('Deploy failed: ' + e.message);
      btn.textContent = '⚔️ DEPLOY TO BATTLE';
      btn.disabled = false;
    }
  }

  /** Withdraw from zone */
  async function withdraw() {
    if (!confirm('Withdraw from this zone?')) return;

    try {
      const res = await fetch('/api/zones/withdraw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          player_id: state.playerId,
          zone_id: state.currentZoneId,
        }),
      });

      const data = await res.json();
      if (data.success) {
        state.isDeployed = false;
        document.getElementById('arena-bottom-tray').style.display = 'none';
        document.getElementById('deploy-cta').style.display = 'block';
        hideCardSlots();
        addFeedEvent('You withdrew from the battle.', 'system');

        // Keep deployed zone tracking in sync
        state.deployedZoneIds.delete(state.currentZoneId);
        updatePlayerBar();

        // Remove your sprite
        removeNineSprite(state.playerId);
      } else {
        alert(data.error || 'Withdraw failed');
      }
    } catch(e) {
      alert('Withdraw failed');
    }
  }

  // ══════════════════════════════════════════════
  // UNIFIED TRAY TAB SWITCHING
  // ══════════════════════════════════════════════
  document.querySelectorAll('.tray-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tray-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tray-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const pane = document.getElementById('tray-pane-' + tab);
      if (pane) pane.classList.add('active');
    });
  });

  // ── GUILD SIDEBAR PANEL ──
  const GUILD_COLORS_LIST = ['#e85a6a','#6acd8a','#6ac8d8','#D4A64B','#b088e8','#FF8C00','#5B8FE0'];

  function renderGuildSidebar() {
    const container = document.getElementById('sidebar-guild-rows');
    if (!container) return;

    // Build guild data from live nines
    const guilds = {};
    state.nines.forEach((sprite, id) => {
      const tag = sprite.guild || '???';
      if (!guilds[tag]) guilds[tag] = { hp: 0, maxHp: 0, nines: [] };
      guilds[tag].hp += sprite.hp || 0;
      guilds[tag].maxHp += sprite.maxHp || 0;
      guilds[tag].nines.push(id);
    });

    const entries = Object.entries(guilds).sort((a, b) => b[1].hp - a[1].hp);
    const totalHp = entries.reduce((s, [, g]) => s + g.hp, 0) || 1;
    const isLeader = entries[0]?.[0];

    // Update controlling guild pill in top bar
    updateControlPill(isLeader, guilds[isLeader]);

    container.innerHTML = '';
    entries.forEach(([tag, data], i) => {
      const color = GUILD_COLORS_LIST[i % GUILD_COLORS_LIST.length];
      const pct = Math.round((data.hp / (data.maxHp || 1)) * 100);
      const row = document.createElement('div');
      row.className = 'sidebar-guild-row';
      row.innerHTML = `
        <div class="sidebar-guild-top">
          <div class="sidebar-guild-dot" style="background:${color}"></div>
          <div class="sidebar-guild-name">${tag === isLeader ? '👑 ' : ''}${tag}</div>
          <div class="sidebar-guild-hp">${data.hp} HP</div>
        </div>
        <div class="sidebar-guild-bar">
          <div class="sidebar-guild-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="sidebar-guild-nines">${data.nines.length} Nine${data.nines.length !== 1 ? 's' : ''} fighting</div>
      `;
      // Hover: highlight this guild's sprites, dim others
      row.addEventListener('mouseenter', () => highlightGuild(tag));
      row.addEventListener('mouseleave', () => resetGuildHighlight());
      container.appendChild(row);
    });
  }

  function highlightGuild(guildTag) {
    state.nines.forEach((sprite) => {
      if (sprite.guild === guildTag) {
        sprite.container.alpha = 1;
        if (sprite.glow) { sprite.glow.alpha = 0.35; }
        if (sprite.ring) { sprite.ring.alpha = 1.2; }
      } else {
        sprite.container.alpha = 0.25;
      }
    });
  }

  function resetGuildHighlight() {
    state.nines.forEach((sprite) => {
      sprite.container.alpha = sprite.isAlive === false ? 0.15 : 1;
      if (sprite.glow) sprite.glow.alpha = 0.06;
      if (sprite.ring) sprite.ring.alpha = 1;
    });
  }

  // ── CONTROLLING GUILD PILL ──
  function updateControlPill(leader, data) {
    const pill = document.getElementById('guild-control-pill');
    if (!pill) return;
    if (!leader || leader === '???') { pill.style.display = 'none'; return; }
    const color = GUILD_COLORS_LIST[0]; // leader always gets index 0
    pill.style.display = 'inline-block';
    pill.style.color = color;
    pill.style.borderColor = color + '60';
    pill.style.background = color + '18';
    pill.textContent = '👑 ' + leader;
  }

  // Call renderGuildSidebar when guild data updates (replaces updateGuildDominance)
  function updateGuildDominance(nineStates) {
    renderGuildSidebar();
  }

  // ── CARD COOLDOWN BARS ──
  function injectCooldownBars() {
    for (let i = 0; i < 3; i++) {
      const slot = document.getElementById(`card-slot-${i}`);
      if (!slot || slot.querySelector('.slot-cooldown')) continue;
      const bar = document.createElement('div');
      bar.className = 'slot-cooldown';
      bar.innerHTML = `<div class="slot-cooldown-fill" id="cooldown-fill-${i}" style="width:0%"></div>`;
      slot.style.position = 'relative';
      slot.appendChild(bar);
    }
  }

  function updateCardCooldowns(spellReady) {
    for (let i = 0; i < 3; i++) {
      const fill = document.getElementById(`cooldown-fill-${i}`);
      if (!fill) continue;
      if (state.cardCooldownIndex === i) {
        fill.style.width = `${Math.round(spellReady * 100)}%`;
        fill.style.background = spellReady > 0.9 ? '#D4A64B' : '#6ac8d8';
      }
    }
  }

  // ── COMBAT METERS (WoW-style) ──
  if (!state.combatMetrics) state.combatMetrics = new Map();
  if (!state._metersTab) state._metersTab = 'dmg';

  // Called on every tracked combat event — increments live totals
  function trackCombatStat(id, name, guild, house, stat, amount) {
    if (!id || !amount) return;
    const m = state.combatMetrics.get(id) || { name: name || String(id).slice(0,8), guild: guild || '', house: house || '', damage: 0, heals: 0, kos: 0, cards: {} };
    m.name = name || m.name;
    m.guild = guild || m.guild;
    m.house = house || m.house;
    m[stat] = (m[stat] || 0) + amount;
    state.combatMetrics.set(id, m);
    renderCombatMeters();
  }

  function trackCardUsed(id, cardName) {
    if (!id || !cardName) return;
    const m = state.combatMetrics.get(id);
    if (!m) return;
    m.cards[cardName] = (m.cards[cardName] || 0) + 1;
    state.combatMetrics.set(id, m);
  }

  // Sync from server state snapshots (fills in players not yet seen live)
  function updateContributions(nineStates) {
    for (const n of nineStates) {
      const id = n.id;
      if (!id) continue;
      const sprite = state.nines.get(id);
      const existing = state.combatMetrics.get(id) || { name: '', guild: '', house: '', damage: 0, heals: 0, kos: 0, cards: {} };
      state.combatMetrics.set(id, {
        name: sprite?.name || existing.name || String(id).slice(0,8),
        guild: sprite?.guild || n.guildTag || existing.guild || '',
        house: sprite?.house || existing.house || '',
        damage: Math.max(existing.damage, n.damageDealt || 0),
        heals: Math.max(existing.heals, n.healingDone || 0),
        kos: Math.max(existing.kos, n.koCount || 0),
        cards: existing.cards,
      });
    }
    renderCombatMeters();
  }

  // House → bar colour
  function houseBarColor(house) {
    const map = {
      ashenvale: '#6acd8a', smoulders: '#e85a6a', manastorm: '#6ac8d8',
      nighthollow: '#b088e8', plaguemire: '#a0c060', dawnbringer: '#f0c060',
      darktide: '#60a0e8', stormrage: '#e8a060', stonebark: '#c0a080',
    };
    return map[(house||'').toLowerCase()] || '#D4A64B';
  }

  function renderCombatMeters() {
    const el = document.getElementById('contribution-list');
    if (!el) return;
    const tab = state._metersTab || 'dmg';
    const statKey = tab === 'dmg' ? 'damage' : tab === 'heals' ? 'heals' : 'kos';
    const statColor = tab === 'dmg' ? '#e85a6a' : tab === 'heals' ? '#6acd8a' : '#D4A64B';
    const statLabel = tab === 'dmg' ? 'DMG' : tab === 'heals' ? 'HEALS' : 'KOs';

    const entries = [...state.combatMetrics.values()].filter(m => m[statKey] > 0).sort((a, b) => b[statKey] - a[statKey]);
    const max = entries[0]?.[statKey] || 1;

    // Guild totals
    const guildTotals = {};
    for (const m of state.combatMetrics.values()) {
      if (!m.guild) continue;
      guildTotals[m.guild] = (guildTotals[m.guild] || 0) + (m[statKey] || 0);
    }
    const guildEntries = Object.entries(guildTotals).sort((a, b) => b[1] - a[1]);

    // Build HTML
    const tabsHtml = `<div class="meters-tabs">
      <button class="meters-tab${tab==='dmg'?' active':''}" onclick="state._metersTab='dmg';renderCombatMeters()">⚔️ DMG</button>
      <button class="meters-tab${tab==='heals'?' active':''}" onclick="state._metersTab='heals';renderCombatMeters()">💚 HEALS</button>
      <button class="meters-tab${tab==='kos'?' active':''}" onclick="state._metersTab='kos';renderCombatMeters()">💀 KOs</button>
    </div>`;

    const guildHtml = guildEntries.length ? `<div class="meters-guild-bar">
      ${guildEntries.map(([g, v]) => `<div class="meters-guild-chip" style="background:${houseBarColor('')}22;color:${houseBarColor('')};border:1px solid ${houseBarColor('')}44">[${g}] ${v.toLocaleString()}</div>`).join('')}
    </div>` : '';

    const rowsHtml = entries.length ? entries.map((m, i) => {
      const pct = Math.round((m[statKey] / max) * 100);
      const color = houseBarColor(m.house);
      const topCard = Object.entries(m.cards || {}).sort((a,b) => b[1]-a[1])[0];
      const cardTip = topCard ? ` · ${topCard[0]}` : '';
      return `<div class="meter-row">
        <div class="meter-row-top">
          <span class="meter-rank">${i+1}</span>
          <span class="meter-name" title="${m.guild ? '['+m.guild+'] ' : ''}${m.name}${cardTip}">${m.guild ? '<span style="color:'+color+';opacity:.7">['+m.guild+']</span> ' : ''}${m.name}</span>
          <span class="meter-value" style="color:${statColor}">${m[statKey].toLocaleString()}</span>
        </div>
        <div class="meter-bar-track">
          <div class="meter-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>`;
    }).join('') : `<div style="padding:16px 10px;text-align:center;font-family:'Crimson Text',serif;color:var(--faint);font-size:13px;font-style:italic">No ${statLabel} recorded yet.</div>`;

    el.innerHTML = tabsHtml + guildHtml + `<div class="meters-rows">${rowsHtml}</div>`;
  }

  // ── FULL BATTLE LOG ──
  function addBattleLog(text, type) {
    function appendTo(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const div = document.createElement('div');
      div.className = `log-entry log-${type || 'default'}`;
      div.textContent = text;
      el.appendChild(div);
      while (el.children.length > 100) el.removeChild(el.firstChild);
      el.scrollTop = el.scrollHeight;
    }
    appendTo('battle-log-full');
  }

  // ── ARENA CHAT ──

  // ── ARENA CHAT ──
  (function(){
    const log = document.getElementById('arena-chat-log');
    const input = document.getElementById('arena-chat-input');
    const sendBtn = document.getElementById('arena-chat-send');

    function appendMsg(data) {
      if (!log) return;
      const gTag = data.guildTag ? ' <span class="chat-guild">['+data.guildTag+']</span>' : '';
      const html = '<span class="chat-handle">@'+data.handle+'</span>'+gTag+' <span style="color:var(--body);">'+data.message.replace(/</g,'&lt;')+'</span>';
      const div = document.createElement('div');
      div.className = 'chat-msg';
      div.innerHTML = html;
      log.appendChild(div);
      if (log.children.length > 30) log.removeChild(log.firstChild);
      log.scrollTop = log.scrollHeight;
    }

    function sendMsg() {
      const msg = input.value.trim();
      if (!msg || !state.socket || !state.currentZoneId) return;
      const handle = state.playerHandle || localStorage.getItem('9lv_handle') || 'Anon';
      const guildTag = state.playerGuildTag || '';
      state.socket.emit('chat:send', { zoneId: state.currentZoneId, message: msg, handle, guildTag });
      input.value = '';
    }

    if (sendBtn) sendBtn.addEventListener('click', sendMsg);
    if (input) input.addEventListener('keydown', function(e){ if(e.key==='Enter') sendMsg(); });
    document.addEventListener('arena:chat:message', function(e){ appendMsg(e.detail); });
  })();

  // ===== EVENT LISTENERS =====
  document.getElementById('btn-back').addEventListener('click', closeArena);
  document.getElementById('btn-join-battle').addEventListener('click', openDeployModal);
  document.getElementById('btn-withdraw').addEventListener('click', withdraw);
  document.getElementById('btn-confirm-deploy').addEventListener('click', confirmDeploy);
  document.getElementById('btn-cancel-deploy').addEventListener('click', closeDeployModal);
  document.getElementById('btn-close-deploy').addEventListener('click', closeDeployModal);

  // ===== START =====
  init();

})();
</script>
</body>
