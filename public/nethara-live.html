  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: #0a0812; color: #CCC5DB; font-family: 'Crimson Text', serif; overflow-x: hidden; }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }
    ::-webkit-scrollbar { height: 3px; width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    @keyframes charIdle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes charShake { 0%, 100% { transform: translateX(0); } 15% { transform: translateX(-8px) rotate(-3deg); } 30% { transform: translateX(6px) rotate(2deg); } 50% { transform: translateX(-4px) rotate(-1deg); } 70% { transform: translateX(3px); } }
    @keyframes charPulse { 0% { transform: scale(1); } 30% { transform: scale(1.12); } 100% { transform: scale(1); } }
    @keyframes dmgFloat { 0% { opacity: 1; transform: translateY(0) scale(1); } 20% { opacity: 1; transform: translateY(-15px) scale(1.3); } 60% { opacity: 0.9; transform: translateY(-35px) scale(1.1); } 100% { opacity: 0; transform: translateY(-60px) scale(0.8); } }
    @keyframes flashOut { 0% { opacity: 0.15; } 100% { opacity: 0; } }
    @keyframes phaseIn { 0% { opacity: 0; transform: translate(-50%,-50%) scale(0.7); } 40% { opacity: 1; transform: translate(-50%,-50%) scale(1.05); } 100% { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
    @keyframes nermIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes nermBounce { 0% { transform: scale(1); } 30% { transform: scale(1.2) rotate(-5deg); } 60% { transform: scale(0.95) rotate(3deg); } 100% { transform: scale(1) rotate(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes particleDrift { 0% { transform: translateY(0); } 50% { transform: translateY(-3px); } 100% { transform: translateY(0); } }
    @keyframes pulseGlow { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>

    const ALL_H = Object.keys(H);

    function genCombatants(zoneId) {
      const gc = 3 + Math.floor(Math.random() * 2);
      const used = new Set(); const gs = [];
      for (let i = 0; i < gc; i++) { let g; do { g = Math.floor(Math.random() * 5); } while (used.has(g)); used.add(g); gs.push(g); }
      const out = []; let ni = 0;
      gs.forEach(function(gid, gi) {
        const cnt = gi === 0 ? 1 + Math.floor(Math.random() * 3) : 1 + Math.floor(Math.random() * 4);
        for (let i = 0; i < cnt; i++) {
          out.push({ id: zoneId + "-" + gid + "-" + i, name: NAMES[ni % NAMES.length], house: ALL_H[Math.floor(Math.random() * ALL_H.length)], guild: gid, card: NCARDS[Math.floor(Math.random() * NCARDS.length)], hp: 60 + Math.floor(Math.random() * 40), maxHp: 100, alive: true, isLoneWolf: false });
          ni++;
        }
      });
      if (Math.random() > 0.5) out.push({ id: zoneId + "-lone", name: "LoneHunter", house: ALL_H[Math.floor(Math.random() * ALL_H.length)], guild: -1, card: NCARDS[Math.floor(Math.random() * NCARDS.length)], hp: 75, maxHp: 100, alive: true, isLoneWolf: true });
      return out;
    }

              {glow && <ellipse cx="50" cy="70" rx="40" ry="30" fill={"url(#g-" + uid.current + ")"} />}
              <path d="M25 55 L20 110 L80 110 L75 55 Q50 48 25 55Z" fill={h.c} opacity="0.6" />
              <path d="M30 58 L27 105 L73 105 L70 58 Q50 52 30 58Z" fill={h.c} opacity="0.85" />

              <circle cx="50" cy="62" r="5" fill={h.c} opacity="0.3" />
              <text x="50" y="64" textAnchor="middle" fontSize="7">{h.i}</text>
              <ellipse cx="50" cy="38" rx="22" ry="20" fill="#3a3a4a" />
              <polygon points="32,22 28,5 41,18" fill="#3a3a4a" /><polygon points="68,22 72,5 59,18" fill="#3a3a4a" />
              <polygon points="33,22 30,8 40,19" fill={h.c} opacity="0.35" /><polygon points="67,22 70,8 60,19" fill={h.c} opacity="0.35" />
              <ellipse cx="40" cy="36" rx="4.5" ry="4" fill={h.c} /><ellipse cx="60" cy="36" rx="4.5" ry="4" fill={h.c} />

    function Dmg({ value, x, y, type }) {
      const color = type === "damage" ? T.red : type === "heal" ? T.green : type === "effect" ? T.purple : T.gold;

      return <div style={{ position: "absolute", left: x, top: y, pointerEvents: "none", zIndex: 100, fontFamily: "'Press Start 2P',monospace", fontSize: sz, color: color, textShadow: "0 0 12px " + color + ", 0 0 25px " + color + "60, 0 2px 6px rgba(0,0,0,0.9)", animation: "dmgFloat 1.8s ease-out forwards", whiteSpace: "nowrap" }}>{prefix}{value}</div>;

    function ZoneSelect({ zones, playerHouse, playerDeployed, onSelect }) {

      var filterBtns = [{ k: "all", l: "All" }, { k: "hot", l: "\u{1F525} Hot" }, { k: "mine", l: "\u2694\uFE0F Mine" }];

              <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0 0", marginTop: 6, borderTop: "1px solid " + T.gold + "20" }}>

    // ═══════════════════════════════════════════════════════════
    // BATTLE VIEW — cinematic 22s combat
    // ═══════════════════════════════════════════════════════════
    function BattleView({ zone, player, cards, onBack, onDeploy, onWithdraw }) {
      const [selectedCard, setSelectedCard] = useState(null);
      const [combatants, setCombatants] = useState(function() { return genCombatants(zone.id); });
      const [dmgs, setDmgs] = useState([]);
      const [shakeGroups, setShakeGroups] = useState({});
      const [pulseMe, setPulseMe] = useState(false);
      const [running, setRunning] = useState(false);
      const [cycleTime, setCycleTime] = useState(847);
      const [hoveredNine, setHoveredNine] = useState(null);
      const [cycleResults, setCycleResults] = useState(null);
      const [myHp, setMyHp] = useState(100);
      const [nerm, setNerm] = useState(null);
      const [phase, setPhase] = useState(null);
      const [flash, setFlash] = useState(null);
      const dmgId = useRef(0);
      const timers = useRef([]);

      const h = H[zone.house]; const ph = H[player.house];
      const isDeployed = player.deployedZones.indexOf(zone.id) >= 0;
      const deployedCard = cards.find(function(c) { return c.deployedTo === zone.id; });
      const isHomeTurf = player.house === zone.house;
      const turfBonus = isHomeTurf ? h.turf : null;

      var guildGroups = {};
      combatants.forEach(function(c) { var k = c.guild === -1 ? "lone-" + c.id : "g-" + c.guild; if (!guildGroups[k]) guildGroups[k] = { guild: c.guild, nines: [] }; guildGroups[k].nines.push(c); });
      var enemyGroups = Object.values(guildGroups).filter(function(g) { return g.guild !== player.guild; });
      var allyNines = combatants.filter(function(c) { return c.guild === player.guild; });
      var hasLoneWolf = combatants.some(function(c) { return c.isLoneWolf && c.alive; });

      useEffect(function() {
        var t = setInterval(function() { setCycleTime(function(c) { return c > 0 ? c - 1 : 900; }); }, 1000);
        return function() { clearInterval(t); timers.current.forEach(clearTimeout); };
      }, []);

      function later(fn, ms) { timers.current.push(setTimeout(fn, ms)); }
      function spawnDmg(value, x, y, type) { var id = dmgId.current++; setDmgs(function(p) { return p.concat([{ id: id, value: value, x: x, y: y, type: type }]); }); later(function() { setDmgs(function(p) { return p.filter(function(d) { return d.id !== id; }); }); }, 1800); }
      function shakeGroup(gid) { setShakeGroups(function(p) { var n = Object.assign({}, p); n[gid] = true; return n; }); later(function() { setShakeGroups(function(p) { var n = Object.assign({}, p); n[gid] = false; return n; }); }, 500); }
      function doFlash(color) { setFlash(color); later(function() { setFlash(null); }, 300); }
      function showNerm(text, dur) { setNerm(text); later(function() { setNerm(null); }, dur || 3000); }
      function showPhase(text, color, dur) { setPhase({ text: text, color: color }); later(function() { setPhase(null); }, dur || 2000); }

      // ═══ CINEMATIC COMBAT ═══
      function runCombat() {
        if (running || !isDeployed) return;
        setRunning(true); setNerm(null); setPhase(null);

        var threatGuild = enemyGroups.reduce(function(max, g) {
          var hp = g.nines.filter(function(n) { return n.alive; }).reduce(function(s, n) { return s + n.hp; }, 0);
          return hp > (max.hp || 0) ? { guild: g.guild, hp: hp, name: g.guild === -1 ? "Lone Wolf" : GUILDS[g.guild] ? GUILDS[g.guild].name : "Unknown" } : max;
        }, { hp: 0, guild: -1, name: "Unknown" });

        var yourAtk = ph.atk + (deployedCard ? deployedCard.atk : 0) + (turfBonus ? (turfBonus.atk || 0) : 0);
        var hasBurn = deployedCard && deployedCard.fx.some(function(f) { return f.indexOf("BURN") >= 0; });
        var hasHeal = deployedCard && deployedCard.fx.some(function(f) { return f.indexOf("HEAL") >= 0; });
        var hasPoison = deployedCard && deployedCard.fx.some(function(f) { return f.indexOf("POISON") >= 0; });
        var hasCrit = deployedCard && deployedCard.fx.indexOf("CRIT") >= 0;
        var burnDmg = hasBurn ? parseInt((deployedCard.fx.find(function(f) { return f.indexOf("BURN") >= 0; }).match(/\d+/) || [3])[0]) : 0;
        var healAmt = hasHeal ? parseInt((deployedCard.fx.find(function(f) { return f.indexOf("HEAL") >= 0; }).match(/\d+/) || [4])[0]) : 0;

        // Phase 0: Opening (0-3.5s)
        later(function() { showPhase("\u2694\uFE0F COMBAT CYCLE", T.gold); }, 0);
        later(function() { showNerm(pick(NERM.intro), 3500); }, 500);
        later(function() { if (isHomeTurf) showNerm(pick(NERM.homeTurf), 2500); }, 3200);

        // Phase 1: Spells (4-8s)
        later(function() { showPhase("SPELLS RESOLVE", T.purple, 2500); doFlash(deployedCard ? (H[deployedCard.house] ? H[deployedCard.house].c : T.purple) : T.purple); setPulseMe(true); later(function() { setPulseMe(false); }, 600); }, 4000);
        later(function() { showNerm(pick(NERM.spellCast), 2500); }, 4800);

        var spellT = 6000;
        if (hasBurn) {
          later(function() { doFlash("#ff6622"); spawnDmg(burnDmg, 250 + Math.random() * 60, 35 + Math.random() * 30, "effect"); shakeGroup(threatGuild.guild); showNerm(pick(NERM.burn), 2500); }, spellT);
          spellT += 1500;
        }
        if (hasHeal) {
          later(function() { doFlash("#44cc88"); spawnDmg("+" + healAmt, 100, 70, "heal"); setMyHp(function(p) { return Math.min(100, p + healAmt * 0.5); }); showNerm(pick(NERM.heal), 2500); }, spellT);
          spellT += 1500;
        }
        if (hasPoison) {
          later(function() { doFlash("#aaee55"); spawnDmg("\u2620", 270, 55, "effect"); showNerm(pick(NERM.poison), 2500); }, spellT);
          spellT += 1500;
        }

        var atkStart = Math.max(spellT, 7500);

        // Phase 2: Attacks (atkStart to atkStart+5s)
        later(function() { showPhase("AUTO-ATTACK", T.red, 2500); showNerm(pick(NERM.attackPhase), 2500); }, atkStart);
        later(function() { doFlash(ph.c); setPulseMe(true); later(function() { setPulseMe(false); }, 600); spawnDmg(yourAtk, 240 + Math.random() * 80, 30 + Math.random() * 50, "damage"); shakeGroup(threatGuild.guild); }, atkStart + 1500);
        later(function() { showNerm(pick(NERM.bigHit), 2000); }, atkStart + 2000);
        later(function() { var eDmg = 3 + Math.floor(Math.random() * 5); doFlash(T.red); spawnDmg(eDmg, 80 + Math.random() * 80, 60 + Math.random() * 30, "damage"); shakeGroup(player.guild); setMyHp(function(p) { return Math.max(5, p - eDmg * 0.4); }); }, atkStart + 3000);

        var didCrit = hasCrit && Math.random() < 0.25;
        if (didCrit) {
          later(function() { var cd = yourAtk * 2; doFlash("#ffcc00"); spawnDmg(cd + " CRIT!", 220, 20, "crit"); shakeGroup(threatGuild.guild); showNerm(pick(NERM.crit), 2500); }, atkStart + 3800);
        }
        var atkEnd = atkStart + (didCrit ? 5000 : 4000);

        // Phase 3: Effects + KOs
        later(function() { showPhase("EFFECTS TICK", T.purple, 2000); showNerm(pick(NERM.effectTick), 2000); }, atkEnd);

        var ko = [];
        later(function() {
          setCombatants(function(prev) { return prev.map(function(c) {
            if (c.guild !== player.guild && c.alive && Math.random() < 0.18) {
              ko.push({ name: c.name, guild: c.guild === -1 ? "Lone Wolf" : GUILDS[c.guild] ? GUILDS[c.guild].short : "???" });
              return Object.assign({}, c, { hp: 0, alive: false });
            }
            return Object.assign({}, c, { hp: Math.max(5, c.hp - Math.floor(Math.random() * 10)) });
          }); });
        }, atkEnd + 1200);

        later(function() {
          if (ko.length > 0) {
            doFlash(T.red);
            ko.forEach(function(k, i) { later(function() { spawnDmg("\u{1F480} " + k.name, 150 + i * 40, 40 + i * 20, "damage"); }, i * 400); });
            showNerm(pick(NERM.ko(ko[0].name, ko[0].guild)), 3000);
          } else {
            showNerm(pick(NERM.noKo), 2500);
          }
        }, atkEnd + 1800);

        if (hasLoneWolf) {
          later(function() { showNerm(pick(NERM.loneWolf), 2500); }, atkEnd + 3000);
        }
        var effectEnd = atkEnd + (hasLoneWolf ? 4200 : 3200);

        // Phase 4: Zone control result
        later(function() {
          showPhase("ZONE CONTROL", T.gold, 3000);
          var guildScores = [];
          var allGrp = {};
          combatants.forEach(function(c) { if (!allGrp[c.guild]) allGrp[c.guild] = []; allGrp[c.guild].push(c); });
          var yourGuildHp = Math.round((myHp * 0.5) + (allGrp[player.guild] || []).filter(function(n) { return n.alive; }).reduce(function(s, n) { return s + n.hp; }, 0));
          guildScores.push({ guildId: player.guild, name: GUILDS[player.guild].name, color: GUILDS[player.guild].color, totalHp: yourGuildHp, isYou: true, alive: (allGrp[player.guild] || []).filter(function(n) { return n.alive; }).length + 1, total: (allGrp[player.guild] || []).length + 1 });
          Object.keys(allGrp).forEach(function(gid) {
            var g = parseInt(gid); if (g === player.guild) return;
            var nines = allGrp[gid]; var alive = nines.filter(function(n) { return n.alive; });
            var gObj = g === -1 ? { name: "Lone Wolves", color: T.muted } : GUILDS[g];
            guildScores.push({ guildId: g, name: gObj ? gObj.name : "Unknown", color: gObj ? gObj.color : T.muted, totalHp: alive.reduce(function(s, n) { return s + n.hp; }, 0), isYou: false, alive: alive.length, total: nines.length });
          });
          var winner = guildScores.sort(function(a, b) { return b.totalHp - a.totalHp; })[0];
          var youWon = winner ? winner.isYou : false;
          var flipped = youWon && zone.status === "contested";
          var koList = combatants.filter(function(c) { return !c.alive && c.guild !== player.guild; }).map(function(c) { return { name: c.name, guild: c.guild === -1 ? "Lone Wolf" : GUILDS[c.guild] ? GUILDS[c.guild].short : "???" }; });
          var breakdown = [];
          if (isDeployed) breakdown.push({ reason: "Survived combat cycle", pts: 3 });
          if (youWon) breakdown.push({ reason: "Guild controls zone", pts: 2 });
          if (flipped) breakdown.push({ reason: "\u{1F504} Zone flipped!", pts: 15 });
          if (koList.length > 0) breakdown.push({ reason: koList.length + " KO" + (koList.length > 1 ? "s" : ""), pts: koList.length * 10 });
          if (zone.objective) breakdown.push({ reason: "\u2B50 Objective x1.5", pts: Math.round(breakdown.reduce(function(s, b) { return s + b.pts; }, 0) * 0.5) });
          if (isHomeTurf) breakdown.push({ reason: "\u{1F3E0} Home Turf", pts: 2 });
          var total = breakdown.reduce(function(s, b) { return s + b.pts; }, 0);

          spawnDmg("+" + total + "pts", 120, 40, "crit");
          showNerm(youWon ? pick(NERM.winZone) : pick(NERM.loseZone), 3000);
          if (flipped) later(function() { showNerm(pick(NERM.flip), 3000); }, 1500);

          later(function() {
            setCycleResults({ guildScores: guildScores, kos: koList, winner: { name: winner ? winner.name : "Unknown", isYou: youWon }, flipped: flipped, yourPoints: { breakdown: breakdown, total: total } });
            setRunning(false); setCycleTime(900);
          }, 3000);
        }, effectEnd);
      }

      var mins = Math.floor(cycleTime / 60);
      var secs = cycleTime % 60;

      return (
        <div style={{ minHeight: "100vh", background: T.bg }}>
          {/* Zone header */}
          <div style={{ height: 70, position: "relative", overflow: "hidden", background: h.art }}>
            <div style={{ position: "absolute", inset: 0, background: h.accent }} />
            <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 40, background: "linear-gradient(transparent, #0a0812)" }} />
            <div style={{ position: "absolute", top: 8, left: 8, right: 8, display: "flex", alignItems: "center", gap: 8, zIndex: 2 }}>
              <button onClick={onBack} style={{ background: "rgba(0,0,0,0.5)", border: "none", color: T.bright, fontSize: 16, cursor: "pointer", padding: "4px 10px", borderRadius: 8 }}>{"\u2190"}</button>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ fontSize: 14 }}>{h.i}</span>
                  <span style={{ fontFamily: "'Cinzel',serif", fontSize: 13, fontWeight: 700, color: T.bright }}>{zone.name}</span>
                </div>
                <div style={{ fontFamily: "monospace", fontSize: 8, color: h.c }}>{h.n} {"\u00B7"} {Object.keys(guildGroups).length} guilds</div>
              </div>
              <div style={{ fontFamily: "'Press Start 2P',monospace", fontSize: 9, color: running ? T.red : T.mana, background: "rgba(0,0,0,0.5)", padding: "4px 8px", borderRadius: 6 }}>
                {running ? "\u2694\uFE0F LIVE" : mins + ":" + (secs < 10 ? "0" : "") + secs}
              </div>
            </div>
          </div>

          {/* Pills */}
          <div style={{ padding: "5px 12px", display: "flex", gap: 4, flexWrap: "wrap", borderBottom: "1px solid " + T.border }}>
            {zone.objective && <span style={{ fontSize: 7, fontFamily: "monospace", fontWeight: 700, background: T.gold + "15", color: T.gold, padding: "2px 7px", borderRadius: 4 }}>{"\u2B50"} x1.5</span>}
            {zone.status === "contested" && <span style={{ fontSize: 7, fontFamily: "monospace", fontWeight: 700, background: T.red + "12", color: T.red, padding: "2px 7px", borderRadius: 4 }}>{"\u2694\uFE0F"} CONTESTED</span>}
            {isHomeTurf && <span style={{ fontSize: 7, fontFamily: "monospace", fontWeight: 700, background: T.green + "12", color: T.green, padding: "2px 7px", borderRadius: 4 }}>{"\u{1F3E0}"} HOME TURF</span>}
          </div>

          {/* ═══ ARENA ═══ */}
          <div style={{ height: 260, position: "relative", overflow: "hidden", background: "radial-gradient(ellipse at 50% 90%, " + h.c + "08, transparent 50%)" }}>
            {flash && <div style={{ position: "absolute", inset: 0, background: flash, opacity: 0.12, zIndex: 150, animation: "flashOut 0.3s ease forwards", pointerEvents: "none" }} />}
            {phase && <PhaseBanner text={phase.text} color={phase.color} />}
            <div style={{ position: "absolute", bottom: 20, left: 0, right: 0, height: 1, background: "linear-gradient(90deg, transparent 5%, " + h.c + "15 50%, transparent 95%)" }} />

            {/* YOUR FORMATION */}
            {isDeployed && (
              <div style={{ position: "absolute", bottom: 25, left: "50%", transform: "translateX(-50%)", display: "flex", flexDirection: "column", alignItems: "center" }}>
                <div style={{ display: "flex", justifyContent: "center", marginBottom: -14, position: "relative", height: 50 }}>
                  {allyNines.slice(0, 4).map(function(a, i) {
                    var offsets = [{ x: -30, z: 3 }, { x: 24, z: 2 }, { x: -52, z: 1 }, { x: 46, z: 0 }];
                    var o = offsets[i];
                    return <div key={a.id} onMouseEnter={function() { setHoveredNine(a); }} onMouseLeave={function() { setHoveredNine(null); }} style={{ position: "absolute", left: o.x, zIndex: o.z, opacity: 0.65 - i * 0.1, transform: "scale(" + (0.6 - i * 0.05) + ")" }}><Nine house={a.house} size={55} showHp={true} hp={a.hp} dead={!a.alive} shake={shakeGroups[player.guild]} /></div>;
                  })}
                  {allyNines.length > 4 && <div style={{ position: "absolute", left: 60, top: 5, fontFamily: "'Press Start 2P',monospace", fontSize: 7, color: T.muted, background: "rgba(0,0,0,0.5)", borderRadius: 10, padding: "2px 6px" }}>+{allyNines.length - 4}</div>}
                </div>
                <Nine house={player.house} size={85} glow={true} shake={shakeGroups[player.guild]} pulse={pulseMe} label="Your Nine" subtitle={deployedCard ? deployedCard.name : null} showHp={true} hp={myHp} />
              </div>
            )}

            {/* ENEMY GUILDS */}
            {enemyGroups.map(function(group, gi) {
              var positions = [{ left: "6%", top: "12%" }, { right: "6%", top: "18%" }, { left: "12%", top: "52%" }, { right: "10%", top: "55%" }];
              var pos = positions[gi % 4];
              var guild = group.guild === -1 ? { name: "Lone Wolf", color: T.muted, short: "LW" } : GUILDS[group.guild];
              var alive = group.nines.filter(function(n) { return n.alive; });
              return (
                <div key={gi} style={Object.assign({ position: "absolute", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }, pos)}>
                  <div style={{ fontFamily: "monospace", fontSize: 7, fontWeight: 700, color: guild ? guild.color : T.muted, background: (guild ? guild.color : T.muted) + "15", padding: "1px 6px", borderRadius: 4, border: "1px solid " + (guild ? guild.color : T.muted) + "25" }}>{guild ? guild.short : "?"} {"\u00B7"} {alive.length}/{group.nines.length}</div>
                  <div style={{ display: "flex", position: "relative" }}>
                    {alive.slice(0, 3).map(function(n, i) {
                      return <div key={n.id} onMouseEnter={function() { setHoveredNine(n); }} onMouseLeave={function() { setHoveredNine(null); }} style={{ marginLeft: i > 0 ? -10 : 0, zIndex: 3 - i, transform: "scale(" + (1 - i * 0.1) + ")", opacity: 1 - i * 0.15 }}><Nine house={n.house} size={40} showHp={true} hp={n.hp} shake={shakeGroups[group.guild]} dead={!n.alive} /></div>;
                    })}
                    {alive.length > 3 && <div style={{ marginLeft: -6, width: 22, height: 22, borderRadius: "50%", background: "rgba(255,255,255,0.06)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Press Start 2P',monospace", fontSize: 6, color: T.muted, alignSelf: "center" }}>+{alive.length - 3}</div>}
                  </div>
                </div>
              );
            })}

            {dmgs.map(function(d) { return <Dmg key={d.id} value={d.value} x={d.x} y={d.y} type={d.type} />; })}

            {hoveredNine && !running && (
              <div style={{ position: "absolute", top: 5, left: "50%", transform: "translateX(-50%)", background: "rgba(10,8,18,0.95)", border: "1px solid " + (H[hoveredNine.house] ? H[hoveredNine.house].c : T.muted) + "30", borderRadius: 10, padding: "8px 14px", zIndex: 50, minWidth: 150 }}>
                <div style={{ fontFamily: "'Cinzel',serif", fontSize: 11, fontWeight: 700, color: T.bright }}>{hoveredNine.name}</div>
                <div style={{ fontFamily: "monospace", fontSize: 8, color: H[hoveredNine.house] ? H[hoveredNine.house].c : T.muted }}>{H[hoveredNine.house] ? H[hoveredNine.house].i : "?"} {H[hoveredNine.house] ? H[hoveredNine.house].n : ""}{hoveredNine.guild >= 0 ? " \u00B7 " + (GUILDS[hoveredNine.guild] ? GUILDS[hoveredNine.guild].name : "") : " \u00B7 Lone Wolf \u{1F43A}"}</div>
                <div style={{ fontFamily: "monospace", fontSize: 8, color: T.muted, marginTop: 2 }}>Card: <span style={{ color: T.bright }}>{hoveredNine.card}</span></div>
                {hoveredNine.isLoneWolf && <div style={{ fontFamily: "monospace", fontSize: 7, color: T.gold, marginTop: 2 }}>{"\u{1F43A}"} 1.5x ATK</div>}
              </div>
            )}
          </div>

          {/* NERM */}
          <NermBubble text={nerm} />

          {/* COMBAT BUTTON */}
          {isDeployed && !running && !cycleResults && (
            <div style={{ padding: "8px 12px" }}>
              <button onClick={runCombat} style={{ width: "100%", padding: 12, borderRadius: 10, border: "1px solid " + T.gold + "25", fontFamily: "'Cinzel',serif", fontSize: 13, fontWeight: 700, background: "linear-gradient(135deg, " + T.gold + "25, " + T.gold + "10)", color: T.gold, cursor: "pointer" }}>{"\u25B6"} WATCH COMBAT CYCLE</button>
            </div>
          )}

          {/* CARD AREA */}
          <div style={{ padding: "10px 12px 30px", background: "linear-gradient(transparent, rgba(0,0,0,0.2))" }}>
            {isDeployed ? (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <span style={{ fontFamily: "'Cinzel',serif", fontSize: 12, fontWeight: 700, color: T.gold }}>EQUIPPED</span>
                  <button onClick={function() { onWithdraw(zone.id); }} style={{ fontFamily: "monospace", fontSize: 8, color: T.red, background: T.red + "10", border: "1px solid " + T.red + "20", borderRadius: 6, padding: "4px 10px", cursor: "pointer" }}>{"\u2715"} Withdraw</button>
                </div>
                {deployedCard && (
                  <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                    <CardComp card={deployedCard} selected={true} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: "monospace", fontSize: 8, color: T.faint, marginBottom: 6 }}>COMBAT STATS</div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <SBlock l="ATK" base={ph.atk} bonus={deployedCard.atk + (turfBonus ? turfBonus.atk || 0 : 0)} c={STAT.ATK} />
                        <SBlock l="HP" base={ph.hp} bonus={deployedCard.hp + (turfBonus ? turfBonus.hp || 0 : 0)} c={STAT.HP} />
                        <SBlock l="SPD" base={ph.spd} bonus={deployedCard.spd + (turfBonus ? turfBonus.spd || 0 : 0)} c={STAT.SPD} />
                      </div>
                      {isHomeTurf && <div style={{ fontFamily: "monospace", fontSize: 7, color: T.green, marginTop: 6, background: T.green + "10", padding: "3px 8px", borderRadius: 6 }}>{"\u{1F3E0}"} {Object.keys(h.turf).map(function(k) { return "+" + h.turf[k] + " " + k.toUpperCase(); }).join(", ")}</div>}
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div>
                <div style={{ fontFamily: "'Cinzel',serif", fontSize: 13, fontWeight: 700, color: T.gold, marginBottom: 3 }}>CHOOSE YOUR WEAPON</div>
                <div style={{ fontFamily: "monospace", fontSize: 9, color: T.muted, marginBottom: 10 }}>Pick a card to deploy</div>
                <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 10 }}>
                  {cards.filter(function(c) { return !c.deployedTo && c.ch > 0; }).map(function(card) {
                    return <CardComp key={card.id} card={card} selected={selectedCard === card.id} onClick={function() { setSelectedCard(selectedCard === card.id ? null : card.id); }} />;
                  })}
                </div>
                {selectedCard && (function() {
                  var c = cards.find(function(x) { return x.id === selectedCard; });
                  if (!c) return null;
                  return (
                    <div>
                      <div style={{ background: "rgba(255,255,255,0.025)", borderRadius: 10, padding: "10px 12px", marginBottom: 8, border: "1px solid " + T.border }}>
                        <div style={{ fontFamily: "monospace", fontSize: 8, color: T.faint, marginBottom: 4 }}>COMBAT PREVIEW</div>
                        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                          <SBlock l="ATK" base={ph.atk} bonus={c.atk + (turfBonus ? turfBonus.atk || 0 : 0)} c={STAT.ATK} />
                          <SBlock l="HP" base={ph.hp} bonus={c.hp + (turfBonus ? turfBonus.hp || 0 : 0)} c={STAT.HP} />
                          <SBlock l="SPD" base={ph.spd} bonus={c.spd + (turfBonus ? turfBonus.spd || 0 : 0)} c={STAT.SPD} />
                        </div>
                      </div>
                      <button onClick={function() { onDeploy(zone.id, selectedCard); setSelectedCard(null); }} style={{ width: "100%", padding: 12, borderRadius: 10, border: "none", fontFamily: "'Cinzel',serif", fontSize: 13, fontWeight: 700, background: "linear-gradient(135deg, " + h.c + ", " + h.c + "88)", color: "#fff", boxShadow: "0 4px 20px " + h.c + "40", cursor: "pointer" }}>{"\u2694\uFE0F"} DEPLOY {"\u2014"} {c.cost} MANA</button>
                    </div>
                  );
                })()}
              </div>
            )}
          </div>

          <CycleSummary results={cycleResults} onClose={function() { setCycleResults(null); }} />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════
    function App() {
      const [view, setView] = useState("zones");
      const [selectedZone, setSelectedZone] = useState(null);
      const [player, setPlayer] = useState({ name: "Your Nine", house: "stormrage", guild: 0, mana: 5, maxMana: 10, points: 1130, deployedZones: [] });
      const [cards, setCards] = useState(CARDS.map(function(c) { return Object.assign({}, c, { deployedTo: null }); }));
      const [toast, setToast] = useState(null);
      var ph = H[player.house];

      function showToast(msg) { setToast(msg); setTimeout(function() { setToast(null); }, 2500); }
      function handleDeploy(zoneId, cardId) {
        var card = cards.find(function(c) { return c.id === cardId; });
        if (player.mana < card.cost) return showToast("Need " + card.cost + " mana!");
        setPlayer(function(p) { return Object.assign({}, p, { mana: p.mana - card.cost, deployedZones: p.deployedZones.concat([zoneId]) }); });
        setCards(function(cs) { return cs.map(function(c) { return c.id === cardId ? Object.assign({}, c, { deployedTo: zoneId }) : c; }); });
        showToast("\u2694\uFE0F " + card.name + " deployed!");
      }
      function handleWithdraw(zoneId) {
        setPlayer(function(p) { return Object.assign({}, p, { deployedZones: p.deployedZones.filter(function(z) { return z !== zoneId; }) }); });
        setCards(function(cs) { return cs.map(function(c) { return c.deployedTo === zoneId ? Object.assign({}, c, { deployedTo: null }) : c; }); });
        showToast("\u2190 Withdrawn.");
      }

      if (view === "battle" && selectedZone) {
        return <BattleView zone={selectedZone} player={player} cards={cards} onBack={function() { setView("zones"); setSelectedZone(null); }} onDeploy={handleDeploy} onWithdraw={handleWithdraw} />;
      }

      return (
        <div style={{ minHeight: "100vh", background: T.bg, color: T.body }}>
          {/* Header */}
          <div style={{ padding: "14px 16px", background: "radial-gradient(ellipse at 50% 0%, " + ph.c + "08, transparent 70%)", borderBottom: "1px solid " + T.border }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontFamily: "'Cinzel',serif", fontSize: 20, fontWeight: 800, color: T.gold, letterSpacing: 3 }}>NETHARA</div>
              <div style={{ fontFamily: "'Press Start 2P',monospace", fontSize: 8, color: T.gold }}>{player.points} pts</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <Nine house={player.house} size={60} glow={true} />
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'Cinzel',serif", fontSize: 12, fontWeight: 700, color: T.bright, marginBottom: 3 }}>{ph.i} {ph.n} {"\u00B7"} {ph.role}</div>
                <div style={{ display: "flex", gap: 6, marginBottom: 4 }}><Pip l="ATK" v={ph.atk} c={STAT.ATK} /><Pip l="HP" v={ph.hp} c={STAT.HP} /><Pip l="SPD" v={ph.spd} c={STAT.SPD} /></div>
                <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                  {Array.from({ length: 10 }, function(_, i) { return <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: i < player.mana ? "linear-gradient(180deg, " + T.mana + ", #0088aa)" : "rgba(255,255,255,0.05)", border: "1px solid " + (i < player.mana ? T.mana + "40" : "rgba(255,255,255,0.06)") }} />; })}
                  <span style={{ fontFamily: "monospace", fontSize: 7, color: T.faint, marginLeft: 3 }}>{player.mana}/{player.maxMana}</span>
                </div>
                <div style={{ fontFamily: "monospace", fontSize: 7, color: T.faint, marginTop: 3 }}>{"\u2694\uFE0F"} {player.deployedZones.length} deployed {"\u00B7"} {GUILDS[player.guild].name}</div>
              </div>
            </div>
          </div>

          {/* Zone Select */}
          <div style={{ padding: "12px 14px 80px" }}>
            <ZoneSelect zones={ZONES} playerHouse={player.house} playerDeployed={player.deployedZones} onSelect={function(z) { setSelectedZone(z); setView("battle"); }} />
          </div>

          {toast && <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: "rgba(10,8,18,0.95)", border: "1px solid " + T.gold + "40", borderRadius: 12, padding: "10px 20px", zIndex: 2000, fontFamily: "monospace", fontSize: 11, color: T.gold, boxShadow: "0 8px 32px rgba(0,0,0,0.6)", animation: "slideUp 0.3s ease", maxWidth: "90%", textAlign: "center" }}>{toast}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
