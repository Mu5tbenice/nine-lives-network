<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nethara Live — Nine Lives Network</title>
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link rel="stylesheet" href="/css/card-v4.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Press+Start+2P&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
  <style>
    :root {
      --bg: #0a0812;
      --bg-card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --gold: #D4A64B;
      --bright: #F0ECF8;
      --body: #CCC5DB;
      --muted: #847C98;
      --faint: #554E68;
      --green: #44cc88;
      --red: #ff4466;
      --blue: #5599ff;
      --cyan: #00D4FF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--body);
      font-family: 'Crimson Text', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ====== ZONE LIST VIEW ====== */
    #zone-list-view { max-width: 520px; margin: 0 auto; }

    .nl-header {
      padding: 16px 16px 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nl-title { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
    .nl-subtitle { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--faint); margin-top: 4px; }
    .nl-active-badge { display: flex; align-items: center; gap: 6px; }
    .nl-active-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    .nl-active-text { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--green); }

    /* Player bar */
    .nl-player-bar {
      padding: 0 16px 12px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .nl-stat-pill {
      display: flex; align-items: center; gap: 4px;
      font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--faint);
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 20px;
    }
    .nl-stat-pill .val { color: var(--cyan); }

    /* Tabs */
    .nl-tabs {
      display: flex; padding: 0 16px;
      border-bottom: 1px solid var(--border); margin-bottom: 14px;
    }
    .nl-tab {
      font-family: 'Press Start 2P', monospace; font-size: 9px;
      padding: 10px 12px; cursor: pointer; border: none; background: none;
      color: var(--faint); border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .nl-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .nl-tab:hover { color: var(--body); }

    /* Zone cards */
    .nl-zones { padding: 0 16px 80px; display: flex; flex-direction: column; gap: 12px; }

    .zone-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .zone-card:hover { transform: translateY(-1px); border-color: rgba(212,166,75,0.3); }

    .zone-event-banner {
      padding: 6px 14px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      font-family: 'Press Start 2P', monospace; font-size: 9px;
    }
    .zone-objective-banner {
      background: linear-gradient(90deg, rgba(212,166,75,0.15), transparent);
      padding: 6px 14px; display: flex; align-items: center; gap: 6px;
      border-bottom: 1px solid var(--border);
      font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--gold);
    }

    .zone-card-body { padding: 14px 16px; }
    .zone-name { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; color: var(--bright); margin-bottom: 2px; }
    .zone-region { font-family: 'Press Start 2P', monospace; font-size: 8px; opacity: 0.7; }
    .zone-badge {
      font-family: 'Press Start 2P', monospace; font-size: 8px;
      padding: 3px 8px; border-radius: 4px; font-weight: 700;
    }
    .zone-badge.contested { color: var(--red); background: rgba(255,68,102,0.1); }
    .zone-badge.held { color: var(--green); background: rgba(68,204,136,0.1); }

    /* Guild bars */
    .guild-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .guild-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .guild-name { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--body); width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .guild-track { flex: 1; height: 6px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; }
    .guild-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    .guild-pct { font-family: 'Press Start 2P', monospace; font-size: 8px; width: 32px; text-align: right; font-weight: 700; }

    /* Effect pills */
    .effect-pills { display: flex; gap: 4px; flex-wrap: wrap; }
    .effect-pill {
      font-family: 'Press Start 2P', monospace; font-size: 7px; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
    }
    .zone-casters { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--faint); }

    /* ====== ARENA VIEW ====== */
    #arena-view { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; background: var(--bg); }

    #arena-canvas { width: 100%; height: 100%; }

    /* Arena overlays */
    .arena-overlay { position: absolute; pointer-events: none; z-index: 10; }
    .arena-overlay.interactive { pointer-events: auto; }

    .arena-top-bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      padding: 12px 16px; display: flex; justify-content: space-between; align-items: flex-start;
      background: linear-gradient(180deg, rgba(10,8,18,0.9) 0%, transparent 100%);
      pointer-events: auto;
    }
    .arena-zone-name { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--bright); }
    .arena-zone-region { font-family: 'Press Start 2P', monospace; font-size: 8px; margin-top: 2px; }
    .arena-round-badge {
      font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--gold);
      background: rgba(212,166,75,0.12); padding: 6px 14px; border-radius: 8px;
      border: 1px solid rgba(212,166,75,0.25);
    }
    .arena-cycle-timer {
      font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--faint); margin-top: 4px; text-align: right;
    }

    /* Guild scoreboard */
    .arena-scoreboard {
      position: absolute; top: 70px; right: 12px; z-index: 20;
      background: rgba(10,8,18,0.85); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; min-width: 160px;
    }
    .arena-sb-title { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--faint); letter-spacing: 1px; margin-bottom: 8px; }
    .arena-sb-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .arena-sb-guild { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--body); flex: 1; }
    .arena-sb-wins { font-family: 'Press Start 2P', monospace; font-size: 10px; font-weight: 700; }

    /* Nerm chat bubble */
    .nerm-bubble-container {
      position: absolute; bottom: 120px; left: 12px; z-index: 25;
      max-width: 300px; pointer-events: none;
    }
    .nerm-bubble {
      background: rgba(10,8,18,0.9); border: 1px solid var(--gold);
      border-radius: 12px 12px 12px 0; padding: 10px 14px;
      font-family: 'Crimson Text', serif; font-size: 14px; color: var(--bright);
      font-style: italic; opacity: 0; transition: opacity 0.3s;
      box-shadow: 0 0 20px rgba(212,166,75,0.1);
    }
    .nerm-bubble.visible { opacity: 1; }
    .nerm-label {
      font-family: 'Press Start 2P', monospace; font-size: 7px;
      color: var(--gold); margin-bottom: 4px; letter-spacing: 1px;
    }

    /* Live feed ticker */
    .arena-feed {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      background: linear-gradient(0deg, rgba(10,8,18,0.95) 0%, transparent 100%);
      padding: 40px 12px 12px; pointer-events: auto;
    }
    .feed-event {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 4px 8px; margin-bottom: 3px;
      font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--body);
      opacity: 0; animation: feedIn 0.3s forwards;
    }
    .feed-event .feed-name { font-weight: 700; }
    .feed-event .feed-dmg { color: var(--red); }
    .feed-event .feed-heal { color: var(--green); }
    .feed-event .feed-effect { color: var(--gold); }
    .feed-event .feed-time { color: var(--faint); margin-left: auto; flex-shrink: 0; }

    /* Your Nine panel */
    .arena-your-nine {
      position: absolute; bottom: 70px; right: 12px; z-index: 20;
      background: rgba(10,8,18,0.9); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; min-width: 180px;
      pointer-events: auto;
    }
    .your-nine-title { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--gold); letter-spacing: 1px; margin-bottom: 6px; }
    .your-nine-hp { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .your-nine-hp-bar { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
    .your-nine-hp-fill { height: 100%; background: linear-gradient(90deg, var(--green), #66eebb); border-radius: 4px; transition: width 0.3s; }
    .your-nine-hp-text { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--green); }
    .your-nine-stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .your-nine-stat { font-family: 'Press Start 2P', monospace; font-size: 7px; }

    /* Deploy / Join Battle CTA */
    .arena-deploy-cta {
      position: absolute; bottom: 70px; right: 12px; z-index: 20;
      pointer-events: auto;
    }
    .btn-join-battle {
      font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700;
      padding: 14px 28px; border: none; border-radius: 10px; cursor: pointer;
      background: linear-gradient(135deg, var(--gold), #b8872e);
      color: #fff; letter-spacing: 2px;
      box-shadow: 0 4px 20px rgba(212,166,75,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-join-battle:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(212,166,75,0.4); }

    /* Back button */
    .arena-back {
      position: absolute; top: 12px; left: 12px; z-index: 30;
      background: rgba(10,8,18,0.7); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; cursor: pointer;
      font-family: 'Cinzel', serif; font-size: 16px; color: var(--muted);
      transition: color 0.2s;
    }
    .arena-back:hover { color: var(--bright); }

    /* Round banner */
    .round-banner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 50; pointer-events: none; text-align: center;
      opacity: 0; animation: bannerPop 2s forwards;
    }
    .round-banner-text {
      font-family: 'Cinzel', serif; font-size: 32px; font-weight: 800; color: var(--gold);
      text-shadow: 0 0 40px rgba(212,166,75,0.5), 0 4px 8px rgba(0,0,0,0.8);
      letter-spacing: 6px;
    }
    .round-banner-sub {
      font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--bright);
      margin-top: 8px; opacity: 0.8;
    }

    /* Deploy modal */
    .deploy-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 100; background: rgba(10,8,18,0.95);
      overflow-y: auto;
    }
    .deploy-modal.open { display: block; }
    .deploy-inner {
      max-width: 500px; margin: 40px auto; padding: 20px;
    }
    .deploy-title { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 16px; }
    .deploy-stats-preview {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; margin-bottom: 16px;
    }
    .deploy-stat-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .deploy-stat {
      font-family: 'Press Start 2P', monospace; font-size: 9px;
      display: flex; align-items: center; gap: 4px;
    }
    .deploy-cards-title { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--faint); letter-spacing: 1px; margin-bottom: 10px; }
    .deploy-card-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px; margin-bottom: 16px; max-height: 400px; overflow-y: auto;
    }
    .deploy-card-slot {
      background: var(--bg-card); border: 2px solid var(--border);
      border-radius: 10px; padding: 10px; cursor: pointer;
      transition: all 0.15s;
    }
    .deploy-card-slot:hover { border-color: rgba(212,166,75,0.3); }
    .deploy-card-slot.selected { border-color: var(--gold); background: rgba(212,166,75,0.08); }
    .deploy-card-slot.deployed-elsewhere { opacity: 0.3; pointer-events: none; }
    .deploy-card-name { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700; color: var(--bright); }
    .deploy-card-type { font-family: 'Press Start 2P', monospace; font-size: 7px; margin-top: 2px; }
    .deploy-card-sharpness { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--cyan); margin-top: 4px; }
    .deploy-card-effects { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--gold); margin-top: 4px; }

    .btn-deploy {
      width: 100%; font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700;
      padding: 16px; border: none; border-radius: 10px; cursor: pointer;
      background: linear-gradient(135deg, var(--gold), #b8872e);
      color: #fff; letter-spacing: 2px;
      box-shadow: 0 4px 20px rgba(212,166,75,0.3);
      transition: all 0.15s;
    }
    .btn-deploy:hover { transform: translateY(-2px); }
    .btn-deploy:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .btn-cancel {
      width: 100%; margin-top: 8px; font-family: 'Press Start 2P', monospace; font-size: 9px;
      padding: 12px; border: 1px solid var(--border); border-radius: 10px;
      cursor: pointer; background: none; color: var(--muted);
    }

    /* Loading state */
    .loading-text { text-align: center; padding: 60px 20px; font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--faint); }

    /* Animations */
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes feedIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 0.8; transform: none; } }
    @keyframes bannerPop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      40% { transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ====== ZONE LIST VIEW ====== -->
<div id="zone-list-view">
  <div class="nl-header">
    <div>
      <div class="nl-title">NETHARA</div>
      <div class="nl-subtitle" id="season-info">SEASON 1 · DAY --</div>
    </div>
    <div class="nl-active-badge">
      <div class="nl-active-dot"></div>
      <div class="nl-active-text" id="active-count">-- Active</div>
    </div>
  </div>

  <div class="nl-player-bar" id="player-bar">
    <div class="nl-stat-pill">LVL <span class="val" id="player-level">--</span></div>
    <div class="nl-stat-pill">🎫 <span class="val" id="player-tickets">--</span></div>
    <div class="nl-stat-pill">⚔️ <span class="val" id="player-zones">--</span> zones</div>
  </div>

  <div class="nl-tabs">
    <button class="nl-tab active" data-tab="hot">🔥 Hot Zones</button>
    <button class="nl-tab" data-tab="events">⚡ Events</button>
    <button class="nl-tab" data-tab="regions">🗺️ Regions</button>
    <button class="nl-tab" data-tab="guild">👥 Guild</button>
  </div>

  <div class="nl-zones" id="zone-container">
    <div class="loading-text">Loading zones...</div>
  </div>
</div>

<!-- ====== ARENA VIEW ====== -->
<div id="arena-view">
  <div id="arena-canvas"></div>

  <button class="arena-back interactive" id="btn-back">← Back</button>

  <div class="arena-top-bar">
    <div>
      <div class="arena-zone-name" id="arena-zone-name">--</div>
      <div class="arena-zone-region" id="arena-zone-region">--</div>
    </div>
    <div style="text-align: right;">
      <div class="arena-round-badge" id="arena-round-badge">ROUND 1</div>
      <div class="arena-cycle-timer" id="arena-cycle-timer">Cycle 1 · 5:00</div>
    </div>
  </div>

  <div class="arena-scoreboard" id="arena-scoreboard">
    <div class="arena-sb-title">GUILD SCORES</div>
    <div id="scoreboard-rows"></div>
  </div>

  <div class="nerm-bubble-container">
    <div class="nerm-bubble" id="nerm-bubble">
      <div class="nerm-label">🐱 NERM</div>
      <div id="nerm-text"></div>
    </div>
  </div>

  <div class="arena-feed" id="arena-feed">
    <!-- Live event feed populated by JS -->
  </div>

  <!-- Shown if player is NOT deployed here -->
  <div class="arena-deploy-cta" id="deploy-cta" style="display:none;">
    <button class="btn-join-battle" id="btn-join-battle">⚔️ JOIN BATTLE</button>
  </div>

  <!-- Shown if player IS deployed here -->
  <div class="arena-your-nine" id="your-nine-panel" style="display:none;">
    <div class="your-nine-title">YOUR NINE</div>
    <div class="your-nine-hp">
      <div class="your-nine-hp-bar"><div class="your-nine-hp-fill" id="your-hp-fill" style="width:100%"></div></div>
      <div class="your-nine-hp-text" id="your-hp-text">--/--</div>
    </div>
    <div class="your-nine-stats" id="your-nine-stats"></div>
    <button style="margin-top:8px; font-family:'Press Start 2P',monospace; font-size:7px; padding:6px 10px; background:rgba(255,68,102,0.1); border:1px solid rgba(255,68,102,0.3); color:var(--red); border-radius:6px; cursor:pointer;" id="btn-withdraw">WITHDRAW</button>
  </div>

  <!-- Round announcement banner (animated) -->
  <div class="round-banner" id="round-banner" style="display:none;">
    <div class="round-banner-text" id="round-banner-text">ROUND 1</div>
    <div class="round-banner-sub" id="round-banner-sub">FIGHT!</div>
  </div>
</div>

<!-- ====== DEPLOY MODAL ====== -->
<div class="deploy-modal" id="deploy-modal">
  <div class="deploy-inner">
    <div class="deploy-title">⚔️ Deploy to <span id="deploy-zone-name"></span></div>

    <div class="deploy-stats-preview">
      <div style="font-family:'Press Start 2P',monospace; font-size:7px; color:var(--faint); letter-spacing:1px; margin-bottom:8px;">COMBAT STATS PREVIEW</div>
      <div class="deploy-stat-row" id="deploy-stats-row">
        <div class="deploy-stat"><span style="color:#e85a6a">ATK</span> <span id="deploy-atk">--</span></div>
        <div class="deploy-stat"><span style="color:#6acd8a">HP</span> <span id="deploy-hp">--</span></div>
        <div class="deploy-stat"><span style="color:#6ac8d8">SPD</span> <span id="deploy-spd">--</span></div>
        <div class="deploy-stat"><span style="color:#b088e8">DEF</span> <span id="deploy-def">--</span></div>
        <div class="deploy-stat"><span style="color:#D4A64B">LUCK</span> <span id="deploy-luck">--</span></div>
      </div>
    </div>

    <div class="deploy-cards-title">SELECT 3 CARDS (<span id="deploy-selected-count">0</span>/3)</div>
    <div class="deploy-card-grid" id="deploy-card-grid">
      <div class="loading-text">Loading cards...</div>
    </div>

    <button class="btn-deploy" id="btn-confirm-deploy" disabled>DEPLOY — SELECT 3 CARDS</button>
    <button class="btn-cancel" id="btn-cancel-deploy">CANCEL</button>
  </div>
</div>

<!-- ====== MAIN SCRIPT ====== -->
<script>
(function() {
  'use strict';

  // ===== STATE =====
  const state = {
    playerId: null,
    playerHouse: null,
    playerLevel: 1,
    zones: [],
    currentTab: 'hot',
    currentZoneId: null,
    currentZone: null,
    socket: null,
    arenaApp: null, // PixiJS app
    nines: new Map(), // id → pixi sprite data
    selectedCards: [],
    playerCards: [],
    isDeployed: false,
    feedEvents: [],
    guildScores: {},
    roundWins: {},
  };

  // ===== HOUSE DATA =====
  const HOUSES = {
    smoulders:   { color: '#E03C31', name: 'Smoulders', icon: '🔥' },
    darktide:    { color: '#00B4D8', name: 'Darktide', icon: '🌊' },
    stonebark:   { color: '#5CB338', name: 'Stonebark', icon: '🌿' },
    ashenvale:   { color: '#90E0EF', name: 'Ashenvale', icon: '💨' },
    stormrage:   { color: '#FFC800', name: 'Stormrage', icon: '⚡' },
    nighthollow: { color: '#7B2D8E', name: 'Nighthollow', icon: '🌙' },
    dawnbringer: { color: '#FF8C00', name: 'Dawnbringer', icon: '☀️' },
    manastorm:   { color: '#5B8FE0', name: 'Manastorm', icon: '🔮' },
    plaguemire:  { color: '#E84393', name: 'Plaguemire', icon: '☠️' },
  };

  const EFFECT_COLORS = {
    BURN: '#ffaa55', WARD: '#D4A64B', POISON: '#aaee55', ANCHOR: '#ccaa66',
    HEX: '#bb88ff', HEAL: '#66eebb', SILENCE: '#bb88ff', CHAIN: '#5599ff',
    CRIT: '#ffd700', BARRIER: '#5599ff', THORNS: '#ff6666', DODGE: '#90E0EF',
  };

  // Map school_id numbers to house keys (DB uses numbers, UI uses strings)
  const SCHOOL_TO_HOUSE = {
    1: 'smoulders', 2: 'darktide', 3: 'stonebark', 4: 'ashenvale',
    5: 'stormrage', 6: 'nighthollow', 7: 'dawnbringer', 8: 'manastorm', 9: 'plaguemire'
  };

  const TYPE_COLORS = {
    attack: '#ff5555', defend: '#55aaff', support: '#55ff99', manipulation: '#cc77ff', utility: '#ffcc55'
  };

  // ===== INIT =====
  async function init() {
    // Get player from localStorage (matches dashboard save keys)
    const stored = localStorage.getItem('9lv_player');
    const rawId = localStorage.getItem('player_id');
    if (stored) {
      try {
        const p = JSON.parse(stored);
        state.playerId = p.id || p.player_id;
        state.playerHouse = p.school_id;
        state.playerLevel = p.level || 1;
        console.log('🐱 Arena: logged in as player', state.playerId);
      } catch(e) {
        if (rawId) {
          state.playerId = parseInt(rawId);
          console.log('🐱 Arena: logged in via player_id fallback', state.playerId);
        }
      }
    } else if (rawId) {
      state.playerId = parseInt(rawId);
      console.log('🐱 Arena: logged in via player_id only', state.playerId);
    } else {
      console.log('🐱 Arena: not logged in — guest mode');
    }

    setupTabs();
    await loadZones();
    updatePlayerBar();
  }

  // ===== TABS =====
  function setupTabs() {
    document.querySelectorAll('.nl-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.nl-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        state.currentTab = tab.dataset.tab;
        renderZoneList();
      });
    });
  }

  // ===== LOAD ZONES =====
  async function loadZones() {
    try {
      const res = await fetch('/api/zones');
      if (!res.ok) throw new Error('Failed to load zones');
      const data = await res.json();
      state.zones = data.zones || data || [];

      renderZoneList();
      updateActiveCount();
    } catch(e) {
      document.getElementById('zone-container').innerHTML = '<div class="loading-text">Failed to load zones. Retrying...</div>';
      setTimeout(loadZones, 3000);
    }
  }

  // ===== RENDER ZONE LIST =====
  function renderZoneList() {
    const container = document.getElementById('zone-container');
    let zones = [...state.zones];

    // Filter by tab
    if (state.currentTab === 'events') {
      zones = zones.filter(function(z) { return z.event || z.is_current_objective || z.daily_objective; });
    } else if (state.currentTab === 'hot') {
      zones.sort(function(a, b) {
        const aObj = a.daily_objective || a.is_current_objective;
        const bObj = b.daily_objective || b.is_current_objective;
        if (aObj && !bObj) return -1;
        if (bObj && !aObj) return 1;
        if (a.event && !b.event) return -1;
        if (b.event && !a.event) return 1;
        return (b.arena_nines || b.casters || 0) - (a.arena_nines || a.casters || 0);
      });
    }

    if (state.currentTab === 'regions') {
      renderRegionsTab(container);
      return;
    }
    if (state.currentTab === 'guild') {
      renderGuildTab(container);
      return;
    }

    if (zones.length === 0) {
      container.innerHTML = '<div class="loading-text">No zones to show.</div>';
      return;
    }

    container.innerHTML = zones.map(zone => buildZoneCard(zone)).join('');

    // Attach click handlers
    container.querySelectorAll('.zone-card').forEach(card => {
      card.addEventListener('click', () => {
        const zoneId = parseInt(card.dataset.zoneId);
        const zone = state.zones.find(z => z.id === zoneId);
        if (zone) openArena(zone);
      });
    });
  }

  function buildZoneCard(zone) {
    // Map controlling_school_id or school_id to a house
    const houseKey = zone.house
      || zone.region_house
      || SCHOOL_TO_HOUSE[zone.controlling_school_id]
      || SCHOOL_TO_HOUSE[zone.school_id]
      || null;
    const h = (houseKey && HOUSES[houseKey]) || { color: '#666', name: 'Unclaimed', icon: '⚔️' };

    const regionName = zone.region || zone.region_name || zone.description || '';
    const guilds = zone.guilds || zone.guild_presence || [];
    const casters = zone.arena_nines || zone.casters || zone.deployment_count || 0;
    const effects = zone.active_effects || zone.effects || [];
    const isObjective = zone.daily_objective || zone.is_current_objective || false;
    const contested = zone.contested || (guilds.length > 1 && guilds[0] && guilds[1] && guilds[0].pct - guilds[1].pct < 15);

    let bannerHTML = '';
    if (isObjective) {
      bannerHTML += '<div class="zone-objective-banner">⭐ DAILY OBJECTIVE — ×1.5 POINTS</div>';
    }
    if (zone.event) {
      bannerHTML += '<div class="zone-event-banner" style="background:linear-gradient(90deg,' + h.color + '20,transparent);">'
        + '<span style="color:' + h.color + '">' + (zone.event.icon || '⚡') + ' ' + ((zone.event.type || zone.event.name || '').toUpperCase()) + '</span>'
        + '<span style="color:var(--gold)">' + (zone.event.time || zone.event.duration || '') + '</span>'
        + '</div>';
    }

    let guildsHTML = guilds.slice(0, 3).map(function(g) {
      const gColor = g.color || '#888';
      return '<div class="guild-bar-row">'
        + '<div class="guild-dot" style="background:' + gColor + '"></div>'
        + '<div class="guild-name">' + (g.name || g.guild_name || '???') + '</div>'
        + '<div class="guild-track"><div class="guild-fill" style="width:' + (g.pct || g.control || 0) + '%;background:linear-gradient(90deg,' + gColor + '90,' + gColor + '40)"></div></div>'
        + '<div class="guild-pct" style="color:' + gColor + '">' + (g.pct || g.control || 0) + '%</div>'
        + '</div>';
    }).join('');

    if (guilds.length === 0) {
      if (zone.controlling_school_id && SCHOOL_TO_HOUSE[zone.controlling_school_id]) {
        const controlHouse = HOUSES[SCHOOL_TO_HOUSE[zone.controlling_school_id]];
        if (controlHouse) {
          guildsHTML = '<div style="font-family:\'Press Start 2P\',monospace;font-size:8px;color:' + controlHouse.color + ';opacity:0.7;padding:2px 0;">'
            + controlHouse.icon + ' Held by ' + controlHouse.name + '</div>';
        }
      } else {
        guildsHTML = '<div style="font-family:\'Press Start 2P\',monospace;font-size:8px;color:var(--faint);padding:2px 0;">⚔️ Unclaimed — deploy to capture!</div>';
      }
    }

    let effectsHTML = effects.map(function(e) {
      const eName = typeof e === 'string' ? e : (e.name || e);
      const eColor = EFFECT_COLORS[eName] || '#888';
      return '<span class="effect-pill" style="background:' + eColor + '15;color:' + eColor + ';border:1px solid ' + eColor + '30">' + eName + '</span>';
    }).join('');

    let badgeHTML = '';
    if (contested) {
      badgeHTML = '<span class="zone-badge contested">CONTESTED</span>';
    } else if (zone.held_days || zone.streak) {
      badgeHTML = '<span class="zone-badge held">HELD ' + (zone.held_days || zone.streak) + 'd</span>';
    } else if (zone.controlling_school_id) {
      badgeHTML = '<span class="zone-badge held">HELD</span>';
    }

    let narrativeHTML = '';
    if (zone.narrative_title) {
      narrativeHTML = '<div style="padding:4px 14px;font-family:\'Crimson Text\',serif;font-size:11px;color:var(--gold);font-style:italic;border-bottom:1px solid var(--border);opacity:0.8;">"' + zone.narrative_title + '"</div>';
    }

    return '<div class="zone-card" data-zone-id="' + zone.id + '">'
      + bannerHTML
      + narrativeHTML
      + '<div class="zone-card-body">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">'
          + '<div>'
            + '<div class="zone-name">' + zone.name + '</div>'
            + '<div class="zone-region" style="color:' + h.color + '">' + h.icon + ' ' + regionName + '</div>'
          + '</div>'
          + '<div>' + badgeHTML + '</div>'
        + '</div>'
        + '<div style="margin-bottom:10px">' + guildsHTML + '</div>'
        + '<div style="display:flex;justify-content:space-between;align-items:center;">'
          + '<div class="effect-pills">' + effectsHTML + '</div>'
          + '<div class="zone-casters">' + (casters > 0 ? casters + ' fighting' : 'No fighters yet') + '</div>'
        + '</div>'
      + '</div>'
    + '</div>';
  }

  function renderRegionsTab(container) {
    const regions = {};
    for (const z of state.zones) {
      const rName = z.region || z.region_name || z.description || 'Unknown';
      if (!regions[rName]) {
        const hKey = SCHOOL_TO_HOUSE[z.controlling_school_id] || SCHOOL_TO_HOUSE[z.school_id] || null;
        regions[rName] = { name: rName, house: hKey, zones: [] };
      }
      regions[rName].zones.push(z);
    }

    container.innerHTML = Object.values(regions).map(function(r) {
      const h = (r.house && HOUSES[r.house]) || { color: '#666', name: 'Unclaimed', icon: '⚔️' };
      return '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;border-left:3px solid ' + h.color + ';">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;">'
          + '<div>'
            + '<div style="font-family:\'Cinzel\',serif;font-size:14px;font-weight:700;color:var(--bright)">' + h.icon + ' ' + r.name + '</div>'
            + '<div style="font-family:\'Press Start 2P\',monospace;font-size:8px;color:var(--muted);margin-top:2px">' + r.zones.length + ' zones</div>'
          + '</div>'
          + '<div style="font-family:\'Press Start 2P\',monospace;font-size:8px;color:' + h.color + ';background:' + h.color + '15;padding:4px 10px;border-radius:6px">' + h.name + '</div>'
        + '</div>'
      + '</div>';
    }).join('');
  }

  function renderGuildTab(container) {
    container.innerHTML = '<div class="loading-text">Guild view coming soon</div>';
    // TODO: fetch guild data and render
  }

  function updateActiveCount() {
    const active = state.zones.filter(function(z) {
      return z.arena_active || z.contested || z.event || z.is_current_objective || z.controlling_school_id;
    }).length;
    document.getElementById('active-count').textContent = active + ' Active';
  }

  function updatePlayerBar() {
    document.getElementById('player-level').textContent = state.playerLevel || '--';
    // TODO: fetch real ticket count and zone count
  }

  // ===== ARENA VIEW =====
  function openArena(zone) {
    state.currentZone = zone;
    state.currentZoneId = zone.id;
    state.feedEvents = [];
    state.guildScores = {};
    state.roundWins = {};
    state._guildAngles = {};
    state._guildCounts = {};

    // Update UI
    document.getElementById('zone-list-view').style.display = 'none';
    document.getElementById('arena-view').style.display = 'block';
    document.getElementById('arena-zone-name').textContent = zone.name;
    const h = HOUSES[zone.house || zone.region_house || SCHOOL_TO_HOUSE[zone.controlling_school_id] || SCHOOL_TO_HOUSE[zone.school_id]] || { color: '#888', icon: '❓' };
    document.getElementById('arena-zone-region').style.color = h.color;
    document.getElementById('arena-zone-region').textContent = `${h.icon} ${zone.region || zone.region_name || zone.description || ''}`;

    // Init PixiJS
    initPixiArena();

    // Connect Socket.io — this is the ONLY source of Nines
    connectArenaSocket(zone.id);

    // Also load from REST for immediate display (socket may take a moment)
    loadZoneNines(zone.id);

    // Check if THIS player is deployed here
    checkDeployment(zone.id);
  }

  /** Fetch deployed Nines from REST API for immediate display */
  async function loadZoneNines(zoneId) {
    try {
      const res = await fetch(`/api/zones/${zoneId}/deployments`);
      const data = await res.json();
      const deployments = data.deployments || [];

      if (deployments.length === 0) {
        addFeedEvent('No Nines deployed on this zone yet.', 'system');
        return;
      }

      // Build guild scores
      if (data.guild_power) {
        state.guildScores = {};
        for (const [tag, info] of Object.entries(data.guild_power)) {
          state.guildScores[tag] = info.total_hp;
        }
        updateScoreboard();
      }

      addFeedEvent(`${deployments.length} Nines on this zone`, 'system');

      // Add sprites (skip if socket already added them)
      for (const d of deployments) {
        if (state.nines.has(d.player_id)) continue; // already loaded by socket
        const nine = d.nine || {};
        const player = d.player || {};
        const houseName = getHouseNameById(nine.house_id);

        addNineSprite({
          id: d.player_id,
          name: nine.name || player.twitter_handle || 'Unknown',
          house: houseName,
          guild_id: d.guild_tag,
          guild_name: d.guild_tag || 'Lone Wolf',
          current_hp: d.current_hp,
          max_hp: d.max_hp,
          position: getSpawnPosition(d.guild_tag, d.player_id),
          stats: { atk: nine.base_atk || 0, hp: nine.base_hp || 0, spd: nine.base_spd || 0 },
          is_mercenary: d.is_mercenary,
          equipped_images: nine.equipped_images || {},
        });
      }
    } catch(e) {
      console.error('Failed to load zone nines:', e);
    }
  }

  /** Map house_id to house key name */
  function getHouseNameById(houseId) {
    const houseMap = { 1:'smoulders', 2:'darktide', 3:'stonebark', 4:'ashenvale', 5:'stormrage', 6:'nighthollow', 7:'dawnbringer', 8:'manastorm', 9:'plaguemire' };
    return houseMap[houseId] || 'smoulders';
  }

  /** Get spawn position — cluster by guild, clamped to arena diamond */
  function getSpawnPosition(guildTag, playerId) {
    if (!state._guildAngles) state._guildAngles = {};
    if (!state._guildCounts) state._guildCounts = {};

    const tag = guildTag || String(playerId);
    if (!state._guildAngles[tag]) {
      const idx = Object.keys(state._guildAngles).length;
      state._guildAngles[tag] = (idx / 8) * Math.PI * 2 - Math.PI / 2;
      state._guildCounts[tag] = 0;
    }
    state._guildCounts[tag]++;

    const cx = (state.arenaApp ? state.arenaApp.screen.width : window.innerWidth) / 2;
    const cy = (state.arenaApp ? state.arenaApp.screen.height : window.innerHeight) / 2;
    const angle = state._guildAngles[tag];
    const radius = Math.min(cx, cy) * 0.4; // 40% of half-screen
    const spread = state._guildCounts[tag] * 22;

    const x = cx + Math.cos(angle) * radius + (Math.random() - 0.5) * spread;
    const y = cy + Math.sin(angle) * radius * 0.6 + (Math.random() - 0.5) * spread; // flatten for isometric

    // Clamp to safe area (keep 60px from edges)
    const margin = 60;
    const maxW = (state.arenaApp ? state.arenaApp.screen.width : window.innerWidth) - margin;
    const maxH = (state.arenaApp ? state.arenaApp.screen.height : window.innerHeight) - margin;

    return {
      x: Math.max(margin, Math.min(maxW, x)),
      y: Math.max(margin, Math.min(maxH, y)),
    };
  }

  /** Convert engine position (centered at 400,300) to screen position */
  function engineToScreen(pos) {
    if (!pos) return getSpawnPosition('unknown', Math.random());
    const cx = (state.arenaApp ? state.arenaApp.screen.width : window.innerWidth) / 2;
    const cy = (state.arenaApp ? state.arenaApp.screen.height : window.innerHeight) / 2;
    // Engine uses 400,300 as center — scale to screen
    const scaleX = cx / 400;
    const scaleY = cy / 300;
    const margin = 60;
    const maxW = (state.arenaApp ? state.arenaApp.screen.width : window.innerWidth) - margin;
    const maxH = (state.arenaApp ? state.arenaApp.screen.height : window.innerHeight) - margin;
    return {
      x: Math.max(margin, Math.min(maxW, pos.x * scaleX)),
      y: Math.max(margin, Math.min(maxH, pos.y * scaleY)),
    };
  }

  function closeArena() {
    document.getElementById('arena-view').style.display = 'none';
    document.getElementById('zone-list-view').style.display = 'block';

    // Cleanup
    if (state.socket) {
      state.socket.emit('leave_zone', { zoneId: state.currentZoneId });
      state.socket.disconnect();
      state.socket = null;
    }
    if (state.arenaApp) {
      state.arenaApp.destroy(true);
      state.arenaApp = null;
    }
    state.nines.clear();
    state._guildAngles = {};
    state._guildCounts = {};
    state.currentZoneId = null;
    state.currentZone = null;

    // Refresh zone data
    loadZones();
  }

  // ===== PIXI ARENA =====
  function initPixiArena() {
    const container = document.getElementById('arena-canvas');
    container.innerHTML = '';

    const app = new PIXI.Application({
      width: window.innerWidth,
      height: window.innerHeight,
      backgroundColor: 0x0a0812,
      antialias: true,
      resolution: window.devicePixelRatio || 1,
      autoDensity: true,
    });

    container.appendChild(app.view);
    app.view.style.width = '100%';
    app.view.style.height = '100%';
    state.arenaApp = app;

    // Draw arena ground
    drawArenaGround(app);

    // Handle resize
    window.addEventListener('resize', () => {
      if (state.arenaApp) {
        state.arenaApp.renderer.resize(window.innerWidth, window.innerHeight);
        drawArenaGround(state.arenaApp);
      }
    });

    // ── IDLE ANIMATION TICKER ──
    // Gentle bobbing so Nines look alive
    app.ticker.add((delta) => {
      const time = performance.now() / 1000;
      state.nines.forEach((nine) => {
        if (nine.isAnimating) return; // don't interfere with attack/ko anims
        const bob = Math.sin(time * 1.5 + nine.bobPhase) * 2;
        nine.spriteGroup.y = bob;
        // Subtle scale pulse
        const pulse = 1 + Math.sin(time * 2 + nine.bobPhase) * 0.015;
        nine.spriteGroup.scale.set(pulse, pulse);
      });
    });
  }

  function drawArenaGround(app) {
    // Remove old ground
    const existing = app.stage.getChildByName('ground');
    if (existing) app.stage.removeChild(existing);

    const ground = new PIXI.Graphics();
    ground.name = 'ground';
    const cx = app.screen.width / 2;
    const cy = app.screen.height / 2;

    // Isometric diamond arena floor
    const h = HOUSES[state.currentZone?.house || state.currentZone?.region_house || SCHOOL_TO_HOUSE[state.currentZone?.controlling_school_id] || SCHOOL_TO_HOUSE[state.currentZone?.school_id]] || { color: '#444' };
    const hColor = parseInt(h.color.replace('#', ''), 16);

    ground.beginFill(0x12101e);
    ground.moveTo(cx, cy - 250);
    ground.lineTo(cx + 400, cy);
    ground.lineTo(cx, cy + 250);
    ground.lineTo(cx - 400, cy);
    ground.closePath();
    ground.endFill();

    // Subtle grid lines
    ground.lineStyle(1, hColor, 0.06);
    for (let i = -6; i <= 6; i++) {
      ground.moveTo(cx + i * 60, cy - 250 + Math.abs(i) * 40);
      ground.lineTo(cx + i * 60, cy + 250 - Math.abs(i) * 40);
    }

    // Border glow
    ground.lineStyle(2, hColor, 0.15);
    ground.moveTo(cx, cy - 250);
    ground.lineTo(cx + 400, cy);
    ground.lineTo(cx, cy + 250);
    ground.lineTo(cx - 400, cy);
    ground.closePath();

    app.stage.addChildAt(ground, 0);
  }

  // ===== NINE SPRITES — LAYERED ITEM RENDERING =====
  // Layer order matches builder: fur → outfit → weapon → expression → headwear → familiar
  const ITEM_LAYER_ORDER = ['fur', 'outfit', 'weapon', 'expression', 'headwear', 'familiar'];
  const SPRITE_SIZE = 48; // px — adjust if too big/small on arena

  function addNineSprite(nine) {
    if (!state.arenaApp) return;
    const app = state.arenaApp;

    const container = new PIXI.Container();
    container.x = nine.position.x;
    container.y = nine.position.y;
    container.sortableChildren = true;

    const h = HOUSES[nine.house] || { color: '#888' };
    const hColor = parseInt(h.color.replace('#', ''), 16);

    // House-colored ground ring
    const ring = new PIXI.Graphics();
    ring.lineStyle(2, hColor, 0.6);
    ring.drawEllipse(0, 18, 14, 6);
    ring.zIndex = 0;
    container.addChild(ring);

    // Soft house glow behind sprite
    const glow = new PIXI.Graphics();
    glow.beginFill(hColor, 0.06);
    glow.drawCircle(0, 0, 22);
    glow.endFill();
    glow.zIndex = 0;
    container.addChild(glow);

    // Sprite container for item layers (or fallback)
    const spriteGroup = new PIXI.Container();
    spriteGroup.sortableChildren = true;
    spriteGroup.zIndex = 1;

    // Try to load equipped item images as layers
    const images = nine.equipped_images || {};
    let hasAnyImage = false;

    ITEM_LAYER_ORDER.forEach(function(slot, index) {
      const imgPath = images[slot];
      if (!imgPath) return;
      hasAnyImage = true;

      try {
        const texture = PIXI.Texture.from(imgPath);
        const sprite = new PIXI.Sprite(texture);
        sprite.anchor.set(0.5, 0.6);
        sprite.width = SPRITE_SIZE;
        sprite.height = SPRITE_SIZE;
        sprite.zIndex = index + 1;
        spriteGroup.addChild(sprite);

        // Remove layer if image fails to load
        if (texture.baseTexture) {
          texture.baseTexture.on('error', function() {
            if (spriteGroup.children.includes(sprite)) {
              spriteGroup.removeChild(sprite);
            }
          });
        }
      } catch(e) {
        console.warn('Failed to load sprite layer:', slot, imgPath);
      }
    });

    // Fallback: if no item images, draw classic circle+ears sprite
    if (!hasAnyImage) {
      const body = new PIXI.Graphics();
      body.beginFill(hColor, 0.8);
      body.drawCircle(0, 0, 12);
      body.endFill();
      body.beginFill(hColor);
      body.moveTo(-8, -10); body.lineTo(-4, -18); body.lineTo(0, -10);
      body.moveTo(0, -10); body.lineTo(4, -18); body.lineTo(8, -10);
      body.endFill();
      body.beginFill(0x000000);
      body.drawCircle(-4, -2, 2);
      body.drawCircle(4, -2, 2);
      body.endFill();
      body.zIndex = 1;
      spriteGroup.addChild(body);
    }

    container.addChild(spriteGroup);

    // Name label
    const nameStyle = new PIXI.TextStyle({
      fontFamily: 'monospace', fontSize: 8, fill: 0xF0ECF8,
      dropShadow: true, dropShadowColor: 0x000000, dropShadowDistance: 1,
    });
    const nameText = new PIXI.Text(nine.name || '???', nameStyle);
    nameText.anchor.set(0.5, 1);
    nameText.y = hasAnyImage ? -28 : -24;
    nameText.zIndex = 3;
    container.addChild(nameText);

    // HP bar background
    const hpBg = new PIXI.Graphics();
    hpBg.beginFill(0x222222, 0.8);
    hpBg.drawRoundedRect(-16, 22, 32, 4, 2);
    hpBg.endFill();
    hpBg.zIndex = 2;
    container.addChild(hpBg);

    // HP bar fill
    const hpFill = new PIXI.Graphics();
    hpFill.beginFill(0x44cc88);
    hpFill.drawRoundedRect(-16, 22, 32, 4, 2);
    hpFill.endFill();
    hpFill.zIndex = 2;
    container.addChild(hpFill);

    app.stage.addChild(container);

    state.nines.set(nine.id, {
      container, spriteGroup, hpFill, hpBg, nameText, ring, glow,
      hp: nine.current_hp || nine.max_hp || 100,
      maxHp: nine.max_hp || 100,
      stats: nine.stats || {},
      homeX: nine.position.x, homeY: nine.position.y,
      targetX: nine.position.x, targetY: nine.position.y,
      bobPhase: Math.random() * Math.PI * 2, // random start so they don't all bob in sync
      isAnimating: false,
    });

    // Set initial HP bar
    updateNineHP(nine.id, nine.current_hp || nine.max_hp || 100, nine.max_hp || 100);
  }

  function updateNineHP(nineId, hp, maxHp) {
    const sprite = state.nines.get(nineId);
    if (!sprite) return;
    sprite.hp = hp;
    sprite.maxHp = maxHp;
    const pct = Math.max(0, hp / maxHp);
    sprite.hpFill.clear();
    const color = pct > 0.5 ? 0x44cc88 : pct > 0.25 ? 0xffaa55 : 0xff4466;
    sprite.hpFill.beginFill(color);
    sprite.hpFill.drawRoundedRect(-16, 22, 32 * pct, 4, 2);
    sprite.hpFill.endFill();
  }

  function removeNineSprite(nineId) {
    const sprite = state.nines.get(nineId);
    if (!sprite || !state.arenaApp) return;
    state.arenaApp.stage.removeChild(sprite.container);
    state.nines.delete(nineId);
  }

  function showFloatingText(x, y, text, color = 0xff4466, size = 12) {
    if (!state.arenaApp) return;
    const style = new PIXI.TextStyle({
      fontFamily: "'Press Start 2P', monospace", fontSize: size, fill: color, fontWeight: '700',
      dropShadow: true, dropShadowColor: 0x000000, dropShadowDistance: 2, dropShadowBlur: 2,
      stroke: 0x000000, strokeThickness: 3,
    });
    const t = new PIXI.Text(text, style);
    t.anchor.set(0.5);
    t.x = x + (Math.random() - 0.5) * 16;
    t.y = y - 20;
    t.zIndex = 100;
    state.arenaApp.stage.addChild(t);

    // Slower arc upward with scale pop
    let frame = 0;
    const totalFrames = 60; // ~1 second
    const startY = t.y;
    const startScale = 1.3;
    const ticker = () => {
      frame++;
      const progress = frame / totalFrames;
      t.y = startY - progress * 35; // float up 35px
      t.alpha = progress < 0.3 ? 1 : Math.max(0, 1 - (progress - 0.3) / 0.7);
      const scale = startScale - (startScale - 0.8) * progress;
      t.scale.set(scale, scale);
      if (frame >= totalFrames) {
        state.arenaApp.ticker.remove(ticker);
        state.arenaApp.stage.removeChild(t);
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  // ═══════════════════════════════════════════
  // COMBAT ANIMATION SYSTEM
  // ═══════════════════════════════════════════

  /** Animate a Nine lunging toward a target position, then returning */
  function animateLunge(attackerId, targetId, onHit) {
    const attacker = state.nines.get(attackerId);
    const target = state.nines.get(targetId);
    if (!attacker || !target || !state.arenaApp) {
      if (onHit) onHit();
      return;
    }

    attacker.isAnimating = true;
    const startX = attacker.container.x;
    const startY = attacker.container.y;
    const targetX = target.container.x;
    const targetY = target.container.y;

    // Flip sprite to face target direction
    const facingLeft = targetX < startX;
    attacker.spriteGroup.scale.x = facingLeft ? -1 : 1;

    // Move 70% toward target (not all the way — stop just short)
    const dx = (targetX - startX) * 0.7;
    const dy = (targetY - startY) * 0.7;

    let frame = 0;
    const lungeFrames = 12; // fast lunge
    const holdFrames = 6;   // hold at target
    const returnFrames = 16; // slower return
    const totalFrames = lungeFrames + holdFrames + returnFrames;

    const ticker = () => {
      frame++;

      if (frame <= lungeFrames) {
        // Lunge forward (ease-in)
        const t = frame / lungeFrames;
        const ease = t * t; // accelerate
        attacker.container.x = startX + dx * ease;
        attacker.container.y = startY + dy * ease;
        // Lean forward
        attacker.spriteGroup.rotation = Math.atan2(dy, dx) * 0.15 * (facingLeft ? -1 : 1);
        // Scale up slightly for impact feel (preserve flip)
        const scaleAmt = 1 + t * 0.15;
        attacker.spriteGroup.scale.set(facingLeft ? -scaleAmt : scaleAmt, scaleAmt);

      } else if (frame === lungeFrames + 1) {
        // HIT MOMENT — trigger damage, particles, screen shake
        if (onHit) onHit();
        // Shake the target
        shakeSprite(target);
        // Camera shake (subtle)
        shakeCamera();

      } else if (frame <= lungeFrames + holdFrames) {
        // Hold position

      } else {
        // Return to home (ease-out)
        const t = (frame - lungeFrames - holdFrames) / returnFrames;
        const ease = 1 - (1 - t) * (1 - t); // decelerate
        attacker.container.x = startX + dx * (1 - ease);
        attacker.container.y = startY + dy * (1 - ease);
        attacker.spriteGroup.rotation *= 0.85; // straighten up
        const scale = 1.15 - 0.15 * ease;
        attacker.spriteGroup.scale.set(facingLeft ? -scale : scale, scale);
      }

      if (frame >= totalFrames) {
        state.arenaApp.ticker.remove(ticker);
        attacker.container.x = startX;
        attacker.container.y = startY;
        attacker.spriteGroup.rotation = 0;
        attacker.spriteGroup.scale.set(1, 1); // reset flip + scale
        attacker.isAnimating = false;
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  /** Shake a sprite briefly on hit */
  function shakeSprite(nine) {
    if (!nine || !state.arenaApp) return;
    nine.isAnimating = true;
    const origX = nine.container.x;
    let frame = 0;
    const ticker = () => {
      frame++;
      const intensity = Math.max(0, 5 - frame * 0.5);
      nine.container.x = origX + (Math.random() - 0.5) * intensity;
      if (frame >= 10) {
        state.arenaApp.ticker.remove(ticker);
        nine.container.x = origX;
        nine.isAnimating = false;
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  /** Subtle camera shake on big hits */
  function shakeCamera() {
    if (!state.arenaApp) return;
    const stage = state.arenaApp.stage;
    const origX = stage.x, origY = stage.y;
    let frame = 0;
    const ticker = () => {
      frame++;
      const intensity = Math.max(0, 3 - frame * 0.4);
      stage.x = origX + (Math.random() - 0.5) * intensity;
      stage.y = origY + (Math.random() - 0.5) * intensity;
      if (frame >= 8) {
        state.arenaApp.ticker.remove(ticker);
        stage.x = origX;
        stage.y = origY;
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  /** Spawn particle burst at a position */
  function spawnParticles(x, y, color, count, type) {
    if (!state.arenaApp) return;
    const particles = [];
    for (let i = 0; i < count; i++) {
      const p = new PIXI.Graphics();
      const particleColor = typeof color === 'number' ? color : 0xffffff;

      if (type === 'fire') {
        // Fire particles: small flickering triangles
        p.beginFill(particleColor, 0.9);
        const s = 2 + Math.random() * 3;
        p.moveTo(0, -s); p.lineTo(-s * 0.6, s * 0.5); p.lineTo(s * 0.6, s * 0.5);
        p.closePath();
        p.endFill();
      } else if (type === 'poison') {
        // Poison: small circles that rise
        p.beginFill(particleColor, 0.8);
        p.drawCircle(0, 0, 1.5 + Math.random() * 2);
        p.endFill();
      } else if (type === 'heal') {
        // Heal: sparkle crosses
        const s = 1.5 + Math.random() * 2;
        p.beginFill(particleColor, 0.9);
        p.drawRect(-s, -0.5, s * 2, 1);
        p.drawRect(-0.5, -s, 1, s * 2);
        p.endFill();
      } else if (type === 'shield') {
        // Shield: ring segments
        p.lineStyle(1.5, particleColor, 0.8);
        const angle = Math.random() * Math.PI * 2;
        p.arc(0, 0, 15 + Math.random() * 5, angle, angle + 0.5);
      } else if (type === 'lightning') {
        // Lightning: small bolts
        p.lineStyle(1.5, particleColor, 0.9);
        const segs = 3;
        let px = 0, py = 0;
        for (let s = 0; s < segs; s++) {
          const nx = px + (Math.random() - 0.5) * 8;
          const ny = py + 3 + Math.random() * 4;
          p.moveTo(px, py);
          p.lineTo(nx, ny);
          px = nx; py = ny;
        }
      } else {
        // Default: circles
        p.beginFill(particleColor, 0.8);
        p.drawCircle(0, 0, 1 + Math.random() * 2.5);
        p.endFill();
      }

      p.x = x + (Math.random() - 0.5) * 20;
      p.y = y + (Math.random() - 0.5) * 16;
      p.zIndex = 99;
      state.arenaApp.stage.addChild(p);
      particles.push({
        gfx: p,
        vx: (Math.random() - 0.5) * 3,
        vy: type === 'heal' ? -(1 + Math.random() * 2) : (Math.random() - 0.5) * 3,
        life: 30 + Math.random() * 20,
        frame: 0,
      });
    }

    const ticker = () => {
      let allDone = true;
      for (const p of particles) {
        p.frame++;
        p.gfx.x += p.vx;
        p.gfx.y += p.vy;
        if (type === 'fire') p.vy -= 0.15; // fire rises
        if (type === 'poison') p.vy -= 0.08; // poison drifts up
        p.gfx.alpha = Math.max(0, 1 - p.frame / p.life);
        p.gfx.scale.set(1 - p.frame / p.life * 0.5);
        if (p.frame < p.life) allDone = false;
      }
      if (allDone) {
        state.arenaApp.ticker.remove(ticker);
        for (const p of particles) {
          state.arenaApp.stage.removeChild(p.gfx);
        }
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  /** Animate a KO — spin, shrink, fade */
  function animateKO(nineId) {
    const nine = state.nines.get(nineId);
    if (!nine || !state.arenaApp) return;
    nine.isAnimating = true;

    const startX = nine.container.x;
    const startY = nine.container.y;
    let frame = 0;
    const totalFrames = 45;

    // Red flash
    if (nine.spriteGroup) {
      nine.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xff2222; });
    }

    // Explosion particles
    spawnParticles(startX, startY, 0xff4466, 15, 'fire');

    const ticker = () => {
      frame++;
      const t = frame / totalFrames;

      // Spin
      nine.spriteGroup.rotation = t * Math.PI * 3;
      // Shrink
      const scale = Math.max(0, 1 - t);
      nine.spriteGroup.scale.set(scale, scale);
      // Fade
      nine.container.alpha = Math.max(0.15, 1 - t);
      // Rise slightly
      nine.container.y = startY - t * 15;

      if (frame >= totalFrames) {
        state.arenaApp.ticker.remove(ticker);
        nine.spriteGroup.rotation = 0;
        nine.spriteGroup.scale.set(0.3, 0.3);
        nine.container.alpha = 0.15;
        nine.container.y = startY;
        nine.isAnimating = false;
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  // ===== SOCKET.IO =====
  function connectArenaSocket(zoneId) {
    const socket = io('/arena', { transports: ['websocket', 'polling'] });
    state.socket = socket;

    socket.on('connect', () => {
      socket.emit('join_zone', { zoneId });
      addFeedEvent('Connected to arena', 'system');
    });

    // Current state (on first join) — engine sends snapshot with combat positions
    socket.on('arena:state', (data) => {
      if (data.snapshot) {
        for (const nine of data.snapshot) {
          if (state.nines.has(nine.id)) {
            // Already loaded from REST — just update HP
            updateNineHP(nine.id, nine.current_hp, nine.max_hp);
          } else {
            // New from engine — add with mapped position
            nine.position = engineToScreen(nine.position);
            addNineSprite(nine);
          }
        }
      }
      if (data.round) updateRoundBadge(data.round, data.cycle);
      if (data.active) addFeedEvent('Combat is active!', 'system');
    });

    // New Nine joins mid-battle
    socket.on('arena:nine_joined', (data) => {
      if (!state.nines.has(data.nine_id)) {
        addNineSprite({
          id: data.nine_id,
          name: data.player_name,
          house: data.house,
          guild_id: data.guild_id,
          guild_name: data.guild,
          current_hp: data.stats?.hp || 10,
          max_hp: data.stats?.hp || 10,
          position: engineToScreen(data.position),
          stats: data.stats || {},
          equipped_images: data.equipped_images || {},
        });
      }
      addFeedEvent(`${data.player_name} entered the arena`, 'join');
    });

    // Nine leaves
    socket.on('arena:nine_left', (data) => {
      removeNineSprite(data.nine_id);
    });

    // ── CYCLE START — new 5-min cycle beginning
    socket.on('arena:cycle_start', (data) => {
      const cycleNum = data.cycle_number || data.cycle || '?';
      const totalRounds = data.total_rounds || 3;
      console.log('🎮 CYCLE START:', cycleNum, '— Rounds:', totalRounds);
      addFeedEvent(`⚔️ COMBAT CYCLE ${cycleNum} — ${totalRounds} Rounds!`, 'system');
      showRoundBanner(`CYCLE ${cycleNum}`, `${totalRounds} Rounds Begin!`);
    });

    // ── ROUND START — happens 3 times per cycle
    socket.on('arena:round_start', (data) => {
      console.log('🎮 ROUND START:', data.round_number, 'of', data.total_rounds);
      const roundLabel = `ROUND ${data.round_number} of ${data.total_rounds}`;
      addFeedEvent(`⚔️ ${roundLabel} — FIGHT!`, 'system');
      showRoundBanner(roundLabel, 'FIGHT!');
      updateRoundBadge(data.round_number, data.total_rounds);
      // Sync HP states
      if (data.nines) {
        for (const nine of data.nines) {
          const nineId = nine.player_id || nine.id;
          if (state.nines.has(nineId)) {
            updateNineHP(nineId, nine.hp || nine.current_hp, nine.maxHp || nine.max_hp);
            const sprite = state.nines.get(nineId);
            if (sprite && nine.alive) sprite.container.alpha = 1;
          }
        }
      }
    });

    // ── COMBAT EVENTS — individual events from engine (staggered server-side)
    socket.on('arena:event', (ev) => {
      processArenaEvent(ev);
    });

    // ── COMBAT EVENTS — bulk (legacy fallback)
    socket.on('arena:events', (data) => {
      if (!data.events || data.events.length === 0) return;
      console.log('🎮 ROUND', data.round || '?', 'EVENTS:', data.events.length);
      data.events.forEach((ev, i) => {
        const delay = ev.type === 'attack' ? i * 900 : i * 600;
        setTimeout(() => processArenaEvent(ev), delay);
      });
    });

    // Individual event types (fallback)
    socket.on('arena:attack', (data) => processArenaEvent({ type: 'attack', ...data }));

    // ── ROUND END — show round results
    socket.on('arena:round_end', (data) => {
      console.log('🎮 ROUND END:', data.round_number, 'of', data.total_rounds);

      const roundLabel = `ROUND ${data.round_number}/${data.total_rounds}`;
      addFeedEvent(`🏆 ${roundLabel} complete`, 'system');
      showRoundBanner(`${roundLabel} OVER`, 'Fighters regroup...');

      // Sync HP from server
      if (data.nines) {
        for (const nine of data.nines) {
          const nineId = nine.player_id || nine.id;
          updateNineHP(nineId, nine.current_hp || nine.hp, nine.max_hp || nine.maxHp);
        }
      }

      if (data.guild_scores) {
        state.guildScores = data.guild_scores;
        updateScoreboard();
      }
    });

    // ── HEAL PHASE — between rounds, survivors heal 25%
    socket.on('arena:heal_phase', (data) => {
      console.log('🎮 HEAL PHASE: after round', data.round_just_ended, '→ next round', data.next_round);
      addFeedEvent(`💚 Between-round heal — 25% HP restored`, 'system');
      showRoundBanner('HEALING', '+25% HP');

      // Animate heal on all alive Nines
      if (data.heals) {
        data.heals.forEach((h, i) => {
          setTimeout(() => {
            const nineId = h.nine_id;
            updateNineHP(nineId, h.new_hp, null);
            const sprite = state.nines.get(nineId);
            if (sprite) {
              showFloatingText(sprite.container.x, sprite.container.y, `+${h.amount}`, 0x44ffaa, 11);
              spawnParticles(sprite.container.x, sprite.container.y, 0x44ffaa, 8, 'heal');
            }
          }, i * 200); // stagger heal visuals slightly
        });
      }

      // Also sync full HP state
      if (data.nines) {
        setTimeout(() => {
          for (const nine of data.nines) {
            const nineId = nine.player_id || nine.id;
            updateNineHP(nineId, nine.current_hp || nine.hp, nine.max_hp || nine.maxHp);
          }
        }, 1500);
      }
    });

    // ── CYCLE END — final results
    socket.on('arena:cycle_end', (data) => {
      console.log('🎮 CYCLE END:', data);
      const winner = data.winner_guild || 'No winner';
      const cycleNum = data.cycle_number || data.cycle || '?';
      showRoundBanner('CYCLE COMPLETE', `${winner} controls zone`);
      addFeedEvent(`🏁 Cycle ${cycleNum} complete — ${winner} controls zone`, 'system');

      // Sync final HP state
      if (data.nines) {
        for (const nine of data.nines) {
          const nineId = nine.player_id || nine.id;
          updateNineHP(nineId, nine.current_hp || nine.hp, nine.max_hp || nine.maxHp);
        }
      }

      if (data.guild_scores) {
        state.guildScores = data.guild_scores;
        updateScoreboard();
      }
    });

    // Nerm commentary
    socket.on('arena:nerm', (data) => {
      const msg = typeof data === 'string' ? data : (data.message || data.text || data.comment || '');
      if (msg) showNermBubble(msg);
    });

    socket.on('disconnect', () => {
      addFeedEvent('Connection lost. Reconnecting...', 'system');
    });
  }

  function processArenaEvent(ev) {
    switch (ev.type) {
      case 'attack': {
        const targetSprite = state.nines.get(ev.to);
        const attackerSprite = state.nines.get(ev.from);

        // Lunge animation — damage happens on hit
        animateLunge(ev.from, ev.to, () => {
          // ON HIT callback
          if (targetSprite) {
            // Damage number
            const dmgSize = ev.crit ? 16 : 12;
            showFloatingText(targetSprite.container.x, targetSprite.container.y, `-${ev.damage}`, ev.crit ? 0xffd700 : 0xff4466, dmgSize);
            if (ev.crit) {
              showFloatingText(targetSprite.container.x, targetSprite.container.y - 25, 'CRIT!', 0xffd700, 14);
              spawnParticles(targetSprite.container.x, targetSprite.container.y, 0xffd700, 10, 'lightning');
            }
            // Impact particles (red sparks)
            spawnParticles(targetSprite.container.x, targetSprite.container.y, 0xff5555, 6, 'fire');
            // Red flash on target
            if (targetSprite.spriteGroup) {
              targetSprite.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xff4444; });
              setTimeout(() => {
                if (targetSprite.spriteGroup) targetSprite.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xffffff; });
              }, 200);
            }
          }
        });

        addFeedEvent(`⚔️ ${getNineName(ev.from)} → ${getNineName(ev.to)} -${ev.damage}${ev.crit ? ' CRIT!' : ''}`, 'attack');
        break;
      }
      case 'damage': {
        updateNineHP(ev.target_id, ev.new_hp, state.nines.get(ev.target_id)?.maxHp || 100);
        updateYourNinePanel(ev.target_id);
        break;
      }
      case 'heal': {
        const sprite = state.nines.get(ev.nine_id);
        if (sprite) {
          showFloatingText(sprite.container.x, sprite.container.y, `+${ev.amount}`, 0x44ffaa, 12);
          spawnParticles(sprite.container.x, sprite.container.y, 0x44ffaa, 10, 'heal');
          // Green flash
          if (sprite.spriteGroup) {
            sprite.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0x44ff88; });
            setTimeout(() => {
              if (sprite.spriteGroup) sprite.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xffffff; });
            }, 300);
          }
        }
        updateNineHP(ev.nine_id, ev.new_hp, state.nines.get(ev.nine_id)?.maxHp || 100);
        break;
      }
      case 'ko': {
        addFeedEvent(`💀 ${getNineName(ev.nine_id)} was KO'd!`, 'ko');
        animateKO(ev.nine_id);
        showFloatingText(
          state.nines.get(ev.nine_id)?.container?.x || 0,
          (state.nines.get(ev.nine_id)?.container?.y || 0) - 30,
          'K.O.', 0xff2222, 16
        );
        break;
      }
      case 'dodge': {
        const sprite = state.nines.get(ev.nine_id);
        if (sprite) {
          showFloatingText(sprite.container.x, sprite.container.y, 'DODGE!', 0x90E0EF, 11);
          // Quick sidestep animation
          const origX = sprite.container.x;
          sprite.container.x += 15;
          sprite.container.alpha = 0.5;
          setTimeout(() => {
            sprite.container.x = origX;
            sprite.container.alpha = 1;
          }, 300);
        }
        break;
      }
      case 'ward_pop': {
        const sprite = state.nines.get(ev.nine_id);
        if (sprite) {
          showFloatingText(sprite.container.x, sprite.container.y, 'BLOCKED!', 0xD4A64B, 11);
          spawnParticles(sprite.container.x, sprite.container.y, 0xD4A64B, 10, 'shield');
        }
        break;
      }
      case 'effect': {
        processEffectEvent(ev);
        break;
      }
    }
  }

  function processEffectEvent(ev) {
    const targetId = ev.target_id || ev.nine_id;
    const sprite = state.nines.get(targetId);

    // Get particle config
    const particles = getEffectParticles(ev.effect_type);

    if (sprite) {
      // Spawn particles for every effect
      spawnParticles(sprite.container.x, sprite.container.y, particles.color, particles.count, particles.type);
      // Floating text
      const label = ev.effect_type.replace(/_/g, ' ');
      showFloatingText(sprite.container.x, sprite.container.y - 25, label, particles.color, 9);
    }

    // Special feed messages
    if (ev.effect_type === 'ANCHOR_SAVE') {
      addFeedEvent(`⚓ ${getNineName(targetId)} saved by ANCHOR at 1 HP!`, 'effect');
    } else if (ev.effect_type === 'SILENCE') {
      addFeedEvent(`🤫 ${getNineName(targetId)} SILENCED!`, 'effect');
    } else if (ev.effect_type === 'SHATTER') {
      addFeedEvent(`💥 ${getNineName(targetId)} SHATTERED — splash damage!`, 'effect');
    }
  }

  function getNineName(id) {
    const sprite = state.nines.get(id);
    return sprite?.nameText?.text || '???';
  }

  // ===== UI UPDATES =====
  function showRoundBanner(text, sub) {
    const banner = document.getElementById('round-banner');
    document.getElementById('round-banner-text').textContent = text;
    document.getElementById('round-banner-sub').textContent = sub || '';
    banner.style.display = 'block';
    banner.style.animation = 'none';
    banner.offsetHeight; // force reflow
    banner.style.animation = 'bannerPop 2.5s forwards';
    setTimeout(() => { banner.style.display = 'none'; }, 2500);
  }

  function updateRoundBadge(round, totalRounds) {
    const badge = document.getElementById('arena-round-badge');
    if (totalRounds) {
      badge.textContent = `ROUND ${round || 1}/${totalRounds}`;
    } else {
      badge.textContent = `ROUND ${round || 1}`;
    }
  }

  function addFeedEvent(text, type) {
    const feed = document.getElementById('arena-feed');
    const div = document.createElement('div');
    div.className = 'feed-event';
    const colorClass = type === 'ko' ? 'feed-dmg' : type === 'effect' ? 'feed-effect' : type === 'heal' ? 'feed-heal' : '';
    div.innerHTML = `<span class="${colorClass}">${text}</span>`;
    feed.appendChild(div);

    // Keep only last 8 events
    while (feed.children.length > 8) {
      feed.removeChild(feed.firstChild);
    }
  }

  function showNermBubble(text) {
    const bubble = document.getElementById('nerm-bubble');
    document.getElementById('nerm-text').textContent = text;
    bubble.classList.add('visible');
    setTimeout(() => bubble.classList.remove('visible'), 6000);
  }

  function updateScoreboard() {
    const rows = document.getElementById('scoreboard-rows');
    const entries = Object.entries(state.guildScores).sort((a, b) => b[1] - a[1]);
    rows.innerHTML = entries.map(([guild, hp]) => {
      return `<div class="arena-sb-row">
        <div class="arena-sb-guild">${guild}</div>
        <div class="arena-sb-wins" style="color:${hp > 0 ? 'var(--green)' : 'var(--faint)'}">${hp} HP</div>
      </div>`;
    }).join('');
  }

  function updateYourNinePanel(nineId) {
    if (nineId !== state.playerId) return;
    const sprite = state.nines.get(nineId);
    if (!sprite) return;
    document.getElementById('your-hp-fill').style.width = `${(sprite.hp / sprite.maxHp) * 100}%`;
    document.getElementById('your-hp-text').textContent = `${sprite.hp}/${sprite.maxHp}`;
  }

  // ===== DEPLOYMENT =====
  async function checkDeployment(zoneId) {
    if (!state.playerId) {
      // Not logged in — show deploy button (will prompt login)
      document.getElementById('deploy-cta').style.display = 'block';
      document.getElementById('your-nine-panel').style.display = 'none';
      return;
    }

    try {
      const res = await fetch(`/api/zones/my-deployments/${state.playerId}`);
      const data = await res.json();
      const deployed = (data.deployments || []).find(d => d.zone_id === zoneId);

      if (deployed) {
        state.isDeployed = true;
        document.getElementById('deploy-cta').style.display = 'none';
        document.getElementById('your-nine-panel').style.display = 'block';

        // Find this player's sprite for stats display
        const sprite = state.nines.get(state.playerId);
        if (sprite) {
          document.getElementById('your-nine-stats').innerHTML = `
            <div class="your-nine-stat" style="color:#e85a6a">ATK ${sprite.stats?.atk || '?'}</div>
            <div class="your-nine-stat" style="color:#6acd8a">HP ${sprite.maxHp || '?'}</div>
            <div class="your-nine-stat" style="color:#6ac8d8">SPD ${sprite.stats?.spd || '?'}</div>
          `;
          document.getElementById('your-hp-fill').style.width = `${(sprite.hp / sprite.maxHp) * 100}%`;
          document.getElementById('your-hp-text').textContent = `${sprite.hp}/${sprite.maxHp}`;
        }
      } else {
        state.isDeployed = false;
        document.getElementById('deploy-cta').style.display = 'block';
        document.getElementById('your-nine-panel').style.display = 'none';
      }
    } catch(e) {
      // Fallback: show deploy button
      document.getElementById('deploy-cta').style.display = 'block';
      document.getElementById('your-nine-panel').style.display = 'none';
    }
  }

  /** Deploy to zone — uses existing /api/zones/deploy (costs 1 mana) */
  async function confirmDeploy() {
    if (!state.playerId) {
      alert('Please log in first');
      return;
    }

    const btn = document.getElementById('btn-join-battle');
    btn.textContent = 'DEPLOYING...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/zones/deploy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          player_id: state.playerId,
          zone_id: state.currentZoneId,
        }),
      });

      const data = await res.json();
      if (data.success) {
        state.isDeployed = true;
        document.getElementById('deploy-cta').style.display = 'none';
        document.getElementById('your-nine-panel').style.display = 'block';
        addFeedEvent(data.message || 'You have entered the battle!', 'join');

        // Reload zone nines to include yourself
        state.nines.clear();
        if (state.arenaApp) {
          // Remove all Nine containers from stage
          const toRemove = [];
          state.arenaApp.stage.children.forEach(child => {
            if (child.name !== 'ground') toRemove.push(child);
          });
          toRemove.forEach(c => state.arenaApp.stage.removeChild(c));
        }
        state._guildAngles = {};
        state._guildCounts = {};
        await loadZoneNines(state.currentZoneId);
        checkDeployment(state.currentZoneId);
      } else {
        alert(data.error || 'Deploy failed');
      }
    } catch(e) {
      alert('Deploy failed: ' + e.message);
    } finally {
      btn.textContent = '⚔️ JOIN BATTLE';
      btn.disabled = false;
    }
  }

  /** Withdraw from zone — uses existing /api/zones/withdraw */
  async function withdraw() {
    if (!confirm('Withdraw from this zone?')) return;

    try {
      const res = await fetch('/api/zones/withdraw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          player_id: state.playerId,
          zone_id: state.currentZoneId,
        }),
      });

      const data = await res.json();
      if (data.success) {
        state.isDeployed = false;
        document.getElementById('your-nine-panel').style.display = 'none';
        document.getElementById('deploy-cta').style.display = 'block';
        addFeedEvent('You withdrew from the battle.', 'system');

        // Remove your sprite
        removeNineSprite(state.playerId);
      } else {
        alert(data.error || 'Withdraw failed');
      }
    } catch(e) {
      alert('Withdraw failed');
    }
  }

  // ===== EVENT LISTENERS =====
  document.getElementById('btn-back').addEventListener('click', closeArena);
  document.getElementById('btn-join-battle').addEventListener('click', confirmDeploy);
  document.getElementById('btn-withdraw').addEventListener('click', withdraw);

  // ===== START =====
  init();

})();
</script>
</body>
</html>
