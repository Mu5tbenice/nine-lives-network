<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nethara — Nine Lives Network</title>
  <link rel="stylesheet" href="/css/variables-v2.css">
  <link rel="stylesheet" href="/css/components-v2.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0e0a18;color:#CCC5DB;font-family:'Crimson Text',serif;min-height:100vh}
    .nethara-wrap{max-width:520px;margin:0 auto;min-height:100vh}

    /* ═══ HEADER ═══ */
    .n-header{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center}
    .n-title{font-family:'Cinzel',serif;font-size:22px;font-weight:800;color:#D4A64B;letter-spacing:2px}
    .n-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:#554E68;margin-top:1px}
    .n-status{display:flex;align-items:center;gap:6px}
    .n-dot{width:8px;height:8px;border-radius:50%;background:#6acd8a;animation:pulse 2s infinite}
    .n-active{font-family:'JetBrains Mono',monospace;font-size:10px;color:#6acd8a}

    /* ═══ MANA ═══ */
    .n-mana{padding:0 16px 10px;display:flex;align-items:center;gap:8px}
    .m-orb{width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,212,255,0.15)}
    .m-orb.on{background:linear-gradient(180deg,#00D4FF,#0088aa);border-color:rgba(0,212,255,0.4);box-shadow:0 0 6px rgba(0,212,255,0.2)}
    .m-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:#554E68}
    .m-next{font-family:'JetBrains Mono',monospace;font-size:10px;color:#00D4FF}

    /* ═══ TABS ═══ */
    .n-tabs{display:flex;padding:0 16px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
    .n-tab{font-family:'JetBrains Mono',monospace;font-size:10px;padding:10px 14px;cursor:pointer;
      border:none;background:none;color:#554E68;border-bottom:2px solid transparent;transition:all 0.2s}
    .n-tab.active{color:#D4A64B;border-bottom-color:#D4A64B;font-weight:700}
    .n-tab:hover{color:#847C98}

    /* ═══ ZONE CARD ═══ */
    .z-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;
      cursor:pointer;overflow:hidden;transition:transform 0.15s,border-color 0.15s;margin-bottom:10px}
    .z-card:hover{transform:translateY(-1px)}
    .z-event{padding:5px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.05)}
    .z-event-t{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700}
    .z-event-c{font-family:'JetBrains Mono',monospace;font-size:9px;color:#D4A64B}
    .z-obj{background:linear-gradient(90deg,rgba(212,166,75,0.12),transparent);padding:5px 14px;
      display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,0.05)}
    .z-obj-t{font-family:'JetBrains Mono',monospace;font-size:10px;color:#D4A64B;font-weight:700}
    .z-body{padding:12px 14px}
    .z-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:#F0ECF8;margin-bottom:1px}
    .z-region{font-family:'JetBrains Mono',monospace;font-size:9px;opacity:0.7}
    .z-badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 8px;border-radius:4px;font-weight:700}
    .z-badge.contested{color:#ff4466;background:rgba(255,68,102,0.1)}
    .z-badge.held{color:#6acd8a;background:rgba(106,205,138,0.1)}
    .g-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
    .g-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .g-name{font-family:'JetBrains Mono',monospace;font-size:9px;color:#CCC5DB;width:78px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .g-track{flex:1;height:5px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
    .g-fill{height:100%;border-radius:3px;transition:width 0.5s}
    .g-pct{font-family:'JetBrains Mono',monospace;font-size:9px;width:28px;text-align:right;font-weight:700}
    .z-fx{display:flex;gap:4px;flex-wrap:wrap}
    .fx-pill{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 5px;border-radius:3px;font-weight:600}
    .z-cast{font-family:'JetBrains Mono',monospace;font-size:9px;color:#554E68}
    .z-bot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}

    /* ═══ BATTLE VIEW ═══ */
    .b-head{padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.06)}
    .b-back{background:none;border:none;color:#847C98;font-size:20px;cursor:pointer;padding:4px 8px}
    .b-arena{position:relative;width:100%;height:260px;overflow:hidden;border-bottom:1px solid rgba(255,255,255,0.06)}
    .b-guilds{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
    .b-guild-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .b-g-circ{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;flex-shrink:0}
    .b-g-pct{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
    .b-hp-track{height:8px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;flex:1}
    .b-hp-fill{height:100%;border-radius:4px;transition:width 0.5s}
    .feed-wrap{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
    .feed-title{font-family:'JetBrains Mono',monospace;font-size:9px;color:#554E68;letter-spacing:1px;margin-bottom:8px}
    .feed-entry{display:flex;gap:8px;margin-bottom:6px;padding:6px 8px;background:rgba(255,255,255,0.02);border-radius:6px;border:1px solid rgba(255,255,255,0.04)}
    .feed-dot{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0}
    .feed-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:#CCC5DB;flex:1}
    .feed-txt b{font-weight:700}
    .feed-res{font-family:'JetBrains Mono',monospace;font-size:9px;color:#6acd8a;margin-top:2px}
    .feed-time{font-family:'JetBrains Mono',monospace;font-size:8px;color:#554E68;flex-shrink:0}
    .nerm-bubble{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:60;
      background:rgba(20,13,30,0.95);border:1px solid rgba(212,166,75,0.3);border-radius:10px;
      padding:6px 12px;max-width:80%;display:flex;align-items:center;gap:6px;
      animation:nermIn 0.3s ease;pointer-events:none}
    .nerm-t{font-family:'JetBrains Mono',monospace;font-size:8px;color:#D4A64B;line-height:1.4}

    /* ═══ GUILD TAB ═══ */
    .guild-hdr{border-radius:12px;padding:16px;margin-bottom:14px}
    .guild-title{font-family:'Cinzel',serif;font-size:18px;font-weight:700}
    .guild-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:#CCC5DB;margin-top:4px}
    .guild-stats{display:flex;gap:16px;margin-top:12px}
    .gs-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
    .gs-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:#554E68}
    .ga-title{font-family:'JetBrains Mono',monospace;font-size:9px;color:#554E68;letter-spacing:1px;margin-bottom:8px}
    .ga-row{display:flex;gap:8px;margin-bottom:6px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px}

    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    @keyframes spriteIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    @keyframes nermIn{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div class="nethara-wrap" id="app"></div>

  <script src="/js/sprite-renderer.js"></script>
  <script src="/js/spell-vfx.js"></script>
  <script>try{var s=document.createElement('script');s.src='/js/nav.js';document.body.appendChild(s)}catch(e){}</script>
  <script>
  (function(){
  'use strict';

  // ═══ CONSTANTS ═══
  var H={
    smoulders:{color:'#E03C31',name:'Smoulders',icon:'🔥'},darktide:{color:'#00B4D8',name:'Darktide',icon:'🌊'},
    stonebark:{color:'#5CB338',name:'Stonebark',icon:'🌿'},ashenvale:{color:'#B0C4DE',name:'Ashenvale',icon:'💨'},
    stormrage:{color:'#FFC800',name:'Stormrage',icon:'⚡'},nighthollow:{color:'#7B2D8E',name:'Nighthollow',icon:'🌙'},
    dawnbringer:{color:'#FF8C00',name:'Dawnbringer',icon:'☀️'},manastorm:{color:'#5B8FE0',name:'Manastorm',icon:'🔮'},
    plaguemire:{color:'#E84393',name:'Plaguemire',icon:'☠️'}
  };
  var FX={
    BURN:{c:'#ffaa55',i:'🔥'},WARD:{c:'#D4A64B',i:'🛡️'},POISON:{c:'#aaee55',i:'☠️'},
    ANCHOR:{c:'#ccaa66',i:'⚓'},HEX:{c:'#bb88ff',i:'🔮'},SILENCE:{c:'#888',i:'🔇'},
    HEAL:{c:'#6acd8a',i:'💚'},THORNS:{c:'#55aa22',i:'🌿'},WEAKEN:{c:'#cc6666',i:'⬇️'}
  };
  var MATCHUPS={
    smoulders:{s:'stonebark',w:'darktide'},darktide:{s:'smoulders',w:'stonebark'},stonebark:{s:'darktide',w:'smoulders'},
    stormrage:{s:'ashenvale',w:'nighthollow'},ashenvale:{s:'nighthollow',w:'stormrage'},nighthollow:{s:'stormrage',w:'ashenvale'},
    dawnbringer:{s:'plaguemire',w:'manastorm'},plaguemire:{s:'manastorm',w:'dawnbringer'},manastorm:{s:'dawnbringer',w:'plaguemire'}
  };
  var MOCK_GUILDS=[
    {id:1,name:'Bonk Legion',color:'#FFD700',short:'BON'},{id:2,name:'Shadow Paws',color:'#00BFFF',short:'SHP'},
    {id:3,name:'Night Wolves',color:'#BB88FF',short:'NTW'},{id:4,name:"Pepe's Army",color:'#50FA7B',short:'PEP'},
    {id:5,name:'Cat Lovers United',color:'#FF79C6',short:'CLU'}
  ];
  var ZNAMES={
    smoulders:['Ember Wastes','Cinderfall Ridge','Molten Core'],darktide:['Blackmoor Basin','Abyssal Trench','Tide Caverns'],
    stonebark:['Ironveil Citadel','Roothold Valley','Ancient Grove'],ashenvale:['Ashenvale Peaks','Mistwalker Pass','Zephyr Cliffs'],
    stormrage:['Stormrage Spire','Thunder Plains','Voltaic Gorge'],nighthollow:['Voidspire Tower','Dusk Hollow','Eclipse Sanctum'],
    dawnbringer:['Radiant Bastion','Sunforge Mesa','Golden Reach'],manastorm:['Arcane Nexus','Leyline Crossing','Crystal Depths'],
    plaguemire:['Blighted Swamp','Spore Caverns','Miasma Pits']
  };
  var NINE_NAMES=['EmberFox','BoltCaster','StoneKing','NightShade','PlagueRat','SunWarden','MistWalker',
    'VoidFang','ArcaneEcho','RootGuard','ThunderPaw','DuskBlade','HolyWhisker','ManaDrain','SporeKitty',
    'FlameHeart','TideRipper','LeafBlade','GaleRunner','SparkClaw','ShadowMeld','LightBearer','RuneSeer','BlightFur'];
  var HK=Object.keys(H);

  // ═══ MOCK DATA GENERATORS ═══
  function mockGuilds(zone){
    var n=2+Math.floor(Math.random()*3);var gs=[];var rem=100;
    var sh=MOCK_GUILDS.slice().sort(function(){return Math.random()-0.5});
    for(var i=0;i<n;i++){var p=i===n-1?rem:Math.floor(rem*(0.25+Math.random()*0.4));rem-=p;
      gs.push({guild_id:sh[i].id,name:sh[i].name,color:sh[i].color,short:sh[i].short,pct:Math.max(p,5)});}
    return gs.sort(function(a,b){return b.pct-a.pct});
  }
  function mockNines(count,guilds){
    var ns=[];for(var i=0;i<count;i++){
      var g=guilds[Math.floor(Math.random()*guilds.length)];var house=HK[Math.floor(Math.random()*HK.length)];
      ns.push({id:i+1,name:NINE_NAMES[Math.floor(Math.random()*NINE_NAMES.length)],
        house:house,guild_id:g.guild_id,guild_name:g.name,guild_color:g.color,guild_short:g.short,
        hp:Math.floor(Math.random()*20)+5,max_hp:24,atk:Math.floor(Math.random()*6)+2,spd:Math.floor(Math.random()*8)+1,
        equipped_card:{name:'Spell',house:HK[Math.floor(Math.random()*HK.length)]},sprite_config:null});}
    return ns;
  }
  function mockZones(){
    var zones=[];var id=1;
    Object.keys(ZNAMES).forEach(function(hk){
      ZNAMES[hk].forEach(function(name,i){
        var guilds=mockGuilds();var contested=guilds.length>1&&guilds[0].pct-guilds[1].pct<18;
        var fxPool=['BURN','WARD','POISON','ANCHOR','HEX','HEAL','THORNS'];
        var effects=[];for(var f=0;f<Math.floor(Math.random()*3);f++){var e=fxPool[Math.floor(Math.random()*fxPool.length)];if(effects.indexOf(e)<0)effects.push(e);}
        zones.push({id:id++,name:name,region:H[hk].name+' Territory',region_house:hk,
          guilds:guilds,casters:Math.floor(Math.random()*25)+2,
          event:Math.random()<0.12?{type:Math.random()<0.5?'Mana Storm':'Treasure Surge',icon:Math.random()<0.5?'⚡':'💎',time:Math.floor(Math.random()*180)+'m'}:null,
          contested:contested,objective:id===4,effects:effects,streak:contested?0:Math.floor(Math.random()*8),
          deployed_nines:mockNines(4+Math.floor(Math.random()*8),guilds)});
      });
    });
    return zones;
  }

  // ═══ STATE ═══
  var S={tab:'zones',zones:[],selZone:null,mana:{cur:5,max:10,next:'42m'},mock:false,loading:true};

  // ═══ API ═══
  function tok(){try{var s=localStorage.getItem('supabase_session');if(s)return JSON.parse(s).access_token;}catch(e){}try{return localStorage.getItem('auth_token');}catch(e){}return null;}
  function api(url){var t=tok();var h={'Content-Type':'application/json'};if(t)h['Authorization']='Bearer '+t;
    return fetch(url,{headers:h}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});}

  function load(){
    S.loading=true;render();
    Promise.all([api('/api/zones').catch(function(){return null;}),api('/api/mana').catch(function(){return null;})]).then(function(r){
      var zd=r[0];var md=r[1];
      if(zd&&Array.isArray(zd)&&zd.length>0){S.zones=zd;S.mock=false;}
      else if(zd&&zd.zones&&zd.zones.length>0){S.zones=zd.zones;S.mock=false;}
      else{S.zones=mockZones();S.mock=true;}
      if(md){S.mana={cur:md.current||md.mana||5,max:md.max||10,next:md.next_in||'42m'};}
      S.loading=false;render();
    });
  }

  // ═══ SORTING ═══
  function sorted(z){return z.slice().sort(function(a,b){
    if(a.objective&&!b.objective)return -1;if(b.objective&&!a.objective)return 1;
    if(a.event&&!b.event)return -1;if(b.event&&!a.event)return 1;
    if(a.contested&&!b.contested)return -1;if(b.contested&&!a.contested)return 1;
    return(b.casters||0)-(a.casters||0);});}

  // ═══ RENDER ═══
  function render(){
    var app=document.getElementById('app');
    if(S.selZone){app.innerHTML=battleHTML(S.selZone);initBattle(S.selZone);}
    else{app.innerHTML=headerHTML()+manaHTML()+tabsHTML()+contentHTML();}
    bind();
  }

  function headerHTML(){
    var ac=S.zones.filter(function(z){return z.contested||z.event}).length;
    return '<div class="n-header"><div><div class="n-title">NETHARA</div><div class="n-sub">Season 1'+
      (S.mock?' · Preview Mode':'')+'</div></div><div class="n-status"><div class="n-dot"></div>'+
      '<span class="n-active">'+ac+' Active</span></div></div>';
  }
  function manaHTML(){
    var o='';for(var i=1;i<=S.mana.max;i++)o+='<div class="m-orb'+(i<=S.mana.cur?' on':'')+'"></div>';
    return '<div class="n-mana">'+o+'<span class="m-txt">'+S.mana.cur+'/'+S.mana.max+' Mana</span>'+
      '<span class="m-next">Next: '+S.mana.next+'</span></div>';
  }
  function tabsHTML(){
    return '<div class="n-tabs"><button class="n-tab'+(S.tab==='zones'?' active':'')+'" data-tab="zones">🔥 Hot Zones</button>'+
      '<button class="n-tab'+(S.tab==='guild'?' active':'')+'" data-tab="guild">👥 Guild</button></div>';
  }
  function contentHTML(){
    if(S.loading)return '<div style="text-align:center;padding:40px;font-family:JetBrains Mono,monospace;font-size:10px;color:#554E68">Loading Nethara...</div>';
    if(S.tab==='zones')return '<div style="padding:0 14px 80px">'+sorted(S.zones).map(zoneHTML).join('')+'</div>';
    if(S.tab==='guild')return guildHTML();
    return '';
  }

  // ═══ ZONE CARD ═══
  function zoneHTML(z){
    var h=H[z.region_house]||{color:'#D4A64B',icon:'✨',name:'?'};
    var s='<div class="z-card" data-zid="'+z.id+'" style="border-left:3px solid '+h.color+'30">';
    if(z.event)s+='<div class="z-event" style="background:linear-gradient(90deg,'+h.color+'12,transparent)">'+
      '<span class="z-event-t" style="color:'+h.color+'">'+z.event.icon+' '+z.event.type.toUpperCase()+'</span>'+
      '<span class="z-event-c">'+z.event.time+'</span></div>';
    if(z.objective)s+='<div class="z-obj"><span style="font-size:11px">⭐</span><span class="z-obj-t">DAILY OBJECTIVE — ×1.5 PTS</span></div>';
    s+='<div class="z-body"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'+
      '<div><div class="z-name">'+z.name+'</div><div class="z-region" style="color:'+h.color+'">'+h.icon+' '+z.region+'</div></div>';
    if(z.contested)s+='<span class="z-badge contested">CONTESTED</span>';
    else if(z.streak>0)s+='<span class="z-badge held">HELD '+z.streak+'d</span>';
    s+='</div>';
    (z.guilds||[]).slice(0,3).forEach(function(g){
      s+='<div class="g-row"><div class="g-dot" style="background:'+g.color+'"></div>'+
        '<div class="g-name">'+g.name+'</div><div class="g-track"><div class="g-fill" style="width:'+g.pct+'%;background:linear-gradient(90deg,'+g.color+'90,'+g.color+'40)"></div></div>'+
        '<div class="g-pct" style="color:'+g.color+'">'+g.pct+'%</div></div>';
    });
    s+='<div class="z-bot"><div class="z-fx">';
    (z.effects||[]).forEach(function(e){var f=FX[e]||{c:'#888',i:'⬡'};
      s+='<span class="fx-pill" style="background:'+f.c+'12;color:'+f.c+';border:1px solid '+f.c+'20">'+f.i+' '+e+'</span>';});
    s+='</div><div class="z-cast">'+(z.casters||0)+' casters</div></div>';
    return s+'</div></div>';
  }

  // ═══ BATTLE VIEW ═══
  function battleHTML(z){
    var h=H[z.region_house]||{color:'#D4A64B',icon:'✨',name:'?'};
    var s='<div class="b-head" style="background:linear-gradient(180deg,'+h.color+'08,transparent)">'+
      '<button class="b-back" id="b-back">←</button><div style="flex:1">'+
      '<div class="z-name">'+z.name+'</div><div class="z-region" style="color:'+h.color+'">'+h.icon+' '+z.region+'</div></div>';
    if(z.event)s+='<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:'+h.color+';background:'+h.color+'12;padding:4px 10px;border-radius:6px;border:1px solid '+h.color+'25">'+z.event.icon+' '+z.event.time+'</div>';
    s+='</div>';
    // Arena
    s+='<div class="b-arena" id="b-arena" style="background:linear-gradient(180deg,'+h.color+'06,#08050f 40%,'+h.color+'04)"></div>';
    // Guild bars
    s+='<div class="b-guilds"><div style="font-family:JetBrains Mono,monospace;font-size:9px;color:#554E68;letter-spacing:1px;margin-bottom:8px">GUILD PRESENCE</div>';
    (z.guilds||[]).forEach(function(g){
      s+='<div class="b-guild-row"><div class="b-g-circ" style="border:2px solid '+g.color+';background:'+g.color+'15;color:'+g.color+'">'+g.short+'</div>'+
        '<div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:3px">'+
        '<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:#CCC5DB">'+g.name+'</span>'+
        '<span class="b-g-pct" style="color:'+g.color+'">'+g.pct+'%</span></div>'+
        '<div class="b-hp-track"><div class="b-hp-fill" style="width:'+g.pct+'%;background:linear-gradient(90deg,'+g.color+','+g.color+'60)"></div></div></div></div>';
    });
    s+='</div>';
    // Feed
    s+='<div class="feed-wrap"><div class="feed-title">LIVE BATTLE FEED</div><div id="feed-list"></div></div>';
    return s;
  }

  // ═══ BATTLE INIT ═══
  function initBattle(z){
    var arena=document.getElementById('b-arena');if(!arena)return;
    var hc=(H[z.region_house]||{color:'#D4A64B'}).color;
    var nines=z.deployed_nines||mockNines(8,z.guilds||[]);

    // Group by guild
    var groups={};
    nines.forEach(function(n){var gid=n.guild_id||0;
      if(!groups[gid])groups[gid]={nines:[],color:n.guild_color||'#888',name:n.guild_name||'?',short:n.guild_short||'??'};
      groups[gid].nines.push(n);});

    var gids=Object.keys(groups);var W=arena.clientWidth;var HH=arena.clientHeight;
    var gpos=[{x:0.18,y:0.35},{x:0.82,y:0.35},{x:0.18,y:0.7},{x:0.82,y:0.7},{x:0.5,y:0.22}];
    var positions=[];

    gids.forEach(function(gid,gi){
      var grp=groups[gid];var bp=gpos[gi%gpos.length];
      var bx=bp.x*W;var by=bp.y*HH;var flip=bp.x>0.5;

      // Guild label
      var lbl=document.createElement('div');
      lbl.style.cssText='position:absolute;z-index:10;font-family:JetBrains Mono,monospace;font-size:7px;font-weight:700;'+
        'color:'+grp.color+';background:'+grp.color+'15;padding:2px 6px;border-radius:3px;border:1px solid '+grp.color+'25;'+
        'left:'+(bx-18)+'px;top:'+(by-38)+'px;white-space:nowrap';
      lbl.textContent=grp.short;arena.appendChild(lbl);

      grp.nines.forEach(function(n,ni){
        var cfg=n.sprite_config||NineSprite.randomConfig(n.house,n.id*7+ni*13);
        if(n.equipped_card&&n.equipped_card.house){var sc2=NineSprite.HOUSE_COLORS[n.equipped_card.house];if(sc2)cfg.weapon.color=sc2;}
        var cv=NineSprite.createCanvas(cfg,2.5,flip);
        var ox=(ni%3-1)*26;var oy=Math.floor(ni/3)*28;
        cv.style.cssText='position:absolute;z-index:20;left:'+(bx+ox-12)+'px;top:'+(by+oy-12)+'px;'+
          'animation:spriteIdle '+(1.2+ni*0.12)+'s ease-in-out infinite;animation-delay:'+(ni*0.08)+'s;'+
          'filter:drop-shadow(0 0 3px '+(NineSprite.HOUSE_COLORS[n.house]||'#FFC800')+'40)';
        arena.appendChild(cv);

        // Name
        var nm=document.createElement('div');
        nm.style.cssText='position:absolute;z-index:25;font-family:JetBrains Mono,monospace;font-size:5px;'+
          'color:#fff;background:'+grp.color+'88;padding:1px 3px;border-radius:2px;white-space:nowrap;pointer-events:none;'+
          'left:'+(bx+ox-12)+'px;top:'+(by+oy+48)+'px';
        nm.textContent=n.name;arena.appendChild(nm);
        positions.push({nine:n,x:bx+ox,y:by+oy,cfg:cfg,flip:flip,guild:grp});
      });
    });

    combatLoop(arena,positions,z);
  }

  // ═══ COMBAT LOOP ═══
  function combatLoop(arena,pos,zone){
    if(pos.length<2)return;
    var vfx=new SpellVFX.Engine();
    var feedEl=document.getElementById('feed-list');
    var feeds=[];
    var nermEl=null;var nermTO=null;var lastNerm=0;

    var NERM={
      intro:["Everyone's here. This should be interesting.","Another cycle, another disaster.","Let the chaos commence."],
      cast:["Bold move.","Someone read the card instructions.","Interesting strategy."],
      kill:["DELETED.","That was personal.","Gone. Reduced to sparkles."],
      crit:["CRITICAL! 25% chance and they HIT it.","Ouch. That's a big one."],
      quiet:["...it's quiet. Too quiet.","Did everyone fall asleep?","Hello? Is this thing on?"],
      effective:["Super effective! Read the chart.","Type advantage — smart play."],
      resisted:["Barely a scratch. Bad matchup.","Resisted! Wrong target."]
    };

    function nerm(cat){
      var now=Date.now();if(now-lastNerm<6000)return;lastNerm=now;
      var qs=NERM[cat]||NERM.cast;var t=qs[Math.floor(Math.random()*qs.length)];
      if(nermEl)nermEl.remove();
      nermEl=document.createElement('div');nermEl.className='nerm-bubble';
      nermEl.innerHTML='<span style="font-size:14px">😼</span><span class="nerm-t">'+t+'</span>';
      arena.appendChild(nermEl);
      if(nermTO)clearTimeout(nermTO);
      nermTO=setTimeout(function(){if(nermEl){nermEl.remove();nermEl=null;}},5500);
    }

    function addFeed(txt,c){
      feeds.unshift({t:txt,c:c||'#CCC5DB',ts:Date.now()});
      if(feeds.length>5)feeds=feeds.slice(0,5);
      if(!feedEl)return;
      feedEl.innerHTML=feeds.map(function(e){
        var age=Math.floor((Date.now()-e.ts)/1000);var ts=age<60?age+'s':Math.floor(age/60)+'m';
        return '<div class="feed-entry"><div class="feed-dot" style="background:'+e.c+'"></div>'+
          '<div class="feed-txt">'+e.t+'</div><div class="feed-time">'+ts+'</div></div>';
      }).join('');
    }

    setTimeout(function(){nerm('intro');},800);

    // Spell fire loop
    var si=setInterval(function(){
      if(!document.getElementById('b-arena')){clearInterval(si);return;}
      var from=pos[Math.floor(Math.random()*pos.length)];
      var targets=pos.filter(function(p){return p.guild!==from.guild});
      if(targets.length===0)targets=pos.filter(function(p){return p!==from});
      if(targets.length===0)return;
      targets.sort(function(a,b){return(a.nine.hp||10)-(b.nine.hp||10)});
      var to=targets[0];

      var ch=(from.nine.equipped_card&&from.nine.equipped_card.house)||from.nine.house;
      var sn=vfx.fire(from.x,from.y,to.x,to.y,ch,function(){
        var dmg=from.nine.atk||5;
        var m=MATCHUPS[from.nine.house];var mt='n';
        if(m){if(m.s===to.nine.house)mt='s';else if(m.w===to.nine.house)mt='w';}
        if(mt==='s'){dmg=Math.round(dmg*1.3);vfx.spawnDmg(to.x,to.y-15,dmg,'crit');if(Math.random()<0.3)nerm('effective');}
        else if(mt==='w'){dmg=Math.round(dmg*0.8);vfx.spawnDmg(to.x,to.y-15,dmg,'damage');if(Math.random()<0.3)nerm('resisted');}
        else{vfx.spawnDmg(to.x,to.y-15,dmg,Math.random()<0.12?'crit':'damage');}
        to.nine.hp=Math.max(0,(to.nine.hp||10)-dmg);
        if(to.nine.hp<=0){to.nine.hp=to.nine.max_hp||24;if(Math.random()<0.4)nerm('kill');}
      });

      addFeed('<b style="color:'+from.guild.color+'">@'+from.nine.name+'</b> cast <span style="color:'+(H[ch]||{color:'#D4A64B'}).color+'">'+sn+'</span>',from.guild.color);
      if(Math.random()<0.1)nerm('cast');
    },850+Math.random()*500);

    // Quiet nerm
    var qi=setInterval(function(){if(!document.getElementById('b-arena')){clearInterval(qi);return;}if(Math.random()<0.15)nerm('quiet');},13000);

    // VFX animation
    function tick(){if(!document.getElementById('b-arena'))return;vfx.update();vfx.render(arena);requestAnimationFrame(tick);}
    requestAnimationFrame(tick);
  }

  // ═══ GUILD TAB ═══

    var s='<div style="padding:0 14px 80px"><div class="guild-hdr" style="background:linear-gradient(135deg,'+gc+'12,transparent);border:1px solid '+gc+'25">'+
      '<div class="guild-title" style="color:'+gc+'">'+g.name+'</div><div class="guild-meta">28 members · 4 zones held · Rank #1</div>'+
      '<div class="guild-stats"><div style="text-align:center"><div class="gs-val" style="color:#6acd8a">4</div><div class="gs-lbl">ZONES</div></div>'+
      '<div style="text-align:center"><div class="gs-val" style="color:#D4A64B">2</div><div class="gs-lbl">REGIONS</div></div>'+
      '<div style="text-align:center"><div class="gs-val" style="color:#F0ECF8">1,130</div><div class="gs-lbl">POWER</div></div></div></div>';
    s+='<div class="ga-title" style="margin-top:14px">GUILD ACTIVITY</div>';
    [{p:'BoltCaster',a:'cast Lightning Surge in Ember Wastes',r:'+45 influence',t:'2m'},
     {p:'StoneKing',a:'deployed to Ironveil Citadel',r:'WARD active',t:'5m'},
     {p:'EmberFox',a:'cast Ember Strike in Blackmoor Basin',r:'+30 influence',t:'8m'},
     {p:'SunWarden',a:'flipped Radiant Bastion',r:'+15 zone flip bonus',t:'12m'}
    ].forEach(function(a){
      s+='<div class="ga-row"><span style="font-size:12px">⚔️</span><div style="flex:1">'+
        '<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:#F0ECF8">@'+a.p+'</span> '+
        '<span style="font-family:JetBrains Mono,monospace;font-size:10px;color:#847C98">'+a.a+'</span>'+
        '<div style="font-family:JetBrains Mono,monospace;font-size:9px;color:#6acd8a;margin-top:2px">'+a.r+'</div></div>'+
        '<span style="font-family:JetBrains Mono,monospace;font-size:8px;color:#554E68">'+a.t+'</span></div>';
    });
    return s+'</div>';
  }

  // ═══ EVENTS ═══
  function bind(){
    document.querySelectorAll('.n-tab').forEach(function(t){t.onclick=function(){S.tab=t.dataset.tab;S.selZone=null;render();};});
    document.querySelectorAll('.z-card').forEach(function(c){c.onclick=function(){
      var id=parseInt(c.dataset.zid);S.selZone=S.zones.find(function(z){return z.id===id})||null;render();};});
    var bb=document.getElementById('b-back');if(bb)bb.onclick=function(){S.selZone=null;render();};
  }

  // ═══ GO ═══
  load();
  })();
  </script>
