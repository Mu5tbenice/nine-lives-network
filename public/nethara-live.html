  // ===== PIXI ARENA =====
  function initPixiArena() {
    const container = document.getElementById('arena-canvas');
    container.innerHTML = '';
    const navH = 52;

    const app = new PIXI.Application({
      width: window.innerWidth,
      height: window.innerHeight - navH,
      backgroundAlpha: 0,
      antialias: true,
      resolution: window.devicePixelRatio || 1,
      autoDensity: true,
    });

    container.appendChild(app.view);
    app.view.style.width = '100%';
    app.view.style.height = '100%';
    app.stage.sortableChildren = true;
    state.arenaApp = app;

    // Set biome background image
    setBiomeBackground(container);

    // Draw arena ground overlay (subtle grid over biome image)
    drawArenaGround(app);

    // Assign initial round positions so Nines spread out
    setTimeout(() => setRoundPositions(), 500);

    // V2: Periodically reassign positions since there are no round boundaries
    // Nines slowly drift to new spots every 20-30 seconds
    setInterval(() => {
      if (state.nines.size > 0) setRoundPositions();
    }, 25000);

    // Handle resize
    window.addEventListener('resize', () => {
      if (state.arenaApp) {
        state.arenaApp.renderer.resize(window.innerWidth, window.innerHeight - navH);
        drawArenaGround(state.arenaApp);
        state.arenaApp.stage.sortChildren();
      }
    });

    // ── IDLE ANIMATION TICKER ──
    // Wander + bob so Nines look alive
    app.ticker.add((delta) => {
      const time = performance.now() / 1000;
      state.nines.forEach((nine) => {
        if (nine.isAnimating) return; // don't interfere with attack/ko anims

        // BOB — gentle vertical oscillation
        const bob = Math.sin(time * 1.5 + nine.bobPhase) * 2;
        nine.spriteGroup.y = bob;

        // Subtle scale pulse
        const pulse = 1 + Math.sin(time * 2 + nine.bobPhase) * 0.015;
        nine.spriteGroup.scale.set(pulse, pulse);

        // REPOSITION — each Nine picks a new spot every ~25s
        // roundTarget is set by setRoundPositions() at round start
        if (nine.roundTarget) {
          const wx = nine.roundTarget.x - nine.container.x;
          const wy = nine.roundTarget.y - nine.container.y;
          const dist = Math.sqrt(wx*wx + wy*wy);
          if (dist > 2) {
            const speed = Math.min(0.8, dist * 0.008);
            const angle = Math.atan2(wy, wx);
            nine.container.x += Math.cos(angle) * speed;
            nine.container.y += Math.sin(angle) * speed;
            // Face direction of travel
            if (nine.spriteGroup && Math.abs(wx) > 1) {
              nine.spriteGroup.scale.x = wx > 0 ? 1 : -1;
            }
          }
        }
      });
    });
  }

  /** Set biome background image based on current zone's house */
  // ══════════════════════════════════════════════════════
  // ARENA PLATFORM IMAGE + POLYGON WALK ZONE
  // Each zone has its own arena_image_url and arena_polygon
  // stored in the zones table (added via Supabase).
  //
  // arena_image_url: public URL to platform image (PIXI sprite)
  // arena_polygon:   jsonb object { "points": [{x,y}...] } — 0-1 fractions of image size
  //                  the platform image — defines the walk zone.
  //
  // If a zone has no arena_image_url, sprites walk on the
  // existing ground ellipse (fallback).
  // ══════════════════════════════════════════════════════

  // Scale platform image to fit fully within the canvas (contain by height),
  // centered. The image is designed with visible surroundings — don't crop it.
  // On mobile where the image may be wider than screen, we allow touch panning.
  function fitArenaPlatform(sprite, tex, app) {
    const sw = app.screen.width;
    const sh = app.screen.height;
    // Fit by height so the full image is always visible vertically
    const scale = sh / tex.height;
    sprite.scale.set(scale);
    const scaledW = tex.width * scale;
    // Center horizontally — on wide screens shows full image with space on sides
    sprite.x = (sw - scaledW) / 2;
    sprite.y = 0;
    // Store pan limits for mobile drag
    sprite._minX = Math.min(0, sw - scaledW); // can't pan past right edge
    sprite._maxX = Math.max(0, sw - scaledW); // can't pan past left edge
    // Reset pan if image fits within screen
    if (scaledW <= sw) sprite.x = (sw - scaledW) / 2;
  }

  // ── MOBILE PAN (touch drag left/right on the canvas) ──
  (function setupArenaPan() {
    let touchStartX = 0;
    let spriteStartX = 0;
    let isPanning = false;

    const canvas = document.getElementById('arena-canvas');
    if (!canvas) return;

    canvas.addEventListener('touchstart', (e) => {
      const app = state.arenaApp;
      const sprite = app?.stage?.getChildByName('arena-platform');
      if (!sprite || sprite._minX === sprite._maxX) return; // image fits, no pan needed
      touchStartX = e.touches[0].clientX;
      spriteStartX = sprite.x;
      isPanning = true;
    }, { passive: true });

    canvas.addEventListener('touchmove', (e) => {
      if (!isPanning) return;
      const app = state.arenaApp;
      const sprite = app?.stage?.getChildByName('arena-platform');
      if (!sprite) return;
      const dx = e.touches[0].clientX - touchStartX;
      const newX = Math.max(sprite._minX, Math.min(sprite._maxX, spriteStartX + dx));
      sprite.x = newX;
      // Also shift all sprites by same amount so they stay over the platform
      state.nines.forEach(nine => {
        if (nine._basePlatformX === undefined) nine._basePlatformX = nine.container.x;
      });
    }, { passive: true });

    canvas.addEventListener('touchend', () => { isPanning = false; });
  })();

  // Convert a polygon point [{x,y} fractions] to canvas pixels
  function polyPointToCanvas(p, sprite, tex) {
    return {
      x: sprite.x + p.x * tex.width * sprite.scale.x,
      y: sprite.y + p.y * tex.height * sprite.scale.y,
    };
  }

  // Point-in-polygon test (ray casting)
  function isInsidePolygon(px, py, canvasPoly) {
    let inside = false;
    for (let i = 0, j = canvasPoly.length - 1; i < canvasPoly.length; j = i++) {
      const xi = canvasPoly[i].x, yi = canvasPoly[i].y;
      const xj = canvasPoly[j].x, yj = canvasPoly[j].y;
      const intersect = ((yi > py) !== (yj > py)) &&
        (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  // Clamp a point into the polygon by moving toward its centroid
  function clampToPolygon(px, py, canvasPoly) {
    if (isInsidePolygon(px, py, canvasPoly)) return { x: px, y: py };
    const cx = canvasPoly.reduce((s, p) => s + p.x, 0) / canvasPoly.length;
    const cy = canvasPoly.reduce((s, p) => s + p.y, 0) / canvasPoly.length;
    // Step toward centroid until inside
    for (let t = 0.05; t <= 1; t += 0.05) {
      const tx = px + (cx - px) * t;
      const ty = py + (cy - py) * t;
      if (isInsidePolygon(tx, ty, canvasPoly)) return { x: tx, y: ty };
    }
    return { x: cx, y: cy };
  }

  // Get the bounding box of the walk polygon (for random point generation)
  function polyBounds(canvasPoly) {
    const xs = canvasPoly.map(p => p.x);
    const ys = canvasPoly.map(p => p.y);
    return {
      minX: Math.min(...xs), maxX: Math.max(...xs),
      minY: Math.min(...ys), maxY: Math.max(...ys),
    };
  }

  // Random point inside polygon using rejection sampling
  function randomInsidePolygon(canvasPoly, tries = 40) {
    const b = polyBounds(canvasPoly);
    for (let i = 0; i < tries; i++) {
      const x = b.minX + Math.random() * (b.maxX - b.minX);
      const y = b.minY + Math.random() * (b.maxY - b.minY);
      if (isInsidePolygon(x, y, canvasPoly)) return { x, y };
    }
    // Fallback: centroid
    return {
      x: canvasPoly.reduce((s, p) => s + p.x, 0) / canvasPoly.length,
      y: canvasPoly.reduce((s, p) => s + p.y, 0) / canvasPoly.length,
    };
  }

  // Get the active canvas-space polygon for the current zone
  function getActiveCanvasPoly() {
    const app = state.arenaApp;
    const zone = state.currentZone;
    if (!app || !zone) return null;

    const raw = zone.arena_polygon; // { points: [{x,y}...] } stored in Supabase jsonb
    const poly = raw?.points || (Array.isArray(raw) ? raw : null);
    const sprite = app.stage.getChildByName('arena-platform');

    if (poly && poly.length >= 3 && sprite && sprite.texture) {
      const tex = sprite.texture;
      return poly.map(p => polyPointToCanvas(p, sprite, tex));
    }

    // Fallback: diamond polygon from ARENA_HALF_W/H constants
    const cx = app.screen.width / 2;
    const cy = app.screen.height / 2;
    return [
      { x: cx,                  y: cy - ARENA_HALF_H },
      { x: cx + ARENA_HALF_W,   y: cy },
      { x: cx,                  y: cy + ARENA_HALF_H },
      { x: cx - ARENA_HALF_W,   y: cy },
    ];
  }

  /** Assign each Nine a random position inside the walk polygon */
  function setRoundPositions() {
    const app = state.arenaApp;
    if (!app) return;
    const poly = getActiveCanvasPoly();
    if (!poly) return;

    state.nines.forEach((nine) => {
      const pos = randomInsidePolygon(poly);
      nine.roundTarget = pos;
    });
    console.log('🎯 Round positions assigned (polygon-based)');
  }

  function setBiomeBackground(container) {
    const imgUrl = getBiomeUrl(state.currentZone || {});
    const img = new Image();
    img.onload = () => {
      container.style.backgroundImage = `url('${imgUrl}')`;
    };
    img.onerror = () => {
      container.style.backgroundImage = `url('${BIOME_FALLBACK}')`;
    };
    img.src = imgUrl;

    // Load arena platform sprite from zone data
    const arenaUrl = state.currentZone?.arena_image_url;
    if (arenaUrl && state.arenaApp) {
      loadArenaPlatformSprite(state.arenaApp, arenaUrl);
    }
  }

  function loadArenaPlatformSprite(app, url) {
    // Remove old platform sprite
    const oldSprite = app.stage.getChildByName('arena-platform');
    if (oldSprite) app.stage.removeChild(oldSprite);

    try {
      const tex = PIXI.Texture.from(url);
      const sprite = new PIXI.Sprite(tex);
      sprite.name = 'arena-platform';
      sprite.zIndex = 1; // above biome CSS bg, BELOW Nine sprites (z10+)

      const doFit = () => fitArenaPlatform(sprite, tex, app);

      tex.baseTexture.on('loaded', () => {
        doFit();
        app.stage.addChildAt(sprite, 0);
        app.stage.sortChildren();
        // Reassign positions now that polygon is renderable
        setRoundPositions();
        console.log('🏟️ Arena platform loaded:', url);
      });

      // Refit on resize
      app.renderer.on('resize', () => {
        if (sprite.parent) doFit();
      });
    } catch(e) {
      console.warn('Arena platform load failed:', e);
    }
  }

  function drawArenaGround(app) {
    ['ground','environment','fog'].forEach(function(n){
      const e = app.stage.getChildByName(n); if(e) app.stage.removeChild(e);
    });

    // If this zone has a platform image, skip the ground ellipse —
    // the polygon defines the walk zone and the image IS the floor.
    if (state.currentZone?.arena_image_url) return;

    const cx = app.screen.width / 2;
    const cy = app.screen.height / 2;
    const hKey = state.currentZone?.house
      || state.currentZone?.region_house
      || SCHOOL_TO_HOUSE[state.currentZone?.controlling_school_id]
      || SCHOOL_TO_HOUSE[state.currentZone?.school_id] || null;

    const themes = {
      smoulders:   { accent: 0xe85a6a, glow: 0xff4422, particle: 0xff6644 },
      darktide:    { accent: 0x6ac8d8, glow: 0x00B4D8, particle: 0x00d4ff },
      stonebark:   { accent: 0x6acd8a, glow: 0x5CB338, particle: 0x88ee44 },
      ashenvale:   { accent: 0xb0c4de, glow: 0x90E0EF, particle: 0xaaddff },
      stormrage:   { accent: 0xFFC800, glow: 0xffaa00, particle: 0xffee00 },
      nighthollow: { accent: 0xb088e8, glow: 0x7B2D8E, particle: 0xcc88ff },
      dawnbringer: { accent: 0xffb347, glow: 0xFF8C00, particle: 0xffdd88 },
      manastorm:   { accent: 0x5B8FE0, glow: 0x3366cc, particle: 0x88aaff },
      plaguemire:  { accent: 0xE84393, glow: 0xcc2266, particle: 0xff66aa },
    };
    const t = themes[hKey] || themes.nighthollow;

    const ground = new PIXI.Graphics();
    ground.name = 'ground';

    const pW = Math.min(app.screen.width * 0.72, 520);
    const pH = pW * 0.28;
    const pY = cy + app.screen.height * 0.18;

    for (let i = 5; i >= 1; i--) {
      ground.beginFill(t.glow, 0.015 * i);
      ground.drawEllipse(cx, pY, pW * 0.5 + i * 8, pH * 0.5 + i * 4);
      ground.endFill();
    }

    ground.beginFill(0x0a0814, 0.85);
    ground.drawEllipse(cx, pY, pW * 0.5, pH * 0.5);
    ground.endFill();

    ground.lineStyle(1, t.accent, 0.12);
    ground.drawEllipse(cx, pY, pW * 0.5, pH * 0.5);
    ground.lineStyle(1, t.accent, 0.07);
    ground.drawEllipse(cx, pY, pW * 0.38, pH * 0.38);
    ground.lineStyle(1, t.accent, 0.04);
    ground.drawEllipse(cx, pY, pW * 0.22, pH * 0.22);
    ground.lineStyle(0);

    ground.beginFill(t.accent, 0.06);
    ground.drawEllipse(cx, pY - pH * 0.08, pW * 0.48, pH * 0.18);
    ground.endFill();

    ground.beginFill(0x000000, 0.4);
    ground.drawEllipse(cx, pY + pH * 0.52, pW * 0.46, pH * 0.18);
    ground.endFill();

    app.stage.addChild(ground);

    const env = new PIXI.Container();
    env.name = 'environment';
    const particles = [];
    const COUNT = 22;

    for (let i = 0; i < COUNT; i++) {
      const g = new PIXI.Graphics();
      const size = 1.5 + Math.random() * 2.5;
      g.beginFill(t.particle, 0.6 + Math.random() * 0.4);
      g.drawCircle(0, 0, size);
      g.endFill();
      const angle = Math.random() * Math.PI * 2;
      const radius = pW * (0.15 + Math.random() * 0.45);
      g.x = cx + Math.cos(angle) * radius;
      g.y = pY + Math.sin(angle) * radius * 0.35;
      g.alpha = 0.3 + Math.random() * 0.5;
      particles.push({
        sprite: g, life: Math.random(),
        speed: 0.003 + Math.random() * 0.005,
        originX: cx, originY: pY, radius, angle,
        drift: (Math.random() - 0.5) * 0.008
      });
      env.addChild(g);
    }

    app.ticker.add(function() {
      particles.forEach(function(p) {
        p.life += p.speed;
        p.angle += p.drift;
        const r = p.radius * (0.85 + Math.sin(p.life * 2) * 0.15);
        p.sprite.x = p.originX + Math.cos(p.angle) * r;
        p.sprite.y = p.originY + Math.sin(p.life * 1.5) * pH * 0.4 - p.life * 18;
        p.sprite.alpha = Math.max(0, 0.6 * (1 - (p.life % 1)));
        if (p.life > 1) { p.life = 0; p.angle = Math.random() * Math.PI * 2; }
      });
    });

    app.stage.addChild(env);

  function startAmbientParticles(app, theme) {
    // Remove old ambient ticker if any
    if (state._ambientTicker) {
      app.ticker.remove(state._ambientTicker);
    }
    if (state._ambientParticles) {
      state._ambientParticles.forEach(p => {
        if (p.gfx && p.gfx.parent) p.gfx.parent.removeChild(p.gfx);
      });
    }

    const particles = [];
    const count = 25;
    const cx = app.screen.width / 2;
    const cy = app.screen.height / 2;

    for (let i = 0; i < count; i++) {
      const p = new PIXI.Graphics();
      const size = 1 + Math.random() * 2.5;

      if (theme.ambientType === 'embers') {
        p.beginFill(Math.random() > 0.5 ? 0xff6633 : 0xffaa44, 0.6);
        p.moveTo(0, -size); p.lineTo(-size * 0.5, size * 0.3); p.lineTo(size * 0.5, size * 0.3);
        p.closePath();
        p.endFill();
      } else if (theme.ambientType === 'bubbles') {
        p.lineStyle(0.5, 0x00ccff, 0.4);
        p.drawCircle(0, 0, size);
      } else if (theme.ambientType === 'leaves') {
        p.beginFill(Math.random() > 0.5 ? 0x44bb33 : 0x88cc44, 0.4);
        p.drawEllipse(0, 0, size * 1.5, size * 0.5);
        p.endFill();
      } else if (theme.ambientType === 'sparks') {
        p.beginFill(0xffdd00, 0.7);
        p.drawCircle(0, 0, size * 0.5);
        p.endFill();
      } else if (theme.ambientType === 'wisps') {
        p.beginFill(0xbb88ff, 0.4);
        p.drawCircle(0, 0, size);
        p.endFill();
      } else if (theme.ambientType === 'crystals') {
        p.beginFill(0x6699ee, 0.5);
        p.moveTo(0, -size); p.lineTo(size * 0.7, 0); p.lineTo(0, size); p.lineTo(-size * 0.7, 0);
        p.closePath();
        p.endFill();
      } else if (theme.ambientType === 'miasma') {
        p.beginFill(0xcc44aa, 0.3);
        p.drawCircle(0, 0, size * 1.5);
        p.endFill();
      } else {
        // Default: generic dust
        p.beginFill(theme.accent, 0.3);
        p.drawCircle(0, 0, size);
        p.endFill();
      }

      p.x = Math.random() * app.screen.width;
      p.y = Math.random() * app.screen.height;
      p.zIndex = -2;
      app.stage.addChild(p);

      particles.push({
        gfx: p,
        vx: (Math.random() - 0.5) * 0.4,
        vy: theme.ambientType === 'embers' ? -(0.2 + Math.random() * 0.5) :
            theme.ambientType === 'bubbles' ? -(0.1 + Math.random() * 0.3) :
            (Math.random() - 0.5) * 0.3,
        phase: Math.random() * Math.PI * 2,
        speed: 0.3 + Math.random() * 0.5,
      });
    }

    state._ambientParticles = particles;

    const ticker = (delta) => {
      const time = performance.now() / 1000;
      for (const p of particles) {
        p.gfx.x += p.vx * delta;
        p.gfx.y += p.vy * delta;
        // Gentle horizontal sway
        p.gfx.x += Math.sin(time * p.speed + p.phase) * 0.3;
        // Gentle alpha pulse
        p.gfx.alpha = 0.2 + Math.sin(time * 0.8 + p.phase) * 0.15;

        // Wrap around screen
        if (p.gfx.x < -20) p.gfx.x = app.screen.width + 20;
        if (p.gfx.x > app.screen.width + 20) p.gfx.x = -20;
        if (p.gfx.y < -20) p.gfx.y = app.screen.height + 20;
        if (p.gfx.y > app.screen.height + 20) p.gfx.y = -20;
      }
    };

    state._ambientTicker = ticker;
    app.ticker.add(ticker);
  }

  // ===== NINE SPRITES — LAYERED ITEM RENDERING =====
  // Layer order matches builder: fur → outfit → weapon → expression → headwear → familiar
  const ITEM_LAYER_ORDER = ['fur', 'outfit', 'weapon', 'expression', 'headwear', 'familiar'];
  const SPRITE_SIZE = 48; // px — adjust if too big/small on arena

  function addNineSprite(nine) {
    if (!state.arenaApp) return;
    const app = state.arenaApp;

    const container = new PIXI.Container();
    container.x = nine.position.x;
    container.y = nine.position.y;
    container.sortableChildren = true;

    const h = HOUSES[nine.house] || { color: '#888' };
    const hColor = parseInt(h.color.replace('#', ''), 16);

    // House-colored ground ring
    const ring = new PIXI.Graphics();
    ring.lineStyle(2, hColor, 0.6);
    ring.drawEllipse(0, 18, 14, 6);
    ring.zIndex = 0;
    container.addChild(ring);

    // Soft house glow behind sprite
    const glow = new PIXI.Graphics();
    glow.beginFill(hColor, 0.06);
    glow.drawCircle(0, 0, 22);
    glow.endFill();
    glow.zIndex = 0;
    container.addChild(glow);

    // Sprite container for item layers (or fallback)
    const spriteGroup = new PIXI.Container();
    spriteGroup.sortableChildren = true;
    spriteGroup.zIndex = 1;

    // Try to load equipped item images as layers
    const images = nine.equipped_images || {};
    let hasAnyImage = false;

    ITEM_LAYER_ORDER.forEach(function(slot, index) {
      const imgPath = images[slot];
      if (!imgPath) return;
      hasAnyImage = true;

      try {
        const texture = PIXI.Texture.from(imgPath);
        const sprite = new PIXI.Sprite(texture);
        sprite.anchor.set(0.5, 0.6);
        sprite.width = SPRITE_SIZE;
        sprite.height = SPRITE_SIZE;
        sprite.zIndex = index + 1;
        spriteGroup.addChild(sprite);

        // Remove layer if image fails to load
        if (texture.baseTexture) {
          texture.baseTexture.on('error', function() {
            if (spriteGroup.children.includes(sprite)) {
              spriteGroup.removeChild(sprite);
            }
          });
        }
      } catch(e) {
        console.warn('Failed to load sprite layer:', slot, imgPath);
      }
    });

    // Fallback: if no item images, draw classic circle+ears sprite
    if (!hasAnyImage) {
      const body = new PIXI.Graphics();
      body.beginFill(hColor, 0.8);
      body.drawCircle(0, 0, 12);
      body.endFill();
      body.beginFill(hColor);
      body.moveTo(-8, -10); body.lineTo(-4, -18); body.lineTo(0, -10);
      body.moveTo(0, -10); body.lineTo(4, -18); body.lineTo(8, -10);
      body.endFill();
      body.beginFill(0x000000);
      body.drawCircle(-4, -2, 2);
      body.drawCircle(4, -2, 2);
      body.endFill();
      body.zIndex = 1;
      spriteGroup.addChild(body);
    }

    container.addChild(spriteGroup);

    // Name label
    const nameStyle = new PIXI.TextStyle({
      fontFamily: 'monospace', fontSize: 8, fill: 0xF0ECF8,
      dropShadow: true, dropShadowColor: 0x000000, dropShadowDistance: 1,
    });
    const nameText = new PIXI.Text(nine.name || '???', nameStyle);
    nameText.anchor.set(0.5, 1);
    nameText.y = hasAnyImage ? -28 : -24;
    nameText.zIndex = 3;
    container.addChild(nameText);

    // HP bar background
    const hpBg = new PIXI.Graphics();
    hpBg.beginFill(0x222222, 0.8);
    hpBg.drawRoundedRect(-16, 22, 32, 4, 2);
    hpBg.endFill();
    hpBg.zIndex = 2;
    container.addChild(hpBg);

    // HP bar fill
    const hpFill = new PIXI.Graphics();
    hpFill.beginFill(0x44cc88);
    hpFill.drawRoundedRect(-16, 22, 32, 4, 2);
    hpFill.endFill();
    hpFill.zIndex = 2;
    container.addChild(hpFill);

    app.stage.addChild(container);
    container.zIndex = 10; // always above arena-platform (zIndex 1)

    // Initial facing: left-side sprites face right, right-side sprites face left
    const cx = app.screen.width / 2;
    if (spriteGroup) spriteGroup.scale.x = nine.position.x < cx ? 1 : -1;

    state.nines.set(nine.id, {
      container, spriteGroup, hpFill, hpBg, nameText, ring, glow,
      hp: nine.current_hp || nine.max_hp || 100,
      maxHp: nine.max_hp || 100,
      stats: nine.stats || {},
      name: nine.name || '???',
      guild: nine.guild_id || nine.guild_name || '???',
      house: nine.house || 'universal',
      homeX: nine.position.x, homeY: nine.position.y,
      targetX: nine.position.x, targetY: nine.position.y,
      bobPhase: Math.random() * Math.PI * 2,
      isAnimating: false,
    });

    // Set initial HP bar
    updateNineHP(nine.id, nine.current_hp || nine.max_hp || 100, nine.max_hp || 100);
  }

  function updateNineHP(nineId, hp, maxHp) {
    const sprite = state.nines.get(nineId);
    if (!sprite) return;
    if (maxHp != null) sprite.maxHp = maxHp;
    sprite.hp = hp;
    const mhp = sprite.maxHp || 100;
    const pct = Math.max(0, hp / mhp);
    sprite.hpFill.clear();
    const color = pct > 0.5 ? 0x44cc88 : pct > 0.25 ? 0xffaa55 : 0xff4466;
    sprite.hpFill.beginFill(color);
    sprite.hpFill.drawRoundedRect(-16, 22, 32 * pct, 4, 2);
    sprite.hpFill.endFill();

    // Always update Your Nine panel if this is the player
    if (nineId === state.playerId) {
      const fill = document.getElementById('your-hp-fill');
      const text = document.getElementById('your-hp-text');
      if (fill) {
        fill.style.width = `${pct * 100}%`;
        fill.style.background = pct > 0.5 ? 'var(--green)' : pct > 0.25 ? 'var(--gold)' : 'var(--red)';
        fill.style.transition = 'width 0.4s ease, background 0.4s ease';
      }
      if (text) text.textContent = `${hp}/${mhp}`;
    }
  }

  function removeNineSprite(nineId) {
    const sprite = state.nines.get(nineId);
    if (!sprite || !state.arenaApp) return;
    state.arenaApp.stage.removeChild(sprite.container);
    state.nines.delete(nineId);
  }

  function showFloatingText(x, y, text, color = 0xff4466, size = 12) {
    if (!state.arenaApp) return;
    const style = new PIXI.TextStyle({
      fontFamily: "'Press Start 2P', monospace", fontSize: size, fill: color, fontWeight: '700',
      dropShadow: true, dropShadowColor: 0x000000, dropShadowDistance: 2, dropShadowBlur: 2,
      stroke: 0x000000, strokeThickness: 3,
    });
    const t = new PIXI.Text(text, style);
    t.anchor.set(0.5);
    const arcDir = (Math.random() > 0.5 ? 1 : -1);
    const arcAmount = 20 + Math.random() * 25;
    t.x = x + (Math.random() - 0.5) * 16;
    t.y = y - 20;
    t.zIndex = 100;
    state.arenaApp.stage.addChild(t);

    let frame = 0;
    const totalFrames = 120;
    const startX = t.x;
    const startY = t.y;
    const startScale = 1.4;
    const ticker = () => {
      frame++;
      const p = frame / totalFrames;
      // Arc: rise up + curve sideways using sine
      t.y = startY - p * 40;
      t.x = startX + Math.sin(p * Math.PI) * arcAmount * arcDir;
      t.alpha = p < 0.4 ? 1 : Math.max(0, 1 - (p - 0.4) / 0.6);
      const scale = startScale - (startScale - 0.7) * p;
      t.scale.set(scale, scale);
      if (frame >= totalFrames) {
        state.arenaApp.ticker.remove(ticker);
        state.arenaApp.stage.removeChild(t);
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  // ═══════════════════════════════════════════
  // COMBAT ANIMATION SYSTEM

  /** Animate a Nine lunging toward a target position, then returning */
  function animateLunge(attackerId, targetId, onHit) {
    const attacker = state.nines.get(attackerId);
    const target = state.nines.get(targetId);
    if (!attacker || !target || !state.arenaApp) {
      if (onHit) onHit();
      return;
    }

    attacker.isAnimating = true;
    const startX = attacker.container.x;
    const startY = attacker.container.y;
    const targetX = target.container.x;
    const targetY = target.container.y;

    // Flip sprite to face target direction
    const facingLeft = targetX < startX;
    attacker.spriteGroup.scale.x = facingLeft ? -1 : 1;

    // Move 70% toward target (not all the way — stop just short)
    const dx = (targetX - startX) * 0.7;
    const dy = (targetY - startY) * 0.7;

    let frame = 0;
    const lungeFrames = 16; // lunge forward
    const holdFrames = 10;  // hold at target (was 6)
    const returnFrames = 20; // slower return (was 16)
    const totalFrames = lungeFrames + holdFrames + returnFrames;

    const ticker = () => {
      frame++;

      if (frame <= lungeFrames) {
        // Lunge forward (ease-in)
        const t = frame / lungeFrames;
        const ease = t * t; // accelerate
        attacker.container.x = startX + dx * ease;
        attacker.container.y = startY + dy * ease;
        // Lean forward
        attacker.spriteGroup.rotation = Math.atan2(dy, dx) * 0.15 * (facingLeft ? -1 : 1);
        // Scale up slightly for impact feel (preserve flip)
        const scaleAmt = 1 + t * 0.15;
        attacker.spriteGroup.scale.set(facingLeft ? -scaleAmt : scaleAmt, scaleAmt);

      } else if (frame === lungeFrames + 1) {
        // HIT MOMENT — trigger damage, particles, screen shake
        if (onHit) onHit();
        // Shake the target
        shakeSprite(target);
        // Camera shake (subtle)
        shakeCamera();

      } else if (frame <= lungeFrames + holdFrames) {
        // Hold position

      } else {
        // Return to home (ease-out)
        const t = (frame - lungeFrames - holdFrames) / returnFrames;
        const ease = 1 - (1 - t) * (1 - t); // decelerate
        attacker.container.x = startX + dx * (1 - ease);
        attacker.container.y = startY + dy * (1 - ease);
        attacker.spriteGroup.rotation *= 0.85; // straighten up
        const scale = 1.15 - 0.15 * ease;
        attacker.spriteGroup.scale.set(facingLeft ? -scale : scale, scale);
      }

      if (frame >= totalFrames) {
        state.arenaApp.ticker.remove(ticker);
        attacker.container.x = startX;
        attacker.container.y = startY;
        attacker.spriteGroup.rotation = 0;
        attacker.spriteGroup.scale.set(1, 1); // reset flip + scale
        attacker.isAnimating = false;
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  /** Shake a sprite briefly on hit */
  function shakeSprite(nine) {
    if (!nine || !state.arenaApp) return;
    nine.isAnimating = true;
    const origX = nine.container.x;
    let frame = 0;
    const ticker = () => {
      frame++;
      const intensity = Math.max(0, 5 - frame * 0.5);
      nine.container.x = origX + (Math.random() - 0.5) * intensity;
      if (frame >= 10) {
        state.arenaApp.ticker.remove(ticker);
        nine.container.x = origX;
        nine.isAnimating = false;
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  /** Subtle camera shake on big hits */
  function shakeCamera() {
    if (!state.arenaApp) return;
    const stage = state.arenaApp.stage;
    const origX = stage.x, origY = stage.y;
    let frame = 0;
    const ticker = () => {
      frame++;
      const intensity = Math.max(0, 3 - frame * 0.4);
      stage.x = origX + (Math.random() - 0.5) * intensity;
      stage.y = origY + (Math.random() - 0.5) * intensity;
      if (frame >= 8) {
        state.arenaApp.ticker.remove(ticker);
        stage.x = origX;
        stage.y = origY;
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  /** Spawn FLASHY particle burst — bigger, louder, more pixelated */
  function spawnParticles(x, y, color, count, type) {
    if (!state.arenaApp) return;
    const particles = [];
    // Boost count slightly
    const boostedCount = Math.round(count * 1.5);

    for (let i = 0; i < boostedCount; i++) {
      const p = new PIXI.Graphics();
      const particleColor = typeof color === 'number' ? color : 0xffffff;

      if (type === 'fire') {
        // Fire: chunky pixel squares that flicker
        const s = 2 + Math.random() * 4;
        p.beginFill(particleColor, 0.95);
        p.drawRect(-s/2, -s/2, s, s); // pixel squares, not triangles
        p.endFill();
        // Inner bright core
        p.beginFill(0xffffff, 0.5);
        p.drawRect(-s/4, -s/4, s/2, s/2);
        p.endFill();
      } else if (type === 'explosion') {
        // BIG explosion chunks
        const s = 3 + Math.random() * 6;
        p.beginFill(particleColor, 0.9);
        p.drawRect(-s/2, -s/2, s, s);
        p.endFill();
        p.beginFill(0xffffff, 0.7);
        p.drawRect(-1, -1, 2, 2);
        p.endFill();
      } else if (type === 'poison') {
        // Poison: bubbling pixel circles
        const s = 2 + Math.random() * 3;
        p.beginFill(particleColor, 0.85);
        p.drawRect(-s/2, -s/2, s, s);
        p.endFill();
      } else if (type === 'heal') {
        // Heal: sparkle plus signs, bigger
        const s = 2 + Math.random() * 3;
        p.beginFill(particleColor, 0.9);
        p.drawRect(-s, -1, s * 2, 2);
        p.drawRect(-1, -s, 2, s * 2);
        p.endFill();
        p.beginFill(0xffffff, 0.4);
        p.drawRect(-1, -1, 2, 2);
        p.endFill();
      } else if (type === 'shield') {
        // Shield: hex segments + sparkle
        const s = 2 + Math.random() * 3;
        p.lineStyle(2, particleColor, 0.85);
        const angle = Math.random() * Math.PI * 2;
        p.arc(0, 0, 18 + Math.random() * 8, angle, angle + 0.6);
        // Inner sparkle
        p.beginFill(0xffffff, 0.3);
        p.drawRect(-1, -1, 2, 2);
        p.endFill();
      } else if (type === 'lightning') {
        // Lightning: jagged pixel bolts, bigger
        p.lineStyle(2, particleColor, 0.95);
        const segs = 4;
        let px = 0, py = 0;
        for (let s = 0; s < segs; s++) {
          const nx = px + (Math.random() - 0.5) * 12;
          const ny = py + 3 + Math.random() * 5;
          p.moveTo(px, py);
          p.lineTo(nx, ny);
          px = nx; py = ny;
        }
        // White flash core
        p.lineStyle(1, 0xffffff, 0.6);
        p.moveTo(0, 0);
        p.lineTo((Math.random()-0.5)*8, 6+Math.random()*4);
      } else {
        // Default: pixel squares
        const s = 2 + Math.random() * 3;
        p.beginFill(particleColor, 0.85);
        p.drawRect(-s/2, -s/2, s, s);
        p.endFill();
      }

      // Wider initial spread
      p.x = x + (Math.random() - 0.5) * 36;
      p.y = y + (Math.random() - 0.5) * 28;
      p.zIndex = 99;
      state.arenaApp.stage.addChild(p);

      const speed = type === 'explosion' ? 5 : 3.5;
      particles.push({
        gfx: p,
        vx: (Math.random() - 0.5) * speed,
        vy: type === 'heal' ? -(1.5 + Math.random() * 2.5) :
            type === 'fire' ? -(Math.random() * 2) :
            (Math.random() - 0.5) * speed,
        life: 55 + Math.random() * 35,
        frame: 0,
        spin: (Math.random() - 0.5) * 0.25,
      });
    }

    const ticker = () => {
      let allDone = true;
      for (const p of particles) {
        p.frame++;
        p.gfx.x += p.vx;
        p.gfx.y += p.vy;
        p.gfx.rotation += p.spin;
        if (type === 'fire') p.vy -= 0.18;
        if (type === 'explosion') { p.vy += 0.1; p.vx *= 0.97; }
        if (type === 'poison') p.vy -= 0.1;
        p.gfx.alpha = Math.max(0, 1 - p.frame / p.life);
        const shrink = Math.max(0.1, 1 - p.frame / p.life * 0.6);
        p.gfx.scale.set(shrink);
        if (p.frame < p.life) allDone = false;
      }
      if (allDone) {
        state.arenaApp.ticker.remove(ticker);
        for (const p of particles) state.arenaApp.stage.removeChild(p.gfx);
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  /** SCREEN FLASH — full viewport white/color flash on big hits */
  function screenFlash(color, alpha) {
    if (!state.arenaApp) return;
    const flash = new PIXI.Graphics();
    flash.beginFill(color || 0xffffff, alpha || 0.3);
    flash.drawRect(0, 0, state.arenaApp.screen.width, state.arenaApp.screen.height);
    flash.endFill();
    flash.zIndex = 200;
    state.arenaApp.stage.addChild(flash);
    let frame = 0;
    const ticker = () => {
      frame++;
      flash.alpha = Math.max(0, (alpha || 0.3) - frame * 0.05);
      if (flash.alpha <= 0) {
        state.arenaApp.ticker.remove(ticker);
        state.arenaApp.stage.removeChild(flash);
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  /** Animate a KO — spin, shrink, fade */
  function animateKO(nineIdOrSprite) {
    const nine = (typeof nineIdOrSprite === 'object') ? nineIdOrSprite : state.nines.get(nineIdOrSprite);
    if (!nine || !state.arenaApp) return;
    nine.isAnimating = true;

    const startX = nine.container.x;
    const startY = nine.container.y;
    let frame = 0;
    const totalFrames = 65; // ~1 second (was 45)

    // Red flash
    if (nine.spriteGroup) {
      nine.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xff2222; });
    }

    // Big firework explosion
    spawnParticles(startX, startY, 0xff4466, 18, 'fire');
    spawnFireworkExplosion(startX, startY, 0xff4466);

    const ticker = () => {
      frame++;
      const t = frame / totalFrames;

      // Spin
      nine.spriteGroup.rotation = t * Math.PI * 3;
      // Shrink
      const scale = Math.max(0, 1 - t);
      nine.spriteGroup.scale.set(scale, scale);
      // Fade
      nine.container.alpha = Math.max(0.15, 1 - t);
      // Rise slightly
      nine.container.y = startY - t * 15;

      if (frame >= totalFrames) {
        state.arenaApp.ticker.remove(ticker);
        nine.spriteGroup.rotation = 0;
        nine.spriteGroup.scale.set(0.3, 0.3);
        nine.container.alpha = 0.15;
        nine.container.y = startY;
        nine.isAnimating = false;
      }
    };
    state.arenaApp.ticker.add(ticker);
  }

  // ===== SOCKET.IO =====
  function connectArenaSocket(zoneId) {
    const socket = io('/arena', { transports: ['websocket', 'polling'] });
    state.socket = socket;

    socket.on('connect', () => {
      socket.emit('join_zone', { zoneId });
      addFeedEvent('Connected to arena', 'system');
    });

    // Current state (on first join) — engine sends snapshot with combat positions
    socket.on('arena:state', (data) => {
      if (data.snapshot) {
        for (const nine of data.snapshot) {
          if (state.nines.has(nine.id)) {
            updateNineHP(nine.id, nine.current_hp, nine.max_hp);
          } else {
            nine.position = engineToScreen(nine.position);
            addNineSprite(nine);
          }
        }
        updateHpStrip();
      }
      if (data.round) updateRoundBadge(data.round, data.cycle);
      if (data.active) addFeedEvent('⚔️ Combat is active!', 'system');

      // Sync countdown timing from server
      if (data.next_cycle_at) {
        state.cycleEndTime = data.next_cycle_at;
      } else if (data.cycle_interval_ms) {
        state.cycleEndTime = Date.now() + data.cycle_interval_ms;
      } else if (!state.cycleEndTime) {
        // Default 5 min if server doesn't send timing
        state.cycleEndTime = Date.now() + 5 * 60 * 1000;
      }
      if (data.cycle) state.currentCycle = data.cycle;
      updateCountdownDisplay();
    });

    // New Nine joins mid-battle
    socket.on('arena:nine_joined', (data) => {
      if (!state.nines.has(data.nine_id)) {
        addNineSprite({
          id: data.nine_id,
          name: data.player_name,
          house: data.house,
          guild_id: data.guild_id,
          guild_name: data.guild,
          current_hp: data.stats?.hp || 10,
          max_hp: data.stats?.hp || 10,
          position: engineToScreen(data.position),
          stats: data.stats || {},
          equipped_images: data.equipped_images || {},
        });
      }
      addFeedEvent(`${data.player_name} entered the arena`, 'join');
    });

    // Nine leaves
    socket.on('arena:nine_left', (data) => {
      removeNineSprite(data.nine_id);
    });

    // ── V2 CONTINUOUS COMBAT ──────────────────────
    // Combat ticks every 2 seconds. Events stream continuously.
    // All 3 cards are active at once (no waves/rounds).
    // 15-minute snapshots score zone control.

    // ── TICK EVENTS — V2 combat engine sends events every 2s
    socket.on('arena:tick', (data) => {
      if (!data.events || data.events.length === 0) return;
      state.isFighting = true;

      // Stagger events slightly so animations don't all fire at once
      data.events.forEach((ev, i) => {
        setTimeout(() => processArenaEvent(ev), i * 300);
      });

      // Sync HP state + contribution/cooldown data
      if (data.state) {
        for (const nine of data.state) {
          const nineId = resolveNineId(nine);
          if (state.nines.has(nineId)) {
            updateNineHP(nineId, nine.hp, nine.maxHp);
            const sprite = state.nines.get(nineId);
            if (sprite) sprite.container.alpha = nine.isAlive ? 1 : 0.15;
          }
        }
        // Update guild dominance in top bar
        updateGuildDominance(data.state);
        // Update contribution panel
        updateContributions(data.state);
        // Update spell cooldown for the local player
        const myId = state.playerId;
        const myState = data.state.find(n => String(n.id) === String(myId));
        if (myState && myState.spellReady != null) {
          updateCardCooldowns(myState.spellReady);
        }
      }
    });

    // ── SNAPSHOT — 15-minute zone control scoring
    socket.on('arena:snapshot', (data) => {
      const winner = data.winner_guild || 'No winner';
      state.snapshotCount = (state.snapshotCount || 0) + 1;
      console.log('📸 SNAPSHOT:', data);
      showRoundBanner('ZONE SCORED', `${winner} controls zone`);
      addFeedEvent(`📸 15-min snapshot — ${winner} controls zone!`, 'system');
      nermRoundComment('cycle_end', data);

      if (data.guild_scores || data.guild_power) {
        state.guildScores = data.guild_scores || data.guild_power;
        updateScoreboard();
      }

      // Set next snapshot timer
      if (data.next_snapshot_at) {
        state.cycleEndTime = data.next_snapshot_at;
      } else {
        state.cycleEndTime = Date.now() + 15 * 60 * 1000;
      }
      updateCountdownDisplay();

      // Refresh deployment data
      if (state.currentZoneId) {
        loadZoneNines(state.currentZoneId);
        checkDeployment(state.currentZoneId);
      }
    });

    // ── KO EVENT — Nine knocked out of zone
    socket.on('arena:ko', (data) => {
      const nineId = resolveId(data.nine_id || data.target);
      const sprite = state.nines.get(nineId);
      if (sprite) {
        animateKO(sprite);
        showFloatingText(sprite.container.x, sprite.container.y, 'KO!', 0xff4466, 20);
        addFeedEvent(`💀 ${data.name || 'A Nine'} was knocked out!`, 'ko');
      }
      // If YOUR Nine got KO'd, show rejoin UI after cooldown
      if (nineId == state.playerId) {
        state.isDeployed = false;
        document.getElementById('arena-bottom-tray').style.display = 'none';
        addFeedEvent('⏳ You were KO\'d! Rejoin in 60 seconds...', 'system');
        setTimeout(() => {
          document.getElementById('deploy-cta').style.display = 'block';
          addFeedEvent('✅ Cooldown expired — rejoin the battle!', 'system');
        }, 60000);
      }
    });

    socket.on('chat:message', function(data) {
      document.dispatchEvent(new CustomEvent('arena:chat:message', { detail: data }));
    });

    // ── RESPAWN — Nine returns after KO cooldown
    socket.on('arena:respawn', (data) => {
      const nineId = resolveId(data.nine_id);
      const sprite = state.nines.get(nineId);
      if (sprite) {
        sprite.container.alpha = 1;
        sprite.spriteGroup.scale.set(1, 1);
        sprite.spriteGroup.rotation = 0;
        updateNineHP(nineId, data.hp || data.max_hp, data.max_hp);
        showFloatingText(sprite.container.x, sprite.container.y, 'REVIVED', 0x44ffaa, 14);
        spawnParticles(sprite.container.x, sprite.container.y, 0x44ffaa, 12, 'heal');
        addFeedEvent(`💚 ${data.name || 'A Nine'} respawned!`, 'system');
      }
    });

    // ── COMBAT STATUS — periodic full state sync (replaces cycle_start)
    socket.on('arena:combat_status', (data) => {
      state.isFighting = data.active || false;
      if (data.nine_count != null) {
        addFeedEvent(`${data.nine_count} Nines fighting on this zone`, 'system');
      }
      if (data.guild_power) {
        state.guildScores = data.guild_power;
        updateScoreboard();
      }
      if (data.next_snapshot_at) {
        state.cycleEndTime = data.next_snapshot_at;
        updateCountdownDisplay();
      }
    });

    // ── Legacy event handlers (still useful for direct events)
    socket.on('arena:event', (ev) => processArenaEvent(ev));
    socket.on('arena:events', (data) => {
      if (data.events) data.events.forEach((ev, i) => setTimeout(() => processArenaEvent(ev), i * 300));
    });

    // ── Legacy round/cycle handlers (backward compat if V6 engine is still running)
    socket.on('arena:cycle_start', (data) => {
      state.isFighting = true;
      addFeedEvent('⚔️ Combat active!', 'system');
      loadZoneNines(state.currentZoneId);
    });
    socket.on('arena:round_start', (data) => {
      state.isFighting = true;
      setRoundPositions();
    });
    socket.on('arena:round_events', (data) => {
      if (data.events) data.events.forEach((ev, i) => setTimeout(() => processArenaEvent(ev), i * 300));
    });

    // ── ROUND END (legacy V6 compat — V2 doesn't use rounds)
    socket.on('arena:round_end', (data) => {
      // Sync HP from server
      if (data.nines) {
        for (const nine of data.nines) {
          const nineId = resolveNineId(nine);
          updateNineHP(nineId, nine.current_hp || nine.hp, nine.max_hp || nine.maxHp);
        }
      }
      if (data.guild_scores) {
        state.guildScores = data.guild_scores;
        updateScoreboard();
      }
    });

    // ── HEAL PHASE (legacy V6 compat — V2 handles heal via effect events)
    socket.on('arena:heal_phase', (data) => {
      if (data.heals) {
        data.heals.forEach((h, i) => {
          setTimeout(() => {
            const nineId = resolveNineId(h);
            updateNineHP(nineId, h.new_hp, null);
            const sprite = state.nines.get(nineId);
            if (sprite) {
              showFloatingText(sprite.container.x, sprite.container.y, `+${h.amount}`, 0x44ffaa, 11);
              spawnParticles(sprite.container.x, sprite.container.y, 0x44ffaa, 8, 'heal');
            }
          }, i * 200);
        });
      }
    });

    // ── CYCLE END (legacy V6 compat — V2 uses arena:snapshot)
    socket.on('arena:cycle_end', (data) => {
      const winner = data.winner_guild || 'No winner';
      showRoundBanner('ZONE SCORED', `${winner} controls zone`);
      addFeedEvent(`📸 Zone scored — ${winner} controls zone`, 'system');
      nermRoundComment('cycle_end', data);

      if (data.next_cycle_at) {
        state.cycleEndTime = data.next_cycle_at;
      } else if (data.next_snapshot_at) {
        state.cycleEndTime = data.next_snapshot_at;
      } else {
        state.cycleEndTime = Date.now() + 15 * 60 * 1000;
      }

      if (!state.countdownInterval) {
        state.countdownInterval = setInterval(updateCountdownDisplay, 250);
      }
      updateCountdownDisplay();

      if (data.nines) {
        for (const nine of data.nines) {
          const nineId = resolveNineId(nine);
          updateNineHP(nineId, nine.current_hp || nine.hp, nine.max_hp || nine.maxHp);
        }
      }
      if (data.guild_scores) {
        state.guildScores = data.guild_scores;
        updateScoreboard();
      }

      fetchCycleTiming();
      if (state.currentZoneId) {
        loadZoneNines(state.currentZoneId);
        checkDeployment(state.currentZoneId);
      }
    });

    // Nerm commentary
    socket.on('arena:nerm', (data) => {
      const msg = typeof data === 'string' ? data : (data.message || data.text || data.comment || '');
      if (msg) showNermBubble(msg);
    });

    socket.on('disconnect', () => {
      addFeedEvent('Connection lost. Reconnecting...', 'system');
    });
  }

  /** Resolve Nine ID from various event formats — server might send player_id, nine_id, id, from, to */
  function resolveNineId(obj) {
    if (!obj) return null;
    // Try multiple ID fields
    const candidates = [obj.player_id, obj.nine_id, obj.id, obj.from, obj.to];
    for (const c of candidates) {
      if (c && state.nines.has(c)) return c;
    }
    // Try string/number coercion
    for (const c of candidates) {
      if (c === undefined || c === null) continue;
      const asStr = String(c);
      const asNum = Number(c);
      if (state.nines.has(asStr)) return asStr;
      if (!isNaN(asNum) && state.nines.has(asNum)) return asNum;
    }
    // Return first truthy candidate as fallback
    return obj.player_id || obj.nine_id || obj.id || null;
  }

  /** Resolve a specific field from event for sprite lookup */
  function resolveId(rawId) {
    if (rawId === undefined || rawId === null) return null;
    if (state.nines.has(rawId)) return rawId;
    const asStr = String(rawId);
    if (state.nines.has(asStr)) return asStr;
    const asNum = Number(rawId);
    if (!isNaN(asNum) && state.nines.has(asNum)) return asNum;
    return rawId; // fallback
  }

  // ═══════════════════════════════════════════════════════════════
  // V2 EVENT PROCESSOR — handles continuous combat + legacy events
  // V2 types: attack, dot_damage, effect_*, ko, reflected_damage
  // Legacy V6 types: cast, effect_tick, dodge, ward_pop, anchor_save
  // ═══════════════════════════════════════════════════════════════
  function processArenaEvent(ev) {
    // Map V2 engine event types to frontend handler types
    if (ev.type === 'effect_applied' && ev.effect) {
      ev.type = 'effect_' + ev.effect.toLowerCase().replace(/\s+/g, '_');
    }
    if (ev.type === 'heal') {
      ev.type = 'effect_' + (ev.effect || 'heal').toLowerCase();
    }

    switch (ev.type) {

      // ── V2: ATTACK — source attacks target with V2 damage formula
      case 'attack': {
        const fromId = resolveId(ev.source || ev.from);
        const toId = resolveId(ev.target || ev.to);
        const attacker = state.nines.get(fromId);
        const target = state.nines.get(toId);
        const dmg = ev.damage || 0;
        const cardName = ev.card_name || '';

        animateProjectile(fromId, toId, ev.from_house || attacker?.house, () => {
          if (target) {
            if (ev.isCrit) {
              fireworkCRIT(target.container.x, target.container.y);
            } else {
              spawnFireworkExplosion(target.container.x, target.container.y, getHouseColor(ev.from_house || attacker?.house));
              showFloatingText(target.container.x, target.container.y, `-${dmg}`, 0xff4466, 18);
            }
            shakeSprite(target);
            if (target.spriteGroup) {
              target.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xff3333; });
              setTimeout(() => { if (target.spriteGroup) target.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xffffff; }); }, 300);
            }
          }
          if (ev.targetHp != null) { updateNineHP(toId, ev.targetHp, ev.targetMaxHp || target?.maxHp); updateHpStrip(); }
        });

        const from = ev.sourceName || getNineName(fromId);
        const to = ev.targetName || getNineName(toId);
        const cardPart = cardName ? ` <span style="color:var(--gold)">[${cardName}]</span>` : '';
        const critPart = ev.isCrit ? ' <span class="feed-crit">★ CRIT!</span>' : '';
        const logLine = `⚔️ ${from} → ${to}${cardPart} -${dmg}${ev.isCrit ? ' CRIT!' : ''}`;
        // Crits go to feed, normal auto-attacks go to full log only
        if (ev.isCrit) {
          addFeedEvent(`⚔️ <span class="feed-name">${from}</span> → <span class="feed-name">${to}</span> <span class="feed-dmg">-${dmg}</span>${critPart}`, 'attack');
        }
        addBattleLog(logLine, 'default');
        // Track live damage for combat meters
        if (dmg > 0) trackCombatStat(fromId, ev.sourceName || getNineName(fromId), attacker?.guild, attacker?.house, 'damage', dmg);
        break;
      }


      // ── SPELL CAST — card cast with effects, visually distinct from auto-attack
      case 'spell_cast': {
        const fromId = resolveId(ev.source);
        const toId = resolveId(ev.target);
        const caster = state.nines.get(fromId);
        const target = state.nines.get(toId);
        const dmg = ev.damage || 0;
        const cardName = ev.card_name || 'Spell';
        const house = ev.from_house || caster?.house;
        const effects = ev.effects || [];

        // Flash the card slot that just cast
        const castSlot = document.getElementById(`card-slot-${state.cardCooldownIndex || 0}`);
        if (castSlot) castSlot.classList.add('slot-casting-flash');
        setTimeout(() => castSlot?.classList.remove('slot-casting-flash'), 400);
        // Advance to next card
        state.cardCooldownIndex = ((state.cardCooldownIndex || 0) + 1) % 3;

        // Show cast banner floating up from caster
        if (caster) {
          showFloatingText(caster.container.x, caster.container.y - 50, `✨ ${cardName}`, 0xD4A64B, 11);
          if (caster.spriteGroup) {
            caster.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xffffaa; });
            setTimeout(() => { if (caster.spriteGroup) caster.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xffffff; }); }, 400);
          }
        }

        // Spell projectile — bigger, slower than auto-attack
        setTimeout(() => {
          animateSpellProjectile(fromId, toId, house, effects, () => {
            if (target) {
              const mainEffect = effects[0] || '';
              if (mainEffect === 'BURN') fireworkBURN(target.container.x, target.container.y);
              else if (mainEffect === 'POISON') fireworkPOISON(target.container.x, target.container.y);
              else if (mainEffect === 'SILENCE') fireworkSILENCE(target.container.x, target.container.y);
              else if (mainEffect === 'WEAKEN' || mainEffect === 'HEX') fireworkWEAKEN(target.container.x, target.container.y);
              else if (mainEffect === 'HEAL' || mainEffect === 'BLESS' || mainEffect === 'INSPIRE') fireworkHEAL(target.container.x, target.container.y);
              else {
                spawnFireworkExplosion(target.container.x, target.container.y, getHouseColor(house));
                setTimeout(() => spawnFireworkExplosion(target.container.x + (Math.random()-0.5)*25, target.container.y + (Math.random()-0.5)*25, 0xffffff), 120);
              }
              if (dmg > 0) showFloatingText(target.container.x, target.container.y, `-${dmg}`, 0xff4466, 22);
              shakeSprite(target);
              if (target.spriteGroup) {
                target.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xff2222; });
                setTimeout(() => { if (target.spriteGroup) target.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xffffff; }); }, 500);
              }
            } else if (caster && (effects.includes('HEAL') || effects.includes('BLESS') || effects.includes('WARD') || effects.includes('ANCHOR'))) {
              fireworkHEAL(caster.container.x, caster.container.y);
            }
            if (ev.targetHp != null) { updateNineHP(toId, ev.targetHp, ev.targetMaxHp || target?.maxHp); updateHpStrip(); }
          });
        }, 200);

        // Feed — spells get distinct styling vs auto-attacks
        const from = ev.sourceName || getNineName(fromId);
        const to = ev.targetName || getNineName(toId);
        const effectPills = effects.slice(0, 2).map(e => `<span class="feed-effect">${getEffectEmoji(e)} ${e}</span>`).join(' ');
        const dmgPart = dmg > 0 ? ` <span class="feed-dmg">-${dmg}</span>` : '';
        const targetPart = to ? ` → <span class="feed-name">${to}</span>` : '';
        // Spell casts always go to feed — they're the interesting events
        addFeedEvent(`✨ <span class="feed-name">${from}</span> casts <span style="color:var(--gold);font-weight:700">${cardName}</span>${targetPart}${dmgPart} ${effectPills}`, 'effect');
        addBattleLog(`✨ ${from} casts ${cardName}${to ? ' → '+to : ''}${dmg > 0 ? ' -'+dmg : ''} [${effects.join(', ')}]`, 'spell');

      }

      // ── V2: DOT DAMAGE — poison/burn tick damage
      case 'dot_damage': {
        const tId = resolveId(ev.target);

      // ── V2: KO — Nine knocked out

          // Double flash to show double-trigger

            setTimeout(() => { if (sprite.spriteGroup) sprite.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xffffff; }); }, 200);
            setTimeout(() => { if (sprite.spriteGroup) sprite.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0x6ac8d8; }); }, 400);
            setTimeout(() => { if (sprite.spriteGroup) sprite.spriteGroup.children.forEach(c => { if (c.tint !== undefined) c.tint = 0xffffff; }); }, 600);
